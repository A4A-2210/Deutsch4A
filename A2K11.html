    <script type="text/babel">
        const playAudio = (text, e) => {
            if (e) e.stopPropagation();
            const cleanText = text.replace(/<[^>]+>/g, '');
            const utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.lang = 'de-DE';
            window.speechSynthesis.speak(utterance);
        };

        const SpeechTester = ({ targetText }) => {
            const [status, setStatus] = React.useState('idle');
            const [heard, setHeard] = React.useState('');

            const listen = (e) => {
                if (e) e.stopPropagation();
                if (!('webkitSpeechRecognition' in window)) {
                    alert('المتصفح ده مش بيدعم تسجيل الصوت، جرب Google Chrome.');
                    return;
                }
                const recognition = new webkitSpeechRecognition();
                recognition.lang = 'de-DE';
                recognition.interimResults = false;

                recognition.onstart = () => setStatus('listening');
                recognition.onresult = (event) => {
                    const speechResult = event.results[0][0].transcript;
                    setHeard(speechResult);

                    const clean = (str) => str.replace(/<[^>]+>/g, '').toLowerCase().replace(/[.,!?:]/g, '').trim();
                    const targetClean = clean(targetText);
                    const heardClean = clean(speechResult);

                    if (heardClean.includes(targetClean) || targetClean.includes(heardClean) || heardClean === targetClean) {
                        setStatus('success');
                    } else {
                        setStatus('fail');
                    }
                };
                recognition.onerror = () => setStatus('fail');
                recognition.onend = () => { if (status === 'listening') setStatus('idle'); };
                recognition.start();
            };

            return (
                <div className="inline-flex items-center gap-2" onClick={(e) => e.stopPropagation()}>
                    <button onClick={listen} title="جرب تنطقها" className={`p-2 rounded-full transition-all duration-300 shadow-sm ${status === 'listening' ? 'bg-red-500 text-white animate-pulse scale-110' : 'bg-slate-100 text-slate-600 hover:bg-slate-200 hover:scale-105'}`}>
                        <i data-lucide="mic" className="w-4 h-4"></i>
                    </button>
                    {status === 'success' && <span className="text-emerald-500 text-xs font-bold ar-text animate-bounce">✅ ممتاز!</span>}
                    {status === 'fail' && <span className="text-red-500 text-xs ar-text font-bold" title={`سمعت: ${heard}`}>❌ جرب تاني</span>}
                </div>
            );
        };

                { id: 'e1', type: "Reaktion", ger: "Das mache ich auch immer / nur selten.", eng: "I always / only rarely do that too.", ar: "أنا كمان دايماً / نادراً بعمل كده.", context: "لإظهار التشابه في العادات أثناء السفر." },
                { id: 'e2', type: "Reaktion", ger: "Dafür habe ich meistens keine Zeit.", eng: "I usually don't have time for that.", ar: "غالباً معنديش وقت لده.", context: "للرد بعدم الاستطاعة أو الانشغال." },
                { id: 'e3', type: "Meinung", ger: "Interessant. Das mache ich nie.", eng: "Interesting. I never do that.", ar: "مثير للاهتمام. عمري ما بعمل كده.", context: "للتعليق على شيء مختلف يفعله شخص آخر." },
                { id: 'e4', type: "Vorliebe", ger: "Ich würde am liebsten ein Museum besuchen.", eng: "I would most like to visit a museum.", ar: "أكتر حاجة حابب أعملها هي زيارة متحف.", context: "للتعبير عن تفضيلك لشيء بوضوح." },
                { id: 'e5', type: "Vorliebe", ger: "Ich möchte lieber den Rundgang machen.", eng: "I would prefer to do the tour.", ar: "أفضل أعمل الجولة.", context: "عند المقارنة وتفضيل خيار على آخر." },
                { id: 'e6', type: "Vorschlag", ger: "Wir könnten doch ins Museum gehen.", eng: "We could go to the museum, couldn't we?", ar: "إحنا ممكن نروح المتحف.", context: "لتقديم اقتراح مهذب لمجموعة." },
                { id: 'e7', type: "Vorschlag", ger: "Wie wäre es, wenn wir eine Stadtrundfahrt machen?", eng: "How about if we do a city tour?", ar: "إيه رأيك لو نعمل جولة في المدينة؟", context: "طريقة أخرى شائعة لاقتراح فكرة." },
                { id: 'e8', type: "Zustimmung", ger: "Das ist eine gute Idee. / Das finde ich gut.", eng: "That's a good idea. / I think that's good.", ar: "دي فكرة كويسة / شايف ده كويس.", context: "للموافقة على اقتراح." },
                { id: 'e9', type: "Ablehnung", ger: "Das wäre nicht so gut. / Oh nein, kein Museum!", eng: "That wouldn't be so good. / Oh no, not a museum!", ar: "ده مش هيكون كويس / أوه لا، بلاش متحف!", context: "لرفض اقتراح بلطف أو بوضوح." },
                { id: 'e10', type: "Wohnung", ger: "Die Wohnung ist 60 m² groß und hat 2 Zimmer.", eng: "The apartment is 60 m² large and has 2 rooms.", ar: "الشقة مساحتها 60 متر وفيها أوضتين.", context: "لوصف مساحة وحجم الشقة." },
                { id: 'e11', type: "Miete", ger: "Die Kaltmiete beträgt 504 Euro.", eng: "The base rent amounts to 504 Euros.", ar: "الإيجار الأساسي يبلغ 504 يورو.", context: "للتحدث عن تكلفة الإيجار." },
                { id: 'e12', type: "Einladung", ger: "Ihr könnt mich gern besuchen.", eng: "You are welcome to visit me.", ar: "ممكن تبقوا تزوروني.", context: "لدعوة الأصدقاء لزيارتك." }
            ],
            dialogues: [
                {
                    id: 'd1', title: "Was machen Sie in einer fremden Stadt?", icon: "map",
                    lines: [
                        { speaker: "Person A", text: "Was machen Sie gern, wenn Sie in einer fremden Stadt sind?", en: "What do you like to do when you are in a foreign city?", ar: "بتحب تعمل إيه لما بتكون في مدينة غريبة؟" },
                        { speaker: "Person B", text: "Ich gehe oft in ein Museum oder in den Zoo. Ich interessiere mich sehr für Kultur.", en: "I often go to a museum or to the zoo. I am very interested in culture.", ar: "غالباً بروح متحف أو حديقة الحيوان. أنا مهتم جداً بالثقافة." },
                        { speaker: "Person A", text: "Interessant. Das mache ich nie. Ich finde Museen langweilig.", en: "Interesting. I never do that. I find museums boring.", ar: "مثير للاهتمام. عمري ما بعمل كده. أنا بشوف المتاحف مملة." },
                        { speaker: "Person B", text: "Was machen Sie denn meistens?", en: "What do you usually do then?", ar: "أومال في الغالب بتعمل إيه؟" },
                        { speaker: "Person A", text: "Ich laufe gern durch die Innenstadt oder die Altstadt. Und ich gehe immer einkaufen.", en: "I like walking through the city center or the old town. And I always go shopping.", ar: "بحب أتمشى في وسط البلد أو المدينة القديمة. ودايماً بروح أعمل شوبينج." },
                        { speaker: "Person B", text: "Das mache ich auch oft. Kaufen Sie auch Andenken für Freunde?", en: "I do that often too. Do you also buy souvenirs for friends?", ar: "أنا كمان بعمل كده كتير. بتشتري كمان هدايا تذكارية لأصحابك؟" },
                        { speaker: "Person A", text: "Ja, ich kaufe immer Andenken für Familienmitglieder. Und ich schreibe Postkarten.", en: "Yes, I always buy souvenirs for family members. And I write postcards.", ar: "أيوة، دايماً بشتري هدايا تذكارية لعيلتي. وبكتب كروت بوستال." },
                        { speaker: "Person B", text: "Postkarten schreibe ich selten. Ich poste lieber Fotos oder verschicke sie an Freunde.", en: "I rarely write postcards. I prefer to post photos or send them to friends.", ar: "نادراً لما بكتب كروت بوستال. بفضل أنشر الصور أو أبعتها لأصحابي." },
                        { speaker: "Person A", text: "Fotografieren Sie auch Sehenswürdigkeiten?", en: "Do you also photograph sights?", ar: "بتصور المعالم السياحية كمان؟" },
                        { speaker: "Person B", text: "Ja, natürlich. Und abends gehe ich gern in ein Konzert oder in die Oper.", en: "Yes, of course. And in the evening I like to go to a concert or to the opera.", ar: "أيوة طبعاً. وبالليل بحب أروح حفلة موسيقية أو الأوبرا." },
                        { speaker: "Person A", text: "Dafür habe ich meistens keine Zeit. Ich gehe abends lieber in eine Disco oder eine Bar.", en: "I usually don't have time for that. I prefer going to a disco or a bar in the evening.", ar: "غالباً معنديش وقت لده. بفضل أروح بالليل ديسكو أو بار." },
                        { speaker: "Person B", text: "Und wo schlafen Sie?", en: "And where do you sleep?", ar: "وبتنام فين؟" },
                        { speaker: "Person A", text: "Ich übernachte meistens in einem Hotel.", en: "I usually stay in a hotel.", ar: "غالباً ببات في فندق." }
                    ]
                },
                {
                    id: 'd2', title: "Interview: Fotografieren auf Reisen", icon: "camera",
                    lines: [
                        { speaker: "Anna", text: "Hallo Ben. Fotografierst du oft, wenn du reist?", en: "Hello Ben. Do you take photos often when you travel?", ar: "أهلاً بن. بتصور كتير وأنت مسافر؟" },
                        { speaker: "Ben", text: "Hallo Anna. Ja, ich fotografiere sehr oft. Fast ständig!", en: "Hello Anna. Yes, I take photos very often. Almost constantly!", ar: "أهلاً آنا. أيوة، بصور كتير جداً. تقريباً طول الوقت!" },
                        { speaker: "Anna", text: "Womit fotografierst du? Mit deinem Smartphone?", en: "What do you take photos with? With your smartphone?", ar: "بتصور بإيه؟ بموبايلك؟" },
                        { speaker: "Ben", text: "Meistens ja. Es ist einfach und schnell. Und du?", en: "Mostly, yes. It's easy and fast. And you?", ar: "في الغالب أيوة. أسهل وأسرع. وأنتي؟" },
                        { speaker: "Anna", text: "Ich auch. Manchmal nehme ich meinen Fotoapparat mit, aber das Smartphone ist praktischer.", en: "Me too. Sometimes I take my camera, but the smartphone is more practical.", ar: "وأنا كمان. أحياناً باخد كاميرتي معايا، بس الموبايل عملي أكتر." },
                        { speaker: "Ben", text: "Und was fotografierst am liebsten?", en: "And what do you like to photograph the most?", ar: "وأكتر حاجة بتحبي تصوريها إيه؟" },
                        { speaker: "Anna", text: "Ich fotografiere am liebsten Landschaften und Sehenswürdigkeiten. Mich selbst fotografiere ich nicht so oft.", en: "I most like to photograph landscapes and sights. I don't photograph myself very often.", ar: "أكتر حاجة بحب أصورها المناظر الطبيعية والمعالم السياحية. مبصورش نفسي كتير." },
                        { speaker: "Ben", text: "Das ist bei mir genauso. Letzte Frage: Was machst du mit all den Fotos?", en: "It's the same for me. Last question: What do you do with all the photos?", ar: "وأنا كمان كده بالظبط. آخر سؤال: بتعملي إيه بكل الصور دي؟" },
                        { speaker: "Anna", text: "Ich zeige sie meiner Familie und die besten poste ich online.", en: "I show them to my family and I post the best ones online.", ar: "بوريها لعيلتي وأحسن صور بنشرها أونلاين." }
                    ]
                },
                {
                    id: 'd3', title: "Ein Tag in Graz (التخطيط ليوم سياحي)", icon: "clock",
                    lines: [
                        { speaker: "Person A", text: "Also, ich finde den kulinarischen Rundgang interessant. Der fängt um 10.30 Uhr an.", en: "So, I find the culinary tour interesting. It starts at 10:30 AM.", ar: "بصراحة أنا شايف الجولة الخاصة بالأكل مثيرة للاهتمام. بتبدأ الساعة 10:30." },
                        { speaker: "Person B", text: "Ich nicht. Ich finde das langweilig. Ich würde am liebsten ein Museum besuchen. Das Kunsthaus Graz öffnet um 10 Uhr.", en: "Not me. I find that boring. I would most like to visit a museum. The Kunsthaus Graz opens at 10 AM.", ar: "أنا لأ. شايف ده ممل. أكتر حاجة حابب أعملها هي زيارة متحف. متحف الفن بيفتح الساعة 10." },
                        { speaker: "Person C", text: "Mir auch! Das Kunsthaus gefällt mir am besten. Wie wäre es, wenn wir um 10 Uhr ins Museum gehen?", en: "Me too! I like the Kunsthaus the best. How about if we go to the museum at 10 AM?", ar: "وأنا كمان! ده أكتر حاجة عجباني. إيه رأيكم لو نروح المتحف الساعة 10؟" },
                        { speaker: "Person A", text: "Das ist eine gute Idee. Und was machen wir am Nachmittag? Ich möchte lieber den Rundgang durch die Altstadt machen als eine Wanderung.", en: "That's a good idea. And what do we do in the afternoon? I would prefer to do the tour of the Old Town rather than a hike.", ar: "دي فكرة كويسة. وهنعمل إيه بعد الظهر؟ أنا أفضل أعمل جولة في المدينة القديمة أحسن من المشي الطويل." },
                        { speaker: "Person B", text: "Ja, das wäre gut. Der Rundgang beginnt um 14.30 Uhr.", en: "Yes, that would be good. The tour starts at 2:30 PM.", ar: "أيوة ده هيكون كويس. الجولة بتبدأ الساعة 2:30." },
                        { speaker: "Person C", text: "Perfekt! Dann gehen wir um 10 Uhr ins Museum und um 14.30 Uhr machen wir den Rundgang. Dazwischen haben wir Zeit für einen Einkaufsbummel und zum Mittagessen.", en: "Perfect! Then we'll go to the museum at 10 AM and at 2:30 PM we'll do the tour. In between, we have time for a shopping trip and for lunch.", ar: "ممتاز! يبقى هنروح المتحف الساعة 10 والساعة 2:30 هنعمل الجولة. وفي النص عندنا وقت للشوبينج والغدا." }
                    ]
                },
                {
                    id: 'd4', title: "Höfliche Vorschläge (اقتراحات مهذبة)", icon: "coffee",
                    lines: [
                        { speaker: "Person A", text: "Ich würde gern jetzt etwas essen gehen. Ich habe Hunger.", en: "I would like to go eat something now. I'm hungry.", ar: "حابب أروح أكل حاجة دلوقتي. أنا جعان." },
                        { speaker: "Person B", text: "Super Idee. Ich kenne ein gutes Restaurant hier in der Nähe.", en: "Great idea. I know a good restaurant near here.", ar: "فكرة ممتازة. أنا عارف مطعم كويس قريب من هنا." },
                        { speaker: "Person A", text: "Wie wäre es, wenn wir eine Stadtrundfahrt machen?", en: "How about if we do a city tour?", ar: "إيه رأيك لو نعمل جولة في المدينة؟" },
                        { speaker: "Person B", text: "Ach nein, ich laufe lieber zu Fuß durch die Stadt.", en: "Oh no, I'd rather walk through the city on foot.", ar: "أوه لا، أنا بفضل أتمشى في المدينة على رجلي أحسن." },
                        { speaker: "Person A", text: "Wir könnten doch das Basler Münster besichtigen. Es soll sehr schön sein.", en: "We could visit the Basel Minster. It's supposed to be very beautiful.", ar: "ممكن نزور كاتدرائية بازل. بيقولوا إنها جميلة جداً." },
                        { speaker: "Person B", text: "Ja, das ist eine gute Idee. Das wollte ich schon immer sehen.", en: "Yes, that's a good idea. I've always wanted to see that.", ar: "أيوة دي فكرة كويسة. كان نفسي أشوفها من زمان." },
                        { speaker: "Person A", text: "Ich würde am liebsten in die Berge fahren und dort zwei Stunden wandern.", en: "I would most like to drive to the mountains and hike there for two hours.", ar: "أكتر حاجة حابب أعملها أروح الجبال وأتمشى هناك ساعتين." },
                        { speaker: "Person B", text: "Zwei Stunden? Das ist mir zu lang. Ich möchte mich lieber erholen.", en: "Two hours? That's too long for me. I'd rather relax.", ar: "ساعتين؟ ده طويل جداً عليا. أنا أفضل أستريح." },
                        { speaker: "Person A", text: "Wie wäre es, wenn wir in eine Disco gehen und die ganze Nacht tanzen?", en: "How about if we go to a club and dance all night?", ar: "إيه رأيك لو نروح ديسكو ونرقص طول الليل؟" },
                        { speaker: "Person B", text: "Oh nein, kein Tanzen! Ich bin viel zu müde.", en: "Oh no, no dancing! I am way too tired.", ar: "أوه لأ، بلاش رقص! أنا تعبان جداً." }
                    ]
                },
                {
                    id: 'd5', title: "Wohnungen vergleichen (مقارنة بين شقتين)", icon: "bar-chart-2",
                    lines: [
                        { speaker: "Person A", text: "Welche Wohnung gefällt dir besser?", en: "Which apartment do you like better?", ar: "أنهي شقة عاجباك أكتر؟" },
                        { speaker: "Person B", text: "Ich finde die zweite Wohnung besser, denn sie ist viel billiger und hat eine Einbauküche.", en: "I find the second apartment better because it is much cheaper and has a fitted kitchen.", ar: "أنا شايف الشقة التانية أحسن، لأنها أرخص بكتير وفيها مطبخ جاهز." },
                        { speaker: "Person A", text: "Ja, das stimmt, aber sie liegt im Dachgeschoss und hat nur ein Zimmer. Das ist mir zu klein.", en: "Yes, that's true, but it's on the top floor and only has one room. That is too small for me.", ar: "أيوة ده حقيقي، بس هي في الدور الأخير ومفيهاش غير أوضة واحدة. دي صغيرة جداً عليا." },
                        { speaker: "Person B", text: "Du hast recht. Die erste Wohnung ist größer.", en: "You are right. The first apartment is bigger.", ar: "عندك حق. الشقة الأولى أكبر." },
                        { speaker: "Person A", text: "Ich würde die erste Wohnung nehmen, weil sie zwei Zimmer hat. Das ist besser, wenn man Besuch bekommt.", en: "I would take the first apartment because it has two rooms. That is better when you have visitors.", ar: "أنا هاخد الشقة الأولى عشان فيها أوضتين. ده أحسن لو جالك ضيوف." },
                        { speaker: "Person B", text: "Ich bin damit einverstanden. Und die Kaution ist auch niedriger.", en: "I agree with that. And the deposit is also lower.", ar: "أنا متفق معاك. ومبلغ التأمين كمان أقل." }
                    ]
                },
                {
                    id: 'd6', title: "Ein Treffen auf der Straße (لقاء في الشارع)", icon: "map-pin",
                    lines: [
                        { speaker: "Kerstin", text: "Hallo Christine, dich habe ich aber lange nicht mehr gesehen.", en: "Hello Christine, I haven't seen you in a long time.", ar: "أهلاً كريستين، مشوفتكيش من زمان جداً." },
                        { speaker: "Christine", text: "Ja, wir wohnen nicht mehr hier in der Gegend. Ich besuche nur eine Freundin, die noch hier wohnt.", en: "Yes, we don't live here in the area anymore. I'm just visiting a friend who still lives here.", ar: "أيوة، إحنا مبقيناش ساكنين في المنطقة دي. أنا بس بزور واحدة صاحبتي لسة ساكنة هنا." },
                        { speaker: "Kerstin", text: "Wo wohnst du denn jetzt?", en: "So where do you live now?", ar: "أنتي ساكنة فين دلوقتي؟" },
                        { speaker: "Christine", text: "Wir wohnen jetzt in einem kleinen Haus am Stadtrand. In Sonnenfeld.", en: "We live in a small house on the outskirts now. In Sonnenfeld.", ar: "إحنا ساكنين دلوقتي في بيت صغير على أطراف المدينة. في منطقة زوننفيلد." },
                        { speaker: "Kerstin", text: "Oh, Sonnenfeld, da gibt es doch so viele neue Häuser. Nach Sonnenfeld kommt man doch mit dem Bus, oder?", en: "Oh, Sonnenfeld, there are so many new houses there. You can get to Sonnenfeld by bus, right?", ar: "أوه، زوننفيلد فيها بيوت جديدة كتير. منطقة زوننفيلد بيوصلها الباص، صح؟" },
                        { speaker: "Christine", text: "Ja, man kann den Bus nehmen oder die Straßenbahn, Linie 10. Mit der Straßenbahn fährt man vom Bahnhof 40 Minuten, mit dem Bus 45 Minuten.", en: "Yes, you can take the bus or the tram, line 10. It's a 40-minute ride from the train station with the tram, 45 minutes with the bus.", ar: "أيوة ممكن تركبي الباص أو الترام خط 10. بالترام المشوار بياخد 40 دقيقة من المحطة، وبالباص 45 دقيقة." },
                        { speaker: "Kerstin", text: "Das ist ziemlich weit.", en: "That's quite far.", ar: "ده بعيد شوية." },
                        { speaker: "Christine", text: "Ach, das ist kein Problem, ich lese in der Straßenbahn.", en: "Oh, that's no problem, I read on the tram.", ar: "دي مش مشكلة، أنا بقرأ في الترام." },
                        { speaker: "Kerstin", text: "Und, habt ihr auch neu gebaut?", en: "And, did you build a new house?", ar: "وبانيتوا بيت جديد؟" },
                        { speaker: "Christine", text: "Ja, unser Haus ist neu, es hat vier Zimmer und einen großen Garten. Im Moment müssen wir im Garten noch viel machen, aber wir hoffen, dass er später sehr schön wird.", en: "Yes, our house is new, it has four rooms and a large garden. At the moment we still have to do a lot in the garden, but we hope it will be very beautiful later.", ar: "أيوة، بيتنا جديد، فيه 4 أوض وجنينة كبيرة. دلوقتي لسة ورانا شغل كتير في الجنينة، بس نتمنى تبقى جميلة بعدين." },
                        { speaker: "Kerstin", text: "Also, ein Garten – das ist nichts für mich. Zu viel Arbeit! Ich wohne lieber im Zentrum, da habe ich alles zusammen: gute Einkaufsmöglichkeiten, viele Restaurants und einen kurzen Arbeitsweg.", en: "Well, a garden – that's not for me. Too much work! I prefer to live in the center, I have everything together there: good shopping, many restaurants, and a short commute to work.", ar: "بصراحة الجنينة دي مش سكتي. شغلها كتير! أنا بفضل أسكن في وسط البلد، هناك عندي كل حاجة: محلات شوبينج كويسة، مطاعم كتير، وطريق شغلي قصير." },
                        { speaker: "Christine", text: "Ja, das sind natürlich Pluspunkte, wenn man im Zentrum wohnt. Der lange Weg nach Hause, das ist ein Nachteil vom Häuschen im Grünen.", en: "Yes, those are of course plus points when you live in the center. The long way home, that's a disadvantage of a little house in the countryside.", ar: "أيوة دي طبعاً مميزات لو ساكن في السنتر. طريق البيت الطويل ده عيب البيت اللي في الخضرة." },
                        { speaker: "Christine", text: "Es gibt aber auch Vorteile: Es ist ruhig, die Luft ist sauber, man hat schnell Kontakt zu den Nachbarn und man kann in der Sonne im Garten liegen und sich entspannen. Besuch uns doch mal.", en: "But there are also advantages: It's quiet, the air is clean, you quickly make contact with the neighbors, and you can lie in the sun in the garden and relax. Why don't you come visit us?", ar: "بس في مميزات كمان: المكان هادي، الهوا نقي، الواحد بيعمل علاقات بسرعة مع الجيران وممكن ترتاح في الجنينة في الشمس. ابقي زورينا." },
                        { speaker: "Kerstin", text: "Gern, aber im Moment muss ich viel arbeiten. Ich rufe dich an, wenn ich Zeit habe.", en: "Gladly, but at the moment I have to work a lot. I'll call you when I have time.", ar: "ياريت، بس دلوقتي أنا بشتغل كتير. هكلمك لما أكون فاضية." },
                        { speaker: "Christine", text: "Na dann, tschüss ...", en: "Well then, bye ..", ar: "طيب، مع السلامة..." }
                    ]
                },
                {
                    id: 'd7', title: "Wohnung und Umgebung (محيط السكن)", icon: "home",
                    lines: [
                        { speaker: "Anna", text: "Was ist für euch am wichtigsten? Für mich sind die Mietkosten am wichtigsten.", en: "What is most important for you all? For me, the rent costs are the most important.", ar: "إيه أهم حاجة بالنسبالكم؟ بالنسبة لي سعر الإيجار هو الأهم." },
                        { speaker: "Ben", text: "Wirklich? Ich finde die Lage viel wichtiger. Ich möchte gute Einkaufsmöglichkeiten und einen Park in der Nähe haben.", en: "Really? I find the location much more important. I want to have good shopping facilities and a park nearby.", ar: "بجد؟ أنا شايف الموقع أهم بكتير. عايز أماكن شوبينج كويسة وحديقة قريبة." },
                        { speaker: "Clara", text: "Das stimmt, die Lage ist wichtig, aber für mich ist die Wohnungsgröße entscheidend. Ich brauche mindestens drei Zimmer und einen Balkon.", en: "That's true, the location is important, but for me, the apartment size is crucial. I need at least three rooms and a balcony.", ar: "ده حقيقي الموقع مهم، بس بالنسبة لي مساحة الشقة هي الحاسمة. محتاجة على الأقل 3 أوض وبلكونة." },
                        { speaker: "Anna", text: "Ein Garten wäre auch schön, aber das ist in der Stadt oft zu teuer.", en: "A garden would also be nice, but that's often too expensive in the city.", ar: "جنينة كمان هتبقى حاجة حلوة، بس ده غالباً غالي جداً في المدينة." }
                    ]
                },
                {
                    id: 'd8', title: "Sind Sie ein Heimwerker? (هل تصلح الأشياء بنفسك؟)", icon: "wrench",
                    lines: [
                        { speaker: "Anna", text: "Sag mal, bist du ein Heimwerker? Was kannst du selbst machen?", en: "Tell me, are you a DIYer? What can you do yourself?", ar: "قولي، هل أنت بتعرف تصلح حاجات بنفسك؟ إيه اللي تقدر تعمله لوحدك؟" },
                        { speaker: "Ben", text: "Also, ich bin ganz praktisch. Ich kann die Glühbirne wechseln, Blumen pflanzen und die Wohnung sauber machen. Ich kann auch ein Bücherregal bauen.", en: "Well, I'm quite practical. I can change the lightbulb, plant flowers, and clean the apartment. I can also build a bookshelf.", ar: "بص، أنا عملي جداً. أقدر أغير اللمبة، أزرع ورد، وأنظف الشقة. وأقدر كمان أعمل رف كتب." },
                        { speaker: "Anna", text: "Und was lässt du machen?", en: "And what do you have done (by someone else)?", ar: "وإيه اللي بتخلي حد يعملهولك؟" },
                        { speaker: "Ben", text: "Den Herd kann ich nicht anschließen. Ich lasse den Herd von einem Elektriker anschließen.", en: "I can't connect the stove. I have the stove connected by an electrician.", ar: "مقدرش أوصل البوتاجاز. بخلي كهربائي هو اللي يوصله." },
                        { speaker: "Ben", text: "Und das Waschbecken repariere ich auch nicht selbst. Das lasse ich von einem Klempner reparieren.", en: "And I don't repair the sink myself either. I have it repaired by a plumber.", ar: "والحوض كمان بصلحوش بنفسي. بخلي سباك يصلحهولي." }
                    ]
                },
                {
                    id: 'd9', title: "Nachbarschaftshilfe (مساعدة الجيران)", icon: "heart",
                    lines: [
                        { speaker: "Anna", text: "Haben Sie schon mal für Ihre Nachbarn etwas eingekauft?", en: "Have you ever bought something for your neighbors?", ar: "هل اشتريت حاجة لجيرانك قبل كده؟" },
                        { speaker: "Ben", text: "Ja, das habe ich schon mal gemacht. / Ja, ich mache das manchmal/regelmäßig.", en: "Yes, I've done that before. / Yes, I do that sometimes/regularly.", ar: "أيوة عملت كده قبل كده. / أيوة بعمل كده أحياناً/بانتظام." },
                        { speaker: "Anna", text: "Hast du schon mal die Kinder der Nachbarn betreut?", en: "Have you ever looked after the neighbors' children?", ar: "هل راعيت أطفال الجيران قبل كده؟" },
                        { speaker: "Ben", text: "Nein, das habe ich noch nie gemacht.", en: "No, I've never done that.", ar: "لأ عمري ما عملت كده." },
                        { speaker: "Anna", text: "Haben Sie schon mal die Nachbarn zum Geburtstag eingeladen?", en: "Have you ever invited the neighbors to a birthday?", ar: "عزمت جيرانك على عيد ميلادك قبل كده؟" },
                        { speaker: "Ben", text: "Ja, das habe ich schon mal gemacht. Letztes Jahr zu meinem runden Geburtstag.", en: "Yes, I've done that before. Last year for my big milestone birthday.", ar: "أيوة عملتها قبل كده. السنة اللي فاتت في عيد ميلادي." },
                        { speaker: "Anna", text: "Leihst du deinen Nachbarn manchmal Gegenstände?", en: "Do you sometimes lend items to your neighbors?", ar: "بتسلف جيرانك حاجات أحياناً؟" },
                        { speaker: "Ben", text: "Ja, ich mache das regelmäßig. Gestern habe ich Mehl geliehen.", en: "Yes, I do that regularly. Yesterday I lent (someone) flour.", ar: "أيوة بعمل كده بانتظام. إمبارح سلفت حد دقيق." },
                        { speaker: "Anna", text: "Sprechen Sie manchmal mit den Nachbarn über private Themen?", en: "Do you sometimes talk with the neighbors about private topics?", ar: "بتتكلم أحياناً مع الجيران في مواضيع شخصية؟" },
                        { speaker: "Ben", text: "Nein, das mache ich nicht. Wir sprechen nur über das Wetter.", en: "No, I don't do that. We only talk about the weather.", ar: "لأ، مبعملش كده. إحنا بنتكلم عن الجو وبس." }
                    ]
                },
                {
                    id: 'd10', title: "Interview: Umziehen (مقابلة عن العزال)", icon: "truck",
                    lines: [
                        { speaker: "Interviewer", text: "Wie oft sind Sie schon umgezogen?", en: "How often have you moved?", ar: "عزلت كام مرة قبل كده؟" },
                        { speaker: "KI", text: "Als künstliche Intelligenz ziehe ich nicht physisch um. Ich 'wohne' in Rechenzentren.", en: "As an artificial intelligence, I do not physically move. I 'live' in data centers.", ar: "كذكاء اصطناعي، أنا مش بعزل بشكل فيزيائي. أنا 'ساكن' في مراكز البيانات." },
                        { speaker: "Interviewer", text: "Was nervt die Menschen bei einem Umzug besonders?", en: "What annoys people most about a move?", ar: "إيه أكتر حاجة بتضايق الناس في العزال؟" },
                        { speaker: "KI", text: "Das Einpacken, das Auspacken und das Abbauen der Möbel. Die ganze Organisation nervt am meisten.", en: "Packing, unpacking, and dismantling furniture. The whole organization is the most annoying.", ar: "تعبئة الكراتين، وتفريغها، وفك العفش. الترتيبات دي كلها هي أكتر حاجة بتضايق." },
                        { speaker: "Interviewer", text: "Ja, und dass man nach dem Umzug nichts mehr findet!", en: "Yes, and that you can't find anything after the move!", ar: "أيوة، وإن الواحد مبيلاقيش حاجة بعد العزال!" },
                        { speaker: "KI", text: "Genau! Es ist stressig, dass man alle Möbel wieder aufbauen muss.", en: "Exactly! It is stressful that you have to reassemble all the furniture.", ar: "بالظبط! مجهد جداً إنك لازم تركب العفش كله تاني." }
                    ]
                }
            ],
            culture: [
                {
                    id: 'c1', title: "Fotos im Urlaub (الصور في الإجازة)",
                    lines: [
                        { g: "Durch Fotos werden schöne Erlebnisse noch schöner – das haben amerikanische Wissenschaftler jetzt herausgefunden.", e: "Photos make beautiful experiences even more beautiful – American scientists have now discovered this.", a: "الصور بتخلي التجارب الحلوة أحلى كمان - ده اللي اكتشفه علماء أمريكان دلوقتي." },
                        { g: "Bei dem Experiment haben mehr als 2.000 Probanden an einer Stadtrundfahrt teilgenommen, ein Museum besucht und in einer Markthalle zu Mittag gegessen.", e: "In the experiment, more than 2,000 test subjects took part in a city tour, visited a museum, and had lunch in a market hall.", a: "في التجربة دي، أكتر من 2000 شخص شاركوا في جولة بالمدينة، زاروا متحف واتغدوا في صالة سوق." },
                        { g: "Die Hälfte der Teilnehmer durfte fotografieren, die andere Hälfte nicht.", e: "Half of the participants were allowed to take photos, the other half were not.", a: "نص المشاركين كان مسموح لهم يصوروا، والنص التاني لأ." },
                        { g: "Danach beschrieben die Teilnehmer ihre Erlebnisse in einem Fragebogen.", e: "Afterwards, the participants described their experiences in a questionnaire.", a: "بعدين، المشاركين وصفوا تجربتهم في استبيان." },
                        { g: "Die Ergebnisse haben selbst die Wissenschaftler überrascht: Die Teilnehmer mit dem Fotoapparat hatten mehr Spaß und erlebten ihre Aktivitäten intensiver.", e: "The results surprised even the scientists themselves: The participants with the camera had more fun and experienced their activities more intensely.", a: "النتائج فاجأت العلماء نفسهم: المشاركين اللي معاهم كاميرا استمتعوا أكتر وعاشوا التجربة بشكل أعمق." },
                        { g: "Selbst im Museum betrachteten „die Fotografen“ die Objekte länger.", e: "Even in the museum, 'the photographers' looked at the objects longer.", a: "حتى في المتحف، 'المصورين' بصوا على المعروضات لفترة أطول." },
                        { g: "Dieser positive Effekt hielt außerdem eine ganze Woche an.", e: "This positive effect also lasted for a whole week.", a: "والتأثير الإيجابي ده استمر كمان لمدة أسبوع كامل." },
                        { g: "Interessant ist auch ein weiteres Studienergebnis: Wenn man bereits während der Reise mit dem Betrachten und dem Löschen der Fotos beginnt, verringert sich der positive Effekt.", e: "Another study result is also interesting: If one already begins looking at and deleting the photos during the trip, the positive effect is reduced.", a: "ونتيجة دراسة تانية مثيرة للاهتمام: لو الواحد بدأ يتفرج ويمسح الصور وهو لسة في الرحلة، التأثير الإيجابي ده بيقل." }
                    ]
                },
                {
                    id: 'c2', title: "Städte-Porträts: Erfurt",
                    lines: [
                        { g: "Die Stadt <strong>Erfurt</strong> hat 210.000 Einwohner und liegt im Bundesland Thüringen in der Mitte von Deutschland.", e: "The city of Erfurt has 210,000 inhabitants and is located in the federal state of Thuringia in the middle of Germany.", a: "مدينة إرفورت بها 210 ألف نسمة وتقع في ولاية تورينجن في وسط ألمانيا." },
                        { g: "Die ersten schriftlichen Dokumente stammen aus dem Jahr 742. Bereits im 13. Jahrhundert war die Stadt ein bedeutendes Bildungszentrum.", e: "The first written documents date from the year 742. Already in the 13th century, the city was an important center of education.", a: "أول وثائق مكتوبة بترجع لسنة 742. وفي القرن الـ 13 كانت المدينة مركز تعليمي مهم." },
                        { g: "Im Jahre 1379 wurde die Universität Erfurt gegründet. Nach dem Gründungsdatum ist sie die älteste Universität in Deutschland.", e: "In the year 1379, the University of Erfurt was founded. According to the founding date, it is the oldest university in Germany.", a: "سنة 1379 تأسست جامعة إرفورت. وبناءً على تاريخ التأسيس هي أقدم جامعة في ألمانيا." },
                        { g: "Ihr bekanntester Student war der Reformator Martin Luther, der hier von 1501 bis 1505 studierte.", e: "Its most famous student was the reformer Martin Luther, who studied here from 1501 to 1505.", a: "أشهر طالب فيها كان المُصلح مارتن لوثر، اللي درس هنا من 1501 لـ 1505." },
                        { g: "Das Zentrum von Erfurt ist die Altstadt. Man kann dort über 20 gotische Kirchen und viele alte Fachwerk- und Handelshäuser sehen.", e: "The center of Erfurt is the old town. One can see over 20 Gothic churches and many old half-timbered and trading houses there.", a: "مركز إرفورت هو المدينة القديمة. الواحد ممكن يشوف هناك أكتر من 20 كنيسة قوطية وبيوت تجارية وخشبية قديمة." },
                        { g: "Ein Wahrzeichen der Stadt ist die Krämerbrücke, die bereits 1117 gebaut wurde. Auf der 120 Meter langen Brücke stehen 32 Häuser.", e: "A landmark of the city is the Krämerbrücke, which was built back in 1117. On the 120-meter-long bridge, there are 32 houses.", a: "من رموز المدينة جسر كريمر، اللي اتبنى سنة 1117. على الجسر اللي طوله 120 متر فيه 32 بيت." },
                        { g: "Besucher können dort Kunst, Keramik, Glas, Schmuck oder Weine aus der Gegend kaufen.", e: "Visitors can buy art, ceramics, glass, jewelry, or wines from the region there.", a: "الزوار ممكن يشتروا من هناك فن، سيراميك، زجاج، مجوهرات أو نبيذ من المنطقة." }
                    ]
                },
                {
                    id: 'c3', title: "Städte-Porträts: Basel",
                    lines: [
                        { g: "Die Stadt <strong>Basel</strong> hat 175.000 Einwohner und liegt im Nordwesten der Schweiz, im Dreiländereck Deutschland–Frankreich–Schweiz.", e: "The city of Basel has 175,000 inhabitants and is located in the northwest of Switzerland, in the border triangle of Germany–France–Switzerland.", a: "مدينة بازل بها 175 ألف نسمة وتقع في شمال غرب سويسرا، في نقطة التقاء ألمانيا وفرنسا وسويسرا." },
                        { g: "Basel kann auf eine mehr als 1600-jährige Geschichte zurückblicken.", e: "Basel can look back on a history of more than 1600 years.", a: "بازل ليها تاريخ بيرجع لأكتر من 1600 سنة." },
                        { g: "Wichtig für die Entwicklung der Stadt war die Gründung der Universität im Jahre 1460. Dadurch kamen viele Gelehrte nach Basel.", e: "Important for the development of the city was the founding of the university in the year 1460. As a result, many scholars came to Basel.", a: "المهم لتطور المدينة كان تأسيس الجامعة سنة 1460. وبسبب ده علماء كتير جم لبازل." },
                        { g: "Im 16. Jahrhundert lebte und arbeitete der berühmte niederländische Humanist Erasmus von Rotterdam in Basel.", e: "In the 16th century, the famous Dutch humanist Erasmus of Rotterdam lived and worked in Basel.", a: "في القرن الـ 16 عاش واشتغل الإنساني الهولندي المشهور إيراسموس في بازل." },
                        { g: "Nach seinem Tod 1536 wurde er im Basler Münster beigesetzt, das sich in der Altstadt befindet und ein Wahrzeichen der Stadt ist.", e: "After his death in 1536, he was buried in the Basel Minster, which is located in the old town and is a landmark of the city.", a: "بعد وفاته سنة 1536 اتدفن في كاتدرائية بازل اللي موجودة في المدينة القديمة وبتعتبر رمز للمدينة." },
                        { g: "Durch Veranstaltungen wie die Kunstmesse Art Basel ist die Stadt heute zu einer internationalen Kunstmetropole geworden.", e: "Through events like the Art Basel art fair, the city has become an international art metropolis today.", a: "بسبب فعاليات زي معرض آرت بازل، المدينة بقت النهاردة عاصمة عالمية للفن." },
                        { g: "Außerdem gilt Basel als wichtiger Standort der chemischen und pharmazeutischen Industrie.", e: "Furthermore, Basel is considered an important location for the chemical and pharmaceutical industry.", a: "بالإضافة لده، بازل بتعتبر موقع مهم للصناعات الكيماوية والدوائية." }
                    ]
                },
                {
                    id: 'c4', title: "Städte-Porträts: Graz",
                    lines: [
                        { g: "Die Stadt <strong>Graz</strong> liegt im Bundesland Steiermark in Österreich.", e: "The city of Graz is located in the federal state of Styria in Austria.", a: "مدينة جراتس تقع في ولاية شتايرمارك في النمسا." },
                        { g: "Von den 280.000 Einwohnern in Graz sind 45.000 Studenten, das sind ungefähr 16 Prozent der Bevölkerung.", e: "Of the 280,000 inhabitants in Graz, 45,000 are students, which is approximately 16 percent of the population.", a: "من الـ 280 ألف ساكن في جراتس فيه 45 ألف طالب، وده حوالي 16% من السكان." },
                        { g: "Der Name Graz leitet sich vom slawischen Wort gradec (kleine Burg) ab.", e: "The name Graz is derived from the Slavic word gradec (small castle).", a: "اسم جراتس مشتق من الكلمة السلافية gradec (قلعة صغيرة)." },
                        { g: "Besonders sehenswert ist die Grazer Altstadt, die seit 1999 zum UNESCO-Weltkulturerbe zählt. Hier befinden sich auch die meisten Sehenswürdigkeiten.", e: "The Graz Old Town, which has been a UNESCO World Cultural Heritage site since 1999, is particularly worth seeing. Most of the sights are also located here.", a: "المدينة القديمة في جراتس تستحق الزيارة بشكل خاص، وهي من التراث العالمي لليونسكو من سنة 1999. وفيها كمان معظم المعالم السياحية." },
                        { g: "Wenn man mit einem Lift auf den Schlossberg fährt, hat man einen fantastischen Ausblick über die Altstadt.", e: "When you take a lift up the Schlossberg, you have a fantastic view over the Old Town.", a: "لو طلعت بالأسانسير لجبل القلعة، هتشوف منظر رائع للمدينة القديمة." },
                        { g: "Die Auszeichnung UNESCO-Weltkulturerbe verpflichtet die Stadt, das Erbe zu erhalten und neue Architektur harmonisch einzufügen.", e: "The UNESCO World Cultural Heritage award obligates the city to preserve the heritage and to integrate new architecture harmoniously.", a: "جائزة اليونسكو بتلزم المدينة تحافظ على التراث وتدمج العمارة الجديدة بشكل متناسق." },
                        { g: "Ein gutes Beispiel für moderne Architektur ist das Kunsthaus Graz. Das Gebäude aus Stahl und Glas passt perfekt in die traditionelle Stadtstruktur.", e: "A good example of modern architecture is the Kunsthaus Graz. The building, made of steel and glass, fits perfectly into the traditional city structure.", a: "مثال جيد للعمارة الحديثة هو متحف الفن. المبنى المصنوع من الصلب والزجاج متناسق جداً مع شكل المدينة التقليدي." }
                    ]
                },
                {
                    id: 'c5', title: "Präsentation: Alexandria (الإسكندرية)",
                    lines: [
                        { g: "Alexandria hat über 5 Millionen Einwohner. Die Stadt liegt im Norden von Ägypten, direkt am Mittelmeer.", e: "Alexandria has over 5 million inhabitants. The city is located in the north of Egypt, directly on the Mediterranean Sea.", a: "الإسكندرية بها أكثر من 5 مليون نسمة. المدينة تقع في شمال مصر، مباشرة على البحر المتوسط." },
                        { g: "Sie wurde 331 v. Chr. von Alexander dem Großen gegründet.", e: "It was founded in 331 BC by Alexander the Great.", a: "تأسست عام 331 قبل الميلاد على يد الإسكندر الأكبر." },
                        { g: "Wichtig für die Entwicklung der Stadt war die antike Bibliothek, die größte der antiken Welt.", e: "Important for the development of the city was the ancient library, the largest in the ancient world.", a: "من المهم لتطور المدينة كانت المكتبة القديمة، الأكبر في العالم القديم." },
                        { g: "Besonders sehenswert ist die moderne Bibliotheca Alexandrina. Ein Wahrzeichen der Stadt ist die Qaitbay-Zitadelle.", e: "Especially worth seeing is the modern Bibliotheca Alexandrina. A landmark of the city is the Qaitbay Citadel.", a: "مكتبة الإسكندرية الحديثة تستحق الزيارة بشكل خاص. وقلعة قايتباي هي رمز للمدينة." },
                        { g: "Heute gilt Alexandria als wichtigstes Industriezentrum und als beliebtes Sommer-Reiseziel für Ägypter.", e: "Today, Alexandria is considered the most important industrial center and a popular summer travel destination for Egyptians.", a: "اليوم تُعتبر الإسكندرية أهم مركز صناعي ووجهة سفر صيفية مفضلة للمصريين." }
                    ]
                },
                {
                    id: 'c6', title: "Nachbarschaft in Deutschland (الجيرة في ألمانيا)",
                    lines: [
                        { g: "Jeder fünfte Deutsche lebt heute in einem Single-Haushalt, Tendenz steigend.", e: "Every fifth German lives in a single-person household today, tendency rising.", a: "كل ألماني خامس عايش لوحده في بيت دلوقتي، والنسبة بتزيد." },
                        { g: "In Großstädten wie Berlin wohnt fast jeder Dritte allein.", e: "In large cities like Berlin, almost every third person lives alone.", a: "في المدن الكبيرة زي برلين، تقريباً واحد من كل تلاتة عايش لوحده." },
                        { g: "Etwa 80 Prozent der Deutschen kennen ihre Nachbarn.", e: "About 80 percent of Germans know their neighbors.", a: "حوالي 80% من الألمان يعرفوا جيرانهم." },
                        { g: "Wenn man einer neuen Studie glauben darf, hat sich das Verhältnis zwischen den Nachbarn in den letzten Jahrzehnten verbessert.", e: "If one can believe a new study, the relationship between neighbors has improved in recent decades.", a: "لو صدقنا دراسة جديدة، فالعلاقة بين الجيران اتحسنت في العقود الأخيرة." },
                        { g: "Das Meinungsforschungsinstitut Allensbach untersucht seit Jahrzehnten, welche Bedeutung Nachbarn haben.", e: "The Allensbach opinion research institute has been studying for decades what significance neighbors have.", a: "معهد أبحاث الرأي ألينسباخ بيدرس بقاله عقود أهمية الجيران." },
                        { g: "1953 haben nur 22 Prozent ihren Nachbarn Gegenstände geliehen, heute sind es schon 51 Prozent.", e: "In 1953, only 22 percent lent items to their neighbors; today it is already 51 percent.", a: "سنة 1953 كان 22% بس بيسلفوا حاجات لجيرانهم، النهاردة بقوا 51%." },
                        { g: "43 Prozent der Deutschen haben ihre Nachbarn schon einmal eingeladen, z. B. zum Kaffeetrinken oder zu einer Party, früher waren das nur 13 Prozent.", e: "43 percent of Germans have invited their neighbors over at least once, e.g., for coffee or to a party; in the past, that was only 13 percent.", a: "43% من الألمان عزموا جيرانهم قبل كده، مثلاً على شرب قهوة أو حفلة، زمان كانوا 13% بس." },
                        { g: "In den 1950er-Jahren half nur jeder Fünfte dem Nachbarn beim Einkaufen, jetzt macht das jeder Dritte.", e: "In the 1950s, only every fifth person helped their neighbor with shopping; now every third person does.", a: "في الخمسينات واحد بس من كل خمسة كان بيساعد جاره في التسوق، دلوقتي واحد من كل تلاتة بيعمل ده." },
                        { g: "Auch bei der Kinderbetreuung ist die Hilfsbereitschaft gestiegen.", e: "The willingness to help has also increased in childcare.", a: "الاستعداد للمساعدة زاد كمان في رعاية الأطفال." },
                        { g: "In meinem Heimatland Ägypten ist eine gute Nachbarschaft extrem wichtig. Es ist ein sehr starker sozialer Wert.", e: "In my home country, Egypt, a good neighborhood is extremely important. It is a very strong social value.", a: "في بلدي مصر، الجيرة الكويسة مهمة جداً. هي قيمة اجتماعية قوية جداً." }
                    ]
                }
            ],
            letters: [
                {
                    id: 'l1', title: "Postkarte aus dem Urlaub (كارت بوستال)",
                    lines: [
                        { g: "Liebe Anna,", e: "Dear Anna,", a: "عزيزتي آنا،" },
                        { g: "viele sonnige Grüße aus Zürich! Die Stadt ist wunderschön. Ich habe schon so viel gemacht.", e: "Many sunny greetings from Zurich! The city is beautiful. I have already done so much.", a: "تحياتي المشمسة من زيورخ! المدينة جميلة جداً. أنا عملت حاجات كتير أوي." },
                        { g: "Gestern habe ich eine Stadtrundfahrt gemacht und viele Sehenswürdigkeiten besichtigt.", e: "Yesterday I took a city tour and visited many sights.", a: "إمبارح عملت جولة في المدينة وزرت معالم سياحية كتير." },
                        { g: "Ich habe auch ein Museum besucht, das war sehr interessant.", e: "I also visited a museum, which was very interesting.", a: "وزرت كمان متحف، ده كان ممتع جداً." },
                        { g: "Am Abend bin ich durch die Altstadt gelaufen und habe in einem tollen Restaurant lokale Gerichte gegessen.", e: "In the evening, I walked through the old town and ate local dishes in a great restaurant.", a: "بالليل اتمشيت في المدينة القديمة وأكلت أطباق محلية في مطعم رائع." },
                        { g: "Ich habe auch viele Fotos gemacht! Bis bald,", e: "I also took many photos! See you soon,", a: "وأخدت كمان صور كتير! أشوفك قريب،" },
