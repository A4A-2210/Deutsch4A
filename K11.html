    <script type="text/babel">
        // --- HELPERS FOR AUDIO & SPEECH ---
        const playAudio = (text, e) => {
            if (e) e.stopPropagation();
            const cleanText = text.replace(/<[^>]+>/g, '');
            const utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.lang = 'de-DE';
            window.speechSynthesis.speak(utterance);
        };

        const SpeechTester = ({ targetText }) => {
            const [status, setStatus] = React.useState('idle'); 
            const [heard, setHeard] = React.useState('');

            const listen = (e) => {
                if (e) e.stopPropagation();
                if (!('webkitSpeechRecognition' in window)) {
                    alert('المتصفح ده مش بيدعم تسجيل الصوت، جرب Google Chrome.');
                    return;
                }
                const recognition = new webkitSpeechRecognition();
                recognition.lang = 'de-DE';
                recognition.interimResults = false;
                
                recognition.onstart = () => setStatus('listening');
                recognition.onresult = (event) => {
                    const speechResult = event.results[0][0].transcript;
                    setHeard(speechResult);
                    
                    const clean = (str) => str.replace(/<[^>]+>/g, '').toLowerCase().replace(/[.,!?]/g, '').trim();
                    const targetClean = clean(targetText);
                    const heardClean = clean(speechResult);
                    
                    if (heardClean.includes(targetClean) || targetClean.includes(heardClean) || heardClean === targetClean) {
                        setStatus('success');
                    } else {
                        setStatus('fail');
                    }
                };
                recognition.onerror = () => setStatus('fail');
                recognition.onend = () => { if(status === 'listening') setStatus('idle'); };
                recognition.start();
            };

            return (
                <div className="inline-flex items-center gap-2" onClick={(e) => e.stopPropagation()}>
                    <button onClick={listen} title="جرب تنطقها" className={`p-2 rounded-full transition-all duration-300 shadow-sm ${status === 'listening' ? 'bg-red-500 text-white animate-pulse scale-110' : 'bg-slate-100 text-slate-600 hover:bg-slate-200 hover:scale-105'}`}>
                        <i data-lucide="mic" className="w-4 h-4"></i>
                    </button>
                    {status === 'success' && <span className="text-emerald-500 text-xs font-bold ar-text animate-bounce">✅ ممتاز!</span>}
                    {status === 'fail' && <span className="text-red-500 text-xs ar-text font-bold" title={`سمعت: ${heard}`}>❌ جرب تاني</span>}
                </div>
            );
        };

                    { id: 'w31', ger: "der Richter", eng: "Judge", ar: "القاضي", s: [{ g: "Der <strong>Richter</strong> spricht das Urteil.", e: "The judge pronounces the verdict.", a: "القاضي بينطق بالحكم." }, { g: "Der <strong>Richter</strong> stellte dem Zeugen Fragen.", e: "The judge asked the witness questions.", a: "القاضي سأل الشاهد أسئلة." }, { g: "Er ist als strenger <strong>Richter</strong> bekannt.", e: "He is known as a strict judge.", a: "هو معروف كقاضي صارم." }] },
                    { id: 'w32', ger: "der Anwalt", eng: "Lawyer", ar: "المحامي", s: [{ g: "Ich brauche sofort einen <strong>Anwalt</strong>.", e: "I need a lawyer immediately.", a: "أنا محتاج محامي فوراً." }, { g: "Sein <strong>Anwalt</strong> riet ihm zu schweigen.", e: "His lawyer advised him to remain silent.", a: "محاميه نصحه بالصمت." }, { g: "Die <strong>Anwältin</strong> plädiert auf Freispruch.", e: "The lawyer pleads for acquittal.", a: "المحامية بتترافع بطلب البراءة." }] },
                    { id: 'w33', ger: "der Zeuge", eng: "Witness", ar: "الشاهد", s: [{ g: "Der <strong>Zeuge</strong> hat alles gesehen.", e: "The witness saw everything.", a: "الشاهد شاف كل حاجة." }, { g: "Die Polizei sucht dringend <strong>Zeugen</strong>.", e: "The police are urgently looking for witnesses.", a: "الشرطة بتدور على شهود بشكل عاجل." }, { g: "Die <strong>Zeugin</strong> der Anklage war sehr nervös.", e: "The witness for the prosecution was very nervous.", a: "شاهدة الإثبات كانت متوترة جداً." }] },
                    { id: 'w34', ger: "die Aussage", eng: "Testimony / Statement", ar: "الإفادة (الشهادة)", s: [{ g: "Ihre <strong>Aussage</strong> ist sehr wichtig.", e: "Your statement is very important.", a: "شهادتك أو إفادتك دي مهمة جداً." }, { g: "Der Verdächtige verweigerte die <strong>Aussage</strong>.", e: "The suspect refused to testify.", a: "المشتبه به رفض الإدلاء بأقواله." }, { g: "Er machte eine falsche <strong>Aussage</strong> bei der Polizei.", e: "He made a false statement to the police.", a: "هو أدلى بإفادة كاذبة للشرطة." }] },
                    { id: 'w35', ger: "das Gesetz", eng: "Law", ar: "القانون", s: [{ g: "Man muss sich an das <strong>Gesetz</strong> halten.", e: "One must abide by the law.", a: "لازم الواحد يلتزم بالقانون." }, { g: "Das ist streng gegen das <strong>Gesetz</strong>.", e: "That is strictly against the law.", a: "ده ضد القانون تماماً." }, { g: "Das Parlament hat ein neues <strong>Gesetz</strong> beschlossen.", e: "The parliament passed a new law.", a: "البرلمان أقر قانون جديد." }] },
                    { id: 'w36', ger: "die Strafe", eng: "Punishment / Penalty", ar: "العقوبة", s: [{ g: "Er hat eine harte <strong>Strafe</strong> bekommen.", e: "He received a harsh punishment.", a: "هو أخد عقوبة قاسية." }, { g: "Die <strong>Strafe</strong> muss gerecht sein.", e: "The punishment must be just.", a: "العقوبة لازم تكون عادلة." }, { g: "Falschparken kostet eine kleine <strong>Strafe</strong>.", e: "Illegal parking costs a small penalty.", a: "الركنة الغلط بتكلف غرامة (عقوبة) بسيطة." }] },
                    { id: 'w37', ger: "die Gefängnisstrafe", eng: "Prison sentence", ar: "عقوبة السجن", s: [{ g: "Er wurde zu einer <strong>Gefängnisstrafe</strong> verurteilt.", e: "He was sentenced to a prison term.", a: "اتحكم عليه بعقوبة السجن." }, { g: "Ihm droht eine lange <strong>Gefängnisstrafe</strong>.", e: "He faces a long prison sentence.", a: "هو مهدد بعقوبة سجن طويلة." }, { g: "Sie hat ihre <strong>Gefängnisstrafe</strong> abgesessen.", e: "She served her prison sentence.", a: "هي قضت فترة عقوبتها في السجن." }] },
                    { id: 'w38', ger: "das Gefängnis", eng: "Prison", ar: "السجن", s: [{ g: "Der Täter muss ins <strong>Gefängnis</strong>.", e: "The perpetrator must go to prison.", a: "الجاني لازم يدخل السجن." }, { g: "Der Ausbruch aus dem <strong>Gefängnis</strong> scheiterte.", e: "The escape from prison failed.", a: "الهروب من السجن فشل." }, { g: "Das Leben im <strong>Gefängnis</strong> ist hart.", e: "Life in prison is hard.", a: "الحياة في السجن صعبة." }] }
                ],
                medien: [
                    { id: 'w39', ger: "der Krimi", eng: "Crime thriller / Crime novel", ar: "الرواية أو الفيلم البوليسي", s: [{ g: "Ich lese abends gern einen <strong>Krimi</strong>.", e: "I like reading a crime thriller in the evening.", a: "بحب أقرأ رواية بوليسية بالليل." }, { g: "Der Tatort ist ein bekannter deutscher <strong>Krimi</strong>.", e: "'Tatort' is a well-known German crime thriller.", a: "برنامج 'Tatort' ده فيلم بوليسي ألماني مشهور." }, { g: "Schwedische <strong>Krimis</strong> sind weltweit beliebt.", e: "Swedish crime novels are popular worldwide.", a: "الروايات البوليسية السويدية محبوبة عالمياً." }] },
                    { id: 'w40', ger: "die Serie", eng: "Series", ar: "المسلسل", s: [{ g: "Diese <strong>Serie</strong> ist sehr beliebt.", e: "This series is very popular.", a: "المسلسل ده مشهور جداً." }, { g: "Ich schaue eine neue Netflix-<strong>Serie</strong>.", e: "I am watching a new Netflix series.", a: "بتفرج على مسلسل نتفليكس جديد." }, { g: "Wir haben die ganze <strong>Serie</strong> am Wochenende gesehen.", e: "We watched the whole series on the weekend.", a: "اتفرجنا على المسلسل كله في الويك إند." }] },
                    { id: 'w41', ger: "die Folge", eng: "Episode", ar: "الحلقة", s: [{ g: "Hast du die letzte <strong>Folge</strong> gesehen?", e: "Did you see the last episode?", a: "شفت الحلقة الأخيرة؟" }, { g: "Die nächste <strong>Folge</strong> kommt am Montag.", e: "The next episode comes on Monday.", a: "الحلقة الجاية هتنزل يوم الإثنين." }, { g: "Ich habe zwei <strong>Folgen</strong> verpasst.", e: "I missed two episodes.", a: "فاتني حلقتين." }] },
                    { id: 'w42', ger: "der Zuschauer", eng: "Viewer / Spectator", ar: "المشاهد", s: [{ g: "Millionen <strong>Zuschauer</strong> sahen den Film.", e: "Millions of viewers watched the film.", a: "ملايين المشاهدين اتفرجوا على الفيلم." }, { g: "Die Serie begeistert die <strong>Zuschauer</strong>.", e: "The series thrills the viewers.", a: "المسلسل بيبهر المشاهدين." }, { g: "Die <strong>Zuschauer</strong> konnten per SMS abstimmen.", e: "The viewers could vote via SMS.", a: "المشاهدين قدروا يصوتوا برسائل الـ SMS." }] },
                    { id: 'w43', ger: "das Drehbuch", eng: "Screenplay / Script", ar: "السيناريو", s: [{ g: "Das <strong>Drehbuch</strong> für den Krimi ist toll.", e: "The script for the crime thriller is great.", a: "السيناريو بتاع الفيلم البوليسي رائع." }, { g: "Er schreibt das <strong>Drehbuch</strong> um.", e: "He is rewriting the script.", a: "هو بيعيد كتابة السيناريو." }, { g: "Der Film gewann einen Preis für das beste <strong>Drehbuch</strong>.", e: "The film won an award for best screenplay.", a: "الفيلم كسب جايزة أحسن سيناريو." }] },
                    { id: 'w44', ger: "der Regisseur", eng: "Director", ar: "المخرج", s: [{ g: "Der <strong>Regisseur</strong> gibt die Anweisungen.", e: "The director gives the instructions.", a: "المخرج بيدي التعليمات." }, { g: "Tarantino ist ein berühmter <strong>Regisseur</strong>.", e: "Tarantino is a famous director.", a: "تارانتينو مخرج مشهور." }, { g: "Die Schauspielerin stritt mit dem <strong>Regisseur</strong>.", e: "The actress argued with the director.", a: "الممثلة اتخانقت مع المخرج." }] },
                    { id: 'w45', ger: "die Spannung", eng: "Suspense / Tension", ar: "التشويق / التوتر", s: [{ g: "Die <strong>Spannung</strong> im Film steigt.", e: "The suspense in the film is rising.", a: "التشويق في الفيلم بيزيد." }, { g: "Der Autor baut die <strong>Spannung</strong> langsam auf.", e: "The author builds the suspense slowly.", a: "الكاتب بيبني التشويق ببطء." }, { g: "Die <strong>Spannung</strong> war fast unerträglich.", e: "The tension was almost unbearable.", a: "التوتر كان تقريباً لا يحتمل." }] },
                    { id: 'w46', ger: "der Erfolg", eng: "Success", ar: "النجاح", s: [{ g: "Der Krimi war ein großer <strong>Erfolg</strong>.", e: "The crime thriller was a great success.", a: "الفيلم البوليسي حقق نجاح كبير." }, { g: "Wir feiern den <strong>Erfolg</strong> unseres Teams.", e: "We celebrate the success of our team.", a: "إحنا بنحتفل بنجاح فريقنا." }, { g: "Ohne Fleiß gibt es keinen <strong>Erfolg</strong>.", e: "Without diligence there is no success.", a: "من غير اجتهاد مفيش نجاح." }] }
                ],
                adjektive: [
                    { id: 'a1', ger: "spannend", eng: "exciting / thrilling", ar: "مُشوق", s: [{ g: "Das Buch ist unglaublich <strong>spannend</strong>.", e: "The book is incredibly thrilling.", a: "الكتاب مشوق بشكل لا يصدق." }, { g: "Das war ein sehr <strong>spannendes</strong> Fußballspiel.", e: "That was a very exciting football game.", a: "ده كان ماتش كورة مشوق جداً." }, { g: "Die Geschichte bleibt bis zum Ende <strong>spannend</strong>.", e: "The story remains exciting until the end.", a: "القصة بتفضل مشوقة لحد النهاية." }] },
                    { id: 'a2', ger: "langweilig", eng: "boring", ar: "ممل", s: [{ g: "Der Film war leider sehr <strong>langweilig</strong>.", e: "Unfortunately, the film was very boring.", a: "للأسف الفيلم كان ممل جداً." }, { g: "Mir ist heute furchtbar <strong>langweilig</strong>.", e: "I am terribly bored today.", a: "أنا حاسس بملل فظيع النهاردة." }, { g: "Der Vortrag war trocken und <strong>langweilig</strong>.", e: "The lecture was dry and boring.", a: "المحاضرة كانت جافة ومملة." }] },
                    { id: 'a3', ger: "grausam", eng: "cruel / gruesome", ar: "قاسٍ / بشع", s: [{ g: "Es war eine <strong>grausame</strong> Tat.", e: "It was a gruesome act.", a: "دي كانت جريمة بشعة." }, { g: "Der Diktator war ein <strong>grausamer</strong> Herrscher.", e: "The dictator was a cruel ruler.", a: "الديكتاتور كان حاكم قاسي." }, { g: "Die Bilder aus dem Krieg sind <strong>grausam</strong>.", e: "The pictures from the war are gruesome.", a: "الصور اللي من الحرب بشعة." }] },
                    { id: 'a4', ger: "blutig", eng: "bloody", ar: "دموي", s: [{ g: "Der Krimi war mir zu <strong>blutig</strong>.", e: "The crime thriller was too bloody for me.", a: "الفيلم كان دموي بزيادة بالنسبة لي." }, { g: "Er hatte eine <strong>blutige</strong> Nase nach dem Kampf.", e: "He had a bloody nose after the fight.", a: "مناخيره كانت بتجيب دم بعد الخناقة." }, { g: "Das Schwert war noch <strong>blutig</strong>.", e: "The sword was still bloody.", a: "السيف كان لسة عليه دم." }] },
                    { id: 'a5', ger: "kriminell", eng: "criminal", ar: "إجرامي", s: [{ g: "Er hat eine <strong>kriminelle</strong> Vergangenheit.", e: "He has a criminal past.", a: "هو عنده ماضي إجرامي." }, { g: "Die Bande nutzte <strong>kriminelle</strong> Methoden.", e: "The gang used criminal methods.", a: "العصابة استخدمت طرق إجرامية." }, { g: "Es ist <strong>kriminell</strong>, wie viel das kostet! (umgangssprachlich)", e: "It's criminal how much that costs!", a: "حرام (إجرام) السعر ده كله! (تعبير دارج)." }] },
                    { id: 'a6', ger: "gesetzlich", eng: "legal / statutory", ar: "قانوني", s: [{ g: "Das ist <strong>gesetzlich</strong> verboten.", e: "That is legally forbidden.", a: "ده ممنوع قانوناً." }, { g: "Ich habe einen <strong>gesetzlichen</strong> Anspruch darauf.", e: "I have a statutory claim to it.", a: "أنا ليا حق قانوني في ده." }, { g: "Die <strong>gesetzliche</strong> Krankenversicherung zahlt das.", e: "Statutory health insurance pays for that.", a: "التأمين الصحي الحكومي (القانوني) بيدفع ده." }] },
                    { id: 'a7', ger: "schuldig", eng: "guilty", ar: "مُذنب", s: [{ g: "Das Gericht fand ihn <strong>schuldig</strong>.", e: "The court found him guilty.", a: "المحكمة لاقته مُذنب." }, { g: "Er fühlte sich <strong>schuldig</strong> am Unfall.", e: "He felt guilty for the accident.", a: "هو حاس بالذنب عشان الحادثة." }, { g: "Sie hat ein <strong>schuldiges</strong> Gewissen.", e: "She has a guilty conscience.", a: "هي عندها تأنيب ضمير." }] },
                    { id: 'a8', ger: "unschuldig", eng: "innocent", ar: "بريء", s: [{ g: "Ich bin <strong>unschuldig</strong>!", e: "I am innocent!", a: "أنا بريء!" }, { g: "Das Baby schlief mit einem <strong>unschuldigen</strong> Gesicht.", e: "The baby slept with an innocent face.", a: "البيبي نام بوش بريء." }, { g: "Er saß zehn Jahre <strong>unschuldig</strong> im Gefängnis.", e: "He sat in prison innocent for ten years.", a: "هو قعد ١٠ سنين في السجن وهو بريء." }] },
                    { id: 'a9', ger: "verdächtig", eng: "suspicious", ar: "مشبوه / مثير للريبة", s: [{ g: "Der Mann verhält sich sehr <strong>verdächtig</strong>.", e: "The man is behaving very suspiciously.", a: "الراجل ده بيتصرف بشكل مشبوه جداً." }, { g: "Das Paket sah <strong>verdächtig</strong> aus.", e: "The package looked suspicious.", a: "الطرد كان شكله مريب." }, { g: "Es war <strong>verdächtig</strong> still im Haus.", e: "It was suspiciously quiet in the house.", a: "البيت كان هادي بشكل يثير الشك." }] },
                    { id: 'a10', ger: "geheim", eng: "secret", ar: "سري", s: [{ g: "Die Dokumente sind streng <strong>geheim</strong>.", e: "The documents are top secret.", a: "الوثائق دي سرية للغاية." }, { g: "Wir trafen uns an einem <strong>geheimen</strong> Ort.", e: "We met at a secret place.", a: "اتقابلنا في مكان سري." }, { g: "Das Rezept ist <strong>geheim</strong>.", e: "The recipe is secret.", a: "الوصفة دي سرية." }] },
                    { id: 'a11', ger: "mysteriös", eng: "mysterious", ar: "غامض", s: [{ g: "Ein <strong>mysteriöser</strong> Anruf weckte ihn.", e: "A mysterious call woke him up.", a: "مكالمة غامضة صحته من النوم." }, { g: "Das Verschwinden des Flugzeugs bleibt <strong>mysteriös</strong>.", e: "The disappearance of the plane remains mysterious.", a: "اختفاء الطيارة لسة غامض." }, { g: "Eine <strong>mysteriöse</strong> Frau betrat den Raum.", e: "A mysterious woman entered the room.", a: "واحدة ست غامضة دخلت الأوضة." }] },
                    { id: 'a12', ger: "lebenslänglich", eng: "lifelong (life sentence)", ar: "مدى الحياة (كحكم مؤبد)", s: [{ g: "Er bekam eine <strong>lebenslängliche</strong> Strafe.", e: "He received a life sentence.", a: "أخد حكم مؤبد (مدى الحياة)." }, { g: "Der Täter muss <strong>lebenslänglich</strong> ins Gefängnis.", e: "The perpetrator must go to prison for life.", a: "الجاني لازم يدخل السجن مدى الحياة." }, { g: "Ein Vertrag mit <strong>lebenslänglicher</strong> Garantie.", e: "A contract with a lifetime warranty.", a: "عقد بضمان مدى الحياة." }] },
                    { id: 'a13', ger: "tatsächlich", eng: "actual / in fact", ar: "في الواقع / فعلياً", s: [{ g: "War er <strong>tatsächlich</strong> am Tatort?", e: "Was he actually at the crime scene?", a: "هل هو فعلاً كان في مسرح الجريمة؟" }, { g: "Das ist <strong>tatsächlich</strong> wahr!", e: "That is actually true!", a: "ده حقيقي فعلاً!" }, { g: "Sie hat es <strong>tatsächlich</strong> geschafft.", e: "She actually managed to do it.", a: "هي قدرت فعلاً تعملها." }] }
                ]
            },
            verbs: [
                { id: 'v1', ger: "ermitteln", eng: "to investigate", ar: "يُحقق / يبحث في الجريمة", s: [{ g: "Die Polizei <strong>ermittelt</strong> in alle Richtungen.", e: "The police are investigating in all directions.", a: "الشرطة بتحقق في كل الاتجاهات." }, { g: "Gegen ihn wird wegen Betrugs <strong>ermittelt</strong>.", e: "He is being investigated for fraud.", a: "بيتم التحقيق معاه بتهمة النصب." }, { g: "Die Beamten <strong>ermitteln</strong> den genauen Tathergang.", e: "The officers investigate the exact course of events.", a: "الضباط بيحققوا في تسلسل الأحداث بالظبط." }] },
                { id: 'v2', ger: "verdächtigen", eng: "to suspect", ar: "يشتبه في", s: [{ g: "Wir <strong>verdächtigen</strong> ihn des Diebstahls.", e: "We suspect him of the theft.", a: "إحنا بنشتبه فيه في حادثة السرقة." }, { g: "Sie wird <strong>verdächtigt</strong>, Geld unterschlagen zu haben.", e: "She is suspected of having embezzled money.", a: "بيشتبهوا إنها اختلست فلوس." }, { g: "Man <strong>verdächtigte</strong> sofort den Nachbarn.", e: "They immediately suspected the neighbor.", a: "هما اشتبهوا في الجار على طول." }] },
                { id: 'v3', ger: "befragen", eng: "to question / interview", ar: "يستجوب (الشهود)", s: [{ g: "Die Kommissarin <strong>befragt</strong> die Zeugen.", e: "The inspector is questioning the witnesses.", a: "المفتشة بتستجوب الشهود." }, { g: "Alle Nachbarn wurden von der Polizei <strong>befragt</strong>.", e: "All neighbors were questioned by the police.", a: "كل الجيران تم استجوابهم من الشرطة." }, { g: "Wir müssen den Experten dazu <strong>befragen</strong>.", e: "We have to ask the expert about this.", a: "لازم نسأل الخبير عن ده." }] },
                { id: 'v4', ger: "verhören", eng: "to interrogate", ar: "يُحقق مع / يستنطق", s: [{ g: "Der Verdächtige wird stundenlang <strong>verhört</strong>.", e: "The suspect is interrogated for hours.", a: "المشتبه به بيتحقق معاه لساعات." }, { g: "Man darf niemanden mit Gewalt <strong>verhören</strong>.", e: "One must not interrogate anyone with force.", a: "ممنوع استجواب أي حد بالعنف." }, { g: "Sie <strong>verhörten</strong> ihn bis spät in die Nacht.", e: "They interrogated him late into the night.", a: "استجوبوه لحد وقت متأخر بالليل." }] },
                { id: 'v5', ger: "tun (so als ob)", eng: "to pretend", ar: "يتصرف / يتظاهر وكأن", s: [{ g: "Er <strong>tut</strong> so, als ob er schläft.", e: "He pretends as if he is sleeping.", a: "هو بيتظاهر وكأنه نايم." }, { g: "Tu nicht so, als ob du nichts wüsstest!", e: "Don't pretend as if you knew nothing!", a: "ماتعملش نفسك كأنك متعرفش حاجة!" }, { g: "Sie <strong>tat</strong> so, als wäre nichts passiert.", e: "She acted as if nothing had happened.", a: "هي اتصرفت كأن مفيش حاجة حصلت." }] },
                { id: 'v6', ger: "aussehen (als ob)", eng: "to look like / appear", ar: "يبدو وكأن", s: [{ g: "Es <strong>sieht</strong> so <strong>aus</strong>, als ob es regnet.", e: "It looks as if it's raining.", a: "شكلها كده هتمطر." }, { g: "Der Tatort <strong>sah</strong> aus, als hätte eine Bombe eingeschlagen.", e: "The crime scene looked as if a bomb had hit.", a: "مسرح الجريمة كان شكله كأن قنبلة انفجرت فيه." }, { g: "Er <strong>sieht</strong> aus, als ob er krank wäre.", e: "He looks as if he were sick.", a: "شكله وكأنه عيان." }] },

                        { id: 'r_p_4', g: "Haben Sie ein Alibi für gestern Abend?", e: "Do you have an alibi for last night?", a: "عندك حجة غياب لإمبارح بالليل؟" },
                        { id: 'r_p_5', g: "Die Waffe wurde nicht gefunden.", e: "The weapon was not found.", a: "مالقوش السلاح." },
                        { id: 'r_p_6', g: "Er wurde zu einer Gefängnisstrafe verurteilt.", e: "He was sentenced to a prison term.", a: "اتحكم عليه بالسجن." },
                        { id: 'r_p_7', g: "Der Zeuge muss vor Gericht aussagen.", e: "The witness must testify in court.", a: "الشاهد لازم يدلي بشهادته قدام المحكمة." },
                        { id: 'r_p_8', g: "Der Richter spricht das Urteil.", e: "The judge pronounces the verdict.", a: "القاضي بينطق بالحكم." }
                    ]
                }
            ],
            // ==========================================
            // B2 EXPANSION (توسعة مستوى B2)
            // ==========================================
            b2: {
                words: [
                    { id: 'b2_w_1', ger: "die Erpressung", eng: "Blackmail / Extortion", ar: "الابتزاز", s: [{ g: "Er wurde wegen <strong>Erpressung</strong> verhaftet.", e: "He was arrested for blackmail.", a: "تم القبض عليه بتهمة الابتزاز." }, { g: "Die Mafia forderte Geld durch <strong>Erpressung</strong>.", e: "The mafia demanded money through extortion.", a: "المافيا طلبت فلوس عن طريق الابتزاز." }, { g: "Sie gab der <strong>Erpressung</strong> nicht nach.", e: "She did not give in to the blackmail.", a: "هي مستسلمتش للابتزاز." }] },
                    { id: 'b2_w_2', ger: "der Betrug", eng: "Fraud / Deceit", ar: "الاحتيال / النصب", s: [{ g: "Der <strong>Betrug</strong> hat viele Menschen ruiniert.", e: "The fraud ruined many people.", a: "الاحتيال دمر ناس كتير." }, { g: "Steuer<strong>betrug</strong> wird streng bestraft.", e: "Tax fraud is strictly punished.", a: "التهرب الضريبي بيتعاقب بشدة." }, { g: "Man warf ihm millionenfachen <strong>Betrug</strong> vor.", e: "He was accused of millions in fraud.", a: "اتهموه بنصب بملايين." }] },
                    { id: 'b2_w_3', ger: "die Bestechung", eng: "Bribery", ar: "الرشوة", s: [{ g: "<strong>Bestechung</strong> ist ein ernstes Vergehen.", e: "Bribery is a serious offense.", a: "الرشوة جنحة خطيرة." }, { g: "Der Politiker wurde wegen <strong>Bestechung</strong> verurteilt.", e: "The politician was convicted of bribery.", a: "السياسي اتحكم عليه بتهمة الرشوة." }, { g: "Der Beamte lehnte die <strong>Bestechung</strong> ab.", e: "The official refused the bribe.", a: "الموظف رفض الرشوة." }] },
                    { id: 'b2_w_4', ger: "die Entführung", eng: "Kidnapping", ar: "الاختطاف", s: [{ g: "Die <strong>Entführung</strong> des Politikers schockierte alle.", e: "The kidnapping of the politician shocked everyone.", a: "اختطاف السياسي صدم الكل." }, { g: "Die Polizei konnte die <strong>Entführung</strong> klären.", e: "The police could solve the kidnapping.", a: "الشرطة قدرت تحل قضية الخطف." }, { g: "Das Opfer der <strong>Entführung</strong> ist wohlauf.", e: "The victim of the kidnapping is safe.", a: "ضحية الخطف بخير." }] },
                    { id: 'b2_w_5', ger: "der Schmuggel", eng: "Smuggling", ar: "التهريب", s: [{ g: "Ihm wird illegaler <strong>Schmuggel</strong> vorgeworfen.", e: "He is accused of illegal smuggling.", a: "هو متهم بالتهريب غير الشرعي." }, { g: "Der Zoll verhinderte den Drogen<strong>schmuggel</strong>.", e: "Customs prevented drug smuggling.", a: "الجمارك منعت تهريب المخدرات." }, { g: "Waffen<strong>schmuggel</strong> ist ein großes Problem.", e: "Arms smuggling is a big problem.", a: "تهريب السلاح مشكلة كبيرة." }] },
                    { id: 'b2_w_6', ger: "das Geständnis", eng: "Confession", ar: "الاعتراف", s: [{ g: "Der Täter hat ein umfassendes <strong>Geständnis</strong> abgelegt.", e: "The perpetrator made a full confession.", a: "الجاني قدم اعتراف كامل." }, { g: "Die Polizei zwang ihn zu einem <strong>Geständnis</strong>.", e: "The police forced him to confess.", a: "الشرطة أجبرته على الاعتراف." }, { g: "Sein <strong>Geständnis</strong> war der Wendepunkt im Prozess.", e: "His confession was the turning point in the trial.", a: "اعترافه كان نقطة التحول في المحاكمة." }] },
                    { id: 'b2_w_7', ger: "die Bewährungsstrafe", eng: "Suspended sentence / Probation", ar: "حكم مع إيقاف التنفيذ", s: [{ g: "Er kam mit einer <strong>Bewährungsstrafe</strong> davon.", e: "He got off with a suspended sentence.", a: "نفد منها بحكم مع إيقاف التنفيذ." }, { g: "Das Gericht verhängte eine <strong>Bewährungsstrafe</strong> von zwei Jahren.", e: "The court imposed a two-year suspended sentence.", a: "المحكمة أصدرت حكم بسنتين مع إيقاف التنفيذ." }, { g: "Während der <strong>Bewährungsstrafe</strong> darf er nicht straffällig werden.", e: "During probation he must not offend.", a: "خلال فترة المراقبة ممنوع يرتكب أي جنحة." }] },
                    { id: 'b2_w_8', ger: "die Anklage", eng: "Indictment / Charge", ar: "لائحة الاتهام", s: [{ g: "Die <strong>Anklage</strong> lautet auf Mord.", e: "The charge is murder.", a: "لائحة الاتهام بتهمة القتل." }, { g: "Die <strong>Anklage</strong> wurde vom Gericht fallengelassen.", e: "The charge was dropped by the court.", a: "لائحة الاتهام أسقطت من المحكمة." }, { g: "Der Richter las die <strong>Anklage</strong> vor.", e: "The judge read the indictment.", a: "القاضي قرأ لائحة الاتهام." }] },
                    { id: 'b2_w_9', ger: "der Staatsanwalt", eng: "Public prosecutor", ar: "المدعي العام", s: [{ g: "Der <strong>Staatsanwalt</strong> fordert zehn Jahre Haft.", e: "The prosecutor demands ten years in prison.", a: "المدعي العام بيطالب بـ 10 سنين سجن." }, { g: "Die <strong>Staatsanwältin</strong> sammelt Beweise gegen den Täter.", e: "The prosecutor collects evidence against the perpetrator.", a: "المدعية العامة بتجمع أدلة ضد الجاني." }, { g: "Der <strong>Staatsanwalt</strong> hielt ein flammendes Plädoyer.", e: "The prosecutor gave a passionate closing argument.", a: "المدعي العام ألقى مرافعة حماسية." }] },
                    { id: 'b2_w_10', ger: "der Verteidiger", eng: "Defense attorney", ar: "محامي الدفاع", s: [{ g: "Sein <strong>Verteidiger</strong> plädiert auf Freispruch.", e: "His defense attorney pleads for acquittal.", a: "محامي الدفاع بيطالب بالبراءة." }, { g: "Ein guter <strong>Verteidiger</strong> ist sehr teuer.", e: "A good defense lawyer is very expensive.", a: "محامي الدفاع الشاطر غالي جداً." }, { g: "Der <strong>Verteidiger</strong> befragte den Zeugen scharf.", e: "The defense attorney cross-examined the witness sharply.", a: "محامي الدفاع استجوب الشاهد بشدة." }] },
                    { id: 'b2_w_11', ger: "der Freispruch", eng: "Acquittal", ar: "البراءة", s: [{ g: "Es gab nicht genug Beweise, also folgte ein <strong>Freispruch</strong>.", e: "There was not enough evidence, so an acquittal followed.", a: "مكانش فيه أدلة كفاية فبالتالي أخد براءة." }, { g: "Der <strong>Freispruch</strong> überraschte alle im Gerichtssaal.", e: "The acquittal surprised everyone in the courtroom.", a: "البراءة فاجأت كل اللي في قاعة المحكمة." }, { g: "Nach dem <strong>Freispruch</strong> durfte er nach Hause gehen.", e: "After the acquittal he was allowed to go home.", a: "بعد حكم البراءة اتسمحله يروح بيته." }] },
                    { id: 'b2_w_12', ger: "die Revision", eng: "Appeal (legal)", ar: "الاستئناف / الطعن", s: [{ g: "Der Verurteilte geht in <strong>Revision</strong>.", e: "The convicted person is appealing.", a: "المُدان هيقدم طعن / استئناف." }, { g: "Das Urteil ist noch nicht rechtskräftig, da <strong>Revision</strong> eingelegt wurde.", e: "The verdict is not yet final, as an appeal was filed.", a: "الحكم لسة مش نهائي لأنه تم تقديم استئناف." }, { g: "Die <strong>Revision</strong> wurde vom Gericht abgelehnt.", e: "The appeal was rejected by the court.", a: "الاستئناف اترفض من المحكمة." }] },
                    { id: 'b2_w_13', ger: "das Indiz", eng: "Circumstantial evidence", ar: "قرينة / دليل ظرفي", s: [{ g: "Ein <strong>Indiz</strong> ist noch kein Beweis.", e: "Circumstantial evidence is not yet proof.", a: "القرينة لوحدها مش دليل قاطع." }, { g: "Es gibt viele <strong>Indizien</strong>, die gegen ihn sprechen.", e: "There is much circumstantial evidence against him.", a: "فيه قرائن كتير ضده." }, { g: "Die Polizei sicherte ein wichtiges <strong>Indiz</strong> am Tatort.", e: "The police secured important circumstantial evidence at the crime scene.", a: "الشرطة أمنت قرينة مهمة في مسرح الجريمة." }] },
                    { id: 'b2_w_14', ger: "die Verjährung", eng: "Statute of limitations", ar: "التقادم (سقوط الجريمة)", s: [{ g: "Mord unterliegt in Deutschland nicht der <strong>Verjährung</strong>.", e: "Murder is not subject to the statute of limitations in Germany.", a: "جريمة القتل مابتسقطش بالتقادم في ألمانيا." }, { g: "Die <strong>Verjährung</strong>sfrist für Betrug beträgt fünf Jahre.", e: "The statute of limitations for fraud is five years.", a: "فترة تقادم تهمة النصب ٥ سنين." }, { g: "Der Fall wurde wegen <strong>Verjährung</strong> geschlossen.", e: "The case was closed due to the statute of limitations.", a: "القضية اتقفلت بسبب التقادم." }] },
                    { id: 'b2_w_15', ger: "der Komplize", eng: "Accomplice", ar: "الشريك في الجريمة", s: [{ g: "Er beging den Bankraub mit einem <strong>Komplizen</strong>.", e: "He committed the bank robbery with an accomplice.", a: "هو عمل السطو على البنك مع شريك." }, { g: "Der <strong>Komplize</strong> wartete im Fluchtauto.", e: "The accomplice waited in the getaway car.", a: "شريك الجريمة كان مستني في عربية الهروب." }, { g: "Sein <strong>Komplize</strong> hat ihn an die Polizei verraten.", e: "His accomplice betrayed him to the police.", a: "شريكه سلمه (بلغ عنه) للشرطة." }] },
                    { id: 'b2_w_16', ger: "die Hintermänner", eng: "Masterminds / Backers", ar: "الرؤوس المدبرة", s: [{ g: "Die Polizei sucht noch nach den <strong>Hintermännern</strong>.", e: "The police are still looking for the masterminds.", a: "الشرطة لسة بتدور على الرؤوس المدبرة." }, { g: "Die <strong>Hintermänner</strong> des Kartells blieben im Verborgenen.", e: "The masterminds of the cartel remained hidden.", a: "الرؤوس المدبرة للعصابة فضلوا مستخبيين." }, { g: "Er weigert sich, die Namen der <strong>Hintermänner</strong> zu nennen.", e: "He refuses to name the masterminds.", a: "هو رافض يقول أسامي الرؤوس المدبرة." }] },
                    { id: 'b2_w_17', ger: "die Spurensicherung", eng: "Forensics", ar: "الأدلة الجنائية", s: [{ g: "Die <strong>Spurensicherung</strong> untersucht den Tatort akribisch.", e: "Forensics is investigating the crime scene meticulously.", a: "الأدلة الجنائية بتفحص مسرح الجريمة بدقة شديدة." }, { g: "Experten der <strong>Spurensicherung</strong> fanden Haare des Täters.", e: "Forensics experts found the perpetrator's hair.", a: "خبراء الأدلة الجنائية لقوا شعر للجاني." }, { g: "Die Arbeit der <strong>Spurensicherung</strong> dauerte den ganzen Tag.", e: "The forensics work lasted all day.", a: "شغل الأدلة الجنائية أخد اليوم كله." }] },
                    { id: 'b2_w_18', ger: "das Lösegeld", eng: "Ransom", ar: "الفدية", s: [{ g: "Die Entführer forderten eine Million Euro <strong>Lösegeld</strong>.", e: "The kidnappers demanded one million euros ransom.", a: "الخاطفين طلبوا مليون يورو فدية." }, { g: "Das <strong>Lösegeld</strong> wurde in einem Koffer übergeben.", e: "The ransom was handed over in a suitcase.", a: "الفدية اتسلمت في شنطة." }, { g: "Die Familie konnte das hohe <strong>Lösegeld</strong> nicht zahlen.", e: "The family couldn't pay the high ransom.", a: "العيلة مقدرتش تدفع الفدية الكبيرة." }] },
                    { id: 'b2_w_19', ger: "der Haftbefehl", eng: "Arrest warrant", ar: "مذكرة توقيف", s: [{ g: "Der Richter hat einen <strong>Haftbefehl</strong> erlassen.", e: "The judge issued an arrest warrant.", a: "القاضي أصدر أمر اعتقال." }, { g: "Gegen ihn liegt ein internationaler <strong>Haftbefehl</strong> vor.", e: "There is an international arrest warrant against him.", a: "صادر ضده مذكرة توقيف دولية." }, { g: "Die Polizei kam mit einem <strong>Haftbefehl</strong> zu ihm nach Hause.", e: "The police came to his house with an arrest warrant.", a: "الشرطة راحتله البيت ومعاها أمر اعتقال." }] },
                    { id: 'b2_w_20', ger: "skrupellos", eng: "Ruthless / Unscrupulous", ar: "عديم الضمير", s: [{ g: "Er ist ein <strong>skrupelloser</strong> Verbrecher.", e: "He is a ruthless criminal.", a: "هو مجرم عديم الضمير." }, { g: "Die Bande ging äußerst <strong>skrupellos</strong> vor.", e: "The gang acted extremely ruthlessly.", a: "العصابة اتصرفت بمنتهى انعدام الضمير." }, { g: "Ein <strong>skrupelloser</strong> Betrüger hat alte Menschen ausgeraubt.", e: "A ruthless fraudster robbed old people.", a: "نصاب معندوش ضمير سرق ناس عجوزة." }] },
                    { id: 'b2_w_21', ger: "raffiniert", eng: "Cunning / Ingenious", ar: "داهية / ماكر", s: [{ g: "Der Plan der Diebe war äußerst <strong>raffiniert</strong>.", e: "The thieves' plan was extremely ingenious.", a: "خطة الحرامية كانت في منتهى الدهاء." }, { g: "Sie benutzte einen <strong>raffinierten</strong> Trick.", e: "She used a cunning trick.", a: "هي استخدمت خدعة ماكرة." }, { g: "Der Täter versteckte die Beute sehr <strong>raffiniert</strong>.", e: "The perpetrator hid the loot very cleverly.", a: "الجاني خبى الغنيمة بدهاء شديد." }] },
                    { id: 'b2_w_22', ger: "eiskalt", eng: "Cold-blooded", ar: "بدم بارد", s: [{ g: "Er hat sein Opfer <strong>eiskalt</strong> angelogen.", e: "He lied to his victim in cold blood.", a: "كذب على ضحيته بدم بارد." }, { g: "Ein <strong>eiskalter</strong> Mörder zeigt keine Reue.", e: "A cold-blooded murderer shows no remorse.", a: "القاتل اللي بدم بارد مبيبينش أي ندم." }, { g: "Der Einbrecher ging <strong>eiskalt</strong> vor.", e: "The burglar acted cold-bloodedly.", a: "المقتحم اتصرف بدم بارد تماماً." }] },
                    { id: 'b2_w_23', ger: "korrupt", eng: "Corrupt", ar: "فاسد / مرتشي", s: [{ g: "Manche Politiker sind leider <strong>korrupt</strong>.", e: "Some politicians are unfortunately corrupt.", a: "بعض السياسيين للأسف فاسدين (مرتشين)." }, { g: "Ein <strong>korrupter</strong> Polizist half der Mafia.", e: "A corrupt police officer helped the mafia.", a: "ظابط مرتشي ساعد المافيا." }, { g: "Das Justizsystem in diesem Land gilt als <strong>korrupt</strong>.", e: "The justice system in this country is considered corrupt.", a: "نظام العدالة في البلد دي بيُعتبر فاسد." }] },
                    { id: 'b2_w_24', ger: "verwanzen", eng: "To bug (with listening devices)", ar: "يزرع أجهزة تنصت", s: [{ g: "Die Polizei ließ sein Büro <strong>verwanzen</strong>.", e: "The police had his office bugged.", a: "الشرطة زرعت أجهزة تنصت في مكتبه." }, { g: "Seine Wohnung war von Agenten <strong>verwanzt</strong> worden.", e: "His apartment had been bugged by agents.", a: "شقته اتزرع فيها أجهزة تنصت من العملاء." }, { g: "Man darf ohne Erlaubnis keine Räume <strong>verwanzen</strong>.", e: "One is not allowed to bug rooms without permission.", a: "ممنوع زرع أجهزة تنصت في الأماكن بدون إذن." }] },
                    { id: 'b2_w_25', ger: "ausliefern", eng: "To extradite", ar: "يسلم (مجرماً)", s: [{ g: "Der Täter wurde an sein Heimatland <strong>ausgeliefert</strong>.", e: "The perpetrator was extradited to his home country.", a: "الجاني تم تسليمه لبلده الأم." }, { g: "Deutschland wird den Verdächtigen nicht <strong>ausliefern</strong>.", e: "Germany will not extradite the suspect.", a: "ألمانيا مش هتسلم المشتبه به." }, { g: "Das Land verlangt, dass die USA den Kriminellen <strong>ausliefern</strong>.", e: "The country demands that the USA extradite the criminal.", a: "البلد بتطالب أمريكا بتسليم المجرم." }] },
                    { id: 'b2_w_26', ger: "plädieren (auf)", eng: "To plead (for)", ar: "يترافع مطالباً بـ", s: [{ g: "Der Anwalt <strong>plädierte auf</strong> unschuldig.", e: "The lawyer pleaded not guilty.", a: "المحامي ترافع مطالباً بالبراءة." }, { g: "Die Staatsanwaltschaft <strong>plädiert auf</strong> lebenslange Haft.", e: "The prosecution pleads for life imprisonment.", a: "النيابة بتترافع مطالبة بالسجن المؤبد." }, { g: "Ich <strong>plädiere auf</strong> mildernde Umstände.", e: "I plead for mitigating circumstances.", a: "أنا بترافع مطالباً بظروف مخففة." }] }
                ],
                expressions: [
                    { id: 'b2_e_1', type: "Prüfung B2 (Diskussion)", ger: "Meines Erachtens ist die Strafe zu mild.", eng: "In my opinion, the punishment is too mild.", ar: "في رأيي / من وجهة نظري العقوبة خفيفة جداً.", context: "للتعبير عن الرأي الشخصي بطريقة رسمية وقوية." },
                    { id: 'b2_e_2', type: "Prüfung B2 (Diskussion)", ger: "Es steht außer Zweifel, dass...", eng: "There is no doubt that...", ar: "مما لا شك فيه أن...", context: "لتأكيد حقيقة أو دليل في المناقشة." },
                    { id: 'b2_e_3', type: "Prüfung B2 (Diskussion)", ger: "Ich vertrete die Auffassung, dass...", eng: "I take the view that...", ar: "أنا أتبنى وجهة النظر القائلة بأن...", context: "بديل ممتاز لـ Ich denke dass في الامتحانات." },
                    { id: 'b2_e_4', type: "Prüfung B2 (Diskussion)", ger: "Man muss in Betracht ziehen, dass...", eng: "One must consider that...", ar: "يجب على المرء أن يأخذ بعين الاعتبار أن...", context: "لإضافة عامل جديد للنقاش (مثلاً عند تقييم دافع الجريمة)." },
                    { id: 'b2_e_5', type: "Prüfung B2 (Diskussion)", ger: "Ein wesentlicher Aspekt ist...", eng: "An essential aspect is...", ar: "أحد الجوانب الجوهرية هو...", context: "لإبراز نقطة مهمة في موضوع الجريمة." },
                    { id: 'b2_e_6', type: "Prüfung B2 (Diskussion)", ger: "Es lässt sich nicht leugnen, dass...", eng: "It cannot be denied that...", ar: "لا يمكن إنكار أن...", context: "للاتفاق على حقيقة ثابتة كدليل أو إحصائية." },
                    { id: 'b2_e_7', type: "Prüfung B2 (Diskussion)", ger: "Im Gegensatz dazu steht...", eng: "In contrast to this stands...", ar: "على النقيض من ذلك نجد...", context: "لعرض وجهة نظر مضادة أو مناقشة أدلة الدفاع." },
                    { id: 'b2_e_8', type: "Prüfung B2 (Diskussion)", ger: "Aus meiner Sicht...", eng: "From my perspective...", ar: "من وجهة نظري...", context: "تعبير راقٍ لبدء رأيك حول قرار المحكمة." },
                    { id: 'b2_e_9', type: "Prüfung B2 (Diskussion)", ger: "Ich bin der festen Überzeugung, dass...", eng: "I am firmly convinced that...", ar: "أنا على قناعة تامة بأن...", context: "للتعبير عن اليقين من براءة أو ذنب شخص ما." },
                    { id: 'b2_e_10', type: "Prüfung B2 (Diskussion)", ger: "Das Argument leuchtet mir ein, aber...", eng: "The argument makes sense to me, but...", ar: "هذه الحجة تبدو منطقية بالنسبة لي، ولكن...", context: "لإبداء تفهمك لحجة الخصم قبل الرد عليها." },
                    { id: 'b2_e_11', type: "Prüfung B2 (Diskussion)", ger: "Wir müssen die Vor- und Nachteile abwägen.", eng: "We must weigh the pros and cons.", ar: "يجب علينا أن نوازن بين الإيجابيات والسلبيات.", context: "لإظهار القدرة على التحليل الموضوعي." },
                    { id: 'b2_e_12', type: "Prüfung B2 (Diskussion)", ger: "Letztendlich läuft es darauf hinaus, dass...", eng: "Ultimately it comes down to...", ar: "في النهاية يؤول الأمر إلى أن / الخلاصة هي...", context: "تعبير ختامي ممتاز لإنهاء المناقشة أو تلخيص الحكم." }
                ],
                grammar: [
                    {
                        title: "1. المبني للمجهول مع الأفعال الناقصة (Passiv mit Modalverben)",
                        desc: "يُستخدم بكثرة في التقارير الجنائية والأخبار لبيان ما *يجب* أو *كان يجب* فعله دون ذكر الفاعل. تكوينه في المضارع: (Modalverb + Partizip II + werden).",
                        structure: "Modalverb (Präsens/Präteritum) + Subjekt + ... + Partizip II + werden",
                        examples: [
                            { g: "Der Täter <span class='text-indigo-600 font-bold'>muss</span> streng <span class='text-indigo-600 font-bold'>bestraft werden</span>.", a: "الجاني يجب أن يُعاقب بشدة. (مضارع)" },
                            { g: "Der Tatort <span class='text-indigo-600 font-bold'>durfte</span> nicht <span class='text-indigo-600 font-bold'>betreten werden</span>.", a: "لم يكن مسموحاً الدخول إلى مسرح الجريمة. (ماضي)" },
                            { g: "Das Opfer <span class='text-indigo-600 font-bold'>konnte</span> rechtzeitig <span class='text-indigo-600 font-bold'>gerettet werden</span>.", a: "أمكن إنقاذ الضحية في الوقت المناسب. (ماضي)" }
                        ]
                    },
                    {
                        title: "2. اسم الفاعل والمفعول كصفات (Partizip I & II als Adjektive)",
                        desc: "قاعدة أساسية في B2 لاختصار الجمل الموصولة. نستخدم (Partizip I = Verb + d) للحدث المستمر، و (Partizip II) للحدث المنتهي، ويتم إعرابهما كأي صفة قبل الاسم.",
                        structure: "Artikel + (Partizip I oder II + Adjektivendung) + Nomen",
                        examples: [
                            { g: "Die Polizei jagt den <span class='text-indigo-600 font-bold'>fliehenden</span> Täter.", a: "الشرطة تطارد الجاني (الذي يهرب / الهارب). [Partizip I]" },
                            { g: "Das <span class='text-indigo-600 font-bold'>gestohlene</span> Geld wurde gefunden.", a: "تم العثور على المال (الذي سُرق / المسروق). [Partizip II]" },
                            { g: "Wir sprechen mit der <span class='text-indigo-600 font-bold'>weinenden</span> Frau.", a: "نحن نتحدث مع المرأة (التي تبكي / الباكية). [Partizip I]" }
                        ]
                    },
                    {
                        title: "3. الروابط المزدوجة (Zweiteilige Konnektoren)",
                        desc: "لربط الأفكار في الامتحانات والمناقشات بشكل احترافي. الشقين إما يضيفان (nicht nur... sondern auch)، أو ينفيان (weder... noch)، أو يخيرّان (entweder... oder).",
                        structure: "Teil 1 ... + Teil 2 ... (ربط بين كلمتين أو جملتين)",
                        examples: [
                            { g: "Er ist <span class='text-indigo-600 font-bold'>weder</span> der Mörder <span class='text-indigo-600 font-bold'>noch</span> der Komplize.", a: "هو لا القاتل ولا الشريك. (نفي مزدوج)" },
                            { g: "Sie hat <span class='text-indigo-600 font-bold'>nicht nur</span> gestohlen, <span class='text-indigo-600 font-bold'>sondern auch</span> gelogen.", a: "هي لم تسرق فقط، بل كذبت أيضاً. (إضافة)" },
                            { g: "Der Täter war <span class='text-indigo-600 font-bold'>sowohl</span> raffiniert <span class='text-indigo-600 font-bold'>als auch</span> eiskalt.", a: "الجاني كان داهية و(كذلك) بدم بارد في نفس الوقت." }
                        ]
                    }
                ]
            }
        };

        const { useState, useEffect } = React;

        // --- HELPER FOR ARTICLES COLORING ---
        const colorizeArticles = (text) => {
            if (!text) return text;
            const regex = /(der |die |das )/gi;
            const parts = text.split(regex);
            return parts.map((part, i) => {
                const lower = part.toLowerCase();
                if (lower === 'der ') return <span key={i} className="text-blue-500 font-extrabold">{part}</span>;
                if (lower === 'die ') return <span key={i} className="text-rose-500 font-extrabold">{part}</span>;
                if (lower === 'das ') return <span key={i} className="text-emerald-500 font-extrabold">{part}</span>;
                return <span key={i}>{part}</span>;
            });
        };

        // --- COMPONENTS ---
        const ProgressBar = ({ total, learned, colorClass }) => {
            const percentage = total === 0 ? 0 : Math.round((learned / total) * 100);
            return (
                <div className="glass-panel p-5 rounded-2xl mb-8 flex items-center justify-between transition-all" dir="rtl">
                    <div>
                        <h3 className="text-sm font-bold text-slate-500 uppercase tracking-wider ar-text mb-1">مستوى التقدم</h3>

                            <div className="text-center mt-2 flex-grow flex flex-col justify-center overflow-y-auto front-scroll px-1 py-3">

                                        <SpeechTester targetText={item.ger} />

                            <div className="mb-3 border-b border-white/20 pb-2 flex justify-between items-center shrink-0" dir="rtl">

                                            </div>
                                            <div className="text-blue-200 text-xs italic ml-8 mb-1.5">{sentence.e}</div>

                                        </li>
                                    ))}
                                    {!item.s && <li className="text-sm text-white/70 italic text-center mt-10">Keine Sätze vorhanden</li>}

                            </div>
                        </div>
                    </div>
                </div>

        };

        const ListRow = ({ item, isLearned, toggleLearned, colorTheme }) => {

            const themes = {

                                    {item.ger}

                                </h3>
                                <p className="text-sm text-slate-500 mt-1">{item.eng} <span className="mx-2 text-slate-300">|</span> <span className={`${textAccent} font-bold ar-text`} dir="rtl">{item.ar}</span></p>

                        </div>
                        <div className={`transform transition-transform duration-300 ${expanded ? 'rotate-180' : ''}`}>

                        </div>
                    </div>
                    
                    <div className={`transition-all duration-500 overflow-hidden ${expanded ? 'max-h-[1000px] opacity-100' : 'max-h-0 opacity-0'}`}>
                        <div className="bg-slate-50 p-5 border-t border-slate-100">
                            <ul className="space-y-4">
                                {item.s && item.s.map((sentence, idx) => (
                                    <li key={idx} className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm group flex flex-col sm:flex-row gap-4 justify-between items-start">
                                        <div className="flex-1">
                                            <div className="flex items-start gap-3 mb-2">
                                                <button onClick={(e) => playAudio(sentence.g, e)} className={`mt-0.5 ${textAccent} bg-${colorTheme}-50 p-1.5 rounded-lg shrink-0`}><i data-lucide="volume-2" className="w-4 h-4"></i></button>

                                            <div className={`ml-10 ${textAccent} text-base font-bold ar-text border-t border-slate-100 pt-2`} dir="rtl">{sentence.a}</div>

                                            <SpeechTester targetText={sentence.g} />

                            </ul>
                        </div>
                    </div>
                </div>
            );
        };

        const IrregularVerbRow = ({ item, isLearned, toggleLearned }) => {
            const [expanded, setExpanded] = useState(false);
            
            return (
                <div className="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden mb-4 transition-all duration-300 hover:shadow-md" dir="ltr">
                    <div className="p-5 flex items-center justify-between cursor-pointer" onClick={() => setExpanded(!expanded)}>
                        <div className="flex items-center gap-4">
                            <button onClick={(e) => { e.stopPropagation(); toggleLearned(item.id); }} className={`p-2 rounded-full transition-colors ${isLearned ? 'bg-emerald-100 text-emerald-600' : 'bg-slate-50 text-slate-300 hover:bg-slate-100'}`}>
                                <i data-lucide="check" className="w-5 h-5"></i>
                            </button>
                            <div>
                                <h3 className="text-xl font-bold text-slate-800 flex items-center gap-2">

                                    <button onClick={(e) => playAudio(item.ger, e)} className="text-emerald-600 opacity-70 hover:opacity-100 transition-opacity"><i data-lucide="volume-2" className="w-5 h-5"></i></button>
                                </h3>
                                <p className="text-sm text-slate-500 mt-1">{item.eng} <span className="mx-2 text-slate-300">|</span> <span className="text-emerald-600 font-bold ar-text" dir="rtl">{item.ar}</span></p>

                        <div className={`transform transition-transform duration-300 ${expanded ? 'rotate-180' : ''}`}>
                            <i data-lucide="chevron-down" className="w-6 h-6 text-slate-400"></i>

                                        <p className="text-slate-800 text-sm font-medium leading-relaxed mt-1" dangerouslySetInnerHTML={{ __html: item.praesens }}></p>

                                    <div className="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition-opacity"><SpeechTester targetText={item.praesens} /></div>

                                <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm relative group">
                                    <div className="text-xs font-bold text-amber-500 uppercase tracking-widest mb-2 border-b border-slate-100 pb-1">Präteritum (ماضي بسيط)</div>
                                    <div className="flex items-start gap-2 mb-2">

                                </div>
                            </div>

                            <div className="mt-6">
                                <h4 className="text-sm font-bold text-slate-400 mb-3 uppercase tracking-wider ar-text">أمثلة سياقية</h4>
                                <ul className="space-y-3">
                                    {item.s && item.s.map((sentence, idx) => (
                                        <li key={idx} className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm group flex flex-col sm:flex-row gap-4 justify-between items-start">
                                            <div className="flex-1">
                                                <div className="flex items-start gap-3 mb-2">
                                                    <button onClick={(e) => playAudio(sentence.g, e)} className="mt-0.5 text-emerald-600 bg-emerald-50 p-1.5 rounded-lg shrink-0"><i data-lucide="volume-2" className="w-4 h-4"></i></button>
                                                    <p className="text-slate-800 text-base font-medium leading-relaxed mt-1" dangerouslySetInnerHTML={{ __html: sentence.g }}></p>
                                                </div>
                                                <p className="text-slate-500 text-sm ml-10 mb-2">{sentence.e}</p>

                                </ul>
                            </div>
                        </div>
                    </div>
                </div>

        };

        // --- MAIN APP ---
        const App = () => {
            const [activeTab, setActiveTab] = useState('words');
            const [learnedItems, setLearnedItems] = useState(new Set());
            const [searchTerm, setSearchTerm] = useState('');
            const [expandedReview, setExpandedReview] = useState('rev-nomen-verb');

            useEffect(() => {
                lucide.createIcons();
            });

            const toggleLearned = (id) => {
                const newLearned = new Set(learnedItems);
                if (newLearned.has(id)) newLearned.delete(id);
                else newLearned.add(id);
                setLearnedItems(newLearned);
            };

            const totalWords = LEARNING_DATA.words.verbrechen.length + LEARNING_DATA.words.polizei.length + LEARNING_DATA.words.gericht.length + LEARNING_DATA.words.medien.length + LEARNING_DATA.words.adjektive.length;
            const totalVerbs = LEARNING_DATA.verbs.length + LEARNING_DATA.irregularVerbs.length;
            const totalExp = LEARNING_DATA.expressions.length;
            const totalPrep = LEARNING_DATA.prepositions.length;
            const totalGrammar = LEARNING_DATA.grammar.length;
            const totalReview = LEARNING_DATA.review.reduce((acc, cat) => acc + cat.items.length, 0);
            const totalB2 = LEARNING_DATA.b2.words.length + LEARNING_DATA.b2.expressions.length; 
            const grandTotal = totalWords + totalVerbs + totalExp + totalPrep + totalGrammar + totalReview + totalB2;

            const tabConfig = {
                words: { labelEn: 'Nouns & Adj', labelAr: 'الأسماء والصفات', icon: 'book-open', color: 'blue' },
                verbs: { labelEn: 'Verbs', labelAr: 'الأفعال', icon: 'activity', color: 'emerald' },
                expressions: { labelEn: 'Expressions', labelAr: 'تعبيرات', icon: 'message-circle', color: 'amber' },
                prepositions: { labelEn: 'Prepositions', labelAr: 'حروف الجر', icon: 'link', color: 'rose' },
                grammar: { labelEn: 'Grammar', labelAr: 'القواعد الشاملة', icon: 'pen-tool', color: 'purple' },
                review: { labelEn: 'Review', labelAr: 'المراجعة الشاملة', icon: 'clipboard-check', color: 'teal' },
                b2_expansion: { labelEn: 'B2 Expansion', labelAr: 'توسعة B2', icon: 'trending-up', color: 'indigo' }
            };

            const activeColor = tabConfig[activeTab].color;

            return (
                <div className="h-screen flex flex-col bg-slate-50" dir="rtl">
                    {/* TOP NAVIGATION HEADER */}
                    <header className="w-full bg-slate-900 text-white shadow-xl z-50 shrink-0 relative overflow-hidden">
                        <div className={`absolute top-0 left-0 w-full h-1 bg-${activeColor}-500 transition-colors duration-500`}></div>
                        
                        <div className="flex justify-between items-center px-4 md:px-8 py-3 border-b border-slate-800">
                            <h1 className="text-xl md:text-2xl font-extrabold flex items-center gap-3 ar-text">
                                <span className={`bg-${activeColor}-500 p-2 rounded-xl transition-colors duration-500 shadow-lg`}>
                                    <i data-lucide="shield-alert" className="w-5 h-5 md:w-6 md:h-6 text-white"></i>
                                </span>
                                ألماني B1+ (Spektrum K12)
                            </h1>

                            <div className="flex items-center gap-3" dir="ltr">
                                <div className="text-right hidden sm:block">
                                    <div className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Mastery</div>
                                    <div className={`text-sm font-extrabold text-${activeColor}-400 transition-colors`}>{grandTotal === 0 ? 0 : Math.round((learnedItems.size / grandTotal) * 100)}%</div>
                                </div>

                                    </div>

                                    {/* B2 Words Section */}
                                    <section className="mb-16">
                                        <h2 className="text-3xl font-extrabold text-slate-800 mb-6 flex items-center gap-3 ar-text"><span className="bg-indigo-100 p-2 rounded-xl text-indigo-600"><i data-lucide="book-open" className="w-6 h-6"></i></span> مفردات جنائية متقدمة (B2 Wortschatz)</h2>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-6">
                                            {LEARNING_DATA.b2.words.filter(w => w.ger.toLowerCase().includes(searchTerm.toLowerCase()) || w.eng.toLowerCase().includes(searchTerm.toLowerCase()) || w.ar.includes(searchTerm)).map(word => (
                                                <WordCard key={word.id} item={word} isLearned={learnedItems.has(word.id)} toggleLearned={toggleLearned} />
                                            ))}
                                        </div>
                                    </section>

                                    {/* B2 Expressions Section */}
                                    <section className="mb-16">
                                        <h2 className="text-3xl font-extrabold text-slate-800 mb-6 flex items-center gap-3 ar-text"><span className="bg-indigo-100 p-2 rounded-xl text-indigo-600"><i data-lucide="messages-square" className="w-6 h-6"></i></span> تعبيرات للمناقشة وامتحانات B2 (Diskussion & Meinung)</h2>
                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                            {LEARNING_DATA.b2.expressions.filter(e => e.ger.toLowerCase().includes(searchTerm.toLowerCase()) || e.eng.toLowerCase().includes(searchTerm.toLowerCase()) || e.ar.includes(searchTerm)).map(exp => (
                                                <div key={exp.id} className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm relative group hover:shadow-xl hover:border-indigo-200 transition-all duration-300">
                                                    <button onClick={() => toggleLearned(exp.id)} className={`absolute top-5 left-5 p-2 rounded-full transition-colors z-10 ${learnedItems.has(exp.id) ? 'bg-indigo-100 text-indigo-600' : 'bg-slate-50 text-slate-300 hover:bg-slate-100'}`}>
                                                        <i data-lucide="check" className="w-5 h-5"></i>
                                                    </button>
                                                    <span className="inline-block bg-indigo-50 text-indigo-600 px-3 py-1 rounded-lg text-xs font-bold mb-4 ar-text border border-indigo-100">{exp.type}</span>
                                                    <div className="flex items-start gap-3 mb-3" dir="ltr">
                                                        <div className="flex flex-col gap-2 shrink-0">
                                                            <button onClick={(e) => playAudio(exp.ger, e)} className="text-indigo-500 bg-indigo-50 p-2 rounded-xl hover:bg-indigo-100 transition-colors"><i data-lucide="volume-2" className="w-5 h-5"></i></button>
                                                            <div className="bg-slate-50 rounded-full p-1"><SpeechTester targetText={exp.ger} /></div>
                                                        </div>
                                                        <div>
                                                            <h3 className="text-xl font-extrabold text-slate-800 leading-tight mt-1">"{exp.ger}"</h3>
                                                        </div>
                                                    </div>
                                                    <div className="bg-slate-50 rounded-2xl p-4 mt-4 border border-slate-100">
                                                        <p className="text-slate-500 font-medium text-sm mb-2" dir="ltr">{exp.eng}</p>
                                                        <p className="text-indigo-700 font-extrabold text-xl mb-4 ar-text">{exp.ar}</p>
                                                        <div className="text-sm text-slate-600 flex gap-2 items-start pt-3 border-t border-slate-200">
                                                            <i data-lucide="info" className="w-5 h-5 text-indigo-400 mt-0.5 shrink-0"></i>
                                                            <span className="ar-text leading-relaxed">{exp.context}</span>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </section>

                                    {/* B2 Grammar Section */}
                                    <section>
                                        <h2 className="text-3xl font-extrabold text-slate-800 mb-6 flex items-center gap-3 ar-text"><span className="bg-indigo-100 p-2 rounded-xl text-indigo-600"><i data-lucide="pen-tool" className="w-6 h-6"></i></span> قواعد متقدمة (B2 Grammatik)</h2>
                                        <div className="grid gap-8">
                                            {LEARNING_DATA.b2.grammar.map((gram, idx) => (
                                                <div key={idx} className="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden hover:shadow-lg transition-shadow">
                                                    <div className="p-8 border-b border-slate-50 bg-slate-50/50 flex items-start gap-4">
                                                        <div className="bg-indigo-100 p-3 rounded-2xl text-indigo-600 shrink-0 mt-1">
                                                            <i data-lucide="zap" className="w-6 h-6"></i>
                                                        </div>
                                                        <div>
                                                            <h3 className="text-2xl font-extrabold text-slate-800 ar-text mb-2">{gram.title}</h3>
                                                            <p className="text-base text-slate-600 ar-text leading-relaxed">{gram.desc}</p>
                                                        </div>
                                                    </div>
                                                    
                                                    <div className="p-8">
                                                        <div className="bg-slate-900 text-indigo-300 font-mono text-base p-5 rounded-2xl mb-8 shadow-inner flex items-center gap-3 overflow-x-auto border border-slate-800" dir="ltr">
                                                            <i data-lucide="code" className="text-slate-500 w-5 h-5 shrink-0"></i> {gram.structure}
                                                        </div>
                                                        
                                                        <h4 className="font-bold text-slate-400 mb-4 text-sm tracking-widest uppercase ar-text">أمثلة للتوضيح:</h4>
                                                        <ul className="space-y-4">
                                                            {gram.examples.map((ex, i) => (
                                                                <li key={i} className="bg-indigo-50/50 p-5 rounded-2xl border border-indigo-100">
                                                                    <div className="flex gap-4 items-center mb-3" dir="ltr">
                                                                        <button onClick={(e) => playAudio(ex.g, e)} className="text-indigo-500 bg-white p-2 rounded-xl shadow-sm hover:bg-indigo-50 transition-colors shrink-0"><i data-lucide="volume-2" className="w-5 h-5"></i></button>
                                                                        <span className="text-slate-800 text-lg font-medium" dangerouslySetInnerHTML={{ __html: ex.g }}></span>
                                                                    </div>
                                                                    <div className="text-indigo-700 font-bold ar-text border-t border-indigo-200/50 pt-3 mt-3">{ex.a}</div>
                                                                </li>
                                                            ))}
                                                        </ul>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </section>
                                </div>
                            )}

                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
