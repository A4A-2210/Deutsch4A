    <script type="text/babel">
        // --- HELPERS FOR AUDIO & SPEECH ---
        const playAudio = (text, e) => {
            if (e) e.stopPropagation();
            const cleanText = text.replace(/<[^>]+>/g, '');
            const utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.lang = 'de-DE';
            window.speechSynthesis.speak(utterance);
        };

        const SpeechTester = ({ targetText }) => {
            const [status, setStatus] = React.useState('idle');
            const [heard, setHeard] = React.useState('');

            const listen = (e) => {
                if (e) e.stopPropagation();
                if (!('webkitSpeechRecognition' in window)) {
                    alert('المتصفح ده مش بيدعم تسجيل الصوت، جرب Google Chrome.');
                    return;
                }
                const recognition = new webkitSpeechRecognition();
                recognition.lang = 'de-DE';
                recognition.interimResults = false;

                recognition.onstart = () => setStatus('listening');
                recognition.onresult = (event) => {
                    const speechResult = event.results[0][0].transcript;
                    setHeard(speechResult);

                    const clean = (str) => str.replace(/<[^>]+>/g, '').toLowerCase().replace(/[.,!?]/g, '').trim();
                    const targetClean = clean(targetText);
                    const heardClean = clean(speechResult);

                    if (heardClean.includes(targetClean) || targetClean.includes(heardClean) || heardClean === targetClean) {
                        setStatus('success');
                    } else {
                        setStatus('fail');
                    }
                };
                recognition.onerror = () => setStatus('fail');
                recognition.onend = () => { if (status === 'listening') setStatus('idle'); };
                recognition.start();
            };

            return (
                <div className="inline-flex items-center gap-2" onClick={(e) => e.stopPropagation()}>
                    <button onClick={listen} title="جرب تنطقها" className={`p-2 rounded-full transition-all duration-300 shadow-sm ${status === 'listening' ? 'bg-red-500 text-white animate-pulse scale-110' : 'bg-slate-100 text-slate-600 hover:bg-slate-200 hover:scale-105'}`}>
                        <i data-lucide="mic" className="w-4 h-4"></i>
                    </button>
                    {status === 'success' && <span className="text-emerald-500 text-xs font-bold ar-text animate-bounce">✅ ممتاز!</span>}
                    {status === 'fail' && <span className="text-red-500 text-xs ar-text font-bold" title={`سمعت: ${heard}`}>❌ جرب تاني</span>}
                </div>
            );
        };

                { id: 'e21', type: "Lunch Details", ger: "Zu Mittag esse ich gern Salat.", eng: "For lunch I like eating salad.", ar: "ع الغدا بحب آكل سلطة.", context: "للرد بالأكل." },
                { id: 'e22', type: "Lunch Details", ger: "Ich esse mittags zu Hause mit meiner Familie.", eng: "I eat lunch at home with my family.", ar: "بتغدى في البيت مع عيلتي.", context: "للرد بالتفاصيل." },

                { id: 'e23', type: "Das sagt der Kellner", ger: "Was möchten Sie trinken?", eng: "What would you like to drink?", ar: "تحب تشرب إيه؟", context: "الجرسون يسأل." },
                { id: 'e24', type: "Das sagt der Kellner", ger: "Was kann ich Ihnen bringen?", eng: "What can I bring you?", ar: "أقدر أجيب لحضرتك إيه؟", context: "الجرسون يسأل." },
                { id: 'e25', type: "Das sagt der Kellner", ger: "Haben Sie schon gewählt?", eng: "Have you already decided?", ar: "اخترت هتاكل إيه؟", context: "الجرسون يسأل." },
                { id: 'e26', type: "Das sagt der Kellner", ger: "Guten Appetit!", eng: "Enjoy your meal!", ar: "بالهنا والشفا!", context: "الجرسون عند تقديم الأكل." },
                { id: 'e27', type: "Das sagt der Kellner", ger: "Waren Sie mit dem Essen zufrieden?", eng: "Were you satisfied with the food?", ar: "هل كنت راضي عن الأكل؟", context: "الجرسون يسأل بعد الأكل." },
                { id: 'e28', type: "Das sagt der Kellner", ger: "Hat es Ihnen geschmeckt?", eng: "Did you like it?", ar: "الأكل عجبك؟", context: "الجرسون يسأل بعد الأكل." },
                { id: 'e29', type: "Das sagt der Kellner", ger: "Haben Sie sonst noch einen Wunsch?", eng: "Do you have any other request?", ar: "عندك أي طلب تاني؟", context: "الجرسون يسأل للتأكد." },
                { id: 'e30', type: "Das sagt der Kellner", ger: "Zahlen Sie zusammen oder getrennt?", eng: "Will you pay together or separately?", ar: "هتدفعوا مع بعض ولا كل واحد لوحده؟", context: "الجرسون عند دفع الحساب." },

                { id: 'e31', type: "Das sagt der Gast", ger: "Ich möchte … / Ich nehme …", eng: "I would like … / I'll take …", ar: "أنا عايز... / هاخد...", context: "الزبون عند الطلب." },
                { id: 'e32', type: "Das sagt der Gast", ger: "Ich hätte gern … / Ich trinke …", eng: "I would like … / I drink …", ar: "أود الحصول على... / هشرب...", context: "الزبون عند الطلب." },
                { id: 'e33', type: "Das sagt der Gast", ger: "Haben Sie meine Bestellung vergessen?", eng: "Did you forget my order?", ar: "أنت نسيت طلبي؟", context: "الزبون للشكوى." },
                { id: 'e34', type: "Das sagt der Gast", ger: "Das Essen ist kalt.", eng: "The food is cold.", ar: "الأكل بارد.", context: "الزبون للشكوى." },
                { id: 'e35', type: "Das sagt der Gast", ger: "Kann ich bitte noch (etwas Salz) haben?", eng: "Could I have (some salt), please?", ar: "ممكن تديني (شوية ملح) كمان لو سمحت؟", context: "الزبون لطلب شيء إضافي." },
                { id: 'e36', type: "Das sagt der Gast", ger: "Prost! / Zum Wohl!", eng: "Cheers!", ar: "في صحتك! (عند الشرب)", context: "الزبون للتحية قبل الشرب." },
                { id: 'e37', type: "Das sagt der Gast", ger: "Das Essen war hervorragend/köstlich/sehr gut.", eng: "The food was excellent/delicious/very good.", ar: "الأكل كان ممتاز/لذيذ/جيد جداً.", context: "الزبون لإبداء الإعجاب." },
                { id: 'e38', type: "Das sagt der Gast", ger: "Wir hätten gern die Rechnung.", eng: "We would like the bill, please.", ar: "عايزين الحساب لو سمحت.", context: "الزبون لطلب الحساب." },
                { id: 'e39', type: "Das sagt der Gast", ger: "Wir möchten dann zahlen.", eng: "We would like to pay.", ar: "إحنا عايزين ندفع.", context: "الزبون لطلب الدفع." },

                { id: 'e40', type: "Fragen & Tipps", ger: "Welches Restaurant besuchen Sie am liebsten?", eng: "Which restaurant do you like to visit the most?", ar: "إيه المطعم المفضل ليك؟", context: "سؤال عن المطعم." },
                { id: 'e41', type: "Fragen & Tipps", ger: "Können Sie ein Restaurant empfehlen?", eng: "Can you recommend a restaurant?", ar: "ممكن ترشحلي مطعم؟", context: "لطلب النصيحة." },
                { id: 'e42', type: "Fragen & Tipps", ger: "Muss man Plätze reservieren?", eng: "Do you have to reserve tables?", ar: "هل لازم نحجز مكان؟", context: "للسؤال عن الحجز." },
                { id: 'e43', type: "Fragen & Tipps", ger: "Wann isst man normalerweise (mittags/abends)?", eng: "When do people usually eat (lunch/dinner)?", ar: "الناس عادة بتاكل إمتى (الضهر/بالليل)؟", context: "للسؤال عن أوقات الأكل." },
                { id: 'e44', type: "Fragen & Tipps", ger: "Bringt der Kellner die Rechnung gleich nach dem Essen?", eng: "Does the waiter bring the bill right after the meal?", ar: "هل الجرسون بيجيب الحساب بعد الأكل على طول؟", context: "سؤال عن العادات." },
                { id: 'e45', type: "Fragen & Tipps", ger: "Gibt man Trinkgeld?", eng: "Do people give tips?", ar: "هل بندفع بقشيش؟", context: "سؤال عن البقشيش." },

                { id: 'e46', type: "Beim Einkaufen (البائع)", ger: "Möchten Sie noch etwas?", eng: "Would you like anything else?", ar: "هل تود شيئاً آخر؟", context: "البائع يسأل" },
                { id: 'e47', type: "Beim Einkaufen (البائع)", ger: "Kommt noch was dazu?", eng: "Anything else to add?", ar: "أي شيء آخر يضاف؟", context: "البائع يسأل" },
                { id: 'e48', type: "Beim Einkaufen (البائع)", ger: "Sonst noch etwas?", eng: "Anything else?", ar: "أي شيء آخر؟", context: "البائع يسأل" },
                { id: 'e49', type: "Beim Einkaufen (البائع)", ger: "Wie viel darf es denn sein?", eng: "How much would you like?", ar: "ما الكمية التي تريدها؟", context: "البائع يسأل عن الكمية" },
                { id: 'e50', type: "Beim Einkaufen (البائع)", ger: "Wir haben heute Schinken im Angebot.", eng: "Today we have ham on offer.", ar: "لدينا عرض على اللحم اليوم.", context: "البائع يقترح عرضاً" },
                { id: 'e51', type: "Beim Einkaufen (البائع)", ger: "Möchten Sie mal probieren?", eng: "Would you like to try?", ar: "هل تود أن تتذوق؟", context: "البائع يعرض التذوق" },
                { id: 'e52', type: "Beim Einkaufen (البائع)", ger: "Dann bekomme ich 19,50 Euro, bitte.", eng: "Then that will be €19.50, please.", ar: "إذن الحساب 19.50 يورو لو سمحت.", context: "البائع يطلب الحساب" },

                { id: 'e53', type: "Beim Einkaufen (الزبون)", ger: "Ich hätte gern zwei Kilo Rindfleisch.", eng: "I would like two kilos of beef.", ar: "أود 2 كيلو لحم بقري.", context: "الزبون يطلب" },
                { id: 'e54', type: "Beim Einkaufen (الزبون)", ger: "Ich nehme ein ½ Kilo Zwiebeln.", eng: "I’ll take half a kilo of onions.", ar: "سآخذ نصف كيلو بصل.", context: "الزبون يطلب" },
                { id: 'e55', type: "Beim Einkaufen (الزبون)", ger: "Ist dieser Käse mit frischen Kräutern?", eng: "Is this cheese with fresh herbs?", ar: "هل هذه الجبنة بالأعشاب الطازجة؟", context: "الزبون يسأل عن منتج" },
                { id: 'e56', type: "Beim Einkaufen (الزبون)", ger: "Der Schinken schmeckt gut.", eng: "The ham tastes good.", ar: "اللحم طعمه جيد.", context: "الزبون يبدي رأيه بعد التذوق" },
                { id: 'e57', type: "Beim Einkaufen (الزبون)", ger: "Diese Tomaten sehen gut aus.", eng: "These tomatoes look good.", ar: "هذه الطماطم تبدو جيدة.", context: "الزبون يبدي إعجابه بالمنتج" },
                { id: 'e58', type: "Beim Einkaufen (الزبون)", ger: "Wie viel kosten die Tomaten?", eng: "How much do the tomatoes cost?", ar: "بكم الطماطم؟", context: "الزبون يسأل عن السعر" },
                { id: 'e59', type: "Beim Einkaufen (الزبون)", ger: "Das ist alles.", eng: "That’s all.", ar: "هذا كل شيء.", context: "الزبون ينهي طلبه" }
            ],
            dialogues: [
                {
                    id: 'd1', title: "Beim Fleischer (عند الجزار)", icon: "scissors",
                    lines: [
                        { speaker: "Verkäufer", text: "Guten Tag, was darf es sein?", en: "Good day, what would you like?", ar: "يوم سعيد، تؤمر بإيه؟" },
                        { speaker: "Peter", text: "Hm … ich hätte gern zwei Kilo mageres Rindfleisch.", en: "I’d like two kilos of lean beef.", ar: "عايز ٢ كيلو لحمة بقري حمراء." },
                        { speaker: "Verkäufer", text: "Das sind zwei Kilo und 100 Gramm.", en: "That’s two kilos and 100 grams.", ar: "دول ٢ كيلو و ١٠٠ جرام." },
                        { speaker: "Peter", text: "Ja, das ist gut.", en: "Yes, that’s fine.", ar: "تمام، حلو جداً." },
                        { speaker: "Verkäufer", text: "Möchten Sie noch etwas?", en: "Would you like anything else?", ar: "محتاج حاجة تانية؟" },
                        { speaker: "Peter", text: "Ja, 300 Gramm ungarische Salami, bitte.", en: "Yes, 300 grams of Hungarian salami, please.", ar: "أيوه، ٣٠٠ جرام سلامي مجري لو سمحت." },
                        { speaker: "Verkäufer", text: "In Scheiben oder im Ganzen?", en: "Sliced or whole?", ar: "شرايح ولا حتة واحدة؟" },
                        { speaker: "Peter", text: "In Scheiben, bitte.", en: "Sliced, please.", ar: "شرايح." },
                        { speaker: "Verkäufer", text: "Wir haben heute italienischen Schinken im Angebot. 200 Gramm für 2,90 Euro. Möchten Sie mal probieren?", en: "Today we have Italian ham on offer. 200 grams for €2.90. Would you like to try some?", ar: "عندنا عرض على اللحم الإيطالي، ٢٠٠ جرام بـ ٢.٩٠ يورو. تحب تدوق؟" },
                        { speaker: "Peter", text: "Ja gerne … Hm, schmeckt gut. Davon nehme ich auch noch 300 Gramm.", en: "Yes, gladly … Hm, tastes good. I’ll take another 300 grams of that as well.", ar: "ياريت... ممم، طعمه حلو. هاخد منه ٣٠٠ جرام كمان." },
                        { speaker: "Verkäufer", text: "Kommt noch was dazu?", en: "Anything else?", ar: "في حاجة تانية؟" },
                        { speaker: "Peter", text: "Nein, danke.", en: "No, thank you.", ar: "لا شكراً." },
                        { speaker: "Verkäufer", text: "Das macht 27 Euro und 90 Cent.", en: "That comes to €27.90.", ar: "كده الحساب ٢٧ يورو و ٩٠ سنت." }
                    ]
                },
                {
                    id: 'd2', title: "Auf dem Markt 1 (في السوق 1)", icon: "shopping-bag",
                    lines: [
                        { speaker: "Verkäufer", text: "Was darf es sein?", en: "What would you like?", ar: "طلباتك إيه؟" },
                        { speaker: "Petra", text: "Ich nehme ein halbes Kilo Zwiebeln, ein Kilo Bioäpfel und ein Kilo Tomaten.", en: "I’ll take half a kilo of onions, a kilo of organic apples, and a kilo of tomatoes.", ar: "هاخد نص كيلو بصل، كيلو تفاح أورجانيك، وكيلو طماطم." },
                        { speaker: "Verkäufer", text: "Sind das holländische Tomaten?", en: "Do you mean the Dutch tomatoes?", ar: "تقصدي الطماطم الهولندي؟" },
                        { speaker: "Verkäufer", text: "Nein, spanische Tomaten. Das hier sind holländische. Die kosten 4,50 Euro.", en: "No, Spanish tomatoes. These here are Dutch ones. They cost €4.50 per kilo.", ar: "لا إسباني، دول هنا هم الهولندي وبـ ٤.٥٠ يورو." },
                        { speaker: "Petra", text: "Und was kostet ein Kilo spanische Tomaten?", en: "And how much is a kilo of Spanish tomatoes?", ar: "وبكام كيلو الطماطم الإسباني؟" },
                        { speaker: "Verkäufer", text: "1,80 Euro.", en: "€1.80.", ar: "١.٨٠ يورو." },
                        { speaker: "Petra", text: "Dann nehme ich ein Kilo spanische Tomaten. Die sehen sehr gut aus.", en: "Then I’ll take a kilo of Spanish tomatoes. They look very good.", ar: "خلاص هاخد كيلو إسباني. شكلهم حلو أوي." },
                        { speaker: "Verkäufer", text: "Kommt noch was dazu?", en: "Anything else?", ar: "في حاجة تانية هتضيفيها؟" },
                        { speaker: "Petra", text: "Ja, ich möchte noch zwei reife Mangos. Ah, ich sehe gerade, dass Sie auch Käse haben. Ist dieser Käse mit frischen Kräutern?", en: "Yes, I’d also like two ripe mangoes. Ah, I just noticed you also have cheese. Is this cheese with fresh herbs?", ar: "أيوه، عايزة منجايتين مستويين. أه، لسة شايفة إن عندكم جبنة، هي دي بالأعشاب الطازجة؟" },
                        { speaker: "Verkäufer", text: "Ja, dieser Käse ist mit frischen Kräutern und dieser hier ist mit frischem Knoblauch.", en: "Yes, this cheese has fresh herbs, and this one here has fresh garlic.", ar: "أيوه، الجبنة دي بالأعشاب الطازجة ودي بالثوم الطازج." },
                        { speaker: "Petra", text: "Hm, schwierige Wahl. Ich nehme den Käse mit dem Knoblauch.", en: "Hm, difficult choice. I’ll take the cheese with garlic.", ar: "امم، اختيار صعب. هاخد الجبنة اللي بالثوم." },
                        { speaker: "Verkäufer", text: "Wie viel von dem Käse darf es denn sein?", en: "How much of the cheese would you like?", ar: "تحبي قد إيه من الجبنة دي؟" },
                        { speaker: "Petra", text: "250 Gramm.", en: "250 grams.", ar: "٢٥٠ جرام." },
                        { speaker: "Verkäufer", text: "Sonst noch etwas?", en: "Anything else?", ar: "أي شيء آخر؟" },
                        { speaker: "Petra", text: "Nein, danke, das ist alles.", en: "No, thank you, that’s all.", ar: "لا شكراً، ده كل حاجة." },
                        { speaker: "Verkäufer", text: "Dann bekomme ich bitte 19,50 Euro.", en: "Then that will be €19.50, please.", ar: "كده الحساب ١٩.٥٠ يورو لو سمحتي." }
                    ]
                },
                {
                    id: 'd3', title: "Auf dem Markt 2 (في السوق 2)", icon: "shopping-cart",
                    lines: [
                        { speaker: "Verkäuferin", text: "Was darf es sein?", en: "What would you like?", ar: "تؤمر بإيه؟" },
                        { speaker: "Käufer", text: "Ich möchte einen grünen Salat, fünf Möhren und zwei Kilo Kartoffeln.", en: "I would like a green salad, five carrots, and two kilos of potatoes.", ar: "عايز سلطة خضراء، ٥ جزرات، و٢ كيلو بطاطس." },
                        { speaker: "Verkäuferin", text: "Kommt noch etwas dazu?", en: "Anything else?", ar: "حاجة تانية مع دول؟" },
                        { speaker: "Käufer", text: "Was kostet ein Kilo Äpfel?", en: "How much does one kilo of apples cost?", ar: "بكام كيلو التفاح؟" },
                        { speaker: "Verkäuferin", text: "2,50 Euro.", en: "2.50 euros.", ar: "٢.٥٠ يورو." },
                        { speaker: "Käufer", text: "Dann nehme ich ein Kilo Äpfel.", en: "Then I’ll take one kilo of apples.", ar: "يبقى هاخد كيلو تفاح." },
                        { speaker: "Verkäuferin", text: "Sonst noch etwas?", en: "Anything else?", ar: "حاجة كمان؟" },
                        { speaker: "Käufer", text: "Ich hätte gern noch zwei Orangen, drei Kiwis, vier Birnen und Käse mit Knoblauch.", en: "I would also like two oranges, three kiwis, four pears, and garlic cheese.", ar: "عايز كمان برتقالتين، ٣ كيوي، ٤ كمثرى وجبنة بالثوم." },
                        { speaker: "Verkäuferin", text: "Leider haben wir keinen Käse mit Knoblauch. Das hier ist Käse mit Paprika. Er schmeckt auch sehr gut.", en: "Unfortunately, we don’t have garlic cheese. This one here is cheese with paprika. It also tastes very good.", ar: "للأسف معندناش جبنة بالثوم. دي جبنة بالفلفل وطعمها حلو جداً برضه." },
                        { speaker: "Käufer", text: "Was ist der Preis für 250 Gramm?", en: "What is the price for 250 grams?", ar: "سعر الـ ٢٥٠ جرام كام؟" },
                        { speaker: "Verkäuferin", text: "250 Gramm kosten fünf Euro.", en: "250 grams cost five euros.", ar: "الـ ٢٥٠ جرام بـ ٥ يورو." },
                        { speaker: "Käufer", text: "Das finde ich teuer. Ich nehme nur 100 Gramm.", en: "I find that expensive. I’ll take only 100 grams.", ar: "ده غالي، هاخد ١٠٠ جرام بس." },
                        { speaker: "Verkäuferin", text: "Wir haben auch holländischen Käse im Angebot.", en: "We also have Dutch cheese on offer.", ar: "عندنا كمان جبنة هولندي عليها عرض." },
                        { speaker: "Käufer", text: "Danke. Ich brauche keinen anderen Käse.", en: "Thank you. I don’t need any other cheese.", ar: "شكراً، مش محتاج جبنة تانية." },
                        { speaker: "Verkäuferin", text: "Wünschen Sie noch etwas?", en: "Would you like anything else?", ar: "تتمنى حاجة كمان؟" },
                        { speaker: "Käufer", text: "Nein, das ist alles.", en: "No, that’s all.", ar: "لا، ده كل حاجة." },
                        { speaker: "Verkäuferin", text: "Das macht 15,50 Euro.", en: "That comes to 15.50 euros.", ar: "كده الحساب ١٥.٥٠ يورو." }
                    ]
                },
                {
                    id: 'd4', title: "Auf dem Markt 3 (Kurz) (في السوق - قصير)", icon: "store",
                    lines: [
                        { speaker: "Verkäufer", text: "Was darf es sein?", en: "What would you like?", ar: "تؤمر بإيه؟" },
                        { speaker: "Kunde", text: "Ich hätte gern ein Kilo Äpfel.", en: "I’d like a kilo of apples.", ar: "أود كيلو تفاح." },
                        { speaker: "Verkäufer", text: "Wie viel möchten Sie davon?", en: "How much would you like of that?", ar: "عايز قد إيه منه؟" },
                        { speaker: "Kunde", text: "Ein Kilo, bitte.", en: "A kilo, please.", ar: "كيلو لو سمحت." },
                        { speaker: "Verkäufer", text: "Kommt noch was dazu?", en: "Anything else to add?", ar: "أي شيء يضاف؟" },
                        { speaker: "Kunde", text: "Ja, ein halbes Kilo Tomaten.", en: "Yes, half a kilo of tomatoes.", ar: "نعم، نص كيلو طماطم." },
                        { speaker: "Verkäufer", text: "Wir haben gerade Trauben im Angebot. Möchten Sie mal probieren?", en: "We currently have grapes on special. Would you like to try some?", ar: "عندنا عرض على العنب. تحب تدوق؟" },
                        { speaker: "Kunde", text: "Ja, gerne. Wie viel kostet ein Kilo?", en: "Yes, gladly. How much is a kilo?", ar: "ياريت، الكيلو بكام؟" },
                        { speaker: "Verkäufer", text: "2,50 Euro.", en: "€2.50.", ar: "٢.٥٠ يورو." },
                        { speaker: "Kunde", text: "Dann nehme ich ein Kilo.", en: "Then I’ll take a kilo.", ar: "إذن هاخد كيلو." },
                        { speaker: "Verkäufer", text: "Darf es noch etwas sein?", en: "Would you like anything else?", ar: "هل أضيف شيء آخر؟" },
                        { speaker: "Kunde", text: "Nein, danke, das ist alles.", en: "No, thank you, that’s all.", ar: "لا شكراً." },
                        { speaker: "Verkäufer", text: "Dann macht das 6 Euro.", en: "That comes to €6.", ar: "الحساب ٦ يورو." },
                        { speaker: "Kunde", text: "Bitte schön.", en: "Here you go.", ar: "تفضل." }
                    ]
                },
                {
                    id: 'd5', title: "Im Restaurant bestellen (الطلب في المطعم)", icon: "utensils",
                    lines: [
                        { speaker: "Kellner", text: "Guten Abend.", en: "Good evening.", ar: "مساء الخير." },
                        { speaker: "Kellner", text: "Haben Sie reserviert?", en: "Do you have a reservation?", ar: "حاجزين؟" },
                        { speaker: "Kellner", text: "Unter welchem Namen?", en: "Under what name?", ar: "باسم مين؟" },
                        { speaker: "Kellner", text: "Ein Tisch für zwei Personen. Hier ist Ihr Tisch.", en: "A table for two. Here is your table.", ar: "ترابيزة لشخصين. دي ترابيزتكم." },
                        { speaker: "Gast", text: "Können wir vielleicht am Fenster sitzen?", en: "Could we maybe sit by the window?", ar: "ممكن نقعد على الشباك؟" },
                        { speaker: "Kellner", text: "Tut mir leid, die Tische am Fenster sind reserviert.", en: "I’m sorry, the tables by the window are reserved.", ar: "للأسف الترابيزات اللي على الشباك محجوزة." },
                        { speaker: "Kellner", text: "Hier ist die Speisekarte.", en: "Here is the menu.", ar: "اتفضلوا المنيو." },
                        { speaker: "Kellner", text: "Möchten Sie schon etwas trinken?", en: "Would you like something to drink already?", ar: "تحبوا تشربوا حاجة دلوقتي؟" },
                        { speaker: "Gast 1", text: "Ich nehme ein helles Bier, vielleicht ein Hefeweizen.", en: "I’ll have a light beer, maybe a wheat beer.", ar: "هاخد بيرة فاتحة، ممكن بيرة قمح." },
                        { speaker: "Gast 2", text: "Ich nehme ein Mineralwasser. Ohne Sprudel bitte.", en: "I’ll have mineral water. Without gas, please.", ar: "هاخد مياه معدنية. من غير صودا لو سمحت." },
                        { speaker: "Kellner", text: "Es gibt nur vier Vorspeisen, vier Hauptgerichte und drei Desserts. Dafür ist alles frisch.", en: "There are only four starters, four main dishes, and three desserts. But everything is fresh.", ar: "عندنا بس ٤ مقبلات، ٤ أطباق رئيسية و٣ حلويات. بس كل حاجة طازة." },
                        { speaker: "Gast 1", text: "Anton hat gesagt, dass das Essen hier hervorragend ist.", en: "Anton said that the food here is excellent.", ar: "أنطون قال إن الأكل هنا ممتاز." },
                        { speaker: "Gast 2", text: "War Anton schon mal hier?", en: "Has Anton been here before?", ar: "هو أنطون كان هنا قبل كده؟" },
                        { speaker: "Gast 1", text: "Ja, sie haben hier ihren Hochzeitstag gefeiert.", en: "Yes, they celebrated their wedding anniversary here.", ar: "أيوه، هما احتفلوا بعيد جوازهم هنا." },
                        { speaker: "Gast 2", text: "Was nimmst du?", en: "What will you take?", ar: "هتاخد إيه؟" },
                        { speaker: "Gast 1", text: "Ich nehme den Lachs oder den Tafelspitz.", en: "I’ll take the salmon or the boiled beef.", ar: "هاخد السلمون أو اللحم المسلوق." },
                        { speaker: "Gast 2", text: "Isst du keine Vorspeise?", en: "Aren’t you having a starter?", ar: "مش هتاكل مقبلات؟" },
                        { speaker: "Gast 1", text: "Vielleicht die Tagessuppe. Ich esse den Tafelspitz und als Vorspeise einen Salat.", en: "Maybe the soup of the day. I’ll have the boiled beef and a salad as a starter.", ar: "ممكن شوربة اليوم. هاكل اللحم المسلوق وسلطة كمقبلات." },
                        { speaker: "Gast 2", text: "Möhrensalat mit Ingwer … so was schmeckt?", en: "Carrot salad with ginger … does that taste good?", ar: "سلطة جزر بالجنزبيل.. طعمها حلو دي؟" },
                        { speaker: "Kellner", text: "Haben Sie schon gewählt?", en: "Have you decided already?", ar: "اخترتوا هتاكلوا إيه؟" },
                        { speaker: "Gast 1", text: "Ich nehme das Rindfleisch und den Möhrensalat.", en: "I’ll take the beef and the carrot salad.", ar: "هاخد اللحم البقري وسلطة الجزر." },
                        { speaker: "Gast 2", text: "Was gibt es als Tagessuppe?", en: "What is the soup of the day?", ar: "إيه هي شوربة اليوم؟" },
                        { speaker: "Kellner", text: "Fischsuppe nach Art des Hauses.", en: "Fish soup, house specialty.", ar: "شوربة سمك مخصوصة." },
                        { speaker: "Gast 2", text: "Dann nehme ich keine Vorspeise, nur den Lachs.", en: "Then I won’t take a starter, only the salmon.", ar: "خلاص مش هاخد مقبلات، هاخد السلمون بس." },
                        { speaker: "Kellner", text: "Darf es noch etwas zu trinken sein?", en: "Would you like something else to drink?", ar: "تحبوا تشربوا حاجة تانية؟" },
                        { speaker: "Gast 1", text: "Im Moment nicht, vielleicht später.", en: "Not at the moment, maybe later.", ar: "مش دلوقتي، ممكن بعدين." }
                    ]
                },
                {
                    id: 'd6', title: "Konversation: Kochsendungen (محادثة: برامج الطبخ)", icon: "tv",
                    lines: [
                        { speaker: "Person A", text: "Haben Sie schon einmal in einem sehr guten Restaurant gegessen?", en: "Have you ever eaten in a very good restaurant?", ar: "أكلت قبل كده في مطعم كويس جداً؟" },
                        { speaker: "Person B", text: "Ja, einmal in einem italienischen Gourmet-Restaurant in Berlin.", en: "Yes, once in an Italian gourmet restaurant in Berlin.", ar: "أيوه، مرة في مطعم ذواقة إيطالي في برلين." },
                        { speaker: "Person A", text: "Was haben Sie gegessen?", en: "What did you eat?", ar: "أكلت إيه؟" },
                        { speaker: "Person B", text: "Ich habe frische Pasta mit Trüffeln und ein Glas Rotwein gehabt. Es war fantastisch!", en: "I had fresh pasta with truffles and a glass of red wine. It was fantastic!", ar: "أكلت مكرونة فريش بالكمأة (الترافل) وكاس نبيذ أحمر. كان رائع!" },
                        { speaker: "Person A", text: "Sehen Sie manchmal Kochsendungen im Fernsehen?", en: "Do you sometimes watch cooking shows on TV?", ar: "بتتفرج أحياناً على برامج طبخ في التليفزيون؟" },
                        { speaker: "Person B", text: "Ja, sehr oft. Meine Lieblingssendung ist „Das perfekte Dinner“.", en: "Yes, very often. My favorite show is “The Perfect Dinner.”", ar: "أيوه، كتير جداً. برنامجي المفضل هو العشاء المثالي." },
                        { speaker: "Person A", text: "Können Sie gut kochen?", en: "Can you cook well?", ar: "بتعرف تطبخ كويس؟" },
                        { speaker: "Person B", text: "Ja, ich koche gern. Am liebsten mache ich Lasagne und Suppen.", en: "Yes, I like cooking. I especially enjoy making lasagna and soups.", ar: "أيوه بحب أطبخ، وأكتر حاجة بحب أعملها اللازانيا والشوربات." },
                        { speaker: "Person A", text: "Toll, dann laden Sie mich doch einmal ein!", en: "Great, then you should invite me sometime!", ar: "ممتاز، ابقى اعزميني بقى مرة!" },
                        { speaker: "Person B", text: "Sehr gern!", en: "With pleasure!", ar: "بكل سرور!" }
                    ]
                }
            ],
            culture: [
                {
                    id: 'c1', title: "Was die Deutschen so essen und trinken",
                    lines: [
                        { g: "Die Anzahl der Bücher über gesunde Ernährung ist riesig.", a: "عدد الكتب عن التغذية الصحية ضخم جداً." },
                        { g: "Auch Fernsehsendungen und Zeitschriften geben regelmäßig Tipps zum richtigen Frühstück, Mittag- oder Abendessen.", a: "وبرامج التليفزيون والمجلات بتدي نصايح بانتظام للفطار والغدا والعشا." },
                        { g: "Das theoretische Wissen über gesunde Ernährung ist also vorhanden – aber wie sieht es in der Praxis aus?", a: "المعرفة النظرية موجودة، بس في الواقع إيه الوضع؟" },
                        { g: "Der Ernährungsreport im Auftrag der Bundesregierung und eine Umfrage des Meinungsforschungsinstituts Forsa geben Antworten.", a: "تقرير التغذية بتكليف من الحكومة الفيدرالية واستطلاع رأي معهد فورسا بيدي إجابات." },
                        { g: "Lieblingsgericht: Mehr als ein Drittel der Deutschen isst am liebsten Nudeln.", a: "الأكلة المفضلة: أكتر من تلت الألمان بيحبوا المكرونة أكتر حاجة." },
                        { g: "Fleisch: Nur drei Prozent der Deutschen sind Vegetarier und essen überhaupt kein Fleisch,", a: "اللحوم: 3% بس من الألمان نباتيين ومبياكلوش لحمة خالص،" },
                        { g: "bei den Frauen sind es sechs Prozent, bei den Männern ist es nur ein Prozent.", a: "بالنسبة للستات 6%، وبالنسبة للرجالة 1% بس." },
                        { g: "Fast die Hälfte der Männer isst jeden Tag Fleisch – bei den Frauen ist es nur jede Fünfte.", a: "تقريباً نص الرجالة بياكلوا لحمة كل يوم – بالنسبة للستات واحدة من كل خمسة بس." },
                        { g: "Obst und Gemüse: 85 Prozent der Frauen essen täglich Obst und Gemüse, bei den Männern sind es 66 Prozent.", a: "الخضار والفاكهة: 85% من الستات بياكلوا خضار وفاكهة كل يوم، مقابل 66% للرجالة." },
                        { g: "Süßigkeiten: Frauen essen gern Süßes? Ja, aber auch Männer naschen gern: 22 Prozent der Männer und 21 Prozent der Frauen essen gern Süßigkeiten.", a: "الحلويات: هل النساء يحبون الحلويات؟ نعم، لكن الرجال أيضاً يحبون النقنقة: 22% من الرجالة و 21% من الستات بيحبوا ياكلوا حلويات." },
                        { g: "Kochen: 93 Prozent der deutschen Frauen können nach eigenen Aussagen gut kochen,", a: "الطبخ: 93% من الستات الألمان بيقولوا إنهم بيعرفوا يطبخوا كويس،" },
                        { g: "auch 58 Prozent der Männer loben ihre eigenen Kochkünste.", a: "وكمان 58% من الرجالة بيمدحوا مهاراتهم في الطبخ." },
                        { g: "Das bedeutet aber nicht, dass die Deutschen täglich kochen.", a: "لكن ده مش معناه إن الألمان بيطبخوا كل يوم." },
                        { g: "Nur in 41 Prozent der Haushalte gibt es täglich frisch gekochtes Essen.", a: "41% بس من البيوت بيكون فيها أكل طازة مطبوخ كل يوم." },
                        { g: "Fertiggerichte: 42 Prozent der jungen Erwachsenen essen mindestens zweimal in der Woche Fertiggerichte, 17 Prozent jeden Tag.", a: "الأكل الجاهز: 42% من الشباب البالغين بياكلوا أكل جاهز مرتين في الأسبوع ع الأقل، و 17% كل يوم." },
                        { g: "Preis: Für junge Leute zwischen 14 und 18 spielt der Preis die größte Rolle beim Einkaufen.", a: "السعر: للشباب من 14 لـ 18 سنة السعر بيلعب الدور الأكبر في الشراء." },
                        { g: "Über 30-Jährige achten mehr auf die Qualität und die Herkunft der Lebensmittel.", a: "اللي فوق الـ 30 بيهتموا أكتر بجودة ومصدر الأكل." },
                        { g: "Bereits jeder Fünfte nutzt im Supermarkt sein Handy und sucht im Internet nach Produktinformationen.", a: "بالفعل واحد من كل خمسة بيستخدم تليفونه في السوبر ماركت ويدور على النت على معلومات المنتجات." },
                        { g: "Konzentration auf das Essen: Viele Singles geben an, dass sie neben dem Essen fernsehen, das Internet nutzen oder lesen.", a: "التركيز على الأكل: كتير من العزاب بيقولوا إنهم بيتفرجوا ع التليفزيون، بيستخدموا النت أو بيقرأوا أثناء الأكل." },
                        { g: "Insgesamt sagen 50 Prozent der Deutschen, dass für sie gesunde Ernährung zu wenig Zeit hat.", a: "إجمالاً 50% من الألمان بيقولوا إن الأكل الصحي مفيش وقت كفاية عشانه بالنسبة لهم." }
                    ]
                },
                {
                    id: 'c2', title: "Der Koch David Görne",
                    lines: [
                        { g: "Es war ein Tag wie jeder andere.", a: "كان يوم عادي جداً." },
                        { g: "Der Koch David Görne stand mit seiner Schürze in seinem Restaurant in einem kleinen Dorf in Frankreich.", a: "الطباخ ديفيد جورن كان واقف بمريلته في مطعمه في قرية صغيرة في فرنسا." },
                        { g: "Plötzlich klingelte das Telefon. Am anderen Ende der Leitung war die Chefin des Guide Michelin.", a: "فجأة التليفون رن. على الناحية التانية من الخط كانت مديرة دليل ميشلان." },
                        { g: "Sie teilte ihm mit, dass er für seine Arbeit einen Michelin-Stern bekommt.", a: "بلغته إنه هياخد نجمة ميشلان على شغله." },
                        { g: "Bisher war der junge Koch aus Hamburg ein Geheimtipp in der Pariser Gourmet-Szene, jetzt gehört er zu den großen Köchen in Frankreich!", a: "الطباخ الشاب اللي من هامبورج كان لحد دلوقتي سر في عالم الذواقة في باريس، دلوقتي هو بقى من كبار الطباخين في فرنسا!" },
                        { g: "Schon als Kind sah David seinen Eltern gern beim Kochen zu.", a: "من وهو طفل كان ديفيد بيحب يتفرج على أهله وهم بيطبخوا." },
                        { g: "Doch seine Eltern wollten, dass David studiert. Also fing er mit einem Jurastudium an.", a: "بس أهله كانوا عايزينه يدرس، عشان كده بدأ يدرس حقوق." },
                        { g: "In den ersten Semestern las David mehr Kochbücher als Jurabücher und er sah bald, dass Anwalt nicht der richtige Beruf für ihn ist.", a: "في الفصول الدراسية الأولى قرأ كتب طبخ أكتر من كتب الحقوق، واكتشف قريب إن المحاماة مش هي المهنة المناسبة ليه." },
                        { g: "Im dritten Semester brach er sein Studium ab und wurde Lehrling.", a: "في الترم التالت ساب الكلية وبدأ كمتدرب." },
                        { g: "Seine Ausbildung begann er in einem 5-Sterne-Hotel in Hamburg.", a: "بدأ تدريبه في فندق 5 نجوم في هامبورج." },
                        { g: "Nach einigen Jahren in verschiedenen Restaurants und Hotelküchen wollte David Görne sein eigenes Restaurant eröffnen,", a: "بعد كام سنة في مطاعم ومطابخ فنادق مختلفة كان ديفيد عايز يفتح مطعمه الخاص،" },
                        { g: "am liebsten ein kleines Restaurant mit engem Kontakt zwischen Koch und Gästen. Diese Idee konnte er schließlich in Frankreich realisieren.", a: "ويفضل يكون مطعم صغير فيه تواصل قريب بين الطباخ والضيوف. الفكرة دي قدر يحققها في النهاية في فرنسا." },
                        { g: "In seinem Restaurant sitzen maximal 14 Gäste rund um einen Herd. Hier können die Gäste alle Schritte beim Kochen sehen.", a: "في مطعمه بيقعد بحد أقصى 14 ضيف حوالين البوتاجاز. هنا الضيوف بيقدروا يشوفوا كل خطوات الطبخ." },
                        { g: "Die Lebensmittel kauft der Koch bei den Bauern aus der Umgebung.", a: "الطباخ بيشتري الأكل من المزارعين اللي في المنطقة المحيطة." },
                        { g: "Im Restaurant war kürzlich auch ein Ehepaar aus der Nähe von Paris.", a: "مؤخراً كان في المطعم زوجين من مكان قريب من باريس." },
                        { g: "Nach dem Essen sagte die Frau: „Es war ein unvergessliches Erlebnis.“", a: "بعد الأكل الست قالت: \"كانت تجربة لا تُنسى.\"" },
                        { g: "Wir Gäste in einem Interview: „Er kocht wie ein Franzose.“", a: "ضيوف تانيين قالوا في مقابلة: \"ده بيطبخ كأنه فرنسي.\"" }
                    ]
                },
                {
                    id: 'c3', title: "Der Bismarckhering",
                    lines: [
                        { g: "Der Hering galt früher als Essen für arme Leute.", a: "سمك الرنجة كان زمان بيعتبر أكل للناس الفقيرة." },
                        { g: "Doch auch Reichskanzler Otto von Bismarck (1815–1898) liebte den Hering.", a: "لكن المستشار الألماني أوتو فون بسمارك (1815-1898) كمان كان بيعشق الرنجة." },
                        { g: "Bismarck war ein Genussmensch, er aß viel und gern.", a: "بسمارك كان شخص ذواق، كان بياكل كتير وبحب." },
                        { g: "In Berichten über Bismarck kann man lesen, dass er mühelos zum Frühstück 16 Eier oder abends 150 Austern essen konnte.", a: "في تقارير عن بسمارك ممكن تقرأ إنه كان بيقدر ياكل 16 بيضة ع الفطار أو 150 محارة ع العشا بمنتهى السهولة." },
                        { g: "Ein Fischhändler aus Stralsund wollte Bismarck eine Freude machen.", a: "تاجر سمك من مدينة شترالسوند كان عايز يفرحه." },
                        { g: "Er schickte ihm zum Geburtstag ein Fass mit Heringen in einer Marinade aus Essig und Gewürzen.", a: "بعتله في عيد ميلاده برميل فيه رنجة في تتبيلة من الخل والبهارات." },
                        { g: "Die sauren Heringe schmeckten dem Reichskanzler so gut, dass er das Rezept haben wollte.", a: "الرنجة الحامضة دي عجبت المستشار جداً لدرجة إنه طلب الوصفة." },
                        { g: "Der Fischhändler verkaufte seine Heringe dann als Bismarckheringe und so heißen saure Heringe bis heute.", a: "تاجر السمك بعد كده بقى يبيع الرنجة بتاعته باسم (رنجة بسمارك) وعشان كده الرنجة الحامضة لسة معروفة بالاسم ده لحد النهاردة." }
                    ]
                },
                {
                    id: 'c4', title: "Der Kaiserschmarrn",
                    lines: [
                        { g: "Über die Herkunft dieses österreichischen Desserts gibt es viele Geschichten.", a: "فيه قصص كتير حوالين أصل الحلوى النمساوية دي." },
                        { g: "Eine (vermutlich unwahre) Geschichte geht so:", a: "فيه قصة (غالباً مش حقيقية) بتقول كالتالي:" },
                        { g: "Der Koch des österreichischen Kaisers Franz Josef I. (1830–1916) wollte speziell für die Kaiserin Sissi eine leichte Nachspeise erfinden.", a: "طباخ الإمبراطور النمساوي فرانز جوزيف الأول (1830-1916) كان عايز يبتكر حلوى خفيفة مخصوص عشان الإمبراطورة سيسي." },
                        { g: "Aus diesem Grund entstand ein lockerer Teig aus Eiern, Milch und Mehl und wurde noch mit Rosinen und Zucker dazu verfeinert.", a: "عشان كده عمل عجينة هشة من البيض واللبن والدقيق وحط عليها زبيب وسكر عشان يحليها." },
                        { g: "Leider gelang die Nachspeise nicht – der Kaiserschmarrn „fiel auseinander“.", a: "للأسف الحلوى مانجحتش – العجينة اتقطعت وفكت من بعض." },
                        { g: "Die Kaiserin mochte ihn auch gar nicht, doch der Kaiser fand das Essen sehr lecker.", a: "الإمبراطورة معجبتهاش الحلوى دي خالص، لكن الإمبراطور لقاها لذيذة جداً." },
                        { g: "Seit diesem Zeitpunkt an nannte man das Dessert Kaiserschmarrn.", a: "من اللحظة دي اتسمت الحلوى باسم كايزرشمارن (فوضى الإمبراطور)." }
                    ]
                },
                {
                    id: 'c5', title: "Die Schillerlocke",
                    lines: [
                        { g: "Die Schillerlocke ist ein Gebäck. Sie hat die Form einer Haarlocke und ist mit Sahne gefüllt.", a: "الشيلرلوكه دي نوع من المخبوزات. شكلها زي خصلة الشعر ومحشية بالكريمة." },
                        { g: "Ihr Name kommt von dem großen deutschen Dichter Friedrich Schiller (1759–1805).", a: "اسمها جي من الشاعر الألماني العظيم فريدريش شيلر (1759-1805)." },
                        { g: "Friedrich Schiller hatte nämlich wunderschöne Locken.", a: "ده لأن فريدريش شيلر كان عنده خصلات شعر مموجة جميلة جداً." },
                        { g: "In seinem Wohnhaus in Weimar kann man noch heute in einem Glaskasten zwei Locken des Dichters sehen.", a: "في بيته في مدينة فايمار ممكن لحد النهاردة تشوف خصلتين من شعر الشاعر ده جوه صندوق أزاز." },
                        { g: "Die sahen genauso aus wie das Gebäck. Darum heißt das Gebäck Schillerlocke.", a: "الخصلتين دول كان شكلهم بالظبط زي المخبوزات دي، عشان كده اتسمت شيلرلوكه." },
                        { g: "Wer den Namen erfand und warum er bis heute benutzt wird – auf diese Fragen gibt es keine Antwort.", a: "مين اللي اخترع الاسم ده وليه لسة بيستخدم لحد النهاردة – الأسئلة دي مفيش إجابة عليها." }
                    ]
                },
                {
                    id: 'c6', title: "Kaffee und Kuchen",
                    lines: [
                        { g: "Haben Sie schon einmal von der deutsch-österreichischen Tradition von Kaffee und Kuchen gehört?", a: "هل سمعت قبل كده عن التقليد الألماني النمساوي بتاع القهوة والكيك؟" },
                        { g: "Wenn ja, dann wissen Sie, dass Deutsche und Österreicher gern nachmittags in ein Café oder eine Konditorei gehen.", a: "لو أيوه، فأنت عارف إن الألمان والنمساويين بيحبوا يروحوا الكافيهات أو محلات الحلويات بعد الظهر." },
                        { g: "Sie bestellen dort ein Stück Kuchen und eine Tasse Kaffee und reden über das eigene Leben oder andere Leute.", a: "بيطلبوا هناك حتة كيكة وفنجان قهوة وبيتكلموا عن حياتهم أو عن ناس تانية." },
                        { g: "Die Tradition von Kaffee und Kuchen entstand im 17. Jahrhundert gemeinsam mit den ersten Kaffeehäusern.", a: "تقليد القهوة والكيك ده بدأ في القرن الـ 17 مع ظهور أول المقاهي." },
                        { g: "Vor allem die Wiener sitzen noch heute in ihren berühmten Kaffeehäusern und genießen Kaffee und Kuchen.", a: "سكان فيينا بالذات لسة لحد النهاردة بيقعدوا في مقاهيهم المشهورة وبيستمتعوا بالقهوة والكيك." },
                        { g: "Die Wiener Kaffeehauskultur gehört seit 2011 zum Weltkulturerbe.", a: "ثقافة المقاهي في فيينا بقت جزء من التراث العالمي من سنة 2011." }
                    ]
                },
                {
                    id: 'c7', title: "Mein Lieblingsrestaurant",
                    lines: [
                        { g: "Ich gehe am liebsten in ein italienisches Restaurant. Es heißt Milano.", a: "أفضل الذهاب إلى مطعم إيطالي. اسمه ميلانو." },
                        { g: "Ich kann dieses Restaurant sehr empfehlen.", a: "يمكنني التوصية بهذا المطعم بشدة." },
                        { g: "Das Essen schmeckt ausgezeichnet. Es gibt leckere Pasta und Fisch.", a: "الطعام مذاقه ممتاز. يوجد هناك مكرونة لذيذة وسمك." }
                    ]
                },

        // --- HELPER FOR ARTICLES COLORING ---
        const colorizeArticles = (text) => {
            if (!text) return text;
            const regex = /(der |die |das )/gi;
            const parts = text.split(regex);
            return parts.map((part, i) => {
                const lower = part.toLowerCase();
                if (lower === 'der ') return <span key={i} className="text-blue-500 font-extrabold">{part}</span>;
                if (lower === 'die ') return <span key={i} className="text-rose-500 font-extrabold">{part}</span>;
                if (lower === 'das ') return <span key={i} className="text-emerald-500 font-extrabold">{part}</span>;
                return <span key={i}>{part}</span>;
            });
        };

                                <h3 className="text-xl font-bold text-slate-800 flex items-center gap-2">

                                <p className="text-sm text-slate-500 mt-1">{item.eng} <span className="mx-2 text-slate-300">|</span> <span className="text-emerald-600 font-bold ar-text" dir="rtl">{item.ar}</span></p>

                        <div className={`transform transition-transform duration-300 ${expanded ? 'rotate-180' : ''}`}>

                                <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm relative group">

                                        </li>

                                </ul>
                            </div>
                        </div>
                    </div>
                </div>

                                const isCustomer = line.speaker === "Peter" || line.speaker === "Petra" || line.speaker === "Kunde" || line.speaker === "Käufer" || line.speaker.includes("Gast") || line.speaker === "Person A";
                                return (
                                    <div key={idx} className={`flex flex-col p-4 rounded-2xl border ${isCustomer ? 'bg-blue-50/50 border-blue-100 ml-8' : 'bg-slate-50 border-slate-100 mr-8'}`}>
                                        <div className="flex justify-between items-start mb-2">
                                            <span className={`text-xs font-bold uppercase tracking-wider px-2 py-1 rounded-md ${isCustomer ? 'bg-blue-100 text-blue-700' : 'bg-slate-200 text-slate-700'}`}>
                                                {line.speaker}
                                            </span>
                                            <div className="flex gap-2">
                                                <button onClick={(e) => playAudio(line.text, e)} className="text-slate-400 hover:text-blue-600 transition-colors"><i data-lucide="volume-2" className="w-4 h-4"></i></button>
                                                <SpeechTester targetText={line.text} />
                                            </div>
                                        </div>
                                        <p className="text-lg font-medium text-slate-800 mb-1">{line.text}</p>

                                        <p className="text-blue-700 font-bold ar-text border-t border-slate-200/50 pt-2 text-right" dir="rtl">{line.ar}</p>
                                    </div>

                    </div>
                </div>

        const AdjectiveTables = () => {
            const thClass = "border border-slate-200 p-3 bg-indigo-50 font-bold text-indigo-800 text-sm tracking-wider";
            const tdClass = "border border-slate-200 p-3 text-center text-slate-700 font-medium";

            return (
                <div className="space-y-8" dir="ltr">
                    {/* Definite Article */}
                    <div className="overflow-x-auto bg-white rounded-2xl shadow-sm border border-slate-200 p-4">
                        <h4 className="font-bold text-indigo-600 text-lg mb-4 ar-text" dir="rtl">1. مع أداة المعرفة (Mit dem bestimmten Artikel: der, die, das)</h4>
                        <table className="w-full border-collapse">
                            <thead>
                                <tr>
                                    <th className={thClass}>Kasus</th>
                                    <th className={thClass}>Maskulin</th>
                                    <th className={thClass}>Feminin</th>
                                    <th className={thClass}>Neutrum</th>

                                </tr>

                                <tr><td className={tdClass}>Nominativ</td><td className={tdClass}>-e</td><td className={tdClass}>-e</td><td className={tdClass}>-e</td><td className={tdClass}>-en</td></tr>
                                <tr><td className={tdClass}>Akkusativ</td><td className={tdClass}>-en</td><td className={tdClass}>-e</td><td className={tdClass}>-e</td><td className={tdClass}>-en</td></tr>
                                <tr><td className={tdClass}>Dativ</td><td className={tdClass}>-en</td><td className={tdClass}>-en</td><td className={tdClass}>-en</td><td className={tdClass}>-en</td></tr>
                                <tr><td className={tdClass}>Genitiv</td><td className={tdClass}>-en</td><td className={tdClass}>-en</td><td className={tdClass}>-en</td><td className={tdClass}>-en</td></tr>
                            </tbody>
                        </table>
                    </div>

                    {/* Indefinite Article */}
                    <div className="overflow-x-auto bg-white rounded-2xl shadow-sm border border-slate-200 p-4">
                        <h4 className="font-bold text-indigo-600 text-lg mb-4 ar-text" dir="rtl">2. مع أداة النكرة (Mit dem unbestimmten Artikel: ein, eine)</h4>
                        <table className="w-full border-collapse">
                            <thead>
                                <tr>
                                    <th className={thClass}>Kasus</th>
                                    <th className={thClass}>Maskulin</th>
                                    <th className={thClass}>Feminin</th>
                                    <th className={thClass}>Neutrum</th>
                                    <th className={thClass}>Plural (Keine Artikel)</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr><td className={tdClass}>Nominativ</td><td className={tdClass}>-er</td><td className={tdClass}>-e</td><td className={tdClass}>-es</td><td className={tdClass}>-en</td></tr>
                                <tr><td className={tdClass}>Akkusativ</td><td className={tdClass}>-en</td><td className={tdClass}>-e</td><td className={tdClass}>-es</td><td className={tdClass}>-en</td></tr>
                                <tr><td className={tdClass}>Dativ</td><td className={tdClass}>-en</td><td className={tdClass}>-en</td><td className={tdClass}>-en</td><td className={tdClass}>-en</td></tr>
                                <tr><td className={tdClass}>Genitiv</td><td className={tdClass}>-en</td><td className={tdClass}>-en</td><td className={tdClass}>-en</td><td className={tdClass}>-en</td></tr>
                            </tbody>
                        </table>
                    </div>

                    {/* No Article */}
                    <div className="overflow-x-auto bg-white rounded-2xl shadow-sm border border-slate-200 p-4">

                        <table className="w-full border-collapse">
                            <thead>
                                <tr>
                                    <th className={thClass}>Kasus</th>
                                    <th className={thClass}>Maskulin</th>
                                    <th className={thClass}>Feminin</th>
                                    <th className={thClass}>Neutrum</th>
                                    <th className={thClass}>Plural</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr><td className={tdClass}>Nominativ</td><td className={tdClass}>-er</td><td className={tdClass}>-e</td><td className={tdClass}>-es</td><td className={tdClass}>-e</td></tr>
                                <tr><td className={tdClass}>Akkusativ</td><td className={tdClass}>-en</td><td className={tdClass}>-e</td><td className={tdClass}>-es</td><td className={tdClass}>-e</td></tr>
                                <tr><td className={tdClass}>Dativ</td><td className={tdClass}>-em</td><td className={tdClass}>-er</td><td className={tdClass}>-em</td><td className={tdClass}>-en</td></tr>
