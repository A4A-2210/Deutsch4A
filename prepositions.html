        temporalData.forEach(t => t.items.forEach(item => flashcardsPool.push({ type: 'Prep (Temporal)', title: t.title, ...item })));
        verbsData.forEach(tier => tier.verbs.forEach(v => flashcardsPool.push({ type: 'Verb', title: tier.tier, ...v })));
        flashcardsPool.sort(() => Math.random() - 0.5); // Shuffle

        // --- STATE ---
        let activeTab = 'flashcards';
        let expandedRegimes = { 1: true };
        let flashcardIndex = 0;
        let isFlipped = false;
        let isListening = false;

        // --- RENDER LOGIC ---
        function init() {
            renderTabs();
            renderContent();
        }

        const tabs = [
            { id: 'theory', icon: 'layers', label: 'Theory (Space)' },
            { id: 'time', icon: 'clock', label: 'Timeline (Time)' },
            { id: 'verbs', icon: 'network', label: 'Verb Orbits' },
            { id: 'flashcards', icon: 'repeat', label: `Flashcards (${flashcardsPool.length})` }
        ];

        function switchTab(id) {
            activeTab = id;
            renderTabs();
            renderContent();
        }

        function toggleRegime(id) {
            expandedRegimes[id] = !expandedRegimes[id];
            renderTheory();
        }

        function toggleFlip() {
            isFlipped = !isFlipped;
            renderFlashcardUI();
        }

        function nextCard(direction) {
            isFlipped = false;
            setTimeout(() => {
                flashcardIndex = (flashcardIndex + direction + flashcardsPool.length) % flashcardsPool.length;
                renderContent();
            }, 150);
            renderFlashcardUI();
        }

        function getAudioControls(text) {
            return `
                <div class="flex gap-1 z-10" onclick="event.stopPropagation()">
                    <button onclick="handleSpeechRecognition('${text.replace(/'/g, "\\'")}')" class="p-1.5 bg-slate-800 text-slate-400 hover:text-amber-500 rounded-md transition-all hover:scale-110 active:scale-95" title="Practice Pronunciation">
                        <span class="w-4 h-4 block">${icons.mic}</span>
                    </button>
                    <button onclick="speak('${text.replace(/'/g, "\\'")}')" class="p-1.5 bg-slate-800 text-slate-400 hover:text-amber-500 rounded-md transition-all hover:scale-110 active:scale-95" title="Hear Pronunciation">
                        <span class="w-4 h-4 block">${icons.volume}</span>
                    </button>
                </div>
            `;
        }

        function getBadge(caseStr, type) {
            let color = caseStr === 'Akk' ? 'bg-red-500/20 text-red-400' : 
                        caseStr === 'Dat' ? 'bg-blue-500/20 text-blue-400' :
                        type === 'Verb' ? 'bg-blue-500/20 text-blue-400' :
                        type === 'Prep (Temporal)' ? 'bg-emerald-500/20 text-emerald-400' : 'bg-amber-500/20 text-amber-400';
            return `<span class="px-2 py-0.5 rounded text-xs font-bold tracking-wider ${color}">+${caseStr || type}</span>`;
        }

        function renderTabs() {
            const container = document.getElementById('tab-buttons');
            container.innerHTML = tabs.map(t => `
                <button onclick="switchTab('${t.id}')" class="flex items-center gap-2 px-4 py-2 rounded-md text-sm font-semibold transition-all whitespace-nowrap ${activeTab === t.id ? 'bg-amber-500 text-slate-950 shadow-md' : 'text-slate-400 hover:text-slate-200 hover:bg-slate-700/50'}">
                    <span class="w-4 h-4">${icons[t.icon]}</span> ${t.label}
                </button>
            `).join('');
        }

        function renderContent() {
            const container = document.getElementById('main-content');
            if (activeTab === 'theory') renderTheory(container);
            else if (activeTab === 'time') renderTime(container);
            else if (activeTab === 'verbs') renderVerbs(container);
            else if (activeTab === 'flashcards') renderFlashcard(container);
        }

        function renderTheory(container = document.getElementById('main-content')) {
            let html = `
                <div class="space-y-6 animate-in fade-in duration-500">
                    <div class="bg-slate-900 border border-slate-800 p-6 rounded-xl flex gap-4 items-start shadow-lg">
                        <span class="w-8 h-8 text-amber-500 shrink-0 mt-1">${icons.brain}</span>
                        <div>
                            <h2 class="text-lg font-bold text-white mb-2">The Feynman Mental Model (Spatial & Abstract)</h2>
                            <p class="text-sm leading-relaxed text-slate-400 mb-2">Imagine a box, a ball, and a timeline. A preposition is simply the GPS coordinate telling you where the ball is relative to the box.</p>
                            <p class="text-sm leading-relaxed text-slate-400 border-t border-slate-800 pt-3 mt-3" dir="rtl"><span class="text-amber-400 font-bold ml-1">الخلاصة:</span>حرف الجر في الألماني عامل زي إحداثيات الـ GPS. مبيهزرش، بيأمر الاسم أو الضمير يلبس "يونيفورم" الإعراب.</p>
                        </div>
                    </div>
                    <div class="space-y-4">
            `;

            regimesData.forEach(r => {
                const isExp = expandedRegimes[r.id];
                html += `
                    <div class="border rounded-xl overflow-hidden transition-all duration-300 ${isExp ? r.border : 'border-slate-800'}">
                        <button onclick="toggleRegime(${r.id})" class="w-full flex items-center justify-between p-5 bg-slate-900 hover:bg-slate-800 transition-colors">
                            <div class="flex items-center gap-4">
                                <div class="p-2 rounded-lg ${r.bg} ${r.color} w-10 h-10 flex items-center justify-center">${icons[r.icon]}</div>
                                <div class="text-left">
                                    <h3 class="text-lg font-bold text-white">${r.title}</h3>
                                    <p class="text-sm font-medium ${r.color}">${r.subtitle}</p>
                                </div>
                            </div>
                            <span class="w-5 h-5 text-slate-500 transition-transform duration-300 ${isExp ? 'rotate-180' : ''}">${icons.chevron}</span>
                        </button>
                `;
                if (isExp) {
                    html += `<div class="p-6 bg-slate-900/50 border-t border-slate-800"><div class="grid md:grid-cols-2 gap-6 mb-8">
                        <div class="bg-slate-800/50 p-4 rounded-lg border border-slate-700">
                            <h4 class="text-xs uppercase tracking-widest text-slate-500 font-bold mb-2 flex items-center gap-2"><span class="w-3 h-3">${icons.globe}</span> Physics / English</h4>
                            <p class="text-sm text-slate-300">${r.physics.en}</p>
                        </div>
                        <div class="bg-slate-800/50 p-4 rounded-lg border border-slate-700" dir="rtl">
                            <h4 class="text-xs uppercase tracking-widest text-amber-500/70 font-bold mb-2 flex items-center gap-2"><span class="w-3 h-3">${icons.languages}</span> الشرح المصري</h4>
                            <p class="text-sm text-slate-300">${r.physics.eg}</p>
                        </div>
                    </div><div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">`;
                    
                    r.items.forEach(item => {
                        html += `
                            <div class="bg-slate-950 border border-slate-800 rounded-lg p-4 flex flex-col justify-between hover:border-amber-500/50 transition-colors">
                                <div>
                                    <div class="flex justify-between items-start mb-2">
                                        <span class="font-mono text-lg font-bold ${r.color}">${item.prep}</span>
                                        ${getAudioControls(item.prep)}
                                    </div>
                                    <p class="text-sm text-white font-medium mb-1">${item.en}</p>
                                    <p class="text-sm text-amber-500 font-medium mb-4" dir="rtl">${item.eg}</p>
                                </div>
                                <div class="pt-3 border-t border-slate-800 bg-slate-900/50 -mx-4 -mb-4 p-4 rounded-b-lg">
                                    <div class="flex justify-between items-start gap-2 mb-1.5">
                                        <p class="text-xs text-slate-300 font-medium italic">${item.ex_de}</p>
                                        ${getAudioControls(item.ex_de)}
                                    </div>
                                    <p class="text-xs text-slate-500 mb-1.5">${item.ex_en}</p>
                                    <p class="text-xs text-amber-500/80 text-right" dir="rtl">${item.ex_eg}</p>
                                </div>
                            </div>
                        `;
                    });
                    html += `</div></div>`;
                }
                html += `</div>`;
            });
            container.innerHTML = html + `</div></div>`;
        }

        function renderTime(container) {
            let html = `
                <div class="space-y-8 animate-in fade-in duration-500">
                    <div class="bg-slate-900 border border-slate-800 p-6 rounded-xl flex gap-4 items-start shadow-lg">
                        <span class="w-8 h-8 text-amber-500 shrink-0 mt-1">${icons.calendar}</span>
                        <div>
                            <h2 class="text-lg font-bold text-white mb-2">The Temporal Timeline (محور الزمن)</h2>
                            <p class="text-sm leading-relaxed text-slate-400 mb-2" dir="rtl"><span class="text-amber-400 font-bold ml-1">قاعدة زمنية:</span>الزمن في الألماني مش سايح على بعضه. لازم تسأل نفسك: أنا بحدد نقطة؟ ولا بحسب مدة؟ ولا برتب أحداث؟</p>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 gap-8">
            `;
            temporalData.forEach(c => {
                html += `
                    <div class="border border-slate-800 rounded-xl overflow-hidden bg-slate-900/30">
                        <div class="p-4 border-b border-slate-800 bg-slate-900/80 flex items-center gap-3">
                            <span class="w-5 h-5 ${c.color}">${icons[c.icon]}</span>
                            <div><h3 class="text-md font-bold text-white">${c.title}</h3><p class="text-xs font-bold ${c.color}" dir="rtl">${c.subtitle}</p></div>
                        </div>
                        <div class="p-5 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                `;
                c.items.forEach(item => {
                    html += `
                        <div class="bg-slate-950 border border-slate-800 rounded-lg p-4 flex flex-col justify-between hover:border-amber-500/50 transition-colors relative">
                            <div class="absolute top-4 right-4">${getBadge(item.case, '')}</div>
                            <div class="pr-12">
                                <div class="flex items-center gap-2 mb-2"><span class="font-mono text-xl font-bold text-white">${item.prep}</span> ${getAudioControls(item.prep)}</div>
                                <p class="text-sm text-slate-300 font-medium mb-1">${item.en}</p>
                                <p class="text-sm text-amber-500 font-medium mb-4" dir="rtl">${item.eg}</p>
                            </div>
                            <div class="pt-3 border-t border-slate-800 bg-slate-900/50 -mx-4 -mb-4 p-4 rounded-b-lg">
                                <div class="flex justify-between items-start gap-2 mb-1.5"><p class="text-xs text-slate-300 font-medium italic">${item.ex_de}</p> ${getAudioControls(item.ex_de)}</div>
                                <p class="text-xs text-slate-500 mb-1.5">${item.ex_en}</p>
                                <p class="text-xs text-amber-500/80 text-right" dir="rtl">${item.ex_eg}</p>
                            </div>
                        </div>
                    `;
                });
                html += `</div></div>`;
            });
            container.innerHTML = html + `</div></div>`;
        }

        function renderVerbs(container) {
            let html = `
                <div class="space-y-8 animate-in fade-in duration-500">
                    <div class="bg-slate-900 border border-slate-800 p-6 rounded-xl shadow-lg flex gap-4 items-start">
                        <span class="w-8 h-8 text-amber-500 shrink-0 mt-1">${icons.orbit}</span>
                        <div>
                            <h2 class="text-lg font-bold text-white mb-2">The Planetary Gravity of Verbs</h2>
                            <p class="text-sm text-slate-400 mb-2">The verb is the sun, and the preposition is a planet locked in its gravitational pull.</p>
                        </div>
                    </div>
            `;
            verbsData.forEach(tier => {
                html += `
                    <div class="mb-10">
                        <div class="flex items-center gap-3 mb-6 border-b border-slate-800 pb-2">
                            <h3 class="text-xl font-black text-slate-200">${tier.tier}</h3>
                            <span class="text-amber-500 text-sm font-bold tracking-widest uppercase">• ${tier.cluster}</span>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                `;
                tier.verbs.forEach(v => {
                    html += `
                        <div class="bg-slate-900 border border-slate-800 rounded-lg p-5 flex flex-col hover:border-blue-400/50 transition-colors relative overflow-hidden group">
                            <div class="absolute top-0 right-0 p-2 opacity-5 group-hover:opacity-10 transition-opacity pointer-events-none w-24 h-24">${icons.orbit}</div>
                            <div class="flex items-center gap-2 mb-3 z-10 flex-wrap">
                                <span class="text-lg font-bold text-white">${v.v}</span>
                                <span class="text-lg font-bold text-amber-500">${v.p}</span>
                                ${getBadge(v.c, '')}
                                <div class="ml-auto">${getAudioControls(v.v + ' ' + v.p)}</div>
                            </div>
                            <div class="mb-4 z-10 flex flex-col gap-1">
                                <span class="text-sm font-medium text-slate-300 flex items-center gap-2"><span class="w-4 h-4 rounded-full bg-slate-800 flex items-center justify-center text-[8px] text-slate-400">EN</span>${v.en}</span>
                                <span class="text-sm font-bold text-amber-500 flex items-center gap-2 justify-end" dir="rtl">${v.eg}<span class="w-4 h-4 rounded-full bg-slate-800 flex items-center justify-center text-[8px] text-amber-500/50">EG</span></span>
                            </div>
                            <div class="mt-auto pt-3 border-t border-slate-800/50 z-10">
                                <div class="flex justify-between items-start gap-2 mb-1"><p class="text-sm text-slate-300 font-medium">${v.de_ex}</p> ${getAudioControls(v.de_ex)}</div>
                                <p class="text-xs text-slate-500 mb-1">${v.en_ex}</p>
                                <p class="text-xs text-slate-500 text-right" dir="rtl">${v.eg_ex}</p>
                            </div>
                        </div>
                    `;
                });
                html += `</div></div>`;
            });
            container.innerHTML = html + `</div>`;
        }

        function renderFlashcard(container) {
            container.innerHTML = `
                <div class="flex flex-col items-center justify-center min-h-[60vh] animate-in fade-in duration-500">
                    <div class="mb-6 flex flex-col items-center gap-2 w-full max-w-md">
                        <div class="bg-emerald-500/10 border border-emerald-500/30 text-emerald-400 text-xs px-3 py-1.5 rounded-full font-bold w-full text-center">
                            Database 100% Loaded (${flashcardsPool.length} Cards)
                        </div>
                        <div class="flex items-center justify-between w-full mt-2" id="flashcard-header">
                            <!-- Injected -->
                        </div>
                    </div>
                    
                    <div class="w-full max-w-md h-96 relative perspective-1000 cursor-pointer group" onclick="toggleFlip()">
                        <div id="flashcard-body" class="w-full h-full transition-transform duration-500 transform-style-3d">
                            <!-- Injected -->
                        </div>
                    </div>

                    <div class="flex gap-4 mt-8 w-full max-w-md">
                        <button onclick="event.stopPropagation(); nextCard(-1)" class="bg-slate-800 hover:bg-slate-700 text-slate-300 px-6 py-3 rounded-xl font-black uppercase transition-all shadow-lg active:scale-95">Prev</button>
                        <button onclick="event.stopPropagation(); nextCard(1)" class="bg-amber-500 hover:bg-amber-400 text-slate-950 flex-1 py-3 rounded-xl font-black tracking-widest uppercase transition-all flex items-center justify-center gap-2 shadow-lg shadow-amber-500/20 active:scale-95">
                            Next Concept <span class="w-5 h-5">${icons.arrowRight}</span>
                        </button>
                    </div>
                </div>
            `;
            renderFlashcardUI();
        }

        function renderFlashcardUI() {
            if (activeTab !== 'flashcards') return;
            const card = flashcardsPool[flashcardIndex];
            const header = document.getElementById('flashcard-header');
            const body = document.getElementById('flashcard-body');
            
            header.innerHTML = `
                <span class="text-xs font-bold tracking-widest text-slate-500 uppercase">Card ${flashcardIndex + 1} of ${flashcardsPool.length}</span>
                ${getBadge('', card.type)}
            `;

            body.className = `w-full h-full transition-transform duration-500 transform-style-3d ${isFlipped ? 'rotate-y-180' : ''}`;
            
            let frontContent = card.type === 'Verb' 
                ? `<div class="flex flex-col items-center gap-2"><span class="text-4xl font-black text-white">${card.v}</span><span class="text-3xl font-bold text-amber-500">${card.p} <span class="text-xl text-slate-500 ml-2">+${card.c}</span></span></div>`
                : `<div class="flex flex-col items-center gap-2"><span class="text-5xl font-black text-white">${card.prep}</span>${card.case ? `<span class="text-lg font-bold text-slate-500">+${card.case}</span>` : ''}</div>`;
            
            let termToSpeak = card.type === 'Verb' ? `${card.v} ${card.p}` : card.prep;
            let exToSpeak = card.de_ex || card.ex_de;

            body.innerHTML = `
                <!-- FRONT -->
                <div class="absolute w-full h-full backface-hidden bg-slate-900 border-2 border-slate-800 rounded-2xl flex flex-col items-center justify-center p-8 text-center shadow-2xl group-hover:border-slate-700 transition-colors">
                    <div class="absolute top-4 right-4">${getAudioControls(termToSpeak)}</div>
                    <span class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-6 px-10">${card.title}</span>
                    ${frontContent}
                    <div class="absolute bottom-8 text-slate-600 text-sm flex items-center gap-2 font-medium"><span class="w-4 h-4">${icons.repeat}</span> Click to flip</div>
                </div>
                <!-- BACK -->
                <div class="absolute w-full h-full backface-hidden bg-slate-800 border-2 border-amber-500/30 rounded-2xl flex flex-col items-center justify-center p-8 text-center shadow-2xl rotate-y-180">
                    <div class="w-full space-y-4 mb-6">
                        <div><h4 class="text-[10px] uppercase tracking-widest text-slate-400 mb-1">Meaning (EN)</h4><p class="text-xl font-bold text-white">${card.en}</p></div>
                        <div><h4 class="text-[10px] uppercase tracking-widest text-amber-500/50 mb-1">Meaning (EG)</h4><p class="text-xl font-bold text-amber-400" dir="rtl">${card.eg}</p></div>
                    </div>
                    <div class="w-full bg-slate-900/50 p-4 rounded-lg border border-slate-700/50 relative">
                        <div class="absolute top-2 right-2">${getAudioControls(exToSpeak)}</div>
                        <p class="text-sm font-bold text-slate-200 mb-1 pr-16 text-left">"${exToSpeak}"</p>
                        <p class="text-xs text-slate-400 mb-1 pr-16 text-left">"${card.en_ex || card.ex_en}"</p>
                        <p class="text-xs text-amber-500/80 pr-16 text-right" dir="rtl">"${card.eg_ex || card.ex_eg}"</p>
                    </div>
                </div>
            `;
        }

        // --- AUDIO APIs ---
        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'de-DE';
                utterance.rate = 0.85;
                window.speechSynthesis.speak(utterance);
            }
        }

        function showToast(status, text) {
            const tc = document.getElementById('toast-container');
            const tm = document.getElementById('toast-message');
            
            tm.className = `px-6 py-3 rounded-xl text-sm font-bold border shadow-2xl toast-enter ${
                status === 'success' ? 'bg-emerald-900/90 text-emerald-400 border-emerald-500/50' :
                status === 'error' ? 'bg-red-900/90 text-red-400 border-red-500/50' :
                'bg-amber-900/90 text-amber-400 border-amber-500/50 animate-pulse'
            }`;
            tm.innerHTML = text;
            tc.classList.remove('hidden');

            if (status !== 'listening') {
                setTimeout(() => { tc.classList.add('hidden'); }, 4000);
            }
        }

        function handleSpeechRecognition(expectedText) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                showToast('error', 'متصفحك لا يدعم التعرف على الصوت. استخدم Google Chrome.');
                return;
            }

            const recognition = new SpeechRecognition();
            recognition.lang = 'de-DE';
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            recognition.onstart = () => { showToast('listening', 'بيسمعك دلوقتي... اتكلم ألماني 🎙️'); };

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                const cleanExpected = expectedText.toLowerCase().replace(/[.,!?;:()"]/g, '').trim();
                const cleanTranscript = transcript.toLowerCase().replace(/[.,!?;:()"]/g, '').trim();

                if (cleanTranscript.includes(cleanExpected) || cleanExpected.includes(cleanTranscript)) {
                    showToast('success', `نطق سليم 100%! سمعت: "${transcript}" ✅`);
                } else {
                    showToast('error', `أنا سمعت: "${transcript}"... جرب تاني ❌`);
                }
            };

            recognition.onerror = (event) => { showToast('error', `حصلت مشكلة في المايك: ${event.error}`); };
            try { recognition.start(); } catch (err) { recognition.stop(); }
        }

        // Start
        window.onload = init;
    </script>
</body>
</html>
