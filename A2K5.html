        // --- HELPERS FOR AUDIO & SPEECH ---
        const playAudio = (text, e) => {
            if (e) e.stopPropagation();
            const cleanText = text.replace(/<[^>]+>/g, '');
            const utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.lang = 'de-DE';
            window.speechSynthesis.speak(utterance);
        };

        const SpeechTester = ({ targetText }) => {
            const [status, setStatus] = React.useState('idle');
            const [heard, setHeard] = React.useState('');

            const listen = (e) => {
                if (e) e.stopPropagation();
                if (!('webkitSpeechRecognition' in window)) {
                    alert('المتصفح ده مش بيدعم تسجيل الصوت، جرب Google Chrome.');
                    return;
                }
                const recognition = new webkitSpeechRecognition();
                recognition.lang = 'de-DE';
                recognition.interimResults = false;

                recognition.onstart = () => setStatus('listening');
                recognition.onresult = (event) => {
                    const speechResult = event.results[0][0].transcript;
                    setHeard(speechResult);

                    const clean = (str) => str.replace(/<[^>]+>/g, '').toLowerCase().replace(/[.,!?:]/g, '').trim();
                    const targetClean = clean(targetText);
                    const heardClean = clean(speechResult);

                    if (heardClean.includes(targetClean) || targetClean.includes(heardClean) || heardClean === targetClean) {
                        setStatus('success');
                    } else {
                        setStatus('fail');
                    }
                };
                recognition.onerror = () => setStatus('fail');
                recognition.onend = () => { if (status === 'listening') setStatus('idle'); };
                recognition.start();
            };

            return (
                <div className="inline-flex items-center gap-2" onClick={(e) => e.stopPropagation()}>
                    <button onClick={listen} title="جرب تنطقها" className={`p-2 rounded-full transition-all duration-300 shadow-sm ${status === 'listening' ? 'bg-red-500 text-white animate-pulse scale-110' : 'bg-slate-100 text-slate-600 hover:bg-slate-200 hover:scale-105'}`}>
                        <i data-lucide="mic" className="w-4 h-4"></i>
                    </button>
                    {status === 'success' && <span className="text-emerald-500 text-xs font-bold ar-text animate-bounce">✅ ممتاز!</span>}
                    {status === 'fail' && <span className="text-red-500 text-xs ar-text font-bold" title={`سمعت: ${heard}`}>❌ جرب تاني</span>}
                </div>
            );
        };

                { id: 'e3', type: "Schule", ger: "Welche Sprachen haben Sie in der Schule gelernt?", eng: "Which languages did you learn at school?", ar: "ما اللغات التي تعلمتها في المدرسة؟", context: "Ich habe Englisch und Französisch gelernt. Wir haben auch Latein gelernt." },
                { id: 'e4', type: "Schule", ger: "Wann hat der Unterricht angefangen, wann hat er aufgehört?", eng: "When did the lessons start, when did they finish?", ar: "متى كانت تبدأ الحصص، ومتى تنتهي؟", context: "Der Unterricht hat um 8 Uhr angefangen. Er hat um 1 Uhr aufgehört." },
                { id: 'e5', type: "Schule", ger: "Haben Sie immer Hausaufgaben gemacht?", eng: "Did you always do your homework?", ar: "هل كنت دائماً تؤدي واجباتك؟", context: "Ja, ich habe immer Hausaufgaben gemacht. / Manchmal habe ich sie vergessen." },
                { id: 'e6', type: "Schule", ger: "Wie war Ihr Schulweg? Sind Sie gelaufen, sind Sie gefahren?", eng: "How was your way to school? Did you walk, did you drive?", ar: "كيف كان طريقك للمدرسة؟ مشياً أم بالسيارة؟", context: "Ich bin immer zu Fuß gegangen. / Ich bin mit dem Fahrrad gefahren." },
                { id: 'e7', type: "Schule", ger: "Was waren Ihre Lieblingsfächer?", eng: "What were your favorite subjects?", ar: "ما هي موادك المفضلة؟", context: "Meine Lieblingsfächer waren Mathematik und Biologie. / Sport war mein Lieblingsfach." },
                { id: 'e8', type: "Schule", ger: "Hatten Sie eine Lieblingslehrerin/einen Lieblingslehrer?", eng: "Did you have a favorite teacher?", ar: "هل كان لديك معلم مفضل؟", context: "Ja, meine Lieblingslehrerin war Frau Müller. / Nein, ich hatte keinen Lieblingslehrer." },

                { id: 'e9', type: "Studium", ger: "Guten Tag, ich hätte gern ein paar Informationen über ein Studium in Österreich.", eng: "Good day, I would like some information about studying in Austria.", ar: "يوم سعيد، أود بعض المعلومات عن الدراسة في النمسا.", context: "لطلب معلومات عن الدراسة." },
                { id: 'e10', type: "Studium", ger: "Muss ich vor dem Studium eine Prüfung oder einen Test machen?", eng: "Do I need to take an exam or test before studying?", ar: "هل يجب أن أجري امتحاناً قبل الدراسة؟", context: "للاستفسار عن شروط القبول." },
                { id: 'e11', type: "Studium", ger: "Wie kann ich mich für das Studium einschreiben?", eng: "How can I enroll for the studies?", ar: "كيف يمكنني التسجيل في الدراسة؟", context: "לلسؤال عن خطوات التسجيل." },
                { id: 'e12', type: "Studium", ger: "Gibt es Studiengebühren?", eng: "Are there tuition fees?", ar: "هل توجد رسوم دراسية؟", context: "Nein, an staatlichen Universitäten gibt es keine Studiengebühren." },

                { id: 'e13', type: "Ausbildung", ger: "Ich bin in München zur Schule gegangen.", eng: "I went to school in Munich.", ar: "ذهبت للمدرسة في ميونخ.", context: "للحديث عن مسيرتك التعليمية." },
                { id: 'e14', type: "Ausbildung", ger: "Danach habe ich in Berlin studiert und eine Ausbildung gemacht.", eng: "After that, I studied in Berlin and did training.", ar: "بعدها درست في برلين وقمت بتدريب مهني.", context: "لوصف ما بعد المدرسة." },
                { id: 'e15', type: "Ausbildung", ger: "Mein Studium war sehr theoretisch, aber manchmal auch spannend.", eng: "My studies were very theoretical but sometimes exciting.", ar: "دراستي كانت نظرية جداً لكن شيقة أحياناً.", context: "لتقييم فترة الدراسة." },
                { id: 'e16', type: "Ausbildung", ger: "Mein Praktikum habe ich bei einer Bank absolviert.", eng: "I did my internship at a bank.", ar: "أتممت فترة تدريبي في بنك.", context: "للحديث عن التدريب العملي." }
            ],
            dialogues: [
                {
                    id: 'd1', title: "Schulzeit Interview (مقابلة عن وقت المدرسة)", icon: "mic",
                    lines: [
                        { speaker: "Moderator", text: "Liebe Zuhörerinnen, liebe Zuhörer, herzlich willkommen zur Sendung „Schulzeit“. Wir haben heute einen Gast. Bei mir ist Marina Albrecht. Guten Morgen, Marina.", en: "Dear listeners, welcome to 'School Time'. With me is Marina Albrecht. Good morning.", ar: "أعزائي المستمعين، أهلاً بكم في برنامج 'وقت المدرسة'. ضيفتنا اليوم مارينا ألبرشت. صباح الخير مارينا." },
                        { speaker: "Moderator", text: "Zunächst herzlichen Glückwunsch. Du hast den dritten Platz bei den Deutschen Schwimmmeisterschaften belegt. Schule und Schwimmen – das ist doch sicher nicht so einfach zu organisieren?", en: "Congratulations on 3rd place at the Swimming Championships. School and swimming – not easy to organize, right?", ar: "أولاً مبروك المركز الثالث في بطولة السباحة. المدرسة والسباحة، أكيد تنظيمهم مش سهل؟" },
                        { speaker: "Marina", text: "Ja, das stimmt. Ich trainiere jeden Morgen von 6.00 bis 8.00 Uhr und nachmittags von 15.00 bis 18.00 Uhr.", en: "Yes, that's true. I train every morning from 6 to 8 and afternoons from 3 to 6.", ar: "أيوة صحيح. بتمرن كل يوم الصبح من 6 لـ 8 وبعد الظهر من 3 لـ 6." },
                        { speaker: "Moderator", text: "Hast du dann überhaupt noch Zeit für Hausaufgaben?", en: "Do you then even have time for homework?", ar: "هل عندك وقت أصلاً للواجبات؟" },
                        { speaker: "Marina", text: "Nein, eigentlich nicht. Aber wenn wir zum Beispiel einen Test haben, lerne ich abends nach dem Abendessen. Ich gehe jetzt in die 11. Klasse, da ist der Stress noch nicht so groß.", en: "No, not really. But if we have a test, I study in the evening. I'm in 11th grade, so stress isn't big yet.", ar: "لأ مش أوي. بس لو عندنا امتحان بذاكر بالليل بعد العشا. أنا في 11 دلوقتي فالضغط مش كبير لسة." },
                        { speaker: "Moderator", text: "Andere Mädchen in deinem Alter gehen in ihrer Freizeit aus. Hast du dafür noch Zeit?", en: "Other girls your age go out. Do you have time for that?", ar: "البنات اللي في سنك بيخرجوا في وقت فراغهم. عندك وقت لده؟" },
                        { speaker: "Marina", text: "Ich gehe nicht so viel aus, aber manchmal gehe ich mit meinen Freundinnen ins Kino.", en: "I don't go out much, but sometimes to the cinema with friends.", ar: "مابخرجش كتير، بس أحياناً بروح السينما مع صاحباتي." },
                        { speaker: "Moderator", text: "Was sind deine Lieblingsfächer? Weißt du schon, was du später mal studieren möchtest?", en: "What are your favorite subjects? Do you know what you want to study?", ar: "إيه موادك المفضلة؟ عارفة عايزة تدرسي إيه بعدين؟" },
                        { speaker: "Marina", text: "Mein Lieblingsfach ist Biologie. Ich möchte gern Medizin studieren und Ärztin werden.", en: "Biology is my favorite. I want to study medicine and become a doctor.", ar: "الأحياء. عايزة أدرس طب وأبقى دكتورة." },
                        { speaker: "Moderator", text: "Für Medizin braucht man sehr gute Noten. Schaffst du das, wenn du weiter so viel trainierst?", en: "Medicine needs good grades. Can you manage that with so much training?", ar: "الطب محتاج درجات عالية. هتقدري تعملي ده مع التمرين الكتير ده؟" },
                        { speaker: "Marina", text: "Ich weiß es nicht. Im Moment konzentriere ich mich auf das Schwimmen. Mal sehen, wie es weitergeht.", en: "I don't know. Currently I focus on swimming. We'll see.", ar: "معرفش. دلوقتي أنا مركزة في السباحة. هنشوف إيه اللي هيحصل." }
                    ]
                },
                {
                    id: 'd2', title: "Studieren in Österreich (الدراسة في النمسا)", icon: "graduation-cap",
                    lines: [
                        { speaker: "Moderator", text: "Bei jungen Leuten ist das Interesse an einem Studium in Österreich stark gestiegen. Warum ist Österreich als Studienort so attraktiv, Herr Meisner?", en: "Interest in studying in Austria has risen. Why is it so attractive, Mr. Meisner?", ar: "اهتمام الشباب بالدراسة في النمسا زاد. ليه النمسا جذابة كده كوجهة دراسية يا أستاذ مايسنر؟" },
                        { speaker: "Herr Meisner", text: "Österreich ist ein sehr schönes Land. Außerdem ist es sehr günstig und es gibt keinen Numerus clausus.", en: "Austria is beautiful, convenient, and there is no numerus clausus (admission restriction).", ar: "النمسا بلد جميل جداً. وموقعها ممتاز ومفيش فيها تنسيق مجموع (Numerus clausus)." },
                        { speaker: "Herr Meisner", text: "Das bedeutet, jeder mit dem Abitur kann jedes Studienfach studieren. Ausnahmen sind Medizin und Psychologie.", en: "Anyone with Abitur can study any subject. Exceptions are medicine and psychology.", ar: "يعني أي حد معاه ثانوية يقدر يدرس أي تخصص. ما عدا الطب وعلم النفس." },
                        { speaker: "Moderator", text: "Die Universitäten unterscheiden sich von den deutschen Unis nicht so sehr, oder?", en: "The universities don't differ much from German ones, right?", ar: "الجامعات مش مختلفة كتير عن جامعات ألمانيا صح؟" },
                        { speaker: "Herr Meisner", text: "Genau. Die Sprache ist gleich und die Studienzeit auch. Das Bachelorstudium dauert drei Jahre, das Masterstudium zwei.", en: "Exactly. Same language and study length. Bachelor is 3 years, Master 2.", ar: "بالظبط. اللغة واحدة ومدة الدراسة واحدة. البكالوريوس 3 سنين والماجستير 2." },
                        { speaker: "Herr Meisner", text: "Das Wintersemester startet am 1. Oktober. Das Sommersemester beginnt am 1. März. Die Anmeldung findet im Sommer statt.", en: "Winter semester starts Oct 1. Summer semester March 1. Enrollment is in summer.", ar: "الترم الشتوي بيبدأ 1 أكتوبر. والصيفي 1 مارس. التقديم بيكون في الصيف." },
                        { speaker: "Herr Meisner", text: "Aber eine einfache Anmeldung bedeutet nicht automatisch einen einfachen Abschluss! Die Prüfungen sind oft sehr schwer.", en: "But easy enrollment doesn't mean easy graduation! Exams are hard.", ar: "بس التسجيل السهل مش معناه تخرج سهل! الامتحانات غالباً صعبة جداً." }
                    ]
                }
            ],
            culture: [
                {
                    id: 'c1', title: "Was hat Lukas gestern gemacht? (روتين لوكاس)",
                    lines: [
                        { g: "Um 9.00 Uhr ist Lukas aufgestanden.", e: "At 9:00 a.m. Lukas got up.", a: "الساعة 9 الصبح لوكاس صحي." },
                        { g: "Danach hat er sich geduscht und sich angezogen.", e: "After that he took a shower and got dressed.", a: "بعدها أخد دُش ولبس هدومه." },
                        { g: "Um 9.45 Uhr ist er mit dem Fahrrad zur Uni gefahren.", e: "At 9:45 a.m. he rode his bike to the university.", a: "الساعة 9:45 راح الجامعة بالعجلة." },
                        { g: "Dort hat Lukas zwei Vorlesungen besucht. In der Pause hat er sich mit einem Freund unterhalten.", e: "There Lukas attended two lectures. During the break he talked with a friend.", a: "هناك حضر محاضرتين. وفي الاستراحة اتكلم مع صاحبه." },
                        { g: "Danach hat Lukas eine Bewerbung geschrieben. Er hat sich um einen Praktikumsplatz bei einer Zeitung beworben.", e: "After that Lukas wrote an application. He applied for an internship at a newspaper.", a: "بعدين كتب طلب تقديم. قدم على تدريب في جريدة." },
                        { g: "Nach dem Mittagessen hat er sich auf eine Präsentation zum Thema Literatur in der Schweiz vorbereitet.", e: "After lunch he prepared for a presentation on literature in Switzerland.", a: "بعد الغدا حضّر لبريزنتيشن عن الأدب في سويسرا." },
                        { g: "Die Präsentation ist gut gelaufen. Am Anfang hat sich Lukas über die Technik geärgert. Sie hat nicht richtig funktioniert.", e: "The presentation went well. At the beginning Lukas was annoyed with the tech. It didn’t work properly.", a: "البريزنتيشن كان كويس. في الأول اتضايق من الأجهزة عشان مشتغلتش كويس." },
                        { g: "Abends ist er ausgegangen und hat sich unsterblich in Anna verliebt.", e: "In the evening he went out and fell madly in love with Anna.", a: "بالليل خرج ووقع في غرام آنا." }
                    ]
                },
                {
                    id: 'c2', title: "Der Tagesablauf von Eva Berger (روتين إيفا)",
                    lines: [
                        { g: "Ich heiße Eva Berger. Normalerweise stehe ich um 7.00 Uhr auf.", e: "My name is Eva Berger. Usually, I get up at 7:00 a.m.", a: "اسمي إيفا بيرجر. في العادة بصحى الساعة 7." },
                        { g: "Auf dem Weg zur Arbeit ärgere ich mich oft über die vielen Staus.", e: "On the way to work, I often get annoyed about the many traffic jams.", a: "في طريقي للشغل بتضايق كتير من الزحمة." },
                        { g: "Ich arbeite in einer Bank: Ich lese meine E-Mails und die Börsenberichte. Danach analysiere ich verschiedene Daten.", e: "I work in a bank: I read emails and stock reports. Then I analyze data.", a: "بشتغل في بنك: بقرأ الإيميلات وتقارير البورصة. وبعدين بحلل البيانات." },
                        { g: "Um 11.00 Uhr haben wir eine kurze Besprechung. Wir unterhalten uns über bestimmte Entwicklungen.", e: "At 11:00 we have a short meeting. We talk about certain developments.", a: "الساعة 11 عندنا اجتماع قصير. بنتكلم فيه عن تطورات معينة." },
                        { g: "Zum Mittagessen treffe ich mich mittwochs und freitags mit meinem Freund. Er ist Ingenieur und sucht Arbeit.", e: "For lunch, I meet my boyfriend on Wed and Fri. He's an engineer looking for work.", a: "في الغدا بقابل صاحبي أيام الأربعاء والجمعة. هو مهندس وبيدور على شغل." },
                        { g: "Er hat sich schon bei zehn verschiedenen Firmen beworben.", e: "He has already applied to ten different companies.", a: "قدم بالفعل في 10 شركات مختلفة." },
                        { g: "Abends lernen wir Französisch. Wir haben uns für einen Sprachkurs eingeschrieben.", e: "In the evenings we study French. We enrolled in a language course.", a: "بالليل بنذاكر فرنساوي. سجلنا في كورس لغة." }
                    ]
                },
                {
                    id: 'c3', title: "Der Tagesablauf von Carola Mitschke (روتين كارولا - طبيبة)",
                    lines: [
                        { g: "Ich heiße Carola Mitschke und bin Hausärztin.", e: "My name is Carola Mitschke and I am a general practitioner.", a: "اسمي كارولا ميتشكه وأنا طبيبة عامة." },
                        { g: "Die Praxis öffnet um 7.30 Uhr, ab 8.00 Uhr beginnt die Sprechstunde.", e: "The practice opens at 7:30, consultations begin at 8:00.", a: "العيادة بتفتح 7:30، ومن 8 بتبدأ الكشوفات." },
                        { g: "Zuerst unterhalte ich mich mit den Patienten über ihre Probleme, danach untersuche ich sie.", e: "First, I talk with patients about problems, then I examine them.", a: "أولاً بتكلم مع المرضى عن مشاكلهم، وبعدين بكشف عليهم." },
                        { g: "Zum Schluss schreibe ich ein Rezept für die Medikamente oder überweise sie zu einem Facharzt.", e: "Finally, I write a prescription or refer them to a specialist.", a: "في النهاية بكتب روشتة للأدوية أو بحولهم لطبيب متخصص." },
                        { g: "Gestern habe ich mich auf eine Konferenz vorbereitet. Ich halte dort einen kurzen Vortrag.", e: "Yesterday, I prepared for a conference. I will give a short lecture there.", a: "إمبارح حضرت لمؤتمر. هعمل هناك محاضرة قصيرة." }
                    ]
                },
                {
                    id: 'c4', title: "Bildungswege in Deutschland (مسارات التعليم في ألمانيا)",
                    lines: [
                        { g: "Kleinkinder bis drei Jahre können in eine Kinderkrippe gehen, Kinder zwischen drei und sechs in einen Kindergarten.", e: "Toddlers up to 3 can go to daycare, children 3-6 to kindergarten.", a: "الأطفال لحد 3 سنين ممكن يروحوا الحضانة (Kinderkrippe)، ومن 3 لـ 6 رياض الأطفال (Kindergarten)." },
                        { g: "Die Preise für die Betreuung variieren stark. Manche verlangen keine Gebühren, andere kosten mehrere hundert Euro.", e: "Childcare prices vary. Some are free, others cost several hundred euros.", a: "أسعار الرعاية بتختلف جداً. بعضها مجاني والتاني بيكلف مئات اليوروهات." },
                        { g: "Die meisten Schulen sind staatlich und gebührenfrei.", e: "Most schools are public and free of charge.", a: "معظم المدارس حكومية ومجانية." },
                        { g: "Verantwortlich für Schulpolitik sind die einzelnen Bundesländer.", e: "The federal states are responsible for school policy.", a: "الولايات هي المسؤولة عن سياسة التعليم." },
                        { g: "Die Grundschule besuchen die Kinder von der 1. bis zur 4. Klasse.", e: "Children attend elementary school from 1st to 4th grade.", a: "المدرسة الابتدائية من الصف الأول للرابع." },
                        { g: "Es gibt die Hauptschule, die Realschule oder das Gymnasium. Am Gymnasium kann man das Abitur machen.", e: "There is Hauptschule, Realschule, or Gymnasium. At Gymnasium you can take the Abitur.", a: "فيه الـ Hauptschule و Realschule و Gymnasium. في الجيمنازيوم ممكن تعمل الثانوية (Abitur)." },
                        { g: "Damit bekommt man die allgemeine Hochschulreife und kann an einer Universität studieren.", e: "This gives university entrance qualification to study at a university.", a: "وبكده بتاخد مؤهل دخول الجامعة وتقدر تدرس." },
                        { g: "Nach der Haupt- oder Realschule machen viele Jugendliche eine Berufsausbildung (2 bis 3 Jahre).", e: "After Haupt/Realschule, many do vocational training (2-3 years).", a: "بعد المدارس دي، شباب كتير بيعملوا تدريب مهني (سنتين لـ 3)." }
                    ]
                },
                {
                    id: 'c5', title: "Schulsystem in Ägypten (نظام التعليم في مصر)",
                    lines: [
                        { g: "In meinem Heimatland Ägypten müssen Kinder ab sechs Jahren in die Schule gehen.", e: "In Egypt, children must go to school from the age of six.", a: "في مصر، الأطفال لازم يروحوا المدرسة من سن 6 سنين." },
                        { g: "Die gesamte Schulzeit bis zum Universitätsstudium dauert zwölf Jahre. (Grundschule, Vorbereitungsschule, Oberschule)", e: "The entire school period lasts 12 years. (Primary, Preparatory, Secondary)", a: "فترة الدراسة كلها للجامعة 12 سنة. (ابتدائي، إعدادي، ثانوي)." },
                        { g: "Es gibt staatliche Schulen, die fast kostenlos sind, und private Schulen, die teuer sein können.", e: "There are public schools (almost free) and private schools (expensive).", a: "فيه مدارس حكومية (شبه مجانية) ومدارس خاصة ممكن تكون غالية." },
                        { g: "Das Notensystem basiert auf Prozenten. Die Noten der 'Thanaweya Amma' sind extrem wichtig.", e: "The grading system is based on percentages. 'Thanaweya Amma' grades are extremely important.", a: "نظام الدرجات مبني على النسب المئوية. درجات الثانوية العامة مهمة جداً." },
                        { g: "Das Ergebnis entscheidet darüber, an welcher Universität und in welcher Fakultät man studieren darf.", e: "The result decides at which university and faculty one is allowed to study.", a: "النتيجة بتحدد هتدخل أي جامعة وأي كلية." }
                    ]
                },
                {
                    id: 'c6', title: "Lebenslauf: Lena Hummel (السيرة الذاتية لـ لينا)",
                    lines: [
                        { g: "Lena Hummel arbeitet seit 2012 als Personalreferentin bei der DEKRA in Berlin.", e: "Lena Hummel has been working as an HR Officer at DEKRA in Berlin since 2012.", a: "لينا هومل شغالة مسؤولة موارد بشرية (HR) في DEKRA في برلين من 2012." },
                        { g: "Ihre Aufgaben: Betreuung von Personal, Führen von Personalakten und Mitarbeiterschulung.", e: "Her tasks: Personnel support, maintaining files, employee training.", a: "مهامها: رعاية الموظفين، إدارة ملفات شؤون العاملين، وتدريب الموظفين." },
                        { g: "Sie hat 2008 Abitur gemacht (Note 1,8) und dann Betriebswirtschaftslehre (BWL) an der Universität Leipzig studiert.", e: "She graduated high school in 2008 and studied Business Administration in Leipzig.", a: "عملت ثانوية عامة سنة 2008 وبعدين درست إدارة أعمال في جامعة لايبزيغ." },
                        { g: "Ihr Studienschwerpunkt war Personalmanagement. Sie spricht sehr gut Englisch (C1) und ein bisschen Spanisch (A2).", e: "Her specialization was HR. She speaks English very well (C1) and a little Spanish (A2).", a: "تخصصها كان إدارة الموارد البشرية. بتتكلم إنجليزي كويس جداً وشوية إسباني." },
                        { g: "Lena ist ledig.", e: "Lena is single.", a: "لينا عزباء." }
                    ]
                }
            ],
            letters: [
                {
                    id: 'l1', title: "E-Mail an eine Freundin (إيميل عن الدراسة في النمسا)",
                    lines: [
                        { g: "Hallo Anna,", e: "Hello Anna,", a: "أهلاً آنا،" },
                        { g: "ich studiere seit zwei Monaten in Wien.", e: "I have been studying in Vienna for two months.", a: "أنا بدرس في فيينا بقالي شهرين." },
                        { g: "Mein Studium gefällt mir sehr gut, besonders die Vorlesungen in Biologie.", e: "I like my studies very much, especially the biology lectures.", a: "دراستي عجباني جداً، بالذات محاضرات الأحياء." },

                const lower = part.toLowerCase();
                if (lower === 'der ') return <span key={i} className="text-blue-500 font-extrabold">{part}</span>;
                if (lower === 'die ') return <span key={i} className="text-rose-500 font-extrabold">{part}</span>;

            const [expanded, setExpanded] = useState(false);
            return (
                <div className="bg-white border border-slate-200 rounded-3xl shadow-sm overflow-hidden mb-6 transition-all duration-300 hover:shadow-lg" dir="ltr">
                    <button
                        className="w-full p-6 flex items-center justify-between bg-gradient-to-r from-slate-50 to-white"
                        onClick={() => setExpanded(!expanded)}
                    >
                        <div className="flex items-center gap-4">
                            <div className="bg-blue-100 text-blue-600 p-3 rounded-2xl">
                                <i data-lucide={dialogue.icon} className="w-6 h-6"></i>
                            </div>
                            <h3 className="text-xl md:text-2xl font-bold text-slate-800 ar-text">{dialogue.title}</h3>
                        </div>
                        <i data-lucide="chevron-down" className={`w-6 h-6 text-slate-400 transform transition-transform duration-300 ${expanded ? 'rotate-180 text-blue-600' : ''}`}></i>
                    </button>

                    <div className={`transition-all duration-500 overflow-hidden ${expanded ? 'max-h-[3000px] opacity-100' : 'max-h-0 opacity-0'}`}>
                        <div className="p-6 bg-white space-y-4">
                            {dialogue.lines.map((line, idx) => {
                                const isFirstSpeaker = idx === 0 || line.speaker === dialogue.lines[0].speaker;
                                return (
                                    <div key={idx} className={`flex flex-col p-4 rounded-2xl border ${isFirstSpeaker ? 'bg-blue-50/50 border-blue-100 ml-8' : 'bg-slate-50 border-slate-100 mr-8'}`}>
                                        <div className="flex justify-between items-start mb-2">
                                            <span className={`text-xs font-bold uppercase tracking-wider px-2 py-1 rounded-md ${isFirstSpeaker ? 'bg-blue-100 text-blue-700' : 'bg-slate-200 text-slate-700'}`}>
                                                {line.speaker}
                                            </span>
                                            <div className="flex gap-2">
                                                <button onClick={(e) => playAudio(line.text, e)} className="text-slate-400 hover:text-blue-600 transition-colors"><i data-lucide="volume-2" className="w-4 h-4"></i></button>
                                                <SpeechTester targetText={line.text} />
                                            </div>
                                        </div>
                                        <p className="text-lg font-medium text-slate-800 mb-1">{line.text}</p>
                                        <p className="text-sm text-slate-500 mb-2 italic">{line.en}</p>
                                        <p className="text-blue-700 font-bold ar-text border-t border-slate-200/50 pt-2 text-right" dir="rtl">{line.ar}</p>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        };

        // Custom UI for Grammar: Reflexive Pronouns Table
        const ReflexiveTable = () => {
            const thClass = "border border-slate-200 p-3 bg-purple-50 font-bold text-purple-800 text-sm tracking-wider";
            const tdClass = "border border-slate-200 p-3 text-slate-700 font-medium";
            return (
                <div className="space-y-4" dir="ltr">
                    <div className="overflow-x-auto bg-white rounded-2xl shadow-sm border border-slate-200 p-4">
                        <table className="w-full border-collapse">
                            <thead>
                                <tr>
                                    <th className={thClass}>Person</th>
                                    <th className={thClass}>Akkusativ (A)</th>
                                    <th className={thClass}>Dativ (D)</th>
                                    <th className={thClass}>Beispiel / Example</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr><td className={tdClass}>ich</td><td className={tdClass}>mich</td><td className={tdClass}>mir</td><td className={tdClass}>Ich wasche <b>mich</b>. / Ich wasche <b>mir</b> die Hände.</td></tr>
                                <tr><td className={tdClass}>du</td><td className={tdClass}>dich</td><td className={tdClass}>dir</td><td className={tdClass}>Du duschst <b>dich</b>. / Du kaufst <b>dir</b> ein Buch.</td></tr>
                                <tr><td className={tdClass}>er/sie/es</td><td className={tdClass}>sich</td><td className={tdClass}>sich</td><td className={tdClass}>Er rasiert <b>sich</b>. / Sie nimmt <b>sich</b> Zeit.</td></tr>
                                <tr><td className={tdClass}>wir</td><td className={tdClass}>uns</td><td className={tdClass}>uns</td><td className={tdClass}>Wir setzen <b>uns</b>. / Wir kochen <b>uns</b> Tee.</td></tr>
                                <tr><td className={tdClass}>ihr</td><td className={tdClass}>euch</td><td className={tdClass}>euch</td><td className={tdClass}>Ihr beeilt <b>euch</b>. / Ihr nehmt <b>euch</b> Essen.</td></tr>
                                <tr><td className={tdClass}>sie/Sie</td><td className={tdClass}>sich</td><td className={tdClass}>sich</td><td className={tdClass}>Sie freuen <b>sich</b>. / Sie kaufen <b>sich</b> ein Auto.</td></tr>
                            </tbody>
                        </table>
                    </div>
                    <div className="bg-purple-50 p-4 rounded-xl border border-purple-100 ar-text" dir="rtl">
                        <p className="font-bold text-purple-800 mb-2">💡 قاعدة مهمة:</p>
                        <p className="text-purple-700">يأتي الضمير المنعكس بعد الفعل المصرف أو بعد الفاعل مباشرة (إذا كان الفاعل ضمير شخصي):</p>
                        <ul className="list-disc list-inside mt-2 text-slate-600" dir="ltr">
                            <li>Hat <b>sich</b> Peter geärgert? / Hat Peter <b>sich</b> geärgert?</li>
                            <li>Hat er <b>sich</b> geärgert? (ضمير شخصي)</li>
                        </ul>
                    </div>
                </div>
            );
        };

        // --- MAIN APP ---
        const App = () => {
            const [activeTab, setActiveTab] = useState('words');
            const [learnedItems, setLearnedItems] = useState(new Set());
            const [searchTerm, setSearchTerm] = useState('');

            // Load saved progress
            useEffect(() => {
                const saved = localStorage.getItem('a2_alltag_progress');
                if (saved) setLearnedItems(new Set(JSON.parse(saved)));
            }, []);

            // Save progress
            useEffect(() => {
                localStorage.setItem('a2_alltag_progress', JSON.stringify(Array.from(learnedItems)));
            }, [learnedItems]);

            useEffect(() => { lucide.createIcons(); });

            const toggleLearned = (id) => {
                const newLearned = new Set(learnedItems);
                if (newLearned.has(id)) newLearned.delete(id);
                else newLearned.add(id);
                setLearnedItems(newLearned);
            };

            const totalWords = LEARNING_DATA.words.schulfaecher.length + LEARNING_DATA.words.berufe.length;
            const totalVerbs = LEARNING_DATA.verbs.length;
            const totalExp = LEARNING_DATA.expressions.length;
            const grandTotal = totalWords + totalVerbs + totalExp;

            const tabConfig = {
                words: { labelEn: 'Vocabulary', labelAr: 'مفردات هامة', icon: 'briefcase', color: 'orange' },
                expressions: { labelEn: 'Phrases', labelAr: 'عبارات المحادثة', icon: 'calendar', color: 'amber' },
                dialogues: { labelEn: 'Dialogues', labelAr: 'حوارات', icon: 'phone-call', color: 'blue' },
                verbs: { labelEn: 'Verbs', labelAr: 'الأفعال المنعكسة', icon: 'list-checks', color: 'emerald' },
                grammar: { labelEn: 'Grammar', labelAr: 'القواعد', icon: 'book-open', color: 'purple' },
                letters: { labelEn: 'Emails', labelAr: 'إيميلات ورسائل', icon: 'mail', color: 'cyan' },
                culture: { labelEn: 'Culture', labelAr: 'نصوص القراءة', icon: 'globe', color: 'rose' }
            };

            const activeColor = tabConfig[activeTab].color;

            return (
                <div className="h-screen flex flex-col bg-slate-50" dir="rtl">
                    {/* TOP NAVIGATION HEADER */}
                    <header className="w-full bg-slate-900 text-white shadow-xl z-50 shrink-0 relative overflow-hidden">
                        <div className={`absolute top-0 left-0 w-full h-1 bg-${activeColor}-500 transition-colors duration-500`}></div>

                        <div className="flex justify-between items-center px-4 md:px-8 py-3 border-b border-slate-800">
                            <h1 className="text-xl md:text-2xl font-extrabold flex items-center gap-3 ar-text">
                                <span className={`bg-${activeColor}-500 p-2 rounded-xl transition-colors duration-500 shadow-lg`}>
                                    <i data-lucide="book" className="w-5 h-5 md:w-6 md:h-6 text-white"></i>
                                </span>
                                A2: Alltag, Ausbildung & Verben
                            </h1>

                            <div className="flex items-center gap-3" dir="ltr">
                                <div className="text-right hidden sm:block">
                                    <div className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Progress</div>
                                    <div className={`text-sm font-extrabold text-${activeColor}-400 transition-colors`}>{grandTotal === 0 ? 0 : Math.round((learnedItems.size / grandTotal) * 100)}%</div>
                                </div>
                                <div className="relative w-10 h-10">
                                    <svg className="w-full h-full transform -rotate-90" viewBox="0 0 36 36">
                                        <path className="text-slate-800" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" strokeWidth="4" />
                                        <path className={`text-${activeColor}-500 transition-all duration-1000 ease-out`} strokeDasharray={`${grandTotal === 0 ? 0 : (learnedItems.size / grandTotal) * 100}, 100`} d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" strokeWidth="4" strokeLinecap="round" />
                                    </svg>
                                </div>
                            </div>
                        </div>

                        {/* Horizontal Navigation Tabs */}
                        <nav className="flex overflow-x-auto scrollbar-hide px-4 py-2 gap-2 snap-x">
                            {Object.entries(tabConfig).map(([key, tab]) => (
                                <button
                                    key={key}
                                    onClick={() => { setActiveTab(key); setSearchTerm(''); }}
                                    className={`snap-center shrink-0 flex items-center gap-2 px-4 py-2.5 rounded-xl transition-all duration-300 font-bold ar-text group relative overflow-hidden ${activeTab === key ? `bg-${tab.color}-600 text-white shadow-md` : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}
                                >
                                    <i data-lucide={tab.icon} className={`w-5 h-5 ${activeTab === key ? 'text-white' : `text-${tab.color}-400 group-hover:text-${tab.color}-300`} transition-colors`}></i>
                                    <span className="text-sm whitespace-nowrap">{tab.labelAr}</span>
                                    {activeTab === key && <div className="absolute bottom-0 left-1/2 transform -translate-x-1/2 w-1/2 h-0.5 bg-white/50 rounded-t-full"></div>}
                                </button>
                            ))}
                        </nav>
                    </header>

                    {/* MAIN CONTENT AREA */}
                    <main className="flex-1 overflow-y-auto p-4 md:p-8 lg:p-12 relative" dir="ltr">
                        <div className={`fixed top-1/4 left-1/4 w-[50vw] h-[50vw] rounded-full bg-${activeColor}-200/20 blur-3xl -z-10 transition-colors duration-1000 pointer-events-none`}></div>

                        <div className="max-w-7xl mx-auto">

                            {/* LIVE SEARCH BAR */}
                            {activeTab !== 'grammar' && activeTab !== 'culture' && activeTab !== 'dialogues' && activeTab !== 'letters' && (
                                <div className="flex flex-col md:flex-row gap-4 mb-10" dir="rtl">
                                    <div className="flex-1 relative group max-w-3xl mx-auto w-full">
                                        <div className={`absolute -inset-0.5 bg-gradient-to-r from-${activeColor}-400 to-${activeColor}-600 rounded-2xl blur opacity-20 group-hover:opacity-40 transition duration-500`}></div>
                                        <div className="relative">
                                            <i data-lucide="search" className="absolute right-4 top-1/2 transform -translate-y-1/2 text-slate-400 w-6 h-6"></i>
                                            <input
                                                type="text"
                                                placeholder="ابحث بالعربي أو الألماني..."
                                                value={searchTerm}
                                                onChange={(e) => setSearchTerm(e.target.value)}
                                                className={`w-full pr-14 pl-6 py-4 rounded-2xl border-none focus:outline-none focus:ring-4 focus:ring-${activeColor}-500/20 shadow-lg text-lg ar-text text-slate-700 font-medium`}
                                            />
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* PROGRESS BARS */}
                            {activeTab === 'words' && <ProgressBar total={totalWords} learned={Array.from(learnedItems).filter(id => id.startsWith('w')).length} colorClass="text-orange-500" />}
                            {activeTab === 'verbs' && <ProgressBar total={totalVerbs} learned={Array.from(learnedItems).filter(id => id.startsWith('v')).length} colorClass="text-emerald-500" />}
                            {activeTab === 'expressions' && <ProgressBar total={totalExp} learned={Array.from(learnedItems).filter(id => id.startsWith('e')).length} colorClass="text-amber-500" />}

                            {/* TAB: WORDS */}
                            {activeTab === 'words' && (
                                <div className="space-y-12">
                                    <section>
                                        <h2 className="text-3xl font-extrabold text-slate-800 mb-6 flex items-center gap-3 ar-text" dir="rtl"><span className="bg-orange-100 p-2 rounded-xl text-orange-600"><i data-lucide="book-open" className="w-6 h-6"></i></span> المواد المدرسية (Schulfächer)</h2>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-6">
                                            {LEARNING_DATA.words.schulfaecher.filter(w => w.ger.toLowerCase().includes(searchTerm.toLowerCase()) || w.eng.toLowerCase().includes(searchTerm.toLowerCase()) || w.ar.includes(searchTerm)).map(word => (
                                                <WordCard key={word.id} item={word} isLearned={learnedItems.has(word.id)} toggleLearned={toggleLearned} />
                                            ))}
                                        </div>
                                    </section>

                                    <section>
                                        <h2 className="text-3xl font-extrabold text-slate-800 mb-6 flex items-center gap-3 ar-text" dir="rtl"><span className="bg-red-100 p-2 rounded-xl text-red-600"><i data-lucide="briefcase" className="w-6 h-6"></i></span> المهن والتخصصات (Berufe)</h2>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-6">
                                            {LEARNING_DATA.words.berufe.filter(w => w.ger.toLowerCase().includes(searchTerm.toLowerCase()) || w.eng.toLowerCase().includes(searchTerm.toLowerCase()) || w.ar.includes(searchTerm)).map(word => (
                                                <WordCard key={word.id} item={word} isLearned={learnedItems.has(word.id)} toggleLearned={toggleLearned} />
                                            ))}
                                        </div>
                                    </section>
                                </div>
                            )}

                            {/* TAB: EXPRESSIONS */}
                            {activeTab === 'expressions' && (
                                <div dir="rtl">
                                    <h2 className="text-3xl font-extrabold text-slate-800 mb-8 flex items-center gap-3 ar-text">
                                        <span className="bg-amber-100 p-2 rounded-xl text-amber-600"><i data-lucide="message-circle" className="w-6 h-6"></i></span>
                                        عبارات المحادثة (Ausdrücke)
                                    </h2>
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                        {LEARNING_DATA.expressions.filter(e => e.ger.toLowerCase().includes(searchTerm.toLowerCase()) || e.eng.toLowerCase().includes(searchTerm.toLowerCase()) || e.ar.includes(searchTerm)).map(exp => (
                                            <div key={exp.id} className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm relative group hover:shadow-xl hover:border-amber-200 transition-all duration-300">
                                                <button onClick={() => toggleLearned(exp.id)} className={`absolute top-5 left-5 p-2 rounded-full transition-colors z-10 ${learnedItems.has(exp.id) ? 'bg-amber-100 text-amber-600' : 'bg-slate-50 text-slate-300 hover:bg-slate-100'}`}>
                                                    <i data-lucide="check" className="w-5 h-5"></i>
                                                </button>
                                                <span className="inline-block bg-amber-50 text-amber-600 px-3 py-1 rounded-lg text-xs font-bold mb-4 ar-text border border-amber-100">{exp.type}</span>
                                                <div className="flex items-start gap-3 mb-3" dir="ltr">
                                                    <div className="flex flex-col gap-2 shrink-0">
                                                        <button onClick={(e) => playAudio(exp.ger, e)} className="text-amber-500 bg-amber-50 p-2 rounded-xl hover:bg-amber-100 transition-colors"><i data-lucide="volume-2" className="w-5 h-5"></i></button>
                                                        <div className="bg-slate-50 rounded-full p-1"><SpeechTester targetText={exp.ger} /></div>
                                                    </div>
                                                    <div>
                                                        <h3 className="text-lg font-extrabold text-slate-800 leading-tight mt-1">"{exp.ger}"</h3>
                                                    </div>
                                                </div>

                                                <div className="bg-slate-50 rounded-2xl p-4 mt-4 border border-slate-100">
                                                    <p className="text-slate-500 font-medium text-sm mb-2" dir="ltr">{exp.eng}</p>
                                                    <p className="text-amber-700 font-extrabold text-lg mb-4 ar-text">{exp.ar}</p>
                                                    <div className="text-sm text-slate-600 flex gap-2 items-start pt-3 border-t border-slate-200">
                                                        <i data-lucide="info" className="w-5 h-5 text-amber-400 mt-0.5 shrink-0"></i>
                                                        <span className="ar-text leading-relaxed">{exp.context}</span>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* TAB: DIALOGUES */}
                            {activeTab === 'dialogues' && (
                                <div dir="rtl">
                                    <h2 className="text-3xl font-extrabold text-slate-800 mb-8 flex items-center gap-3 ar-text">
                                        <span className="bg-blue-100 p-2 rounded-xl text-blue-600"><i data-lucide="mic" className="w-6 h-6"></i></span>
                                        مقابلات وحوارات (Interviews)
                                    </h2>
                                    <div className="max-w-4xl mx-auto space-y-6">
                                        {LEARNING_DATA.dialogues.map(dialogue => (
                                            <DialogueRow key={dialogue.id} dialogue={dialogue} />
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* TAB: VERBS */}
                            {activeTab === 'verbs' && (
                                <div>
                                    <h2 className="text-3xl font-extrabold text-slate-800 mb-8 flex items-center gap-3 ar-text" dir="rtl">
                                        <span className="bg-emerald-100 p-2 rounded-xl text-emerald-600"><i data-lucide="list-checks" className="w-6 h-6"></i></span>
                                        الأفعال المنعكسة وحروف الجر (Verben)
                                    </h2>
                                    <div className="space-y-4 max-w-4xl mx-auto">
                                        {LEARNING_DATA.verbs.filter(v => v.ger.toLowerCase().includes(searchTerm.toLowerCase()) || v.eng.toLowerCase().includes(searchTerm.toLowerCase()) || v.ar.includes(searchTerm)).map(verb => (
                                            <VerbRow key={verb.id} item={verb} isLearned={learnedItems.has(verb.id)} toggleLearned={toggleLearned} />
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* TAB: GRAMMAR */}
                            {activeTab === 'grammar' && (
                                <div dir="rtl">
                                    <div className="bg-gradient-to-br from-purple-700 to-indigo-800 text-white p-10 rounded-3xl shadow-xl mb-10 relative overflow-hidden">
                                        <i data-lucide="book-open" className="absolute -right-4 -bottom-4 w-48 h-48 text-white opacity-10 transform rotate-12"></i>
                                        <div className="relative z-10">
                                            <h2 className="text-4xl font-extrabold mb-3 ar-text">القواعد النحوية (Grammatik)</h2>
                                            <p className="text-purple-200 ar-text text-lg max-w-2xl">الضمائر المنعكسة (Reflexivpronomen) وجمل الشرط باستخدام (Wenn).</p>
                                        </div>
                                    </div>

                                    <div className="grid gap-8">
                                        {LEARNING_DATA.grammar.map((gram, idx) => (
                                            <div key={idx} className="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden hover:shadow-lg transition-shadow">
                                                <div className="p-8 border-b border-slate-50 bg-slate-50/50 flex items-start gap-4">
                                                    <div className="bg-purple-100 p-3 rounded-2xl text-purple-600 shrink-0 mt-1">
                                                        <i data-lucide="braces" className="w-6 h-6"></i>
                                                    </div>
                                                    <div>
                                                        <h3 className="text-2xl font-extrabold text-slate-800 ar-text mb-2">{gram.title}</h3>
                                                        <p className="text-base text-slate-600 ar-text leading-relaxed">{gram.desc}</p>
                                                    </div>
                                                </div>

                                                <div className="p-8">
                                                    {gram.structure && (
                                                        <div className="bg-slate-900 text-purple-300 font-mono text-base p-5 rounded-2xl mb-8 shadow-inner flex items-center gap-3 overflow-x-auto border border-slate-800" dir="ltr">
                                                            <i data-lucide="code" className="text-slate-500 w-5 h-5 shrink-0"></i> {gram.structure}
                                                        </div>
                                                    )}

                                                    {gram.examples && (
                                                        <>
                                                            <h4 className="font-bold text-slate-400 mb-4 text-sm tracking-widest uppercase ar-text">أمثلة للتوضيح:</h4>
                                                            <ul className="space-y-4">
                                                                {gram.examples.map((ex, i) => (
                                                                    <li key={i} className="bg-purple-50/50 p-5 rounded-2xl border border-purple-100">
                                                                        <span className="inline-block bg-purple-100 text-purple-700 px-3 py-1 rounded-lg text-xs font-bold mb-3 ar-text">{ex.category}</span>
                                                                        <div className="flex gap-4 items-start mb-3" dir="ltr">
                                                                            <button onClick={(e) => playAudio(ex.g, e)} className="text-purple-500 bg-white p-2 rounded-xl shadow-sm hover:bg-purple-50 transition-colors shrink-0"><i data-lucide="volume-2" className="w-5 h-5"></i></button>
                                                                            <div className="flex flex-col gap-1">
                                                                                <span className="text-slate-800 text-lg font-medium" dangerouslySetInnerHTML={{ __html: ex.g }}></span>
                                                                                {ex.e && <span className="text-slate-500 text-sm italic">{ex.e}</span>}
                                                                            </div>
                                                                        </div>
                                                                        <div className="text-purple-700 font-bold ar-text border-t border-purple-200/50 pt-3 mt-3">{ex.a}</div>
                                                                    </li>
                                                                ))}
                                                            </ul>
                                                        </>
                                                    )}

                                                    {gram.type === 'reflexive_table' && <ReflexiveTable />}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* TAB: LETTERS */}
                            {activeTab === 'letters' && (
                                <div dir="rtl">
                                    <div className="bg-gradient-to-br from-cyan-600 to-teal-800 text-white p-10 rounded-3xl shadow-xl mb-10 relative overflow-hidden">
                                        <i data-lucide="mail" className="absolute -left-4 -top-4 w-48 h-48 text-white opacity-10 transform -rotate-12"></i>
                                        <div className="relative z-10">
                                            <h2 className="text-4xl font-extrabold mb-3 ar-text">رسائل وإيميلات (E-Mails & SMS)</h2>
                                            <p className="text-cyan-100 ar-text text-lg max-w-2xl">طريقة كتابة الإيميلات والرسائل القصيرة في المواقف المختلفة.</p>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-1 gap-8">
                                        {LEARNING_DATA.letters.map((letter) => (
                                            <div key={letter.id} className="bg-white rounded-3xl p-8 shadow-sm border border-slate-100 hover:shadow-lg transition-shadow relative">
                                                <div className="absolute top-0 right-8 transform -translate-y-1/2 bg-cyan-100 text-cyan-700 px-4 py-1 rounded-full font-bold text-sm tracking-wider uppercase shadow-sm">
                                                    Text
                                                </div>
                                                <h3 className="text-2xl font-extrabold text-slate-800 ar-text mb-6 mt-2 flex items-center gap-3">
                                                    <i data-lucide="message-square" className="w-6 h-6 text-cyan-500"></i> {letter.title}
                                                </h3>
                                                <div className="space-y-4">
                                                    {letter.lines.map((line, idx) => {
                                                        const isHeader = line.g.includes("---");
                                                        return (
                                                            <div key={idx} className={`${isHeader ? 'bg-cyan-600 text-white font-bold text-center py-2 rounded-xl my-4' : 'bg-slate-50/50 p-4 rounded-2xl border border-cyan-100 shadow-sm flex flex-col sm:flex-row gap-4 justify-between items-start group'}`}>
                                                                {isHeader ? (
                                                                    <span className="ar-text">{line.a}</span>
                                                                ) : (
                                                                    <>
                                                                        <div className="flex-1">
                                                                            <div className="flex items-start gap-3 mb-2" dir="ltr">
                                                                                <button onClick={(e) => playAudio(line.g, e)} className="mt-0.5 text-cyan-600 bg-white p-2 rounded-xl shadow-sm hover:bg-cyan-50 transition-colors shrink-0">
                                                                                    <i data-lucide="volume-2" className="w-4 h-4"></i>
                                                                                </button>
                                                                                <p className="text-slate-800 text-lg font-medium leading-relaxed mt-1" dangerouslySetInnerHTML={{ __html: line.g }}></p>
                                                                            </div>
                                                                            {line.e && <p className="sm:ml-14 text-slate-500 text-sm italic mb-2" dir="ltr">{line.e}</p>}
                                                                            <div className="sm:ml-14 text-cyan-800 text-base font-bold ar-text border-t border-slate-200 pt-3 text-right" dir="rtl" dangerouslySetInnerHTML={{ __html: line.a }}>
                                                                            </div>
                                                                        </div>
                                                                        <div className="opacity-100 sm:opacity-0 group-hover:opacity-100 transition-opacity shrink-0 sm:mt-1 self-end sm:self-start bg-white shadow-sm p-1.5 rounded-full" dir="ltr">
                                                                            <SpeechTester targetText={line.g} />
                                                                        </div>
                                                                    </>
                                                                )}
                                                            </div>
                                                        )
                                                    })}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* TAB: CULTURE */}
                            {activeTab === 'culture' && (
                                <div dir="rtl">
                                    <div className="bg-gradient-to-br from-rose-600 to-red-800 text-white p-10 rounded-3xl shadow-xl mb-10 relative overflow-hidden">
                                        <i data-lucide="book-open" className="absolute -left-4 -top-4 w-48 h-48 text-white opacity-10 transform -rotate-12"></i>
                                        <div className="relative z-10">
                                            <h2 className="text-4xl font-extrabold mb-3 ar-text">نصوص القراءة (Lesetexte)</h2>
                                            <p className="text-rose-200 ar-text text-lg max-w-2xl">نصوص طويلة عن الروتين اليومي، الدراسة، وأنظمة التعليم في ألمانيا ومصر.</p>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-1 gap-8">
                                        {LEARNING_DATA.culture.map((item) => (
                                            <div key={item.id} className="bg-white rounded-3xl p-8 shadow-sm border border-slate-100 hover:shadow-lg transition-shadow relative">
                                                <div className="absolute top-0 right-8 transform -translate-y-1/2 bg-rose-100 text-rose-600 px-4 py-1 rounded-full font-bold text-sm tracking-wider uppercase shadow-sm">
                                                    Lesetext
                                                </div>
                                                <h3 className="text-3xl font-extrabold text-slate-800 ar-text mb-6 mt-2">{item.title}</h3>
                                                <div className="space-y-4">
                                                    {item.lines.map((line, idx) => (
                                                        <div key={idx} className="bg-slate-50/50 p-4 rounded-2xl border border-rose-100 shadow-sm flex flex-col sm:flex-row gap-4 justify-between items-start group">
                                                            <div className="flex-1">
                                                                <div className="flex items-start gap-3 mb-2" dir="ltr">
                                                                    <button onClick={(e) => playAudio(line.g, e)} className="mt-0.5 text-rose-500 bg-white p-2 rounded-xl shadow-sm hover:bg-rose-50 transition-colors shrink-0">
                                                                        <i data-lucide="volume-2" className="w-4 h-4"></i>
                                                                    </button>
                                                                    <p className="text-slate-800 text-xl font-medium leading-relaxed mt-1" dangerouslySetInnerHTML={{ __html: line.g }}></p>
                                                                </div>
                                                                {line.e && <p className="sm:ml-14 text-slate-500 text-sm italic mb-2" dir="ltr">{line.e}</p>}
                                                                <div className="sm:ml-14 text-rose-700 text-lg font-bold ar-text border-t border-slate-200 pt-3 text-right" dir="rtl" dangerouslySetInnerHTML={{ __html: line.a }}>
                                                                </div>
                                                            </div>
                                                            <div className="opacity-100 sm:opacity-0 group-hover:opacity-100 transition-opacity shrink-0 sm:mt-1 self-end sm:self-start bg-white shadow-sm p-1.5 rounded-full" dir="ltr">
                                                                <SpeechTester targetText={line.g} />
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
