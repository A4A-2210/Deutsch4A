        // --- HELPERS FOR AUDIO & SPEECH ---
        const playAudio = (text, e) => {
            if (e) e.stopPropagation();
            const cleanText = text.replace(/<[^>]+>/g, '');
            const utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.lang = 'de-DE';
            window.speechSynthesis.speak(utterance);
        };

        const SpeechTester = ({ targetText }) => {
            const [status, setStatus] = React.useState('idle');
            const [heard, setHeard] = React.useState('');

            const listen = (e) => {
                if (e) e.stopPropagation();
                if (!('webkitSpeechRecognition' in window)) {
                    alert('المتصفح ده مش بيدعم تسجيل الصوت، جرب Google Chrome.');
                    return;
                }
                const recognition = new webkitSpeechRecognition();
                recognition.lang = 'de-DE';
                recognition.interimResults = false;

                recognition.onstart = () => setStatus('listening');
                recognition.onresult = (event) => {
                    const speechResult = event.results[0][0].transcript;
                    setHeard(speechResult);

                    const clean = (str) => str.replace(/<[^>]+>/g, '').toLowerCase().replace(/[.,!?:]/g, '').trim();
                    const targetClean = clean(targetText);
                    const heardClean = clean(speechResult);

                    if (heardClean.includes(targetClean) || targetClean.includes(heardClean) || heardClean === targetClean) {
                        setStatus('success');
                    } else {
                        setStatus('fail');
                    }
                };
                recognition.onerror = () => setStatus('fail');
                recognition.onend = () => { if (status === 'listening') setStatus('idle'); };
                recognition.start();
            };

            return (
                <div className="inline-flex items-center gap-2" onClick={(e) => e.stopPropagation()}>
                    <button onClick={listen} title="جرب تنطقها" className={`p-2 rounded-full transition-all duration-300 shadow-sm ${status === 'listening' ? 'bg-red-500 text-white animate-pulse scale-110' : 'bg-slate-100 text-slate-600 hover:bg-slate-200 hover:scale-105'}`}>
                        <i data-lucide="mic" className="w-4 h-4"></i>
                    </button>
                    {status === 'success' && <span className="text-emerald-500 text-xs font-bold ar-text animate-bounce">✅ ممتاز!</span>}
                    {status === 'fail' && <span className="text-red-500 text-xs ar-text font-bold" title={`سمعت: ${heard}`}>❌ جرب تاني</span>}
                </div>
            );
        };

                { id: 'e2', type: "Meinung", ger: "Ich finde ... am interessantesten.", eng: "I find ... the most interesting.", ar: "أجد ... هو الأكثر إثارة للاهتمام.", context: "لإبداء رأيك في البرامج." },
                { id: 'e3', type: "Vorlieben", ger: "Ich bin ein/kein (Krimi)fan.", eng: "I am a/not a (crime story) fan.", ar: "أنا (لست) من محبي أفلام الجريمة.", context: "للتعبير عن نوعك المفضل." },

                { id: 'e10', type: "Aktivitäten", ger: "Nachrichtensendungen sehen", eng: "to watch news broadcasts", ar: "مشاهدة نشرات الأخبار", context: "وصف الأنشطة المعتادة." },
                { id: 'e11', type: "Aktivitäten", ger: "sich über aktuelle Politik informieren", eng: "to inform oneself about current politics", ar: "الاستعلام عن السياسة الحالية", context: "وصف الأنشطة." },

                { id: 'e14', type: "Frage", ger: "Wo/Wie informieren Sie sich über aktuelle Politik?", eng: "Where/How do you inform yourself about current politics?", ar: "أين/كيف تستعلم عن السياسة الحالية؟", context: "سؤال عن المصادر." },

                { id: 'e17', type: "Wichtige Ausdrücke", ger: "Kunstwerke anbieten", eng: "to offer artworks", ar: "عرض أعمال فنية", context: "في سياق الفن والمعارض." },

                { id: 'e20', type: "Wichtige Ausdrücke", ger: "auf der Liste der gefährlichsten Tiere stehen", eng: "to be on the list of the most dangerous animals", ar: "مدرج في قائمة أخطر الحيوانات", context: "في سياق البيئة والحيوانات." },

                { id: 'e22', type: "Wichtige Ausdrücke", ger: "an einer Krankheit / durch Mückenstiche sterben", eng: "to die from a disease / by mosquito bites", ar: "الموت بمرض / بسبب لدغات البعوض", context: "للحديث عن الأسباب المؤدية للوفاة." },

            dialogues: [
                {
                    id: 'd1', title: "Interview: Mediennutzung (Lukas & Maria)", icon: "radio",
                    lines: [
                        { speaker: "Lukas", text: "Hallo Maria. Fangen wir an. Wie informierst du dich über aktuelle Politik? Ich höre meistens Nachrichten im Radio.", en: "Hello Maria. Let's begin. How do you inform yourself about current politics? I mostly listen to the news on the radio.", ar: "مرحباً ماريا. لنبدأ. كيف تستعلمين عن السياسة الحالية؟ أنا غالباً أسمع الأخبار في الراديو." },
                        { speaker: "Maria", text: "Interessant. Ich informiere mich im Internet. Ich lese keine Zeitung und sehe selten Nachrichten im Fernsehen.", en: "Interesting. I inform myself on the internet. I don't read newspapers and rarely watch the news on television.", ar: "مثير للاهتمام. أنا استعلم من الإنترنت. لا أقرأ الجرائد ونادراً ما أشاهد الأخبار في التلفاز." },
                        { speaker: "Lukas", text: "Und wo siehst du Filme? Ich nutze gern Streaming-Portale, aber ich gehe auch oft ins Kino.", en: "And where do you watch films? I like to use streaming portals, but I also go to the cinema often.", ar: "وأين تشاهدين الأفلام؟ أحب استخدام بوابات البث، لكني أذهب أيضاً للسينما غالباً." },
                        { speaker: "Maria", text: "Ich nutze auch Streaming-Portale. Ins Kino gehe ich selten. Liest du denn viel Literatur?", en: "I also use streaming portals. I rarely go to the cinema. Do you read a lot of literature then?", ar: "أنا أيضاً أستخدم بوابات البث. نادراً ما أذهب للسينما. إذن هل تقرأ الكثير من الأدب؟" },
                        { speaker: "Lukas", text: "Ja, ich lese viele Romane auf meinem Tablet. Und du?", en: "Yes, I read a lot of novels on my tablet. And you?", ar: "نعم، أقرأ روايات كثيرة على التابلت الخاص بي. وأنتِ؟" },
                        { speaker: "Maria", text: "Ich lese nur selten Bücher. Dafür höre ich viel Musik, meistens mit meinem Smartphone.", en: "I only rarely read books. In exchange, I listen to a lot of music, mostly with my smartphone.", ar: "أقرأ الكتب نادراً. في المقابل أسمع موسيقى كثيرة، غالباً بموبايلي." },
                        { speaker: "Lukas", text: "Ich auch! Manchmal gehe ich auch gern in Konzerte. Letzte Frage: Wie schickst du Freunden Glückwünsche?", en: "Me too! Sometimes I also like to go to concerts. Last question: How do you send good wishes to friends?", ar: "أنا أيضاً! أحياناً أحب الذهاب للحفلات. سؤال أخير: كيف ترسلين التهاني للأصدقاء؟" },
                        { speaker: "Maria", text: "Ich schicke meistens eine SMS oder nutze Online-Netzwerke.", en: "I mostly send an SMS or use online networks.", ar: "غالباً أرسل رسالة نصية أو أستخدم شبكات التواصل." },
                        { speaker: "Lukas", text: "Da bin ich altmodisch. Ich telefoniere lieber.", en: "I'm old-fashioned in that regard. I prefer to telephone.", ar: "في هذه النقطة أنا قديم الطراز. أفضل الاتصال هاتفياً." }
                    ]
                },
                {
                    id: 'd2', title: "Tun Sie manchmal zwei Dinge gleichzeitig?", icon: "layers",
                    lines: [
                        { speaker: "Petra", text: "Ob ich manchmal zwei Dinge gleichzeitig tue? Ja, natürlich. Zum Beispiel bügle ich Wäsche, wenn ich fernsehe. Dann finde ich das Bügeln nicht so langweilig. Ich telefoniere beim Fernsehen auch manchmal mit meiner Mutter oder mit Freunden.", en: "Whether I sometimes do two things at once? Yes, of course. For example, I iron laundry when I watch TV. Then I don't find ironing so boring. I also sometimes talk on the phone with my mother or with friends while watching TV.", ar: "هل أفعل أحياناً شيئين في نفس الوقت؟ نعم بالطبع. مثلاً أكوي الغسيل عندما أشاهد التلفاز. حينها لا أجد الكي مملاً جداً. وأتحدث أحياناً في الهاتف مع أمي أو أصدقائي أثناء مشاهدة التلفاز." },
                        { speaker: "Birgit", text: "Ich höre beim Kochen gern Musik, am liebsten Opern. Das inspiriert mich. Wenn ich fernsehe, checke ich oft meine E-Mails, manche E-Mails beantworte ich auch gleich.", en: "I like to listen to music while cooking, preferably operas. That inspires me. When I watch TV, I often check my emails; I also answer some emails right away.", ar: "أحب سماع الموسيقى أثناء الطبخ، وأفضل الأوبرا. هذا يلهمني. عندما أشاهد التلفاز، أتفقد إيميلاتي غالباً، وأرد على بعضها فوراً." },
                        { speaker: "Luca", text: "Wenn ich frühstücke, lese ich auf meinem Tablet die Nachrichten. Das mache ich jeden Morgen. Außerdem höre ich beim Laufen Musik. Das motiviert mich, dann laufe ich schneller.", en: "When I'm having breakfast, I read the news on my tablet. I do that every morning. Besides that, I listen to music while running. That motivates me, then I run faster.", ar: "عندما أفطر، أقرأ الأخبار على التابلت. أفعل ذلك كل صباح. بالإضافة لذلك أسمع الموسيقى أثناء الجري. هذا يحفزني، حينها أجري أسرع." },
                        { speaker: "Yannick", text: "Wenn ich an der Uni Vorlesung habe, sende ich oft Nachrichten an meine Freunde. Leider höre ich dann nicht richtig zu und bekomme in der Prüfung eine schlechte Note. Aber wenn die Vorlesung sehr langweilig ist ... was soll man da machen?", en: "When I have a lecture at the university, I often send messages to my friends. Unfortunately, I don't listen properly then and get a bad grade on the exam. But when the lecture is very boring... what can you do?", ar: "عندما أكون في المحاضرة بالجامعة، أرسل غالباً رسائل لأصدقائي. للأسف لا أستمع جيداً حينها وأحصل على درجة سيئة في الامتحان. لكن عندما تكون المحاضرة مملة جداً... ماذا عساي أن أفعل؟" },
                        { speaker: "Jan", text: "Ich mache viele Dinge gleichzeitig. Wenn ich Auto fahre, telefoniere ich mit Kunden, über die Freisprechanlage natürlich. Dann muss ich die Gespräche nicht im Büro führen und spare Zeit. Beim Mittagessen lese ich oft Berichte oder spreche mit Kollegen. Ich habe viel zu tun und wenig Zeit.", en: "I do many things at the same time. When I'm driving, I talk on the phone with clients, using the hands-free system, of course. Then I don't have to have the conversations in the office and I save time. During lunch, I often read reports or talk with colleagues. I have a lot to do and little time.", ar: "أفعل أشياء كثيرة في نفس الوقت. عندما أقود السيارة، أتحدث مع العملاء عبر نظام التحدث الحر طبعاً. حينها لا أضطر لإجراء المحادثات في المكتب وأوفر الوقت. أثناء الغداء أقرأ التقارير غالباً أو أتحدث مع الزملاء. لدي الكثير لأفعله والقليل من الوقت." }
                    ]
                },
                {
                    id: 'd3', title: "TV Programm auswählen (Leo, Nina, Tom)", icon: "tv",
                    lines: [
                        { speaker: "Leo", text: "Also, was machen wir heute Abend? Aber zuerst: Wie lange seht ihr eigentlich so am Tag fern? Ich vielleicht eine Stunde.", en: "So, what are we doing tonight? But first: How long do you all actually watch TV per day? Maybe an hour for me.", ar: "حسناً، ماذا سنفعل هذا المساء؟ ولكن أولاً: كم من الوقت تشاهدون التلفاز في اليوم؟ أنا ربما ساعة واحدة." },
                        { speaker: "Nina", text: "Bei mir ist es ähnlich. Ich sehe gern Dokumentarfilme und Reportagen, aber keine Shows.", en: "It's similar for me. I like to watch documentaries and reports, but no shows.", ar: "الأمر مشابه بالنسبة لي. أحب مشاهدة الأفلام الوثائقية والتقارير، ولكن ليس البرامج الاستعراضية." },
                        { speaker: "Tom", text: "Ich sehe definitiv mehr, vielleicht zwei bis drei Stunden. Ich bin ein großer Fan von Serien und Sport. Was sollen wir also heute Abend sehen?", en: "I definitely watch more, maybe two to three hours. I'm a big fan of series and sports. So what should we watch tonight?", ar: "أنا أشاهد بالتأكيد أكثر، ربما من ساعتين لثلاث. أنا معجب كبير بالمسلسلات والرياضة. إذن ماذا سنشاهد الليلة؟" },
                        { speaker: "Nina", text: "Ich möchte heute Abend „Schloss Österreich“ sehen. Ich finde Reportagen am interessantesten.", en: "I would like to watch \"Castle Austria\" tonight. I find reports the most interesting.", ar: "أريد أن أشاهد 'قلعة النمسا' الليلة. أجد التقارير أكثر إثارة للاهتمام." },
                        { speaker: "Tom", text: "Oh nein, Reportagen sind langweilig. Ich möchte lieber Handball sehen! Das ist ein Viertelfinale, das wird spannend.", en: "Oh no, reports are boring. I would rather watch handball! It's a quarterfinal, that will be exciting.", ar: "أوه لا، التقارير مملة. أفضل مشاهدة كرة اليد! إنها مباراة ربع النهائي، ستكون مشوقة." },
                        { speaker: "Leo", text: "Was haltet ihr von „Mord ist die beste Medizin“? Das ist ein Krimi, das ist spannender als eine Reportage und nicht so lang wie das Handballspiel.", en: "What do you guys think of \"Murder is the Best Medicine\"? It's a crime story, that's more exciting than a report and not as long as the handball match.", ar: "ما رأيكم في 'القتل هو أفضل دواء'؟ إنه فيلم جريمة، وهو أكثر تشويقاً من التقرير وليس طويلاً مثل مباراة كرة اليد." },
                        { speaker: "Nina", text: "Ein Krimi ist eine gute Idee. Ich bin ein Krimifan.", en: "A crime story is a good idea. I'm a crime story fan.", ar: "فيلم الجريمة فكرة جيدة. أنا من محبي أفلام الجريمة." },
                        { speaker: "Tom", text: "Okay, einverstanden.", en: "Okay, I agree.", ar: "حسناً، أوافق." },
                        { speaker: "Leo", text: "Super. Wir haben uns für „Mord ist die beste Medizin“ entschieden. Ein Grund dafür ist, dass wir alle Krimis mögen und es ein guter Kompromiss ist.", en: "Great. We have decided on \"Murder is the Best Medicine\". One reason for that is that we all like crime stories and it's a good compromise.", ar: "رائع. لقد قررنا اختيار 'القتل هو أفضل دواء'. أحد الأسباب هو أننا جميعاً نحب أفلام الجريمة وهو حل وسط جيد." }
                    ]
                },
                {
                    id: 'd4', title: "Interview: Aktuelles (Lena & Markus)", icon: "mic",
                    lines: [
                        { speaker: "Lena", text: "Hallo Markus. Sag mal, wie oft siehst du am Tag Nachrichten?", en: "Hello Markus. Tell me, how often do you watch the news per day?", ar: "مرحباً ماركوس. قل لي، كم مرة تشاهد الأخبار في اليوم؟" },
                        { speaker: "Markus", text: "Ich lese die Nachrichten meistens online, so zwei- oder dreimal am Tag. Und du?", en: "I mostly read the news online, about two or three times a day. And you?", ar: "أقرأ الأخبار غالباً عبر الإنترنت، حوالي مرتين أو ثلاث مرات في اليوم. وأنت؟" },
                        { speaker: "Lena", text: "Ich höre morgens Nachrichten im Radio. Das reicht mir meistens. Welche Nachrichten interessieren dich denn besonders?", en: "I listen to the news on the radio in the morning. That's usually enough for me. Which news interests you in particular?", ar: "أسمع الأخبار في الراديو صباحاً. هذا يكفيني غالباً. ما الأخبار التي تهمك بشكل خاص؟" },
                        { speaker: "Markus", text: "Mich interessieren vor allem Sportereignisse und Neuigkeiten aus dem Ausland. Nachrichten von Prominenten lese ich nie.", en: "I'm mainly interested in sporting events and news from abroad. I never read news about celebrities.", ar: "أهتم أساساً بالأحداث الرياضية والأخبار من الخارج. لا أقرأ أبداً أخبار المشاهير." },
                        { speaker: "Lena", text: "Bei mir ist es eher Aktuelles aus Kunst und Kultur und auch die Wissenschaft. Letzte Frage: Mit wem sprichst du über diese Themen?", en: "For me, it's more current events from art and culture, and also science. Last question: With whom do you talk about these topics?", ar: "بالنسبة لي، أهتم أكثر بالأحداث الجارية في الفن والثقافة وكذلك العلوم. سؤال أخير: مع من تتحدثين عن هذه المواضيع؟" },
                        { speaker: "Markus", text: "Meistens mit meinen Freunden. Wir schicken uns oft interessante Artikel.", en: "Mostly with my friends. We often send each other interesting articles.", ar: "غالباً مع أصدقائي. نرسل لبعضنا مقالات مثيرة للاهتمام." }
                    ]
                }
            ],
            culture: [
                {
                    id: 'c1', title: "Lesetext: Multitasking",
                    lines: [
                        { g: "Multitasking bedeutet, dass ein Mensch mehrere Tätigkeiten gleichzeitig durchführt.", e: "Multitasking means that a person carries out several activities at the same time.", a: "تعدد المهام يعني أن الشخص يقوم بعدة أنشطة في نفس الوقت." },
                        { g: "Einige Wissenschaftler meinen jetzt, wir können nicht mehrere Dinge zur gleichen Zeit mit gleicher Konzentration und Leistungsfähigkeit tun.", e: "Some scientists now think that we cannot do several things at the same time with the same concentration and capability.", a: "بعض العلماء يرون الآن أننا لا نستطيع فعل عدة أشياء في نفس الوقت بنفس التركيز والقدرة." },
                        { g: "Wenn wir uns auf eine Sache konzentrieren, funktionieren andere Fähigkeiten nicht mehr hundertprozentig.", e: "When we concentrate on one thing, other abilities no longer function one hundred percent.", a: "عندما نركز على شيء واحد، فإن القدرات الأخرى لم تعد تعمل بنسبة مائة بالمائة." },
                        { g: "Es ist natürlich möglich, dass jemand fernsieht und gleichzeitig bügelt.", e: "It is of course possible for someone to watch TV and iron at the same time.", a: "من الممكن طبعاً أن يشاهد أحدهم التلفاز ويكوي في نفس الوقت." },
                        { g: "Das Bügeln läuft in der Regel automatisch ab, man braucht dazu keine volle Konzentration.", e: "Ironing usually runs automatically; you don't need full concentration for it.", a: "الكي يسير في العادة بشكل آلي، لا يحتاج المرء لتركيز كامل لذلك." },
                        { g: "Anders sieht es beim Autofahren aus. Untersuchungen haben ergeben, dass die Konzentrationsfähigkeit sinkt, wenn man beim Autofahren telefoniert.", e: "It's a different situation with driving a car. Studies have shown that the ability to concentrate sinks when one talks on the phone while driving.", a: "الأمر مختلف عند قيادة السيارة. أظهرت الفحوصات أن القدرة على التركيز تنخفض عندما يتحدث المرء في الهاتف أثناء القيادة." },
                        { g: "Schreibt man dazu noch eine SMS, liegt die Leistungsfähigkeit nur noch bei 60 Prozent, die Fehlerquote steigt.", e: "If you also write an SMS, the performance capability is only at 60 percent, and the error rate rises.", a: "وإذا كتب المرء رسالة نصية أيضاً، فإن القدرة على الأداء تبلغ 60% فقط، ويرتفع معدل الخطأ." },
                        { g: "Neurobiologen sind nach vielen Experimenten zu dem Ergebnis gekommen, dass es Multitasking gar nicht gibt.", e: "Neurobiologists have come to the conclusion after many experiments that multitasking doesn't exist at all.", a: "توصل علماء الأعصاب بعد العديد من التجارب إلى نتيجة مفادها أن تعدد المهام غير موجود أصلاً." },
                        { g: "Das Gehirn kann sich nicht auf mehrere Aufgaben gleichzeitig konzentrieren.", e: "The brain cannot concentrate on several tasks at the same time.", a: "الدماغ لا يمكنه التركيز على مهام متعددة في وقت واحد." },
                        { g: "Konkret bedeutet das: Wenn wir z. B. telefonieren und gleichzeitig mitschreiben, verstehen wir nur die Hälfte.", e: "Specifically, this means: When we, for example, talk on the phone and write things down at the same time, we only understand half.", a: "عملياً يعني هذا: عندما نتحدث في الهاتف ونكتب في نفس الوقت، فإننا نفهم النصف فقط." }
                    ]
                },
                {
                    id: 'c2', title: "Zusammenfassung: Multitasking",
                    lines: [
                        { g: "1. Wenn man mehrere Aufgaben parallel erledigt, heißt das <strong>Multitasking</strong>.", e: "When one handles several tasks in parallel, it's called MULTITASKING.", a: "عندما ينجز المرء مهام متعددة بالتوازي، يسمى ذلك تعدد المهام." },
                        { g: "2. Viele Menschen führen mehrere <strong>Tätigkeiten</strong> gleichzeitig durch.", e: "Many people carry out several ACTIVITIES at the same time.", a: "العديد من الناس يقومون بعدة أنشطة في نفس الوقت." },
                        { g: "3. Aber können wir überhaupt mehrere <strong>Dinge</strong> gleichzeitig tun?", e: "But can we even do several THINGS at the same time?", a: "لكن هل يمكننا أصلاً أن نفعل عدة أشياء في نفس الوقت؟" },
                        { g: "4. <strong>Wissenschaftler</strong> sagen, dass Multitasking nicht möglich ist.", e: "SCIENTISTS say that multitasking is not possible.", a: "يقول العلماء أن تعدد المهام غير ممكن." },
                        { g: "5. Wenn wir beim Autofahren telefonieren, sinkt die <strong>Konzentrationsfähigkeit</strong>.", e: "When we talk on the phone while driving, our CONCENTRATION ABILITY sinks.", a: "عندما نتحدث في الهاتف أثناء القيادة، تنخفض قدرتنا على التركيز." },
                        { g: "6. Die <strong>Fehlerquote</strong> steigt.", e: "The ERROR RATE rises.", a: "معدل الخطأ يرتفع." },
                        { g: "7. Zu diesem <strong>Ergebnis</strong> sind Neurobiologen nach vielen Experimenten gekommen.", e: "Neurobiologists came to this RESULT after many experiments.", a: "إلى هذه النتيجة توصل علماء الأعصاب بعد العديد من التجارب." },
                        { g: "8. Das <strong>Gehirn</strong> kann sich nicht gleichzeitig auf mehrere Aufgaben konzentrieren.", e: "The BRAIN cannot concentrate on several tasks at the same time.", a: "الدماغ لا يمكنه التركيز على عدة مهام في نفس الوقت." }
                    ]
                },
                {
                    id: 'c3', title: "Statistik: Die beliebtesten Fernsehsendungen in Deutschland",
                    lines: [
                        { g: "Die Statistik zu den beliebtesten Fernsehsendungen bietet keine Überraschungen.", e: "The statistics on the most popular television programs offer no surprises.", a: "إحصائيات البرامج التلفزيونية الأكثر شعبية لا تقدم مفاجآت." },
                        { g: "Auf Platz eins liegt wie jedes Jahr der Fußball.", e: "In first place, like every year, is football.", a: "في المركز الأول، وككل عام، تأتي كرة القدم." },
                        { g: "Die Spiele zur Qualifikation der Fußball-Europameisterschaft waren die Sendungen mit den meisten Zuschauern (10,79 Millionen).", e: "The qualification games for the European Football Championship were the programs with the most viewers (10.79 million).", a: "مباريات التأهل لبطولة أمم أوروبا كانت البرامج ذات أكبر عدد من المشاهدين (10.79 مليون)." },
                        { g: "Auf Platz zwei folgt die beliebte Krimireihe „Tatort“ mit durchschnittlich 9,61 Millionen Zuschauern.", e: "In second place follows the popular crime series \"Tatort\" with an average of 9.61 million viewers.", a: "في المركز الثاني تليها سلسلة الجرائم الشهيرة 'Tatort' بمتوسط 9.61 مليون مشاهد." },
                        { g: "Bei den Tatortkrimis aus verschiedenen Städten Deutschlands, Österreichs und der Schweiz steht der Tatort aus Münster an der Spitze. Auch das ist kein neuer Trend.", e: "Among the Tatort crime stories from various cities in Germany, Austria, and Switzerland, the Tatort from Münster is at the top. This is also not a new trend.", a: "من بين حلقات الجريمة من مدن مختلفة في ألمانيا والنمسا وسويسرا، تقف حلقة مدينة مونستر في الصدارة. هذا أيضاً ليس اتجاهاً جديداً." },
                        { g: "Dahinter folgen wieder Fußballereignisse: der DFB-Pokal (8,91 Millionen) und die UEFA Champions League (8,42 Millionen).", e: "Following behind are again football events: the DFB-Pokal (8.91 million) and the UEFA Champions League (8.42 million).", a: "ويلي ذلك أحداث كرة القدم مرة أخرى: كأس ألمانيا (8.91 مليون) ودوري أبطال أوروبا (8.42 مليون)." },
                        { g: "Die nächsten Plätze belegen drei weitere deutsche Krimiserien („Polizeiruf 110“, „Wilsberg“ und „Ein starkes Team“).", e: "The next spots are occupied by three other German crime series (\"Polizeiruf 110\", \"Wilsberg\", and \"Ein starkes Team\").", a: "المراكز التالية تحتلها ثلاث مسلسلات جرائم ألمانية أخرى ('Polizeiruf 110' و 'Wilsberg' و 'Ein starkes Team')." },
                        { g: "Immer noch beliebt sind deutsche Serien wie „Der Bergdoktor“, Quizshows wie „Wer wird Millionär?“ oder Sendungen für die Partnersuche wie „Bauer sucht Frau“.", e: "Still popular are German series like \"Der Bergdoktor\", quiz shows like \"Wer wird Millionär?\", or matchmaking shows like \"Bauer sucht Frau\".", a: "ما زالت المسلسلات الألمانية مثل 'طبيب الجبل' وبرامج المسابقات مثل 'من سيربح المليون؟' أو برامج المواعدة مثل 'المزارع يبحث عن زوجة' محبوبة." },
                        { g: "Das Interesse an Showsendungen (z. B. „Das Supertalent“) ist gesunken. Die Talentshow belegt nur Platz 33.", e: "The interest in show programs (e.g., \"Das Supertalent\") has declined. The talent show only occupies 33rd place.", a: "انخفض الاهتمام ببرامج العروض الاستعراضية (مثل 'سوبر تالنت'). يحتل برنامج المواهب المركز 33 فقط." }
                    ]
                },
                {
                    id: 'c4', title: "Beliebte Fernsehsendungen in meinem Heimatland (Ägypten)",
                    lines: [
                        { g: "Die Ägypter sehen am liebsten Fernsehserien, besonders während des Ramadan.", e: "Egyptians most like to watch television series, especially during Ramadan.", a: "المصريون يفضلون مشاهدة المسلسلات التلفزيونية، خاصة خلال شهر رمضان." },
                        { g: "Talkshows und Comedysendungen sind in Ägypten auch sehr beliebt.", e: "Talk shows and comedy programs are also very popular in Egypt.", a: "البرامج الحوارية والكوميدية مشهورة جداً أيضاً في مصر." },
                        { g: "Die Sendung mit den meisten Zuschauern ist oft eine große Ramadan-Serie wie zum Beispiel „El Ekhteyar“.", e: "The program with the most viewers is often a big Ramadan series, such as \"El Ekhteyar\".", a: "البرنامج الذي يحظى بأكبر عدد من المشاهدين يكون غالباً مسلسل رمضاني ضخم، مثل 'الاختيار'." },
                        { g: "Auf Platz zwei folgt meist eine andere dramatische Serie. Das ist kein neuer Trend.", e: "In second place usually follows another dramatic series. This is not a new trend.", a: "في المركز الثاني غالباً ما يأتي مسلسل درامي آخر. هذا ليس اتجاهاً جديداً." },
                        { g: "Platz drei belegt häufig eine bekannte Talkshow mit einem berühmten Moderator.", e: "Third place is often occupied by a well-known talk show with a famous host.", a: "يحتل المركز الثالث غالباً برنامج حواري معروف مع مذيع شهير." },
                        { g: "Immer noch sehr beliebt sind klassische ägyptische Filme.", e: "Classic Egyptian films are still very popular.", a: "لا تزال الأفلام المصرية الكلاسيكية محبوبة للغاية." },
                        { g: "Traditionelle Nachrichtensendungen sehen die Leute nicht mehr so gern.", e: "People don't like to watch traditional news broadcasts as much anymore.", a: "لم يعد الناس يحبون مشاهدة نشرات الأخبار التقليدية كثيراً." },
                        { g: "Das Interesse an internationalen Streaming-Diensten ist stark gestiegen. Das ist nicht überraschend, da die Internetnutzung zunimmt.", e: "The interest in international streaming services has risen sharply. That is not surprising, as internet usage is increasing.", a: "الاهتمام بخدمات البث العالمية ارتفع بشدة. هذا ليس مفاجئاً، حيث يزداد استخدام الإنترنت." },
                        { g: "Ich habe keine persönliche Lieblingssendung, aber ich erkenne die kulturelle Bedeutung von vielen ägyptischen Serien an.", e: "I do not have a personal favorite program, but I recognize the cultural importance of many Egyptian series.", a: "ليس لدي برنامج مفضل شخصياً، لكني أدرك الأهمية الثقافية للعديد من المسلسلات المصرية." }
                    ]
                },
                {
                    id: 'c5', title: "Fakten: Einige Fakten über die deutsche Politik",
                    lines: [
                        { g: "Das Parlament der Bundesrepublik Deutschland ist der Deutsche Bundestag. Die Sitzungen finden im Reichstagsgebäude in Berlin statt.", e: "The parliament of the Federal Republic of Germany is the German Bundestag. The sessions take place in the Reichstag building in Berlin.", a: "البرلمان في جمهورية ألمانيا يسمى البوندستاغ. تقام الجلسات في مبنى الرايخستاغ في برلين." },
                        { g: "Seine wichtigste Aufgabe ist die Entscheidung über neue Gesetze. Er kann auch das Grundgesetz (die Verfassung) ändern.", e: "Its most important task is deciding on new laws. It can also amend the Basic Law (the constitution).", a: "أهم مهامه هي إقرار القوانين الجديدة. يمكنه أيضاً تعديل الدستور." },
                        { g: "Er genehmigt internationale Verträge und bestimmt über die finanziellen Mittel der verschiedenen Ministerien.", e: "It approves international treaties and determines the financial resources of the various ministries.", a: "يوافق على المعاهدات الدولية ويحدد الميزانيات المالية لمختلف الوزارات." },
                        { g: "Der Bundestag entscheidet über den Einsatz der Armee, der Bundeswehr.", e: "The Bundestag decides on the deployment of the army, the Bundeswehr.", a: "البرلمان يقرر بشأن نشر الجيش (الجيش الألماني)." },
                        { g: "In Deutschland finden alle vier Jahre Bundestagswahlen statt. Jeder Wähler hat zwei Stimmen.", e: "In Germany, federal elections take place every four years. Every voter has two votes.", a: "تُجرى الانتخابات في ألمانيا كل 4 سنوات. كل ناخب لديه صوتان." },
                        { g: "Mit der ersten Stimme wählt man einen Kandidaten aus dem Wohnort, mit der zweiten Stimme wählt man eine Partei.", e: "With the first vote, one elects a candidate from their place of residence; with the second vote, one elects a party.", a: "بالصوت الأول تختار مرشح منطقتك، وبالثاني تختار الحزب." },
                        { g: "In Deutschland gibt es viele Parteien, z. B. die Sozialdemokratische Partei SPD, die konservativen Unionsparteien CDU und CSU, Bündnis 90/Die Grünen, die Linke oder die liberale Partei FDP.", e: "In Germany, there are many parties, e.g., the Social Democratic Party SPD, the conservative Union parties CDU and CSU, Alliance 90/The Greens, the Left party, or the liberal party FDP.", a: "توجد أحزاب كثيرة في ألمانيا مثل الحزب الاشتراكي، والحزبين المسيحيين الديمقراطيين، والخضر، واليسار، والحزب الديمقراطي الحر." },
                        { g: "Wenn eine Partei mindestens fünf Prozent der Stimmen gewinnt, kommt sie in den Bundestag. Im Bundestag sitzen etwa 600 Abgeordnete.", e: "If a party wins at least five percent of the vote, it gets into the Bundestag. There are about 600 representatives sitting in the Bundestag.", a: "إذا فاز حزب بـ 5% على الأقل، يدخل البرلمان الذي يضم حوالي 600 نائب." },
                        { g: "Die Regierungsgeschäfte führt die Bundeskanzlerin/der Bundeskanzler. Sie/Er ist die mächtigste Person in der deutschen Politik.", e: "The Federal Chancellor conducts the business of government. She/He is the most powerful person in German politics.", a: "يدير المستشار(ة) أعمال الحكومة. وهو أقوى شخصية في السياسة الألمانية." },
                        { g: "Die Bundeskanzlerin/Der Bundeskanzler bestimmt die Minister und die politischen Richtlinien.", e: "The Federal Chancellor determines the ministers and the political guidelines.", a: "المستشار(ة) يحدد الوزراء والتوجهات السياسية." },
                        { g: "Die Bundespräsidentin/Der Bundespräsident ist das Staatsoberhaupt der Bundesrepublik Deutschland.", e: "The Federal President is the head of state of the Federal Republic of Germany.", a: "الرئيس(ة) الاتحادي هو رأس دولة جمهورية ألمانيا." },
                        { g: "Sie/Er vertritt die Bundesregierung völkerrechtlich und übernimmt repräsentative Aufgaben im In- und Ausland.", e: "She/He represents the federal government under international law and takes on representative duties at home and abroad.", a: "هو/هي يمثل الحكومة الفيدرالية في القانون الدولي ويتولى مهام تمثيلية في الداخل والخارج." }
                    ]
                },
                {
                    id: 'c6', title: "Kurznachrichten (أخبار قصيرة)",
                    lines: [
                        { g: "<strong>300 000 neue Wohnungen:</strong> In Deutschland werden zurzeit so viele Wohnungen gebaut wie seit zehn Jahren nicht mehr. Nach Angaben der Bauindustrie werden in diesem Jahr etwa 300 000 neue Wohnungen fertiggestellt.", e: "In Germany, as many apartments are currently being built as haven't been in ten years. According to the construction industry, about 300,000 new apartments will be completed this year.", a: "في ألمانيا، يتم حاليًا بناء عدد من الشقق لم نشهده منذ عشر سنوات. وفقًا لقطاع البناء، سيتم إنجاز حوالي 300 ألف شقة جديدة هذا العام." },
                        { g: "Doch das reicht nicht. Damit sich die Lage auf dem Wohnungsmarkt verbessert, müssen jedes Jahr 350 000 bis 400 000 neue Wohnungen entstehen. Die Regierung will nun Maßnahmen für den Bau von mehr Wohnungen treffen.", e: "But that is not enough. For the situation on the housing market to improve, 350,000 to 400,000 new apartments must be built each year. The government now wants to take measures for the construction of more apartments.", a: "لكن هذا لا يكفي. لكي يتحسن الوضع في سوق الإسكان، يجب بناء 350 إلى 400 ألف شقة جديدة كل عام. الحكومة تريد الآن اتخاذ تدابير لبناء المزيد من الشقق." },
                        { g: "<strong>Deutsch-polnische Zusammenarbeit:</strong> Heute beginnt das deutsch-polnische Regierungstreffen in Berlin. Themen sind die Verbesserung der Zusammenarbeit und die Intensivierung der wirtschaftlichen Beziehungen.", e: "Today begins the German-Polish government meeting in Berlin. Topics are the improvement of cooperation and the intensification of economic relations.", a: "اليوم يبدأ اجتماع الحكومة الألمانية البولندية في برلين. المواضيع هي تحسين التعاون وتكثيف العلاقات الاقتصادية." },
                        { g: "An der Besprechung im Kanzleramt nehmen Vertreter der Regierung und der Wirtschaft teil. Konkrete Ergebnisse werden vor allem im Bereich der Sicherheitspolitik erwartet.", e: "Representatives of the government and the economy take part in the meeting at the Chancellery. Concrete results are expected above all in the area of security policy.", a: "يشارك ممثلو الحكومة والاقتصاد في الاجتماع بمكتب المستشارية. ومن المتوقع التوصل إلى نتائج ملموسة خاصة في مجال السياسة الأمنية." },
                        { g: "<strong>Deutsche sparen trotz niedriger Zinsen:</strong> Nach einer Studie der deutschen Banken sind fast 60 Prozent der Bundesbürger mit ihrer finanziellen Situation zufrieden. Das ist der höchste Wert seit vielen Jahren.", e: "According to a study by the German banks, almost 60 percent of federal citizens are satisfied with their financial situation. That is the highest value in many years.", a: "وفقاً لدراسة للبنوك الألمانية، فإن حوالي 60% من المواطنين راضون عن وضعهم المالي. هذه هي أعلى قيمة منذ سنوات عديدة." },
                        { g: "Doch vor allem die jungen Leute wollen ihr Geld nicht sparen. Sie geben es lieber für Kleidung, Reisen und andere Dinge aus. Ein Grund dafür ist, dass Geld auf der Bank im Moment keinen Gewinn bringt.", e: "But especially the young people do not want to save their money. They prefer to spend it on clothing, travel and other things. One reason for this is that money in the bank currently brings no profit.", a: "لكن الشباب بشكل خاص لا يريدون توفير أموالهم. يفضلون إنفاقها على الملابس والسفر وأشياء أخرى. أحد الأسباب هو أن المال في البنك لا يجلب أي ربح حالياً." },
                        { g: "<strong>Die Mücke: Das gefährlichste Tier:</strong> Die meisten Menschen haben Angst vor Schlangen, Haien oder Löwen. Doch diese Tiere stehen nicht auf der Liste der gefährlichsten Tiere für den Menschen. Danach ist das gefährlichste Tier die Mücke.", e: "Most people are afraid of snakes, sharks or lions. But these animals are not on the list of the most dangerous animals for humans. According to it, the most dangerous animal is the mosquito.", a: "يخاف معظم الناس من الثعابين أو أسماك القرش أو الأسود. لكن هذه الحيوانات ليست مدرجة في قائمة أخطر الحيوانات على البشر. وفقاً لذلك، فإن أخطر حيوان هو البعوضة." },
                        { g: "Etwa 750 000 Menschen sterben jedes Jahr an den Folgen eines Mückenstichs, denn Mücken übertragen tödliche Krankheiten. Klimaforscher warnen jetzt vor der Gefahr, dass sich Mücken weiter ausbreiten. Die Temperaturen steigen, der Regen nimmt zu – das sind ideale Lebensbedingungen für Mücken.", e: "About 750,000 people die each year from the consequences of a mosquito bite, because mosquitoes transmit deadly diseases. Climate researchers now warn of the danger that mosquitoes will spread further. Temperatures rise, rain increases - these are ideal living conditions for mosquitoes.", a: "يموت حوالي 750 ألف شخص سنوياً من عواقب لدغة بعوضة، لأن البعوض ينقل أمراضاً مميتة. يحذر باحثو المناخ الآن من خطر انتشار البعوض بشكل أكبر. ترتفع درجات الحرارة ويزداد المطر - هذه ظروف معيشية مثالية للبعوض." },
                        { g: "<strong>Rekordpreise bei Kunstauktion:</strong> Größer, höher, teurer – auf der Art Basel wird noch bis zum Sonntag mit moderner Kunst gehandelt. 286 Galeristen aus 88 Ländern bieten Kunstwerke für Interessenten mit großem Geldbeutel an.", e: "Bigger, higher, more expensive - modern art is being traded at Art Basel until Sunday. 286 gallery owners from 88 countries offer artworks for interested parties with large wallets.", a: "أكبر، أعلى، أغلى - سيتم تداول الفن الحديث في معرض آرت بازل حتى يوم الأحد. 286 صاحب معرض من 88 دولة يقدمون أعمالاً فنية للمهتمين ذوي الميزانيات الكبيرة." },
                        { g: "Gleich am ersten Tag der Kunstmesse fand die Skulptur „Tomato Head“ von Paul McCarthy für 4,75 Millionen Dollar einen Käufer. Das Interesse an Kunst ist weiter gestiegen, so berichten die Kunsthändler. Viele Käufer, darunter auch Prominente aus dem Showbusiness, sehen Kunst als gute Geldanlage.", e: "Right on the first day of the art fair, the sculpture 'Tomato Head' by Paul McCarthy found a buyer for 4.75 million dollars. Interest in art has continued to rise, according to art dealers. Many buyers, including celebrities from show business, see art as a good investment.", a: "في اليوم الأول من المعرض الفني، وجد تمثال 'رأس الطماطم' لبول مكارثي مشترياً مقابل 4.75 مليون دولار. لقد استمر الاهتمام بالفن في الارتفاع، حسبما أفاد تجار الفن. يرى العديد من المشترين، بما في ذلك المشاهير من عالم الاستعراض، الفن كاستثمار مالي جيد." }
                    ]
                },
                {
                    id: 'c7', title: "Nachrichten im Radio (أخبار الراديو)",
                    lines: [
                        { g: "<strong>Nachrichten im Radio:</strong> Es ist 9.00 Uhr, Sie hören die Kurznachrichten.", e: "News on the Radio: It is 9:00 AM, you are listening to the short news.", a: "أخبار الراديو: إنها الساعة 9 صباحاً، أنتم تستمعون للأخبار القصيرة." },
                        { g: "<strong>Wirtschaftsminister in Japan:</strong> Der deutsche Wirtschaftsminister ist heute mit einer Wirtschaftsdelegation nach Japan gereist. Ab morgen finden Gespräche mit dem japanischen Wirtschaftsminister und Vertretern der Wirtschaft statt.", e: "The German Minister of Economic Affairs traveled to Japan today with a business delegation. Starting tomorrow, talks will take place with the Japanese Minister of Economic Affairs and representatives of the business community.", a: "سافر وزير الاقتصاد الألماني اليوم مع وفد اقتصادي إلى اليابان. اعتباراً من الغد ستجرى محادثات مع وزير الاقتصاد الياباني وممثلي الاقتصاد." },
                        { g: "Im Mittelpunkt steht eine Vertiefung der Zusammenarbeit in den Bereichen Technik, Digitalisierung und Städtebau. Konkret geht es um neue technische Standards in der Telekommunikation.", e: "The focus is on deepening cooperation in the areas of technology, digitalization, and urban development. Specifically, it is about new technical standards in telecommunications.", a: "ينصب التركيز على تعميق التعاون في مجالات التكنولوجيا والرقمنة والتنمية الحضرية. تحديداً، يتعلق الأمر بالمعايير التقنية الجديدة في الاتصالات." },
                        { g: "<strong>Straftaten in Deutschland:</strong> Heute hat der Innenminister die neue Kriminalstatistik präsentiert. Laut Statistik hat sich die Anzahl der Straftaten in Deutschland nicht verändert.", e: "Today, the Minister of the Interior presented the new crime statistics. According to the statistics, the number of criminal offenses in Germany has not changed.", a: "اليوم قدم وزير الداخلية إحصاءات الجريمة الجديدة. ووفقاً للإحصاءات، لم يتغير عدد الجرائم في ألمانيا." },
                        { g: "Eine Zunahme gibt es bei politisch motivierten Straftaten und bei den Einbrüchen in Wohnungen und Häuser. Die Anzahl anderer Straftaten ging zurück. Die gefährlichste Stadt in Deutschland ist wie im letzten Jahr Frankfurt.", e: "There is an increase in politically motivated crimes and in burglaries in apartments and houses. The number of other criminal offenses has decreased. The most dangerous city in Germany is Frankfurt, same as last year.", a: "هناك زيادة في الجرائم ذات الدوافع السياسية وعمليات السطو على الشقق والمنازل. انخفض عدد الجرائم الأخرى. أخطر مدينة في ألمانيا هي فرانكفورت كالعام الماضي." },
                        { g: "<strong>Weltkulturerbe in Stuttgart:</strong> Zwei Häuser in Stuttgart gehören ab jetzt zum Weltkulturerbe. Die UNESCO nahm am Sonntag einige Bauwerke des Architekten Le Corbusier in sieben Ländern in die Liste des Weltkulturerbes auf.", e: "Two houses in Stuttgart are now part of the World Cultural Heritage. On Sunday, UNESCO added some buildings by the architect Le Corbusier in seven countries to the World Cultural Heritage list.", a: "ينتمي منزلان في شتوتغارت من الآن فصاعداً إلى التراث الثقافي العالمي. يوم الأحد، أدرجت اليونسكو بعض مباني المهندس المعماري لو كوربوزييه في سبعة بلدان في قائمة التراث الثقافي العالمي." },
                        { g: "Dazu zählen auch die Corbusier-Häuser in Stuttgart. Laut UNESCO hat Le Corbusier großen Einfluss auf die Architektur des 20. Jahrhunderts.", e: "The Corbusier houses in Stuttgart are also among them. According to UNESCO, Le Corbusier had a great influence on the architecture of the 20th century.", a: "ويشمل ذلك أيضاً منازل كوربوزييه في شتوتغارت. وفقاً لليونسكو، كان للو كوربوزييه تأثير كبير على الهندسة المعمارية في القرن العشرين." },
                        { g: "<strong>FC Bayern verliert im Finale:</strong> Der FC Bayern verlor gestern Abend das Finale der UEFA Champions League gegen Real Madrid eins zu zwei. Das war für die Bayern bereits die dritte Niederlage in einem Finale der Champions League.", e: "FC Bayern lost the final of the UEFA Champions League against Real Madrid one to two last night. For Bayern, this was already the third defeat in a Champions League final.", a: "خسر نادي بايرن ميونيخ نهائي دوري أبطال أوروبا أمام ريال مدريد بنتيجة واحد لاثنين الليلة الماضية. كانت هذه بالفعل الهزيمة الثالثة لبايرن في نهائي دوري أبطال أوروبا." },
                        { g: "<strong>Und zum Schluss das Wetter:</strong> Im Norden von Deutschland scheint die Sonne, im Süden ist es überwiegend wolkig. Vor allem in Niederbayern regnet es seit gestern Abend. Die Temperaturen liegen zwischen 18 und 22 Grad.", e: "And finally, the weather: In the north of Germany, the sun is shining; in the south, it is predominantly cloudy. Especially in Lower Bavaria, it has been raining since yesterday evening. The temperatures are between 18 and 22 degrees.", a: "وفي الختام حالة الطقس: في شمال ألمانيا تشرق الشمس، أما في الجنوب فالجو غائم في الغالب. في ولاية بافاريا السفلى على وجه الخصوص تمطر منذ مساء أمس. تتراوح درجات الحرارة بين 18 و 22 درجة." }
                    ]
                }
