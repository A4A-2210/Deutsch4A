<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spektrum Deutsch A1 - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.3);
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: #0f172a;
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0, transparent 50%), 
                radial-gradient(at 100% 0%, rgba(168, 85, 247, 0.15) 0, transparent 50%);
            min-height: 100vh;
            color: #f1f5f9;
        }

        .german-font { font-family: 'Nunito', sans-serif; }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            color: #1e293b;
        }

        .glass-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            background: rgba(255, 255, 255, 0.85);
            border-color: rgba(99, 102, 241, 0.5);
        }

        .chapter-number {
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-left: 6px;
        }

        .btn-fancy {
            background: var(--primary-gradient);
            transition: all 0.3s ease;
        }

        .btn-fancy:hover {
            filter: brightness(1.1);
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade {
            animation: fadeIn 0.6s ease-out forwards;
        }

        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="text-center mb-16 animate-fade">
            <h1 class="text-5xl md:text-6xl font-black mb-4 tracking-tight">
                Spektrum Deutsch <span class="chapter-number">A1</span>
            </h1>
            <p class="text-slate-400 text-lg md:text-xl font-medium max-w-2xl mx-auto">
                لوحة التحكم للدروس التفاعلية. اختر الدرس لبدء المذاكرة والتدريب.
            </p>
            <div class="mt-6 flex justify-center gap-4">
                <span class="bg-indigo-500/10 border border-indigo-500/20 px-4 py-1.5 rounded-full text-indigo-400 text-sm font-bold">
                    <i class="fas fa-book-open ml-2"></i> 12 Kapitel
                </span>
                <span class="bg-emerald-500/10 border border-emerald-500/20 px-4 py-1.5 rounded-full text-emerald-400 text-sm font-bold">
                    <i class="fas fa-check-circle ml-2"></i> Pro Edition
                </span>
            </div>
        </header>

        <!-- Grid -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            <!-- Chapter Cards Generated Dynamically for Cleanliness -->
            <script>
                const chapters = [
                    { id: 1, title: "Guten Tag", desc: "Begrüßung, Alphabet, Zahlen", status: "ready" },
                    { id: 2, title: "Erste Kontakte", desc: "Berufe, Länder, Sprachen", status: "pending" },
                    { id: 3, title: "Im Deutschkurs", desc: "Gegenstände, Farben, Schule", status: "pending" },
                    { id: 4, title: "Städte - Länder - Sprachen", desc: "Geografie, Sehenswürdigkeiten", status: "pending" },
                    { id: 5, title: "Menschen und Häuser", desc: "Wohnen, Möbel, Haushalt", status: "pending" },
                    { id: 6, title: "Termine", desc: "Uhrzeit, Wochentage, Freizeit", status: "pending" },
                    { id: 7, title: "Essen und Trinken", desc: "Lebensmittel, Restaurant, Markt", status: "pending" },
                    { id: 8, title: "Alltag", desc: "Tagesablauf, Arbeit, Routine", status: "pending" },
                    { id: 9, title: "Reisen", desc: "Urlaub, Wetter, Verkehr", status: "pending" },
                    { id: 10, title: "Kleidung und Mode", desc: "Farben, Kleidung, Aussehen", status: "pending" },
                    { id: 11, title: "Gesundheit", desc: "Körper, Krankheit, Ratgeber", status: "pending" },
                    { id: 12, title: "Wünsche und Träume", desc: "Zukunft, Vergangenheit, Pläne", status: "pending" }
                ];

                const container = document.currentScript.parentElement;
                
                chapters.forEach((ch, index) => {
                    const card = document.createElement('a');
                    card.href = `K${ch.id}.html`;
                    card.className = `glass-card p-6 flex flex-col h-full animate-fade`;
                    card.style.animationDelay = `${index * 0.05}s`;
                    
                    const statusHtml = ch.status === 'ready' 
                        ? `<span class="text-xs font-bold text-emerald-600 flex items-center"><span class="status-dot bg-emerald-500"></span> جاهز</span>`
                        : `<span class="text-xs font-bold text-slate-400 flex items-center"><span class="status-dot bg-slate-300"></span> قريباً</span>`;

                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-6 w-full">
                            <span class="chapter-number text-4xl">0${ch.id}</span>
                            ${statusHtml}
                        </div>
                        <h2 class="text-xl font-bold mb-2 group-hover:text-indigo-600 transition-colors uppercase tracking-wide german-font">
                            ${ch.title}
                        </h2>
                        <p class="text-slate-500 text-sm mb-6 flex-grow leading-relaxed">
                            ${ch.desc}
                        </p>
                        <div class="mt-auto pt-4 border-t border-slate-200/50 flex items-center justify-between">
                            <span class="text-xs font-bold uppercase tracking-widest text-slate-400">Kapitel</span>
                            <div class="w-8 h-8 rounded-full btn-fancy flex items-center justify-center text-white text-xs shadow-lg">
                                <i class="fas fa-arrow-left"></i>
                            </div>
                        </div>
                    `;
                    document.write(card.outerHTML);
                });
            </script>
        </div>

        <!-- Footer -->
        <footer class="mt-20 text-center border-t border-slate-800 pt-10 pb-10">
            <p class="text-slate-500 text-sm flex items-center justify-center gap-2">
                <i class="fas fa-code text-indigo-500"></i>
                Made with <i class="fas fa-heart text-rose-500"></i> by Antigravity
            </p>
        </footer>
    </div>
</body>
</html>
