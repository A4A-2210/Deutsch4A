    <script type="text/babel">
        // --- HELPERS FOR AUDIO & SPEECH ---
        const playAudio = (text, e) => {
            if (e) e.stopPropagation();
            const cleanText = text.replace(/<[^>]+>/g, '');
            const utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.lang = 'de-DE';
            window.speechSynthesis.speak(utterance);
        };

        const SpeechTester = ({ targetText }) => {
            const [status, setStatus] = React.useState('idle'); 
            const [heard, setHeard] = React.useState('');

            const listen = (e) => {
                if (e) e.stopPropagation();
                if (!('webkitSpeechRecognition' in window)) {
                    alert('المتصفح ده مش بيدعم تسجيل الصوت، جرب Google Chrome.');
                    return;
                }
                const recognition = new webkitSpeechRecognition();
                recognition.lang = 'de-DE';
                recognition.interimResults = false;
                
                recognition.onstart = () => setStatus('listening');
                recognition.onresult = (event) => {
                    const speechResult = event.results[0][0].transcript;
                    setHeard(speechResult);
                    
                    const clean = (str) => str.replace(/<[^>]+>/g, '').toLowerCase().replace(/[.,!?]/g, '').trim();
                    const targetClean = clean(targetText);
                    const heardClean = clean(speechResult);
                    
                    if (heardClean.includes(targetClean) || targetClean.includes(heardClean) || heardClean === targetClean) {
                        setStatus('success');
                    } else {
                        setStatus('fail');
                    }
                };
                recognition.onerror = () => setStatus('fail');
                recognition.onend = () => { if(status === 'listening') setStatus('idle'); };
                recognition.start();
            };

            return (
                <div className="inline-flex items-center gap-2" onClick={(e) => e.stopPropagation()}>
                    <button onClick={listen} title="جرب تنطقها" className={`p-2 rounded-full transition-all duration-300 shadow-sm ${status === 'listening' ? 'bg-red-500 text-white animate-pulse scale-110' : 'bg-slate-100 text-slate-600 hover:bg-slate-200 hover:scale-105'}`}>
                        <i data-lucide="mic" className="w-4 h-4"></i>
                    </button>
                    {status === 'success' && <span className="text-emerald-500 text-xs font-bold ar-text animate-bounce">✅ ممتاز!</span>}
                    {status === 'fail' && <span className="text-red-500 text-xs ar-text font-bold" title={`سمعت: ${heard}`}>❌ جرب تاني</span>}
                </div>
            );
        };

            irregularVerbs: [

                    items: [
                        { id: 'r_54', g: "Kochen Sie die Kartoffeln und schälen Sie sie danach.", e: "Boil the potatoes and then peel them.", a: "اسلق البطاطس، وبعدين قشرها." },
                        { id: 'r_55', g: "Salzen und pfeffern Sie die Schnitzel auf beiden Seiten.", e: "Salt and pepper the schnitzels on both sides.", a: "رش ملح وفلفل على الشنيتزل من الناحيتين." },
                        { id: 'r_56', g: "Legen Sie eine Folie auf die Schnitzel und klopfen Sie sie dünn.", e: "Place a foil over the schnitzels and pound them thin.", a: "حط كيس بلاستيك على الشنيتزل ودقه عشان ترفعه." },
                        { id: 'r_57', g: "Verrühren Sie zwei rohe Eier mit einer Gabel.", e: "Beat two raw eggs with a fork.", a: "اضرب بيضتين نيين بالشوكه." },
                        { id: 'r_58', g: "Wenden Sie die Schnitzel zuerst im Mehl, dann in den Eiern und zum Schluss in den Semmelbröseln.", e: "Turn the schnitzels first in flour, then in eggs and finally in breadcrumbs.", a: "قلب الشنيتزل الأول في الدقيق، وبعدين في البيض، وفي الآخر في البقسماط." },
                        { id: 'r_59', g: "Braten Sie die Schnitzel in reichlich Butterschmalz von beiden Seiten.", e: "Fry the schnitzels in plenty of clarified butter on both sides.", a: "اقلي الشنيتزل في سمنة كتير من الناحيتين." },
                        { id: 'r_60', g: "Schneiden Sie die Kartoffeln in zwei Hälften und wenden Sie sie in Butter.", e: "Cut the potatoes into two halves and toss them in butter.", a: "اقطع البطاطس نصين وشوحهم في الزبدة." },
                        { id: 'r_61', g: "Bestreuen Sie sie mit Petersilie.", e: "Sprinkle them with parsley.", a: "رش عليها بقدونس." },
                        { id: 'r_62', g: "Servieren Sie die Schnitzel gemeinsam mit den Kartoffeln und einer Zitronenscheibe.", e: "Serve the schnitzels together with the potatoes and a slice of lemon.", a: "قدم الشنيتزل مع البطاطس وشريحة ليمون." }
                    ]
                },
                {
                    catId: 'rev-l8',
                    title: '8. Berühmte Restaurants (مطاعم مشهورة)',
                    items: [
                        { id: 'r_63', g: "Das Café Central öffnete 1876 zum ersten Mal seine Türen für Gäste.", e: "Café Central opened its doors to guests for the first time in 1876.", a: "كافيه سنترال فتح أبوابه للزباين لأول مرة سنة 1876." },
                        { id: 'r_64', g: "Es war ein beliebter Treffpunkt für Künstler, Literaten und Politiker.", e: "It was a popular meeting place for artists, writers, and politicians.", a: "كان مكان تجمع مشهور للفنانين والأدباء والسياسيين." },
                        { id: 'r_65', g: "Die Gäste genießen typische Wiener Speisen und Getränke in einer opulenten Architektur.", e: "Guests enjoy typical Viennese food and drinks in opulent architecture.", a: "الزباين بيستمتعوا بأكلات ومشروبات فيينا التقليدية وسط معمار فخم." },
                        { id: 'r_66', g: "Deutsche Einwanderer gründeten 1897 die Vegetaria AG.", e: "German immigrants founded Vegetaria AG in 1897.", a: "مهاجرين ألمان أسسوا سنة 1897 شركة فيجيتاريا." },
                        { id: 'r_67', g: "Das Lokal lief am Anfang nicht gut, denn Vegetarier hatten damals keinen guten Ruf.", e: "The restaurant didn't run well at first, because vegetarians didn't have a good reputation.", a: "المكان ماكانش شغال كويس في الأول، لأن النباتيين زمان ماكانش سمعتهم كويسة." },
                        { id: 'r_68', g: "Als das Restaurant in wirtschaftliche Schwierigkeiten geriet, wurde es übernommen.", e: "When the restaurant got into economic difficulties, it was taken over.", a: "لما المطعم وقع في أزمات مالية، تم الاستحواذ عليه." },
                        { id: 'r_69', g: "Sie war von der indischen Küche so tief beeindruckt, dass sie indische Gerichte anbot.", e: "She was so deeply impressed by Indian cuisine that she offered Indian dishes.", a: "انبهرت جداً بالمطبخ الهندي، لدرجة إنها قدمت أكلات هندية." },
                        { id: 'r_70', g: "Um den Titel im Guinness-Buch der Rekorde haben sich viele Restaurants beworben.", e: "Many restaurants have applied for the title in the Guinness Book of Records.", a: "مطاعم كتير قدمت عشان تاخد اللقب في موسوعة جينيس." },
                        { id: 'r_71', g: "Ein Kriterium war, dass die Gaststätte bis heute ohne Unterbrechung geöffnet haben musste.", e: "One criterion was that the restaurant had to have been open without interruption until today.", a: "معيار مهم كان إن الحانة لازم تكون فضلت فاتحة لحد النهاردة من غير أي انقطاع." },
                        { id: 'r_72', g: "Die Gastwirtschaft wurde selbst bei Renovierungen nicht geschlossen.", e: "The inn was not closed even during renovations.", a: "الحانة دي ماقفلتش حتى وقت التجديدات." },
                        { id: 'r_73', g: "Gleich zweimal Spitzenreiter ist das Drehrestaurant an der Bergstation.", e: "The revolving restaurant at the mountain station is the frontrunner twice over.", a: "المطعم الدوار واخد المركز الأول في حاجتين في نفس الوقت." },
                        { id: 'r_74', g: "Es verbindet die Freude an Bergen mit der Freude am Essen.", e: "It combines the joy of mountains with the joy of eating.", a: "هو بيربط متعة الجبال بمتعة الأكل." }
                    ]
                },
                {
                    catId: 'rev-l9',
                    title: '9. Ein Brief aus München (رسالة - تدريب Passiv)',
                    items: [
                        { id: 'r_75', g: "Du glaubst nicht, was ich hier in München gemacht habe:", e: "You won't believe what I've done here in Munich:", a: "مش هتصدقي أنا عملت إيه هنا في ميونخ:" },
                        { id: 'r_76', g: "Ich habe an einem Kochkurs teilgenommen!", e: "I participated in a cooking course!", a: "أنا اشتركت في كورس طبخ!" },
                        { id: 'r_77', g: "Klaus hat mir den Kurs zum Geburtstag geschenkt.", e: "Klaus gave me the course for my birthday.", a: "كلاوس جابلي الكورس ده هدية لميلادي." },
                        { id: 'r_78', g: "Der Kurs wurde von Rudi Wichter geleitet.", e: "The course was led by Rudi Wichter.", a: "الكورس كان بيديره رودي فيشتر." },
                        { id: 'r_79', g: "Am ersten Tag wurden leckere Vorspeisen zubereitet.", e: "On the first day delicious starters were prepared.", a: "في أول يوم اتجهزت مقبلات لذيذة." },
                        { id: 'r_80', g: "Am zweiten Tag haben wir zwei Hauptspeisen gekocht.", e: "On the second day we cooked two main courses.", a: "تاني يوم طبخنا وجبتين رئيسيتين." },
                        { id: 'r_81', g: "Am dritten Tag wurden die Desserts kreiert.", e: "On the third day the desserts were created.", a: "تالت يوم اتعملت (ابتكرت) الحلويات." },
                        { id: 'r_82', g: "Einige Nachspeisen sind fotografiert worden.", e: "Some desserts were photographed.", a: "بعض الحلويات اتصورت." },
                        { id: 'r_83', g: "Zum Abschluss sind wir vom Meisterkoch noch zu einem Drei-Gänge-Menü eingeladen worden.", e: "At the end we were invited by the master chef to a three-course menu.", a: "وفي الختام، الشيف الكبير عزمنا على منيو من تلات أطباق." },
                        { id: 'r_84', g: "Ich habe einige Tricks gelernt und mit den anderen Teilnehmern interessante Rezepte ausgetauscht.", e: "I learned a few tricks and exchanged interesting recipes with the other participants.", a: "أنا اتعلمت شوية حركات وبدلت وصفات مع المشتركين التانيين." },
                        { id: 'r_85', g: "Wenn ich wieder in Berlin bin, lade ich dich zum Essen ein.", e: "When I'm back in Berlin, I'll invite you for dinner.", a: "لما أرجع برلين تاني، هعزمك على الأكل." }
                    ]
                },
                {
                    catId: 'rev-l10',
                    title: '10. Entschuldigungsbrief (رسالة اعتذار)',
                    items: [
                        { id: 'r_86', g: "Leider kann ich heute Abend nicht zum Weihnachtsessen mitkommen.", e: "Unfortunately, I cannot come along to the Christmas dinner tonight.", a: "للأسف مش هقدر آجي معاكم عشاء الكريسماس النهاردة بالليل." },
                        { id: 'r_87', g: "Ich bin sehr erkältet und habe Fieber.", e: "I have a bad cold and a fever.", a: "أنا عندي برد شديد وسخونة." },
                        { id: 'r_88', g: "Deshalb muss ich im Bett bleiben.", e: "Therefore I have to stay in bed.", a: "عشان كده لازم أفضل في السرير." },
                        { id: 'r_89', g: "Ich wünsche Ihnen und dem ganzen Team einen schönen Abend.", e: "I wish you and the whole team a nice evening.", a: "بتمنى لحضرتك ولكل الفريق سهرة سعيدة." },
                        { id: 'r_90', g: "Mit besten Grüßen,", e: "With best regards,", a: "مع أطيب التحيات،" }
                    ]
                },
                {
                    catId: 'rev-g1',
                    title: 'Grammatik: um ... zu (لكي / لغرض)',
                    items: [
                        { id: 'r_91', g: "Ich lerne jeden Tag Deutsch, um in Berlin zu studieren.", e: "I learn German every day in order to study in Berlin.", a: "أنا بذاكر ألماني كل يوم، عشان أدرس في برلين." },
                        { id: 'r_92', g: "Wir sparen viel Geld, um im Sommer ein Auto zu kaufen.", e: "We save a lot of money in order to buy a car in summer.", a: "إحنا بنحوش فلوس كتير، عشان نشتري عربية في الصيف." },
                        { id: 'r_93', g: "Er treibt jeden Morgen Sport, um fit und gesund zu bleiben.", e: "He does sports every morning in order to stay fit and healthy.", a: "هو بيلعب رياضة كل يوم الصبح، عشان يفضل لائق وصحي." },
                        { id: 'r_94', g: "Sie geht heute früh ins Bett, um morgen nicht müde zu sein.", e: "She goes to bed early today in order not to be tired tomorrow.", a: "هي هتدخل تنام بدري النهاردة، عشان ماتكونش تعبانة بكرة." },
                        { id: 'r_95', g: "Ich brauche unbedingt den Schlüssel, um die Haustür zu öffnen.", e: "I absolutely need the key in order to open the front door.", a: "أنا محتاج المفتاح ضروري، عشان أفتح باب البيت." }
                    ]
                },
                {
                    catId: 'rev-g2',
                    title: 'Grammatik: anstatt ... zu (بدلاً من)',
                    items: [
                        { id: 'r_96', g: "Er sieht den ganzen Abend fern, anstatt seine Hausaufgaben zu machen.", e: "He watches TV all evening instead of doing his homework.", a: "هو بيتفرج على التليفزيون طول الليل، بدل ما يعمل واجبه." },
                        { id: 'r_97', g: "Wir bleiben lieber zu Hause, anstatt ins Kino zu gehen.", e: "We prefer to stay at home instead of going to the cinema.", a: "إحنا نفضل نقعد في البيت، بدل ما نروح السينما." },
                        { id: 'r_98', g: "Sie trinkt eine kalte Cola, anstatt stilles Wasser zu trinken.", e: "She drinks a cold cola instead of drinking still water.", a: "هي بتشرب كولا ساقعة، بدل ما تشرب ماية معدنية." },
                        { id: 'r_99', g: "Er schläft den ganzen Tag, anstatt für die Prüfung zu lernen.", e: "He sleeps all day instead of studying for the exam.", a: "هو نايم طول اليوم، بدل ما يذاكر للامتحان المهم." },
                        { id: 'r_100', g: "Ich fahre mit dem Rad zur Arbeit, anstatt das Auto zu nehmen.", e: "I cycle to work instead of taking the car.", a: "أنا بروح الشغل بالعجلة، بدل ما آخد العربية." }
                    ]
                },
                {
                    catId: 'rev-g3',
                    title: 'Grammatik: ohne ... zu (بدون)',
                    items: [
                        { id: 'r_101', g: "Er geht einfach aus dem Haus, ohne mir Tschüss zu sagen.", e: "He simply leaves the house without saying goodbye to me.", a: "هو نزل من البيت ببساطة، من غير ما يقولي سلام." },
                        { id: 'r_102', g: "Sie hat den neuen Vertrag unterschrieben, ohne ihn vorher zu lesen.", e: "She signed the new contract without reading it first.", a: "هي مضت العقد الجديد، من غير ما تقراه قبلها." },
                        { id: 'r_103', g: "Wir haben das schwierige Problem gelöst, ohne Hilfe zu brauchen.", e: "We solved the difficult problem without needing help.", a: "إحنا حلينا المشكلة الصعبة، من غير ما نحتاج مساعدة." },
                        { id: 'r_104', g: "Er fährt jeden Tag Auto, ohne einen gültigen Führerschein zu haben.", e: "He drives a car every day without having a valid driver's license.", a: "هو بيسوق عربية كل يوم، من غير ما يكون معاه رخصة سارية." },
                        { id: 'r_105', g: "Sie kocht die Suppe für die Gäste, ohne Salz hinzuzufügen.", e: "She cooks the soup for the guests without adding salt.", a: "هي بتطبخ الشوربة للضيوف، من غير ما تزود ملح." }
                    ]
                },
                {
                    catId: 'rev-g4',
                    title: 'Grammatik: Passiv Präsens (المجهول - المضارع)',
                    items: [
                        { id: 'r_106', g: "Das Auto wird in der Werkstatt repariert.", e: "The car is being repaired in the workshop.", a: "العربية بتتصلح في الورشة." },
                        { id: 'r_107', g: "Der Kuchen wird heute für die Party gebacken.", e: "The cake is being baked for the party today.", a: "الكيكة بتتخبز النهاردة عشان الحفلة." },
                        { id: 'r_108', g: "Das Fenster wird jeden Morgen geöffnet.", e: "The window is opened every morning.", a: "الشباك بيتفتح كل يوم الصبح." },
                        { id: 'r_109', g: "Die Rechnungen werden am Ende des Monats bezahlt.", e: "The bills are paid at the end of the month.", a: "الفواتير بتتدفع في آخر الشهر." },
                        { id: 'r_110', g: "Das Zimmer wird von meiner Mutter aufgeräumt.", e: "The room is being tidied up by my mother.", a: "الأوضة بتترتب بواسطة والدتي." },
                        { id: 'r_111', g: "Ich weiß, dass das Auto in der Werkstatt repariert wird.", e: "I know that the car is being repaired in the workshop.", a: "أنا عارف إن العربية بتتصلح في الورشة." },
                        { id: 'r_112', g: "Er freut sich, weil der Kuchen für die Party gebacken wird.", e: "He is happy because the cake is being baked for the party.", a: "هو مبسوط عشان الكيكة بتتخبز للحفلة." },
                        { id: 'r_113', g: "Es ist wichtig, dass das Fenster morgens geöffnet wird.", e: "It is important that the window is opened in the morning.", a: "مهم إن الشباك يتفتح الصبح." },
                        { id: 'r_114', g: "Sie wartet, bis die Rechnungen endlich bezahlt werden.", e: "She waits until the bills are finally paid.", a: "هي مستنية لحد ما الفواتير تتدفع أخيراً." },
                        { id: 'r_115', g: "Ich gehe raus, wenn das Zimmer aufgeräumt wird.", e: "I'll go out when the room is being tidied up.", a: "أنا هخرج لما الأوضة تترتب." }
                    ]
                },
                {
                    catId: 'rev-g5',
                    title: 'Grammatik: Passiv Präteritum (المجهول - الماضي البسيط)',
                    items: [
                        { id: 'r_116', g: "Das große Haus wurde 1990 gebaut.", e: "The large house was built in 1990.", a: "البيت الكبير يتبنى سنة 1990." },
                        { id: 'r_117', g: "Der lange Brief wurde gestern geschrieben.", e: "The long letter was written yesterday.", a: "الجواب الطويل اتكتب امبارح." },
                        { id: 'r_118', g: "Die Tür wurde am Abend geschlossen.", e: "The door was closed in the evening.", a: "الباب اتقفل بالليل." },
                        { id: 'r_119', g: "Die Fehler wurden vom Lehrer korrigiert.", e: "The mistakes were corrected by the teacher.", a: "الأخطاء اتصححت بواسطة المدرس." },
                        { id: 'r_120', g: "Das leckere Essen wurde pünktlich serviert.", e: "The delicious food was served on time.", a: "الأكل اللذيذ اتقدم في ميعاده." },
                        { id: 'r_121', g: "Er sagte, dass das Haus 1990 gebaut wurde.", e: "He said that the house was built in 1990.", a: "هو قال إن البيت يتبنى سنة 1990." },
                        { id: 'r_122', g: "Ich wusste, dass der Brief gestern geschrieben wurde.", e: "I knew that the letter was written yesterday.", a: "كنت عارف إن الجواب اتكتب امبارح." },
                        { id: 'r_123', g: "Wir haben nicht gesehen, dass die Tür geschlossen wurde.", e: "We didn't see that the door was closed.", a: "ماشوفناش إن الباب اتقفل." },
                        { id: 'r_124', g: "Der Lehrer hofft, dass die Fehler korrigiert wurden.", e: "The teacher hopes that the mistakes were corrected.", a: "المدرس يأمل إن الأخطاء اتصححت." },
                        { id: 'r_125', g: "Alle waren glücklich, als das Essen serviert wurde.", e: "Everyone was happy when the food was served.", a: "الكل كان مبسوط لما الأكل اتقدم." }
                    ]
                },
                {
                    catId: 'rev-g6',
                    title: 'Grammatik: Passiv Perfekt (المجهول - التام)',
                    items: [
                        { id: 'r_126', g: "Das Fahrrad ist gestern Nacht gestohlen worden.", e: "The bicycle was stolen last night.", a: "العجلة اتسرقت امبارح بالليل." },
                        { id: 'r_127', g: "Die Patienten sind vom Arzt untersucht worden.", e: "The patients have been examined by the doctor.", a: "المرضى اتكشف عليهم من الدكتور." },
                        { id: 'r_128', g: "Die wichtige E-Mail ist heute Morgen gesendet worden.", e: "The important email was sent this morning.", a: "الإيميل المهم اتبعت النهاردة الصبح." },
                        { id: 'r_129', g: "Der alte Mann ist erfolgreich operiert worden.", e: "The old man was operated on successfully.", a: "الراجل العجوز اتعملتله عملية بنجاح." },
                        { id: 'r_130', g: "Die schweren Hausaufgaben sind rechtzeitig gemacht worden.", e: "The difficult homework was done on time.", a: "الواجبات الصعبة اتعملت في وقتها." },
                        { id: 'r_131', g: "Es ist schade, dass das Fahrrad gestohlen worden ist.", e: "It's a pity that the bicycle was stolen.", a: "خسارة إن العجلة اتسرقت." },
                        { id: 'r_132', g: "Der Arzt sagt, dass die Patienten untersucht worden sind.", e: "The doctor says that the patients have been examined.", a: "الدكتور بيقول إن المرضى اتكشف عليهم." },
                        { id: 'r_133', g: "Ich bin sicher, dass die E-Mail gesendet worden ist.", e: "I am sure that the email has been sent.", a: "أنا متأكد إن الإيميل اتبعت." },
                        { id: 'r_134', g: "Wir hoffen, dass der Mann erfolgreich operiert worden ist.", e: "We hope that the man was operated on successfully.", a: "بنتمنى إن الراجل عمليته نجحت." },
                        { id: 'r_135', g: "Er fragt, ob die Hausaufgaben gemacht worden sind.", e: "He asks if the homework has been done.", a: "هو بيسأل لو الواجبات اتعملت." }
                    ]
                }
            ],

        const colorizeArticles = (text) => {
            if (!text) return text;
            const regex = /(der |die |das )/gi;
            const parts = text.split(regex);
            return parts.map((part, i) => {
                const lower = part.toLowerCase();
                if (lower === 'der ') return <span key={i} className="text-blue-500 font-extrabold">{part}</span>;
                if (lower === 'die ') return <span key={i} className="text-rose-500 font-extrabold">{part}</span>;
                if (lower === 'das ') return <span key={i} className="text-emerald-500 font-extrabold">{part}</span>;
                return <span key={i}>{part}</span>;
            });
        };

                                        <p className="text-slate-800 text-sm font-medium leading-relaxed mt-1">{item.praeteritum}</p>
                                    </div>
                                    <div className="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition-opacity"><SpeechTester targetText={item.praeteritum} /></div>
                                </div>
                                <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm relative group">
                                    <div className="text-xs font-bold text-purple-500 uppercase tracking-widest mb-2 border-b border-slate-100 pb-1">Perfekt (ماضي تام)</div>
                                    <div className="flex items-start gap-2 mb-2">
                                        <button onClick={(e) => playAudio(item.perfekt, e)} className="text-purple-600 bg-purple-50 p-1.5 rounded-lg shrink-0"><i data-lucide="volume-2" className="w-4 h-4"></i></button>
                                        <p className="text-slate-800 text-sm font-medium leading-relaxed mt-1">{item.perfekt}</p>
                                    </div>
                                    <div className="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition-opacity"><SpeechTester targetText={item.perfekt} /></div>
                                </div>
                            </div>
                            
                            {/* Added 3 contextual examples for irregular verbs */}
                            {item.s && item.s.length > 0 && (
                                <ul className="space-y-3 mt-4">
                                    <div className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">Beispiele im Kontext:</div>
                                    {item.s.map((sentence, idx) => (
                                        <li key={idx} className="bg-white p-3 rounded-xl border border-slate-200 shadow-sm flex flex-col sm:flex-row gap-4 justify-between items-start">
                                            <div className="flex-1">
                                                <div className="flex items-start gap-2 mb-1.5">
                                                    <button onClick={(e) => playAudio(sentence.g, e)} className="mt-0.5 text-emerald-600 bg-emerald-50 p-1 rounded-lg shrink-0"><i data-lucide="volume-2" className="w-3 h-3"></i></button>
                                                    <p className="text-slate-800 text-sm font-medium leading-relaxed" dangerouslySetInnerHTML={{ __html: sentence.g }}></p>
                                                </div>
                                                <p className="text-slate-500 text-xs ml-8 mb-1.5">{sentence.e}</p>
                                                <div className="ml-8 text-emerald-700 text-sm font-bold ar-text border-t border-slate-100 pt-1.5" dir="rtl">{sentence.a}</div>
                                            </div>
                                        </li>
                                    ))}
                                </ul>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // --- MAIN APP ---
        const App = () => {
            const [activeTab, setActiveTab] = useState('words');
            
            // 🚀 UPGRADE: LocalStorage integration
            const [learnedItems, setLearnedItems] = useState(() => {
                const saved = localStorage.getItem('deutschAppLearned_v4');
                return saved ? new Set(JSON.parse(saved)) : new Set();
            });
            const [searchTerm, setSearchTerm] = useState('');
            const [expandedReview, setExpandedReview] = useState(null);

            useEffect(() => {
                lucide.createIcons();
            });

            // 🚀 UPGRADE: Save to LocalStorage whenever learnedItems changes
            useEffect(() => {
                localStorage.setItem('deutschAppLearned_v4', JSON.stringify(Array.from(learnedItems)));
            }, [learnedItems]);

            const toggleLearned = (id) => {
                const newLearned = new Set(learnedItems);
                if (newLearned.has(id)) newLearned.delete(id);
                else newLearned.add(id);
                setLearnedItems(newLearned);
            };

            // Calculate totals safely
            const totalWords = Object.values(LEARNING_DATA.words || {}).flat().length;
            const totalVerbs = (LEARNING_DATA.verbs || []).length + (LEARNING_DATA.irregularVerbs || []).length;
            const totalExp = (LEARNING_DATA.expressions || []).length;
            const totalPrep = (LEARNING_DATA.prepositions || []).length;
            const totalGrammar = (LEARNING_DATA.grammar || []).length;
            const totalReview = (LEARNING_DATA.review || []).reduce((acc, cat) => acc + (cat.items || []).length, 0);
            const totalB2 = (LEARNING_DATA.b2Expansion || []).reduce((acc, cat) => acc + (cat.items || []).length, 0);
            const grandTotal = totalWords + totalVerbs + totalExp + totalPrep + totalGrammar + totalReview + totalB2;

            const tabConfig = {
                words: { labelEn: 'Words', labelAr: 'الأسماء والكلمات', icon: 'book-open', color: 'blue' },
                verbs: { labelEn: 'Verbs', labelAr: 'الأفعال', icon: 'activity', color: 'emerald' },
                expressions: { labelEn: 'Expressions', labelAr: 'تعبيرات', icon: 'message-circle', color: 'amber' },
                prepositions: { labelEn: 'Prepositions', labelAr: 'حروف الجر', icon: 'link', color: 'rose' },
                grammar: { labelEn: 'Grammar', labelAr: 'القواعد الشاملة', icon: 'pen-tool', color: 'purple' },
                review: { labelEn: 'Review', labelAr: 'المراجعة الشاملة', icon: 'clipboard-check', color: 'teal' },
                b2Expansion: { labelEn: 'B2 Expansion', labelAr: 'توسعات B2', icon: 'trending-up', color: 'indigo' }
            };

            const activeColor = tabConfig[activeTab].color;

            // Safe extraction of categories for rendering
            const wordCategories = Object.keys(LEARNING_DATA.words || {});

            return (
                <div className="h-screen flex flex-col bg-slate-50" dir="rtl">
                    {/* TOP NAVIGATION HEADER */}
                    <header className="w-full bg-slate-900 text-white shadow-xl z-50 shrink-0 relative overflow-hidden">
                        <div className={`absolute top-0 left-0 w-full h-1 bg-${activeColor}-500 transition-colors duration-500`}></div>
                        
                        <div className="flex justify-between items-center px-4 md:px-8 py-3 border-b border-slate-800">
                            <h1 className="text-xl md:text-2xl font-extrabold flex items-center gap-3 ar-text">
                                <span className={`bg-${activeColor}-500 p-2 rounded-xl transition-colors duration-500 shadow-lg`}>
                                    <i data-lucide="graduation-cap" className="w-5 h-5 md:w-6 md:h-6 text-white"></i>
                                </span>
                                ألماني B1+ (Essen, Passiv & Infinitiv)
                            </h1>

                            <div className="flex items-center gap-3" dir="ltr">
                                <div className="text-right hidden sm:block">
                                    <div className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Mastery</div>
                                    <div className={`text-sm font-extrabold text-${activeColor}-400 transition-colors`}>{grandTotal === 0 ? 0 : Math.round((learnedItems.size / grandTotal) * 100)}%</div>
                                </div>
                                <div className="relative w-10 h-10">
                                    <svg className="w-full h-full transform -rotate-90" viewBox="0 0 36 36">
                                        <path className="text-slate-800" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" strokeWidth="4" />
                                        <path className={`text-${activeColor}-500 transition-all duration-1000 ease-out`} strokeDasharray={`${grandTotal === 0 ? 0 : (learnedItems.size / grandTotal) * 100}, 100`} d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" strokeWidth="4" strokeLinecap="round" />
                                    </svg>
                                </div>
                            </div>
                        </div>

                        {/* Horizontal Navigation Tabs */}
                        <nav className="flex overflow-x-auto scrollbar-hide px-4 py-2 gap-2 snap-x">
                            {Object.entries(tabConfig).map(([key, tab]) => (
                                <button 
                                    key={key}
                                    onClick={() => { setActiveTab(key); setSearchTerm(''); }}
                                    className={`snap-center shrink-0 flex items-center gap-2 px-4 py-2.5 rounded-xl transition-all duration-300 font-bold ar-text group relative overflow-hidden ${activeTab === key ? `bg-${tab.color}-600 text-white shadow-md` : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}
                                >
                                    <i data-lucide={tab.icon} className={`w-5 h-5 ${activeTab === key ? 'text-white' : `text-${tab.color}-400 group-hover:text-${tab.color}-300`} transition-colors`}></i>
                                    <span className="text-sm whitespace-nowrap">{tab.labelAr}</span>
                                    {activeTab === key && <div className="absolute bottom-0 left-1/2 transform -translate-x-1/2 w-1/2 h-0.5 bg-white/50 rounded-t-full"></div>}
                                </button>
                            ))}
                        </nav>
                    </header>

                    {/* MAIN CONTENT AREA */}
                    <main className="flex-1 overflow-y-auto p-4 md:p-8 lg:p-12 relative" dir="ltr">
                        <div className={`fixed top-1/4 left-1/4 w-[50vw] h-[50vw] rounded-full bg-${activeColor}-200/20 blur-3xl -z-10 transition-colors duration-1000`}></div>
                        
                        <div className="max-w-7xl mx-auto">
                            
                            {activeTab !== 'grammar' && activeTab !== 'review' && (
                                <div className="flex flex-col md:flex-row gap-4 mb-10" dir="rtl">
                                    <div className="flex-1 relative group max-w-3xl mx-auto w-full">
                                        <div className={`absolute -inset-0.5 bg-gradient-to-r from-${activeColor}-400 to-${activeColor}-600 rounded-2xl blur opacity-20 group-hover:opacity-40 transition duration-500`}></div>
                                        <div className="relative">
                                            <i data-lucide="search" className="absolute right-4 top-1/2 transform -translate-y-1/2 text-slate-400 w-6 h-6"></i>
                                            <input 
                                                type="text" 
                                                placeholder="ابحث بالعربي أو الألماني..." 
                                                value={searchTerm}
                                                onChange={(e) => setSearchTerm(e.target.value)}
                                                className="w-full pr-14 pl-6 py-4 rounded-2xl border-none focus:outline-none focus:ring-4 focus:ring-blue-500/20 shadow-lg text-lg ar-text text-slate-700 font-medium"
                                            />
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'words' && <ProgressBar total={totalWords} learned={Array.from(learnedItems).filter(id => id.startsWith('w')).length} colorClass="text-blue-500" />}
                            {activeTab === 'verbs' && <ProgressBar total={totalVerbs} learned={Array.from(learnedItems).filter(id => id.startsWith('v') || id.startsWith('iv')).length} colorClass="text-emerald-500" />}
                            {activeTab === 'expressions' && <ProgressBar total={totalExp} learned={Array.from(learnedItems).filter(id => id.startsWith('e')).length} colorClass="text-amber-500" />}
                            {activeTab === 'prepositions' && <ProgressBar total={totalPrep} learned={Array.from(learnedItems).filter(id => id.startsWith('p')).length} colorClass="text-rose-500" />}
                            {activeTab === 'review' && <ProgressBar total={totalReview} learned={Array.from(learnedItems).filter(id => id.startsWith('r_')).length} colorClass="text-teal-500" />}
                            {activeTab === 'b2Expansion' && <ProgressBar total={totalB2} learned={Array.from(learnedItems).filter(id => id.startsWith('b2_')).length} colorClass="text-indigo-500" />}

                            {/* TAB: WORDS */}
                            {activeTab === 'words' && (
                                <div className="space-y-12">
                                    {wordCategories.length === 0 && (
                                        <div className="text-center py-20 text-slate-400 ar-text">لا توجد بيانات حتى الآن. في انتظار الكود الخاص بك!</div>
                                    )}
                                    {wordCategories.map((catKey, idx) => {
                                        const filteredItems = LEARNING_DATA.words[catKey].filter(w => w.ger.toLowerCase().includes(searchTerm.toLowerCase()) || w.eng.toLowerCase().includes(searchTerm.toLowerCase()) || w.ar.includes(searchTerm));
                                        if (filteredItems.length === 0 && searchTerm) return null;
                                        
                                        return (
                                            <section key={catKey}>
                                                <h2 className="text-3xl font-extrabold text-slate-800 mb-6 flex items-center gap-3 ar-text" dir="rtl">
                                                    <span className="bg-blue-100 p-2 rounded-xl text-blue-600"><i data-lucide="book" className="w-6 h-6"></i></span> 
                                                    قسم الكلمات {idx + 1}: {catKey}
                                                </h2>
                                                <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-6">
                                                    {filteredItems.map(word => (
                                                        <WordCard key={word.id} item={word} isLearned={learnedItems.has(word.id)} toggleLearned={toggleLearned} />
                                                    ))}
                                                </div>
                                            </section>
                                        );
                                    })}
                                </div>
                            )}

                            {/* TAB: VERBS */}
                            {activeTab === 'verbs' && (
                                <div>
                                    <h2 className="text-3xl font-extrabold text-slate-800 mb-8 flex items-center gap-3 ar-text" dir="rtl">
                                        <span className="bg-emerald-100 p-2 rounded-xl text-emerald-600"><i data-lucide="activity" className="w-6 h-6"></i></span>
                                        الأفعال الأساسية
                                    </h2>
                                    <div className="space-y-4 mb-12">
                                        {LEARNING_DATA.verbs.length === 0 && <p className="text-slate-400 ar-text text-center py-5">لا توجد بيانات</p>}
                                        {LEARNING_DATA.verbs.filter(v => v.ger.toLowerCase().includes(searchTerm.toLowerCase()) || v.eng.toLowerCase().includes(searchTerm.toLowerCase()) || v.ar.includes(searchTerm)).map(verb => (
                                            <ListRow key={verb.id} item={verb} isLearned={learnedItems.has(verb.id)} toggleLearned={toggleLearned} colorTheme="emerald" />
                                        ))}
                                    </div>

                                    {LEARNING_DATA.irregularVerbs.length > 0 && (
                                        <>
                                            <h2 className="text-3xl font-extrabold text-slate-800 mb-8 flex items-center gap-3 ar-text" dir="rtl">
                                                <span className="bg-emerald-100 p-2 rounded-xl text-emerald-600"><i data-lucide="alert-circle" className="w-6 h-6"></i></span>
                                                الأفعال الشاذة وتصريفاتها (Unregelmäßig)
                                            </h2>
                                            <div className="space-y-4">
                                                {LEARNING_DATA.irregularVerbs.filter(v => v.ger.toLowerCase().includes(searchTerm.toLowerCase()) || v.eng.toLowerCase().includes(searchTerm.toLowerCase()) || v.ar.includes(searchTerm)).map(verb => (
                                                    <IrregularVerbRow key={verb.id} item={verb} isLearned={learnedItems.has(verb.id)} toggleLearned={toggleLearned} />
                                                ))}
                                            </div>
                                        </>
                                    )}
                                </div>
                            )}

                            {/* TAB: EXPRESSIONS */}
                            {activeTab === 'expressions' && (
                                <div dir="rtl">
                                    <h2 className="text-3xl font-extrabold text-slate-800 mb-8 flex items-center gap-3 ar-text">
                                        <span className="bg-amber-100 p-2 rounded-xl text-amber-600"><i data-lucide="message-circle" className="w-6 h-6"></i></span>
                                        تعبيرات ومصطلحات للتعلم والمحادثة
                                    </h2>
                                    {LEARNING_DATA.expressions.length === 0 && <p className="text-slate-400 ar-text text-center py-5">لا توجد بيانات</p>}
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                        {LEARNING_DATA.expressions.filter(e => e.ger.toLowerCase().includes(searchTerm.toLowerCase()) || e.eng.toLowerCase().includes(searchTerm.toLowerCase()) || e.ar.includes(searchTerm)).map(exp => (
                                            <div key={exp.id} className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm relative group hover:shadow-xl hover:border-amber-200 transition-all duration-300">
                                                <button onClick={() => toggleLearned(exp.id)} className={`absolute top-5 left-5 p-2 rounded-full transition-colors z-10 ${learnedItems.has(exp.id) ? 'bg-amber-100 text-amber-600' : 'bg-slate-50 text-slate-300 hover:bg-slate-100'}`}>
                                                    <i data-lucide="check" className="w-5 h-5"></i>
                                                </button>
                                                <span className="inline-block bg-amber-50 text-amber-600 px-3 py-1 rounded-lg text-xs font-bold mb-4 ar-text border border-amber-100">{exp.type}</span>
                                                <div className="flex items-start gap-3 mb-3" dir="ltr">
                                                    <div className="flex flex-col gap-2 shrink-0">
                                                        <button onClick={(e) => playAudio(exp.ger, e)} className="text-amber-500 bg-amber-50 p-2 rounded-xl hover:bg-amber-100 transition-colors"><i data-lucide="volume-2" className="w-5 h-5"></i></button>
                                                        <div className="bg-slate-50 rounded-full p-1"><SpeechTester targetText={exp.ger} /></div>
                                                    </div>
                                                    <div>
                                                        <h3 className="text-xl font-extrabold text-slate-800 leading-tight mt-1">"{exp.ger}"</h3>
                                                    </div>
                                                </div>
                                                
                                                <div className="bg-slate-50 rounded-2xl p-4 mt-4 border border-slate-100">
                                                    <p className="text-slate-500 font-medium text-sm mb-2" dir="ltr">{exp.eng}</p>
                                                    <p className="text-amber-700 font-extrabold text-xl mb-4 ar-text">{exp.ar}</p>
                                                    <div className="text-sm text-slate-600 flex gap-2 items-start pt-3 border-t border-slate-200">
                                                        <i data-lucide="info" className="w-5 h-5 text-amber-400 mt-0.5 shrink-0"></i>
                                                        <span className="ar-text leading-relaxed">{exp.context}</span>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* TAB: PREPOSITIONS */}
                            {activeTab === 'prepositions' && (
                                <div>
                                    <h2 className="text-3xl font-extrabold text-slate-800 mb-8 flex items-center gap-3 ar-text" dir="rtl">
                                        <span className="bg-rose-100 p-2 rounded-xl text-rose-600"><i data-lucide="link" className="w-6 h-6"></i></span> 
                                        حروف الجر والأفعال المرتبطة بها (Verben mit Präpositionen)
                                    </h2>
                                    <div className="space-y-4">
                                        {LEARNING_DATA.prepositions.length === 0 && <p className="text-slate-400 ar-text text-center py-5">لا توجد بيانات</p>}
                                        {LEARNING_DATA.prepositions.filter(p => p.ger.toLowerCase().includes(searchTerm.toLowerCase()) || p.eng.toLowerCase().includes(searchTerm.toLowerCase()) || p.ar.includes(searchTerm)).map(prep => (
                                            <ListRow key={prep.id} item={prep} isLearned={learnedItems.has(prep.id)} toggleLearned={toggleLearned} colorTheme="rose" />
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* TAB: GRAMMAR */}
                            {activeTab === 'grammar' && (
                                <div dir="rtl">
                                    <div className="bg-gradient-to-br from-purple-700 to-indigo-800 text-white p-10 rounded-3xl shadow-xl mb-10 relative overflow-hidden">
                                        <i data-lucide="pen-tool" className="absolute -right-4 -bottom-4 w-48 h-48 text-white opacity-10 transform rotate-12"></i>
                                        <div className="relative z-10">
                                            <h2 className="text-4xl font-extrabold mb-3 ar-text">القواعد النحوية الشاملة</h2>
                                            <p className="text-purple-200 ar-text text-lg max-w-2xl">ملخص لأهم القواعد المذكورة في هذا الدرس.</p>
                                        </div>
                                    </div>

                                    <div className="grid gap-8">
                                        {LEARNING_DATA.grammar.length === 0 && <p className="text-slate-400 ar-text text-center py-5">لا توجد بيانات قواعد بعد.</p>}
                                        {LEARNING_DATA.grammar.map((gram, idx) => (
                                            <div key={idx} className="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden hover:shadow-lg transition-shadow">
                                                <div className="p-8 border-b border-slate-50 bg-slate-50/50 flex items-start gap-4">
                                                    <div className="bg-purple-100 p-3 rounded-2xl text-purple-600 shrink-0 mt-1">
                                                        <i data-lucide="braces" className="w-6 h-6"></i>
                                                    </div>
                                                    <div>
                                                        <h3 className="text-2xl font-extrabold text-slate-800 ar-text mb-2">{gram.title}</h3>
                                                        <p className="text-base text-slate-600 ar-text leading-relaxed">{gram.desc}</p>
                                                    </div>
                                                </div>
                                                
                                                <div className="p-8">
                                                    <div className="bg-slate-900 text-purple-300 font-mono text-base p-5 rounded-2xl mb-8 shadow-inner flex items-center gap-3 overflow-x-auto border border-slate-800" dir="ltr">
                                                        <i data-lucide="code" className="text-slate-500 w-5 h-5 shrink-0"></i> {gram.structure}
                                                    </div>
                                                    
                                                    <h4 className="font-bold text-slate-400 mb-4 text-sm tracking-widest uppercase ar-text">أمثلة للتوضيح:</h4>
                                                    <ul className="space-y-4">
                                                        {gram.examples.map((ex, i) => (
                                                            <li key={i} className="bg-purple-50/50 p-5 rounded-2xl border border-purple-100">
                                                                <div className="flex gap-4 items-center mb-3" dir="ltr">
                                                                    <button onClick={(e) => playAudio(ex.g, e)} className="text-purple-500 bg-white p-2 rounded-xl shadow-sm hover:bg-purple-50 transition-colors shrink-0"><i data-lucide="volume-2" className="w-5 h-5"></i></button>
                                                                    <span className="text-slate-800 text-lg font-medium" dangerouslySetInnerHTML={{ __html: ex.g }}></span>
                                                                </div>
                                                                <div className="text-purple-700 font-bold ar-text border-t border-purple-200/50 pt-3 mt-3">{ex.a}</div>
                                                            </li>
                                                        ))}
                                                    </ul>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* TAB: REVIEW (NEW) */}
                            {activeTab === 'review' && (
                                <div dir="rtl" className="pb-10">
                                    <div className="flex flex-col md:flex-row gap-4 mb-10" dir="rtl">
                                        <div className="flex-1 relative group max-w-3xl mx-auto w-full">
                                            <div className={`absolute -inset-0.5 bg-gradient-to-r from-teal-400 to-teal-600 rounded-2xl blur opacity-20 group-hover:opacity-40 transition duration-500`}></div>
                                            <div className="relative">
                                                <i data-lucide="search" className="absolute right-4 top-1/2 transform -translate-y-1/2 text-slate-400 w-6 h-6"></i>
                                                <input 
                                                    type="text" 
                                                    placeholder="ابحث في المراجعة الشاملة..." 
                                                    value={searchTerm}
                                                    onChange={(e) => setSearchTerm(e.target.value)}
                                                    className="w-full pr-14 pl-6 py-4 rounded-2xl border-none focus:outline-none focus:ring-4 focus:ring-teal-500/20 shadow-lg text-lg ar-text text-slate-700 font-medium"
                                                />
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-gradient-to-br from-teal-700 to-emerald-900 text-white p-10 rounded-3xl shadow-xl mb-10 relative overflow-hidden">
                                        <i data-lucide="clipboard-check" className="absolute -left-4 -top-4 w-48 h-48 text-white opacity-10 transform -rotate-12"></i>
                                        <div className="relative z-10 text-center">
                                            <h2 className="text-4xl font-extrabold mb-4 ar-text">المراجعة الشاملة (+130 جملة)</h2>
                                            <p className="text-teal-100 ar-text text-lg max-w-3xl mx-auto leading-relaxed">كل التعبيرات والنصائح وعمليات التعلم والمواقف والجمل النحوية التي وردت في الدرس مقسمة لسهولة التدريب واختبار النطق.</p>
                                        </div>
                                    </div>

                                    <div className="space-y-6">
                                        {LEARNING_DATA.review.length === 0 && <p className="text-slate-400 ar-text text-center py-5">لا توجد مراجعات بعد.</p>}
                                        {LEARNING_DATA.review.map((cat, cIdx) => {
                                            const filteredItems = cat.items.filter(item => item.g.toLowerCase().includes(searchTerm.toLowerCase()) || item.e.toLowerCase().includes(searchTerm.toLowerCase()) || item.a.includes(searchTerm));
                                            if (filteredItems.length === 0 && searchTerm) return null;

                                            return (
                                                <div key={cIdx} className="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden transition-all duration-300">
                                                    <button 
                                                        className={`w-full p-6 flex items-center justify-between text-right transition-colors ${expandedReview === cat.catId ? 'bg-teal-50' : 'hover:bg-slate-50'}`}
                                                        onClick={() => setExpandedReview(expandedReview === cat.catId ? null : cat.catId)}
                                                    >
                                                        <h3 className="text-2xl font-bold text-slate-800 ar-text flex items-center gap-3">
                                                            <span className={`w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold ${expandedReview === cat.catId ? 'bg-teal-600 text-white' : 'bg-slate-200 text-slate-600'}`}>{cIdx + 1}</span>
                                                            {cat.title}
                                                        </h3>
                                                        <i data-lucide="chevron-down" className={`w-6 h-6 text-slate-400 transform transition-transform duration-300 ${expandedReview === cat.catId ? 'rotate-180 text-teal-600' : ''}`}></i>
                                                    </button>
                                                    
                                                    <div className={`transition-all duration-500 ease-in-out overflow-hidden ${expandedReview === cat.catId ? 'max-h-[5000px] opacity-100' : 'max-h-0 opacity-0'}`}>
                                                        <div className="p-6 border-t border-slate-100 bg-slate-50/50">
                                                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                                                                {filteredItems.map((item) => (
                                                                    <div key={item.id} className="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm relative group hover:shadow-md hover:border-teal-200 transition-all duration-300" dir="ltr">
                                                                        <button onClick={() => toggleLearned(item.id)} className={`absolute top-4 right-4 p-2 rounded-full transition-colors z-10 ${learnedItems.has(item.id) ? 'bg-teal-100 text-teal-600' : 'bg-slate-50 text-slate-300 hover:bg-slate-100'}`}>
                                                                            <i data-lucide="check" className="w-5 h-5"></i>
                                                                        </button>
                                                                        <div className="flex items-start gap-3 mb-3 pr-10">
                                                                            <div className="flex flex-col gap-2 shrink-0">
                                                                                <button onClick={(e) => playAudio(item.g, e)} className="text-teal-500 bg-teal-50 p-2 rounded-xl hover:bg-teal-100 transition-colors"><i data-lucide="volume-2" className="w-5 h-5"></i></button>
                                                                                <div className="bg-slate-50 rounded-full p-1"><SpeechTester targetText={item.g} /></div>
                                                                            </div>
                                                                            <h3 className="text-lg font-bold text-slate-800 leading-relaxed mt-1" dangerouslySetInnerHTML={{ __html: item.g }}></h3>
                                                                        </div>
                                                                        <div className="pl-12 space-y-2">
                                                                            <p className="text-slate-500 text-sm">{item.e}</p>
                                                                            <p className="text-teal-700 font-bold text-lg ar-text border-t border-slate-100 pt-2" dir="rtl">{item.a}</p>
                                                                        </div>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}

                            {/* TAB: B2 EXPANSION (NEW) */}
                            {activeTab === 'b2Expansion' && (
                                <div dir="rtl" className="pb-10">
                                    <div className="flex flex-col md:flex-row gap-4 mb-10" dir="rtl">
                                        <div className="flex-1 relative group max-w-3xl mx-auto w-full">
                                            <div className={`absolute -inset-0.5 bg-gradient-to-r from-indigo-400 to-indigo-600 rounded-2xl blur opacity-20 group-hover:opacity-40 transition duration-500`}></div>
                                            <div className="relative">
                                                <i data-lucide="search" className="absolute right-4 top-1/2 transform -translate-y-1/2 text-slate-400 w-6 h-6"></i>
                                                <input 
                                                    type="text" 
                                                    placeholder="ابحث في توسعات B2..." 
                                                    value={searchTerm}
                                                    onChange={(e) => setSearchTerm(e.target.value)}
                                                    className="w-full pr-14 pl-6 py-4 rounded-2xl border-none focus:outline-none focus:ring-4 focus:ring-indigo-500/20 shadow-lg text-lg ar-text text-slate-700 font-medium"
                                                />
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-gradient-to-br from-indigo-700 to-blue-900 text-white p-10 rounded-3xl shadow-xl mb-10 relative overflow-hidden">
                                        <i data-lucide="trending-up" className="absolute -left-4 -top-4 w-48 h-48 text-white opacity-10 transform -rotate-12"></i>
                                        <div className="relative z-10 text-center">
                                            <h2 className="text-4xl font-extrabold mb-4 ar-text">توسعات مستوى B2</h2>
                                            <p className="text-indigo-100 ar-text text-lg max-w-3xl mx-auto leading-relaxed">بناءً على مفردات وقواعد الدرس، هنا تجد أهم الامتدادات لمستوى B2 كبدائل المبني للمجهول، وحالة المبني للمجهول، والمزيد من الكلمات المتقدمة.</p>
                                        </div>
                                    </div>

                                    <div className="space-y-6">
                                        {LEARNING_DATA.b2Expansion.length === 0 && <p className="text-slate-400 ar-text text-center py-5">لا توجد توسعات بعد.</p>}
                                        {LEARNING_DATA.b2Expansion.map((cat, cIdx) => {
                                            const filteredItems = cat.items.filter(item => item.g.toLowerCase().includes(searchTerm.toLowerCase()) || item.e.toLowerCase().includes(searchTerm.toLowerCase()) || item.a.includes(searchTerm));
                                            if (filteredItems.length === 0 && searchTerm) return null;

                                            return (
                                                <div key={cIdx} className="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden transition-all duration-300">
                                                    <button 
                                                        className={`w-full p-6 flex items-center justify-between text-right transition-colors ${expandedReview === cat.catId ? 'bg-indigo-50' : 'hover:bg-slate-50'}`}
                                                        onClick={() => setExpandedReview(expandedReview === cat.catId ? null : cat.catId)}
                                                    >
                                                        <div className="flex flex-col gap-1 items-start text-right">
                                                            <h3 className="text-2xl font-bold text-slate-800 ar-text flex items-center gap-3">
                                                                <span className={`w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold ${expandedReview === cat.catId ? 'bg-indigo-600 text-white' : 'bg-slate-200 text-slate-600'}`}>{cIdx + 1}</span>
                                                                {cat.title}
                                                            </h3>
                                                            <p className="text-sm text-slate-500 ar-text md:mr-11">{cat.desc}</p>
                                                        </div>
                                                        <i data-lucide="chevron-down" className={`w-6 h-6 text-slate-400 transform transition-transform duration-300 ${expandedReview === cat.catId ? 'rotate-180 text-indigo-600' : ''}`}></i>
                                                    </button>
                                                    
                                                    <div className={`transition-all duration-500 ease-in-out overflow-hidden ${expandedReview === cat.catId ? 'max-h-[5000px] opacity-100' : 'max-h-0 opacity-0'}`}>
                                                        <div className="p-6 border-t border-slate-100 bg-slate-50/50">
                                                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                                                                {filteredItems.map((item) => (
                                                                    <div key={item.id} className="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm relative group hover:shadow-md hover:border-indigo-200 transition-all duration-300" dir="ltr">
                                                                        <button onClick={() => toggleLearned(item.id)} className={`absolute top-4 right-4 p-2 rounded-full transition-colors z-10 ${learnedItems.has(item.id) ? 'bg-indigo-100 text-indigo-600' : 'bg-slate-50 text-slate-300 hover:bg-slate-100'}`}>
                                                                            <i data-lucide="check" className="w-5 h-5"></i>
                                                                        </button>
                                                                        <div className="flex items-start gap-3 mb-3 pr-10">
                                                                            <div className="flex flex-col gap-2 shrink-0">
                                                                                <button onClick={(e) => playAudio(item.g, e)} className="text-indigo-500 bg-indigo-50 p-2 rounded-xl hover:bg-indigo-100 transition-colors"><i data-lucide="volume-2" className="w-5 h-5"></i></button>
                                                                                <div className="bg-slate-50 rounded-full p-1"><SpeechTester targetText={item.g} /></div>
                                                                            </div>
                                                                            <h3 className="text-lg font-bold text-slate-800 leading-relaxed mt-1" dangerouslySetInnerHTML={{ __html: item.g }}></h3>
                                                                        </div>
                                                                        <div className="pl-12 space-y-2">
                                                                            <p className="text-slate-500 text-sm">{item.e}</p>
                                                                            <p className="text-indigo-700 font-bold text-lg ar-text border-t border-slate-100 pt-2" dir="rtl">{item.a}</p>
                                                                        </div>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}

                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
