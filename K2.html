            { level: "B1", category: "Geschichte", german: "der Schriftsteller", english: "Writer / author", arabic: "كاتب / مؤلف", examples: [{ ger: "Goethe war ein berühmter Schriftsteller.", en: "Goethe was a famous writer.", ar: "جوته كان كاتب مشهور." }, { ger: "Der Schriftsteller schreibt einen neuen Roman.", en: "The writer is writing a new novel.", ar: "الكاتب بيكتب رواية جديدة." }, { ger: "Viele Schriftsteller haben seltsame Gewohnheiten.", en: "Many writers have strange habits.", ar: "كُتاب كتير ليهم عادات غريبة." }] },

            // Health & Society

            { level: "B1", category: "Gesundheit", german: "das Wohlbefinden", english: "Well-being", arabic: "الصحة / الروقان", examples: [{ ger: "Sport ist wichtig für das körperliche Wohlbefinden.", en: "Exercise is important for physical well-being.", ar: "الرياضة مهمة للصحة الجسدية." }, { ger: "Ein gutes Essen steigert das Wohlbefinden.", en: "A good meal increases well-being.", ar: "الأكل الحلو بيعلي المزاج والروقان." }, { ger: "Wir kümmern uns um Ihr Wohlbefinden.", en: "We care about your well-being.", ar: "إحنا بنهتم براحتك وصحتك." }] },

        // ================= HELPER COMPONENT (LEVEL BADGE) =================
        const LevelBadge = ({ level }) => {
            if (!level) return null;
            const colors = {
                'A1': 'bg-emerald-100 text-emerald-800 border-emerald-300',
                'A2': 'bg-blue-100 text-blue-800 border-blue-300',
                'B1': 'bg-orange-100 text-orange-800 border-orange-300'
            };
            const colorClass = colors[level] || 'bg-slate-100 text-slate-800 border-slate-300';
            return (
                <span className={`absolute top-6 right-6 text-xs font-black uppercase tracking-widest px-3 py-1.5 rounded-full shadow-sm border ${colorClass}`}>
                    {level}
                </span>
            );
        };

        // ================= ICONS =================
        const VolumeIcon = ({ size = 20 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>;
        const MicIcon = ({ size = 20 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" x2="12" y1="19" y2="22"></line></svg>;
        const FlipIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>;

        // ================= COMPONENTS =================
        const BaseFlashcard = ({ frontContent, backHeaderContent, examples, targetGerman, cardColor = "bg-white", backColor = "bg-slate-800" }) => {
            const [isFlipped, setIsFlipped] = useState(false);
            const [listeningId, setListeningId] = useState(null);
            const [feedback, setFeedback] = useState(null);

            const handleTTS = (e, text) => {
                e.stopPropagation();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'de-DE';
                window.speechSynthesis.speak(utterance);
            };

            const cleanString = (str) => {
                return str.toLowerCase().replace(/[\(\)\.\,\/\-\+\!\?]/g, '').trim();
            };

            const handleSTT = (e, targetText, id) => {
                e.stopPropagation();
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                
                if (!SpeechRecognition) {
                    alert("المتصفح بتاعك مش بيدعم التعرف على الصوت، جرب تستخدم Google Chrome.");
                    return;
                }

                const recognition = new SpeechRecognition();
                recognition.lang = 'de-DE';
                recognition.interimResults = false;
                recognition.maxAlternatives = 1;

                recognition.onstart = () => { setListeningId(id); setFeedback(null); };
                recognition.onresult = (event) => {
                    const transcript = event.results[0][0].transcript;
                    const cleanTranscript = cleanString(transcript);
                    const cleanTarget = cleanString(targetText);
                    if (cleanTarget.includes(cleanTranscript) || cleanTranscript.includes(cleanTarget)) {
                        setFeedback({ id, type: 'success', msg: `عاش! نطقت صح: "${transcript}"` });
                    } else {
                        setFeedback({ id, type: 'error', msg: `حاول تاني، انت قولت: "${transcript}"` });
                    }
                };
                recognition.onerror = (event) => { setFeedback({ id, type: 'error', msg: `مشكلة في المايك: ${event.error}` }); setListeningId(null); };
                recognition.onend = () => { setListeningId(null); };
                recognition.start();
            };

            return (
                <div className="w-full h-[32rem] cursor-pointer perspective-1000" onClick={() => setIsFlipped(!isFlipped)}>
                    <div className={`flashcard-inner relative w-full h-full text-center rounded-3xl shadow-lg transition-transform duration-700 ${isFlipped ? 'rotate-y-180' : ''}`}>
                        
                        <div className={`absolute w-full h-full border-2 border-slate-700/20 rounded-3xl flex flex-col justify-center items-center p-6 backface-hidden shadow-xl ${cardColor}`}>
                            {frontContent}
                            <div className="absolute bottom-6 right-6 flex space-x-3">
                                <button onClick={(e) => handleTTS(e, targetGerman)} className="p-3 bg-slate-900/10 text-slate-800 rounded-full hover:bg-slate-900/20 shadow-sm transition-transform hover:scale-105" title="اسمع النطق"><VolumeIcon size={24} /></button>
                                <button onClick={(e) => handleSTT(e, targetGerman, 'main')} className={`p-3 rounded-full shadow-md transition-transform hover:scale-105 text-white ${listeningId === 'main' ? 'bg-red-500 pulse-animation' : 'bg-blue-600 hover:bg-blue-700'}`} title="درب نطقك"><MicIcon size={24} /></button>
                            </div>
                            <div className="absolute bottom-6 left-6 text-slate-500 flex items-center space-x-1 font-bold bg-black/5 px-4 py-2 rounded-full">
                                <FlipIcon /> <span className="text-sm">Tap to Flip</span>
                            </div>
                            {feedback?.id === 'main' && !isFlipped && (
                                <div className={`absolute bottom-20 left-1/2 transform -translate-x-1/2 text-sm px-4 py-2 rounded-full shadow-lg font-bold w-max ${feedback.type === 'success' ? 'bg-green-100 text-green-800 border-2 border-green-500' : 'bg-red-100 text-red-800 border-2 border-red-500'}`}>{feedback.msg}</div>
                            )}
                        </div>

                        <div className={`absolute w-full h-full text-white rounded-3xl flex flex-col items-center p-6 backface-hidden rotate-y-180 ${backColor} shadow-2xl`}>
                            <div className="w-full flex-shrink-0 mb-4 border-b border-white/20 pb-4">
                                {backHeaderContent}
                            </div>
                            <div className="w-full flex-1 overflow-y-auto custom-scrollbar pr-2 space-y-3" onClick={(e) => e.stopPropagation()}>
                                <h4 className="text-xs uppercase tracking-widest text-slate-400 font-black mb-2 text-left bg-black/20 px-3 py-1 rounded inline-block">In-Context Examples:</h4>
                                {examples && examples.map((ex, idx) => {
                                    const exId = `ex-${idx}`;
                                    const isListeningEx = listeningId === exId;
                                    const exFeedback = feedback?.id === exId ? feedback : null;
                                    
                                    return (
                                        <div key={idx} className="bg-slate-800/80 p-5 rounded-2xl border border-slate-600/50 flex flex-col gap-2 hover:bg-slate-700 transition-colors shadow-inner">
                                            <p className="text-lg font-black text-white text-left leading-snug">{ex.ger}</p>
                                            <p className="text-sm font-semibold text-emerald-300 text-left leading-snug">{ex.en}</p>
                                            <p className="text-base text-blue-200 text-right font-bold mt-1" dir="rtl">{ex.ar}</p>
                                            <div className="flex justify-between items-center mt-2 border-t border-slate-600/30 pt-3">
                                                <div className="flex-1">
                                                    {exFeedback && (
                                                        <span className={`text-xs px-3 py-1.5 rounded-full font-bold shadow-sm ${exFeedback.type === 'success' ? 'bg-green-500 text-green-50' : 'bg-red-500 text-red-50'}`}>
                                                            {exFeedback.msg}
                                                        </span>
                                                    )}
                                                </div>
                                                <div className="flex space-x-2">
                                                    <button onClick={(e) => handleTTS(e, ex.ger)} className="p-2 bg-slate-600 text-white rounded-full hover:bg-slate-500 transition-colors shadow-sm" title="اسمع الجملة"><VolumeIcon size={16} /></button>
                                                    <button onClick={(e) => handleSTT(e, ex.ger, exId)} className={`p-2 rounded-full transition-colors text-white shadow-sm ${isListeningEx ? 'bg-red-500 pulse-animation' : 'bg-blue-500 hover:bg-blue-400'}`} title="جرب تنطقها"><MicIcon size={16} /></button>
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const VocabCard = ({ data }) => {
            return <BaseFlashcard 
                frontContent={<><LevelBadge level={data.level} /><span className="absolute top-6 left-6 text-sm font-black text-slate-500 uppercase tracking-wide bg-slate-200/50 px-4 py-1.5 rounded-full shadow-sm">{data.category}</span><h3 className="text-4xl font-black text-slate-800 mb-2 mt-4 drop-shadow-sm px-4">{data.german}</h3></>} 
                backHeaderContent={<><p className="text-xl font-bold mb-2 text-center text-blue-200">{data.english}</p><p className="text-3xl font-black text-center text-white leading-tight drop-shadow-md" dir="rtl">{data.arabic}</p></>} 
                examples={data.examples} targetGerman={data.german} backColor="bg-slate-900" cardColor="bg-slate-50" 
            />;
        };

        const PrepCard = ({ data }) => {
            const isAkk = data.case === "Akkusativ";
            return <BaseFlashcard 
                frontContent={<><LevelBadge level={data.level} /><h3 className="text-4xl font-black text-slate-800 tracking-tight drop-shadow-sm px-4">{data.german}</h3><p className="text-sm text-slate-500 mt-4 font-black uppercase tracking-widest bg-slate-200/50 px-5 py-2 rounded-full shadow-inner">Verb + Präposition</p></>} 
                backHeaderContent={<><h4 className={`text-2xl font-black uppercase tracking-widest mb-2 pb-2 border-b-2 border-white/10 ${isAkk ? 'text-rose-400' : (data.case === 'Reflexiv' ? 'text-fuchsia-400' : 'text-cyan-400')}`}>+ {data.case}</h4><p className="text-lg font-bold text-center text-slate-300">{data.english}</p><p className="text-2xl font-black text-center text-white mt-1 drop-shadow-md" dir="rtl">{data.arabic}</p></>} 
                examples={data.examples} targetGerman={data.german} backColor="bg-slate-950" cardColor="bg-slate-100" 
            />;
        };

        const ConjugationCard = ({ data }) => {
            return <BaseFlashcard 
                frontContent={<><LevelBadge level={data.level} /><span className="absolute top-6 left-6 text-sm font-black text-emerald-800 uppercase tracking-wide bg-emerald-200/50 px-4 py-1.5 rounded-full shadow-sm border border-emerald-300">Infinitive</span><h3 className="text-5xl font-black text-emerald-950 mb-4 drop-shadow-sm">{data.infinitive}</h3><p className="text-2xl text-emerald-800 font-black mt-2 drop-shadow-sm" dir="rtl">{data.arabic}</p></>} 
                backHeaderContent={<div className="w-full space-y-2 text-left px-2"><div className="flex justify-between items-center bg-emerald-900/60 p-3 rounded-xl shadow-inner border border-emerald-500/20"><span className="text-emerald-300 text-xs uppercase font-black tracking-wider">Präsens:</span><span className="font-bold text-lg text-white">{data.praesens}</span></div><div className="flex justify-between items-center bg-emerald-900/60 p-3 rounded-xl shadow-inner border border-emerald-500/20"><span className="text-emerald-300 text-xs uppercase font-black tracking-wider">Präteritum:</span><span className="font-bold text-lg text-white">{data.praeteritum}</span></div><div className="flex justify-between items-center bg-emerald-900/60 p-3 rounded-xl shadow-inner border border-emerald-500/20"><span className="text-emerald-300 text-xs uppercase font-black tracking-wider">Perfekt:</span><span className="font-bold text-lg text-emerald-200">{data.perfekt}</span></div></div>} 
                examples={data.examples} targetGerman={data.infinitive} cardColor="bg-emerald-50" backColor="bg-emerald-950" 
            />;
        };

        const WendungCard = ({ data }) => {
            return <BaseFlashcard 
                frontContent={<><LevelBadge level={data.level} /><span className="absolute top-6 left-6 text-sm font-black text-purple-800 uppercase tracking-wide bg-purple-200/50 px-4 py-1.5 rounded-full shadow-sm border border-purple-300">Wendung</span><h3 className="text-3xl font-black text-slate-900 mb-2 mt-8 leading-snug drop-shadow-sm px-4">{data.german}</h3></>} 
                backHeaderContent={<><p className="text-xl font-bold mb-2 text-center text-purple-200">{data.english}</p><p className="text-3xl font-black text-center text-white leading-tight drop-shadow-md" dir="rtl">{data.arabic}</p></>} 
                examples={data.examples} targetGerman={data.german} cardColor="bg-purple-50" backColor="bg-slate-950" 
            />;
        };

        // ================= MAIN APP =================
        const App = () => {
            const [activeCategory, setActiveCategory] = useState('vocab');

            const categories = [
                { id: 'vocab', name: 'Vokabeln & Beispiele', desc: 'كل مفردات الوحدة التانية مع أمثلة كاملة', count: vocabData.length },
                { id: 'wendungen', name: 'Passiv & Redemittel', desc: 'كل قوالب المبني للمجهول والبزنس', count: wendungenData.length },
                { id: 'prepVerbs', name: 'Verben & Fälle', desc: 'كل أفعال حروف الجر والانعكاسية', count: prepVerbsData.length },
                { id: 'conjugation', name: 'Zeitformen & Sätze', desc: 'كل تصريفات الأفعال في الوحدة الثانية', count: conjugationData.length }
            ];

            return (
                <div className="min-h-screen flex flex-col items-center p-4 sm:p-8">
                    <header className="w-full max-w-7xl mb-12 text-center bg-slate-900 p-8 sm:p-14 rounded-[3rem] shadow-2xl border border-slate-700 relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-500 via-emerald-500 to-teal-500"></div>
                        <div className="inline-block bg-blue-500/20 text-blue-300 px-5 py-1.5 rounded-full text-sm font-black uppercase tracking-widest mb-6 border border-blue-500/30">The Ultimate Language Lab (CEFR Tagged)</div>
                        <h1 className="text-4xl sm:text-6xl font-black text-white mb-6 tracking-tight drop-shadow-lg">German B1 <span className="text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-300">Masterclass</span></h1>
                        <p className="text-2xl text-slate-300 font-bold mb-4" dir="rtl">Kapitel 2: Essen, Passiv & Geschichte</p>
                        <p className="text-lg text-slate-400 font-medium max-w-4xl mx-auto mb-10 leading-relaxed" dir="rtl">
                            تم إضافة علامات المستويات اللغوية <span className="text-emerald-400 font-black">(A1, A2, B1)</span> على أعلى يمين كل كارت. الكلمات الأساسية A1/A2 مصممة كأرضية ثابتة، ومصطلحات البزنس والباسيف مُعرفة بـ B1 للتركيز.
                        </p>
                        
                        <div className="flex flex-wrap justify-center gap-5 mt-6" dir="rtl">
                            {categories.map(cat => (
                                <button key={cat.id} onClick={() => setActiveCategory(cat.id)} className={`flex flex-col items-center p-6 rounded-3xl border-2 transition-all duration-300 ${activeCategory === cat.id ? 'bg-gradient-to-b from-blue-600 to-blue-800 border-blue-400 shadow-[0_0_30px_rgba(59,130,246,0.5)] transform scale-105' : 'bg-slate-800/50 border-slate-700 hover:border-slate-500 hover:bg-slate-800'}`} style={{ width: '280px' }}>
                                    <span className={`text-2xl font-black mb-2 tracking-tight ${activeCategory === cat.id ? 'text-white' : 'text-slate-300'}`}>{cat.name}</span>
                                    <span className={`text-sm text-center leading-snug font-medium ${activeCategory === cat.id ? 'text-blue-100' : 'text-slate-500'}`}>{cat.desc}</span>
                                    <span className={`mt-5 px-5 py-2 rounded-full text-sm font-black tracking-widest uppercase ${activeCategory === cat.id ? 'bg-black/30 text-white shadow-inner border border-white/10' : 'bg-slate-900 text-slate-400'}`}>{cat.count} كروت</span>
                                </button>
                            ))}
                        </div>
                    </header>

                    <div className="w-full max-w-7xl">
                        {activeCategory === 'prepVerbs' && (
                            <div className="animate-fade-in grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-10 pb-16">
                                {prepVerbsData.map((data, index) => <PrepCard key={`prep-${index}`} data={data} />)}
                            </div>
                        )}
                        {activeCategory === 'wendungen' && (
                            <div className="animate-fade-in grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-10 pb-16">
                                {wendungenData.map((data, index) => <WendungCard key={`wen-${index}`} data={data} />)}
                            </div>
                        )}
                        {activeCategory === 'vocab' && (
                            <div className="animate-fade-in grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-10 pb-16">
                                {vocabData.map((data, index) => <VocabCard key={`voc-${index}`} data={data} />)}
                            </div>
                        )}
                        {activeCategory === 'conjugation' && (
                            <div className="animate-fade-in grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-10 pb-16">
                                {conjugationData.map((data, index) => <ConjugationCard key={`conj-${index}`} data={data} />)}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
