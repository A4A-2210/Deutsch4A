    <script type="text/babel">
        // --- HELPERS FOR AUDIO & SPEECH ---
        const playAudio = (text, e) => {
            if (e) e.stopPropagation();
            const cleanText = text.replace(/<[^>]+>/g, '');
            const utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.lang = 'de-DE';
            window.speechSynthesis.speak(utterance);
        };

        const SpeechTester = ({ targetText }) => {
            const [status, setStatus] = React.useState('idle'); 
            const [heard, setHeard] = React.useState('');

            const listen = (e) => {
                if (e) e.stopPropagation();
                if (!('webkitSpeechRecognition' in window)) {
                    alert('المتصفح ده مش بيدعم تسجيل الصوت، جرب Google Chrome.');
                    return;
                }
                const recognition = new webkitSpeechRecognition();
                recognition.lang = 'de-DE';
                recognition.interimResults = false;
                
                recognition.onstart = () => setStatus('listening');
                recognition.onresult = (event) => {
                    const speechResult = event.results[0][0].transcript;
                    setHeard(speechResult);
                    
                    const clean = (str) => str.replace(/<[^>]+>/g, '').toLowerCase().replace(/[.,!?]/g, '').trim();
                    const targetClean = clean(targetText);
                    const heardClean = clean(speechResult);
                    
                    if (heardClean.includes(targetClean) || targetClean.includes(heardClean) || heardClean === targetClean) {
                        setStatus('success');
                    } else {
                        setStatus('fail');
                    }
                };
                recognition.onerror = () => setStatus('fail');
                recognition.onend = () => { if(status === 'listening') setStatus('idle'); };
                recognition.start();
            };

            return (
                <div className="inline-flex items-center gap-2" onClick={(e) => e.stopPropagation()}>
                    <button onClick={listen} title="جرب تنطقها" className={`p-2 rounded-full transition-all duration-300 shadow-sm ${status === 'listening' ? 'bg-red-500 text-white animate-pulse scale-110' : 'bg-slate-100 text-slate-600 hover:bg-slate-200 hover:scale-105'}`}>
                        <i data-lucide="mic" className="w-4 h-4"></i>
                    </button>
                    {status === 'success' && <span className="text-emerald-500 text-xs font-bold ar-text animate-bounce">✅ ممتاز!</span>}
                    {status === 'fail' && <span className="text-red-500 text-xs ar-text font-bold" title={`سمعت: ${heard}`}>❌ جرب تاني</span>}
                </div>
            );
        };

            grammar: [
                {
                    title: "1. Relativsätze (الجمل الموصولة)",
                    desc: "الجمل الموصولة تُستخدم لتجنب التكرار وربط الجمل. القاعدة الذهبية هنا: الضمير الموصول يأخذ (الجنس والعدد: مذكر/مؤنث/مفرد/جمع) من الكلمة التي يشير إليها في الجملة الرئيسية، ولكن (حالة الإعراب: Nominativ, Akkusativ, Dativ) تتحدد حصرياً بناءً على وظيفته النحوية داخل الجملة الموصولة نفسها (هل هو فاعل، مفعول به، أم مجرور بحرف جر؟). ولا تنسَ وضع الفاصلة (Komma) قبل الضمير، وأن الفعل المُصرف يذهب دائماً لنهاية الجملة.",
                    structure: "Nominativ: der/die/das/die | Akkusativ: den/die/das/die | Dativ: dem/der/dem/denen",
                    table: {
                        headers: ["Kasus (الحالة)", "Maskulin (m)", "Feminin (f)", "Neutral (n)", "Plural (pl)"],
                        rows: [
                            ["Nominativ", "der", "die", "das", "die"],
                            ["Akkusativ", "den", "die", "das", "die"],
                            ["Dativ", "dem", "der", "dem", "denen"],
                            ["Genitiv", "dessen", "deren", "dessen", "deren"]
                        ]
                    },
                    examples: [
                        { g: "Das ist der <span class='text-blue-600 font-bold'>Wissenschaftler</span>, <span class='text-rose-600 font-bold'>der</span> das Gerät entwickelt <span class='text-emerald-600 font-bold'>hat</span>.", a: "ده العالم اللي (الفاعل) طور الجهاز.<br><span class='text-xs text-slate-500 mt-1 inline-block'>🟦 الكلمة المرجعية | 🟥 الضمير الموصول | 🟩 الفعل المصرف (في النهاية)</span>" },
                        { g: "Das ist die <span class='text-blue-600 font-bold'>Stadt</span>, in <span class='text-rose-600 font-bold'>der</span> Schiller gelehrt <span class='text-emerald-600 font-bold'>hat</span>.", a: "دي المدينة اللي (Dativ بسبب حرف in) شيلر درس فيها." },
                        { g: "Das sind die <span class='text-blue-600 font-bold'>Politiker</span>, <span class='text-rose-600 font-bold'>denen</span> die Bürger <span class='text-emerald-600 font-bold'>vertrauen</span>.", a: "دول السياسيين اللي (Dativ جمع عشان فعل vertrauen) المواطنين بيثقوا فيهم." }
                    ]

                {
                    title: "2. Orte als Attribute (أسماء المدن كصفات)",
                    desc: "هل تساءلت يوماً كيف نقول 'نقانق فيينا' أو 'ميناء هامبورغ' بالألمانية؟ القاعدة بسيطة: نأخذ اسم المدينة ونضيف له المقطع (-er). هذه الصيغة استثنائية لسببين: 1) تُكتب دائماً بحرف كبير (Großgeschrieben) عكس باقي الصفات. 2) هي صفة 'متمردة' لا تخضع لقواعد الإعراب (Undecklinierbar)؛ أي أن نهايتها لا تتغير أبداً مهما اختلف موقعها (فاعل، مفعول) أو جنس الكلمة التي تليها (مثلاً: der Berliner Dom / den Berliner Dom).",
                    structure: "Stadtname + er (Immer großgeschrieben, nicht dekliniert)",
                    examples: [

                        { g: "Haben Sie schon <span class='text-blue-600 font-bold'>Thüring<span class='text-rose-600'>er</span></span> Bratwürste gegessen?", a: "كلت قبل كدة سجق من تورينغن؟" },
                        { g: "Ich bestelle ein <span class='text-blue-600 font-bold'>Wien<span class='text-rose-600'>er</span></span> Schnitzel.", a: "هطلب شنيتسل فيينا." }
                    ]
                },
                {
                    title: "3. Lokale Präpositionen (حروف الجر المكانية: Wohin? vs. Wo?)",

                {
                    title: "4. Partizipien als Adjektive (اسم الفاعل والمفعول كصفات)",

                    { id: 'b2_w14', ger: "das Stadtbild", eng: "Cityscape", ar: "المظهر العام للمدينة", s: [{ g: "Die historischen Gebäude prägen das <strong>Stadtbild</strong> stark.", e: "Historical buildings strongly shape the cityscape.", a: "المباني التاريخية بتطبع شكل المدينة بطابع مميز." }, { g: "Moderne Wolkenkratzer verändern das traditionelle <strong>Stadtbild</strong>.", e: "Modern skyscrapers change the traditional cityscape.", a: "ناطحات السحاب بتغير الشكل التقليدي للمدينة." }, { g: "Das <strong>Stadtbild</strong> ist von kleinen Cafés geprägt.", e: "The cityscape is characterized by small cafes.", a: "المظهر العام بيتميز بالكافيهات الصغيرة." }] },
                    { id: 'b2_w15', ger: "der Vorort", eng: "Suburb", ar: "الضاحية", s: [{ g: "Familien ziehen oft in einen ruhigen <strong>Vorort</strong>.", e: "Families often move to a quiet suburb.", a: "العائلات غالباً بتعزل لضاحية هادية." }, { g: "Das Leben im <strong>Vorort</strong> ist entspannter als im Zentrum.", e: "Life in the suburb is more relaxed than in the center.", a: "الحياة في الضاحية أهدى بكتير من المركز." }, { g: "Die Zugverbindung vom <strong>Vorort</strong> in die Stadt ist gut.", e: "The train connection from the suburb to the city is good.", a: "خط القطر من الضاحية للمدينة ممتاز." }] },
                    { id: 'b2_w16', ger: "der Pendler", eng: "Commuter", ar: "المسافر اليومي للعمل", s: [{ g: "Jeden Morgen stehen Tausende <strong>Pendler</strong> im Stau.", e: "Every morning, thousands of commuters are stuck in traffic jams.", a: "كل يوم الصبح آلاف المسافرين بيقفوا في الزحمة." }, { g: "Die Züge sind morgens voller <strong>Pendler</strong>.", e: "The trains are full of commuters in the morning.", a: "القطارات الصبح بتكون مليانة باللي مسافرين شغلهم." }, { g: "Für <strong>Pendler</strong> ist ein zuverlässiger Nahverkehr wichtig.", e: "For commuters, reliable local transport is important.", a: "للمسافرين يومياً، المواصلات الموثوقة دي شيء مهم جداً." }] },
                    { id: 'b2_w17', ger: "pendeln", eng: "to commute", ar: "يتنقل يومياً للعمل", s: [{ g: "Ich muss jeden Tag eine Stunde zur Arbeit <strong>pendeln</strong>.", e: "I have to commute an hour to work every day.", a: "لازم أسافر ساعة كل يوم لشغلي." }, { g: "Viele Menschen <strong>pendeln</strong> zwischen Berlin und Potsdam.", e: "Many people commute between Berlin and Potsdam.", a: "ناس كتير بتسافر يومياً بين برلين وبوتسدام." }, { g: "Das tägliche <strong>Pendeln</strong> mit dem Auto ist anstrengend.", e: "Daily commuting by car is exhausting.", a: "السفر اليومي بالعربية مرهق." }] },
                    { id: 'b2_w18', ger: "sich ansiedeln", eng: "to settle / locate", ar: "يستوطن / يستقر في مكان", s: [{ g: "Viele internationale Firmen <strong>siedeln sich</strong> hier <strong>an</strong>.", e: "Many international companies are settling here.", a: "شركات دولية كتير بتستقر وتفتح هنا." }, { g: "Immer mehr Start-ups <strong>siedeln sich</strong> im Technologiepark <strong>an</strong>.", e: "More and more start-ups are locating in the technology park.", a: "شركات ناشئة كتير بتستقر في مجمع التكنولوجيا." }, { g: "Neue Industrien haben <strong>sich</strong> hier <strong>angesiedelt</strong>.", e: "New industries have settled here.", a: "صناعات جديدة استقرت في المنطقة دي." }] },
                    { id: 'b2_w19', ger: "prägen", eng: "to shape / characterize", ar: "يطبع بطابعه / يميز", s: [{ g: "Die Industrie hat diese Region stark <strong>geprägt</strong>.", e: "Industry has strongly shaped this region.", a: "الصناعة أثرت وطبعت المنطقة دي بطابعها." }, { g: "Der Fluss <strong>prägt</strong> die Landschaft der Gegend.", e: "The river shapes the landscape of the area.", a: "النهر بيميز المناظر الطبيعية للمنطقة." }, { g: "Diese Erfahrung hat sein ganzes Leben <strong>geprägt</strong>.", e: "This experience shaped his entire life.", a: "التجربة دي سابت أثرها على كل حياته." }] },
                    { id: 'b2_w20', ger: "florieren", eng: "to flourish / boom", ar: "يزدهر / ينتعش", s: [{ g: "Dank des Tourismus <strong>floriert</strong> die lokale Wirtschaft.", e: "Thanks to tourism, the local economy is flourishing.", a: "بفضل السياحة، الاقتصاد المحلي رجع يزدهر تاني." }, { g: "Der Online-Handel <strong>floriert</strong> in dieser Jahreszeit.", e: "Online trade is flourishing in this season.", a: "التجارة الإلكترونية بتنتعش جداً في الموسم ده." }, { g: "Das Geschäft <strong>floriert</strong> überraschenderweise trotz der Krise.", e: "The business is surprisingly flourishing despite the crisis.", a: "المحل بيزدهر بشكل مفاجئ رغم الأزمة." }] },
                    { id: 'b2_w21', ger: "verfallen", eng: "to decay / deteriorate", ar: "يتهالك / ينهار", s: [{ g: "Das alte Schloss ist im Laufe der Jahre <strong>verfallen</strong>.", e: "The old castle has decayed over the years.", a: "القصر القديم للأسف اتهالك مع مرور السنين." }, { g: "Wenn man das Haus nicht pflegt, wird es <strong>verfallen</strong>.", e: "If you don't maintain the house, it will decay.", a: "لو مهتمتش بالبيت، هيقع قريب." }, { g: "Das <strong>verfallene</strong> Gebäude wird nun abgerissen.", e: "The decayed building is now being demolished.", a: "المبنى المتهالك بيتهد دلوقتي." }] },
                    { id: 'b2_w22', ger: "die Instandhaltung", eng: "Maintenance", ar: "الصيانة", s: [{ g: "Die regelmäßige <strong>Instandhaltung</strong> von Brücken ist lebenswichtig.", e: "The regular maintenance of bridges is vital.", a: "الصيانة الدورية للكباري شيء حيوي وأساسي." }, { g: "Die Kosten für die <strong>Instandhaltung</strong> sind gestiegen.", e: "The costs for maintenance have increased.", a: "تكاليف الصيانة زادت." }, { g: "Er ist für die <strong>Instandhaltung</strong> der Maschinen verantwortlich.", e: "He is responsible for the maintenance of the machines.", a: "هو مسؤول عن صيانة الماكينات." }] },
                    { id: 'b2_w23', ger: "die Verwaltung", eng: "Administration", ar: "الإدارة / الجهة الإدارية", s: [{ g: "Die städtische <strong>Verwaltung</strong> arbeitet an neuen Projekten.", e: "The municipal administration is working on new projects.", a: "الإدارة المحلية شغالة على مشاريع جديدة." }, { g: "Der Antrag muss von der <strong>Verwaltung</strong> geprüft werden.", e: "The application must be checked by the administration.", a: "الطلب لازم يتراجع من الإدارة الأول." }, { g: "Sie arbeitet in der öffentlichen <strong>Verwaltung</strong> der Stadt.", e: "She works in the city's public administration.", a: "هي شغالة في الإدارة العامة للمدينة." }] },
                    { id: 'b2_w24', ger: "das Gutachten", eng: "Expert opinion / report", ar: "تقرير الخبراء", s: [{ g: "Ein unabhängiges <strong>Gutachten</strong> bestätigt die Sicherheit.", e: "An independent expert report confirms the safety.", a: "تقرير خبراء مستقل بيأكد السلامة." }, { g: "Wir warten noch auf das medizinische <strong>Gutachten</strong>.", e: "We are still waiting for the medical report.", a: "لسه مستنيين التقرير الطبي." }, { g: "Das <strong>Gutachten</strong> zeigt, dass die Brücke unsicher ist.", e: "The expert report shows that the bridge is unsafe.", a: "التقرير بيوضح إن الكوبري مش آمن." }] },
                    { id: 'b2_w25', ger: "die Bürgerinitiative", eng: "Citizens' initiative", ar: "مبادرة المواطنين", s: [{ g: "Eine <strong>Bürgerinitiative</strong> protestiert gegen den Bau.", e: "A citizens' initiative is protesting against the construction.", a: "مبادرة مواطنين بتعترض على البناء." }, { g: "Die <strong>Bürgerinitiative</strong> sammelt Unterschriften für den Park.", e: "The citizens' initiative is collecting signatures for the park.", a: "المبادرة بتجمع توقيعات عشان الحديقة." }, { g: "Sie hat eine <strong>Bürgerinitiative</strong> für Umweltschutz gegründet.", e: "She founded a citizens' initiative for environmental protection.", a: "هي أسست مبادرة عشان حماية البيئة." }] },
                    { id: 'b2_w26', ger: "der Kompromiss", eng: "Compromise", ar: "الحل الوسط", s: [{ g: "Nach langen Verhandlungen fanden sie einen <strong>Kompromiss</strong>.", e: "After long negotiations, they found a compromise.", a: "بعد مفاوضات طويلة، لقوا حل وسط." }, { g: "Man muss manchmal einen fairen <strong>Kompromiss</strong> schließen.", e: "You sometimes have to make a fair compromise.", a: "أحياناً لازم تعمل تنازل وتوصل لحل وسط." }, { g: "Beide Seiten waren zu einem <strong>Kompromiss</strong> bereit.", e: "Both sides were ready for a compromise.", a: "الطرفين كانوا مستعدين لحل وسط." }] },
                    { id: 'b2_w27', ger: "die Umsetzung", eng: "Implementation", ar: "التنفيذ / التطبيق", s: [{ g: "Die konkrete <strong>Umsetzung</strong> des Plans dauert lange.", e: "The concrete implementation of the plan takes a long time.", a: "التنفيذ الفعلي للخطة بياخد وقت." }, { g: "Wir beginnen morgen mit der praktischen <strong>Umsetzung</strong>.", e: "We will start with the practical implementation tomorrow.", a: "هنبدأ بكرة في التنفيذ العملي." }, { g: "Die schnelle <strong>Umsetzung</strong> der Idee war ein Erfolg.", e: "The fast implementation of the idea was a success.", a: "التنفيذ السريع للفكرة كان نجاح كبير." }] },
                    { id: 'b2_w28', ger: "die Vielfalt", eng: "Diversity", ar: "التنوع", s: [{ g: "Die kulturelle <strong>Vielfalt</strong> macht die Stadt attraktiv.", e: "Cultural diversity makes the city attractive.", a: "التنوع الثقافي بيخلي المدينة دي جذابة جداً." }, { g: "Der Wald bietet eine erstaunliche <strong>Vielfalt</strong> an Pflanzen.", e: "The forest offers an amazing variety of plants.", a: "الغابة بتقدم تنوع مدهش من النباتات." }, { g: "Wir schätzen und schützen die <strong>Vielfalt</strong> der Meinungen.", e: "We value and protect the diversity of opinions.", a: "إحنا بنقدر ونحمي تنوع الآراء." }] },
                    { id: 'b2_w29', ger: "der Wohlstand", eng: "Prosperity / Wealth", ar: "الرخاء / الرفاهية", s: [{ g: "Bildung ist der Schlüssel zu gesellschaftlichem <strong>Wohlstand</strong>.", e: "Education is the key to societal prosperity.", a: "التعليم الجيد هو المفتاح للرخاء المجتمعي." }, { g: "Der wirtschaftliche <strong>Wohlstand</strong> des Landes wächst.", e: "The economic prosperity of the country is growing.", a: "الرخاء الاقتصادي للبلد بينمو." }, { g: "Sie leben nun endlich in finanziellem <strong>Wohlstand</strong>.", e: "They now finally live in financial prosperity.", a: "هما دلوقتي عايشين في رفاهية مادية." }] },
                    { id: 'b2_w30', ger: "fördern", eng: "to promote / support", ar: "يدعم / يعزز", s: [{ g: "Der Staat sollte umweltfreundliche Projekte stärker <strong>fördern</strong>.", e: "The state should promote environmentally friendly projects more strongly.", a: "الدولة المفروض تدعم المشاريع البيئية بقوة." }, { g: "Das Projekt <strong>fördert</strong> die Kreativität von Kindern.", e: "The project promotes the creativity of children.", a: "المشروع بيدعم الإبداع عند الأطفال." }, { g: "Wir möchten junge Talente an der Universität <strong>fördern</strong>.", e: "We want to support young talents at the university.", a: "إحنا عايزين ندعم المواهب الشابة في الجامعة." }] }
                ],
                expressions: [
                    { id: 'b2_e1', type: "Meinung äußern", ger: "Ich stehe auf dem Standpunkt, dass...", eng: "I take the view that...", ar: "أنا أقف عند وجهة النظر القائلة بأن...", context: "لتوضيح رأيك بثقة في النقاش.", s: [{ g: "Ich stehe auf dem Standpunkt, dass Umweltschutz Priorität haben muss.", e: "I take the view that environmental protection must have priority.", a: "أنا أرى أن حماية البيئة يجب أن تكون أولوية." }, { g: "Hinsichtlich dieses Themas stehe ich auf dem Standpunkt, dass wir mehr tun müssen.", e: "Regarding this topic, I take the view that we must do more.", a: "فيما يخص هذا الموضوع، أرى أنه يجب أن نفعل المزيد." }, { g: "Sie steht auf dem Standpunkt, dass diese Maßnahme nutzlos ist.", e: "She takes the view that this measure is useless.", a: "هي ترى أن هذا الإجراء بلا فائدة." }] },
                    { id: 'b2_e2', type: "Meinung äußern", ger: "Ich bin fest davon überzeugt, dass...", eng: "I am firmly convinced that...", ar: "أنا مقتنع تماماً بأن...", context: "لإبداء رأي قوي لا يقبل الشك.", s: [{ g: "Ich bin fest davon überzeugt, dass Technologie unser Leben verbessert.", e: "I am firmly convinced that technology improves our lives.", a: "أنا مقتنع تماماً إن التكنولوجيا بتحسن حياتنا." }, { g: "Wir sind fest davon überzeugt, dass dieser Weg der richtige ist.", e: "We are firmly convinced that this path is the right one.", a: "إحنا مقتنعين تماماً إن الطريق ده هو الصح." }, { g: "Er ist fest davon überzeugt, dass wir das Ziel bald erreichen.", e: "He is firmly convinced that we will reach the goal soon.", a: "هو مقتنع تماماً إننا هنوصل للهدف قريب." }] },
                    { id: 'b2_e3', type: "Argumentieren", ger: "Ein wesentlicher Aspekt ist, dass...", eng: "An essential aspect is that...", ar: "جانب جوهري هو أن...", context: "لتقديم حجة أساسية أو نقطة هامة.", s: [{ g: "Ein wesentlicher Aspekt ist, dass die Kosten langfristig sinken.", e: "An essential aspect is that costs will decrease in the long term.", a: "جانب أساسي هو إن التكاليف هتقل على المدى الطويل." }, { g: "Ein wesentlicher Aspekt in dieser Diskussion ist die Gesundheit.", e: "An essential aspect in this discussion is health.", a: "جانب جوهري في النقاش ده هو الصحة." }, { g: "Ein weiterer wesentlicher Aspekt ist, dass viel Zeit gespart wird.", e: "Another essential aspect is that a lot of time is saved.", a: "جانب مهم تاني هو إن ده بيوفر وقت كتير." }] },
                    { id: 'b2_e4', type: "Argumentieren", ger: "Man darf auch nicht vergessen, dass...", eng: "One must also not forget that...", ar: "كما يجب ألا ننسى أن...", context: "لإضافة نقطة قد يغفل عنها الآخرون.", s: [{ g: "Man darf auch nicht vergessen, dass viele Menschen arbeitslos sind.", e: "One must also not forget that many people are unemployed.", a: "لازم مننساش برضه إن فيه ناس كتير عاطلة." }, { g: "Dabei darf man auch nicht vergessen, dass Kinder viel Bewegung brauchen.", e: "One must not forget that children need a lot of exercise.", a: "في السياق ده مننساش إن الأطفال محتاجين حركة كتير." }, { g: "Man darf auch nicht vergessen, dass dies erst der Anfang ist.", e: "One must also not forget that this is only the beginning.", a: "لازم مننساش كمان إن دي مجرد البداية." }] },
                    { id: 'b2_e5', type: "Gegensätze", ger: "Einerseits ..., andererseits ...", eng: "On the one hand..., on the other hand...", ar: "من ناحية...، ومن ناحية أخرى...", context: "لعرض مميزات وعيوب موضوع ما (يستخدم كثيراً في الكتابة).", s: [{ g: "Einerseits ist das Auto billig, andererseits ist die Qualität schlecht.", e: "On the one hand the car is cheap, on the other hand the quality is bad.", a: "من ناحية العربية رخيصة، ومن ناحية تانية جودتها وحشة." }, { g: "Einerseits liebe ich die Stadt, andererseits vermisse ich die Natur.", e: "On the one hand I love the city, on the other hand I miss nature.", a: "من ناحية بحب المدينة، ومن ناحية تانية مفتقد الطبيعة." }, { g: "Einerseits bringt das Internet Vorteile, andererseits entstehen Risiken.", e: "On the one hand the internet brings benefits, on the other hand risks arise.", a: "من ناحية النت بيجيب فوايد، ومن ناحية تانية بيخلق مخاطر." }] },
                    { id: 'b2_e6', type: "Gegensätze", ger: "Im Gegensatz dazu steht...", eng: "In contrast to this stands...", ar: "في المقابل نجد...", context: "لعرض وجهة نظر معاكسة تماماً.", s: [{ g: "Im Gegensatz dazu steht die offizielle Meinung der Opposition.", e: "In contrast to this stands the official opinion of the opposition.", a: "في المقابل نلاقي الرأي الرسمي للمعارضة." }, { g: "Im Gegensatz dazu steht die Tatsache, dass alles teurer wird.", e: "In contrast to this stands the fact that everything is getting more expensive.", a: "على العكس من ده بنلاقي حقيقة إن كل حاجة بتغلى." }, { g: "Im Gegensatz dazu steht unser eigener, günstigerer Vorschlag.", e: "In contrast to this stands our own, cheaper proposal.", a: "في المقابل بنلاقي اقتراحنا إحنا اللي أرخص." }] },
                    { id: 'b2_e7', type: "Erfahrung", ger: "Aus meiner persönlichen Erfahrung kann ich sagen, dass...", eng: "From my personal experience I can say that...", ar: "من واقع خبرتي الشخصية أستطيع القول إن...", context: "لربط الموضوع بتجربتك (مطلوب في B2).", s: [{ g: "Aus meiner persönlichen Erfahrung kann ich sagen, dass Reisen bildet.", e: "From my personal experience I can say that traveling is educational.", a: "من واقع خبرتي الشخصية أقدر أقول إن السفر بيثقف." }, { g: "Aus meiner persönlichen Erfahrung kann ich sagen, dass der Kurs hilft.", e: "From my personal experience I can say that the course helps.", a: "من تجربتي أقدر أقول إن الكورس بيساعد بجد." }, { g: "Aus meiner persönlichen Erfahrung kann ich sagen, dass sich Arbeit auszahlt.", e: "From my personal experience I can say that work pays off.", a: "من تجربتي أقدر أؤكد إن الشغل بيجيب نتيجته." }] },
                    { id: 'b2_e8', type: "Tatsache betonen", ger: "Es ist nicht zu leugnen, dass...", eng: "It cannot be denied that...", ar: "مما لا يمكن إنكاره أن...", context: "لذكر حقيقة أو واقع بديهي.", s: [{ g: "Es ist nicht zu leugnen, dass das Klima sich drastisch ändert.", e: "It cannot be denied that the climate is changing drastically.", a: "مما لا يمكن إنكاره إن المناخ بيتغير بشدة." }, { g: "Es ist nicht zu leugnen, dass er einen großen Fehler gemacht hat.", e: "It cannot be denied that he made a big mistake.", a: "لا يمكن إنكار إنه عمل غلطة كبيرة." }, { g: "Es ist nicht zu leugnen, dass diese Methode extrem effektiv ist.", e: "It cannot be denied that this method is extremely effective.", a: "لا يمكن ننكر إن الطريقة دي فعالة جداً." }] },
                    { id: 'b2_e9', type: "Wichtigkeit", ger: "Es spielt eine entscheidende Rolle.", eng: "It plays a crucial role.", ar: "إنه يلعب دوراً حاسماً.", context: "لتوضيح أهمية شيء لدرجة كبيرة.", s: [{ g: "Gute Bildung spielt eine entscheidende Rolle in unserer Gesellschaft.", e: "Good education plays a crucial role in our society.", a: "التعليم الجيد بيلعب دور حاسم في مجتمعنا." }, { g: "Bei diesem Projekt spielt die Kommunikation eine entscheidende Rolle.", e: "In this project, communication plays a crucial role.", a: "في المشروع ده، التواصل بيلعب دور حاسم." }, { g: "Das Wetter spielt bei dieser Veranstaltung eine entscheidende Rolle.", e: "The weather plays a crucial role in this event.", a: "الجو بيلعب دور محوري جداً في الفعالية دي." }] },
                    { id: 'b2_e10', type: "Folgen", ger: "Das führt unweigerlich dazu, dass...", eng: "That inevitably leads to...", ar: "هذا يؤدي حتماً إلى أن...", context: "لشرح عواقب تصرف أو ظاهرة.", s: [{ g: "Das führt unweigerlich dazu, dass die Preise weiter steigen.", e: "That inevitably leads to prices continuing to rise.", a: "ده بيؤدي حتماً لإن الأسعار بتزيد." }, { g: "Ständiger Lärm führt unweigerlich dazu, dass die Konzentration sinkt.", e: "Constant noise inevitably leads to a drop in concentration.", a: "الدوشة المستمرة بتؤدي حتماً لإن التركيز بيقل." }, { g: "Dieser Fehler führt unweigerlich dazu, dass wir neu starten müssen.", e: "This mistake inevitably leads to us having to restart.", a: "الغلطة دي هتؤدي حتماً لإننا نعمل ريستارت." }] },
                    { id: 'b2_e11', type: "Zweifel", ger: "Ich bezweifle, dass...", eng: "I doubt that...", ar: "أشك في أن...", context: "لإبداء الشك في صحة ادعاء معين.", s: [{ g: "Ich bezweifle ernsthaft, dass das eine gute Idee ist.", e: "I seriously doubt that this is a good idea.", a: "أنا بشك بجدية في إن دي فكرة كويسة." }, { g: "Er bezweifelt stark, dass wir rechtzeitig fertig werden.", e: "He strongly doubts that we will finish on time.", a: "هو بيشك بشدة إننا هنخلص في الميعاد." }, { g: "Wir bezweifeln, dass diese Information der Wahrheit entspricht.", e: "We doubt that this information corresponds to the truth.", a: "إحنا بنشك إن المعلومة دي مطابقة للحقيقة." }] },
                    { id: 'b2_e12', type: "Zustimmung/Einwand", ger: "Ich stimme dir teilweise zu, aber...", eng: "I agree with you partially, but...", ar: "أوافقك جزئياً، ولكن...", context: "للموافقة مع وجود تحفظ أو استدراك.", s: [{ g: "Ich stimme dir teilweise zu, aber es gibt noch andere Probleme.", e: "I agree with you partially, but there are still other problems.", a: "أوافقك جزئياً، بس فيه هنا مشاكل تانية." }, { g: "Ich stimme dir teilweise zu, aber wir müssen das Budget beachten.", e: "I agree with you partially, but we must consider the budget.", a: "موافق معاك لدرجة ما، بس لازم نراعي الميزانية." }, { g: "Ich stimme dir teilweise zu, aber die Lösung ist nicht so einfach.", e: "I agree with you partially, but the solution is not that simple.", a: "أنا معاك جزئياً، بس الحل مش بالسهولة دي." }] },
                    { id: 'b2_e13', type: "Argumentieren", ger: "Ein weiteres Argument dafür/dagegen ist...", eng: "Another argument for/against it is...", ar: "حجة أخرى تؤيد/تعارض هذا هي...", context: "لإضافة سبب داعم أو معارض إضافي.", s: [{ g: "Ein weiteres Argument dafür ist die enorme Zeitersparnis.", e: "Another argument for it is the enormous time savings.", a: "حجة قوية تانية تأيد ده هي توفير الوقت." }, { g: "Ein weiteres Argument dagegen ist das hohe finanzielle Risiko.", e: "Another argument against it is the high financial risk.", a: "حجة تقيلة تانية ضد ده هي الخطر المالي الكبير." }, { g: "Ein weiteres Argument dafür ist die Tatsache, dass es die Umwelt schont.", e: "Another argument for it is the fact that it protects the environment.", a: "حجة تانية مع ده هي حقيقة إنه بيحمي البيئة." }] },
                    { id: 'b2_e14', type: "Zusammenfassung", ger: "Zusammenfassend lässt sich sagen, dass...", eng: "In summary, it can be said that...", ar: "وخلاصة القول هي أن...", context: "لإنهاء العرض أو المقال الكتابي.", s: [{ g: "Zusammenfassend lässt sich sagen, dass beide Seiten gute Ideen haben.", e: "In summary, it can be said that both sides have good ideas.", a: "وخلاصة القول، إن الطرفين عندهم أفكار كويسة." }, { g: "Zusammenfassend lässt sich sagen, dass das Projekt ein Erfolg war.", e: "In summary, it can be said that the project was a success.", a: "نقدر نلخص ونقول إن المشروع كان نجاح كبير." }, { g: "Zusammenfassend lässt sich sagen, dass mehr Investitionen nötig sind.", e: "In summary, it can be said that more investments are needed.", a: "كخلاصة، نقدر نقول إننا محتاجين استثمارات أكتر." }] },
                    { id: 'b2_e15', type: "Meinung äußern", ger: "Meines Erachtens ist es wichtig, dass...", eng: "In my opinion, it is important that...", ar: "في اعتقادي (في رأيي)، من المهم أن...", context: "تعبير رسمي ومتقدم لكلمة Meiner Meinung nach.", s: [{ g: "Meines Erachtens ist es wichtig, dass wir in dieser Krise sofort handeln.", e: "In my opinion, it is important that we act immediately in this crisis.", a: "في اعتقادي، من المهم إننا نتحرك فوراً في الأزمة دي." }, { g: "Meines Erachtens ist es wichtig, dass alle Parteien einverstanden sind.", e: "In my opinion, it is important that all parties agree.", a: "في رأيي، المهم إن كل الأطراف تكون موافقة." }, { g: "Meines Erachtens ist es wichtig, dass die Qualität erhalten bleibt.", e: "In my opinion, it is important that the quality is maintained.", a: "في اعتقادي، من المهم إن الجودة تفضل محفوظة." }] }
                ],
                grammar: [
                    {
                        title: "1. Nomen-Verb-Verbindungen (روابط الاسم والفعل)",
                        desc: "هي تراكيب لغوية متقدمة تتكون من (اسم غالباً مجرد + فعل وظيفي مثل treffen, stellen, bringen). في هذا التركيب، يفقد الفعل معناه الأصلي ويصبح مجرد أداة نحوية، بينما يحمل الاسم المعنى الأساسي للحدث. تُستخدم هذه التراكيب بكثرة في اللغة المكتوبة، الصحافة، والبيئات الرسمية لأنها تعطي طابعاً موضوعياً وأكثر دقة واحترافية من استخدام الفعل العادي المفرد.",
                        structure: "Nomen (oft im Akkusativ) + Funktionsverb (wie treffen, nehmen, stellen)",
                        examples: [
                            { g: "Statt: Wir <em>entscheiden</em> heute. -> Wir <span class='text-blue-600 font-bold'>treffen</span> heute eine <span class='text-rose-600 font-bold'>Entscheidung</span>.", a: "بدلاً من 'نقرر'، نقول 'نتخذ قراراً'.<br><span class='text-xs text-slate-500 mt-1 inline-block'>🟦 الفعل الوظيفي | 🟥 الاسم المرتبط</span>" },
                            { g: "Statt: Er <em>beansprucht</em> den Service. -> Er <span class='text-blue-600 font-bold'>nimmt</span> den Service in <span class='text-rose-600 font-bold'>Anspruch</span>.", a: "بدلاً من 'يطالب/يستفيد'، نقول 'يأخذ الخدمة في الاعتبار (يستفيد منها)'." },
                            { g: "Statt: Ich <em>frage</em> etwas. -> Ich <span class='text-blue-600 font-bold'>stelle</span> eine <span class='text-rose-600 font-bold'>Frage</span>.", a: "أطرح سؤالاً." }
                        ]
                    },
                    {
                        title: "2. Passiversatzformen (بدائل المبني للمجهول)",
                        desc: "في المستوى المتقدم، يتم تجنب تكرار المبني للمجهول المعتاد (werden + Partizip II) واستبداله بصيغ أكثر أناقة. صيغة (sich lassen + Infinitiv) تعادل (kann + Passiv) وتعبر عن الإمكانية. صيغة (sein + zu + Infinitiv) تعادل (muss/kann + Passiv) وتُستخدم بكثرة في النصوص الرسمية للتعبير عن الإلزام أو الإمكانية. أما الصفات المنتهية بالمقاطع (-bar, -lich) فتُلحق بالفعل لتعبر عن قابلية حدوثه.",
                        structure: "1) sich lassen + Infinitiv | 2) sein + zu + Infinitiv | 3) Adjektive auf -bar/-lich",
                        examples: [
                            { g: "Passiv: Das Problem <em>kann gelöst werden</em>.", a: "المبني للمجهول المعتاد: المشكلة يمكن أن تُحل." },
                            { g: "Alternative 1: Das Problem <span class='text-rose-600 font-bold'>lässt sich</span> <span class='text-blue-600 font-bold'>lösen</span>.", a: "البديل الأول: المشكلة 'تترك نفسها' للحل (يمكن حلها).<br><span class='text-xs text-slate-500 mt-1 inline-block'>🟥 بديل المبني للمجهول | 🟦 الفعل الأساسي (Infinitiv)</span>" },
                            { g: "Alternative 2: Das Problem <span class='text-rose-600 font-bold'>ist zu</span> <span class='text-blue-600 font-bold'>lösen</span>.", a: "البديل الثاني: المشكلة قابلة للحل (أو يجب حلها)." },
                            { g: "Alternative 3: Das Problem ist <span class='text-blue-600 font-bold'>lös<span class='text-rose-600'>bar</span></span>.", a: "البديل الثالث (باستخدام صفة): المشكلة حلُولة (قابلة للحل)." }
                        ]
                    },
                    {
                        title: "3. Zweiteilige Konnektoren (الروابط المزدوجة)",
                        desc: "تُستخدم لربط الجمل بأسلوب بلاغي متقدم وتتطلب تركيزاً عالياً على ترتيب الكلمات. رابط (nicht nur ... sondern auch) يفيد الإضافة الإيجابية. رابط (weder ... noch) يفيد النفي القاطع (ولا يُستخدم معه nicht، والفعل يأتي مباشرة بعد noch). أما الرابط الأصعب (Je ... desto) فيفيد التناسب (كلما.. كلما): حيث تأتي (Je) مع جملة جانبية فعلها في النهاية، بينما (desto) تبدأ جملة رئيسية ويأتي الفعل المُصرف بعدها مباشرة (موقع 2).",
                        structure: "nicht nur ... sondern auch | weder ... noch | entweder ... oder | je ... desto",
                        examples: [
                            { g: "Die Stadt ist <span class='text-rose-600 font-bold'>nicht nur</span> historisch, <span class='text-blue-600 font-bold'>sondern auch</span> sehr modern.", a: "ليس فقط ... بل أيضاً: المدينة ليست فقط تاريخية، بل أيضاً حديثة جداً.<br><span class='text-xs text-slate-500 mt-1 inline-block'>🟥 الجزء الأول من الرابط | 🟦 الجزء الثاني</span>" },
                            { g: "Er spricht <span class='text-rose-600 font-bold'>weder</span> Englisch <span class='text-blue-600 font-bold'>noch</span> Deutsch.", a: "لا ... ولا: هو لا يتحدث الإنجليزية ولا الألمانية." },
                            { g: "<span class='text-rose-600 font-bold'>Je</span> mehr ich <span class='text-emerald-600 font-bold'>lerne</span>, <span class='text-blue-600 font-bold'>desto</span> besser <span class='text-emerald-600 font-bold'>spreche</span> ich.", a: "كلما ... كلما: كلما ذاكرت أكتر، كلما اتكلمت أحسن.<br><span class='text-xs text-slate-500 mt-1 inline-block'>🟥 الجزء الأول | 🟦 الجزء الثاني | 🟩 موقع الأفعال</span>" }
                        ]
                    }
                ]
            }
        };

        const { useState, useEffect } = React;

        // --- HELPER FOR ARTICLES COLORING ---
        const colorizeArticles = (text) => {
            if (!text) return text;
            const regex = /(der |die |das )/gi;
            const parts = text.split(regex);
            return parts.map((part, i) => {
                const lower = part.toLowerCase();
                if (lower === 'der ') return <span key={i} className="text-blue-500 font-extrabold">{part}</span>;
                if (lower === 'die ') return <span key={i} className="text-rose-500 font-extrabold">{part}</span>;
                if (lower === 'das ') return <span key={i} className="text-emerald-500 font-extrabold">{part}</span>;
                return <span key={i}>{part}</span>;
            });
        };

        // --- COMPONENTS ---
        const ProgressBar = ({ total, learned, colorClass }) => {
            const percentage = total === 0 ? 0 : Math.round((learned / total) * 100);
            return (
                <div className="glass-panel p-5 rounded-2xl mb-8 flex items-center justify-between transition-all" dir="rtl">
                    <div>
                        <h3 className="text-sm font-bold text-slate-500 uppercase tracking-wider ar-text mb-1">مستوى التقدم</h3>
                        <p className="text-3xl font-extrabold text-slate-800">{learned} <span className="text-sm font-medium text-slate-400">/ {total} أتقنتهم</span></p>
                    </div>
                    <div className="relative w-20 h-20 drop-shadow-md">
                        <svg className="w-full h-full transform -rotate-90" viewBox="0 0 36 36">
                            <path className="text-slate-200" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" strokeWidth="3" />
                            <path className={`${colorClass} transition-all duration-1000 ease-out`} strokeDasharray={`${percentage}, 100`} d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" />
                        </svg>
                        <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-sm font-bold text-slate-700">
                            {percentage}%
                        </div>
                    </div>
                </div>
            );
        };

        const WordCard = ({ item, isLearned, toggleLearned, colorTheme = "blue" }) => {
            const [isFlipped, setIsFlipped] = useState(false);
            const frontBg = colorTheme === 'indigo' ? 'bg-indigo-50 text-indigo-600' : 'bg-blue-50 text-blue-600';
            const backGradient = colorTheme === 'indigo' ? 'from-indigo-600 to-purple-700' : 'from-blue-600 to-indigo-700';

            return (
                <div className="relative group perspective-1000 w-full h-[24rem]">
                    <div className={`w-full h-full transition-all duration-700 transform-style-3d shadow-[0_8px_30px_rgb(0,0,0,0.04)] rounded-2xl ${isFlipped ? 'rotate-y-180' : ''}`}>
                        
                        {/* FRONT */}
                        <div className="absolute w-full h-full backface-hidden bg-white border border-slate-100 rounded-2xl p-5 flex flex-col cursor-pointer hover:shadow-lg transition-shadow" 
                             onClick={() => setIsFlipped(true)}>
                            <div className="flex justify-between items-start shrink-0" dir="rtl">
                                <span className={`${frontBg} text-xs font-bold px-3 py-1.5 rounded-lg uppercase tracking-wider ar-text`}>كلمة منفصلة</span>
                                <button onClick={(e) => { e.stopPropagation(); toggleLearned(item.id); }} className={`p-2 rounded-full transition-colors ${isLearned ? 'bg-emerald-100 text-emerald-600' : 'bg-slate-50 text-slate-300 hover:bg-slate-100'}`}>
                                    <i data-lucide="check" className="w-5 h-5"></i>
                                </button>
                            </div>
                            
                            <div className="text-center mt-2 flex-grow flex flex-col justify-center overflow-y-auto front-scroll px-1 py-3">
                                <div className="flex flex-col justify-center items-center gap-3 mb-1">
                                    <h3 className="text-2xl font-bold text-slate-800 leading-tight">{colorizeArticles(item.ger)}</h3>
                                    <div className="flex items-center gap-2">
                                        <button onClick={(e) => playAudio(item.ger, e)} className={`p-2 rounded-full ${frontBg} hover:bg-opacity-80 transition-colors shadow-sm`}><i data-lucide="volume-2" className="w-5 h-5"></i></button>
                                        <SpeechTester targetText={item.ger} />
                                    </div>
                                </div>
                                <div className="mt-4 space-y-1">
                                    <p className="text-slate-500 font-medium text-sm">{item.eng}</p>
                                    <p className={`text-${colorTheme}-600 font-bold ar-text text-lg`} dir="rtl">{item.ar}</p>
                                </div>
                            </div>
                            
                            <div className="text-center text-xs text-slate-400 font-medium flex items-center justify-center gap-1 ar-text mt-2 shrink-0">
                                <i data-lucide="rotate-cw" className="w-3 h-3"></i> اضغط للأمثلة
                            </div>
                        </div>

                        {/* BACK */}
                        <div className={`absolute w-full h-full backface-hidden bg-gradient-to-br ${backGradient} text-white rounded-2xl p-5 shadow-lg flex flex-col cursor-pointer overflow-hidden`} 
                             onClick={() => setIsFlipped(false)} style={{ transform: 'rotateY(180deg)' }}>
                            <div className="mb-3 border-b border-white/20 pb-2 flex justify-between items-center shrink-0" dir="rtl">
                                <h4 className="font-bold text-white/90 text-sm tracking-wider ar-text">أمثلة سياقية</h4>
                                <i data-lucide="rotate-ccw" className="w-4 h-4 text-white/60"></i>
                            </div>
                            <div className="overflow-y-auto card-scroll flex-grow pr-2 pb-2">
                                <ul className="space-y-3">
                                    {item.s && item.s.map((sentence, idx) => (
                                        <li key={idx} className="text-sm bg-white/10 backdrop-blur-sm p-3 rounded-xl border border-white/5">
                                            <div className="flex items-start gap-2 mb-1.5">
                                                <button onClick={(e) => playAudio(sentence.g, e)} className="p-1 text-white/70 hover:text-white shrink-0 mt-0.5"><i data-lucide="volume-2" className="w-4 h-4"></i></button>
                                                <span className="leading-relaxed" dangerouslySetInnerHTML={{ __html: sentence.g }}></span>
                                            </div>
                                            <div className="text-white/60 text-xs italic ml-8 mb-1.5">{sentence.e}</div>
                                            <div className="text-amber-300 text-sm font-bold ar-text border-t border-white/10 pt-1.5 mt-1" dir="rtl">{sentence.a}</div>
                                        </li>
                                    ))}
                                    {!item.s && <li className="text-sm text-white/70 italic text-center mt-10">Keine Sätze vorhanden</li>}
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const ListRow = ({ item, isLearned, toggleLearned, colorTheme }) => {
            const [expanded, setExpanded] = useState(false);
            
            const themes = {
                emerald: 'hover:border-emerald-300 text-emerald-600 bg-emerald-50 text-emerald-700',
                amber: 'hover:border-amber-300 text-amber-600 bg-amber-50 text-amber-700',
                rose: 'hover:border-rose-300 text-rose-600 bg-rose-50 text-rose-700',
                teal: 'hover:border-teal-300 text-teal-600 bg-teal-50 text-teal-700',
                indigo: 'hover:border-indigo-300 text-indigo-600 bg-indigo-50 text-indigo-700',
            };
            const themeClass = themes[colorTheme] || themes.emerald;
            const textAccent = `text-${colorTheme}-600`;

            return (
                <div className={`bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden mb-4 transition-all duration-300 hover:shadow-md`} dir="ltr">
                    <div className="p-5 flex items-center justify-between cursor-pointer" onClick={() => setExpanded(!expanded)}>
                        <div className="flex items-center gap-4">
                            <button onClick={(e) => { e.stopPropagation(); toggleLearned(item.id); }} className={`p-2 rounded-full transition-colors ${isLearned ? `bg-${colorTheme}-100 ${textAccent}` : 'bg-slate-50 text-slate-300 hover:bg-slate-100'}`}>
                                <i data-lucide="check" className="w-5 h-5"></i>
                            </button>
                            <div>
                                <h3 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                                    {item.ger} 
                                    <button onClick={(e) => playAudio(item.ger, e)} className={`${textAccent} opacity-70 hover:opacity-100 transition-opacity`}><i data-lucide="volume-2" className="w-5 h-5"></i></button>
                                </h3>
                                {item.eng && item.ar && <p className="text-sm text-slate-500 mt-1">{item.eng} <span className="mx-2 text-slate-300">|</span> <span className={`${textAccent} font-bold ar-text`} dir="rtl">{item.ar}</span></p>}
                            </div>
                        </div>
                        <div className={`transform transition-transform duration-300 ${expanded ? 'rotate-180' : ''}`}>
                            <i data-lucide="chevron-down" className="w-6 h-6 text-slate-400"></i>
                        </div>
                    </div>
                    
                    <div className={`transition-all duration-500 overflow-hidden ${expanded ? 'max-h-[1000px] opacity-100' : 'max-h-0 opacity-0'}`}>
                        <div className="bg-slate-50 p-5 border-t border-slate-100">
                            {item.context && (
                                <div className="mb-4 text-sm text-slate-600 flex gap-2 items-start p-3 bg-white rounded-xl border border-slate-200" dir="rtl">
                                    <i data-lucide="info" className={`w-5 h-5 ${textAccent} mt-0.5 shrink-0`}></i>
                                    <span className="ar-text leading-relaxed">{item.context}</span>
                                </div>
                            )}
                            <ul className="space-y-4">
                                {item.s && item.s.map((sentence, idx) => (
                                    <li key={idx} className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm group flex flex-col sm:flex-row gap-4 justify-between items-start">
                                        <div className="flex-1">
                                            <div className="flex items-start gap-3 mb-2">
                                                <button onClick={(e) => playAudio(sentence.g, e)} className={`mt-0.5 ${textAccent} bg-${colorTheme}-50 p-1.5 rounded-lg shrink-0`}><i data-lucide="volume-2" className="w-4 h-4"></i></button>
                                                <p className="text-slate-800 text-base font-medium leading-relaxed mt-1" dangerouslySetInnerHTML={{ __html: sentence.g }}></p>
                                            </div>
                                            <p className="text-slate-500 text-sm ml-10 mb-2">{sentence.e}</p>
                                            <div className={`ml-10 ${textAccent} text-base font-bold ar-text border-t border-slate-100 pt-2`} dir="rtl">{sentence.a}</div>
                                        </div>
                                        <div className="opacity-100 sm:opacity-0 group-hover:opacity-100 transition-opacity shrink-0 sm:mt-1 self-end sm:self-start bg-slate-50 p-1.5 rounded-full" dir="ltr">
                                            <SpeechTester targetText={sentence.g} />
                                        </div>
                                    </li>
                                ))}
                                {!item.s && !item.context && <p className="text-slate-500 italic px-4">Keine Beispiele vorhanden.</p>}
                            </ul>
                        </div>
                    </div>
                </div>
            );
        };

        const IrregularVerbRow = ({ item, isLearned, toggleLearned }) => {
            const [expanded, setExpanded] = useState(false);
            
            return (
                <div className="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden mb-4 transition-all duration-300 hover:shadow-md" dir="ltr">
                    <div className="p-5 flex items-center justify-between cursor-pointer" onClick={() => setExpanded(!expanded)}>
                        <div className="flex items-center gap-4">
                            <button onClick={(e) => { e.stopPropagation(); toggleLearned(item.id); }} className={`p-2 rounded-full transition-colors ${isLearned ? 'bg-emerald-100 text-emerald-600' : 'bg-slate-50 text-slate-300 hover:bg-slate-100'}`}>
                                <i data-lucide="check" className="w-5 h-5"></i>
                            </button>
                            <div>
                                <h3 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                                    {item.ger} 
                                    <button onClick={(e) => playAudio(item.ger, e)} className="text-emerald-600 opacity-70 hover:opacity-100 transition-opacity"><i data-lucide="volume-2" className="w-5 h-5"></i></button>
                                </h3>
                                <p className="text-sm text-slate-500 mt-1">{item.eng} <span className="mx-2 text-slate-300">|</span> <span className="text-emerald-600 font-bold ar-text" dir="rtl">{item.ar}</span></p>
                            </div>
                        </div>
                        <div className={`transform transition-transform duration-300 ${expanded ? 'rotate-180' : ''}`}>
                            <i data-lucide="chevron-down" className="w-6 h-6 text-slate-400"></i>
                        </div>
                    </div>
                    
                    <div className={`transition-all duration-500 overflow-hidden ${expanded ? 'max-h-[1000px] opacity-100' : 'max-h-0 opacity-0'}`}>
                        <div className="bg-slate-50 p-5 border-t border-slate-100">
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm relative group">
                                    <div className="text-xs font-bold text-emerald-500 uppercase tracking-widest mb-2 border-b border-slate-100 pb-1">Präsens (مضارع)</div>
                                    <div className="flex items-start gap-2 mb-2">
                                        <button onClick={(e) => playAudio(item.praesens, e)} className="text-emerald-600 bg-emerald-50 p-1.5 rounded-lg shrink-0"><i data-lucide="volume-2" className="w-4 h-4"></i></button>
                                        <p className="text-slate-800 text-sm font-medium leading-relaxed mt-1" dangerouslySetInnerHTML={{ __html: item.praesens }}></p>
                                    </div>
                                    <div className="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition-opacity"><SpeechTester targetText={item.praesens} /></div>
                                </div>
                                <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm relative group">
                                    <div className="text-xs font-bold text-amber-500 uppercase tracking-widest mb-2 border-b border-slate-100 pb-1">Präteritum (ماضي بسيط)</div>
                                    <div className="flex items-start gap-2 mb-2">
                                        <button onClick={(e) => playAudio(item.praeteritum, e)} className="text-amber-600 bg-amber-50 p-1.5 rounded-lg shrink-0"><i data-lucide="volume-2" className="w-4 h-4"></i></button>
                                        <p className="text-slate-800 text-sm font-medium leading-relaxed mt-1">{item.praeteritum}</p>
                                    </div>
                                    <div className="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition-opacity"><SpeechTester targetText={item.praeteritum} /></div>
                                </div>
                                <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm relative group">
                                    <div className="text-xs font-bold text-purple-500 uppercase tracking-widest mb-2 border-b border-slate-100 pb-1">Perfekt (ماضي تام)</div>
                                    <div className="flex items-start gap-2 mb-2">
                                        <button onClick={(e) => playAudio(item.perfekt, e)} className="text-purple-600 bg-purple-50 p-1.5 rounded-lg shrink-0"><i data-lucide="volume-2" className="w-4 h-4"></i></button>
                                        <p className="text-slate-800 text-sm font-medium leading-relaxed mt-1">{item.perfekt}</p>
                                    </div>
                                    <div className="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition-opacity"><SpeechTester targetText={item.perfekt} /></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- MAIN APP ---
        const App = () => {
            const [activeTab, setActiveTab] = useState('words');
            const [learnedItems, setLearnedItems] = useState(new Set());
            const [searchTerm, setSearchTerm] = useState('');
            const [expandedReview, setExpandedReview] = useState('rev-tourismus');

            useEffect(() => {
                lucide.createIcons();
            });

            const toggleLearned = (id) => {
                const newLearned = new Set(learnedItems);
                if (newLearned.has(id)) newLearned.delete(id);
                else newLearned.add(id);
                setLearnedItems(newLearned);
            };

            const totalWords = Object.values(LEARNING_DATA.words).flat().length;
            const totalVerbs = LEARNING_DATA.verbs.length + LEARNING_DATA.irregularVerbs.length;
            const totalExp = LEARNING_DATA.expressions.length;
            const totalPrep = LEARNING_DATA.prepositions.length;
            const totalGrammar = LEARNING_DATA.grammar.length;
            const totalReview = LEARNING_DATA.review.reduce((acc, cat) => acc + cat.items.length, 0);
            
            // Calculate B2 Totals
            const totalB2 = LEARNING_DATA.b2.words.length + LEARNING_DATA.b2.expressions.length;

            const grandTotal = totalWords + totalVerbs + totalExp + totalPrep + totalGrammar + totalReview + totalB2;

            const tabConfig = {
                words: { labelEn: 'Words', labelAr: 'الأسماء والكلمات', icon: 'book-open', color: 'blue' },
                verbs: { labelEn: 'Verbs', labelAr: 'الأفعال', icon: 'activity', color: 'emerald' },
                expressions: { labelEn: 'Expressions', labelAr: 'تعبيرات', icon: 'message-circle', color: 'amber' },
                prepositions: { labelEn: 'Prepositions', labelAr: 'حروف الجر', icon: 'link', color: 'rose' },
                grammar: { labelEn: 'Grammar', labelAr: 'القواعد الشاملة', icon: 'pen-tool', color: 'purple' },
                review: { labelEn: 'Review', labelAr: 'المراجعة الشاملة', icon: 'clipboard-check', color: 'teal' },
                b2: { labelEn: 'B2 Expansion', labelAr: 'توسعة B2', icon: 'trending-up', color: 'indigo' } // NEW TAB
            };

            const activeColor = tabConfig[activeTab].color;

            return (
                <div className="h-screen flex flex-col bg-slate-50" dir="rtl">
                    {/* TOP NAVIGATION HEADER */}
                    <header className="w-full bg-slate-900 text-white shadow-xl z-50 shrink-0 relative overflow-hidden">
                        <div className={`absolute top-0 left-0 w-full h-1 bg-${activeColor}-500 transition-colors duration-500`}></div>
                        
                        <div className="flex justify-between items-center px-4 md:px-8 py-3 border-b border-slate-800">
                            <h1 className="text-xl md:text-2xl font-extrabold flex items-center gap-3 ar-text">
                                <span className={`bg-${activeColor}-500 p-2 rounded-xl transition-colors duration-500 shadow-lg`}>
                                    <i data-lucide="map" className="w-5 h-5 md:w-6 md:h-6 text-white"></i>
                                </span>
                                B1+ Spektrum (Kapitel 4)
                            </h1>

                            <div className="flex items-center gap-3" dir="ltr">
                                <div className="text-right hidden sm:block">
                                    <div className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Mastery</div>
                                    <div className={`text-sm font-extrabold text-${activeColor}-400 transition-colors`}>{grandTotal === 0 ? 0 : Math.round((learnedItems.size / grandTotal) * 100)}%</div>
                                </div>
                                <div className="relative w-10 h-10">
                                    <svg className="w-full h-full transform -rotate-90" viewBox="0 0 36 36">
                                        <path className="text-slate-800" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" strokeWidth="4" />
                                        <path className={`text-${activeColor}-500 transition-all duration-1000 ease-out`} strokeDasharray={`${grandTotal === 0 ? 0 : (learnedItems.size / grandTotal) * 100}, 100`} d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" strokeWidth="4" strokeLinecap="round" />
                                    </svg>
                                </div>
                            </div>
                        </div>

                        {/* Horizontal Navigation Tabs */}
                        <nav className="flex overflow-x-auto scrollbar-hide px-4 py-2 gap-2 snap-x">
                            {Object.entries(tabConfig).map(([key, tab]) => (
                                <button 
                                    key={key}
                                    onClick={() => { setActiveTab(key); setSearchTerm(''); }}
                                    className={`snap-center shrink-0 flex items-center gap-2 px-4 py-2.5 rounded-xl transition-all duration-300 font-bold ar-text group relative overflow-hidden ${activeTab === key ? `bg-${tab.color}-600 text-white shadow-md` : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}
                                >
                                    <i data-lucide={tab.icon} className={`w-5 h-5 ${activeTab === key ? 'text-white' : `text-${tab.color}-400 group-hover:text-${tab.color}-300`} transition-colors`}></i>
                                    <span className="text-sm whitespace-nowrap">{tab.labelAr}</span>
                                    {activeTab === key && <div className="absolute bottom-0 left-1/2 transform -translate-x-1/2 w-1/2 h-0.5 bg-white/50 rounded-t-full"></div>}
                                </button>
                            ))}
                        </nav>
                    </header>

                    {/* MAIN CONTENT AREA */}
                    <main className="flex-1 overflow-y-auto p-4 md:p-8 lg:p-12 relative" dir="ltr">
                        <div className={`fixed top-1/4 left-1/4 w-[50vw] h-[50vw] rounded-full bg-${activeColor}-200/20 blur-3xl -z-10 transition-colors duration-1000`}></div>
                        
                        <div className="max-w-7xl mx-auto">
                            
                            {activeTab !== 'grammar' && activeTab !== 'review' && (
                                <div className="flex flex-col md:flex-row gap-4 mb-10" dir="rtl">
                                    <div className="flex-1 relative group max-w-3xl mx-auto w-full">
                                        <div className={`absolute -inset-0.5 bg-gradient-to-r from-${activeColor}-400 to-${activeColor}-600 rounded-2xl blur opacity-20 group-hover:opacity-40 transition duration-500`}></div>
                                        <div className="relative">
                                            <i data-lucide="search" className="absolute right-4 top-1/2 transform -translate-y-1/2 text-slate-400 w-6 h-6"></i>
                                            <input 
                                                type="text" 
                                                placeholder="ابحث بالعربي أو الألماني..." 
                                                value={searchTerm}
                                                onChange={(e) => setSearchTerm(e.target.value)}
                                                className="w-full pr-14 pl-6 py-4 rounded-2xl border-none focus:outline-none focus:ring-4 focus:ring-blue-500/20 shadow-lg text-lg ar-text text-slate-700 font-medium"
                                            />
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'words' && <ProgressBar total={totalWords} learned={Array.from(learnedItems).filter(id => id.startsWith('w')).length} colorClass="text-blue-500" />}
                            {activeTab === 'verbs' && <ProgressBar total={totalVerbs} learned={Array.from(learnedItems).filter(id => id.startsWith('v') || id.startsWith('iv')).length} colorClass="text-emerald-500" />}
                            {activeTab === 'expressions' && <ProgressBar total={totalExp} learned={Array.from(learnedItems).filter(id => id.startsWith('e')).length} colorClass="text-amber-500" />}
                            {activeTab === 'prepositions' && <ProgressBar total={totalPrep} learned={Array.from(learnedItems).filter(id => id.startsWith('p')).length} colorClass="text-rose-500" />}
                            {activeTab === 'review' && <ProgressBar total={totalReview} learned={Array.from(learnedItems).filter(id => id.startsWith('r_')).length} colorClass="text-teal-500" />}
                            {activeTab === 'b2' && <ProgressBar total={totalB2} learned={Array.from(learnedItems).filter(id => id.startsWith('b2_')).length} colorClass="text-indigo-500" />}

                            {/* TAB: WORDS */}
                            {activeTab === 'words' && (
                                <div className="space-y-12">
                                    <section>
                                        <h2 className="text-3xl font-extrabold text-slate-800 mb-6 flex items-center gap-3 ar-text" dir="rtl"><span className="bg-blue-100 p-2 rounded-xl text-blue-600"><i data-lucide="map" className="w-6 h-6"></i></span> المدن، السياحة والمعالم (Städte & Tourismus)</h2>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-6">
                                            {LEARNING_DATA.words.tourismus.filter(w => w.ger.toLowerCase().includes(searchTerm.toLowerCase()) || w.eng.toLowerCase().includes(searchTerm.toLowerCase()) || w.ar.includes(searchTerm)).map(word => (
                                                <WordCard key={word.id} item={word} isLearned={learnedItems.has(word.id)} toggleLearned={toggleLearned} />
                                            ))}
                                        </div>
                                    </section>

                                    <section>
                                        <h2 className="text-3xl font-extrabold text-slate-800 mb-6 flex items-center gap-3 ar-text" dir="rtl"><span className="bg-blue-100 p-2 rounded-xl text-blue-600"><i data-lucide="landmark" className="w-6 h-6"></i></span> التاريخ، الثقافة والعمارة (Geschichte & Kultur)</h2>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-6">
                                            {LEARNING_DATA.words.geschichte.filter(w => w.ger.toLowerCase().includes(searchTerm.toLowerCase()) || w.eng.toLowerCase().includes(searchTerm.toLowerCase()) || w.ar.includes(searchTerm)).map(word => (
                                                <WordCard key={word.id} item={word} isLearned={learnedItems.has(word.id)} toggleLearned={toggleLearned} />
                                            ))}
                                        </div>
                                    </section>
                                    
                                    <section>
                                        <h2 className="text-3xl font-extrabold text-slate-800 mb-6 flex items-center gap-3 ar-text" dir="rtl"><span className="bg-blue-100 p-2 rounded-xl text-blue-600"><i data-lucide="flame" className="w-6 h-6"></i></span> المتاحف، الكوارث والترميم (Museen & Katastrophen)</h2>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-6">
                                            {LEARNING_DATA.words.museen_katastrophen.filter(w => w.ger.toLowerCase().includes(searchTerm.toLowerCase()) || w.eng.toLowerCase().includes(searchTerm.toLowerCase()) || w.ar.includes(searchTerm)).map(word => (
                                                <WordCard key={word.id} item={word} isLearned={learnedItems.has(word.id)} toggleLearned={toggleLearned} />
                                            ))}
                                        </div>
                                    </section>

                                    <section>
                                        <h2 className="text-3xl font-extrabold text-slate-800 mb-6 flex items-center gap-3 ar-text" dir="rtl"><span className="bg-blue-100 p-2 rounded-xl text-blue-600"><i data-lucide="star" className="w-6 h-6"></i></span> صفات، تعليم واقتصاد (Bildung, Wirtschaft & Adjektive)</h2>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-6">
                                            {LEARNING_DATA.words.bildung_adjektive.filter(w => w.ger.toLowerCase().includes(searchTerm.toLowerCase()) || w.eng.toLowerCase().includes(searchTerm.toLowerCase()) || w.ar.includes(searchTerm)).map(word => (
                                                <WordCard key={word.id} item={word} isLearned={learnedItems.has(word.id)} toggleLearned={toggleLearned} />
                                            ))}
                                        </div>
                                    </section>
                                </div>
                            )}

                            {/* TAB: VERBS */}
                            {activeTab === 'verbs' && (
                                <div>
                                    <h2 className="text-3xl font-extrabold text-slate-800 mb-8 flex items-center gap-3 ar-text" dir="rtl">
                                        <span className="bg-emerald-100 p-2 rounded-xl text-emerald-600"><i data-lucide="activity" className="w-6 h-6"></i></span>
                                        الأفعال الأساسية (السياحة والترميم)
                                    </h2>
                                    <div className="space-y-4 mb-12">
                                        {LEARNING_DATA.verbs.filter(v => v.ger.toLowerCase().includes(searchTerm.toLowerCase()) || v.eng.toLowerCase().includes(searchTerm.toLowerCase()) || v.ar.includes(searchTerm)).map(verb => (
                                            <ListRow key={verb.id} item={verb} isLearned={learnedItems.has(verb.id)} toggleLearned={toggleLearned} colorTheme="emerald" />
                                        ))}
                                    </div>

                                    <h2 className="text-3xl font-extrabold text-slate-800 mb-8 flex items-center gap-3 ar-text" dir="rtl">
                                        <span className="bg-emerald-100 p-2 rounded-xl text-emerald-600"><i data-lucide="alert-circle" className="w-6 h-6"></i></span>
                                        الأفعال الشاذة وتصريفاتها (Unregelmäßige Verben)
                                    </h2>
                                    <div className="space-y-4">
                                        {LEARNING_DATA.irregularVerbs.filter(v => v.ger.toLowerCase().includes(searchTerm.toLowerCase()) || v.eng.toLowerCase().includes(searchTerm.toLowerCase()) || v.ar.includes(searchTerm)).map(verb => (
                                            <IrregularVerbRow key={verb.id} item={verb} isLearned={learnedItems.has(verb.id)} toggleLearned={toggleLearned} />
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* TAB: EXPRESSIONS */}
                            {activeTab === 'expressions' && (
                                <div dir="rtl">
                                    <h2 className="text-3xl font-extrabold text-slate-800 mb-8 flex items-center gap-3 ar-text">
                                        <span className="bg-amber-100 p-2 rounded-xl text-amber-600"><i data-lucide="message-circle" className="w-6 h-6"></i></span>
                                        تعبيرات ومصطلحات (وصف المدن والمناقشة)
                                    </h2>
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                        {LEARNING_DATA.expressions.filter(e => e.ger.toLowerCase().includes(searchTerm.toLowerCase()) || e.eng.toLowerCase().includes(searchTerm.toLowerCase()) || e.ar.includes(searchTerm)).map(exp => (
                                            <div key={exp.id} className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm relative group hover:shadow-xl hover:border-amber-200 transition-all duration-300">
                                                <button onClick={() => toggleLearned(exp.id)} className={`absolute top-5 left-5 p-2 rounded-full transition-colors z-10 ${learnedItems.has(exp.id) ? 'bg-amber-100 text-amber-600' : 'bg-slate-50 text-slate-300 hover:bg-slate-100'}`}>
                                                    <i data-lucide="check" className="w-5 h-5"></i>
                                                </button>
                                                <span className="inline-block bg-amber-50 text-amber-600 px-3 py-1 rounded-lg text-xs font-bold mb-4 ar-text border border-amber-100">{exp.type}</span>
                                                <div className="flex items-start gap-3 mb-3" dir="ltr">
                                                    <div className="flex flex-col gap-2 shrink-0">
                                                        <button onClick={(e) => playAudio(exp.ger, e)} className="text-amber-500 bg-amber-50 p-2 rounded-xl hover:bg-amber-100 transition-colors"><i data-lucide="volume-2" className="w-5 h-5"></i></button>
                                                        <div className="bg-slate-50 rounded-full p-1"><SpeechTester targetText={exp.ger} /></div>
                                                    </div>
                                                    <div>
                                                        <h3 className="text-xl font-extrabold text-slate-800 leading-tight mt-1">"{exp.ger}"</h3>
                                                    </div>
                                                </div>
                                                
                                                <div className="bg-slate-50 rounded-2xl p-4 mt-4 border border-slate-100">
                                                    <p className="text-slate-500 font-medium text-sm mb-2" dir="ltr">{exp.eng}</p>
                                                    <p className="text-amber-700 font-extrabold text-xl mb-4 ar-text">{exp.ar}</p>
                                                    <div className="text-sm text-slate-600 flex gap-2 items-start pt-3 border-t border-slate-200">
                                                        <i data-lucide="info" className="w-5 h-5 text-amber-400 mt-0.5 shrink-0"></i>
                                                        <span className="ar-text leading-relaxed">{exp.context}</span>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* TAB: PREPOSITIONS */}
                            {activeTab === 'prepositions' && (
                                <div>
                                    <h2 className="text-3xl font-extrabold text-slate-800 mb-8 flex items-center gap-3 ar-text" dir="rtl">
                                        <span className="bg-rose-100 p-2 rounded-xl text-rose-600"><i data-lucide="link" className="w-6 h-6"></i></span> 
                                        حروف الجر وارتباطاتها (Präpositionen)
                                    </h2>
                                    <div className="space-y-4">
                                        {LEARNING_DATA.prepositions.filter(p => p.ger.toLowerCase().includes(searchTerm.toLowerCase()) || p.eng.toLowerCase().includes(searchTerm.toLowerCase()) || p.ar.includes(searchTerm)).map(prep => (
                                            <ListRow key={prep.id} item={prep} isLearned={learnedItems.has(prep.id)} toggleLearned={toggleLearned} colorTheme="rose" />
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* TAB: GRAMMAR */}
                            {activeTab === 'grammar' && (
                                <div dir="rtl">
                                    <div className="bg-gradient-to-br from-purple-700 to-indigo-800 text-white p-10 rounded-3xl shadow-xl mb-10 relative overflow-hidden">
                                        <i data-lucide="pen-tool" className="absolute -right-4 -bottom-4 w-48 h-48 text-white opacity-10 transform rotate-12"></i>
                                        <div className="relative z-10">
                                            <h2 className="text-4xl font-extrabold mb-3 ar-text">القواعد النحوية الشاملة (B1+)</h2>
                                            <p className="text-purple-200 ar-text text-lg max-w-2xl">ملخص لأهم قواعد Kapitel 4: الجمل الموصولة، صفات المدن، حروف الجر المكانية، واسم الفاعل كصفة.</p>
                                        </div>
                                    </div>

                                    <div className="grid gap-8">
                                        {LEARNING_DATA.grammar.map((gram, idx) => (
                                            <div key={idx} className="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden hover:shadow-lg transition-shadow">
                                                <div className="p-8 border-b border-slate-50 bg-slate-50/50 flex items-start gap-4">
                                                    <div className="bg-purple-100 p-3 rounded-2xl text-purple-600 shrink-0 mt-1">
                                                        <i data-lucide="braces" className="w-6 h-6"></i>
                                                    </div>
                                                    <div>
                                                        <h3 className="text-2xl font-extrabold text-slate-800 ar-text mb-2">{gram.title}</h3>
                                                        <p className="text-base text-slate-600 ar-text leading-relaxed">{gram.desc}</p>
                                                    </div>
                                                </div>
                                                
                                                <div className="p-8">
                                                    <div className="bg-slate-900 text-purple-300 font-mono text-base p-5 rounded-2xl mb-8 shadow-inner flex items-center gap-3 overflow-x-auto border border-slate-800" dir="ltr">
                                                        <i data-lucide="code" className="text-slate-500 w-5 h-5 shrink-0"></i> {gram.structure}
                                                    </div>

                                                    {gram.table && (
                                                        <div className="mb-8 overflow-x-auto rounded-2xl border border-purple-200 shadow-sm" dir="ltr">
                                                            <table className="w-full text-left border-collapse">
                                                                <thead>
                                                                    <tr className="bg-purple-100 text-purple-800 text-sm tracking-wider">
                                                                        {gram.table.headers.map((h, i) => (
                                                                            <th key={i} className="p-4 font-bold border-b border-purple-200">{h}</th>
                                                                        ))}
                                                                    </tr>
                                                                </thead>
                                                                <tbody>
                                                                    {gram.table.rows.map((row, rIdx) => (
                                                                        <tr key={rIdx} className={rIdx % 2 === 0 ? "bg-white" : "bg-purple-50/50"}>
                                                                            {row.map((cell, cIdx) => (
                                                                                <td key={cIdx} className={`p-4 border-b border-purple-100 ${cIdx === 0 ? 'font-bold text-slate-700' : 'text-slate-600'} ${['denen', 'dessen', 'deren'].includes(cell) ? 'text-rose-600 font-bold' : ''}`}>
                                                                                    {cell}
                                                                                </td>
                                                                            ))}
                                                                        </tr>
                                                                    ))}
                                                                </tbody>
                                                            </table>
