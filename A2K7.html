    <script type="text/babel">
        // --- HELPERS FOR AUDIO & SPEECH ---
        const playAudio = (text, e) => {
            if (e) e.stopPropagation();
            const cleanText = text.replace(/<[^>]+>/g, '');
            const utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.lang = 'de-DE';
            window.speechSynthesis.speak(utterance);
        };

        const SpeechTester = ({ targetText }) => {
            const [status, setStatus] = React.useState('idle');
            const [heard, setHeard] = React.useState('');

            const listen = (e) => {
                if (e) e.stopPropagation();
                if (!('webkitSpeechRecognition' in window)) {
                    alert('المتصفح ده مش بيدعم تسجيل الصوت، جرب Google Chrome.');
                    return;
                }
                const recognition = new webkitSpeechRecognition();
                recognition.lang = 'de-DE';
                recognition.interimResults = false;

                recognition.onstart = () => setStatus('listening');
                recognition.onresult = (event) => {
                    const speechResult = event.results[0][0].transcript;
                    setHeard(speechResult);

                    const clean = (str) => str.replace(/<[^>]+>/g, '').toLowerCase().replace(/[.,!?:]/g, '').trim();
                    const targetClean = clean(targetText);
                    const heardClean = clean(speechResult);

                    if (heardClean.includes(targetClean) || targetClean.includes(heardClean) || heardClean === targetClean) {
                        setStatus('success');
                    } else {
                        setStatus('fail');
                    }
                };
                recognition.onerror = () => setStatus('fail');
                recognition.onend = () => { if (status === 'listening') setStatus('idle'); };
                recognition.start();
            };

            return (
                <div className="inline-flex items-center gap-2" onClick={(e) => e.stopPropagation()}>
                    <button onClick={listen} title="جرب تنطقها" className={`p-2 rounded-full transition-all duration-300 shadow-sm ${status === 'listening' ? 'bg-red-500 text-white animate-pulse scale-110' : 'bg-slate-100 text-slate-600 hover:bg-slate-200 hover:scale-105'}`}>
                        <i data-lucide="mic" className="w-4 h-4"></i>
                    </button>
                    {status === 'success' && <span className="text-emerald-500 text-xs font-bold ar-text animate-bounce">✅ ممتاز!</span>}
                    {status === 'fail' && <span className="text-red-500 text-xs ar-text font-bold" title={`سمعت: ${heard}`}>❌ جرب تاني</span>}
                </div>
            );
        };

            expressions: [
                { id: 'e1', type: "Interview: Sprachen", ger: "Welche Fremdsprache sprechen Sie am besten?", eng: "Which foreign language do you speak best?", ar: "أي لغة أجنبية تتحدثها بأفضل شكل؟", context: "للسؤال عن مهارات اللغة." },
                { id: 'e2', type: "Interview: Sprachen", ger: "Ich lerne Deutsch aus beruflichen Gründen.", eng: "I am learning German for professional reasons.", ar: "أتعلم الألمانية لأسباب مهنية.", context: "لتوضيح سبب تعلم اللغة للعمل." },
                { id: 'e3', type: "Diskussion", ger: "Kann man eine Sprache wieder vergessen?", eng: "Can one forget a language again?", ar: "هل يمكن للمرء نسيان لغة مرة أخرى؟", context: "طرح سؤال للنقاش حول الحفاظ على اللغة." },
                { id: 'e4', type: "Diskussion", ger: "Das führt zur nächsten Frage.", eng: "That leads to the next question.", ar: "هذا يقود للسؤال التالي.", context: "للانتقال لنقطة أخرى في النقاش." },
                { id: 'e5', type: "Interview: Urlaub", ger: "Wohin fahren Sie am liebsten in den Urlaub?", eng: "Where do you most like to go on vacation?", ar: "إلى أين تفضل الذهاب في الإجازة؟", context: "سؤال شخص عن وجهته المفضلة." },
                { id: 'e6', type: "Interview: Urlaub", ger: "Ich möchte mich erholen und am Pool liegen.", eng: "I want to relax and lie by the pool.", ar: "أريد أن أرتاح وأستلقي على المسبح.", context: "للتعبير عن الرغبة في الاسترخاء." },
                { id: 'e7', type: "Diskussion: Urlaub", ger: "Auf gar keinen Fall!", eng: "Absolutely not!", ar: "مستحيل! / على الإطلاق!", context: "للرفض القاطع لشيء ما." },
                { id: 'e8', type: "Diskussion: Urlaub", ger: "Das ist doch total langweilig!", eng: "But that is totally boring!", ar: "ولكن هذا ممل تماماً!", context: "للتعبير عن الضجر من فكرة." },
                { id: 'e9', type: "Interview: Verkehr", ger: "Mit welchen Verkehrsmitteln reisen Sie normalerweise?", eng: "Which means of transport do you normally travel with?", ar: "بأي وسيلة مواصلات تسافر عادة؟", context: "للسؤال عن وسيلة النقل المفضلة." },
                { id: 'e10', type: "Problem: Verkehr", ger: "Leider stehe ich wegen eines Unfalls im Stau.", eng: "Unfortunately I am stuck in traffic due to an accident.", ar: "للأسف أنا عالق في الزحام بسبب حادث.", context: "للاعتذار عن التأخير بسبب المرور." },
                { id: 'e11', type: "Durchsage: Flughafen", ger: "Bitte lassen Sie Ihr Gepäck nicht unbeaufsichtigt.", eng: "Please do not leave your luggage unattended.", ar: "رجاءً لا تترك أمتعتك بدون رقابة.", context: "تحذير أمني في المطار أو محطة القطار." },
                { id: 'e12', type: "Leben", ger: "Ich habe mich in eine deutsche Frau verliebt.", eng: "I have fallen in love with a German woman.", ar: "لقد وقعت في حب امرأة ألمانية.", context: "للتعبير عن سبب شخصي لتعلم اللغة." }
            ],
            dialogues: [
                {
                    id: 'd1', title: "Diskussion: Sprachen lernen (نقاش: تعلم اللغات)", icon: "users",
                    lines: [
                        { speaker: "Alex", text: "Okay, fangen wir mit der ersten Frage an. Wie viele Fremdsprachen kann man eurer Meinung nach lernen?", en: "Okay, let's start with the first question. In your opinion, how many foreign languages can one learn?", ar: "حسناً، لنبدأ بالسؤال الأول. برأيكم كم عدد اللغات الأجنبية التي يمكن للمرء تعلمها؟" },
                        { speaker: "Ben", text: "Ich glaube, es gibt keine wirkliche Grenze. Manche Leute, die Polyglotten, sprechen zehn oder mehr Sprachen.", en: "I believe there's no real limit. Some people, the polyglots, speak ten or more languages.", ar: "أعتقد أنه لا يوجد حد حقيقي. بعض الناس (متعددي اللغات) يتحدثون عشر لغات أو أكثر." },
                        { speaker: "Clara", text: "Theoretisch ja, aber praktisch braucht man sehr viel Zeit und Disziplin. Für die meisten Leute sind zwei oder drei schon eine große Leistung.", en: "Theoretically yes, but practically you need a lot of time and discipline. For most people, two or three is already a great achievement.", ar: "نظرياً نعم، لكن عملياً تحتاج الكثير من الوقت والانضباط. بالنسبة لمعظم الناس، لغتين أو تلاتة ده إنجاز كبير." },
                        { speaker: "Alex", text: "Das stimmt. Und wie viele Sprachen sollte man sprechen? Und welche?", en: "That's true. And how many languages should one speak? And which ones?", ar: "هذا صحيح. وكم لغة يجب أن يتحدثها المرء؟ وأيها؟" },
                        { speaker: "Ben", text: "Ich denke, heutzutage sollte jeder mindestens zwei sprechen: die eigene Muttersprache und Englisch.", en: "I think nowadays everyone should speak at least two: their own native language and English.", ar: "أعتقد أن هذه الأيام يجب على الجميع التحدث بلغتين على الأقل: اللغة الأم والإنجليزية." },
                        { speaker: "Clara", text: "Das führt zur nächsten Frage: Kann man eine Sprache wieder vergessen? Ich würde sagen, ja, absolut.", en: "That leads to the next question: Can one forget a language again? I would say, yes, absolutely.", ar: "هذا يقود للسؤال التالي: هل يمكن نسيان لغة مرة أخرى؟ أقول نعم، بالتأكيد." },
                        { speaker: "Ben", text: "Stimmt. Ich habe in der Schule Französisch gelernt, aber ich habe fast alles wieder vergessen, weil ich es nie benutze.", en: "Agreed. I learned French in school, but I have forgotten almost everything because I never use it.", ar: "صحيح. تعلمت الفرنسية في المدرسة لكنني نسيت تقريباً كل شيء لأنني لا أستخدمها أبداً." },
                        { speaker: "Alex", text: "Was kann man also tun, um Vokabeln nicht zu vergessen? Die Vorschläge sind ja regelmäßiges Wiederholen und viel sprechen.", en: "So what can one do to not forget vocabulary? The suggestions are regular review and speaking a lot.", ar: "إذاً ماذا يمكن للمرء أن يفعل لكي لا ينسى الكلمات؟ المقترحات هي المراجعة المنتظمة والتحدث كثيراً." },
                        { speaker: "Clara", text: "Genau. Man muss die Sprache aktiv benutzen. Zeitung lesen, Filme schauen, sich einfach in der Freizeit damit beschäftigen.", en: "Exactly. You have to actively use the language. Read the newspaper, watch films, simply engage with it in your free time.", ar: "بالضبط. يجب استخدام اللغة بنشاط. قراءة الجريدة، مشاهدة الأفلام، ببساطة الانشغال بها في وقت الفراغ." },
                        { speaker: "Ben", text: "Es geht also wirklich nur um die ständige Anwendung. Wenn man aufhört, vergisst man es.", en: "So it's really all about constant use. If you stop, you forget it.", ar: "إذاً الأمر يتعلق حقاً بالتطبيق المستمر. إذا توقفت، ستنسى." }
                    ]
                },
                {
                    id: 'd2', title: "Urlaubsplanung (التخطيط للإجازة)", icon: "map",
                    lines: [
                        { speaker: "Hans", text: "Liebling, wir müssen langsam unseren Urlaub planen. Die Reisen werden immer teurer.", en: "Darling, we need to start planning our vacation soon. Travel is getting more and more expensive.", ar: "حبيبتي، لازم نبدأ نخطط لإجازتنا. السفر بيغلى كل شوية." },
                        { speaker: "Eva", text: "Gut, wenn du willst.", en: "Fine, if you want.", ar: "ماشي، زي ما تحب." },
                        { speaker: "Hans", text: "Also, wohin fahren wir in diesem Sommer? Wieder nach Griechenland?", en: "So, where are we going this summer? To Greece again?", ar: "طب، هنسافر فين الصيف ده؟ لليونان تاني؟" },
                        { speaker: "Eva", text: "Nein, Schatz, in Griechenland ist es immer so warm. Ich möchte lieber nach Kanada fahren.", en: "No, honey, it's always so hot in Greece. I would rather go to Canada.", ar: "لا يا حبيبي، اليونان دايماً حر أوي. أنا أفضل أروح كندا." },
                        { speaker: "Hans", text: "Nach Kanada? Was willst du in Kanada machen? Bären beobachten?", en: "To Canada? What do you want to do in Canada? Watch bears?", ar: "كندا؟ عايزة تعملي إيه في كندا؟ تتفرجي على الدببة؟" },
                        { speaker: "Eva", text: "Nein, aber wir können uns dort ein Auto mieten und das Land entdecken. In Kanada gibt es tolle Wälder, Seen und interessante Städte. Ich nehme meine neue Angel mit und wir können angeln gehen! Das wird ein richtiger Abenteuerurlaub!", en: "No, but we can rent a car there and discover the country. In Canada, there are great forests, lakes, and interesting cities. I'll take my new fishing rod and we can go fishing! It will be a real adventure vacation!", ar: "لا، بس ممكن نأجر عربية هناك ونستكشف البلد. في كندا فيه غابات رائعة، وبحيرات ومدن ممتعة. هاخد صنارتي الجديدة وممكن نروح نصطاد! دي هتبقى إجازة مغامرات بجد!" },
                        { speaker: "Hans", text: "Auf gar keinen Fall! Erstens ist Kanada viel zu weit weg, der Flug dauert viel zu lange und es ist dort viel zu kalt. Zweitens möchte ich im Urlaub nicht mit dem Auto fahren, nicht in den Wald gehen und auch nicht angeln!", en: "Absolutely not! First, Canada is way too far away, the flight takes way too long, and it's much too cold there. Second, I don't want to drive a car on vacation, go into the forest, or go fishing!", ar: "مستحيل! أولاً كندا بعيدة جداً، والطيران بياخد وقت طويل جداً وهناك الجو برد جداً. ثانياً أنا مش عايز أسوق عربية في الإجازة ولا أروح الغابة ولا حتى أصطاد سمك!" },
                        { speaker: "Eva", text: "Was möchtest du denn dann machen, Hans?", en: "Then what do you want to do, Hans?", ar: "أومال عايز تعمل إيه يا هانس؟" },
                        { speaker: "Hans", text: "Ich möchte in einem schönen Hotel wohnen, am Pool liegen, einen Krimi lesen und in guten Restaurants essen. Ich möchte mich erholen!", en: "I want to stay in a nice hotel, lie by the pool, read a crime novel, and eat in good restaurants. I want to relax!", ar: "أنا عايز أقعد في فندق حلو، وأستلقي على المسبح، وأقرأ رواية بوليسية وآكل في مطاعم كويسة. أنا عايز أرتاح!" },
                        { speaker: "Eva", text: "Das ist doch total langweilig!", en: "But that is totally boring!", ar: "بس ده ملل جداً!" },
                        { speaker: "Hans", text: "Immer, wenn ich etwas mag, findest du das langweilig! Ich möchte auf jeden Fall in ein warmes Land fahren.", en: "Whenever I like something, you find it boring! I definitely want to go to a warm country.", ar: "دايماً لما أحب حاجة، تشوفيها مملة! أنا أكيد عايز أروح بلد دافية." },
                        { speaker: "Eva", text: "Dann fahren wir nach Portugal: Dort gibt es gute Wanderwege, es ist warm und wir können in einem schönen Hotel wohnen.", en: "Then let's go to Portugal: There are good hiking trails there, it's warm, and we can stay in a nice hotel.", ar: "خلاص نروح البرتغال: هناك في مسارات مشي كويسة، والجو دافي وممكن نقعد في فندق حلو." },
                        { speaker: "Hans", text: "Na gut, Liebling. Portugal ist eine gute Alternative. Aber wandern musst du alleine. Ich gehe an den Strand und lese meine Bücher.", en: "Alright, darling. Portugal is a good alternative. But you'll have to go hiking alone. I'll go to the beach and read my books.", ar: "ماشي يا حبيبتي. البرتغال بديل كويس. بس هتمشي إنتي لوحدك. أنا هروح الشاطئ وأقرأ كتبي." },
                        { speaker: "Eva", text: "Ich fahre doch nicht mit dir in den Urlaub und gehe dort alleine wandern! Dann sollten wir vielleicht besser zu Hause bleiben. Im Sommer ist es auch in Deutschland warm, ich gehe wandern und du liest deine Bücher. Und das Beste dabei ist: Der Urlaub kostet nichts.", en: "I'm not going on vacation with you just to go hiking alone there! Then maybe we should just stay home. In the summer it's also warm in Germany, I'll go hiking and you'll read your books. And the best part is: The vacation costs nothing.", ar: "أنا مش هسافر معاك الإجازة عشان أمشي لوحدي هناك! يبقى الأحسن نفضل في البيت. في الصيف الجو بيكون دافي في ألمانيا برضه، أنا أمشي وإنت تقرأ كتبك. والأحسن من ده كله: الإجازة مش هتكلف حاجة." },
                        { speaker: "Hans", text: "Zu Hause bleiben ist doch kein Urlaub! ... Dann gehe ich lieber mit dir in Portugal wandern.", en: "Staying at home is not a vacation! ... Then I'd rather go hiking with you in Portugal.", ar: "القعدة في البيت مش إجازة! ... خلاص أفضل أروح معاكي نمشي في البرتغال." }
                    ]
                },
                {
                    id: 'd3', title: "Interview: Urlaub (مقابلة: أسئلة عن الإجازة)", icon: "mic",
                    lines: [
                        { speaker: "Reporter", text: "Wohin fahren Sie am liebsten in den Urlaub?", en: "Where do you most like to go on vacation?", ar: "إلى أين تفضل الذهاب في الإجازة أكثر شيء؟" },
                        { speaker: "Befragter", text: "Ich fahre am liebsten ans Meer, besonders hier in Ägypten an die Nordküste.", en: "I most like to go to the sea, especially here in Egypt to the North Coast.", ar: "أفضل الذهاب إلى البحر، خصوصاً هنا في مصر إلى الساحل الشمالي." },
                        { speaker: "Reporter", text: "Mit welchen Verkehrsmitteln reisen Sie normalerweise?", en: "Which means of transport do you normally travel with?", ar: "بأي وسيلة مواصلات تسافر عادة؟" },

                        { speaker: "Reporter", text: "Was möchten Sie im Urlaub gerne machen?", en: "What would you like to do on vacation?", ar: "ماذا تحب أن تفعل في الإجازة؟" },

                        { speaker: "Ben", text: "Das stimmt, aber die Tickets sind oft teuer. Mit dem Auto ist man flexibler und kann abfahren, wann man will.", en: "That's true, but the tickets are often expensive. With the car, one is more flexible and can depart whenever one wants.", ar: "صح، بس التذاكر غالباً غالية. بالعربية الواحد بيكون مرن أكتر ويقدر يسافر وقت ما يحب." },

                        { g: "Ich möchte mich mit ihrer Familie und Freunden auf Deutsch unterhalten. Später wollen wir vielleicht in Berlin leben.", e: "I would like to converse with her family and friends in German. Later we might want to live in Berlin.", a: "أود التحدث مع عائلتها وأصدقائها بالألمانية. لاحقاً ربما نريد العيش في برلين." },
                        { g: "<b>Beatrice:</b> Ich bin Beatrice aus Frankreich und wohne in Brüssel. Ich arbeite bei einer europäischen Organisation und muss drei Amtssprachen sprechen.", e: "<b>Beatrice:</b> I am Beatrice from France and live in Brussels. I work for a European organization and have to speak three official languages.", a: "<b>بياتريس:</b> أنا بياتريس من فرنسا وأعيش في بروكسل. أعمل في منظمة أوروبية ويجب أن أتحدث 3 لغات رسمية." },
                        { g: "Meine Muttersprache ist Französisch, ich spreche Englisch und lerne jetzt Deutsch. Leider habe ich mein Schuldeutsch fast alles wieder vergessen.", e: "My native language is French, I speak English and am now learning German. Unfortunately I forgot almost all my school German.", a: "لغتي الأم هي الفرنسية، وأتحدث الإنجليزية والآن أتعلم الألمانية. للأسف نسيت تقريباً كل ألمانيتي المدرسية." },
                        { g: "<b>Sofia:</b> Ich bin Sofia, wohne in Santiago de Chile und arbeite als Übersetzerin. Meine Muttersprache ist Spanisch. Französisch und Englisch spreche ich fließend.", e: "<b>Sofia:</b> I am Sofia, live in Santiago de Chile and work as a translator. My native language is Spanish. I speak French and English fluently.", a: "<b>صوفيا:</b> أنا صوفيا، أعيش في سانتياغو، تشيلي وأعمل كمترجمة. لغتي الأم الإسبانية. أتحدث الفرنسية والإنجليزية بطلاقة." },
                        { g: "Wenn ich jetzt noch Deutsch lerne, habe ich bessere Chancen auf dem Arbeitsmarkt. Dann kann ich auch für deutsche Firmen übersetzen.", e: "If I learn German now, I will have better chances on the job market. Then I can also translate for German companies.", a: "إذا تعلمت الألمانية الآن، ستكون لي فرص أفضل في سوق العمل. وحينها يمكنني الترجمة لشركات ألمانية." }
                    ]
                },
                {
                    id: 'c2', title: "Ein Sprachgenie (عبقري اللغات)",
                    lines: [
                        { g: "Ein Sonderauftrag bei der Europäischen Kommission: Jemand muss dringend 'vertrauliche' Dokumente aus dem Hebräischen und Aserbaidschanischen übersetzen.", e: "A special assignment at the European Commission: Someone must urgently translate 'confidential' documents from Hebrew and Azerbaijani.", a: "مهمة خاصة في المفوضية الأوروبية: شخص ما يجب أن يترجم بشكل عاجل وثائق سرية من العبرية والأذربيجانية." },
                        { g: "Den Auftrag übernimmt Ioannis Ikonomou. Er ist Grieche, arbeitet als Übersetzer bei der Europäischen Kommission und spricht 32 Sprachen.", e: "Ioannis Ikonomou takes on the assignment. He is Greek, works as a translator for the European Commission, and speaks 32 languages.", a: "يوانيس إيكونومو يتولى المهمة. هو يوناني ويعمل كمترجم في المفوضية الأوروبية ويتحدث 32 لغة." },
                        { g: "Das gibt es nicht so oft auf der Welt. Schon als Kind interessierte sich Ioannis für Sprachen.", e: "That is not very common in the world. Even as a child, Ioannis was interested in languages.", a: "هذا ليس شائعاً جداً في العالم. منذ طفولته كان يوانيس مهتماً باللغات." },
                        { g: "Auf der Insel Kreta hörte er die ersten fremden Worte von Touristen und wollte sie unbedingt verstehen.", e: "On the island of Crete, he heard the first foreign words from tourists and wanted to understand them at all costs.", a: "على جزيرة كريت، سمع الكلمات الأجنبية الأولى من السياح وأراد فهمها بأي ثمن." },
                        { g: "Mit fünf Jahren lernte er Englisch, mit sieben Jahren Deutsch, danach Italienisch. Es folgten Russisch, Suaheli und Türkisch.", e: "At age five he learned English, at age seven German, then Italian. Russian, Swahili, and Turkish followed.", a: "في الخامسة تعلم الإنجليزية، وفي السابعة الألمانية، ثم الإيطالية. وتبعها الروسية، والسواحلية، والتركية." },
                        { g: "Später reiste er in fremde Länder. Besonders fasziniert war er von Indien und den Sprachen Urdu, Hindi und Sanskrit.", e: "Later, he traveled to foreign countries. He was particularly fascinated by India and the languages Urdu, Hindi, and Sanskrit.", a: "لاحقاً، سافر إلى دول أجنبية. كان مفتوناً بشكل خاص بالهند ولغات الأوردو والهندية والسنسكريتية." },
                        { g: "Heute spricht Ioannis 21 von insgesamt 24 Amtssprachen der EU.", e: "Today, Ioannis speaks 21 of the total of 24 official EU languages.", a: "اليوم يوانيس يتحدث 21 من إجمالي 24 لغة رسمية في الاتحاد الأوروبي." },
                        { g: "Für Irisch und Maltesisch hatte er keine Zeit, Litauisch hat er wieder vergessen.", e: "He had no time for Irish and Maltese; he has forgotten Lithuanian again.", a: "لم يكن لديه وقت للأيرلندية والمالطية، وقد نسي الليتوانية مرة أخرى." },
                        { g: "Damit er die anderen Sprachen nicht ebenfalls vergisst, beschäftigt er sich in seiner Freizeit intensiv mit Sprachen, am liebsten nachts vor dem Computer.", e: "So that he doesn't forget the other languages as well, he occupies himself intensively with languages in his free time, preferably at night in front of the computer.", a: "لكي لا ينسى اللغات الأخرى أيضاً، ينشغل بكثافة في وقت فراغه باللغات، ويفضل ذلك ليلاً أمام الكمبيوتر." },
                        { g: "Dann sieht er auf dem PC chinesisches oder ungarisches Fernsehen. Oder er chattet stundenlang auf Russisch, Türkisch oder Bulgarisch.", e: "Then he watches Chinese or Hungarian television on the PC. Or he chats for hours in Russian, Turkish, or Bulgarian.", a: "حينها يشاهد التلفزيون الصيني أو المجري على الكمبيوتر. أو يدردش لساعات بالروسية أو التركية أو البلغارية." },
                        { g: "Normalerweise geht er um vier Uhr morgens ins Bett und schläft vier bis fünf Stunden.", e: "Normally, he goes to bed at four in the morning and sleeps for four to five hours.", a: "عادة يذهب للسرير في الرابعة صباحاً وينام من 4 لـ 5 ساعات." },
                        { g: "Jetzt will er Albanisch lernen, denn das Land ist EU-Beitrittskandidat geworden. Nach drei Monaten möchte er die Nachrichten des albanischen Rundfunks verstehen.", e: "Now he wants to learn Albanian, because the country has become an EU accession candidate. After three months, he wants to understand the news on Albanian radio.", a: "الآن يريد تعلم الألبانية، لأن البلد أصبح مرشحاً للانضمام للاتحاد الأوروبي. بعد 3 أشهر يريد أن يفهم أخبار الإذاعة الألبانية." },
                        { g: "Natürlich ist Ioannis eine Ausnahme. Er ist ein Sprachgenie. Für normale Menschen bleiben solche Fähigkeiten ein Traum.", e: "Of course, Ioannis is an exception. He is a language genius. For normal people, such abilities remain a dream.", a: "بالطبع يوانيس هو حالة استثنائية. هو عبقري لغات. بالنسبة للأشخاص العاديين، تظل هذه القدرات حلماً." },
                        { g: "Doch für die EU ist es wichtig, dass alle Bürger Sprachen lernen.", e: "But for the EU, it is important that all citizens learn languages.", a: "لكن بالنسبة للاتحاد الأوروبي، من المهم أن يتعلم جميع المواطنين اللغات." },
                        { g: "Das Ziel der europäischen Sprachenpolitik ist, dass jeder EU-Bürger drei Sprachen spricht: die eigene Muttersprache, die Sprache eines Nachbarlandes und eine internationale Sprache (z. B. Englisch).", e: "The goal of the European language policy is that every EU citizen speaks three languages: their own native language, the language of a neighboring country, and an international language (e.g., English).", a: "الهدف من سياسة اللغات الأوروبية هو أن يتحدث كل مواطن أوروبي ثلاث لغات: لغته الأم، لغة بلد مجاور، ولغة دولية (مثل الإنجليزية)." },
                        { g: "Nach Meinung der Europäischen Kommission können die EU-Bürger mit guten Fremdsprachenkenntnissen ihre Chancen auf dem Arbeitsmarkt verbessern.", e: "In the opinion of the European Commission, EU citizens with good foreign language skills can improve their chances on the job market.", a: "في رأي المفوضية الأوروبية، يمكن للمواطنين الأوروبيين ذوي المهارات الجيدة في اللغات الأجنبية تحسين فرصهم في سوق العمل." }
                    ]
                },
                {
                    id: 'c3', title: "Tipps zum Sprachenlernen (نصائح لتعلم اللغات والتوصيات)",
                    lines: [
                        { g: "1. Hören Sie deutschsprachige Musik. Rhythmus und Melodie helfen beim Lernen der neuen Sprache.", e: "1. Listen to German-language music. Rhythm and melody help with learning the new language.", a: "1. اسمع موسيقى ألمانية. الإيقاع واللحن بيساعدوا في تعلم اللغة الجديدة." },
                        { g: "2. Sehen Sie Filme oder Nachrichten auf Deutsch, damit Sie Ihren Wortschatz verbessern.", e: "2. Watch films or news in German so that you improve your vocabulary.", a: "2. اتفرج على أفلام أو أخبار بالألماني عشان تحسن حصيلتك اللغوية." },
                        { g: "3. Lernen Sie Wörter in Wortgruppen oder Sätzen. So kann man sich neue Wörter besser merken.", e: "3. Learn words in word groups or sentences. That way you can remember new words better.", a: "3. اتعلم الكلمات في مجموعات أو جمل. كده تقدر تحفظ الكلمات الجديدة أحسن." },
                        { g: "4. Nutzen Sie das Internet. Suchen Sie nach Informationen auf Deutsch. Lesen Sie Texte über interessante Themen, das ist motivierend.", e: "4. Use the internet. Search for information in German. Read texts about interesting topics, that is motivating.", a: "4. استخدم الإنترنت. ابحث عن معلومات بالألماني. اقرأ نصوص عن مواضيع شيقة، ده بيحفزك." },
                        { g: "5. Sprechen Sie so oft wie möglich Deutsch. Haben Sie keine Angst vor Fehlern.", e: "5. Speak German as often as possible. Don't be afraid of mistakes.", a: "5. اتكلم ألماني على قد ما تقدر. متخافش من الأخطاء." },
                        { g: "6. Lernen Sie wichtige Wendungen für den Alltag, dann können Sie besser kommunizieren.", e: "6. Learn important phrases for everyday life, then you can communicate better.", a: "6. اتعلم عبارات مهمة للحياة اليومية، ساعتها هتقدر تتواصل أحسن." },
                        { g: "7. Beschäftigen Sie sich jeden Tag mit der Fremdsprache. Wiederholen Sie die neuen Wörter, damit Sie die Vokabeln nicht wieder vergessen.", e: "7. Engage with the foreign language every day. Repeat the new words so that you don't forget the vocabulary again.", a: "7. انشغل باللغة كل يوم. كرر الكلمات الجديدة عشان متنساش المفردات تاني." },
                        { g: "8. Lesen Sie viel. Lesen ist ein Schlüssel zum Erlernen einer neuen Sprache.", e: "8. Read a lot. Reading is a key to learning a new language.", a: "8. اقرأ كتير. القراءة هي مفتاح لتعلم لغة جديدة." },
                        { g: "9. Finden Sie Ihren persönlichen Lernstil. Lernen Sie lieber in der Gruppe oder alleine? Sprechen, lesen, hören oder schreiben Sie lieber?", e: "9. Find your personal learning style. Do you prefer to learn in a group or alone? Do you prefer speaking, reading, listening, or writing?", a: "9. لاقي أسلوب تعلمك الشخصي. بتفضل تتعلم في مجموعة ولا لوحدك؟ بتفضل التكلم، القراءة، السمع ولا الكتابة؟" },
                        { g: "<b>Empfehlungen (توصيات):</b>", e: "<b>Recommendations:</b>", a: "<b>توصيات:</b>" },
                        { g: "Du solltest so oft wie möglich Deutsch sprechen und keine Angst vor Fehlern haben.", e: "You should speak German as often as possible and not be afraid of mistakes.", a: "يجب عليك التحدث بالألمانية قدر الإمكان وألا تخاف من الأخطاء." },
                        { g: "Ihr solltet viele deutsche Filme sehen und Bücher lesen, um euren Wortschatz zu verbessern.", e: "You (plural) should watch many German films and read books to improve your vocabulary.", a: "يجب عليكم مشاهدة أفلام ألمانية كثيرة وقراءة كتب لتحسين حصيلتكم اللغوية." },
                        { g: "Man sollte neue Wörter immer in Sätzen lernen, damit man sie sich besser merken kann.", e: "One should always learn new words in sentences so that one can remember them better.", a: "يجب على المرء دائماً تعلم الكلمات الجديدة في جمل لكي يستطيع تذكرها بشكل أفضل." },
                        { g: "Sie sollten sich jeden Tag mit der Sprache beschäftigen, auch wenn es nur für 15 Minuten ist.", e: "You (formal) should engage with the language every day, even if it's only for 15 minutes.", a: "يجب على حضرتك الانشغال باللغة كل يوم، حتى ولو لـ 15 دقيقة فقط." }
                    ]
                },
                {
                    id: 'c4', title: "Die beliebtesten Verkehrsmittel (وسائل المواصلات الأشهر للإجازة)",
                    lines: [
                        { g: "Für ihre Reisen benutzen 47,7 % der deutschen Urlauber das Flugzeug.", e: "For their travels, 47.7% of German vacationers use the airplane.", a: "لسفرهم، 47.7% من المصطافين الألمان يستخدمون الطائرة." },
                        { g: "25,9 % fliegen mit einer Chartergesellschaft (z. B. Thomas Cook), 21,8 % buchen einen Linienflug (z. B. bei der Lufthansa).", e: "25.9% fly with a charter company (e.g., Thomas Cook), 21.8% book a scheduled flight (e.g., with Lufthansa).", a: "25.9% يطيرون مع شركة طيران عارض، و 21.8% يحجزون رحلة منتظمة (مثل لوفتهانزا)." },
                        { g: "Damit belegt das Flugzeug den ersten Platz und bleibt das beliebteste Verkehrsmittel für Urlaubsreisen.", e: "With that, the airplane takes first place and remains the most popular means of transport for vacation travel.", a: "بذلك تحتل الطائرة المركز الأول وتظل وسيلة المواصلات الأكثر شعبية لرحلات الإجازة." },
                        { g: "Das Auto liegt mit 40,7 % auf Platz zwei. Im letzten Jahr war der Anteil des Autos noch bei über 45 %.", e: "The car is in second place with 40.7%. Last year, the share for cars was still over 45%.", a: "السيارة في المركز الثاني بنسبة 40.7%. العام الماضي كانت النسبة للسيارة لا تزال فوق الـ 45%." },
                        { g: "Das bedeutet, dass immer mehr Menschen das Auto stehen lassen und lieber in den Urlaub fliegen.", e: "This means that more and more people are leaving the car behind and prefer to fly on vacation.", a: "هذا يعني أن المزيد والمزيد من الناس يتركون سياراتهم ويفضلون الطيران في الإجازة." },
                        { g: "Bus und Bahn spielen mit etwa 7 % und 6 % für Urlaubsreisen keine große Rolle.", e: "Bus and train, with about 7% and 6%, do not play a major role for vacation travel.", a: "الحافلات والقطارات بنسبة حوالي 7% و 6% لا تلعب دوراً كبيراً لرحلات الإجازات." },
                        { g: "<b>Zusammenfassung (مخلص المقال):</b> In dem Text steht, dass das Flugzeug mit 47,7 % das beliebteste Verkehrsmittel der Deutschen für den Urlaub ist.", e: "<b>Summary:</b> The text says that the airplane, with 47.7%, is the most popular means of transport for Germans for their vacation.", a: "<b>ملخص المقال:</b> في النص مكتوب أن الطائرة بنسبة 47.7% هي وسيلة النقل الأحب للألمان في الإجازة." },
                        { g: "Das Auto liegt mit 40,7 % auf dem zweiten Platz, verliert aber an Beliebtheit. Bus und Bahn spielen für Urlaubsreisen nur eine kleine Rolle.", e: "The car is in second place with 40.7%, but is losing popularity. Bus and train only play a small role for vacation travel.", a: "السيارة في المركز الثاني بـ 40.7% لكنها تفقد شعبيتها. الأتوبيس والقطار يلعبان دوراً صغيراً فقط." }
                    ]
                },
                {
                    id: 'c5', title: "Verkehrsdurchsagen (إعلانات ونداءات المواصلات)",
                    lines: [
                        { g: "<b>1. Flughafen:</b> Achtung: Sicherheitshinweis. Bitte lassen Sie Ihr Gepäck nicht unbeaufsichtigt.", e: "<b>1. Airport:</b> Attention: Security notice. Please do not leave your luggage unattended.", a: "<b>1. المطار:</b> انتباه: إشعار أمني. يرجى عدم ترك أمتعتكم دون رقابة." },
                        { g: "Melden Sie alle allein stehende Gepäckstücke und Gegenstände dem Sicherheitspersonal.", e: "Please report all unattended pieces of luggage and objects to the security personnel.", a: "يرجى الإبلاغ عن أي حقائب أو أشياء متروكة لأفراد الأمن." },
                        { g: "<b>2. Gate-Änderung:</b> Achtung: Es gibt eine Gate-Änderung für den Flug LH 5263 nach Rom. Bitte gehen Sie zu Flugsteig A24.", e: "<b>2. Gate Change:</b> Attention: There is a gate change for flight LH 5263 to Rome. Please go to gate A24.", a: "<b>2. تغيير البوابة:</b> انتباه: يوجد تغيير في البوابة للرحلة LH 5263 إلى روما. يرجى التوجه إلى بوابة A24." },
                        { g: "Fluggäste nach Rom, bitte zu Flugsteig A24.", e: "Passengers to Rome, please to gate A24.", a: "المسافرون إلى روما، الرجاء التوجه לבوابة A24." },
                        { g: "<b>3. Zugausfall:</b> Sehr geehrte Reisende, leider kann der Zug nicht nach Erfurt weiterfahren. Durch den Sturm liegen zahlreiche Bäume auf den Gleisen.", e: "<b>3. Train cancellation:</b> Dear travelers, unfortunately the train cannot continue to Erfurt. Due to the storm, numerous trees are lying on the tracks.", a: "<b>3. إلغاء قطار:</b> أعزائي المسافرين، للأسف القطار لا يمكنه المتابعة إلى إرفورت. بسبب العاصفة توجد أشجار عديدة على القضبان." },
                        { g: "Bitte steigen Sie hier aus. Sie können zur Weiterfahrt nach Erfurt die Ersatzbusse der Deutschen Bahn benutzen. Die Busse stehen am Ausgang des Bahnhofs für Sie bereit.", e: "Please disembark here. For your onward journey to Erfurt, you can use the replacement buses from Deutsche Bahn. The buses are ready for you at the station exit.", a: "يرجى النزول هنا. للمتابعة إلى إرفورت يمكنكم استخدام الحافلات البديلة لشركة دويتشه بان. الحافلات جاهزة لكم عند مخرج المحطة." },
                        { g: "<b>4. Anschlusszüge:</b> Wir erreichen in Kürze Leipzig Hauptbahnhof. Es gibt folgende Anschlusszüge: Intercity nach Frankfurt, Abfahrt 12.34 Uhr von Gleis 4 ...", e: "<b>4. Connecting trains:</b> We will shortly be arriving at Leipzig Central Station. There are the following connecting trains: Intercity to Frankfurt, departure 12:34 from platform 4 ...", a: "<b>4. قطارات المتابعة:</b> سنصل قريباً لمحطة لايبزيغ الرئيسية. توجد قطارات المتابعة التالية: إنترسيتي إلى فرانكفورت، المغادرة 12.34 من رصيف 4 ..." },
                        { g: "... Intercity nach Hamburg, Abfahrt 12.38 Uhr von Gleis 8, Regionalexpress nach Dresden, Abfahrt 12.42 Uhr von Gleis 14.", e: "... Intercity to Hamburg, departure 12:38 from platform 8, Regionalexpress to Dresden, departure 12:42 from platform 14.", a: "... إنترسيتي إلى هامبورغ، المغادرة 12.38 من رصيف 8، والقطار الإقليمي إلى دريسدن، المغادرة 12.42 من رصيف 14." },
                        { g: "Der Intercity nach München, planmäßige Abfahrtszeit 12.43 Uhr, hat voraussichtlich 30 Minuten Verspätung.", e: "The Intercity to Munich, scheduled departure time 12:43, is expected to have a 30-minute delay.", a: "قطار الإنترسيتي إلى ميونخ، وقت المغادرة المجدول 12.43، من المتوقع أن يتأخر 30 دقيقة." },
                        { g: "<b>5. Fußballspiel:</b> Hier ist eine Information für die Besucher des Fußballländerspiels Deutschland gegen Italien. Am Bahnhofsausgang Südseite stehen kostenlose Sonderbusse zum Stadion bereit.", e: "<b>5. Football match:</b> Here is some information for the visitors of the international football match Germany versus Italy. At the south side of the station exit, free special buses to the stadium are available.", a: "<b>5. مباراة كرة قدم:</b> هنا معلومة لزوار المباراة الدولية ألمانيا ضد إيطاليا. عند مخرج المحطة الجنوبي تتوفر حافلات خاصة مجانية للاستاد." },
                        { g: "Sie können auch mit den Straßenbahnen 8 und 15 Richtung Grünau fahren. Steigen Sie an der Haltestelle Sportforum aus. Die Haltestelle der Straßenbahn befindet sich am Ausgang Süd.", e: "You can also take trams 8 and 15 in the direction of Grünau. Get off at the 'Sportforum' stop. The tram stop is located at the south exit.", a: "يمكنكم أيضاً ركوب الترام 8 و 15 باتجاه جروناو. انزلوا في محطة سبورتفورم. محطة الترام تقع عند المخرج الجنوبي." }
                    ]
                },
                {
                    id: 'c6', title: "Landschaft und Natur: Was kann man wo machen? (أنشطة في الطبيعة)",
                    lines: [
                        { g: "<b>1. Im Wald</b> kann man wandern, spazieren gehen oder Pilze suchen.", e: "<b>1. In the forest</b> one can hike, go for a walk, or look for mushrooms.", a: "<b>1. في الغابة</b> يمكن للمرء التنزه، المشي، أو البحث عن الفطر." },
                        { g: "<b>2. Auf einer Wiese</b> kann man Blumen pflücken, spazieren gehen oder ein Picknick machen.", e: "<b>2. On a meadow</b> one can pick flowers, go for a walk, or have a picnic.", a: "<b>2. في مرج</b> يمكن قطف الزهور، المشي، أو عمل نزهة (بيكنيك)." },
                        { g: "<b>3. Im Park</b> kann man spazieren gehen oder ein Picknick machen.", e: "<b>3. In the park</b> one can go for a walk or have a picnic.", a: "<b>3. في الحديقة العامة</b> يمكن المشي أو عمل نزهة." },
                        { g: "<b>4. Im Gebirge</b> kann man wandern, Ski fahren oder auf einen Berg steigen und klettern.", e: "<b>4. In the mountains</b> one can hike, ski, or climb and scale a mountain.", a: "<b>4. في الجبال</b> يمكن التنزه، التزلج، أو الصعود على جبل والتسلق." },

                        { g: "--- 3. An eine Kollegin (Anna) ---", e: "--- 3. To a colleague (Anna) ---", a: "--- 3. لزميلة (آنا) ---" },

                {

                        { g: "--- Karte von Rügen (Deutschland) ---", e: "--- Postcard from Rügen (Germany) ---", a: "--- بطاقة من روجن (ألمانيا) ---" },
                        { g: "Liebe Petra, ganz liebe Grüße von der Insel Rügen senden dir Alex und Sandra.", e: "Dear Petra, Alex and Sandra send you very warm greetings from the island of Rügen.", a: "عزيزتي بترا، أليكس وساندرا يرسلان لك أحر التحيات من جزيرة روجن." },
                        { g: "Wir sind diesen Sommer in Deutschland geblieben und machen Urlaub auf der größten deutschen Insel. Sie heißt Insel Rügen und liegt in der Ostsee.", e: "We stayed in Germany this summer and are vacationing on the largest German island. It is called the island of Rügen and is located in the Baltic Sea.", a: "بقينا في ألمانيا هذا الصيف ونقضي الإجازة في أكبر جزيرة ألمانية. اسمها روجن وتقع في بحر البلطيق." },
                        { g: "Es gibt hier wunderbare Strände, viel Wald und den berühmten Nationalpark Jasmund mit dem Wahrzeichen von Rügen, den Kreidefelsen.", e: "There are wonderful beaches here, lots of forest, and the famous Jasmund National Park with Rügen's landmark, the chalk cliffs.", a: "يوجد هنا شواطئ رائعة، غابات كثيرة، وحديقة جاسموند الوطنية بصخورها الطباشيرية، وهي رمز روجن." },
                        { g: "Wir wohnen in einem schönen Hotel in Binz und haben ein großes Zimmer mit Blick auf das Meer. Man kann die Insel mit dem Fahrrad, zu Fuß oder mit dem Segelboot erkunden.", e: "We are staying in a beautiful hotel in Binz and have a large room with a view of the sea. One can explore the island by bike, on foot, or with a sailboat.", a: "نقيم في فندق جميل في بينتس وغرفتنا تطل على البحر. يمكن استكشاف الجزيرة بالدراجة، سيراً، أو بمركب شراعي." },
                        { g: "Gestern haben wir einen langen Strandspaziergang gemacht. Morgen besuchen wir den Ort Sassnitz. Dort gibt es einen Hafen.", e: "Yesterday we took a long walk on the beach. Tomorrow we will visit the town of Sassnitz. There is a harbor there.", a: "أمس تمشينا طويلاً على الشاطئ. غداً سنزور بلدة ساسنيتس، حيث يوجد ميناء." },
                        { g: "Von hier kann man mit der Fähre nach Dänemark und Schweden fahren. Vielleicht machen wir mal einen kurzen Ausflug nach Dänemark.", e: "From here one can take the ferry to Denmark and Sweden. Maybe we will take a short trip to Denmark.", a: "من هنا يمكن ركوب العبّارة للدنمارك والسويد. ربما نقوم برحلة قصيرة للدنمارك." },
                        { g: "Dann schreiben wir dir noch eine Karte und bringen dir ein kleines Geschenk aus Dänemark mit. Bis bald", e: "Then we will write you another card and bring you a small gift from Denmark. See you soon", a: "حينها سنكتب لك بطاقة أخرى ونحضر لك هدية صغيرة من الدنمارك. أراك قريباً" },
                        { g: "--- Karte aus Ägypten ---", e: "--- Postcard from Egypt ---", a: "--- بطاقة من مصر ---" },
                        { g: "Lieber Leo, viele sonnige Grüße aus Ägypten sendet dir Gemini.", e: "Dear Leo, Gemini sends you many sunny greetings from Egypt.", a: "عزيزي ليو، جيميناي يرسل لك تحيات مشمسة من مصر." },
                        { g: "Ich mache diesen Herbst eine Reise hierher und entdecke die alte Geschichte des Landes.", e: "I am taking a trip here this autumn and discovering the country's ancient history.", a: "أقوم برحلة إلى هنا هذا الخريف وأستكشف التاريخ القديم للبلد." },
                        { g: "Ich wohne in einem tollen Hotel in Kairo, nicht weit vom Nil. Gestern habe ich die beeindruckenden Pyramiden von Gizeh besucht.", e: "I am staying in a great hotel in Cairo, not far from the Nile. Yesterday I visited the impressive Pyramids of Giza.", a: "أقيم في فندق رائع في القاهرة، ليس بعيداً عن النيل. البارحة زرت أهرامات الجيزة المذهلة." },
                        { g: "Morgen mache ich eine Bootsfahrt auf dem Nil und besuche ein Museum.", e: "Tomorrow I am taking a boat trip on the Nile and visiting a museum.", a: "غداً سأقوم برحلة بالقارب في النيل وأزور متحفاً." },
                        { g: "Das Wetter ist herrlich warm und das Essen ist sehr lecker. Bis bald, Dein Gemini", e: "The weather is wonderfully warm and the food is very delicious. See you soon, Your Gemini", a: "الطقس دافئ ورائع والطعام لذيذ جداً. أراك قريباً، المخلص جيميناي" }
                    ]

            grammar: [
                {
                    title: "1. Nebensätze mit „damit“ (جمل جانبية لبيان الغرض)",
                    desc: "نستخدم كلمة (damit) لبيان الهدف أو الغرض. وتجيب على سؤال Wozu? / Mit welchem Ziel? (لأي غرض؟). جملة damit هي جملة جانبية (Nebensatz)، أي أن الفعل المُصرّف يأتي في نهاية الجملة. يمكن أن تأتي قبل أو بعد الجملة الرئيسية.",
                    structure: "Hauptsatz, damit ... Subjekt ... Verb (am Ende).",
                    examples: [
                        { category: "Ziel / الغرض", g: "Ich lese jeden Tag „Le Monde“, <span class='text-purple-600 font-bold'>damit</span> ich mein Französisch nicht <span class='text-purple-600 font-bold'>vergesse</span>.", e: "I read 'Le Monde' every day so that I do not forget my French.", a: "أقرأ جريدة لوموند كل يوم لكي لا أنسى لغتي الفرنسية." },
                        { category: "Ziel / الغرض", g: "Max besucht einen Sprachkurs, <span class='text-purple-600 font-bold'>damit</span> er mit anderen Leuten zusammen lernen <span class='text-purple-600 font-bold'>kann</span>.", e: "Max is attending a language course so that he can learn together with other people.", a: "ماكس يحضر دورة لغة لكي يستطيع التعلم مع أشخاص آخرين معاً." },
                        { category: "Ziel / الغرض", g: "Claudia fährt oft nach China, <span class='text-purple-600 font-bold'>damit</span> sie das Land besser <span class='text-purple-600 font-bold'>kennenlernt</span>.", e: "Claudia often travels to China so that she can get to know the country better.", a: "كلاوديا تسافر غالباً للصين لكي تتعرف على البلد بشكل أفضل." },
                        { category: "Ziel / الغرض", g: "Man muss mehrere Fremdsprachen sprechen, <span class='text-purple-600 font-bold'>damit</span> man gute Chancen auf dem Arbeitsmarkt <span class='text-purple-600 font-bold'>hat</span>.", e: "One must speak several foreign languages so that one has good chances on the job market.", a: "يجب على المرء أن يتحدث لغات أجنبية عدة لكي يحصل على فرص جيدة في سوق العمل." },
                        { category: "Ziel / الغرض", g: "Frau Müller benutzt ein Wörterbuch, <span class='text-purple-600 font-bold'>damit</span> sie die richtigen Wörter <span class='text-purple-600 font-bold'>findet</span>.", e: "Mrs. Müller uses a dictionary so that she finds the right words.", a: "السيدة مولر تستخدم قاموساً لكي تجد الكلمات الصحيحة." },
                        { category: "Ziel / الغرض", g: "Claudia lernt jetzt Italienisch, <span class='text-purple-600 font-bold'>damit</span> sie mit den Kollegen besser <span class='text-purple-600 font-bold'>kommunizieren kann</span>.", e: "Claudia is learning Italian now so that she can communicate better with her colleagues.", a: "كلاوديا تتعلم الإيطالية الآن لكي تستطيع التواصل بشكل أفضل مع زملائها." },
                        { category: "Ziel / الغرض", g: "Dr. Weber hält seinen Vortrag auf Englisch, <span class='text-purple-600 font-bold'>damit</span> alle den Inhalt <span class='text-purple-600 font-bold'>verstehen</span>.", e: "Dr. Weber is giving his presentation in English so that everyone understands the content.", a: "الدكتور فيبر يلقي محاضرته بالإنجليزية لكي يفهم الجميع المحتوى." }
                    ]
                },
                {
                    title: "2. Redemittel: Verkehrsmittel (تعبيرات لمقارنة المواصلات)",
                    desc: "عند مناقشة وسائل المواصلات ومقارنتها، نستخدم مصطلحات معينة للتعبير عن المزايا والعيوب.",
                    type: "verkehr_table" // Trigger for specific UI
                }
            ]
        };

        const { useState, useEffect } = React;

        // --- HELPER FOR ARTICLES COLORING ---
        const colorizeArticles = (text) => {
            if (!text) return text;
            const regex = /(der |die |das )/gi;
            const parts = text.split(regex);
            return parts.map((part, i) => {
                const lower = part.toLowerCase();
                if (lower === 'der ') return <span key={i} className="text-blue-500 font-extrabold">{part}</span>;
                if (lower === 'die ') return <span key={i} className="text-rose-500 font-extrabold">{part}</span>;
                if (lower === 'das ') return <span key={i} className="text-emerald-500 font-extrabold">{part}</span>;
                return <span key={i}>{part}</span>;
            });
        };

        // --- COMPONENTS ---
        const ProgressBar = ({ total, learned, colorClass }) => {
            const percentage = total === 0 ? 0 : Math.round((learned / total) * 100);
            return (
                <div className="glass-panel p-5 rounded-2xl mb-8 flex items-center justify-between transition-all" dir="rtl">
                    <div>
                        <h3 className="text-sm font-bold text-slate-500 uppercase tracking-wider ar-text mb-1">مستوى التقدم</h3>

                            <path className={`${colorClass} transition-all duration-1000 ease-out`} strokeDasharray={`${percentage}, 100`} d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" />
                        </svg>
                        <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-sm font-bold text-slate-700">
                            {percentage}%

                    </div>
                </div>
            );
        };

        const WordCard = ({ item, isLearned, toggleLearned }) => {

                        <div className="absolute w-full h-full backface-hidden bg-white border border-slate-100 rounded-2xl p-5 flex flex-col cursor-pointer hover:shadow-lg transition-shadow"

                                    </div>
                                </div>
                                <div className="mt-4 space-y-1">
                                    <p className="text-slate-500 font-medium text-sm">{item.eng}</p>
                                    <p className="text-orange-600 font-bold ar-text text-lg" dir="rtl">{item.ar}</p>
                                </div>
                            </div>

                            <div className="text-center text-xs text-slate-400 font-medium flex items-center justify-center gap-1 ar-text mt-2 shrink-0">
                                <i data-lucide="rotate-cw" className="w-3 h-3"></i> اضغط للأمثلة
                            </div>
                        </div>

                        {/* BACK */}
                        <div className="absolute w-full h-full backface-hidden bg-gradient-to-br from-orange-500 to-amber-600 text-white rounded-2xl p-5 shadow-lg flex flex-col cursor-pointer overflow-hidden"

                            <div className="mb-3 border-b border-white/20 pb-2 flex justify-between items-center shrink-0" dir="rtl">

                                                <span className="leading-relaxed" dangerouslySetInnerHTML={{ __html: sentence.g }}></span>

                                        </li>
                                    ))}
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const IrregularVerbRow = ({ item, isLearned, toggleLearned }) => {
            const [expanded, setExpanded] = useState(false);

            return (

                                <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm relative group">

                                    </div>
                                    <div className="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition-opacity"><SpeechTester targetText={item.praeteritum} /></div>
                                </div>
                                <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm relative group">
                                    <div className="text-xs font-bold text-purple-500 uppercase tracking-widest mb-2 border-b border-slate-100 pb-1">Perfekt (ماضي تام)</div>
                                    <div className="flex items-start gap-2 mb-2">
                                        <button onClick={(e) => playAudio(item.perfekt, e)} className="text-purple-600 bg-purple-50 p-1.5 rounded-lg shrink-0"><i data-lucide="volume-2" className="w-4 h-4"></i></button>
