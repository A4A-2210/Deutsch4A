            { level: "B1", category: "Genus-Hack: DIE", german: "Feminin: -heit, -keit, -ung", english: "Feminine noun endings", arabic: "نهايات الأسماء المؤنثة (Die)", examples: [{ ger: "Die Sicherheit, die Möglichkeit, die Ausbildung.", en: "Security, possibility, education.", ar: "الأمان، الإمكانية، التعليم." }, { ger: "Auch -schaft, -ion, -tät, -ur sind feminin.", en: "Also -schaft, -ion, -tät, -ur are feminine.", ar: "كمان النهايات دي مؤنثة دايماً." }, { ger: "Die Natur, die Universität, die Information.", en: "Nature, university, information.", ar: "الطبيعة، الجامعة، المعلومة." }] },
            { level: "B1", category: "Genus-Hack: DER", german: "Maskulin: -ant, -ent, -ismus", english: "Masculine noun endings", arabic: "نهايات الأسماء المذكرة (Der)", examples: [{ ger: "Der Praktikant, der Student, der Kapitalismus.", en: "The intern, the student, capitalism.", ar: "المتدرب، الطالب، الرأسمالية." }, { ger: "Auch -ist und -or sind meist maskulin.", en: "Also -ist and -or are mostly masculine.", ar: "كمان النهايات دي مذكرة." }, { ger: "Der Journalist, der Motor.", en: "The journalist, the engine.", ar: "الصحفي، الموتور." }] },
            { level: "B1", category: "Genus-Hack: DAS", german: "Neutral: -chen, -ment, Infinitiv", english: "Neuter noun endings", arabic: "نهايات الأسماء المحايدة (Das)", examples: [{ ger: "Das Mädchen, das Dokument, das Erlernen.", en: "The girl, the document, the learning.", ar: "البنت، المستند، التعلم (تحويل الفعل لاسم)." }, { ger: "Auch -lein und -um sind neutral.", en: "Also -lein and -um are neutral.", ar: "كمان النهايات دي محايدة." }, { ger: "Das Datum, das Fräulein.", en: "The date, the young lady.", ar: "التاريخ، الآنسة." }] }
        ];

        // ================= EXAM DATA STRUCTURE (CHEAT SHEET) =================
        const getVocab = (term) => vocabData.find(v => v.german === term) || {};
        const getConj = (term) => conjugationData.find(c => c.infinitive === term) || {};
        const getWendung = (term) => wendungenData.find(w => w.german === term) || {};
        const getColloc = (term) => collocationsData.find(c => c.german === term) || {};
        const getTrap = (term) => grammarTrapsData.find(t => t.german === term) || {};
        const getLebenslauf = (term) => lebenslaufData.find(l => l.german === term) || {};

        const examSections = [
            {
                id: 'T1',
                title: '🧠 T1: Rätsel: Lernen',
                desc: 'حل فوازير الكلمات عن طريق استنتاج الاسم من المعنى.',
                items: [
                    { q: 'GE... (Dort werden Informationen gespeichert.)', cardData: getVocab('das Gedächtnis') , type: 'vocab' },
                    { q: 'FO... (So etwas gibt es in der Chemie.)', cardData: { ...getVocab('die Formel'), german: "die Formel", english: "Formula", arabic: "معادلة", examples: [{ger: "Die Formel ist schwer zu lernen.", en: "The formula is hard to learn.", ar: "المعادلة صعب تتحفظ."}]} , type: 'vocab' },
                    { q: 'EIN... (Man sollte direkt davor lernen.)', cardData: { ...getVocab('das Einschlafen'), german: "das Einschlafen", english: "Falling asleep", arabic: "الاستغراق في النوم", examples: [{ger: "Lernen vor dem Einschlafen ist effektiv.", en: "Learning before falling asleep is effective.", ar: "المذاكرة قبل النوم فعالة."}]} , type: 'vocab' },
                    { q: 'ER... (Gedanke an etwas Vergangenes)', cardData: { ...getVocab('die Erinnerung'), german: "die Erinnerung", english: "Memory / recollection", arabic: "ذكرى", examples: [{ger: "Ich habe eine gute Erinnerung daran.", en: "I have a good memory of it.", ar: "عندي ذكرى كويسة لده."}]} , type: 'vocab' },
                    { q: 'AUF... (Das braucht man, wenn man lernen will.)', cardData: { ...getTrap('-heit, -keit, -ung'), german: "die Aufmerksamkeit", english: "Attention", arabic: "التركيز/الانتباه", examples: [{ger: "Aufmerksamkeit ist sehr wichtig.", en: "Attention is very important.", ar: "التركيز مهم جداً."}]} , type: 'trap' },
                    { q: 'LER... (Das hat man, wenn man fleißig lernt.)', cardData: { ...getVocab('der Lernerfolg'), german: "der Lernerfolg", english: "Learning success", arabic: "نجاح التعلم", examples: [{ger: "Bestmögliche Lernerfolge erzielen.", en: "Achieve best possible learning successes.", ar: "يحقق أحسن نتايج تعلم."}]} , type: 'vocab' }
                ]
            },
            {
                id: 'T2',
                title: '📧 T2: Bitte um Informationen',
                desc: 'إكمال الإيميل الرسمي الخاص بطلب معلومات عن كورس باستخدام الروابط والمصطلحات الصحيحة.',
                items: [
                    { q: 'ich lerne __________ drei Jahren Italienisch...', cardData: { ...getVocab('seit'), german: "seit (+ Dativ)", english: "for / since (ongoing)", arabic: "منذ / بقالي (لحدث مستمر)", examples: [{ger: "Ich lerne seit drei Jahren Italienisch.", en: "I have been learning Italian for three years.", ar: "أنا بتعلم إيطالي بقالي تلات سنين."}]} , type: 'vocab' },
                    { q: '...und suche einen Kurs für __________ Lerner.', cardData: getVocab('fortgeschritten') , type: 'vocab' },
                    { q: '...und habe regelmäßigen __________ zu italienischen Kunden.', cardData: getColloc('Kontakt haben zu') , type: 'collocation' },
                    { q: '__________ mit den Kunden besser kommunizieren zu können...', cardData: getWendung('um ... zu') , type: 'wendung' },
                    { q: 'Haben Sie so etwas __________ Angebot?', cardData: getWendung('Haben Sie so etwas im Angebot?') , type: 'wendung' },
                    { q: '__________ Sie mich bitte außerdem über alternative Kurse informieren?', cardData: getWendung('Könnten / Würden Sie...') , type: 'wendung' },
                    { q: 'Bekomme ich eine __________, weil ich schon...', cardData: getVocab('die Ermäßigung') , type: 'vocab' },
                    { q: '...an zwei Kursen __________ habe?', cardData: { ...getConj('teilnehmen'), infinitive: "teilnehmen", praesens: "nimmt teil", praeteritum: "nahm teil", perfekt: "hat teilgenommen", arabic: "يشارك", examples: [{ger: "Ich habe an zwei Kursen teilgenommen.", en: "I participated in two courses.", ar: "أنا شاركت في كورسين."}]} , type: 'conjugation' }
                ]
            },
            {
                id: 'T3',
                title: '🔗 T3: Satzverbindungen',
                desc: 'ربط الجمل باستخدام (um...zu, deshalb, denn) ومكان الفعل في الجملة.',
                items: [
                    { q: 'Paul sich weiterbilden | Karriere machen (um...zu)', cardData: getWendung('um ... zu') , type: 'wendung' },
                    { q: 'die Schule wenig Geld haben | die Unterrichtsräume schlecht ausgestattet sein (deshalb)', cardData: getWendung('deshalb / deswegen / darum') , type: 'wendung' },
                    { q: 'Marie gute Noten bekommen | sie jeden Tag zwei Stunden lernen (denn)', cardData: getWendung('denn') , type: 'wendung' }
                ]
            }
        ];
        
        function getPrep(term) {
             return prepVerbsData.find(p => p.german === term) || {};
        }

        // ================= HELPER COMPONENT (LEVEL BADGE) =================
        const LevelBadge = ({ level }) => {
            if (!level) return null;
            const colors = {
                'A1': 'bg-emerald-100 text-emerald-800 border-emerald-300',
                'A2': 'bg-blue-100 text-blue-800 border-blue-300',
                'B1': 'bg-rose-100 text-rose-800 border-rose-300',
                'B2': 'bg-purple-100 text-purple-800 border-purple-300'
            };
            const colorClass = colors[level] || 'bg-slate-100 text-slate-800 border-slate-300';
            return (
                <span className={`absolute top-6 right-6 text-xs font-black uppercase tracking-widest px-3 py-1.5 rounded-full shadow-sm border ${colorClass}`}>
                    {level}
                </span>
            );
        };

        // ================= ICONS =================
        const VolumeIcon = ({ size = 20 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>;
        const MicIcon = ({ size = 20 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" x2="12" y1="19" y2="22"></line></svg>;
        const FlipIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>;

        // ================= COMPONENTS =================
        const BaseFlashcard = ({ frontContent, backHeaderContent, examples, targetGerman, cardColor = "bg-white", backColor = "bg-slate-800" }) => {
            const [isFlipped, setIsFlipped] = useState(false);
            const [listeningId, setListeningId] = useState(null);
            const [feedback, setFeedback] = useState(null);

            const handleTTS = (e, text) => {
                e.stopPropagation();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'de-DE';
                window.speechSynthesis.speak(utterance);
            };

            const cleanString = (str) => {
                return str.toLowerCase().replace(/[\(\)\.\,\/\-\+\!\?]/g, '').trim();
            };

            const handleSTT = (e, targetText, id) => {
                e.stopPropagation();
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                
                if (!SpeechRecognition) {
                    alert("المتصفح بتاعك مش بيدعم التعرف على الصوت، جرب تستخدم Google Chrome.");
                    return;
                }

                const recognition = new SpeechRecognition();
                recognition.lang = 'de-DE';
                recognition.interimResults = false;
                recognition.maxAlternatives = 1;

                recognition.onstart = () => { setListeningId(id); setFeedback(null); };
                recognition.onresult = (event) => {
                    const transcript = event.results[0][0].transcript;
                    const cleanTranscript = cleanString(transcript);
                    const cleanTarget = cleanString(targetText);
                    if (cleanTarget.includes(cleanTranscript) || cleanTranscript.includes(cleanTarget)) {
                        setFeedback({ id, type: 'success', msg: `عاش! نطقت صح: "${transcript}"` });
                    } else {
                        setFeedback({ id, type: 'error', msg: `حاول تاني، انت قولت: "${transcript}"` });
                    }
                };
                recognition.onerror = (event) => { setFeedback({ id, type: 'error', msg: `مشكلة في المايك: ${event.error}` }); setListeningId(null); };
                recognition.onend = () => { setListeningId(null); };
                recognition.start();
            };

            return (
                <div className="w-full h-[34rem] cursor-pointer perspective-1000" onClick={() => setIsFlipped(!isFlipped)}>
                    <div className={`flashcard-inner relative w-full h-full text-center rounded-3xl shadow-lg transition-transform duration-700 ${isFlipped ? 'rotate-y-180' : ''}`}>
                        
                        <div className={`absolute w-full h-full border-2 border-slate-700/20 rounded-3xl flex flex-col justify-center items-center p-6 backface-hidden shadow-xl ${cardColor}`}>
                            {frontContent}
                            <div className="absolute bottom-6 right-6 flex space-x-3">
                                <button onClick={(e) => handleTTS(e, targetGerman)} className="p-3 bg-slate-900/10 text-slate-800 rounded-full hover:bg-slate-900/20 shadow-sm transition-transform hover:scale-105" title="اسمع النطق"><VolumeIcon size={24} /></button>
                                <button onClick={(e) => handleSTT(e, targetGerman, 'main')} className={`p-3 rounded-full shadow-md transition-transform hover:scale-105 text-white ${listeningId === 'main' ? 'bg-red-500 pulse-animation' : 'bg-blue-600 hover:bg-blue-700'}`} title="درب نطقك"><MicIcon size={24} /></button>
                            </div>
                            <div className="absolute bottom-6 left-6 text-slate-500 flex items-center space-x-1 font-bold bg-black/5 px-4 py-2 rounded-full">
                                <FlipIcon /> <span className="text-sm">Tap to Flip</span>
                            </div>
                            {feedback?.id === 'main' && !isFlipped && (
                                <div className={`absolute bottom-20 left-1/2 transform -translate-x-1/2 text-sm px-4 py-2 rounded-full shadow-lg font-bold w-max ${feedback.type === 'success' ? 'bg-green-100 text-green-800 border-2 border-green-500' : 'bg-red-100 text-red-800 border-2 border-red-500'}`}>{feedback.msg}</div>
                            )}
                        </div>

                        <div className={`absolute w-full h-full text-white rounded-3xl flex flex-col items-center p-6 backface-hidden rotate-y-180 ${backColor} shadow-2xl`}>
                            <div className="w-full flex-shrink-0 mb-4 border-b border-white/20 pb-4">
                                {backHeaderContent}
                            </div>
                            <div className="w-full flex-1 overflow-y-auto custom-scrollbar pr-2 space-y-3" onClick={(e) => e.stopPropagation()}>
                                <h4 className="text-xs uppercase tracking-widest text-slate-400 font-black mb-2 text-left bg-black/20 px-3 py-1 rounded inline-block">In-Context Examples:</h4>
                                {examples && examples.map((ex, idx) => {
                                    const exId = `ex-${idx}`;
                                    const isListeningEx = listeningId === exId;
                                    const exFeedback = feedback?.id === exId ? feedback : null;
                                    
                                    return (
                                        <div key={idx} className="bg-slate-800/80 p-5 rounded-2xl border border-slate-600/50 flex flex-col gap-2 hover:bg-slate-700 transition-colors shadow-inner">
                                            <p className="text-lg font-black text-white text-left leading-snug">{ex.ger}</p>
                                            <p className="text-sm font-semibold text-emerald-300 text-left leading-snug">{ex.en}</p>
                                            <p className="text-base text-blue-200 text-right font-bold mt-1" dir="rtl">{ex.ar}</p>
                                            <div className="flex justify-between items-center mt-2 border-t border-slate-600/30 pt-3">
                                                <div className="flex-1">
                                                    {exFeedback && (
                                                        <span className={`text-xs px-3 py-1.5 rounded-full font-bold shadow-sm ${exFeedback.type === 'success' ? 'bg-green-500 text-green-50' : 'bg-red-500 text-red-50'}`}>
                                                            {exFeedback.msg}
                                                        </span>
                                                    )}
                                                </div>
                                                <div className="flex space-x-2">
                                                    <button onClick={(e) => handleTTS(e, ex.ger)} className="p-2 bg-slate-600 text-white rounded-full hover:bg-slate-500 transition-colors shadow-sm" title="اسمع الجملة"><VolumeIcon size={16} /></button>
                                                    <button onClick={(e) => handleSTT(e, ex.ger, exId)} className={`p-2 rounded-full transition-colors text-white shadow-sm ${isListeningEx ? 'bg-red-500 pulse-animation' : 'bg-blue-500 hover:bg-blue-400'}`} title="جرب تنطقها"><MicIcon size={16} /></button>
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const VocabCard = ({ data }) => {
            return <BaseFlashcard 
                frontContent={<><LevelBadge level={data.level} /><span className="absolute top-6 left-6 text-sm font-black text-slate-500 uppercase tracking-wide bg-slate-200/50 px-4 py-1.5 rounded-full shadow-sm">{data.category}</span><h3 className="text-4xl font-black text-slate-800 mb-2 mt-4 drop-shadow-sm px-4">{data.german}</h3></>} 
                backHeaderContent={<><p className="text-xl font-bold mb-2 text-center text-blue-200">{data.english}</p><p className="text-3xl font-black text-center text-white leading-tight drop-shadow-md" dir="rtl">{data.arabic}</p></>} 
                examples={data.examples} targetGerman={data.german} backColor="bg-slate-900" cardColor="bg-slate-50" 
            />;
        };

        const PrepCard = ({ data }) => {
            const isAkk = data.case === "Akkusativ";
            return <BaseFlashcard 
                frontContent={<><LevelBadge level={data.level} /><h3 className="text-4xl font-black text-slate-800 tracking-tight drop-shadow-sm px-4">{data.german}</h3><p className="text-sm text-slate-500 mt-4 font-black uppercase tracking-widest bg-slate-200/50 px-5 py-2 rounded-full shadow-inner">Verb + Präposition</p></>} 
                backHeaderContent={<><h4 className={`text-2xl font-black uppercase tracking-widest mb-2 pb-2 border-b-2 border-white/10 ${isAkk ? 'text-rose-400' : (data.case === 'Reflexiv' ? 'text-fuchsia-400' : 'text-cyan-400')}`}>+ {data.case}</h4><p className="text-lg font-bold text-center text-slate-300">{data.english}</p><p className="text-2xl font-black text-center text-white mt-1 drop-shadow-md" dir="rtl">{data.arabic}</p></>} 
                examples={data.examples} targetGerman={data.german} backColor="bg-slate-950" cardColor="bg-slate-100" 
            />;
        };

        const ConjugationCard = ({ data }) => {
            return <BaseFlashcard 
                frontContent={<><LevelBadge level={data.level} /><span className="absolute top-6 left-6 text-sm font-black text-emerald-800 uppercase tracking-wide bg-emerald-200/50 px-4 py-1.5 rounded-full shadow-sm border border-emerald-300">Infinitive</span><h3 className="text-5xl font-black text-emerald-950 mb-4 drop-shadow-sm">{data.infinitive}</h3><p className="text-2xl text-emerald-800 font-black mt-2 drop-shadow-sm" dir="rtl">{data.arabic}</p></>} 
                backHeaderContent={<div className="w-full space-y-2 text-left px-2"><div className="flex justify-between items-center bg-emerald-900/60 p-3 rounded-xl shadow-inner border border-emerald-500/20"><span className="text-emerald-300 text-xs uppercase font-black tracking-wider">Präsens:</span><span className="font-bold text-lg text-white">{data.praesens}</span></div><div className="flex justify-between items-center bg-emerald-900/60 p-3 rounded-xl shadow-inner border border-emerald-500/20"><span className="text-emerald-300 text-xs uppercase font-black tracking-wider">Präteritum:</span><span className="font-bold text-lg text-white">{data.praeteritum}</span></div><div className="flex justify-between items-center bg-emerald-900/60 p-3 rounded-xl shadow-inner border border-emerald-500/20"><span className="text-emerald-300 text-xs uppercase font-black tracking-wider">Perfekt:</span><span className="font-bold text-lg text-emerald-200">{data.perfekt}</span></div></div>} 
                examples={data.examples} targetGerman={data.infinitive} cardColor="bg-emerald-50" backColor="bg-emerald-950" 
            />;
        };

        const WendungCard = ({ data }) => {
            return <BaseFlashcard 
                frontContent={<><LevelBadge level={data.level} /><span className="absolute top-6 left-6 text-sm font-black text-purple-800 uppercase tracking-wide bg-purple-200/50 px-4 py-1.5 rounded-full shadow-sm border border-purple-300">{data.category}</span><h3 className="text-3xl font-black text-slate-900 mb-2 mt-8 leading-snug drop-shadow-sm px-4">{data.german}</h3></>} 
                backHeaderContent={<><p className="text-xl font-bold mb-2 text-center text-purple-200">{data.english}</p><p className="text-3xl font-black text-center text-white leading-tight drop-shadow-md" dir="rtl">{data.arabic}</p></>} 
                examples={data.examples} targetGerman={data.german} cardColor="bg-purple-50" backColor="bg-slate-950" 
            />;
        };

        const CollocationCard = ({ data }) => {
            return <BaseFlashcard 
                frontContent={<><LevelBadge level={data.level} /><span className="absolute top-6 left-6 text-sm font-black text-amber-800 uppercase tracking-wide bg-amber-200/50 px-4 py-1.5 rounded-full shadow-sm border border-amber-300">Nomen + Verb</span><h3 className="text-3xl font-black text-amber-950 mb-2 mt-8 leading-snug drop-shadow-sm px-4">{data.german}</h3></>} 
                backHeaderContent={<><p className="text-xl font-bold mb-2 text-center text-amber-200">{data.english}</p><p className="text-3xl font-black text-center text-white leading-tight drop-shadow-md" dir="rtl">{data.arabic}</p></>} 
                examples={data.examples} targetGerman={data.german} cardColor="bg-amber-50" backColor="bg-slate-950" 
            />;
        };

        const LebenslaufCard = ({ data }) => {
            return <BaseFlashcard 
                frontContent={<><LevelBadge level={data.level} /><span className="absolute top-6 left-6 text-sm font-black text-teal-800 uppercase tracking-wide bg-teal-200/50 px-4 py-1.5 rounded-full shadow-sm border border-teal-400">Nomenstil</span><h3 className="text-3xl font-black text-teal-950 mb-2 mt-8 leading-snug drop-shadow-sm px-4">{data.german}</h3><p className="text-md text-teal-700 font-bold mt-2 uppercase tracking-widest">{data.category}</p></>} 
                backHeaderContent={<><p className="text-xl font-bold mb-2 text-center text-teal-200">{data.english}</p><p className="text-3xl font-black text-center text-white leading-tight drop-shadow-md" dir="rtl">{data.arabic}</p></>} 
                examples={data.examples} targetGerman={data.german} cardColor="bg-teal-50" backColor="bg-slate-900" 
            />;
        };

        // NEW 8TH PATTERN COMPONENT: TrapCard (Fuchsia Theme for Genus/Hacks)
        const TrapCard = ({ data }) => {
            return <BaseFlashcard 
                frontContent={<><LevelBadge level={data.level} /><span className="absolute top-6 left-6 text-sm font-black text-fuchsia-800 uppercase tracking-wide bg-fuchsia-200/50 px-4 py-1.5 rounded-full shadow-sm border border-fuchsia-300">Genus-Hacks</span><h3 className="text-3xl font-black text-fuchsia-950 mb-2 mt-8 leading-snug drop-shadow-sm px-4">{data.german}</h3><p className="text-md text-fuchsia-700 font-bold mt-2 uppercase tracking-widest">{data.category}</p></>} 
                backHeaderContent={<><p className="text-xl font-bold mb-2 text-center text-fuchsia-200">{data.english}</p><p className="text-3xl font-black text-center text-white leading-tight drop-shadow-md" dir="rtl">{data.arabic}</p></>} 
                examples={data.examples} targetGerman={data.german} cardColor="bg-fuchsia-50" backColor="bg-slate-950" 
            />;
        };

        // ================= MAIN APP =================
        const App = () => {
            const [activeCategory, setActiveCategory] = useState('lebenslauf');

            const categories = [
                { id: 'lebenslauf', name: 'Lebenslauf & Nomenstil', desc: 'لغة السيرة الذاتية وتحويل الأفعال لأسماء', count: lebenslaufData.length },
                { id: 'vocab', name: 'Vokabeln & Bildung', desc: 'مفردات التعليم والمؤسسات والمخ', count: vocabData.length },
                { id: 'collocations', name: 'Corporate Collocations', desc: 'متلازمات البزنس والتعبيرات', count: collocationsData.length },
                { id: 'prepVerbs', name: 'Verben & Fälle', desc: 'أفعال حروف الجر التجريدية', count: prepVerbsData.length },
                { id: 'wendungen', name: 'Satzverbindungen', desc: 'روابط الجمل (weil, um..zu, deshalb)', count: wendungenData.length },
                { id: 'conjugation', name: 'Zeitformen & Verben', desc: 'الأفعال الشاذة وتصريفاتها', count: conjugationData.length },
                { id: 'grammarTraps', name: 'Genus-Hacks', desc: 'شفرات معرفة الـ Der/Die/Das', count: grammarTrapsData.length },
                { id: 'exam', name: 'Abschlusstest Guide', desc: 'دليل عملي لحل امتحان الوحدة الرابعة', count: examSections.length }
            ];

            return (
                <div className="min-h-screen flex flex-col items-center p-4 sm:p-8">
                    <header className="w-full max-w-7xl mb-12 text-center bg-slate-900 p-8 sm:p-14 rounded-[3rem] shadow-2xl border border-slate-700 relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-teal-400 via-indigo-500 to-fuchsia-500"></div>
                        <div className="inline-block bg-teal-500/20 text-teal-300 px-5 py-1.5 rounded-full text-sm font-black uppercase tracking-widest mb-6 border border-teal-500/30">The Advanced Academic Edition (Zero Truncation)</div>
                        <h1 className="text-4xl sm:text-6xl font-black text-white mb-6 tracking-tight drop-shadow-lg">German B1 <span className="text-transparent bg-clip-text bg-gradient-to-r from-teal-400 to-fuchsia-400">Masterclass</span></h1>
                        <p className="text-2xl text-slate-300 font-bold mb-4" dir="rtl">Kapitel 4: Lernen & Lebenslauf</p>
                        <p className="text-lg text-slate-400 font-medium max-w-4xl mx-auto mb-10 leading-relaxed" dir="rtl">
                            تم مسح الوحدة السابقة والتركيز على لغة <span className="text-teal-400 font-black">السيرة الذاتية (CV)</span> والتعليم. تم اكتشاف نمط جديد: <span className="text-fuchsia-400 font-black">Genus-Hacks</span> لشفرات تحديد الـ Der/Die/Das!
                        </p>
                        
                        <div className="flex flex-wrap justify-center gap-4 mt-6" dir="rtl">
                            {categories.map(cat => (
                                <button key={cat.id} onClick={() => setActiveCategory(cat.id)} className={`flex flex-col items-center p-5 rounded-3xl border-2 transition-all duration-300 ${activeCategory === cat.id ? 'bg-gradient-to-b from-indigo-600 to-indigo-800 border-indigo-400 shadow-[0_0_30px_rgba(99,102,241,0.5)] transform scale-105' : 'bg-slate-800/50 border-slate-700 hover:border-slate-500 hover:bg-slate-800'}`} style={{ width: '240px' }}>
                                    <span className={`text-xl font-black mb-2 tracking-tight text-center ${activeCategory === cat.id ? 'text-white' : 'text-slate-300'}`}>{cat.name}</span>
                                    <span className={`text-xs text-center leading-snug font-medium ${activeCategory === cat.id ? 'text-indigo-200' : 'text-slate-500'}`}>{cat.desc}</span>
                                    <span className={`mt-auto pt-4 px-4 py-1.5 rounded-full text-xs font-black tracking-widest uppercase ${activeCategory === cat.id ? 'bg-black/30 text-white shadow-inner border border-white/10' : 'bg-slate-900 text-slate-400'}`}>{cat.count} كروت</span>
                                </button>
                            ))}
                        </div>
                    </header>

                    <div className="w-full max-w-7xl">
                        {activeCategory === 'lebenslauf' && (
                            <div className="animate-fade-in grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-10 pb-16">
                                {lebenslaufData.map((data, index) => <LebenslaufCard key={`leb-${index}`} data={data} />)}
                            </div>
                        )}
                        {activeCategory === 'prepVerbs' && (
                            <div className="animate-fade-in grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-10 pb-16">
                                {prepVerbsData.map((data, index) => <PrepCard key={`prep-${index}`} data={data} />)}
                            </div>
                        )}
                        {activeCategory === 'wendungen' && (
                            <div className="animate-fade-in grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-10 pb-16">
                                {wendungenData.map((data, index) => <WendungCard key={`wen-${index}`} data={data} />)}
                            </div>
                        )}
                        {activeCategory === 'vocab' && (
                            <div className="animate-fade-in grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-10 pb-16">
                                {vocabData.map((data, index) => <VocabCard key={`voc-${index}`} data={data} />)}
                            </div>
                        )}
                        {activeCategory === 'conjugation' && (
                            <div className="animate-fade-in grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-10 pb-16">
                                {conjugationData.map((data, index) => <ConjugationCard key={`conj-${index}`} data={data} />)}
                            </div>
                        )}
                        {activeCategory === 'collocations' && (
                            <div className="animate-fade-in grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-10 pb-16">
                                {collocationsData.map((data, index) => <CollocationCard key={`col-${index}`} data={data} />)}
                            </div>
                        )}
                        {activeCategory === 'grammarTraps' && (
                            <div className="animate-fade-in grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-10 pb-16">
                                {grammarTrapsData.map((data, index) => <TrapCard key={`trap-${index}`} data={data} />)}
                            </div>
                        )}
                        {/* EXAM GUIDE RENDER */}
                        {activeCategory === 'exam' && (
                            <div className="animate-fade-in space-y-12 pb-16">
                                {examSections.map((section, sIdx) => (
                                    <div key={`sec-${sIdx}`} className="bg-slate-800 rounded-[2.5rem] p-8 sm:p-12 border-2 border-indigo-500/30 shadow-2xl">
                                        <h3 className="text-3xl sm:text-4xl text-white font-black mb-4 border-b-2 border-slate-700 pb-6" dir="rtl">{section.title}</h3>
                                        <p className="text-indigo-300 text-xl font-medium mb-10" dir="rtl">{section.desc}</p>
                                        
                                        <div className="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-10">
                                            {section.items.map((item, iIdx) => {
                                                let CardComponent = null;
                                                if (item.type === 'vocab') CardComponent = VocabCard;
                                                else if (item.type === 'conjugation') CardComponent = ConjugationCard;
                                                else if (item.type === 'wendung') CardComponent = WendungCard;
                                                else if (item.type === 'collocation') CardComponent = CollocationCard;
                                                else if (item.type === 'trap') CardComponent = TrapCard;
                                                else if (item.type === 'prepVerb') CardComponent = PrepCard;

                                                return (
                                                    <div key={`item-${iIdx}`} className="bg-slate-900 rounded-[2.5rem] p-4 flex flex-col items-center shadow-inner border border-slate-700/50">
                                                        <div className="w-full bg-indigo-900/60 text-indigo-100 p-6 rounded-3xl mb-6 font-mono text-center border border-indigo-500/50 font-bold text-lg shadow-lg">
                                                            {item.q}
                                                        </div>
                                                        <div className="w-full transform scale-95 origin-top">
                                                            {CardComponent && item.cardData && Object.keys(item.cardData).length > 0 ? (
                                                                <CardComponent data={item.cardData} />
                                                            ) : (
                                                                <div className="text-red-400 p-4 text-center font-bold">Card Data Not Found ({item.type})</div>
                                                            )}
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
