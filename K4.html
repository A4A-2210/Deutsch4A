    <script type="text/babel">
        // --- HELPERS FOR AUDIO & SPEECH ---
        const playAudio = (text, e) => {
            if (e) e.stopPropagation();
            const cleanText = text.replace(/<[^>]+>/g, '');
            const utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.lang = 'de-DE';
            window.speechSynthesis.speak(utterance);
        };

        const SpeechTester = ({ targetText }) => {
            const [status, setStatus] = React.useState('idle'); 
            const [heard, setHeard] = React.useState('');

            const listen = (e) => {
                if (e) e.stopPropagation();
                if (!('webkitSpeechRecognition' in window)) {
                    alert('المتصفح ده مش بيدعم تسجيل الصوت، جرب Google Chrome.');
                    return;
                }
                const recognition = new webkitSpeechRecognition();
                recognition.lang = 'de-DE';
                recognition.interimResults = false;
                
                recognition.onstart = () => setStatus('listening');
                recognition.onresult = (event) => {
                    const speechResult = event.results[0][0].transcript;
                    setHeard(speechResult);
                    
                    const clean = (str) => str.replace(/<[^>]+>/g, '').toLowerCase().replace(/[.,!?]/g, '').trim();
                    const targetClean = clean(targetText);
                    const heardClean = clean(speechResult);
                    
                    if (heardClean.includes(targetClean) || targetClean.includes(heardClean) || heardClean === targetClean) {
                        setStatus('success');
                    } else {
                        setStatus('fail');
                    }
                };
                recognition.onerror = () => setStatus('fail');
                recognition.onend = () => { if(status === 'listening') setStatus('idle'); };
                recognition.start();
            };

            return (
                <div className="inline-flex items-center gap-2" onClick={(e) => e.stopPropagation()}>
                    <button onClick={listen} title="جرب تنطقها" className={`p-2 rounded-full transition-all duration-300 shadow-sm ${status === 'listening' ? 'bg-red-500 text-white animate-pulse scale-110' : 'bg-slate-100 text-slate-600 hover:bg-slate-200 hover:scale-105'}`}>
                        <i data-lucide="mic" className="w-4 h-4"></i>
                    </button>
                    {status === 'success' && <span className="text-emerald-500 text-xs font-bold ar-text animate-bounce">✅ ممتاز!</span>}
                    {status === 'fail' && <span className="text-red-500 text-xs ar-text font-bold" title={`سمعت: ${heard}`}>❌ جرب تاني</span>}
                </div>
            );
        };

                { id: 'b2_e_8', type: "Zweifel", ger: "Ich kann dem nur teilweise zustimmen.", eng: "I can only partly agree with that.", ar: "أقدر أوافق على ده جزئياً بس.", context: "للتعبير عن عدم الاقتناع الكامل." },
                { id: 'b2_e_9', type: "Ergänzen", ger: "Wir sollten auch in Betracht ziehen, dass...", eng: "We should also consider that...", ar: "المفروض كمان ناخد في الاعتبار إن...", context: "لإضافة فكرة جديدة للنقاش." },
                { id: 'b2_e_10', type: "Zusammenfassen", ger: "Zusammenfassend lässt sich sagen, dass...", eng: "In summary, it can be said that...", ar: "في النهاية نقدر نقول إن...", context: "لختام البرزنتيشن أو النقاش." },
                { id: 'b2_e_11', type: "Beispiele", ger: "Ein gutes Beispiel dafür ist...", eng: "A good example of this is...", ar: "مثال كويس على ده هو...", context: "لضرب أمثلة توضيحية." },
                { id: 'b2_e_12', type: "Sicherheit", ger: "Es steht außer Zweifel, dass...", eng: "It is beyond doubt that...", ar: "مما لا شك فيه إن...", context: "للتأكيد على حقيقة مؤكدة." },
                { id: 'b2_e_13', type: "Skepsis", ger: "Mich überzeugt dieses Argument nicht ganz.", eng: "This argument doesn't fully convince me.", ar: "الحجة دي مش مقنعاني أوي.", context: "لرفض حجة الخصم بأدب." }
            ],
            b2_grammar: [
                {
                    id: 'b2_g_1',
                    title: "B2 Grammatik: Zweiteilige Konnektoren (الروابط المزدوجة)",
                    desc: "روابط بتتكون من جزئين بنستخدمها عشان نربط بين فكرتين أو صفتين. بتدي أسلوب B2 راقي جداً في الكتابة والكلام.",
                    structure: "sowohl ... als auch (إضافة) | weder ... noch (نفي) | nicht nur ... sondern auch (إضافة وتأكيد)",
                    examples: [
                        { g: "Er spricht <span class='text-purple-600 font-bold'>sowohl</span> Englisch <span class='text-purple-600 font-bold'>als auch</span> Deutsch.", a: "هو بيتكلم إنجليزي وألماني كمان. (sowohl... als auch بيجوا بدون كوما)" },
                        { g: "Das ist <span class='text-purple-600 font-bold'>weder</span> praktisch <span class='text-purple-600 font-bold'>noch</span> günstig.", a: "ده لا هو عملي ولا هو رخيص. (لنفي الحاجتين سوا)" },
                        { g: "Sie ist <span class='text-purple-600 font-bold'>nicht nur</span> intelligent, <span class='text-purple-600 font-bold'>sondern auch</span> sehr fleißig.", a: "هي مش بس ذكية، دي كمان مجتهدة جداً. (لازم كوما قبل sondern)" }
                    ]
                },
                {
                    id: 'b2_g_2',
                    title: "B2 Grammatik: Passiversatzformen (بدائل المبني للمجهول)",
                    desc: "في مستوى B2 بنتعلم بدائل للمبني للمجهول بتدي نفس المعنى (يُمكن فعله) لكن بطريقة أسهل وأكثر احترافية.",
                    structure: "sich lassen + Infinitiv | sein + zu + Infinitiv | Adjektive auf -bar/-lich",
                    examples: [
                        { g: "Das Problem <span class='text-purple-600 font-bold'>lässt sich</span> leicht <span class='text-purple-600 font-bold'>lösen</span>.", a: "المشكلة دي ممكن تتحل بسهولة. (بدل kann gelöst werden)" },
                        { g: "Die Aufgabe <span class='text-purple-600 font-bold'>ist</span> kaum <span class='text-purple-600 font-bold'>zu schaffen</span>.", a: "المهمة دي صعب تتعمل. (بدل kann kaum geschafft werden)" },
                        { g: "Dieser Text ist gut <span class='text-purple-600 font-bold'>lesbar</span>.", a: "النص ده قابل للقراءة (سهل يتقري). (استخدام صفة تنتهي بـ bar)" }
                    ]
                },
                {
                    id: 'b2_g_3',
                    title: "B2 Grammatik: N-Deklination (تصريف N للأسماء)",
                    desc: "بعض الأسماء المذكرة (غالباً اللي بتنتهي بـ -e أو -ent/-ist) بتاخد حرف n أو en في كل الحالات (Akkusativ, Dativ, Genitiv) ما عدا حالة الفاعل Nominativ.",
                    structure: "Nominativ: der Student -> Akkusativ/Dativ/Genitiv: den/dem/des Studenten",
                    examples: [
                        { g: "Ich spreche mit dem <span class='text-purple-600 font-bold'>Studenten</span>.", a: "أنا بتكلم مع الطالب. (Dativ ضفنا en)" },
                        { g: "Wir fragen den <span class='text-purple-600 font-bold'>Experten</span>.", a: "إحنا بنسأل الخبير. (Akkusativ ضفنا en)" },
                        { g: "Das ist die Meinung des <span class='text-purple-600 font-bold'>Herrn</span>.", a: "ده رأي السيد. (Genitiv ضفنا n وبس بدون s)" }
                    ]
                }
            ]
        };

        const { useState, useEffect } = React;

        // --- HELPER FOR ARTICLES COLORING ---
        const colorizeArticles = (text) => {
            if (!text) return text;
            const regex = /(der |die |das )/gi;
            const parts = text.split(regex);
            return parts.map((part, i) => {
                const lower = part.toLowerCase();
                if (lower === 'der ') return <span key={i} className="text-blue-500 font-extrabold">{part}</span>;
                if (lower === 'die ') return <span key={i} className="text-rose-500 font-extrabold">{part}</span>;
                if (lower === 'das ') return <span key={i} className="text-emerald-500 font-extrabold">{part}</span>;
                return <span key={i}>{part}</span>;
            });
        };

        // --- COMPONENTS ---
        const ProgressBar = ({ total, learned, colorClass }) => {
            const percentage = total === 0 ? 0 : Math.round((learned / total) * 100);
            return (
                <div className="glass-panel p-5 rounded-2xl mb-8 flex items-center justify-between transition-all" dir="rtl">
                    <div>
                        <h3 className="text-sm font-bold text-slate-500 uppercase tracking-wider ar-text mb-1">مستوى التقدم</h3>
                        <p className="text-3xl font-extrabold text-slate-800">{learned} <span className="text-sm font-medium text-slate-400">/ {total} أتقنتهم</span></p>
                    </div>
                    <div className="relative w-20 h-20 drop-shadow-md">
                        <svg className="w-full h-full transform -rotate-90" viewBox="0 0 36 36">
                            <path className="text-slate-200" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" strokeWidth="3" />
                            <path className={`${colorClass} transition-all duration-1000 ease-out`} strokeDasharray={`${percentage}, 100`} d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" />
                        </svg>
                        <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-sm font-bold text-slate-700">
                            {percentage}%
                        </div>
                    </div>
                </div>
            );
        };

        const WordCard = ({ item, isLearned, toggleLearned }) => {
            const [isFlipped, setIsFlipped] = useState(false);

            return (
                <div className="relative group perspective-1000 w-full h-[24rem]">
                    <div className={`w-full h-full transition-all duration-700 transform-style-3d shadow-[0_8px_30px_rgb(0,0,0,0.04)] rounded-2xl ${isFlipped ? 'rotate-y-180' : ''}`}>
                        
                        {/* FRONT */}
                        <div className="absolute w-full h-full backface-hidden bg-white border border-slate-100 rounded-2xl p-5 flex flex-col cursor-pointer hover:shadow-lg transition-shadow" 
                             onClick={() => setIsFlipped(true)}>
                            <div className="flex justify-between items-start shrink-0" dir="rtl">
                                <span className="bg-blue-50 text-blue-600 text-xs font-bold px-3 py-1.5 rounded-lg uppercase tracking-wider ar-text">كلمة منفصلة</span>
                                <button onClick={(e) => { e.stopPropagation(); toggleLearned(item.id); }} className={`p-2 rounded-full transition-colors ${isLearned ? 'bg-emerald-100 text-emerald-600' : 'bg-slate-50 text-slate-300 hover:bg-slate-100'}`}>
                                    <i data-lucide="check" className="w-5 h-5"></i>
                                </button>
                            </div>
                            
                            <div className="text-center mt-2 flex-grow flex flex-col justify-center overflow-y-auto front-scroll px-1 py-3">
                                <div className="flex flex-col justify-center items-center gap-3 mb-1">
                                    <h3 className="text-2xl font-bold text-slate-800 leading-tight">{colorizeArticles(item.ger)}</h3>
                                    <div className="flex items-center gap-2">
                                        <button onClick={(e) => playAudio(item.ger, e)} className="p-2 rounded-full bg-blue-50 text-blue-600 hover:bg-blue-100 transition-colors shadow-sm"><i data-lucide="volume-2" className="w-5 h-5"></i></button>
                                        <SpeechTester targetText={item.ger} />
                                    </div>
                                </div>
                                <div className="mt-4 space-y-1">
                                    <p className="text-slate-500 font-medium text-sm">{item.eng}</p>
                                    <p className="text-blue-600 font-bold ar-text text-lg" dir="rtl">{item.ar}</p>
                                </div>
                            </div>
                            
                            <div className="text-center text-xs text-slate-400 font-medium flex items-center justify-center gap-1 ar-text mt-2 shrink-0">
                                <i data-lucide="rotate-cw" className="w-3 h-3"></i> اضغط للأمثلة
                            </div>
                        </div>

                        {/* BACK */}
                        <div className="absolute w-full h-full backface-hidden bg-gradient-to-br from-blue-600 to-indigo-700 text-white rounded-2xl p-5 shadow-lg flex flex-col cursor-pointer overflow-hidden" 
                             onClick={() => setIsFlipped(false)} style={{ transform: 'rotateY(180deg)' }}>
                            <div className="mb-3 border-b border-white/20 pb-2 flex justify-between items-center shrink-0" dir="rtl">
                                <h4 className="font-bold text-white/90 text-sm tracking-wider ar-text">أمثلة سياقية</h4>
                                <i data-lucide="rotate-ccw" className="w-4 h-4 text-white/60"></i>
                            </div>
                            <div className="overflow-y-auto card-scroll flex-grow pr-2 pb-2">
                                <ul className="space-y-3">
                                    {item.s && item.s.map((sentence, idx) => (
                                        <li key={idx} className="text-sm bg-white/10 backdrop-blur-sm p-3 rounded-xl border border-white/5">
                                            <div className="flex items-start gap-2 mb-1.5">
                                                <button onClick={(e) => playAudio(sentence.g, e)} className="p-1 text-blue-200 hover:text-white shrink-0 mt-0.5"><i data-lucide="volume-2" className="w-4 h-4"></i></button>
                                                <span className="leading-relaxed" dangerouslySetInnerHTML={{ __html: sentence.g }}></span>
                                            </div>
                                            <div className="text-blue-200 text-xs italic ml-8 mb-1.5">{sentence.e}</div>
                                            <div className="text-amber-300 text-sm font-bold ar-text border-t border-white/10 pt-1.5 mt-1" dir="rtl">{sentence.a}</div>
                                        </li>
                                    ))}
                                    {!item.s && <li className="text-sm text-white/70 italic text-center mt-10">Keine Sätze vorhanden</li>}
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const ListRow = ({ item, isLearned, toggleLearned, colorTheme }) => {
            const [expanded, setExpanded] = useState(false);
            
            const themes = {
                emerald: 'hover:border-emerald-300 text-emerald-600 bg-emerald-50 text-emerald-700',
                amber: 'hover:border-amber-300 text-amber-600 bg-amber-50 text-amber-700',
                rose: 'hover:border-rose-300 text-rose-600 bg-rose-50 text-rose-700',
                teal: 'hover:border-teal-300 text-teal-600 bg-teal-50 text-teal-700',
            };
            const themeClass = themes[colorTheme] || themes.emerald;
            const textAccent = `text-${colorTheme}-600`;

            return (
                <div className={`bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden mb-4 transition-all duration-300 hover:shadow-md`} dir="ltr">
                    <div className="p-5 flex items-center justify-between cursor-pointer" onClick={() => setExpanded(!expanded)}>
                        <div className="flex items-center gap-4">
                            <button onClick={(e) => { e.stopPropagation(); toggleLearned(item.id); }} className={`p-2 rounded-full transition-colors ${isLearned ? `bg-${colorTheme}-100 ${textAccent}` : 'bg-slate-50 text-slate-300 hover:bg-slate-100'}`}>
                                <i data-lucide="check" className="w-5 h-5"></i>
                            </button>
                            <div>
                                <h3 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                                    {item.ger} 
                                    <button onClick={(e) => playAudio(item.ger, e)} className={`${textAccent} opacity-70 hover:opacity-100 transition-opacity`}><i data-lucide="volume-2" className="w-5 h-5"></i></button>
                                </h3>
                                <p className="text-sm text-slate-500 mt-1">{item.eng} <span className="mx-2 text-slate-300">|</span> <span className={`${textAccent} font-bold ar-text`} dir="rtl">{item.ar}</span></p>
                            </div>
                        </div>
                        <div className={`transform transition-transform duration-300 ${expanded ? 'rotate-180' : ''}`}>
                            <i data-lucide="chevron-down" className="w-6 h-6 text-slate-400"></i>
                        </div>
                    </div>
                    
                    <div className={`transition-all duration-500 overflow-hidden ${expanded ? 'max-h-[1000px] opacity-100' : 'max-h-0 opacity-0'}`}>
                        <div className="bg-slate-50 p-5 border-t border-slate-100">
                            <ul className="space-y-4">
                                {item.s && item.s.map((sentence, idx) => (
                                    <li key={idx} className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm group flex flex-col sm:flex-row gap-4 justify-between items-start">
                                        <div className="flex-1">
                                            <div className="flex items-start gap-3 mb-2">
                                                <button onClick={(e) => playAudio(sentence.g, e)} className={`mt-0.5 ${textAccent} bg-${colorTheme}-50 p-1.5 rounded-lg shrink-0`}><i data-lucide="volume-2" className="w-4 h-4"></i></button>
                                                <p className="text-slate-800 text-base font-medium leading-relaxed mt-1" dangerouslySetInnerHTML={{ __html: sentence.g }}></p>
                                            </div>
                                            <p className="text-slate-500 text-sm ml-10 mb-2">{sentence.e}</p>
                                            <div className={`ml-10 ${textAccent} text-base font-bold ar-text border-t border-slate-100 pt-2`} dir="rtl">{sentence.a}</div>
                                        </div>
                                        <div className="opacity-100 sm:opacity-0 group-hover:opacity-100 transition-opacity shrink-0 sm:mt-1 self-end sm:self-start bg-slate-50 p-1.5 rounded-full" dir="ltr">
                                            <SpeechTester targetText={sentence.g} />
                                        </div>
                                    </li>
                                ))}
                                {!item.s && <p className="text-slate-500 italic px-4">Keine Beispiele vorhanden.</p>}
                            </ul>
                        </div>
                    </div>
                </div>
            );
        };

        const IrregularVerbRow = ({ item, isLearned, toggleLearned }) => {
            const [expanded, setExpanded] = useState(false);
            
            return (
                <div className="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden mb-4 transition-all duration-300 hover:shadow-md" dir="ltr">
                    <div className="p-5 flex items-center justify-between cursor-pointer" onClick={() => setExpanded(!expanded)}>
                        <div className="flex items-center gap-4">
                            <button onClick={(e) => { e.stopPropagation(); toggleLearned(item.id); }} className={`p-2 rounded-full transition-colors ${isLearned ? 'bg-emerald-100 text-emerald-600' : 'bg-slate-50 text-slate-300 hover:bg-slate-100'}`}>
                                <i data-lucide="check" className="w-5 h-5"></i>
                            </button>
                            <div>
                                <h3 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                                    {item.ger} 
                                    <button onClick={(e) => playAudio(item.ger, e)} className="text-emerald-600 opacity-70 hover:opacity-100 transition-opacity"><i data-lucide="volume-2" className="w-5 h-5"></i></button>
                                </h3>
                                <p className="text-sm text-slate-500 mt-1">{item.eng} <span className="mx-2 text-slate-300">|</span> <span className="text-emerald-600 font-bold ar-text" dir="rtl">{item.ar}</span></p>
                            </div>
                        </div>
                        <div className={`transform transition-transform duration-300 ${expanded ? 'rotate-180' : ''}`}>
                            <i data-lucide="chevron-down" className="w-6 h-6 text-slate-400"></i>
                        </div>
                    </div>
                    
                    <div className={`transition-all duration-500 overflow-hidden ${expanded ? 'max-h-[1000px] opacity-100' : 'max-h-0 opacity-0'}`}>
                        <div className="bg-slate-50 p-5 border-t border-slate-100">
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm relative group">
                                    <div className="text-xs font-bold text-emerald-500 uppercase tracking-widest mb-2 border-b border-slate-100 pb-1">Präsens (مضارع)</div>
                                    <div className="flex items-start gap-2 mb-2">
                                        <button onClick={(e) => playAudio(item.praesens, e)} className="text-emerald-600 bg-emerald-50 p-1.5 rounded-lg shrink-0"><i data-lucide="volume-2" className="w-4 h-4"></i></button>
                                        <p className="text-slate-800 text-sm font-medium leading-relaxed mt-1" dangerouslySetInnerHTML={{ __html: item.praesens }}></p>
                                    </div>
                                    <div className="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition-opacity"><SpeechTester targetText={item.praesens} /></div>
                                </div>
                                <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm relative group">
                                    <div className="text-xs font-bold text-amber-500 uppercase tracking-widest mb-2 border-b border-slate-100 pb-1">Präteritum (ماضي بسيط)</div>
                                    <div className="flex items-start gap-2 mb-2">
                                        <button onClick={(e) => playAudio(item.praeteritum, e)} className="text-amber-600 bg-amber-50 p-1.5 rounded-lg shrink-0"><i data-lucide="volume-2" className="w-4 h-4"></i></button>
                                        <p className="text-slate-800 text-sm font-medium leading-relaxed mt-1">{item.praeteritum}</p>
                                    </div>
                                    <div className="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition-opacity"><SpeechTester targetText={item.praeteritum} /></div>
                                </div>
                                <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm relative group">
                                    <div className="text-xs font-bold text-purple-500 uppercase tracking-widest mb-2 border-b border-slate-100 pb-1">Perfekt (ماضي تام)</div>
                                    <div className="flex items-start gap-2 mb-2">
                                        <button onClick={(e) => playAudio(item.perfekt, e)} className="text-purple-600 bg-purple-50 p-1.5 rounded-lg shrink-0"><i data-lucide="volume-2" className="w-4 h-4"></i></button>
                                        <p className="text-slate-800 text-sm font-medium leading-relaxed mt-1">{item.perfekt}</p>
                                    </div>
                                    <div className="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition-opacity"><SpeechTester targetText={item.perfekt} /></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- MAIN APP ---
        const App = () => {
            const [activeTab, setActiveTab] = useState('words');
            const [learnedItems, setLearnedItems] = useState(new Set());
            const [searchTerm, setSearchTerm] = useState('');
            const [expandedReview, setExpandedReview] = useState('rev-lernen');

            useEffect(() => {
                lucide.createIcons();
            });

            const toggleLearned = (id) => {
                const newLearned = new Set(learnedItems);
                if (newLearned.has(id)) newLearned.delete(id);
                else newLearned.add(id);
                setLearnedItems(newLearned);
            };

            const totalWords = LEARNING_DATA.words.vhs_studium.length + LEARNING_DATA.words.beruf_lebenslauf.length + LEARNING_DATA.words.gehirn_lernen.length;
            const totalVerbs = LEARNING_DATA.verbs.length + LEARNING_DATA.irregularVerbs.length;
            const totalExp = LEARNING_DATA.expressions.length;
            const totalPrep = LEARNING_DATA.prepositions.length;
            const totalGrammar = LEARNING_DATA.grammar.length;
            const totalReview = LEARNING_DATA.review ? LEARNING_DATA.review.reduce((acc, cat) => acc + cat.items.length, 0) : 0;
            const totalB2 = LEARNING_DATA.b2_words.length + LEARNING_DATA.b2_expressions.length + LEARNING_DATA.b2_grammar.length;
            const grandTotal = totalWords + totalVerbs + totalExp + totalPrep + totalGrammar + totalReview + totalB2;

            const tabConfig = {
                words: { labelEn: 'Words', labelAr: 'الأسماء والكلمات', icon: 'book-open', color: 'blue' },
                verbs: { labelEn: 'Verbs', labelAr: 'الأفعال', icon: 'activity', color: 'emerald' },
                expressions: { labelEn: 'Expressions', labelAr: 'تعبيرات', icon: 'message-circle', color: 'amber' },
                prepositions: { labelEn: 'Prepositions', labelAr: 'حروف الجر', icon: 'link', color: 'rose' },
                grammar: { labelEn: 'Grammar', labelAr: 'القواعد الشاملة', icon: 'pen-tool', color: 'purple' },
                review: { labelEn: 'Review', labelAr: 'المراجعة الشاملة', icon: 'clipboard-check', color: 'teal' },
                b2_expansion: { labelEn: 'B2 Expansion', labelAr: 'توسعة B2', icon: 'rocket', color: 'indigo' }
            };

            const activeColor = tabConfig[activeTab].color;

            return (
                <div className="h-screen flex flex-col bg-slate-50" dir="rtl">
                    {/* TOP NAVIGATION HEADER */}
                    <header className="w-full bg-slate-900 text-white shadow-xl z-50 shrink-0 relative overflow-hidden">
                        <div className={`absolute top-0 left-0 w-full h-1 bg-${activeColor}-500 transition-colors duration-500`}></div>
                        
                        <div className="flex justify-between items-center px-4 md:px-8 py-3 border-b border-slate-800">
                            <h1 className="text-xl md:text-2xl font-extrabold flex items-center gap-3 ar-text">

                                        <div className="relative z-10 text-center">
                                            <h2 className="text-4xl font-extrabold mb-4 ar-text">توسعة B2 (Wortschatz & Grammatik)</h2>
                                            <p className="text-indigo-100 ar-text text-lg max-w-3xl mx-auto leading-relaxed">قسم مخصص للارتقاء بمستواك لـ B2. يحتوي على مفردات متقدمة للعمل والدراسة، تعبيرات هامة لامتحانات Goethe و Telc، وأهم القواعد النحوية المتقدمة.</p>
                                        </div>
                                    </div>

                                    <div className="space-y-12">
                                        <section>
                                            <h2 className="text-3xl font-extrabold text-slate-800 mb-6 flex items-center gap-3 ar-text" dir="rtl"><span className="bg-indigo-100 p-2 rounded-xl text-indigo-600"><i data-lucide="briefcase" className="w-6 h-6"></i></span> مفردات B2 المتقدمة (Wortschatz)</h2>
                                            <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-6">
                                                {LEARNING_DATA.b2_words.filter(w => w.ger.toLowerCase().includes(searchTerm.toLowerCase()) || w.eng.toLowerCase().includes(searchTerm.toLowerCase()) || w.ar.includes(searchTerm)).map(word => (
                                                    <WordCard key={word.id} item={word} isLearned={learnedItems.has(word.id)} toggleLearned={toggleLearned} />
                                                ))}
                                            </div>
                                        </section>
                                        
                                        <section>
                                            <h2 className="text-3xl font-extrabold text-slate-800 mb-6 flex items-center gap-3 ar-text" dir="rtl"><span className="bg-indigo-100 p-2 rounded-xl text-indigo-600"><i data-lucide="message-square" className="w-6 h-6"></i></span> تعبيرات امتحانات B2 (Redemittel)</h2>
                                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                                {LEARNING_DATA.b2_expressions.filter(e => e.ger.toLowerCase().includes(searchTerm.toLowerCase()) || e.eng.toLowerCase().includes(searchTerm.toLowerCase()) || e.ar.includes(searchTerm)).map(exp => (
                                                    <div key={exp.id} className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm relative group hover:shadow-xl hover:border-indigo-200 transition-all duration-300">
                                                        <button onClick={() => toggleLearned(exp.id)} className={`absolute top-5 left-5 p-2 rounded-full transition-colors z-10 ${learnedItems.has(exp.id) ? 'bg-indigo-100 text-indigo-600' : 'bg-slate-50 text-slate-300 hover:bg-slate-100'}`}>
                                                            <i data-lucide="check" className="w-5 h-5"></i>
                                                        </button>
                                                        <span className="inline-block bg-indigo-50 text-indigo-600 px-3 py-1 rounded-lg text-xs font-bold mb-4 ar-text border border-indigo-100">{exp.type}</span>
                                                        <div className="flex items-start gap-3 mb-3" dir="ltr">
                                                            <div className="flex flex-col gap-2 shrink-0">
                                                                <button onClick={(e) => playAudio(exp.ger, e)} className="text-indigo-500 bg-indigo-50 p-2 rounded-xl hover:bg-indigo-100 transition-colors"><i data-lucide="volume-2" className="w-5 h-5"></i></button>
                                                                <div className="bg-slate-50 rounded-full p-1"><SpeechTester targetText={exp.ger} /></div>
                                                            </div>
                                                            <div>
                                                                <h3 className="text-xl font-extrabold text-slate-800 leading-tight mt-1">"{exp.ger}"</h3>
                                                            </div>
                                                        </div>
                                                        
                                                        <div className="bg-slate-50 rounded-2xl p-4 mt-4 border border-slate-100">
                                                            <p className="text-slate-500 font-medium text-sm mb-2" dir="ltr">{exp.eng}</p>
                                                            <p className="text-indigo-700 font-extrabold text-xl mb-4 ar-text">{exp.ar}</p>
                                                            <div className="text-sm text-slate-600 flex gap-2 items-start pt-3 border-t border-slate-200">
                                                                <i data-lucide="info" className="w-5 h-5 text-indigo-400 mt-0.5 shrink-0"></i>
                                                                <span className="ar-text leading-relaxed">{exp.context}</span>
                                                            </div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </section>
                                        
                                        <section>
                                            <h2 className="text-3xl font-extrabold text-slate-800 mb-6 flex items-center gap-3 ar-text" dir="rtl"><span className="bg-indigo-100 p-2 rounded-xl text-indigo-600"><i data-lucide="pen-tool" className="w-6 h-6"></i></span> قواعد متقدمة (B2 Grammatik)</h2>
                                            <div className="grid gap-8">
                                                {LEARNING_DATA.b2_grammar.filter(g => g.title.toLowerCase().includes(searchTerm.toLowerCase()) || g.desc.includes(searchTerm)).map((gram, idx) => (
                                                    <div key={idx} className="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden hover:shadow-lg transition-all duration-300 relative">
                                                        <button onClick={() => toggleLearned(gram.id)} className={`absolute top-6 left-6 p-2 rounded-full transition-colors z-10 ${learnedItems.has(gram.id) ? 'bg-indigo-100 text-indigo-600' : 'bg-slate-50 text-slate-300 hover:bg-slate-100'}`}>
                                                            <i data-lucide="check" className="w-5 h-5"></i>
                                                        </button>
                                                        <div className="p-8 border-b border-slate-50 bg-slate-50/50 flex items-start gap-4">
                                                            <div className="bg-indigo-100 p-3 rounded-2xl text-indigo-600 shrink-0 mt-1">
                                                                <i data-lucide="braces" className="w-6 h-6"></i>
                                                            </div>
                                                            <div className="pr-10">
                                                                <h3 className="text-2xl font-extrabold text-slate-800 ar-text mb-2">{gram.title}</h3>
                                                                <p className="text-base text-slate-600 ar-text leading-relaxed">{gram.desc}</p>
                                                            </div>
                                                        </div>
                                                        
                                                        <div className="p-8">
                                                            <div className="bg-slate-900 text-indigo-300 font-mono text-base p-5 rounded-2xl mb-8 shadow-inner flex items-center gap-3 overflow-x-auto border border-slate-800" dir="ltr">
                                                                <i data-lucide="code" className="text-slate-500 w-5 h-5 shrink-0"></i> {gram.structure}
                                                            </div>
                                                            
                                                            <h4 className="font-bold text-slate-400 mb-4 text-sm tracking-widest uppercase ar-text">أمثلة للتوضيح:</h4>
                                                            <ul className="space-y-4">
                                                                {gram.examples.map((ex, i) => (
                                                                    <li key={i} className="bg-indigo-50/50 p-5 rounded-2xl border border-indigo-100">
                                                                        <div className="flex gap-4 items-center mb-3" dir="ltr">
                                                                            <button onClick={(e) => playAudio(ex.g, e)} className="text-indigo-500 bg-white p-2 rounded-xl shadow-sm hover:bg-indigo-50 transition-colors shrink-0"><i data-lucide="volume-2" className="w-5 h-5"></i></button>
                                                                            <span className="text-slate-800 text-lg font-medium" dangerouslySetInnerHTML={{ __html: ex.g }}></span>
                                                                        </div>
                                                                        <div className="text-indigo-700 font-bold ar-text border-t border-indigo-200/50 pt-3 mt-3">{ex.a}</div>
                                                                    </li>
                                                                ))}
                                                            </ul>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </section>
                                    </div>
                                </div>
                            )}

                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
