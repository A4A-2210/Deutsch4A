    <script type="text/babel">
        // --- HELPERS FOR AUDIO & SPEECH ---
        const playAudio = (text, e) => {
            if (e) e.stopPropagation();
            const cleanText = text.replace(/<[^>]+>/g, '');
            const utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.lang = 'de-DE';
            window.speechSynthesis.speak(utterance);
        };

        const SpeechTester = ({ targetText }) => {
            const [status, setStatus] = React.useState('idle'); 
            const [heard, setHeard] = React.useState('');

            const listen = (e) => {
                if (e) e.stopPropagation();
                if (!('webkitSpeechRecognition' in window)) {
                    alert('المتصفح ده مش بيدعم تسجيل الصوت، جرب Google Chrome.');
                    return;
                }
                const recognition = new webkitSpeechRecognition();
                recognition.lang = 'de-DE';
                recognition.interimResults = false;
                
                recognition.onstart = () => setStatus('listening');
                recognition.onresult = (event) => {
                    const speechResult = event.results[0][0].transcript;
                    setHeard(speechResult);
                    
                    const clean = (str) => str.replace(/<[^>]+>/g, '').toLowerCase().replace(/[.,!?]/g, '').trim();
                    const targetClean = clean(targetText);
                    const heardClean = clean(speechResult);
                    
                    if (heardClean.includes(targetClean) || targetClean.includes(heardClean) || heardClean === targetClean) {
                        setStatus('success');
                    } else {
                        setStatus('fail');
                    }
                };
                recognition.onerror = () => setStatus('fail');
                recognition.onend = () => { if(status === 'listening') setStatus('idle'); };
                recognition.start();
            };

            return (
                <div className="inline-flex items-center gap-2" onClick={(e) => e.stopPropagation()}>
                    <button onClick={listen} title="جرب تنطقها" className={`p-2 rounded-full transition-all duration-300 shadow-sm ${status === 'listening' ? 'bg-red-500 text-white animate-pulse scale-110' : 'bg-slate-100 text-slate-600 hover:bg-slate-200 hover:scale-105'}`}>
                        <i data-lucide="mic" className="w-4 h-4"></i>
                    </button>
                    {status === 'success' && <span className="text-emerald-500 text-xs font-bold ar-text animate-bounce">✅ ممتاز!</span>}
                    {status === 'fail' && <span className="text-red-500 text-xs ar-text font-bold" title={`سمعت: ${heard}`}>❌ جرب تاني</span>}
                </div>
            );
        };

                        { id: 'r_g_53', g: "Wir sparen Geld, um ein neues Auto zu kaufen.", e: "We save money to buy a new car.", a: "بنحوش فلوس عشان نشتري عربية جديدة." },
                        { id: 'r_g_54', g: "Sie treibt Sport, um gesund zu bleiben.", e: "She does sports to stay healthy.", a: "بتلعب رياضة عشان تفضل بصحتها." },
                        { id: 'r_g_55', g: "Ich brauche ein Wörterbuch, um den Text zu übersetzen.", e: "I need a dictionary to translate the text.", a: "محتاج قاموس عشان أترجم النص." },
                        { id: 'r_g_56', g: "Er fährt zum Bahnhof, um seine Freundin abzuholen.", e: "He drives to the station to pick up his girlfriend.", a: "راح المحطة عشان يجيب صاحبته." },
                        { id: 'r_g_57', g: "Wir gehen früh ins Bett, um morgen fit zu sein.", e: "We go to bed early to be fit tomorrow.", a: "بندخل ننام بدري عشان نبقى فايقين بكرة." },
                        { id: 'r_g_58', g: "Sie trägt einen Mantel, um nicht zu frieren.", e: "She wears a coat so as not to freeze.", a: "لابسة بالطو عشان ماتبردش." },
                        { id: 'r_g_59', g: "Ich höre Musik, um mich zu entspannen.", e: "I listen to music to relax.", a: "بسمع مزيكا عشان أريلاكس (أسترخي)." },
                        { id: 'r_g_60', g: "Er nutzt das Internet, um Hotels zu reservieren.", e: "He uses the internet to reserve hotels.", a: "بيستخدم النت عشان يحجز فنادق." },
                        { id: 'r_g_61', g: "Wir machen eine Pause, um frische Luft zu schnappen.", e: "We take a break to get some fresh air.", a: "بناخد بريك عشان نشم شوية هوا نضاف." },
                        { id: 'r_g_62', g: "Ich gehe in den Supermarkt, um Brot zu kaufen.", e: "I go to the supermarket to buy bread.", a: "رايح السوبر ماركت عشان أشتري عيش." },

                        { id: 'r_g_66', g: "Ich brauche Ruhe, um das Buch zu lesen.", e: "I need peace to read the book.", a: "محتاج هدوء عشان أقرأ الكتاب." },
                        { id: 'r_g_67', g: "Sie nimmt ein Taxi, um pünktlich zu kommen.", e: "She takes a taxi to arrive on time.", a: "بتاخد تاكسي عشان توصل في ميعادها." },
                        { id: 'r_g_68', g: "Er macht das Fenster auf, um den Raum zu lüften.", e: "He opens the window to air out the room.", a: "بيفتح الشباك عشان يهوي الأوضة." },
                        { id: 'r_g_69', g: "Ich trinke Wasser, um meinen Durst zu löschen.", e: "I drink water to quench my thirst.", a: "بشرب مية عشان أروي عطشي." },
                        { id: 'r_g_70', g: "Wir fliegen nach Japan, um die Kultur kennenzulernen.", e: "We fly to Japan to get to know the culture.", a: "هنسافر اليابان عشان نتعرف على ثقافتهم." }
                    ]
                }
            ]
        };

        const { useState, useEffect } = React;

        // --- HELPER FOR ARTICLES COLORING ---
        const colorizeArticles = (text) => {
            if (!text) return text;
            const regex = /(der |die |das )/gi;
            const parts = text.split(regex);
            return parts.map((part, i) => {
                const lower = part.toLowerCase();
                if (lower === 'der ') return <span key={i} className="text-blue-500 font-extrabold">{part}</span>;
                if (lower === 'die ') return <span key={i} className="text-rose-500 font-extrabold">{part}</span>;
                if (lower === 'das ') return <span key={i} className="text-emerald-500 font-extrabold">{part}</span>;
                return <span key={i}>{part}</span>;
            });
        };

        // --- COMPONENTS ---
        const ProgressBar = ({ total, learned, colorClass }) => {
            const percentage = total === 0 ? 0 : Math.round((learned / total) * 100);
            return (
                <div className="glass-panel p-5 rounded-2xl mb-8 flex items-center justify-between transition-all" dir="rtl">
                    <div>
                        <h3 className="text-sm font-bold text-slate-500 uppercase tracking-wider ar-text mb-1">مستوى التقدم</h3>
                        <p className="text-3xl font-extrabold text-slate-800">{learned} <span className="text-sm font-medium text-slate-400">/ {total} أتقنتهم</span></p>
                    </div>
                    <div className="relative w-20 h-20 drop-shadow-md">
                        <svg className="w-full h-full transform -rotate-90" viewBox="0 0 36 36">
                            <path className="text-slate-200" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" strokeWidth="3" />
                            <path className={`${colorClass} transition-all duration-1000 ease-out`} strokeDasharray={`${percentage}, 100`} d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" />
                        </svg>
                        <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-sm font-bold text-slate-700">
                            {percentage}%
                        </div>
                    </div>
                </div>
            );
        };

        const WordCard = ({ item, isLearned, toggleLearned }) => {
            const [isFlipped, setIsFlipped] = useState(false);

            return (
                <div className="relative group perspective-1000 w-full h-[24rem]">
                    <div className={`w-full h-full transition-all duration-700 transform-style-3d shadow-[0_8px_30px_rgb(0,0,0,0.04)] rounded-2xl ${isFlipped ? 'rotate-y-180' : ''}`}>
                        
                        {/* FRONT */}
                        <div className="absolute w-full h-full backface-hidden bg-white border border-slate-100 rounded-2xl p-5 flex flex-col cursor-pointer hover:shadow-lg transition-shadow" 
                             onClick={() => setIsFlipped(true)}>
                            <div className="flex justify-between items-start shrink-0" dir="rtl">
                                <span className="bg-blue-50 text-blue-600 text-xs font-bold px-3 py-1.5 rounded-lg uppercase tracking-wider ar-text">كلمة</span>
                                <button onClick={(e) => { e.stopPropagation(); toggleLearned(item.id); }} className={`p-2 rounded-full transition-colors ${isLearned ? 'bg-emerald-100 text-emerald-600' : 'bg-slate-50 text-slate-300 hover:bg-slate-100'}`}>
                                    <i data-lucide="check" className="w-5 h-5"></i>
                                </button>
                            </div>
                            
                            <div className="text-center mt-2 flex-grow flex flex-col justify-center overflow-y-auto front-scroll px-1 py-3">
                                <div className="flex flex-col justify-center items-center gap-3 mb-1">
                                    <h3 className="text-2xl font-bold text-slate-800 leading-tight">{colorizeArticles(item.ger)}</h3>
                                    <div className="flex items-center gap-2">
                                        <button onClick={(e) => playAudio(item.ger, e)} className="p-2 rounded-full bg-blue-50 text-blue-600 hover:bg-blue-100 transition-colors shadow-sm"><i data-lucide="volume-2" className="w-5 h-5"></i></button>
                                        <SpeechTester targetText={item.ger} />
                                    </div>
                                </div>
                                <div className="mt-4 space-y-1">
                                    <p className="text-slate-500 font-medium text-sm">{item.eng}</p>
                                    <p className="text-blue-600 font-bold ar-text text-lg" dir="rtl">{item.ar}</p>
                                </div>
                            </div>
                            
                            <div className="text-center text-xs text-slate-400 font-medium flex items-center justify-center gap-1 ar-text mt-2 shrink-0">
                                <i data-lucide="rotate-cw" className="w-3 h-3"></i> اضغط للأمثلة
                            </div>
                        </div>

                        <div className="absolute w-full h-full backface-hidden bg-gradient-to-br from-blue-600 to-indigo-700 text-white rounded-2xl p-5 shadow-lg flex flex-col cursor-pointer overflow-hidden"

                            <div className="mb-3 border-b border-white/20 pb-2 flex justify-between items-center shrink-0" dir="rtl">
                                <h4 className="font-bold text-white/90 text-sm tracking-wider ar-text">أمثلة سياقية</h4>
                                <i data-lucide="rotate-ccw" className="w-4 h-4 text-white/60"></i>
                            </div>
                            <div className="overflow-y-auto card-scroll flex-grow pr-2 pb-2">
                                <ul className="space-y-3">
                                    {item.s.map((sentence, idx) => (
                                        <li key={idx} className="text-sm bg-white/10 backdrop-blur-sm p-3 rounded-xl border border-white/5">
                                            <div className="flex items-start gap-2 mb-1.5">
                                                <button onClick={(e) => playAudio(sentence.g, e)} className="p-1 text-blue-200 hover:text-white shrink-0 mt-0.5"><i data-lucide="volume-2" className="w-4 h-4"></i></button>
                                                <span className="leading-relaxed" dangerouslySetInnerHTML={{ __html: sentence.g }}></span>
                                            </div>
                                            <div className="text-blue-200 text-xs italic ml-8 mb-1.5">{sentence.e}</div>
                                            <div className="text-amber-300 text-sm font-bold ar-text border-t border-white/10 pt-1.5 mt-1" dir="rtl">{sentence.a}</div>
                                        </li>
                                    ))}
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const ListRow = ({ item, isLearned, toggleLearned, colorTheme }) => {
            const [expanded, setExpanded] = useState(false);
            
            const themes = {

                amber: 'hover:border-amber-300 text-amber-600 bg-amber-50 text-amber-700',
                rose: 'hover:border-rose-300 text-rose-600 bg-rose-50 text-rose-700',
                teal: 'hover:border-teal-300 text-teal-600 bg-teal-50 text-teal-700',
            };
            const themeClass = themes[colorTheme] || themes.emerald;
            const textAccent = `text-${colorTheme}-600`;

            return (
                <div className={`bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden mb-4 transition-all duration-300 hover:shadow-md`} dir="ltr">
                    <div className="p-5 flex items-center justify-between cursor-pointer" onClick={() => setExpanded(!expanded)}>
                        <div className="flex items-center gap-4">
                            <button onClick={(e) => { e.stopPropagation(); toggleLearned(item.id); }} className={`p-2 rounded-full transition-colors ${isLearned ? `bg-${colorTheme}-100 ${textAccent}` : 'bg-slate-50 text-slate-300 hover:bg-slate-100'}`}>
                                <i data-lucide="check" className="w-5 h-5"></i>
                            </button>
                            <div>
                                <h3 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                                    {item.ger} 
                                    <button onClick={(e) => playAudio(item.ger, e)} className={`${textAccent} opacity-70 hover:opacity-100 transition-opacity`}><i data-lucide="volume-2" className="w-5 h-5"></i></button>
                                </h3>
                                <p className="text-sm text-slate-500 mt-1">{item.eng} <span className="mx-2 text-slate-300">|</span> <span className={`${textAccent} font-bold ar-text`} dir="rtl">{item.ar}</span></p>
                            </div>
                        </div>
                        <div className={`transform transition-transform duration-300 ${expanded ? 'rotate-180' : ''}`}>
                            <i data-lucide="chevron-down" className="w-6 h-6 text-slate-400"></i>
                        </div>
                    </div>
                    
                    <div className={`transition-all duration-500 overflow-hidden ${expanded ? 'max-h-[1000px] opacity-100' : 'max-h-0 opacity-0'}`}>
                        <div className="bg-slate-50 p-5 border-t border-slate-100">
                            <ul className="space-y-4">
                                {item.s && item.s.map((sentence, idx) => (
                                    <li key={idx} className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm group flex flex-col sm:flex-row gap-4 justify-between items-start">
                                        <div className="flex-1">
                                            <div className="flex items-start gap-3 mb-2">
                                                <button onClick={(e) => playAudio(sentence.g, e)} className={`mt-0.5 ${textAccent} bg-${colorTheme}-50 p-1.5 rounded-lg shrink-0`}><i data-lucide="volume-2" className="w-4 h-4"></i></button>
                                                <p className="text-slate-800 text-base font-medium leading-relaxed mt-1" dangerouslySetInnerHTML={{ __html: sentence.g }}></p>
                                            </div>
                                            <p className="text-slate-500 text-sm ml-10 mb-2">{sentence.e}</p>
                                            <div className={`ml-10 ${textAccent} text-base font-bold ar-text border-t border-slate-100 pt-2`} dir="rtl">{sentence.a}</div>
                                        </div>
                                        <div className="opacity-100 sm:opacity-0 group-hover:opacity-100 transition-opacity shrink-0 sm:mt-1 self-end sm:self-start bg-slate-50 p-1.5 rounded-full" dir="ltr">
                                            <SpeechTester targetText={sentence.g} />
                                        </div>
                                    </li>
                                ))}
                                {!item.s && <p className="text-slate-500 italic px-4">See main definitions for this phrase.</p>}
                            </ul>
                        </div>
                    </div>
                </div>
            );
        };

        const IrregularVerbRow = ({ item, isLearned, toggleLearned }) => {
            const [expanded, setExpanded] = useState(false);
            
            return (
                <div className="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden mb-4 transition-all duration-300 hover:shadow-md" dir="ltr">
                    <div className="p-5 flex items-center justify-between cursor-pointer" onClick={() => setExpanded(!expanded)}>
                        <div className="flex items-center gap-4">
                            <button onClick={(e) => { e.stopPropagation(); toggleLearned(item.id); }} className={`p-2 rounded-full transition-colors ${isLearned ? 'bg-emerald-100 text-emerald-600' : 'bg-slate-50 text-slate-300 hover:bg-slate-100'}`}>
                                <i data-lucide="check" className="w-5 h-5"></i>
                            </button>
                            <div>
                                <h3 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                                    {item.ger} 
                                    <button onClick={(e) => playAudio(item.ger, e)} className="text-emerald-600 opacity-70 hover:opacity-100 transition-opacity"><i data-lucide="volume-2" className="w-5 h-5"></i></button>
                                </h3>
                                <p className="text-sm text-slate-500 mt-1">{item.eng} <span className="mx-2 text-slate-300">|</span> <span className="text-emerald-600 font-bold ar-text" dir="rtl">{item.ar}</span></p>
                            </div>
                        </div>
                        <div className={`transform transition-transform duration-300 ${expanded ? 'rotate-180' : ''}`}>
                            <i data-lucide="chevron-down" className="w-6 h-6 text-slate-400"></i>
                        </div>
                    </div>
                    
                    <div className={`transition-all duration-500 overflow-hidden ${expanded ? 'max-h-[1000px] opacity-100' : 'max-h-0 opacity-0'}`}>
                        <div className="bg-slate-50 p-5 border-t border-slate-100">
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm relative group">
                                    <div className="text-xs font-bold text-emerald-500 uppercase tracking-widest mb-2 border-b border-slate-100 pb-1">Präsens (مضارع)</div>
                                    <div className="flex items-start gap-2 mb-2">
                                        <button onClick={(e) => playAudio(item.praesens, e)} className="text-emerald-600 bg-emerald-50 p-1.5 rounded-lg shrink-0"><i data-lucide="volume-2" className="w-4 h-4"></i></button>
                                        <p className="text-slate-800 text-sm font-medium leading-relaxed mt-1" dangerouslySetInnerHTML={{ __html: item.praesens }}></p>
                                    </div>
                                    <div className="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition-opacity"><SpeechTester targetText={item.praesens} /></div>
                                </div>
                                <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm relative group">
                                    <div className="text-xs font-bold text-amber-500 uppercase tracking-widest mb-2 border-b border-slate-100 pb-1">Präteritum (ماضي بسيط)</div>
                                    <div className="flex items-start gap-2 mb-2">
                                        <button onClick={(e) => playAudio(item.praeteritum, e)} className="text-amber-600 bg-amber-50 p-1.5 rounded-lg shrink-0"><i data-lucide="volume-2" className="w-4 h-4"></i></button>
                                        <p className="text-slate-800 text-sm font-medium leading-relaxed mt-1">{item.praeteritum}</p>
                                    </div>
                                    <div className="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition-opacity"><SpeechTester targetText={item.praeteritum} /></div>
                                </div>
                                <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm relative group">
                                    <div className="text-xs font-bold text-purple-500 uppercase tracking-widest mb-2 border-b border-slate-100 pb-1">Perfekt (ماضي تام)</div>
                                    <div className="flex items-start gap-2 mb-2">
                                        <button onClick={(e) => playAudio(item.perfekt, e)} className="text-purple-600 bg-purple-50 p-1.5 rounded-lg shrink-0"><i data-lucide="volume-2" className="w-4 h-4"></i></button>
                                        <p className="text-slate-800 text-sm font-medium leading-relaxed mt-1">{item.perfekt}</p>
                                    </div>
                                    <div className="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition-opacity"><SpeechTester targetText={item.perfekt} /></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- MAIN APP ---
        const App = () => {
            const [activeTab, setActiveTab] = useState('words');
            const [learnedItems, setLearnedItems] = useState(new Set());
            const [searchTerm, setSearchTerm] = useState('');
            const [expandedReview, setExpandedReview] = useState('rev-lernen'); // Default open review section

            useEffect(() => {
                lucide.createIcons();
            });

            const toggleLearned = (id) => {
                const newLearned = new Set(learnedItems);
                if (newLearned.has(id)) newLearned.delete(id);
                else newLearned.add(id);
                setLearnedItems(newLearned);
            };

            const totalWords = LEARNING_DATA.words.vhs_studium.length + LEARNING_DATA.words.beruf_lebenslauf.length + LEARNING_DATA.words.gehirn_lernen.length;
            const totalVerbs = LEARNING_DATA.verbs.length + LEARNING_DATA.irregularVerbs.length;
            const totalExp = LEARNING_DATA.expressions.length;
            const totalPrep = LEARNING_DATA.prepositions.length;
            const totalGrammar = LEARNING_DATA.grammar.length;
            const totalReview = LEARNING_DATA.review.reduce((acc, cat) => acc + cat.items.length, 0);
            const grandTotal = totalWords + totalVerbs + totalExp + totalPrep + totalGrammar + totalReview;

            const tabConfig = {
                words: { labelEn: 'Words', labelAr: 'الأسماء والكلمات', icon: 'book-open', color: 'blue' },
                verbs: { labelEn: 'Verbs', labelAr: 'الأفعال', icon: 'activity', color: 'emerald' },
                expressions: { labelEn: 'Expressions', labelAr: 'تعبيرات', icon: 'message-circle', color: 'amber' },
                prepositions: { labelEn: 'Prepositions', labelAr: 'حروف الجر', icon: 'link', color: 'rose' },
                grammar: { labelEn: 'Grammar', labelAr: 'القواعد الشاملة', icon: 'pen-tool', color: 'purple' },
                review: { labelEn: 'Review', labelAr: 'المراجعة الشاملة', icon: 'clipboard-check', color: 'teal' }
            };

            const activeColor = tabConfig[activeTab].color;

            return (
                <div className="h-screen flex flex-col bg-slate-50" dir="rtl">
                    {/* TOP NAVIGATION HEADER */}
                    <header className="w-full bg-slate-900 text-white shadow-xl z-50 shrink-0 relative overflow-hidden">
                        <div className={`absolute top-0 left-0 w-full h-1 bg-${activeColor}-500 transition-colors duration-500`}></div>
                        
                        <div className="flex justify-between items-center px-4 md:px-8 py-3 border-b border-slate-800">
                            <h1 className="text-xl md:text-2xl font-extrabold flex items-center gap-3 ar-text">
                                <span className={`bg-${activeColor}-500 p-2 rounded-xl transition-colors duration-500 shadow-lg`}>
                                    <i data-lucide="graduation-cap" className="w-5 h-5 md:w-6 md:h-6 text-white"></i>
                                </span>
                                ألماني B1+ (Spektrum K4)
                            </h1>

                            <div className="flex items-center gap-3" dir="ltr">
                                <div className="text-right hidden sm:block">
                                    <div className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Mastery</div>
                                    <div className={`text-sm font-extrabold text-${activeColor}-400 transition-colors`}>{grandTotal === 0 ? 0 : Math.round((learnedItems.size / grandTotal) * 100)}%</div>
                                </div>
                                <div className="relative w-10 h-10">
                                    <svg className="w-full h-full transform -rotate-90" viewBox="0 0 36 36">
                                        <path className="text-slate-800" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" strokeWidth="4" />
                                        <path className={`text-${activeColor}-500 transition-all duration-1000 ease-out`} strokeDasharray={`${grandTotal === 0 ? 0 : (learnedItems.size / grandTotal) * 100}, 100`} d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" strokeWidth="4" strokeLinecap="round" />
                                    </svg>
                                </div>
                            </div>
                        </div>

                        {/* Horizontal Navigation Tabs */}
                        <nav className="flex overflow-x-auto scrollbar-hide px-4 py-2 gap-2 snap-x">
                            {Object.entries(tabConfig).map(([key, tab]) => (
                                <button 
                                    key={key}
                                    onClick={() => { setActiveTab(key); setSearchTerm(''); }}
                                    className={`snap-center shrink-0 flex items-center gap-2 px-4 py-2.5 rounded-xl transition-all duration-300 font-bold ar-text group relative overflow-hidden ${activeTab === key ? `bg-${tab.color}-600 text-white shadow-md` : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}
                                >
                                    <i data-lucide={tab.icon} className={`w-5 h-5 ${activeTab === key ? 'text-white' : `text-${tab.color}-400 group-hover:text-${tab.color}-300`} transition-colors`}></i>
                                    <span className="text-sm whitespace-nowrap">{tab.labelAr}</span>
                                    {activeTab === key && <div className="absolute bottom-0 left-1/2 transform -translate-x-1/2 w-1/2 h-0.5 bg-white/50 rounded-t-full"></div>}
                                </button>
                            ))}
                        </nav>
                    </header>

                    {/* MAIN CONTENT AREA */}
                    <main className="flex-1 overflow-y-auto p-4 md:p-8 lg:p-12 relative" dir="ltr">
                        <div className={`fixed top-1/4 left-1/4 w-[50vw] h-[50vw] rounded-full bg-${activeColor}-200/20 blur-3xl -z-10 transition-colors duration-1000`}></div>
                        
                        <div className="max-w-7xl mx-auto">
                            
                            {activeTab !== 'grammar' && activeTab !== 'review' && (
                                <div className="flex flex-col md:flex-row gap-4 mb-10" dir="rtl">
                                    <div className="flex-1 relative group max-w-3xl mx-auto w-full">
                                        <div className={`absolute -inset-0.5 bg-gradient-to-r from-${activeColor}-400 to-${activeColor}-600 rounded-2xl blur opacity-20 group-hover:opacity-40 transition duration-500`}></div>
                                        <div className="relative">
                                            <i data-lucide="search" className="absolute right-4 top-1/2 transform -translate-y-1/2 text-slate-400 w-6 h-6"></i>
                                            <input 
                                                type="text" 
                                                placeholder="ابحث بالعربي أو الألماني..." 
                                                value={searchTerm}
                                                onChange={(e) => setSearchTerm(e.target.value)}
                                                className="w-full pr-14 pl-6 py-4 rounded-2xl border-none focus:outline-none focus:ring-4 focus:ring-blue-500/20 shadow-lg text-lg ar-text text-slate-700 font-medium"
                                            />
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'words' && <ProgressBar total={totalWords} learned={Array.from(learnedItems).filter(id => id.startsWith('w')).length} colorClass="text-blue-500" />}
                            {activeTab === 'verbs' && <ProgressBar total={totalVerbs} learned={Array.from(learnedItems).filter(id => id.startsWith('v') || id.startsWith('iv')).length} colorClass="text-emerald-500" />}
                            {activeTab === 'expressions' && <ProgressBar total={totalExp} learned={Array.from(learnedItems).filter(id => id.startsWith('e')).length} colorClass="text-amber-500" />}
                            {activeTab === 'prepositions' && <ProgressBar total={totalPrep} learned={Array.from(learnedItems).filter(id => id.startsWith('p')).length} colorClass="text-rose-500" />}
                            {activeTab === 'review' && <ProgressBar total={totalReview} learned={Array.from(learnedItems).filter(id => id.startsWith('r_')).length} colorClass="text-teal-500" />}

                            {/* TAB: WORDS */}
                            {activeTab === 'words' && (
                                <div className="space-y-12">
                                    <section>
                                        <h2 className="text-3xl font-extrabold text-slate-800 mb-6 flex items-center gap-3 ar-text" dir="rtl"><span className="bg-blue-100 p-2 rounded-xl text-blue-600"><i data-lucide="school" className="w-6 h-6"></i></span> التعليم والـ VHS (Studium & VHS)</h2>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-6">
                                            {LEARNING_DATA.words.vhs_studium.filter(w => w.ger.toLowerCase().includes(searchTerm.toLowerCase()) || w.eng.toLowerCase().includes(searchTerm.toLowerCase()) || w.ar.includes(searchTerm)).map(word => (
                                                <WordCard key={word.id} item={word} isLearned={learnedItems.has(word.id)} toggleLearned={toggleLearned} />
                                            ))}
                                        </div>
                                    </section>

                                    <section>
                                        <h2 className="text-3xl font-extrabold text-slate-800 mb-6 flex items-center gap-3 ar-text" dir="rtl"><span className="bg-blue-100 p-2 rounded-xl text-blue-600"><i data-lucide="briefcase" className="w-6 h-6"></i></span> السيرة الذاتية والشغل (Lebenslauf & Beruf)</h2>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-6">
                                            {LEARNING_DATA.words.beruf_lebenslauf.filter(w => w.ger.toLowerCase().includes(searchTerm.toLowerCase()) || w.eng.toLowerCase().includes(searchTerm.toLowerCase()) || w.ar.includes(searchTerm)).map(word => (
                                                <WordCard key={word.id} item={word} isLearned={learnedItems.has(word.id)} toggleLearned={toggleLearned} />
                                            ))}
                                        </div>
                                    </section>
                                    
                                    <section>
                                        <h2 className="text-3xl font-extrabold text-slate-800 mb-6 flex items-center gap-3 ar-text" dir="rtl"><span className="bg-blue-100 p-2 rounded-xl text-blue-600"><i data-lucide="brain" className="w-6 h-6"></i></span> الدماغ والتعلم (Gehirn & Lernen)</h2>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-6">
                                            {LEARNING_DATA.words.gehirn_lernen.filter(w => w.ger.toLowerCase().includes(searchTerm.toLowerCase()) || w.eng.toLowerCase().includes(searchTerm.toLowerCase()) || w.ar.includes(searchTerm)).map(word => (
                                                <WordCard key={word.id} item={word} isLearned={learnedItems.has(word.id)} toggleLearned={toggleLearned} />
                                            ))}
                                        </div>
                                    </section>
                                </div>
                            )}

                            {/* TAB: VERBS */}
                            {activeTab === 'verbs' && (
                                <div>
                                    <h2 className="text-3xl font-extrabold text-slate-800 mb-8 flex items-center gap-3 ar-text" dir="rtl">
                                        <span className="bg-emerald-100 p-2 rounded-xl text-emerald-600"><i data-lucide="activity" className="w-6 h-6"></i></span>
                                        الأفعال الأساسية
                                    </h2>
                                    <div className="space-y-4 mb-12">
                                        {LEARNING_DATA.verbs.filter(v => v.ger.toLowerCase().includes(searchTerm.toLowerCase()) || v.eng.toLowerCase().includes(searchTerm.toLowerCase()) || v.ar.includes(searchTerm)).map(verb => (
                                            <ListRow key={verb.id} item={verb} isLearned={learnedItems.has(verb.id)} toggleLearned={toggleLearned} colorTheme="emerald" />
                                        ))}
                                    </div>

                                    <h2 className="text-3xl font-extrabold text-slate-800 mb-8 flex items-center gap-3 ar-text" dir="rtl">
                                        <span className="bg-emerald-100 p-2 rounded-xl text-emerald-600"><i data-lucide="alert-circle" className="w-6 h-6"></i></span>
                                        الأفعال الشاذة وتصريفاتها (Unregelmäßig)
                                    </h2>
                                    <div className="space-y-4">
                                        {LEARNING_DATA.irregularVerbs.filter(v => v.ger.toLowerCase().includes(searchTerm.toLowerCase()) || v.eng.toLowerCase().includes(searchTerm.toLowerCase()) || v.ar.includes(searchTerm)).map(verb => (
                                            <IrregularVerbRow key={verb.id} item={verb} isLearned={learnedItems.has(verb.id)} toggleLearned={toggleLearned} />
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* TAB: EXPRESSIONS */}
                            {activeTab === 'expressions' && (
                                <div dir="rtl">
                                    <h2 className="text-3xl font-extrabold text-slate-800 mb-8 flex items-center gap-3 ar-text">
                                        <span className="bg-amber-100 p-2 rounded-xl text-amber-600"><i data-lucide="message-circle" className="w-6 h-6"></i></span>
                                        تعبيرات ومصطلحات للتعلم والمحادثة
                                    </h2>
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                        {LEARNING_DATA.expressions.filter(e => e.ger.toLowerCase().includes(searchTerm.toLowerCase()) || e.eng.toLowerCase().includes(searchTerm.toLowerCase()) || e.ar.includes(searchTerm)).map(exp => (
                                            <div key={exp.id} className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm relative group hover:shadow-xl hover:border-amber-200 transition-all duration-300">
                                                <button onClick={() => toggleLearned(exp.id)} className={`absolute top-5 left-5 p-2 rounded-full transition-colors z-10 ${learnedItems.has(exp.id) ? 'bg-amber-100 text-amber-600' : 'bg-slate-50 text-slate-300 hover:bg-slate-100'}`}>
                                                    <i data-lucide="check" className="w-5 h-5"></i>
                                                </button>
                                                <span className="inline-block bg-amber-50 text-amber-600 px-3 py-1 rounded-lg text-xs font-bold mb-4 ar-text border border-amber-100">{exp.type}</span>
                                                <div className="flex items-start gap-3 mb-3" dir="ltr">
                                                    <div className="flex flex-col gap-2 shrink-0">
                                                        <button onClick={(e) => playAudio(exp.ger, e)} className="text-amber-500 bg-amber-50 p-2 rounded-xl hover:bg-amber-100 transition-colors"><i data-lucide="volume-2" className="w-5 h-5"></i></button>
                                                        <div className="bg-slate-50 rounded-full p-1"><SpeechTester targetText={exp.ger} /></div>
                                                    </div>
                                                    <div>
                                                        <h3 className="text-xl font-extrabold text-slate-800 leading-tight mt-1">"{exp.ger}"</h3>
                                                    </div>
                                                </div>
                                                
                                                <div className="bg-slate-50 rounded-2xl p-4 mt-4 border border-slate-100">
                                                    <p className="text-slate-500 font-medium text-sm mb-2" dir="ltr">{exp.eng}</p>
                                                    <p className="text-amber-700 font-extrabold text-xl mb-4 ar-text">{exp.ar}</p>
                                                    <div className="text-sm text-slate-600 flex gap-2 items-start pt-3 border-t border-slate-200">
                                                        <i data-lucide="info" className="w-5 h-5 text-amber-400 mt-0.5 shrink-0"></i>
                                                        <span className="ar-text leading-relaxed">{exp.context}</span>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* TAB: PREPOSITIONS */}
                            {activeTab === 'prepositions' && (
                                <div>
                                    <h2 className="text-3xl font-extrabold text-slate-800 mb-8 flex items-center gap-3 ar-text" dir="rtl">
                                        <span className="bg-rose-100 p-2 rounded-xl text-rose-600"><i data-lucide="link" className="w-6 h-6"></i></span> 
                                        حروف الجر والأفعال المرتبطة بها (Verben mit Präpositionen)
                                    </h2>
                                    <div className="space-y-4">
                                        {LEARNING_DATA.prepositions.filter(p => p.ger.toLowerCase().includes(searchTerm.toLowerCase()) || p.eng.toLowerCase().includes(searchTerm.toLowerCase()) || p.ar.includes(searchTerm)).map(prep => (
                                            <ListRow key={prep.id} item={prep} isLearned={learnedItems.has(prep.id)} toggleLearned={toggleLearned} colorTheme="rose" />
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* TAB: GRAMMAR */}
                            {activeTab === 'grammar' && (
                                <div dir="rtl">
                                    <div className="bg-gradient-to-br from-purple-700 to-indigo-800 text-white p-10 rounded-3xl shadow-xl mb-10 relative overflow-hidden">
                                        <i data-lucide="pen-tool" className="absolute -right-4 -bottom-4 w-48 h-48 text-white opacity-10 transform rotate-12"></i>
                                        <div className="relative z-10">
                                            <h2 className="text-4xl font-extrabold mb-3 ar-text">القواعد النحوية الشاملة (B1+)</h2>
                                            <p className="text-purple-200 ar-text text-lg max-w-2xl">ملخص لأهم القواعد المذكورة (التعبير عن السبب، الهدف، وتحديد الأداة Genus).</p>
                                        </div>
                                    </div>

                                    <div className="grid gap-8">
                                        {LEARNING_DATA.grammar.map((gram, idx) => (
                                            <div key={idx} className="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden hover:shadow-lg transition-shadow">
                                                <div className="p-8 border-b border-slate-50 bg-slate-50/50 flex items-start gap-4">
                                                    <div className="bg-purple-100 p-3 rounded-2xl text-purple-600 shrink-0 mt-1">
                                                        <i data-lucide="braces" className="w-6 h-6"></i>
                                                    </div>
                                                    <div>
                                                        <h3 className="text-2xl font-extrabold text-slate-800 ar-text mb-2">{gram.title}</h3>
                                                        <p className="text-base text-slate-600 ar-text leading-relaxed">{gram.desc}</p>
                                                    </div>
                                                </div>
                                                
                                                <div className="p-8">
                                                    <div className="bg-slate-900 text-purple-300 font-mono text-base p-5 rounded-2xl mb-8 shadow-inner flex items-center gap-3 overflow-x-auto border border-slate-800" dir="ltr">
                                                        <i data-lucide="code" className="text-slate-500 w-5 h-5 shrink-0"></i> {gram.structure}
                                                    </div>
                                                    
                                                    <h4 className="font-bold text-slate-400 mb-4 text-sm tracking-widest uppercase ar-text">أمثلة للتوضيح:</h4>
                                                    <ul className="space-y-4">
                                                        {gram.examples.map((ex, i) => (
                                                            <li key={i} className="bg-purple-50/50 p-5 rounded-2xl border border-purple-100">
                                                                <div className="flex gap-4 items-center mb-3" dir="ltr">
                                                                    <button onClick={(e) => playAudio(ex.g, e)} className="text-purple-500 bg-white p-2 rounded-xl shadow-sm hover:bg-purple-50 transition-colors shrink-0"><i data-lucide="volume-2" className="w-5 h-5"></i></button>
                                                                    <span className="text-slate-800 text-lg font-medium" dangerouslySetInnerHTML={{ __html: ex.g }}></span>
                                                                </div>
                                                                <div className="text-purple-700 font-bold ar-text border-t border-purple-200/50 pt-3 mt-3">{ex.a}</div>
                                                            </li>
                                                        ))}
                                                    </ul>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* TAB: REVIEW (NEW) */}
                            {activeTab === 'review' && (
                                <div dir="rtl" className="pb-10">
                                    <div className="flex flex-col md:flex-row gap-4 mb-10" dir="rtl">
                                        <div className="flex-1 relative group max-w-3xl mx-auto w-full">
                                            <div className={`absolute -inset-0.5 bg-gradient-to-r from-teal-400 to-teal-600 rounded-2xl blur opacity-20 group-hover:opacity-40 transition duration-500`}></div>
                                            <div className="relative">
                                                <i data-lucide="search" className="absolute right-4 top-1/2 transform -translate-y-1/2 text-slate-400 w-6 h-6"></i>
                                                <input 
                                                    type="text" 
                                                    placeholder="ابحث في المراجعة الشاملة..." 
                                                    value={searchTerm}
                                                    onChange={(e) => setSearchTerm(e.target.value)}
                                                    className="w-full pr-14 pl-6 py-4 rounded-2xl border-none focus:outline-none focus:ring-4 focus:ring-teal-500/20 shadow-lg text-lg ar-text text-slate-700 font-medium"
                                                />
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-gradient-to-br from-teal-700 to-emerald-900 text-white p-10 rounded-3xl shadow-xl mb-10 relative overflow-hidden">
                                        <i data-lucide="clipboard-check" className="absolute -left-4 -top-4 w-48 h-48 text-white opacity-10 transform -rotate-12"></i>
                                        <div className="relative z-10 text-center">
                                            <h2 className="text-4xl font-extrabold mb-4 ar-text">المراجعة الشاملة +130 جملة وتعبير</h2>
                                            <p className="text-teal-100 ar-text text-lg max-w-3xl mx-auto leading-relaxed">كل التعبيرات والنصائح وعمليات التعلم والمواقف والجمل النحوية التي وردت في المنهج (Kapitel 4)، مترجمة وجاهزة للتدريب والمراجعة الشاملة.</p>
                                        </div>
                                    </div>

                                    <div className="space-y-6">
                                        {LEARNING_DATA.review.map((cat, cIdx) => (
                                            <div key={cIdx} className="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden transition-all duration-300">
                                                <button 
                                                    className={`w-full p-6 flex items-center justify-between text-right transition-colors ${expandedReview === cat.catId ? 'bg-teal-50' : 'hover:bg-slate-50'}`}
                                                    onClick={() => setExpandedReview(expandedReview === cat.catId ? null : cat.catId)}
                                                >
                                                    <h3 className="text-2xl font-bold text-slate-800 ar-text flex items-center gap-3">
                                                        <span className={`w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold ${expandedReview === cat.catId ? 'bg-teal-600 text-white' : 'bg-slate-200 text-slate-600'}`}>{cIdx + 1}</span>
                                                        {cat.title}
                                                    </h3>
                                                    <i data-lucide="chevron-down" className={`w-6 h-6 text-slate-400 transform transition-transform duration-300 ${expandedReview === cat.catId ? 'rotate-180 text-teal-600' : ''}`}></i>
                                                </button>
                                                
                                                <div className={`transition-all duration-500 ease-in-out overflow-hidden ${expandedReview === cat.catId ? 'max-h-[5000px] opacity-100' : 'max-h-0 opacity-0'}`}>
                                                    <div className="p-6 border-t border-slate-100 bg-slate-50/50">
                                                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                                                            {cat.items.filter(item => item.g.toLowerCase().includes(searchTerm.toLowerCase()) || item.e.toLowerCase().includes(searchTerm.toLowerCase()) || item.a.includes(searchTerm)).map((item) => (
                                                                <div key={item.id} className="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm relative group hover:shadow-md hover:border-teal-200 transition-all duration-300" dir="ltr">
                                                                    <button onClick={() => toggleLearned(item.id)} className={`absolute top-4 right-4 p-2 rounded-full transition-colors z-10 ${learnedItems.has(item.id) ? 'bg-teal-100 text-teal-600' : 'bg-slate-50 text-slate-300 hover:bg-slate-100'}`}>
                                                                        <i data-lucide="check" className="w-5 h-5"></i>
                                                                    </button>
                                                                    <div className="flex items-start gap-3 mb-3 pr-10">
                                                                        <div className="flex flex-col gap-2 shrink-0">
                                                                            <button onClick={(e) => playAudio(item.g, e)} className="text-teal-500 bg-teal-50 p-2 rounded-xl hover:bg-teal-100 transition-colors"><i data-lucide="volume-2" className="w-5 h-5"></i></button>
                                                                            <div className="bg-slate-50 rounded-full p-1"><SpeechTester targetText={item.g} /></div>
                                                                        </div>
                                                                        <h3 className="text-lg font-bold text-slate-800 leading-relaxed mt-1" dangerouslySetInnerHTML={{ __html: item.g }}></h3>
                                                                    </div>
                                                                    <div className="pl-12 space-y-2">
                                                                        <p className="text-slate-500 text-sm">{item.e}</p>
                                                                        <p className="text-teal-700 font-bold text-lg ar-text border-t border-slate-100 pt-2" dir="rtl">{item.a}</p>
                                                                    </div>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
