                            { de: "Der Film handelt von dem Zweiten Weltkrieg.", en: "The movie is about the Second World War.", ar: "الفيلم بيتكلم عن الحرب العالمية التانية." },
                            { de: "Wovon hast du heute Nacht geträumt?", en: "What did you dream about last night?", ar: "إنت حلمت بإيه امبارح بالليل؟" }
                        ]
                    },
                    {
                        title: "2.2 حروف جر تأخذ حالة الجر (zu + Dativ: gehören / zählen / gratulieren)",
                        items: [

                            { de: "Spanien zählt zu den beliebtesten Urlaubsländern.", en: "Spain counts among the most popular vacation countries.", ar: "إسبانيا بتتعد من أكتر البلاد المحبوبة في الإجازات." },

                            { de: "Er zählt zu meinen besten Freunden.", en: "He counts as one of my best friends.", ar: "هو بيعتبر من أعز أصحابي." },

            {
                title: "3. نصوص القراءة (Reading Texts / Lesetexte)",
                subsections: [
                    {
                        title: "3.1 تقرير ماركوس (Markus’ Report – Markus' Bericht)",
                        items: [
                            { de: "Ich heiße Markus und ich bin mit meinem Leben im Allgemeinen zufrieden.", en: "My name is Markus and I am generally satisfied with my life.", ar: "اسمي ماركوس وأنا راضي عن حياتي بشكل عام." },
                            { de: "Montags bis freitags stehe ich um 7.00 Uhr auf, gegen 8.00 Uhr fahre ich mit dem Auto ins Büro.", en: "Mondays to Fridays I get up at 7:00 a.m., around 8:00 a.m. I drive to the office by car.", ar: "من الاتنين للجمعة بصحى الساعة 7 الصبح، وحوالي الساعة 8 بروح المكتب بالعربية." },
                            { de: "Das dauert normalerweise 15 Minuten, aber an drei Tagen in der Woche brauche ich 30 Minuten oder länger.", en: "That normally takes 15 minutes, but on three days of the week I need 30 minutes or longer.", ar: "الموضوع بياخد عادة 15 دقيقة، بس تلات أيام في الأسبوع باخد 30 دقيقة أو أكتر." },
                            { de: "Dann stehe ich im Stau und ärgere mich.", en: "Then I stand in a traffic jam and get annoyed.", ar: "ساعتها بقف في الزحمة وبتعصب." },
                            { de: "Ich arbeite als Redakteur bei einem großen Verlag.", en: "I work as an editor at a large publishing house.", ar: "أنا بشتغل محرر في دار نشر كبيرة." },
                            { de: "Der Verlag befindet sich in einem Hochhaus in Frankfurt, in der 20. und 21. Etage.", en: "The publishing house is located in a high-rise building in Frankfurt, on the 20th and 21st floors.", ar: "دار النشر موجودة في ناطحة سحاب في فرانكفورت، في الدور العشرين والواحد وعشرين." },
                            { de: "Im Gebäude muss ich meistens ein paar Minuten auf den Fahrstuhl warten.", en: "In the building, I usually have to wait a few minutes for the elevator.", ar: "في المبنى بضطر غالباً أستنى الأسانسير كام دقيقة." },
                            { de: "Meine Arbeitszeit beginnt um 9.00 Uhr.", en: "My working time begins at 9:00 a.m.", ar: "وقت شغلي بيبدأ الساعة 9 الصبح." },
                            { de: "Zuerst beantworte ich meine E-Mails, danach lese ich Dokumente und Manuskripte.", en: "First I answer my emails, after that I read documents and manuscripts.", ar: "أول حاجة برد على إيميلاتي، وبعدين بقرا الورق والمخطوطات." },
                            { de: "Jeden Mittwoch um 9.00 Uhr haben wir eine Besprechung.", en: "Every Wednesday at 9:00 a.m. we have a meeting.", ar: "كل يوم أربع الساعة 9 الصبح عندنا اجتماع." },
                            { de: "In der Sitzung reden wir über Projekte, lösen kleinere Probleme oder sammeln Ideen.", en: "In the meeting we talk about projects, solve minor problems or collect ideas.", ar: "في الاجتماع بنتكلم عن المشاريع، بنحل المشاكل الصغيرة أو بنجمع أفكار." },
                            { de: "Der Kampf auf dem Buchmarkt ist hart.", en: "The battle in the book market is tough.", ar: "المنافسة في سوق الكتب شرسة جداً." },
                            { de: "Zwischen 12.30 und 13.15 Uhr mache ich Mittagspause.", en: "Between 12:30 and 1:15 p.m. I take my lunch break.", ar: "بين الساعة 12:30 و1:15 الظهر باخد بريك الغدا." },
                            { de: "Ich gehe meistens mit einer Kollegin in ein Fast-Food-Restaurant, manchmal esse ich nur ein Sandwich.", en: "I usually go to a fast-food restaurant with a female colleague, sometimes I only eat a sandwich.", ar: "غالباً بروح مطعم فاست فود مع زميلتي، وساعات باكل ساندوتش بس." },
                            { de: "Am interessantesten finde ich meine Arbeit, wenn ich mit Autoren sprechen kann oder wenn ich an einer Konferenz teilnehme.", en: "I find my work most interesting when I can speak with authors or when I participate in a conference.", ar: "أكتر حاجة ممتعة في شغلي لما بتكلم مع المؤلفين أو لما بحضر مؤتمر." },
                            { de: "Nach der Arbeit gehe ich ins Fitnessstudio und dann nach Hause.", en: "After work I go to the gym and then home.", ar: "بعد الشغل بروح الجيم وبعدين بروح على البيت." },
                            { de: "Ich lese auch zu Hause viel oder ich sehe abends fern.", en: "I also read a lot at home or I watch TV in the evening.", ar: "في البيت كمان بقرا كتير أو بتفرج على التلفزيون بالليل." },
                            { de: "Ab und zu muss ich auch meine Wohnung aufräumen oder Wäsche waschen.", en: "From time to time I also have to clean up my apartment or wash laundry.", ar: "من وقت للتاني بضطر أروق شقتي أو أغسل الهدوم." },
                            { de: "Das gehört nicht zu meinen Lieblingstätigkeiten.", en: "That does not belong to my favorite activities.", ar: "ودي مش من الحاجات اللي بحب أعملها." }
                        ]
                    },
                    {
                        title: "3.2 معلومات عن ليني (Information about Leni – Informationen über Leni)",
                        items: [
                            { de: "Leni ist Studentin an der Universität Greifswald.", en: "Leni is a student at the University of Greifswald.", ar: "ليني طالبة في جامعة جرايفسفالد." },
                            { de: "An der Universität besucht sie Vorlesungen und Seminare.", en: "At the university she attends lectures and seminars.", ar: "في الجامعة بتحضر محاضرات وسكاشن." },
                            { de: "Die Studenten arbeiten oft in Gruppen und müssen die Ergebnisse ihrer Gruppenprojekte präsentieren.", en: "The students often work in groups and have to present the results of their group projects.", ar: "الطلبة غالباً بيشتغلوا في مجموعات ولازم يعرضوا نتايج مشاريعهم الجماعية." },
                            { de: "In den Pausen spricht sie mit Kommilitonen oder sie isst etwas in der Mensa.", en: "In the breaks she speaks with fellow students or she eats something in the cafeteria.", ar: "في البريك بتتكلم مع زمايلها أو بتاكل حاجة في كافيتريا الجامعة (المنزا)." },
                            { de: "Leni schaut auch regelmäßig auf ihr Smartphone und kontrolliert, ob sie Nachrichten von Freunden hat.", en: "Leni also regularly looks at her smartphone and checks whether she has messages from friends.", ar: "ليني كمان بتبص دايماً في موبايلها وتتأكد لو عندها رسايل من أصحابها." },
                            { de: "Ihr Freund studiert in Berlin. Mit ihm telefoniert sie sehr oft.", en: "Her boyfriend studies in Berlin. She talks on the phone with him very often.", ar: "حبيبها بيدرس في برلين. وبتكلمه في التليفون كتير جداً." },
                            { de: "Abends lernt sie für Prüfungen oder trifft sich mit Freunden.", en: "In the evenings she studies for exams or meets with friends.", ar: "بالليل بتذاكر للامتحانات أو بتخرج مع أصحابها." },
                            { de: "Dann kauft sie ein paar Lebensmittel ein und kocht zusammen mit ihren Freunden.", en: "Then she buys a few groceries and cooks together with her friends.", ar: "وبعدين بتشتري شوية طلبات وتطبخ مع أصحابها." },
                            { de: "Leni ärgert sich manchmal über die Dozenten, vor allem, wenn sie eine schlechte Note bekommt.", en: "Leni sometimes gets annoyed with the lecturers, especially when she gets a bad grade.", ar: "ليني ساعات بتتضايق من الدكاترة (المعيدين)، بالذات لما بتجيب درجة وحشة." },
                            { de: "Aber die meisten Studienfächer mag sie.", en: "But she likes most subjects of study.", ar: "بس هي بتحب معظم مواد الدراسة." },
                            { de: "Leni wohnt in einer netten Wohngemeinschaft und muss nur einmal im Monat das Bad und die Küche sauber machen.", en: "Leni lives in a nice shared apartment and only has to clean the bathroom and the kitchen once a month.", ar: "ليني ساكنة في سكن مشترك (شقة مع ناس) لطيف، ومابتضطرش تنظف الحمام والمطبخ غير مرة واحدة في الشهر." }
                        ]
                    }
                ]

            {
                title: "4. مقالات ونقاشات (Articles & Discussions / Artikel & Diskussionen)",
                subsections: [
                    {
                        title: "4.1 الرضا عن الحياة اليومية في ألمانيا (Alltagszufriedenheit in Deutschland)",
                        items: [
                            { de: "Eine Umfrage zur Alltagszufriedenheit in Deutschland ergab, dass 76 Prozent der Deutschen mit ihrem Alltag zufrieden sind.", en: "A survey on everyday life satisfaction in Germany showed that 76 percent of Germans are satisfied with their everyday life.", ar: "استطلاع رأي عن الرضا في الحياة اليومية في ألمانيا وضح إن 76٪ من الألمان راضيين عن حياتهم اليومية." },
                            { de: "Besonders wichtig fanden die Befragten, dass der Alltag abwechslungsreich ist.", en: "The respondents found it particularly important that everyday life is varied.", ar: "الناس اللي شاركوا في الاستطلاع شافوا إن الأهم هو إن الروتين اليومي يكون فيه تنوع." },
                            { de: "Außerdem spielt das Gefühl, sein Leben selbst bestimmen zu können, eine wichtige Rolle.", en: "In addition, the feeling of being able to determine one's own life plays an important role.", ar: "كمان إحساس إن الواحد يقدر يحدد شكل حياته بنفسي بيلعب دور مهم." },
                            { de: "Einen großen Einfluss auf die Zufriedenheit haben auch eine sinnvolle Tätigkeit und die Anerkennung von anderen Menschen.", en: "A meaningful occupation and the recognition of other people also have a great influence on satisfaction.", ar: "كمان الشغل اللي ليه معنى وتقدير الناس ليه تأثير كبير على الرضا." },
                            { de: "Überraschenderweise liegen materielle Aspekte wie die finanzielle Situation der Umfrageteilnehmer nicht auf den vorderen Plätzen, sie kamen nur auf Platz neun.", en: "Surprisingly, material aspects like the financial situation of the survey participants do not lie in the top spots; they only came in ninth place.", ar: "الغريب إن الجوانب المادية زي الحالة المالية للمشاركين ماجاتش في المراكز الأولى، دي جات في المركز التاسع بس." },
                            { de: "Zu den Dingen, die die Deutschen im Alltag nerven, gehören ungeliebte Tätigkeiten im Haushalt, Verspätungen bei öffentlichen Verkehrsmitteln und Staus.", en: "Among the things that annoy Germans in everyday life are disliked household chores, delays in public transportation, and traffic jams.", ar: "من الحاجات اللي بتعصب الألمان في حياتهم اليومية: شغل البيت اللي مابيحبوش يعملوه، تأخير المواصلات العامة، والزحمة." }
                        ]
                    },
                    {
                        title: "4.2 الزعل والفرح (Ärgern und Freude – Annoyance and Joy)",
                        items: [
                            { de: "Hallo zusammen! Worüber ärgert ihr euch im Alltag am meisten?", en: "Hello everyone! What do you get annoyed about the most in everyday life?", ar: "أهلاً يا جماعة! إيه أكتر حاجة بتعصبكم في يومكم؟" },
                            { de: "Ich ärgere mich am meisten über Staus und andere Autofahrer.", en: "I mostly get annoyed about traffic jams and other drivers.", ar: "أكتر حاجة بتضايقني الزحمة والسواقين التانيين." },
                            { de: "Mich nervت es wirklich, wenn ich im Stau stehen muss.", en: "It really annoys me when I have to stand in a traffic jam.", ar: "بجد بتعصب جداً لما بضطر أقف في الزحمة." },
                            { de: "Das verstehe ich gut. Ich ärgere mich oft über Hausarbeiten wie Bügeln und Staubsaugen.", en: "I often get annoyed about housework like ironing and vacuuming.", ar: "فاهمك جداً. أنا غالباً بتضايق من شغل البيت زي الكوي والكنس بالمكنسة." },
                            { de: "Ich mag es auch nicht, wenn es zu viel Bürokratie im Alltag gibt.", en: "I also don't like it when there is too much bureaucracy in everyday life.", ar: "وأنا كمان مابحبش لما بيكون فيه روتين (بيروقراطية) كتير في الحياة اليومية." },
                            { de: "Mich nervت Werbung im Internet extrem.", en: "Internet ads annoy me extremely.", ar: "الإعلانات اللي على النت بتعصبني لأقصى درجة." },
                            { de: "Außerdem ärgere ich mich, wenn ich lange an der Supermarktkasse warten muss.", en: "Besides, I get annoyed when I have to wait a long time at the supermarket checkout.", ar: "كمان بتضايق لما بضطر أستنى كتير على الكاشير في السوبر ماركت." },
                            { de: "Ja, das ewige Warten ist furchtbar. Schlechter Service beim Einkaufen oder in Restaurants ärgert mich auch manchmal.", en: "Yes, the endless waiting is terrible. Bad service when shopping or in restaurants also annoys me sometimes.", ar: "أيوه، الانتظار اللي مابيخلصش ده فظيع. الخدمة السيئة وقت الشرا أو في المطاعم بتضايقني أنا كمان ساعات." },
                            { de: "Aber lasست uns über schöne Dinge sprechen. Worüber freut ihr euch im Alltag?", en: "But let's talk about nice things. What makes you happy in everyday life?", ar: "بس خلونا نتكلم عن الحاجات الحلوة. إيه اللي بيفرحكم في يومكم؟" },
                            { de: "Für mich ist es sehr wichtig, dass ich Zeit für mich selbst habe.", en: "For me it is very important that I have time for myself.", ar: "بالنسبة لي مهم جداً إن يكون عندي وقت لنفسي." },
                            { de: "Und ich freue mich sehr über kleine Komplimente.", en: "And I am very happy about small compliments.", ar: "وأنا بفرح جداً بالمجاملات البسيطة." },
                            { de: "Ich freue mich, wenn die öffentlichen Verkehrsmittel pünktlich sind und die Straßen leer sind.", en: "I am happy when public transport is punctual and the streets are empty.", ar: "بفرح لما المواصلات العامة تيجي في ميعادها وتكون الشوارع فاضية." },
                            { de: "Gutes Essen mit anderen zu kochen, finde ich auch super.", en: "Cooking good food with others I also find super.", ar: "إني أطبخ أكل حلو مع ناس تانية، دي حاجة بشوفها ممتازة." },
                            { de: "Kleine Erfolge im Beruf sind für mich sehr wichtig.", en: "Small successes at work are very important to me.", ar: "النجاحات الصغيرة في الشغل مهمة جداً بالنسبة لي." },
                            { de: "Neue Freunde in sozialen Netzwerken finde ich nicht so wichtig, aber ich freue mich, wenn ich mir neue Kleidung kaufen kann.", en: "I don't find new friends on social networks so important, but I am happy when I can buy myself new clothes.", ar: "أصحاب جداد على السوشيال ميديا مش حاجة مهمة أوي بالنسبة لي، بس بفرح لما أقدر أشتري لنفسي لبس جديد." },
                            { de: "Ich freue mich über nette Kollegen und interessante, abwechslungsreiche Aufgaben bei der Arbeit.", en: "I am happy about nice colleagues and interesting, varied tasks at work.", ar: "بفرح بالزمايل اللطاف والمهام اللي فيها تنوع واهتمام في الشغل." },
                            { de: "Das stimmt, nette Leute sind wichtig. Ich freue mich auch, wenn ich beim Einkaufen etwas sparen kann.", en: "That's right, nice people are important. I am also happy when I can save something when shopping.", ar: "ده حقيقي، الناس اللطيفة مهمة. أنا كمان بفرح لما أقدر أوفر شوية فلوس وأنا بشتري حاجات." },
                            { de: "Aber am meisten freue ich mich über die Zeit mit Freunden und der Familie.", en: "But most of all I am happy about time with friends and family.", ar: "بس أكتر حاجة بتفرحني بجد هي الوقت اللي بقضيه مع أصحابي وعيلتي." }
                        ]
                    },
                    {
                        title: "4.3 مقابلة عن وقت الفراغ (Freizeit-Interview – Leisure Interview)",
                        items: [
                            { de: "Was machst du in deiner Freizeit am liebsten?", en: "What do you like doing most in your free time?", ar: "بتحب تعمل إيه أكتر حاجة في وقت فراغك؟" },
                            { de: "Am liebsten lese ich ein gutes Buch oder gehe in der Natur spazieren.", en: "I like reading a good book or taking a walk in nature the most.", ar: "أكتر حاجة بحبها إني أقرا كتاب حلو أو أتمشى في الطبيعة." },
                            { de: "Und wie lange siehst du täglich fern?", en: "And how long do you watch TV daily?", ar: "وبتتفرج على التلفزيون قد إيه كل يوم؟" },
                            { de: "Ich sehe ungefähr eine Stunde pro Tag fern, meistens nur die Nachrichten oder eine spannende Serie.", en: "I watch TV for about an hour a day, mostly just the news or an exciting series.", ar: "بتفرج حوالي ساعة في اليوم، غالباً بس الأخبار أو مسلسل مشوق." },
                            { de: "Auf welches Gerät kannst du in deiner Freizeit nicht mehr verzichten?", en: "Which device can you no longer do without in your free time?", ar: "إيه الجهاز اللي ماتقدرش تستغنى عنه في وقت فراغك؟" },
                            { de: "Ganz klar auf mein Smartphone. Ich brauche es, um Musik zu hören und mit Freunden zu schreiben.", en: "Definitely my smartphone. I need it to listen to music and text with friends.", ar: "أكيد الموبايل بتاعي. بحتاجه عشان أسمع مزيكا وأشات مع أصحابي." },
                            { de: "Wie oft triffst du dich mit Freunden, Bekannten oder Verwandten?", en: "How often do you meet with friends, acquaintances, or relatives?", ar: "بتتقابل مع أصحابك أو معارفك أو قرايبك كل قد إيه؟" },
                            { de: "Wir treffen uns meistens am Wochenende, also ungefähr ein- oder zweimal pro Woche.", en: "We usually meet on the weekend, so about once or twice a week.", ar: "غالباً بنتقابل في الويك إند، يعني تقريباً مرة أو مرتين في الأسبوع." },
                            { de: "Besuchst du auch Kulturveranstaltungen? Wenn ja, welche?", en: "Do you also attend cultural events? If so, which ones?", ar: "بتحضر فعاليات ثقافية؟ ولو أه، إيه هي؟" },
                            { de: "Ja, sehr gerne sogar. Ich gehe ab und zu ins Theater oder besuche Konzerte.", en: "Yes, very much so. I go to the theater from time to time or attend concerts.", ar: "أه جداً. بروح المسرح من وقت للتاني أو بحضر حفلات مزيكا." },
                            { de: "Was möchtest du gerne in deiner Freizeit mehr, was weniger machen?", en: "What would you like to do more of, and what less of, in your free time?", ar: "تحب تعمل إيه أكتر، وإيه أقل في وقت فراغك؟" },
                            { de: "Ich möchte gerne mehr Sport treiben und in der Natur sein.", en: "I would like to do more sports and be in nature.", ar: "حابب ألعب رياضة أكتر وأكون في الطبيعة." },
                            { de: "Dafür möchte ich weniger Zeit sinnlos im Internet surfen.", en: "For that, I would like to spend less time pointlessly surfing the internet.", ar: "وفي المقابل عايز أضيع وقت أقل في تصفح النت من غير فايدة." }
                        ]
                    }
                ]
            },
            {
                title: "5. إحصائيات وقت الفراغ (Leisure Statistics / Freizeitstatistik)",
                subsections: [
                    {
                        title: "5.1 أنشطة وقت الفراغ المشهورة في ألمانيا (Beliebte Freizeitaktivitäten in Deutschland)",
                        items: [
                            { de: "Die Freizeitgestaltung gehört genauso zum Alltag wie Ausbildung und Beruf.", en: "Organizing free time is just as much a part of everyday life as education and work.", ar: "تنظيم وقت الفراغ جزء من الحياة اليومية زيه زي التعليم والشغل بالظبط." },
                            { de: "Laut Statistik verfügen die Deutschen am Tag über drei Stunden und 49 Minuten freie Zeit.", en: "According to statistics, Germans have three hours and 49 minutes of free time per day.", ar: "طبقاً للإحصائيات، الألمان عندهم 3 ساعات و49 دقيقة وقت فراغ في اليوم." },
                            { de: "Im Fünf-Jahres-Vergleich sind das ca. 15 Minuten weniger als vor fünf Jahren.", en: "In a five-year comparison, that is about 15 minutes less than five years ago.", ar: "في مقارنة لآخر خمس سنين، ده بيعتبر أقل بـ 15 دقيقة تقريباً من خمس سنين فاتت." },
                            { de: "Die meisten Freizeitaktivitäten werden von den Medien bestimmt.", en: "Most leisure activities are determined by the media.", ar: "الميديا (وسائل الإعلام) بتحدد معظم أنشطة وقت الفراغ." },
                            { de: "Dabei liegt das Fernsehen als 'Lagerfeuer im Wohnzimmer' immer noch auf Platz eins: 97 Prozent der Deutschen sehen regelmäßig fern.", en: "Here, television as the 'campfire in the living room' is still in first place: 97 percent of Germans watch television regularly.", ar: "التلفزيون باعتباره 'نار الدفاية في الصالة' لسه في المركز الأول: 97٪ من الألمان بيتفرجوا على التلفزيون بانتظام." },

        // --- SCRIPT LOGIC ---
        function createLessonUI() {
            const container = document.getElementById('lesson-container');
            lessonData.forEach((lesson, lessonIdx) => {
                const lessonDiv = document.createElement('div');
                lessonDiv.className = 'bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden transition-all hover:shadow-md';

                let subsectionsHtml = '';
                lesson.subsections.forEach((sub, subIdx) => {
                    let itemsHtml = '';
                    sub.items.forEach((item, itemIdx) => {
                        const itemId = `item-${lessonIdx}-${subIdx}-${itemIdx}`;
                        itemsHtml += `
                            <div class="group p-4 rounded-xl border border-slate-100 hover:border-indigo-200 hover:bg-indigo-50/30 transition-all">
                                <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                                    <div class="flex-1 space-y-1">
                                        <div class="flex items-center gap-2">
                                            <button onclick="speak('${item.de.replace(/'/g, "\\'")}')" class="w-8 h-8 flex items-center justify-center rounded-full bg-indigo-100 text-indigo-600 hover:bg-indigo-600 hover:text-white transition-colors shadow-sm" title="استمع للنطق">
                                                <i class="fa-solid fa-volume-high text-xs"></i>
                                            </button>
                                            <p class="font-bold text-lg text-slate-800 tracking-tight" dir="ltr">${item.de}</p>
                                        </div>
                                        <p class="text-slate-500 text-sm font-medium mr-10" dir="ltr">${item.en}</p>
                                        <p class="text-indigo-600 font-bold mr-10">${item.ar}</p>
                                    </div>
                                    <div class="flex items-center gap-3 self-end sm:self-center">
                                        <div id="status-${itemId}" class="hidden flex items-center gap-1 px-3 py-1 rounded-full text-xs font-bold"></div>
                                        <button id="mic-${itemId}" onclick="toggleMic('${itemId}', '${item.de.replace(/'/g, "\\'")}')" class="w-12 h-12 flex items-center justify-center rounded-full bg-slate-100 text-slate-500 hover:bg-rose-50 hover:text-rose-600 transition-all shadow-sm border border-slate-200" title="اختبر نطقك">
                                            <i class="fa-solid fa-microphone"></i>
                                        </button>
                                    </div>
                                </div>
                                <div id="transcript-${itemId}" class="hidden mt-3 p-3 bg-white/50 rounded-lg border border-dashed border-slate-200 text-sm text-slate-600 font-medium"></div>
                            </div>
                        `;
                    });

                    subsectionsHtml += `
                        <div class="p-6 ${subIdx > 0 ? 'border-t border-slate-100' : ''}">
                            <h3 class="text-xl font-extrabold text-slate-800 mb-6 flex items-center gap-2">
                                <span class="w-2 h-8 bg-indigo-500 rounded-full"></span>
                                ${sub.title}
                            </h3>
                            <div class="grid gap-4">${itemsHtml}</div>
                        </div>
                    `;
                });

                lessonDiv.innerHTML = `
                    <div class="bg-indigo-50 px-6 py-4 border-b border-indigo-100">
                        <h2 class="text-2xl font-black text-indigo-900">${lesson.title}</h2>
                    </div>
                    ${subsectionsHtml}
                `;
                container.appendChild(lessonDiv);
            });
        }

        // --- SPEECH & AUDIO ---
        const speechConfig = { lang: 'de-DE', rate: 0.9, pitch: 1.0 };

        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = speechConfig.lang;
            utterance.rate = speechConfig.rate;
            utterance.pitch = speechConfig.pitch;
            window.speechSynthesis.speak(utterance);
        }

        let recognition = null;
        let activeId = null;

        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = 'de-DE';
            recognition.interimResults = false;
            recognition.continuous = false;

            recognition.onstart = () => {
                const micBtn = document.getElementById(`mic-${activeId}`);
                if (micBtn) {
                    micBtn.classList.add('bg-rose-600', 'text-white', 'animate-pulse');
                    micBtn.querySelector('i').className = 'fa-solid fa-circle';
                }
            };

            recognition.onend = () => {
                const micBtn = document.getElementById(`mic-${activeId}`);
                if (micBtn) {
                    micBtn.classList.remove('bg-rose-600', 'text-white', 'animate-pulse');
                    micBtn.querySelector('i').className = 'fa-solid fa-microphone';
                }
                activeId = null;
            };

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                const targetText = document.getElementById(`mic-${activeId}`).getAttribute('data-target');
                showResult(activeId, transcript, targetText);
            };

            recognition.onerror = (event) => {
                console.error('Speech recognition error:', event.error);
                if (activeId) {
                    const status = document.getElementById(`status-${activeId}`);
                    status.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i> خطأ في التسجيل';
                    status.className = 'flex items-center gap-1 px-3 py-1 rounded-full text-xs font-bold bg-amber-100 text-amber-700';
                    status.classList.remove('hidden');
                }
            };
        } else {
            document.getElementById('system-message').classList.remove('hidden');
        }

        function toggleMic(id, target) {
            if (!recognition) return;
            if (activeId === id) {
                recognition.stop();
            } else {
                if (activeId) recognition.stop();
                activeId = id;
                const micBtn = document.getElementById(`mic-${id}`);
                micBtn.setAttribute('data-target', target);

                // Reset UI
                document.getElementById(`status-${id}`).classList.add('hidden');
                document.getElementById(`transcript-${id}`).classList.add('hidden');

                recognition.start();
            }
        }

        function showResult(id, heard, target) {
            const status = document.getElementById(`status-${id}`);
            const transcriptBox = document.getElementById(`transcript-${id}`);

            // تنظيف النصوص للمقارنة
            const clean = (t) => t.toLowerCase().replace(/[.,!?;:]/g, '').trim();
            const isCorrect = clean(heard) === clean(target);

            status.classList.remove('hidden');
            if (isCorrect) {
                status.innerHTML = '<i class="fa-solid fa-circle-check"></i> نطق صح';
                status.className = 'flex items-center gap-1 px-3 py-1 rounded-full text-xs font-bold bg-emerald-100 text-emerald-700';
            } else {
                status.innerHTML = '<i class="fa-solid fa-circle-xmark"></i> حاول تاني';
                status.className = 'flex items-center gap-1 px-3 py-1 rounded-full text-xs font-bold bg-rose-100 text-rose-700';
            }

            transcriptBox.innerHTML = `<span class="opacity-60">سمعت:</span> <span dir="ltr">"${heard}"</span>`;
            transcriptBox.classList.remove('hidden');
        }

        // Initialize App
        document.addEventListener('DOMContentLoaded', createLessonUI);
    </script>
