    <script type="text/babel">
        // --- HELPERS FOR AUDIO & SPEECH ---
        const playAudio = (text, e) => {
            if (e) e.stopPropagation();
            const cleanText = text.replace(/<[^>]+>/g, '');
            const utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.lang = 'de-DE';
            window.speechSynthesis.speak(utterance);
        };

        const SpeechTester = ({ targetText }) => {
            const [status, setStatus] = React.useState('idle');
            const [heard, setHeard] = React.useState('');

            const listen = (e) => {
                if (e) e.stopPropagation();
                if (!('webkitSpeechRecognition' in window)) {
                    alert('المتصفح ده مش بيدعم تسجيل الصوت، جرب Google Chrome.');
                    return;
                }
                const recognition = new webkitSpeechRecognition();
                recognition.lang = 'de-DE';
                recognition.interimResults = false;

                recognition.onstart = () => setStatus('listening');
                recognition.onresult = (event) => {
                    const speechResult = event.results[0][0].transcript;
                    setHeard(speechResult);

                    const clean = (str) => str.replace(/<[^>]+>/g, '').toLowerCase().replace(/[.,!?:]/g, '').trim();
                    const targetClean = clean(targetText);
                    const heardClean = clean(speechResult);

                    if (heardClean.includes(targetClean) || targetClean.includes(heardClean) || heardClean === targetClean) {
                        setStatus('success');
                    } else {
                        setStatus('fail');
                    }
                };
                recognition.onerror = () => setStatus('fail');
                recognition.onend = () => { if (status === 'listening') setStatus('idle'); };
                recognition.start();
            };

            return (
                <div className="inline-flex items-center gap-2" onClick={(e) => e.stopPropagation()}>
                    <button onClick={listen} title="جرب تنطقها" className={`p-2 rounded-full transition-all duration-300 shadow-sm ${status === 'listening' ? 'bg-red-500 text-white animate-pulse scale-110' : 'bg-slate-100 text-slate-600 hover:bg-slate-200 hover:scale-105'}`}>
                        <i data-lucide="mic" className="w-4 h-4"></i>
                    </button>
                    {status === 'success' && <span className="text-emerald-500 text-xs font-bold ar-text animate-bounce">✅ ممتاز!</span>}
                    {status === 'fail' && <span className="text-red-500 text-xs ar-text font-bold" title={`سمعت: ${heard}`}>❌ جرب تاني</span>}
                </div>
            );
        };

                        { speaker: "Britta", text: "Wir haben regelmäßig Familientreffen, meistens an Weihnachten und Ostern.", en: "We have regular family gatherings, mostly at Christmas and Easter.", ar: "لدينا تجمعات عائلية بانتظام، غالباً في عيد الميلاد وعيد الفصح." },
                        { speaker: "Interviewer", text: "Was feiern Sie so alles?", en: "What do you celebrate?", ar: "ما الذي تحتفلون به؟" },
                        { speaker: "Britta", text: "Wir feiern Geburtstage, Hochzeiten und manchmal auch Taufen.", en: "We celebrate birthdays, weddings, and sometimes baptisms.", ar: "نحتفل بأعياد الميلاد، وحفلات الزفاف، وأحياناً حفلات التعميد." },
                        { speaker: "Interviewer", text: "Wer kommt zur Feier?", en: "Who comes to the celebration?", ar: "من يأتي إلى الاحتفال؟" },
                        { speaker: "Britta", text: "Zur Feier kommen immer meine Großeltern, Tanten, Onkel, Cousins und Cousinen. Ich freue mich immer auf diese Treffen.", en: "My grandparents, aunts, uncles, and cousins always come to the celebration. I always look forward to these gatherings.", ar: "يأتي دائماً أجدادي، وعماتي، وأعمامي، وأبناء وبنات عمومتي. أنا أتطلع دائماً لهذه اللقاءات." }
                    ]
                },
                {
                    id: 'd2', title: "Im Schuhgeschäft (في متجر الأحذية)", icon: "shopping-bag",
                    lines: [
                        { speaker: "Verkäufer", text: "Kann ich Ihnen helfen?", en: "Can I help you?", ar: "هل يمكنني مساعدتك؟" },
                        { speaker: "Kunde", text: "Ich hätte gern diese Sportschuhe.", en: "I would like these sports shoes.", ar: "أريد هذه الأحذية الرياضية." },
                        { speaker: "Verkäufer", text: "Das sind Laufschuhe. Suchen Sie Laufschuhe?", en: "These are running shoes. Are you looking for running shoes?", ar: "هذه أحذية ركض. هل تبحث عن أحذية ركض؟" },
                        { speaker: "Kunde", text: "Nein, eigentlich brauche ich Tennisschuhe.", en: "No, actually I need tennis shoes.", ar: "لا، في الواقع أحتاج إلى أحذية تنس." },
                        { speaker: "Verkäufer", text: "Dann sollten Sie diese Schuhe hier nehmen. Die haben eine andere Sohle. Welche Größe haben Sie?", en: "Then you should take these shoes here. They have a different sole. What size do you have?", ar: "إذن يجب أن تأخذ هذه الأحذية هنا. لها نعل مختلف. ما هو مقاسك؟" },
                        { speaker: "Kunde", text: "Größe 43. Ich probiere sie mal an.", en: "Size 43. I will try them on.", ar: "مقاس 43. سأجربها." },
                        { speaker: "Verkäufer", text: "Einen Moment bitte. Wir haben die Schuhe in Größe 43 nicht mehr in Weiß, nur noch in Grau.", en: "One moment please. We no longer have the shoes in size 43 in white, only in gray.", ar: "لحظة من فضلك. لم يعد لدينا الحذاء مقاس 43 باللون الأبيض، فقط باللون الرمادي." },
                        { speaker: "Kunde", text: "In Grau? Nein, tut mir leid, ich möchte weiße Schuhe. Was kosten die anderen weißen Schuhe dort?", en: "In gray? No, sorry, I want white shoes. How much do the other white shoes there cost?", ar: "بالرمادي؟ لا، عذراً، أريد أحذية بيضاء. كم سعر الأحذية البيضاء الأخرى هناك؟" },
                        { speaker: "Verkäufer", text: "Die kosten 189 Euro. Wir können Ihnen aber einen Rabatt von 20 Euro geben.", en: "They cost 189 euros. But we can give you a discount of 20 euros.", ar: "سعرها 189 يورو. لكن يمكننا أن نعطيك خصماً بقيمة 20 يورو." },
                        { speaker: "Kunde", text: "Das ist immer noch sehr viel Geld. Ich überlege es mir noch einmal. Vielen Dank.", en: "That is still a lot of money. I'll think about it again. Thank you very much.", ar: "هذا لا يزال مبلغاً كبيراً جداً. سأفكر في الأمر مرة أخرى. شكراً جزيلاً." }
                    ]
                },
                {
                    id: 'd3', title: "Einkaufen: Fragen und Antworten (أسئلة وأجوبة حول التسوق)", icon: "store",
                    lines: [
                        { speaker: "Frage 1", text: "Kaufen Sie gern ein? Wenn ja, was kaufen Sie gern/am liebsten?", en: "Do you like shopping? If so, what do you like buying the most?", ar: "هل تحب التسوق؟ إذا كان نعم، ماذا تفضل أن تشتري؟" },
                        { speaker: "Antwort ①", text: "Ja, ich kaufe gern Kleidung.", en: "Yes, I like shopping for clothes.", ar: "نعم، أحب شراء الملابس." },
                        { speaker: "Antwort ②", text: "Am liebsten kaufe ich Bücher.", en: "I like buying books the most.", ar: "أفضل شراء الكتب." },
                        { speaker: "Antwort ③", text: "Nein, ich gehe nicht gern einkaufen.", en: "No, I don’t like shopping.", ar: "لا، لا أحب الذهاب للتسوق." },
                        { speaker: "Frage 2", text: "Wo kaufen Sie gern ein? Können Sie ein Geschäft empfehlen?", en: "Where do you like buying things? Can you recommend a shop?", ar: "أين تحب التسوق؟ هل يمكنك التوصية بمتجر؟" },
                        { speaker: "Antwort ①", text: "Lebensmittel kaufe ich gern im Supermarkt.", en: "I like buying groceries in the supermarket.", ar: "أحب شراء مواد البقالة في السوبر ماركت." },
                        { speaker: "Antwort ②", text: "Kleidung kaufe ich meistens im Einkaufszentrum.", en: "I usually buy clothes in the shopping center.", ar: "أشتري الملابس عادة من مركز التسوق." },
                        { speaker: "Antwort ③", text: "Ich empfehle den Laden „BioMarkt“ für Gemüse.", en: "I recommend the shop “BioMarkt” for vegetables.", ar: "أوصي بمتجر 'BioMarkt' للخضروات." },
                        { speaker: "Frage 3", text: "Wann gehen Sie normalerweise einkaufen?", en: "When do you usually go shopping?", ar: "متى تتسوق عادة؟" },
                        { speaker: "Antwort ①", text: "Ich gehe meistens am Samstag einkaufen.", en: "I usually go shopping on Saturdays.", ar: "أذهب للتسوق غالباً يوم السبت." },
                        { speaker: "Antwort ②", text: "Unter der Woche gehe ich abends einkaufen.", en: "During the week I go shopping in the evenings.", ar: "خلال الأسبوع أذهب للتسوق في المساء." },
                        { speaker: "Antwort ③", text: "Ich kaufe oft online ein.", en: "I often shop online.", ar: "أنا أتسوق كثيراً عبر الإنترنت." }
                    ]
                }
            ],
            culture: [
                {
                    id: 'c1', title: "Faktoren für Glück und Zufriedenheit (عوامل السعادة والرضا)",
                    lines: [
                        { g: "Viele Studien zum Thema Glück zeigen, dass die Gesundheit einen sehr großen Einfluss auf die Zufriedenheit der Menschen hat.", e: "Many studies on the topic of happiness show that health has a very big influence on people’s satisfaction.", a: "تُظهر العديد من الدراسات حول موضوع السعادة أن الصحة لها تأثير كبير جداً على رضا الناس." },
                        { g: "Sie zählt zu den wichtigsten Glücksfaktoren.", e: "It is one of the most important factors for happiness.", a: "وتُعد من أهم عوامل السعادة." },
                        { g: "Aber auch die materielle Seite des Lebens spielt eine Rolle. Das Sprichwort „Geld macht nicht glücklich“ stimmt nur zum Teil, denn die materielle Sicherheit ist eine Voraussetzung für Zufriedenheit.", e: "But the material side of life also plays a role. The saying 'Money does not make you happy' is only partly true, because material security is a prerequisite for satisfaction.", a: "لكن الجانب المادي من الحياة يلعب دوراً أيضاً. المقولة 'المال لا يجلب السعادة' صحيحة جزئياً فقط، لأن الأمان المادي شرط أساسي للرضا." },
                        { g: "Nach Meinung der Wissenschaftler liegt „das materielle Glückslimit“ bei rund 60.000 Euro. Wer mehr Geld verdient, wird man nicht glücklicher.", e: "According to scientists, the 'material happiness limit' is around 60,000 euros. Those who earn more money do not become happier.", a: "وبحسب العلماء، فإن 'الحد المادي للسعادة' يبلغ حوالي 60 ألف يورو. من يكسب مالاً أكثر لا يصبح بالضرورة أكثر سعادة." },
                        { g: "Außerdem brauchen wir für ein glückliches Leben einen festen Partner, eine liebevolle Familie und gute Freunde. Am glücklichsten fühlen sich die Menschen in einer dauerhaften Beziehung, sagen die Glücksforscher.", e: "In addition, for a happy life we need a steady partner, a loving family, and good friends. People feel happiest in a lasting relationship, say happiness researchers.", a: "بالإضافة إلى ذلك، نحتاج لحياة سعيدة إلى شريك دائم، وعائلة محبة، وأصدقاء جيدين. يشعر الناس بالسعادة القصوى في علاقة دائمة، كما يقول باحثو السعادة." },
                        { g: "Zu Gesundheit, materieller Sicherheit, Partnerschaft und Familie kommt noch ein weiterer Faktor: eine sinnvolle Tätigkeit. Das kann der Beruf sein, eine ehrenamtliche Tätigkeit oder ein Hobby.", e: "In addition to health, material security, partnership, and family, there is another factor: meaningful activity. This can be a job, volunteer work, or a hobby.", a: "إلى جانب الصحة والأمان المادي والشراكة والعائلة، يأتي عامل آخر: نشاط هادف. يمكن أن يكون هذا وظيفة، أو عملاً تطوعياً، أو هواية." },
                        { g: "Insgesamt bestimmen diese und andere Glücksfaktoren 50 Prozent des Glücksgefühls, die anderen 50 Prozent bestimmen unsere Gene.", e: "Altogether, these and other factors of happiness determine 50 percent of the feeling of happiness, the other 50 percent are determined by our genes.", a: "بشكل عام، تحدد هذه العوامل وغيرها من عوامل السعادة 50 في المائة من الشعور بالسعادة، بينما تحدد جيناتنا الـ 50 في المائة الأخرى." }
                    ]
                },
                {
                    id: 'c2', title: "Der schönste Tag im Leben (أجمل يوم في الحياة - الزفاف)",
                    lines: [
                        { g: "Vor der Hochzeit sind die Paare in Deutschland im Durchschnitt 4,7 Jahre zusammen. In der Regel macht der Mann der Frau einen Heiratsantrag, manchmal ist es umgekehrt.", e: "Before the wedding, couples in Germany are together on average for 4.7 years. As a rule, the man proposes to the woman, sometimes it is the other way around.", a: "قبل الزواج، يبقى الأزواج في ألمانيا معاً في المتوسط لمدة 4.7 سنوات. عادة ما يتقدم الرجل لخطبة المرأة، وأحياناً العكس." },
                        { g: "Ein sehr alter und bekannter Brauch ist der Polterabend. Am Abend vor der Hochzeit feiert das zukünftige Brautpaar zusammen mit Verwandten, Freunden und Kollegen.", e: "A very old and well-known custom is the Polterabend. On the evening before the wedding, the future bridal couple celebrates together with relatives, friends, and colleagues.", a: "عرف قديم ومشهور جداً هو 'Polterabend' (ليلة تكسير الأطباق). في الليلة التي تسبق الزفاف، يحتفل العروسان المستقبليان مع الأقارب والأصدقاء والزملاء." },
                        { g: "Die Gäste bringen altes Geschirr mit und zerschlagen es vor der Tür. Der Lärm soll die bösen Geister vertreiben und das kaputte Geschirr soll dem Brautpaar Glück bringen.", e: "The guests bring old dishes and smash them in front of the door. The noise is supposed to drive away evil spirits, and the broken dishes are supposed to bring the bridal couple luck.", a: "يحضر الضيوف أطباقاً قديمة ويكسرونها أمام الباب. يُفترض أن يطرد الضجيج الأرواح الشريرة، وأن يجلب الفخار المكسور الحظ السعيد للعروسين." },
                        { g: "Die Trauung erfolgt auf dem Standesamt. Viele Paare heiraten danach noch einmal in der Kirche. Seit dem 1. Oktober 2017 dürfen in Deutschland auch gleichgeschlechtliche Paare heiraten.", e: "The wedding ceremony takes place at the registry office. Many couples then marry again in the church. Since October 1, 2017, same-sex couples are also allowed to marry in Germany.", a: "يتم الزواج رسمياً في مكتب السجل المدني. يتزوج العديد من الأزواج بعد ذلك مرة أخرى في الكنيسة. منذ 1 أكتوبر 2017، يُسمح أيضاً بزواج المثليين في ألمانيا." },
                        { g: "Bei der standesamtlichen Trauung sind normalerweise zwei Trauzeugen dabei, einer/eine für die Braut, einer/eine für den Bräutigam. Das Heiratsalter ist in den letzten Jahren gestiegen.", e: "At the civil wedding ceremony there are usually two witnesses, one for the bride, one for the groom. The age of marriage has increased in recent years.", a: "في حفل الزفاف المدني، يتواجد عادة شاهدان، واحد للعروس وواحد للعريس. ارتفع سن الزواج في السنوات الأخيرة." },
                        { g: "64 Prozent der Deutschen heiraten, weil sie die Partnerin/den Partner lieben. Etwa 40 Prozent heiraten eher aus finanziellen Gründen.", e: "64 percent of Germans marry because they love their partner. About 40 percent marry more for financial reasons.", a: "64 بالمائة من الألمان يتزوجون لأنهم يحبون الشريك. يتزوج حوالي 40 في المائة لأسباب مالية أكثر." },
                        { g: "Für die Hochzeitsfeier werden durchschnittlich 10.000 Euro ausgegeben. Der Höhepunkt der meisten Hochzeitsfeiern ist die Hochzeitstorte. Das Brautpaar schneidet die Hochzeitstorte gemeinsam mit einem Messer an.", e: "An average of 10,000 euros is spent on the wedding celebration. The highlight of most wedding celebrations is the wedding cake. The bridal couple cuts the wedding cake together with a knife.", a: "يتم إنفاق 10 آلاف يورو في المتوسط على حفل الزفاف. ذروة معظم حفلات الزفاف هي كعكة الزفاف. يقطع العروسان كعكة الزفاف معاً بسكين." },
                        { g: "Als Hochzeitsgeschenk wird Geld immer beliebter. Weil viele Paare schon vor der Hochzeit zusammenleben, brauchen Sie kein Geschirr oder Besteck mehr.", e: "Money is becoming increasingly popular as a wedding gift. Because many couples already live together before the wedding, they no longer need dishes or cutlery.", a: "أصبح المال أكثر شيوعاً كهدية زفاف. نظراً لأن العديد من الأزواج يعيشون معاً بالفعل قبل الزفاف، فلم يعودوا بحاجة إلى أطباق أو أدوات مائدة." },
                        { g: "Jetzt kommen die schlechten Nachrichten: Ehepaare bleiben in Deutschland im Durchschnitt nur 14 Jahre zusammen. Etwa 45 Prozent der Ehen halten nicht.", e: "Now come the bad news: Married couples in Germany stay together for an average of only 14 years. About 45 percent of marriages do not last.", a: "والآن الأخبار السيئة: يبقى المتزوجون في ألمانيا معاً في المتوسط 14 عاماً فقط. حوالي 45 في المائة من الزيجات لا تستمر." }
                    ]
                },
                {
                    id: 'c3', title: "Heiraten in meinem Heimatland (الزفاف في مصر)",
                    lines: [
                        { g: "In Ägypten macht der Mann normalerweise den Heiratsantrag, meistens mit der Familie dabei.", e: "In Egypt, the man usually makes the marriage proposal, mostly with the family present.", a: "في مصر، عادة ما يتقدم الرجل لطلب الزواج، وفي الغالب بحضور العائلة." },
                        { g: "Die Trauung findet meistens in einer Moschee oder im Standesamt statt.", e: "The wedding ceremony usually takes place in a mosque or at the registry office.", a: "يقام عقد القران عادة في المسجد أو في مكتب السجل المدني." },
                        { g: "Die Hochzeitsfeier ist sehr groß, oft mit 200 bis 500 Gästen.", e: "The wedding celebration is very big, often with 200 to 500 guests.", a: "يكون حفل الزفاف كبيراً جداً، وغالباً ما يحضره 200 إلى 500 ضيف." },
                        { g: "Die Gäste schenken meistens Geld, damit das Brautpaar das neue Leben beginnen kann.", e: "The guests usually give money so that the couple can start their new life.", a: "عادة ما يهدي الضيوف أموالاً حتى يتمكن العروسان من بدء حياتهما الجديدة." },
                        { g: "Es gibt viele Bräuche: Vor der Hochzeit gibt es eine Feier, die „Henna-Nacht“ heißt, wo die Braut Henna auf die Hände bekommt.", e: "There are many customs: Before the wedding, there is a party called the 'Henna night,' where the bride gets henna on her hands.", a: "هناك العديد من العادات: قبل الزفاف، هناك حفلة تسمى 'ليلة الحناء'، حيث تضع العروس الحناء على يديها." },
                        { g: "Bei der Hochzeit gibt es viel Musik, Tanz und ein großes Hochzeitsessen.", e: "At the wedding, there is lots of music, dancing, and a big wedding meal.", a: "في حفل الزفاف، توجد الكثير من الموسيقى والرقص ووجبة زفاف كبيرة." }
                    ]
                },
                {
                    id: 'c4', title: "Die bekanntesten Kaufhäuser in Deutschland (أشهر المتاجر في ألمانيا)",
                    lines: [
                        { g: "Viele Menschen in Deutschland kaufen heute in modernen Einkaufszentren ein. Traditionelle Kaufhäuser mit einem großen Warenangebot werden immer seltener. Aber ein paar berühmte Kaufhäuser gibt es immer noch.", e: "Many people in Germany shop today in modern shopping centers. Traditional department stores with a large range of goods are becoming rarer and rarer. But a few famous department stores still exist.", a: "يتسوق الكثير من الناس في ألمانيا اليوم في مراكز التسوق الحديثة. أصبحت المتاجر الكبرى التقليدية التي تقدم مجموعة واسعة من السلع نادرة بشكل متزايد. لكن لا يزال هناك عدد قليل من المتاجر الكبرى الشهيرة." },
                        { g: "Das KaDeWe in Berlin ist ein wahres Paradies für Gourmets. Es liegt im Herzen von Berlin und ist nach Harrods in London das zweitgrößte Kaufhaus Europas.", e: "The KaDeWe in Berlin is a true paradise for gourmets. It is located in the heart of Berlin and is, after Harrods in London, the second largest department store in Europe.", a: "متجر KaDeWe في برلين هو جنة حقيقية للذواقة. يقع في قلب برلين وهو ثاني أكبر متجر متعدد الأقسام في أوروبا بعد متجر هارودز في لندن." },
                        { g: "Heute können Besucher auf 70.000 Quadratmetern Waren aus den Bereichen Mode, Delikatessen, Haushaltswaren, Bücher und Kosmetik kaufen. Allein die Feinschmeckeretage im sechsten Stock ist mit ihren 7.000 Quadratmetern einen Besuch wert.", e: "Today visitors can buy goods on 70,000 square meters in the areas of fashion, delicatessen, household goods, books and cosmetics. The gourmet floor alone on the sixth floor with its 7,000 square meters is worth a visit.", a: "اليوم، يمكن للزوار شراء السلع على مساحة 70 ألف متر مربع في مجالات الموضة والأطعمة المعلبة والأدوات المنزلية والكتب ومستحضرات التجميل. طابق الذواقة وحده في الطابق السادس بمساحته البالغة 7000 متر مربع يستحق الزيارة." },
                        { g: "Direkt am Marienplatz in München liegt das Warenhaus Ludwig Beck. Das Warenhaus blickt auf eine mehr als 150-jährige Geschichte zurück.", e: "Directly at Marienplatz in Munich lies the department store Ludwig Beck. The department store looks back on a history of more than 150 years.", a: "يقع متجر لودفيج بيك مباشرة في ساحة مارين بلاتز في ميونيخ. يمتد تاريخ المتجر لأكثر من 150 عاماً." },
                        { g: "Einmalig in Deutschland ist die mehrfach mit dem „Echo“ ausgezeichnete Musikabteilung. Musikfreunde können hier aus über 120.000 CDs und DVDs auswählen.", e: "Unique in Germany is the music department, which has been awarded several times with the “Echo.” Music lovers can choose here from over 120,000 CDs and DVDs.", a: "الفريد من نوعه في ألمانيا هو قسم الموسيقى، الذي حصل على جائزة 'إيكو' عدة مرات. يمكن لعشاق الموسيقى الاختيار هنا من بين أكثر من 120 ألف قرص مضغوط وأقراص DVD." },
                        { g: "Im Jahre 1912 eröffnete der Kaufmann Oscar Tietz ein Warenhaus in Hamburg. Heute zählt das Haus an der Alster zu den schönsten Kaufhäusern Deutschlands.", e: "In the year 1912 the merchant Oscar Tietz opened a department store in Hamburg. Today the store on the Alster counts as one of the most beautiful department stores in Germany.", a: "في عام 1912، افتتح التاجر أوسكار تيتز متجراً متعدد الأقسام في هامبورغ. اليوم، يُعد المتجر الموجود على نهر الألستر أحد أجمل المتاجر الكبرى في ألمانيا." },
                        { g: "Das 24.000 Quadratmeter große Alsterhaus gehört zur Karstadt-Gruppe und bietet auch preisgünstige Kleidung an. In der obersten Etage befinden sich unter anderem eine Champagnerbar, ein Sushi-Restaurant und eine Delikatessenabteilung.", e: "The Alsterhaus, with 24,000 square meters, belongs to the Karstadt group and also offers inexpensive clothing. On the top floor there are, among other things, a champagne bar, a sushi restaurant, and a delicatessen department.", a: "ينتمي متجر ألاسترهاوس الذي تبلغ مساحته 24 ألف متر مربع إلى مجموعة كارشتات ويقدم أيضاً ملابس بأسعار معقولة. يوجد في الطابق العلوي، من بين أشياء أخرى، بار للشمبانيا ومطعم سوشي وقسم للأطعمة الشهية." }
                    ]
                }
            ],
            letters: [
                {
                    id: 'l1', title: "Einladung zur Hochzeit (دعوة حفل زفاف)",
                    lines: [
                        { g: "Wir sagen Ja und das wollen wir gerne mit euch feiern.", e: "We say yes and we would like to celebrate it with you.", a: "سنقول 'نعم' ونود أن نحتفل بذلك معكم." },
                        { g: "Unsere Trauung findet am 22. Mai um 10.00 Uhr auf dem Standesamt „Mitte von Berlin“ statt.", e: "Our wedding ceremony will take place on May 22 at 10:00 a.m. at the registry office 'Berlin Mitte'.", a: "سيقام حفل زفافنا يوم 22 مايو الساعة 10:00 صباحاً في مكتب التسجيل المدني 'برلين مِتّه'." },
                        { g: "Anschließend laden wir euch zu einem festlichen Essen im Restaurant Hackethals ein.", e: "Afterwards we invite you to a festive meal at the restaurant Hackethals.", a: "بعد ذلك ندعوكم لتناول وجبة احتفالية في مطعم هاكيتالز." },
                        { g: "Bitte schreibt uns bis zum 22. April, ob ihr kommt.", e: "Please write to us by April 22 whether you are coming.", a: "يرجى مراسلتنا بحلول 22 أبريل لإخبارنا إذا كنتم ستأتون." },
                        { g: "Wir freuen uns auf diesen Tag und auf euch. Katharina und Sebastian", e: "We look forward to this day and to you. Katharina and Sebastian", a: "نحن نتطلع لهذا اليوم ولرؤيتكم. كاتارينا و سيباستيان" }
                    ]

                    id: 'v14', ger: "empfehlen", eng: "to recommend", ar: "يوصي بـ", type: "Unregelmäßig", praeteritum: "empfahl", perfekt: "hat empfohlen", s: [
                        { g: "Können Sie ein gutes Geschäft <strong>empfehlen</strong>?", e: "Can you recommend a good shop?", a: "هل يمكنك التوصية بمتجر جيد؟" },
                        { g: "Ich <strong>empfehle</strong> den Laden „BioMarkt“ für Gemüse.", e: "I recommend the shop 'BioMarkt' for vegetables.", a: "أوصي بمتجر 'BioMarkt' للخضروات." },
                        { g: "Der Verkäufer hat mir diese Laufschuhe <strong>empfohlen</strong>.", e: "The seller recommended these running shoes to me.", a: "نصحني البائع بأحذية الركض هذه." }
                    ]
                },
                {
                    id: 'v15', ger: "zerschlagen", eng: "to smash / break into pieces", ar: "يُحطم / يكسر", type: "Unregelmäßig", praeteritum: "zerschlug", perfekt: "hat zerschlagen", s: [
                        { g: "Die Gäste bringen altes Geschirr mit und <strong>zerschlagen</strong> es vor der Tür.", e: "The guests bring old dishes and smash them in front of the door.", a: "يحضر الضيوف أطباقاً قديمة ويكسرونها أمام الباب." },
                        { g: "Beim Polterabend haben wir viel Porzellan <strong>zerschlagen</strong>.", e: "At the Polterabend we smashed a lot of porcelain.", a: "في ليلة توديع العزوبية حطمنا الكثير من الخزف الصيني." },
                        { g: "Das Kind hat aus Versehen den Teller <strong>zerschlagen</strong>.", e: "The child accidentally smashed the plate.", a: "حطم الطفل الطبق عن طريق الخطأ." }
                    ]
                }
            ]
        };

        const { useState, useEffect } = React;

        // --- HELPER FOR ARTICLES COLORING ---
        const colorizeArticles = (text) => {
            if (!text) return text;
            const regex = /(der |die |das )/gi;
            const parts = text.split(regex);
            return parts.map((part, i) => {
                const lower = part.toLowerCase();
                if (lower === 'der ') return <span key={i} className="text-blue-500 font-extrabold">{part}</span>;
                if (lower === 'die ') return <span key={i} className="text-rose-500 font-extrabold">{part}</span>;
                if (lower === 'das ') return <span key={i} className="text-emerald-500 font-extrabold">{part}</span>;
                return <span key={i}>{part}</span>;
            });
        };

        // --- COMPONENTS ---
        const ProgressBar = ({ total, learned, colorClass }) => {
            const percentage = total === 0 ? 0 : Math.round((learned / total) * 100);
            return (
                <div className="glass-panel p-5 rounded-2xl mb-8 flex items-center justify-between transition-all" dir="rtl">
                    <div>
                        <h3 className="text-sm font-bold text-slate-500 uppercase tracking-wider ar-text mb-1">مستوى التقدم</h3>
                        <p className="text-3xl font-extrabold text-slate-800">{learned} <span className="text-sm font-medium text-slate-400">/ {total} أتقنتهم</span></p>
                    </div>
                    <div className="relative w-20 h-20 drop-shadow-md">
                        <svg className="w-full h-full transform -rotate-90" viewBox="0 0 36 36">
                            <path className="text-slate-200" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" strokeWidth="3" />
                            <path className={`${colorClass} transition-all duration-1000 ease-out`} strokeDasharray={`${percentage}, 100`} d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" />
                        </svg>
                        <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-sm font-bold text-slate-700">
                            {percentage}%
                        </div>
                    </div>
                </div>
            );
        };

        const WordCard = ({ item, isLearned, toggleLearned }) => {
            const [isFlipped, setIsFlipped] = useState(false);
            return (
                <div className="relative group perspective-1000 w-full h-[24rem]">
                    <div className={`w-full h-full transition-all duration-700 transform-style-3d shadow-[0_8px_30px_rgb(0,0,0,0.04)] rounded-2xl ${isFlipped ? 'rotate-y-180' : ''}`}>

                        {/* FRONT */}
                        <div className="absolute w-full h-full backface-hidden bg-white border border-slate-100 rounded-2xl p-5 flex flex-col cursor-pointer hover:shadow-lg transition-shadow"
                            onClick={() => setIsFlipped(true)}>
                            <div className="flex justify-between items-start shrink-0" dir="rtl">
                                <span className="bg-orange-50 text-orange-600 text-xs font-bold px-3 py-1.5 rounded-lg uppercase tracking-wider ar-text border border-orange-100">مفردات</span>
                                <button onClick={(e) => { e.stopPropagation(); toggleLearned(item.id); }} className={`p-2 rounded-full transition-colors ${isLearned ? 'bg-emerald-100 text-emerald-600' : 'bg-slate-50 text-slate-300 hover:bg-slate-100'}`}>
                                    <i data-lucide="check" className="w-5 h-5"></i>
                                </button>
                            </div>

                            <div className="text-center mt-2 flex-grow flex flex-col justify-center overflow-y-auto front-scroll px-1 py-3">
                                <div className="flex flex-col justify-center items-center gap-3 mb-1">
                                    <h3 className="text-xl lg:text-2xl font-bold text-slate-800 leading-tight">{colorizeArticles(item.ger)}</h3>
                                    <div className="flex items-center gap-2">
                                        <button onClick={(e) => playAudio(item.ger, e)} className="p-2 rounded-full bg-orange-50 text-orange-600 hover:bg-orange-100 transition-colors shadow-sm"><i data-lucide="volume-2" className="w-5 h-5"></i></button>
                                        <SpeechTester targetText={item.ger} />
                                    </div>
                                </div>
                                <div className="mt-4 space-y-1">
                                    <p className="text-slate-500 font-medium text-sm">{item.eng}</p>
                                    <p className="text-orange-600 font-bold ar-text text-lg" dir="rtl">{item.ar}</p>
                                </div>
                            </div>

                            <div className="text-center text-xs text-slate-400 font-medium flex items-center justify-center gap-1 ar-text mt-2 shrink-0">
                                <i data-lucide="rotate-cw" className="w-3 h-3"></i> اضغط للأمثلة
                            </div>
                        </div>

                        {/* BACK */}
                        <div className="absolute w-full h-full backface-hidden bg-gradient-to-br from-orange-500 to-amber-600 text-white rounded-2xl p-5 shadow-lg flex flex-col cursor-pointer overflow-hidden"
                            onClick={() => setIsFlipped(false)} style={{ transform: 'rotateY(180deg)' }}>
                            <div className="mb-3 border-b border-white/20 pb-2 flex justify-between items-center shrink-0" dir="rtl">
                                <h4 className="font-bold text-white/90 text-sm tracking-wider ar-text">أمثلة سياقية</h4>
                                <i data-lucide="rotate-ccw" className="w-4 h-4 text-white/60"></i>
                            </div>
                            <div className="overflow-y-auto card-scroll flex-grow pr-2 pb-2">
                                <ul className="space-y-3">
                                    {item.s && item.s.map((sentence, idx) => (
                                        <li key={idx} className="text-sm bg-white/10 backdrop-blur-sm p-3 rounded-xl border border-white/5">
                                            <div className="flex items-start gap-2 mb-1.5">
                                                <button onClick={(e) => playAudio(sentence.g, e)} className="p-1 text-orange-200 hover:text-white shrink-0 mt-0.5"><i data-lucide="volume-2" className="w-4 h-4"></i></button>
                                                <span className="leading-relaxed" dangerouslySetInnerHTML={{ __html: sentence.g }}></span>
                                            </div>
                                            <div className="text-orange-200 text-xs italic ml-8 mb-1.5">{sentence.e}</div>
                                            <div className="text-amber-100 text-sm font-bold ar-text border-t border-white/10 pt-1.5 mt-1" dir="rtl">{sentence.a}</div>
                                        </li>
                                    ))}
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const VerbRow = ({ item, isLearned, toggleLearned }) => {
            const [expanded, setExpanded] = useState(false);

            return (
                <div className="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden mb-4 transition-all duration-300 hover:shadow-md" dir="ltr">
                    <div className="p-5 flex items-center justify-between cursor-pointer" onClick={() => setExpanded(!expanded)}>
                        <div className="flex items-center gap-4">
                            <button onClick={(e) => { e.stopPropagation(); toggleLearned(item.id); }} className={`p-2 rounded-full transition-colors shrink-0 ${isLearned ? 'bg-emerald-100 text-emerald-600' : 'bg-slate-50 text-slate-300 hover:bg-slate-100'}`}>
                                <i data-lucide="check" className="w-5 h-5"></i>
                            </button>
                            <div>
                                <h3 className="text-xl font-bold text-slate-800 flex flex-wrap items-center gap-2">
                                    {item.ger}
                                    <button onClick={(e) => playAudio(item.ger, e)} className="text-emerald-600 opacity-70 hover:opacity-100 transition-opacity"><i data-lucide="volume-2" className="w-5 h-5"></i></button>
                                    <span className="text-[10px] bg-slate-100 text-slate-500 px-2 py-1 rounded uppercase tracking-wider">{item.type}</span>
                                </h3>
                                <p className="text-sm text-slate-500 mt-1">{item.eng} <span className="mx-2 text-slate-300">|</span> <span className="text-emerald-600 font-bold ar-text" dir="rtl">{item.ar}</span></p>
                            </div>
                        </div>
                        <div className={`transform transition-transform duration-300 ${expanded ? 'rotate-180' : ''}`}>
                            <i data-lucide="chevron-down" className="w-6 h-6 text-slate-400"></i>
                        </div>
                    </div>

                    <div className={`transition-all duration-500 overflow-hidden ${expanded ? 'max-h-[1000px] opacity-100' : 'max-h-0 opacity-0'}`}>
                        <div className="bg-slate-50 p-5 border-t border-slate-100">
                            {/* PRÄTERITUM & PERFEKT BLOCKS */}
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm relative group">
                                    <div className="text-xs font-bold text-amber-500 uppercase tracking-widest mb-2 border-b border-slate-100 pb-1">Präteritum (ماضي بسيط)</div>
                                    <div className="flex items-start gap-2 mb-2">
                                        <button onClick={(e) => playAudio(item.praeteritum, e)} className="text-amber-600 bg-amber-50 p-1.5 rounded-lg shrink-0"><i data-lucide="volume-2" className="w-4 h-4"></i></button>
                                        <p className="text-slate-800 text-lg font-bold leading-relaxed mt-1">{item.praeteritum}</p>
                                    </div>
                                </div>
                                <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm relative group">
                                    <div className="text-xs font-bold text-purple-500 uppercase tracking-widest mb-2 border-b border-slate-100 pb-1">Perfekt (ماضي تام)</div>
                                    <div className="flex items-start gap-2 mb-2">
                                        <button onClick={(e) => playAudio(item.perfekt, e)} className="text-purple-600 bg-purple-50 p-1.5 rounded-lg shrink-0"><i data-lucide="volume-2" className="w-4 h-4"></i></button>
                                        <p className="text-slate-800 text-lg font-bold leading-relaxed mt-1">{item.perfekt}</p>
                                    </div>
                                </div>
                            </div>

                            <div className="mt-6">
                                <h4 className="text-sm font-bold text-slate-400 mb-3 uppercase tracking-wider ar-text">أمثلة سياقية (Beispiele)</h4>
                                <ul className="space-y-3">
                                    {item.s && item.s.map((sentence, idx) => (
                                        <li key={idx} className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm group flex flex-col sm:flex-row gap-4 justify-between items-start">
                                            <div className="flex-1">
                                                <div className="flex items-start gap-3 mb-2">
                                                    <button onClick={(e) => playAudio(sentence.g, e)} className="mt-0.5 text-emerald-600 bg-emerald-50 p-1.5 rounded-lg shrink-0"><i data-lucide="volume-2" className="w-4 h-4"></i></button>
                                                    <p className="text-slate-800 text-base font-medium leading-relaxed mt-1" dangerouslySetInnerHTML={{ __html: sentence.g }}></p>
                                                </div>
                                                <p className="text-slate-500 text-sm ml-10 mb-2">{sentence.e}</p>
                                                <div className="ml-10 text-emerald-600 text-base font-bold ar-text border-t border-slate-100 pt-2" dir="rtl">{sentence.a}</div>
                                            </div>
                                            <div className="opacity-100 sm:opacity-0 group-hover:opacity-100 transition-opacity shrink-0 sm:mt-1 self-end sm:self-start bg-slate-50 p-1.5 rounded-full" dir="ltr">
                                                <SpeechTester targetText={sentence.g} />
                                            </div>
                                        </li>
                                    ))}
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const DialogueRow = ({ dialogue }) => {
            const [expanded, setExpanded] = useState(false);
            return (
                <div className="bg-white border border-slate-200 rounded-3xl shadow-sm overflow-hidden mb-6 transition-all duration-300 hover:shadow-lg" dir="ltr">
                    <button
                        className="w-full p-6 flex items-center justify-between bg-gradient-to-r from-slate-50 to-white"
                        onClick={() => setExpanded(!expanded)}
                    >
                        <div className="flex items-center gap-4">
                            <div className="bg-blue-100 text-blue-600 p-3 rounded-2xl">
                                <i data-lucide={dialogue.icon} className="w-6 h-6"></i>
                            </div>
                            <h3 className="text-xl md:text-2xl font-bold text-slate-800 ar-text">{dialogue.title}</h3>
                        </div>
                        <i data-lucide="chevron-down" className={`w-6 h-6 text-slate-400 transform transition-transform duration-300 ${expanded ? 'rotate-180 text-blue-600' : ''}`}></i>
                    </button>

                    <div className={`transition-all duration-500 overflow-hidden ${expanded ? 'max-h-[3000px] opacity-100' : 'max-h-0 opacity-0'}`}>
                        <div className="p-6 bg-white space-y-4">
                            {dialogue.lines.map((line, idx) => {
                                const isFirstSpeaker = idx === 0 || line.speaker === dialogue.lines[0].speaker;
                                return (
                                    <div key={idx} className={`flex flex-col p-4 rounded-2xl border ${isFirstSpeaker ? 'bg-blue-50/50 border-blue-100 ml-8' : 'bg-slate-50 border-slate-100 mr-8'}`}>
                                        <div className="flex justify-between items-start mb-2">
                                            <span className={`text-xs font-bold uppercase tracking-wider px-2 py-1 rounded-md ${isFirstSpeaker ? 'bg-blue-100 text-blue-700' : 'bg-slate-200 text-slate-700'}`}>
                                                {line.speaker}
                                            </span>
                                            <div className="flex gap-2">
                                                <button onClick={(e) => playAudio(line.text, e)} className="text-slate-400 hover:text-blue-600 transition-colors"><i data-lucide="volume-2" className="w-4 h-4"></i></button>
                                                <SpeechTester targetText={line.text} />
                                            </div>
                                        </div>
                                        <p className="text-lg font-medium text-slate-800 mb-1">{line.text}</p>
                                        <p className="text-sm text-slate-500 mb-2 italic">{line.en}</p>
                                        <p className="text-blue-700 font-bold ar-text border-t border-slate-200/50 pt-2 text-right" dir="rtl">{line.ar}</p>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        };

        // --- MAIN APP ---
        const App = () => {
            const [activeTab, setActiveTab] = useState('words');
            const [learnedItems, setLearnedItems] = useState(new Set());
            const [searchTerm, setSearchTerm] = useState('');

            // Load saved progress
            useEffect(() => {
                const saved = localStorage.getItem('a2_glueck_progress');
                if (saved) setLearnedItems(new Set(JSON.parse(saved)));
            }, []);

            // Save progress
            useEffect(() => {
                localStorage.setItem('a2_glueck_progress', JSON.stringify(Array.from(learnedItems)));
            }, [learnedItems]);

            useEffect(() => { lucide.createIcons(); });

            const toggleLearned = (id) => {
                const newLearned = new Set(learnedItems);
                if (newLearned.has(id)) newLearned.delete(id);
                else newLearned.add(id);
                setLearnedItems(newLearned);
            };

            // Calculate total words dynamically from all categories
            const totalWords = Object.values(LEARNING_DATA.words).reduce((acc, arr) => acc + arr.length, 0);
            const totalVerbs = LEARNING_DATA.verbs.length;
            const totalExp = LEARNING_DATA.expressions.length;
            const grandTotal = totalWords + totalVerbs + totalExp;

            const tabConfig = {
                words: { labelEn: 'Vocabulary', labelAr: 'مفردات هامة', icon: 'briefcase', color: 'orange' },
                expressions: { labelEn: 'Phrases', labelAr: 'عبارات المحادثة', icon: 'message-circle', color: 'amber' },
                dialogues: { labelEn: 'Dialogues', labelAr: 'حوارات', icon: 'phone-call', color: 'blue' },
                verbs: { labelEn: 'Verbs', labelAr: 'الأفعال الهامة', icon: 'list-checks', color: 'emerald' },
                grammar: { labelEn: 'Grammar', labelAr: 'القواعد (dass/weil)', icon: 'book-open', color: 'purple' },
                letters: { labelEn: 'Emails', labelAr: 'إيميلات ورسائل', icon: 'mail', color: 'cyan' },
                culture: { labelEn: 'Culture', labelAr: 'نصوص القراءة', icon: 'globe', color: 'rose' }
            };

            const activeColor = tabConfig[activeTab].color;

            return (
                <div className="h-screen flex flex-col bg-slate-50" dir="rtl">
                    {/* TOP NAVIGATION HEADER */}
                    <header className="w-full bg-slate-900 text-white shadow-xl z-50 shrink-0 relative overflow-hidden">
                        <div className={`absolute top-0 left-0 w-full h-1 bg-${activeColor}-500 transition-colors duration-500`}></div>

                        <div className="flex justify-between items-center px-4 md:px-8 py-3 border-b border-slate-800">
                            <h1 className="text-xl md:text-2xl font-extrabold flex items-center gap-3 ar-text">
                                <span className={`bg-${activeColor}-500 p-2 rounded-xl transition-colors duration-500 shadow-lg`}>
                                    <i data-lucide="book" className="w-5 h-5 md:w-6 md:h-6 text-white"></i>
                                </span>
                                A2: Was uns glücklich macht
                            </h1>

                            <div className="flex items-center gap-3" dir="ltr">
                                <div className="text-right hidden sm:block">
                                    <div className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Progress</div>
                                    <div className={`text-sm font-extrabold text-${activeColor}-400 transition-colors`}>{grandTotal === 0 ? 0 : Math.round((learnedItems.size / grandTotal) * 100)}%</div>
                                </div>
                                <div className="relative w-10 h-10">
                                    <svg className="w-full h-full transform -rotate-90" viewBox="0 0 36 36">
                                        <path className="text-slate-800" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" strokeWidth="4" />
                                        <path className={`text-${activeColor}-500 transition-all duration-1000 ease-out`} strokeDasharray={`${grandTotal === 0 ? 0 : (learnedItems.size / grandTotal) * 100}, 100`} d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" strokeWidth="4" strokeLinecap="round" />
                                    </svg>
                                </div>
                            </div>
                        </div>

                        {/* Horizontal Navigation Tabs */}
                        <nav className="flex overflow-x-auto scrollbar-hide px-4 py-2 gap-2 snap-x">
                            {Object.entries(tabConfig).map(([key, tab]) => (
                                <button
                                    key={key}
                                    onClick={() => { setActiveTab(key); setSearchTerm(''); }}
                                    className={`snap-center shrink-0 flex items-center gap-2 px-4 py-2.5 rounded-xl transition-all duration-300 font-bold ar-text group relative overflow-hidden ${activeTab === key ? `bg-${tab.color}-600 text-white shadow-md` : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}
                                >
                                    <i data-lucide={tab.icon} className={`w-5 h-5 ${activeTab === key ? 'text-white' : `text-${tab.color}-400 group-hover:text-${tab.color}-300`} transition-colors`}></i>
                                    <span className="text-sm whitespace-nowrap">{tab.labelAr}</span>
                                    {activeTab === key && <div className="absolute bottom-0 left-1/2 transform -translate-x-1/2 w-1/2 h-0.5 bg-white/50 rounded-t-full"></div>}
                                </button>
                            ))}
                        </nav>
                    </header>

                    {/* MAIN CONTENT AREA */}
                    <main className="flex-1 overflow-y-auto p-4 md:p-8 lg:p-12 relative" dir="ltr">
                        <div className={`fixed top-1/4 left-1/4 w-[50vw] h-[50vw] rounded-full bg-${activeColor}-200/20 blur-3xl -z-10 transition-colors duration-1000 pointer-events-none`}></div>

                        <div className="max-w-7xl mx-auto">

                            {/* LIVE SEARCH BAR */}
                            {activeTab !== 'grammar' && activeTab !== 'culture' && activeTab !== 'dialogues' && activeTab !== 'letters' && (
                                <div className="flex flex-col md:flex-row gap-4 mb-10" dir="rtl">
                                    <div className="flex-1 relative group max-w-3xl mx-auto w-full">
                                        <div className={`absolute -inset-0.5 bg-gradient-to-r from-${activeColor}-400 to-${activeColor}-600 rounded-2xl blur opacity-20 group-hover:opacity-40 transition duration-500`}></div>
                                        <div className="relative">
                                            <i data-lucide="search" className="absolute right-4 top-1/2 transform -translate-y-1/2 text-slate-400 w-6 h-6"></i>
                                            <input
                                                type="text"
                                                placeholder="ابحث بالعربي أو الألماني..."
                                                value={searchTerm}
                                                onChange={(e) => setSearchTerm(e.target.value)}
                                                className={`w-full pr-14 pl-6 py-4 rounded-2xl border-none focus:outline-none focus:ring-4 focus:ring-${activeColor}-500/20 shadow-lg text-lg ar-text text-slate-700 font-medium`}
                                            />
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* PROGRESS BARS */}
                            {activeTab === 'words' && <ProgressBar total={totalWords} learned={Array.from(learnedItems).filter(id => id.startsWith('w')).length} colorClass="text-orange-500" />}
                            {activeTab === 'verbs' && <ProgressBar total={totalVerbs} learned={Array.from(learnedItems).filter(id => id.startsWith('v')).length} colorClass="text-emerald-500" />}
                            {activeTab === 'expressions' && <ProgressBar total={totalExp} learned={Array.from(learnedItems).filter(id => id.startsWith('e')).length} colorClass="text-amber-500" />}

                            {/* TAB: WORDS */}
                            {activeTab === 'words' && (
                                <div className="space-y-12">
                                    {Object.entries(LEARNING_DATA.words).map(([category, wordsArr]) => {
                                        const titles = {
                                            glueck_und_feste: { text: "السعادة وحفلات الزفاف (Glück & Feste)", icon: "heart", color: "orange" },
                                            familienstand: { text: "الحالة الاجتماعية والزفاف (Familienstand)", icon: "users", color: "blue" },
                                            einkaufen: { text: "التسوق والمتاجر (Einkaufen)", icon: "shopping-bag", color: "red" },
                                            aktivitaeten: { text: "الأنشطة اليومية (Aktivitäten)", icon: "activity", color: "amber" }
                                        };
                                        const catInfo = titles[category] || { text: category, icon: "book", color: "slate" };
                                        return (
                                            <section key={category}>
                                                <h2 className="text-3xl font-extrabold text-slate-800 mb-6 flex items-center gap-3 ar-text" dir="rtl">
                                                    <span className={`bg-${catInfo.color}-100 p-2 rounded-xl text-${catInfo.color}-600`}>
                                                        <i data-lucide={catInfo.icon} className="w-6 h-6"></i>
                                                    </span>
                                                    {catInfo.text}
                                                </h2>
                                                <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-6">
                                                    {wordsArr.filter(w => w.ger.toLowerCase().includes(searchTerm.toLowerCase()) || w.eng.toLowerCase().includes(searchTerm.toLowerCase()) || w.ar.includes(searchTerm)).map(word => (
                                                        <WordCard key={word.id} item={word} isLearned={learnedItems.has(word.id)} toggleLearned={toggleLearned} />
                                                    ))}
                                                </div>
                                            </section>
                                        );
                                    })}
                                </div>
                            )}

                            {/* TAB: EXPRESSIONS */}
                            {activeTab === 'expressions' && (
                                <div dir="rtl">
                                    <h2 className="text-3xl font-extrabold text-slate-800 mb-8 flex items-center gap-3 ar-text">
                                        <span className="bg-amber-100 p-2 rounded-xl text-amber-600"><i data-lucide="message-circle" className="w-6 h-6"></i></span>
                                        عبارات المحادثة (Ausdrücke)
                                    </h2>
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                        {LEARNING_DATA.expressions.filter(e => e.ger.toLowerCase().includes(searchTerm.toLowerCase()) || e.eng.toLowerCase().includes(searchTerm.toLowerCase()) || e.ar.includes(searchTerm)).map(exp => (
                                            <div key={exp.id} className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm relative group hover:shadow-xl hover:border-amber-200 transition-all duration-300">
                                                <button onClick={() => toggleLearned(exp.id)} className={`absolute top-5 left-5 p-2 rounded-full transition-colors z-10 ${learnedItems.has(exp.id) ? 'bg-amber-100 text-amber-600' : 'bg-slate-50 text-slate-300 hover:bg-slate-100'}`}>
                                                    <i data-lucide="check" className="w-5 h-5"></i>
                                                </button>
                                                <span className="inline-block bg-amber-50 text-amber-600 px-3 py-1 rounded-lg text-xs font-bold mb-4 ar-text border border-amber-100">{exp.type}</span>
                                                <div className="flex items-start gap-3 mb-3" dir="ltr">
                                                    <div className="flex flex-col gap-2 shrink-0">
                                                        <button onClick={(e) => playAudio(exp.ger, e)} className="text-amber-500 bg-amber-50 p-2 rounded-xl hover:bg-amber-100 transition-colors"><i data-lucide="volume-2" className="w-5 h-5"></i></button>
                                                        <div className="bg-slate-50 rounded-full p-1"><SpeechTester targetText={exp.ger} /></div>
                                                    </div>
                                                    <div>
                                                        <h3 className="text-lg font-extrabold text-slate-800 leading-tight mt-1">"{exp.ger}"</h3>
                                                    </div>
                                                </div>

                                                <div className="bg-slate-50 rounded-2xl p-4 mt-4 border border-slate-100">
                                                    <p className="text-slate-500 font-medium text-sm mb-2" dir="ltr">{exp.eng}</p>
                                                    <p className="text-amber-700 font-extrabold text-lg mb-4 ar-text">{exp.ar}</p>
                                                    <div className="text-sm text-slate-600 flex gap-2 items-start pt-3 border-t border-slate-200">
                                                        <i data-lucide="info" className="w-5 h-5 text-amber-400 mt-0.5 shrink-0"></i>
                                                        <span className="ar-text leading-relaxed">{exp.context}</span>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* TAB: DIALOGUES */}
                            {activeTab === 'dialogues' && (
                                <div dir="rtl">
                                    <h2 className="text-3xl font-extrabold text-slate-800 mb-8 flex items-center gap-3 ar-text">
                                        <span className="bg-blue-100 p-2 rounded-xl text-blue-600"><i data-lucide="mic" className="w-6 h-6"></i></span>
                                        مقابلات وحوارات (Interviews)
                                    </h2>
                                    <div className="max-w-4xl mx-auto space-y-6">
                                        {LEARNING_DATA.dialogues.map(dialogue => (
                                            <DialogueRow key={dialogue.id} dialogue={dialogue} />
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* TAB: VERBS */}
                            {activeTab === 'verbs' && (
                                <div>
                                    <h2 className="text-3xl font-extrabold text-slate-800 mb-8 flex items-center gap-3 ar-text" dir="rtl">
                                        <span className="bg-emerald-100 p-2 rounded-xl text-emerald-600"><i data-lucide="list-checks" className="w-6 h-6"></i></span>
                                        الأفعال الهامة (Verben)
                                    </h2>
                                    <div className="space-y-4 max-w-4xl mx-auto">
                                        {LEARNING_DATA.verbs.filter(v => v.ger.toLowerCase().includes(searchTerm.toLowerCase()) || v.eng.toLowerCase().includes(searchTerm.toLowerCase()) || v.ar.includes(searchTerm)).map(verb => (
                                            <VerbRow key={verb.id} item={verb} isLearned={learnedItems.has(verb.id)} toggleLearned={toggleLearned} />
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* TAB: GRAMMAR */}
                            {activeTab === 'grammar' && (
                                <div dir="rtl">
                                    <div className="bg-gradient-to-br from-purple-700 to-indigo-800 text-white p-10 rounded-3xl shadow-xl mb-10 relative overflow-hidden">
                                        <i data-lucide="book-open" className="absolute -right-4 -bottom-4 w-48 h-48 text-white opacity-10 transform rotate-12"></i>
                                        <div className="relative z-10">
                                            <h2 className="text-4xl font-extrabold mb-3 ar-text">القواعد النحوية (Grammatik)</h2>
                                            <p className="text-purple-200 ar-text text-lg max-w-2xl">تكوين الجمل الجانبية باستخدام (dass) والفرق بين الروابط (weil / denn).</p>
                                        </div>
                                    </div>

                                    <div className="grid gap-8">
                                        {LEARNING_DATA.grammar.map((gram, idx) => (
                                            <div key={idx} className="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden hover:shadow-lg transition-shadow">
                                                <div className="p-8 border-b border-slate-50 bg-slate-50/50 flex items-start gap-4">
                                                    <div className="bg-purple-100 p-3 rounded-2xl text-purple-600 shrink-0 mt-1">
                                                        <i data-lucide="braces" className="w-6 h-6"></i>
                                                    </div>
                                                    <div>
                                                        <h3 className="text-2xl font-extrabold text-slate-800 ar-text mb-2">{gram.title}</h3>
                                                        <p className="text-base text-slate-600 ar-text leading-relaxed">{gram.desc}</p>
                                                    </div>
                                                </div>

                                                <div className="p-8">
                                                    {gram.structure && (
                                                        <div className="bg-slate-900 text-purple-300 font-mono text-base p-5 rounded-2xl mb-8 shadow-inner flex items-center gap-3 overflow-x-auto border border-slate-800" dir="ltr">
                                                            <i data-lucide="code" className="text-slate-500 w-5 h-5 shrink-0"></i>
                                                            <span className="whitespace-pre-line">{gram.structure}</span>
                                                        </div>
                                                    )}

                                                    {gram.examples && (
                                                        <>
                                                            <h4 className="font-bold text-slate-400 mb-4 text-sm tracking-widest uppercase ar-text">أمثلة للتوضيح:</h4>
                                                            <ul className="space-y-4">
                                                                {gram.examples.map((ex, i) => (
                                                                    <li key={i} className="bg-purple-50/50 p-5 rounded-2xl border border-purple-100">
                                                                        <span className="inline-block bg-purple-100 text-purple-700 px-3 py-1 rounded-lg text-xs font-bold mb-3 ar-text">{ex.category}</span>
                                                                        <div className="flex gap-4 items-start mb-3" dir="ltr">
                                                                            <button onClick={(e) => playAudio(ex.g, e)} className="text-purple-500 bg-white p-2 rounded-xl shadow-sm hover:bg-purple-50 transition-colors shrink-0"><i data-lucide="volume-2" className="w-5 h-5"></i></button>
                                                                            <div className="flex flex-col gap-1">
                                                                                <span className="text-slate-800 text-lg font-medium" dangerouslySetInnerHTML={{ __html: ex.g }}></span>
                                                                                {ex.e && <span className="text-slate-500 text-sm italic">{ex.e}</span>}
                                                                            </div>
                                                                        </div>
                                                                        <div className="text-purple-700 font-bold ar-text border-t border-purple-200/50 pt-3 mt-3">{ex.a}</div>
                                                                    </li>
                                                                ))}
                                                            </ul>
                                                        </>
                                                    )}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* TAB: LETTERS */}
                            {activeTab === 'letters' && (
                                <div dir="rtl">
                                    <div className="bg-gradient-to-br from-cyan-600 to-teal-800 text-white p-10 rounded-3xl shadow-xl mb-10 relative overflow-hidden">
                                        <i data-lucide="mail" className="absolute -left-4 -top-4 w-48 h-48 text-white opacity-10 transform -rotate-12"></i>
                                        <div className="relative z-10">
                                            <h2 className="text-4xl font-extrabold mb-3 ar-text">رسائل وإيميلات (E-Mails & SMS)</h2>
                                            <p className="text-cyan-100 ar-text text-lg max-w-2xl">طريقة كتابة الدعوات، الإيميلات والرسائل القصيرة في المواقف المختلفة.</p>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-1 gap-8">
                                        {LEARNING_DATA.letters.map((letter) => (
                                            <div key={letter.id} className="bg-white rounded-3xl p-8 shadow-sm border border-slate-100 hover:shadow-lg transition-shadow relative">
                                                <div className="absolute top-0 right-8 transform -translate-y-1/2 bg-cyan-100 text-cyan-700 px-4 py-1 rounded-full font-bold text-sm tracking-wider uppercase shadow-sm">
                                                    Text
                                                </div>
                                                <h3 className="text-2xl font-extrabold text-slate-800 ar-text mb-6 mt-2 flex items-center gap-3">
                                                    <i data-lucide="message-square" className="w-6 h-6 text-cyan-500"></i> {letter.title}
                                                </h3>
                                                <div className="space-y-4">
                                                    {letter.lines.map((line, idx) => {
                                                        const isHeader = line.g.includes("---");
                                                        return (
                                                            <div key={idx} className={`${isHeader ? 'bg-cyan-600 text-white font-bold text-center py-2 rounded-xl my-4' : 'bg-slate-50/50 p-4 rounded-2xl border border-cyan-100 shadow-sm flex flex-col sm:flex-row gap-4 justify-between items-start group'}`}>
                                                                {isHeader ? (
                                                                    <span className="ar-text">{line.a}</span>
                                                                ) : (
                                                                    <>
                                                                        <div className="flex-1">
                                                                            <div className="flex items-start gap-3 mb-2" dir="ltr">
                                                                                <button onClick={(e) => playAudio(line.g, e)} className="mt-0.5 text-cyan-600 bg-white p-2 rounded-xl shadow-sm hover:bg-cyan-50 transition-colors shrink-0">
                                                                                    <i data-lucide="volume-2" className="w-4 h-4"></i>
                                                                                </button>
                                                                                <p className="text-slate-800 text-lg font-medium leading-relaxed mt-1" dangerouslySetInnerHTML={{ __html: line.g }}></p>
                                                                            </div>
                                                                            {line.e && <p className="sm:ml-14 text-slate-500 text-sm italic mb-2" dir="ltr">{line.e}</p>}
                                                                            <div className="sm:ml-14 text-cyan-800 text-base font-bold ar-text border-t border-slate-200 pt-3 text-right" dir="rtl" dangerouslySetInnerHTML={{ __html: line.a }}>
                                                                            </div>
                                                                        </div>
                                                                        <div className="opacity-100 sm:opacity-0 group-hover:opacity-100 transition-opacity shrink-0 sm:mt-1 self-end sm:self-start bg-white shadow-sm p-1.5 rounded-full" dir="ltr">
                                                                            <SpeechTester targetText={line.g} />
                                                                        </div>
                                                                    </>
                                                                )}
                                                            </div>
                                                        )
                                                    })}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* TAB: CULTURE */}
                            {activeTab === 'culture' && (
                                <div dir="rtl">
                                    <div className="bg-gradient-to-br from-rose-600 to-red-800 text-white p-10 rounded-3xl shadow-xl mb-10 relative overflow-hidden">
                                        <i data-lucide="book-open" className="absolute -left-4 -top-4 w-48 h-48 text-white opacity-10 transform -rotate-12"></i>
                                        <div className="relative z-10">
                                            <h2 className="text-4xl font-extrabold mb-3 ar-text">نصوص القراءة (Lesetexte)</h2>
                                            <p className="text-rose-200 ar-text text-lg max-w-2xl">نصوص قراءة عن السعادة، الزفاف في ألمانيا ومصر، والمتاجر الألمانية.</p>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-1 gap-8">
                                        {LEARNING_DATA.culture.map((item) => (
                                            <div key={item.id} className="bg-white rounded-3xl p-8 shadow-sm border border-slate-100 hover:shadow-lg transition-shadow relative">
                                                <div className="absolute top-0 right-8 transform -translate-y-1/2 bg-rose-100 text-rose-600 px-4 py-1 rounded-full font-bold text-sm tracking-wider uppercase shadow-sm">
                                                    Lesetext
                                                </div>
                                                <h3 className="text-3xl font-extrabold text-slate-800 ar-text mb-6 mt-2">{item.title}</h3>
                                                <div className="space-y-4">
                                                    {item.lines.map((line, idx) => (
                                                        <div key={idx} className="bg-slate-50/50 p-4 rounded-2xl border border-rose-100 shadow-sm flex flex-col sm:flex-row gap-4 justify-between items-start group">
                                                            <div className="flex-1">
                                                                <div className="flex items-start gap-3 mb-2" dir="ltr">
                                                                    <button onClick={(e) => playAudio(line.g, e)} className="mt-0.5 text-rose-500 bg-white p-2 rounded-xl shadow-sm hover:bg-rose-50 transition-colors shrink-0">
                                                                        <i data-lucide="volume-2" className="w-4 h-4"></i>
                                                                    </button>
                                                                    <p className="text-slate-800 text-xl font-medium leading-relaxed mt-1" dangerouslySetInnerHTML={{ __html: line.g }}></p>
                                                                </div>
                                                                {line.e && <p className="sm:ml-14 text-slate-500 text-sm italic mb-2" dir="ltr">{line.e}</p>}
                                                                <div className="sm:ml-14 text-rose-700 text-lg font-bold ar-text border-t border-slate-200 pt-3 text-right" dir="rtl" dangerouslySetInnerHTML={{ __html: line.a }}>
                                                                </div>
                                                            </div>
                                                            <div className="opacity-100 sm:opacity-0 group-hover:opacity-100 transition-opacity shrink-0 sm:mt-1 self-end sm:self-start bg-white shadow-sm p-1.5 rounded-full" dir="ltr">
                                                                <SpeechTester targetText={line.g} />
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
