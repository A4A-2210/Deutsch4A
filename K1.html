    <script type="text/babel">
        const useState = React.useState;
        const useEffect = React.useEffect;

        // --- HELPERS FOR AUDIO & SPEECH ---
        const playAudio = (text, e) => {
            if (e) e.stopPropagation();
            const cleanText = text.replace(/<[^>]+>/g, '');
            const utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.lang = 'de-DE';
            window.speechSynthesis.speak(utterance);
        };

        const SpeechTester = ({ targetText }) => {
            const [status, setStatus] = useState('idle'); 
            const [heard, setHeard] = useState('');

            const listen = (e) => {
                if (e) e.stopPropagation();
                if (!('webkitSpeechRecognition' in window)) {
                    alert('المتصفح ده مش بيدعم تسجيل الصوت، جرب Google Chrome.');
                    return;
                }
                const recognition = new webkitSpeechRecognition();
                recognition.lang = 'de-DE';
                recognition.interimResults = false;
                
                recognition.onstart = () => setStatus('listening');
                recognition.onresult = (event) => {
                    const speechResult = event.results[0][0].transcript;
                    setHeard(speechResult);
                    
                    const clean = (str) => str.replace(/<[^>]+>/g, '').toLowerCase().replace(/[.,!?]/g, '').trim();
                    const targetClean = clean(targetText);
                    const heardClean = clean(speechResult);
                    
                    if (heardClean.includes(targetClean) || targetClean.includes(heardClean) || heardClean === targetClean) {
                        setStatus('success');
                    } else {
                        setStatus('fail');
                    }
                };
                recognition.onerror = () => setStatus('fail');
                recognition.onend = () => { if(status === 'listening') setStatus('idle'); };
                recognition.start();
            };

            return (
                <div className="inline-flex items-center gap-2" onClick={(e) => e.stopPropagation()}>
                    <button onClick={listen} title="جرب تنطقها" className={`p-2 rounded-full transition-all duration-300 shadow-sm ${status === 'listening' ? 'bg-red-500 text-white animate-pulse scale-110' : 'bg-slate-100 text-slate-600 hover:bg-slate-200 hover:scale-105'}`}>
                        <i data-lucide="mic" className="w-4 h-4"></i>
                    </button>
                    {status === 'success' && <span className="text-emerald-500 text-xs font-bold ar-text animate-bounce">✅ ممتاز!</span>}
                    {status === 'fail' && <span className="text-red-500 text-xs ar-text font-bold" title={`سمعت: ${heard}`}>❌ جرب تاني</span>}
                </div>
            );
        };

                { id: 'iv37', ger: "zusammenhängen", praesens: "hängt zusammen", praeteritum: "hing zusammen", perfekt: "hat zusammengehangen", eng: "to be connected", ar: "يرتبط بـ / له علاقة بـ", s: [{g:"Das hängt mit dem Wetter zusammen.",e:"That is related to the weather.",a:"ده ليه علاقة بالجو."},{g:"Beide Fälle hingen eng zusammen.",e:"Both cases were closely connected.",a:"القضيتين كانوا مرتبطين ببعض جداً."},{g:"Wie hat das zusammengehangen?",e:"How was that connected?",a:"إزاي ده كان ليه علاقة بده؟"}] },
                { id: 'iv38', ger: "entwickeln", praesens: "entwickelt", praeteritum: "entwickelte", perfekt: "hat entwickelt", eng: "to develop", ar: "يطور", s: [{g:"Die Firma entwickelt neue Software.",e:"The company develops new software.",a:"الشركة بتطور سوفت وير جديد."},{g:"Er entwickelte eine gute Strategie.",e:"He developed a good strategy.",a:"هو طور خطة كويسة."},{g:"Der Markt hat sich schnell entwickelt.",e:"The market has developed quickly.",a:"السوق اتطور بسرعة."}] },
                { id: 'iv39', ger: "auszeichnen", praesens: "zeichnet aus", praeteritum: "zeichnete aus", perfekt: "hat ausgezeichnet", eng: "to award", ar: "يكرم / يميز", s: [{g:"Die Stadt zeichnet den Künstler aus.",e:"The city awards the artist.",a:"المدينة بتكرم الفنان."},{g:"Man zeichnete ihn für seine Arbeit aus.",e:"He was awarded for his work.",a:"هو اتكرم عشان شغله."},{g:"Der Film ist ausgezeichnet worden.",e:"The film has been awarded.",a:"الفيلم خد جوايز."}] },
                { id: 'iv40', ger: "dienen", praesens: "dient", praeteritum: "diente", perfekt: "hat gedient", eng: "to serve", ar: "يخدم", s: [{g:"Das Gebäude dient als Museum.",e:"The building serves as a museum.",a:"المبنى ده بيخدم كمتحف."},{g:"Er diente im Militär.",e:"He served in the military.",a:"هو خدم في الجيش."},{g:"Wozu hat das gedient?",e:"What was the purpose of that?",a:"ده كان فايدته إيه؟"}] }
            ],
            expressions: [
                { id: 'e1', type: "Alltag", ger: "um 7.00 Uhr aufstehen", eng: "to get up at 7:00 am", ar: "يصحى الساعة 7 الصبح", context: "تعبير يومي", s: [{g:"Ich muss morgen um 7.00 Uhr aufstehen.",e:"I have to get up at 7:00 am tomorrow.",a:"لازم أصحى بكرة الساعة 7 الصبح."},{g:"Er ist heute um 7.00 Uhr aufgestanden.",e:"He got up at 7:00 am today.",a:"هو صحي النهاردة الساعة 7 الصبح."},{g:"Können wir um 7.00 Uhr aufstehen?",e:"Can we get up at 7:00 am?",a:"ممكن نصحى الساعة 7 الصبح؟"}] },
                { id: 'e2', type: "Alltag", ger: "mit dem Bus ins Büro fahren", eng: "to go to the office by bus", ar: "يروح الشغل بالأتوبيس", context: "تعبير يومي", s: [{g:"Ich fahre immer mit dem Bus ins Büro.",e:"I always go to the office by bus.",a:"أنا دايماً بروح الشغل بالأتوبيس."},{g:"Fährst du heute mit dem Bus ins Büro?",e:"Are you taking the bus to the office today?",a:"إنت رايح الشغل بالأتوبيس النهاردة؟"},{g:"Gestern bin ich mit dem Bus ins Büro gefahren.",e:"Yesterday I went to the office by bus.",a:"امبارح رحت الشغل بالأتوبيس."}] },
                { id: 'e3', type: "Alltag", ger: "im Stau stehen", eng: "to stand in a traffic jam", ar: "يقف في الزحمة", context: "تعبير يومي", s: [{g:"Wir stehen jeden Morgen im Stau.",e:"We stand in a traffic jam every morning.",a:"إحنا بنقف في الزحمة كل يوم الصبح."},{g:"Ich hasse es, im Stau zu stehen.",e:"I hate standing in a traffic jam.",a:"أنا بكره إني أقف في زحمة."},{g:"Gestern stand ich stundenlang im Stau.",e:"Yesterday I stood in a traffic jam for hours.",a:"امبارح وقفت في الزحمة بالساعات."}] },
                { id: 'e4', type: "Alltag", ger: "auf den Fahrstuhl warten", eng: "to wait for the elevator", ar: "يستنى الأسانسير", context: "تعبير يومي", s: [{g:"Wir warten schon lange auf den Fahrstuhl.",e:"We have been waiting for the elevator for a long time.",a:"إحنا مستنيين الأسانسير بقالنا كتير."},{g:"Müssen wir auf den Fahrstuhl warten?",e:"Do we have to wait for the elevator?",a:"لازم نستنى الأسانسير؟"},{g:"Er wartet unten auf den Fahrstuhl.",e:"He is waiting downstairs for the elevator.",a:"هو مستني الأسانسير تحت."}] },
                { id: 'e5', type: "Alltag", ger: "auf das Smartphone schauen", eng: "to look at the smartphone", ar: "يبص في الموبايل", context: "تعبير يومي", s: [{g:"Man sollte nicht immer auf das Smartphone schauen.",e:"One shouldn't always look at the smartphone.",a:"الواحد المفروض مايبصش في الموبايل على طول."},{g:"Er schaut oft auf das Smartphone.",e:"He often looks at the smartphone.",a:"هو بيبص في الموبايل كتير."},{g:"Hör auf, auf das Smartphone zu schauen!",e:"Stop looking at the smartphone!",a:"بطل تبص في الموبايل!"}] },
                { id: 'e6', type: "Alltag", ger: "Lebensmittel einkaufen", eng: "to buy groceries", ar: "يشتري طلبات البيت (بقالة)", context: "تعبير يومي", s: [{g:"Ich muss heute Nachmittag Lebensmittel einkaufen.",e:"I have to buy groceries this afternoon.",a:"لازم أشتري طلبات البيت النهاردة بعد الضهر."},{g:"Wir haben zusammen Lebensmittel eingekauft.",e:"We bought groceries together.",a:"إحنا اشترينا طلبات البيت مع بعض."},{g:"Kaufst du die Lebensmittel ein?",e:"Are you buying the groceries?",a:"إنت هتشتري طلبات البيت؟"}] },
                { id: 'e7', type: "Alltag", ger: "die Wohnung aufräumen", eng: "to tidy up the apartment", ar: "يروق الشقة", context: "تعبير يومي", s: [{g:"Am Samstag räume ich die Wohnung auf.",e:"On Saturday I tidy up the apartment.",a:"يوم السبت بروق الشقة."},{g:"Hilfst du mir, die Wohnung aufzuräumen?",e:"Will you help me tidy up the apartment?",a:"هتساعدني أروق الشقة؟"},{g:"Ich habe die ganze Wohnung aufgeräumt.",e:"I tidied up the whole apartment.",a:"أنا روقت الشقة كلها."}] },
                { id: 'e8', type: "Büro", ger: "E-Mails checken", eng: "to check emails", ar: "يشوف الإيميلات", context: "تعبير يومي", s: [{g:"Morgens checke ich zuerst meine E-Mails.",e:"In the morning I first check my emails.",a:"أول حاجة بعملها الصبح بشوف إيميلاتي."},{g:"Er checkt seine E-Mails regelmäßig.",e:"He checks his emails regularly.",a:"هو بيشوف إيميلاته بانتظام."},{g:"Ich habe vergessen, die E-Mails zu checken.",e:"I forgot to check the emails.",a:"أنا نسيت أشوف الإيميلات."}] },
                { id: 'e9', type: "Büro", ger: "eine Besprechung haben", eng: "to have a meeting", ar: "عنده اجتماع", context: "تعبير يومي", s: [{g:"Wir haben um 10 Uhr eine Besprechung.",e:"We have a meeting at 10 o'clock.",a:"عندنا اجتماع الساعة 10."},{g:"Ich habe heute viele Besprechungen.",e:"I have many meetings today.",a:"أنا عندي اجتماعات كتير النهاردة."},{g:"Er hatte gestern eine wichtige Besprechung.",e:"He had an important meeting yesterday.",a:"كان عنده اجتماع مهم امبارح."}] },
                { id: 'e10', type: "Büro", ger: "Probleme lösen", eng: "to solve problems", ar: "يحل مشاكل", context: "تعبير يومي", s: [{g:"Ein guter Manager muss Probleme lösen.",e:"A good manager must solve problems.",a:"المدير الشاطر لازم يحل المشاكل."},{g:"Wir haben das Problem schnell gelöst.",e:"We solved the problem quickly.",a:"إحنا حلينا المشكلة بسرعة."},{g:"Ich helfe dir, die Probleme zu lösen.",e:"I help you solve the problems.",a:"أنا بساعدك تحل المشاكل."}] },
                { id: 'e11', type: "Büro", ger: "Ideen sammeln", eng: "to brainstorm", ar: "يجمع أفكار", context: "تعبير يومي", s: [{g:"Wir treffen uns, um Ideen zu sammeln.",e:"We meet to brainstorm.",a:"إحنا بنتقابل عشان نجمع أفكار."},{g:"Habt ihr schon Ideen gesammelt?",e:"Have you already brainstormed?",a:"إنتوا جمعتوا أفكار خلاص؟"},{g:"Er sammelt Ideen für das neue Projekt.",e:"He is brainstorming for the new project.",a:"هو بيجمع أفكار للمشروع الجديد."}] },
                { id: 'e12', type: "Uni", ger: "an einer Konferenz teilnehmen", eng: "to participate in a conference", ar: "يحضر مؤتمر", context: "تعبير يومي", s: [{g:"Ich nehme an einer Konferenz teil.",e:"I am participating in a conference.",a:"أنا بشارك في مؤتمر."},{g:"Sie wird nächste Woche an der Konferenz teilnehmen.",e:"She will participate in the conference next week.",a:"هي هتحضر المؤتمر الأسبوع الجاي."},{g:"Er hat an einer wichtigen Konferenz teilgenommen.",e:"He participated in an important conference.",a:"هو حضر مؤتمر مهم."}] },
                { id: 'e13', type: "Büro", ger: "Arbeitsergebnisse präsentieren", eng: "to present work results", ar: "يعرض نتايج شغله", context: "تعبير يومي", s: [{g:"Wir müssen unsere Arbeitsergebnisse präsentieren.",e:"We have to present our work results.",a:"لازم نعرض نتايج شغلنا."},{g:"Wann präsentierst du deine Arbeitsergebnisse?",e:"When are you presenting your work results?",a:"هتعرض نتايج شغلك إمتى؟"},{g:"Sie hat hervorragende Arbeitsergebnisse präsentiert.",e:"She presented excellent work results.",a:"هي عرضت نتايج شغل ممتازة."}] },
                { id: 'e14', type: "Freude", ger: "mit dem Alltag zufrieden sein", eng: "to be satisfied with everyday life", ar: "راضي عن حياته اليومية", context: "تعبير يومي", s: [{g:"Bist du mit dem Alltag zufrieden?",e:"Are you satisfied with everyday life?",a:"إنت راضي عن حياتك اليومية؟"},{g:"Ich bin mit meinem Alltag sehr zufrieden.",e:"I am very satisfied with my everyday life.",a:"أنا راضي جداً عن روتيني اليومي."},{g:"Viele Menschen sind mit ihrem Alltag unzufrieden.",e:"Many people are dissatisfied with their everyday life.",a:"ناس كتير مش راضية عن حياتها اليومية."}] },
                { id: 'e15', type: "Freude", ger: "sein Leben selbst bestimmen", eng: "to determine one's own life", ar: "يتحكم في حياته بنفسه", context: "تعبير يومي", s: [{g:"Ich will mein Leben selbst bestimmen.",e:"I want to determine my own life.",a:"أنا عايز أتحكم في حياتي بنفسي."},{g:"Es ist wichtig, sein Leben selbst zu bestimmen.",e:"It is important to determine one's own life.",a:"مهم إن الواحد ياخد قراراته بنفسه."},{g:"Er kann sein Leben endlich selbst bestimmen.",e:"He can finally determine his own life.",a:"هو أخيراً يقدر يتحكم في حياته."}] },
                { id: 'e16', type: "Ärger", ger: "sich über die Arbeit ärgern", eng: "to be annoyed about work", ar: "يتعصب من الشغل", context: "تعبير يومي", s: [{g:"Ich ärgere mich oft über die Arbeit.",e:"I am often annoyed about work.",a:"أنا بتعصب كتير من الشغل."},{g:"Er hat sich sehr über die Arbeit geärgert.",e:"He was very annoyed about work.",a:"هو كان متضايق جداً من الشغل."},{g:"Ärgerst du dich auch über die viele Arbeit?",e:"Are you also annoyed about all the work?",a:"إنت كمان متضايق من الشغل الكتير؟"}] },
                { id: 'e17', type: "Ärger", ger: "Mich nervt es, wenn...", eng: "It annoys me when...", ar: "بيستفزني أوي لما...", context: "تعبير يومي", s: [{g:"Mich nervt es, wenn der Zug spät kommt.",e:"It annoys me when the train is late.",a:"بيعصبني لما القطر يتأخر."},{g:"Mich nervt es, wenn die Nachbarn laut sind.",e:"It annoys me when the neighbors are loud.",a:"بيستفزني لما الجيران يبقوا دوشة."},{g:"Weißt du, mich nervt es, wenn Leute lügen.",e:"You know, it annoys me when people lie.",a:"عارف، بيستفزني لما الناس بتكدب."}] },
                { id: 'e18', type: "Freude", ger: "ein Lob bekommen", eng: "to receive praise", ar: "ياخد مدح / حد يشكر فيه", context: "تعبير يومي", s: [{g:"Ich freue mich, wenn ich ein Lob bekomme.",e:"I am happy when I receive praise.",a:"بفرح لما حد بيمدحني."},{g:"Sie hat vom Chef ein Lob bekommen.",e:"She received praise from the boss.",a:"هي خدت كلمة شكر من المدير."},{g:"Hast du für diese Arbeit ein Lob bekommen?",e:"Did you get praise for this work?",a:"حد مدحك على الشغل ده؟"}] },
                { id: 'e19', type: "Grammatik", ger: "Ich weiß nicht, ob...", eng: "I don't know whether/if...", ar: "مش عارف إذا كان...", context: "تعبير يومي", s: [{g:"Ich weiß nicht, ob er heute kommt.",e:"I don't know if he is coming today.",a:"مش عارف إذا كان هييجي النهاردة."},{g:"Ich weiß nicht, ob das eine gute Idee ist.",e:"I don't know if that's a good idea.",a:"مش عارف دي فكرة كويسة ولا لأ."},{g:"Sie weiß nicht, ob sie Zeit hat.",e:"She doesn't know if she has time.",a:"هي مش عارفة إذا كان عندها وقت."}] },
                { id: 'e20', type: "Grammatik", ger: "Ich finde es interessant, dass...", eng: "I find it interesting that...", ar: "شايف إنه شيء مثير للاهتمام إن...", context: "تعبير يومي", s: [{g:"Ich finde es interessant, dass du das fragst.",e:"I find it interesting that you ask that.",a:"شايف إنه شيء مثير للاهتمام إنك بتسأل السؤال ده."},{g:"Ich finde es interessant, dass das Wetter so warm ist.",e:"I find it interesting that the weather is so warm.",a:"مستغرب (مهتم) إن الجو دافي كدة."},{g:"Wir finden es interessant, dass der Kurs kostenlos ist.",e:"We find it interesting that the course is free.",a:"إحنا شايفين إنه شيء شيق إن الكورس مجاني."}] },
                { id: 'e21', type: "Grammatik", ger: "Worauf wartest du?", eng: "What are you waiting for?", ar: "مستني إيه؟", context: "تعبير يومي", s: [{g:"Worauf wartest du denn noch?",e:"What are you still waiting for?",a:"إنت لسه مستني إيه؟"},{g:"Sag mir, worauf wartest du?",e:"Tell me, what are you waiting for?",a:"قولي، مستني إيه؟"},{g:"Worauf wartest du? Lass uns gehen!",e:"What are you waiting for? Let's go!",a:"مستني إيه؟ يلا بينا!"}] },
                { id: 'e22', type: "Grammatik", ger: "Ich warte darauf.", eng: "I'm waiting for it.", ar: "مستنيه. (لغير العاقل)", context: "تعبير يومي", s: [{g:"Kommt der Bus bald? – Ich warte darauf.",e:"Is the bus coming soon? – I'm waiting for it.",a:"الأتوبيس جي قريب؟ - أنا مستنيه."},{g:"Ich warte darauf, dass der Regen aufhört.",e:"I'm waiting for the rain to stop.",a:"أنا مستني المطر يقف."},{g:"Sie wartet darauf, eine Antwort zu bekommen.",e:"She is waiting to get an answer.",a:"هي مستنية يجيلها رد."}] },
                { id: 'e23', type: "Grammatik", ger: "Wovon träumst du?", eng: "What do you dream of?", ar: "بتحلم بإيه؟", context: "تعبير يومي", s: [{g:"Wovon träumst du nachts?",e:"What do you dream of at night?",a:"بتحلم بإيه بالليل؟"},{g:"Sag mal, wovon träumst du eigentlich?",e:"Tell me, what are you actually dreaming of?",a:"قولي، إنت بتحلم بإيه بجد؟"},{g:"Wovon träumst du für deine Zukunft?",e:"What do you dream of for your future?",a:"بتحلم بإيه لمستقبلك؟"}] },
                { id: 'e24', type: "Umfragen", ger: "Einer Umfrage zufolge...", eng: "According to a survey...", ar: "وفقاً لاستطلاع رأي...", context: "تعبير يومي", s: [{g:"Einer Umfrage zufolge sind viele Menschen gestresst.",e:"According to a survey, many people are stressed.",a:"وفقاً لاستطلاع رأي، ناس كتير مضغوطة."},{g:"Einer Umfrage zufolge essen Deutsche gern Fleisch.",e:"According to a survey, Germans like eating meat.",a:"حسب استطلاع، الألمان بيحبوا اللحمة."},{g:"Einer Umfrage zufolge lesen Frauen mehr Bücher.",e:"According to a survey, women read more books.",a:"بناءً على استطلاع، الستات بتقرأ كتب أكتر."}] },
                { id: 'e25', type: "Umfragen", ger: "Laut einer Studie...", eng: "According to a study...", ar: "بناءً على دراسة...", context: "تعبير يومي", s: [{g:"Laut einer Studie ist Kaffee gesund.",e:"According to a study, coffee is healthy.",a:"بناءً على دراسة، القهوة مفيدة."},{g:"Laut einer Studie schlafen wir zu wenig.",e:"According to a study, we sleep too little.",a:"حسب دراسة، إحنا بننام قليل أوي."},{g:"Laut einer Studie macht Sport glücklich.",e:"According to a study, sports make you happy.",a:"وفقاً لدراسة، الرياضة بتجيب السعادة."}] },
                { id: 'e26', type: "Umfragen", ger: "Aus der Statistik geht hervor, dass...", eng: "From the statistics, it emerges that...", ar: "من الإحصائيات نستنتج إن...", context: "تعبير يومي", s: [{g:"Aus der Statistik geht hervor, dass die Arbeitslosigkeit sinkt.",e:"Statistics show that unemployment is dropping.",a:"من الإحصائية واضح إن البطالة بتقل."},{g:"Aus der Statistik geht hervor, dass Autos teurer werden.",e:"Statistics show that cars are getting more expensive.",a:"من الإحصائية باين إن العربيات بتغلى."},{g:"Aus der Statistik geht hervor, dass mehr Leute reisen.",e:"Statistics show that more people are traveling.",a:"من الإحصائيات واضح إن ناس أكتر بتسافر."}] },
                { id: 'e27', type: "Umfragen", ger: "nicht auf den vorderen Plätzen liegen", eng: "to not rank in the top spots", ar: "مش في المراكز الأولى", context: "تعبير يومي", s: [{g:"Lesen liegt leider nicht auf den vorderen Plätzen.",e:"Reading unfortunately doesn't rank in the top spots.",a:"القراءة للأسف مش في المراكز الأولى."},{g:"Dieser Sport liegt nicht auf den vorderen Plätzen.",e:"This sport doesn't rank in the top spots.",a:"الرياضة دي مش من ضمن المراكز الأولى."},{g:"Gesundes Essen liegt oft nicht auf den vorderen Plätzen.",e:"Healthy food often doesn't rank in the top spots.",a:"الأكل الصحي غالباً مبيكونش في المراكز الأولى."}] },
                { id: 'e28', type: "Krimis", ger: "Spannung bieten", eng: "to offer suspense", ar: "يقدم إثارة وتشويق", context: "تعبير يومي", s: [{g:"Gute Filme müssen Spannung bieten.",e:"Good movies must offer suspense.",a:"الأفلام الحلوة لازم يكون فيها تشويق."},{g:"Dieser Krimi bietet viel Spannung.",e:"This thriller offers a lot of suspense.",a:"الرواية دي فيها إثارة كتير."},{g:"Das Spiel bietet Spannung bis zum Schluss.",e:"The game offers suspense until the end.",a:"الماتش فيه تشويق لحد الآخر."}] },
                { id: 'e29', type: "Krimis", ger: "Straftaten aufklären", eng: "to solve crimes", ar: "يحل الجرائم", context: "تعبير يومي", s: [{g:"Die Polizei konnte die Straftaten aufklären.",e:"The police were able to solve the crimes.",a:"البوليس قدر يحل الجرايم."},{g:"Er hilft dabei, Straftaten aufzuklären.",e:"He helps to solve crimes.",a:"هو بيساعد في حل الجرايم."},{g:"Es ist schwer, alle Straftaten aufzuklären.",e:"It is hard to solve all crimes.",a:"صعب إن كل الجرايم تتحل."}] },
                { id: 'e30', type: "Krimis", ger: "um Mithilfe bitten", eng: "to ask for help", ar: "يطلب مساعدة", context: "تعبير يومي", s: [{g:"Die Polizei bittet die Bevölkerung um Mithilfe.",e:"The police ask the public for help.",a:"البوليس بيطلب مساعدة الناس."},{g:"Ich möchte dich um deine Mithilfe bitten.",e:"I would like to ask you for your help.",a:"أنا حابب أطلب مساعدتك."},{g:"Wir bitten um Ihre Mithilfe bei diesem Projekt.",e:"We ask for your help with this project.",a:"إحنا بنطلب مساعدة حضرتك في المشروع ده."}] },
                { id: 'e31', type: "Krimis", ger: "die Bösen besiegen", eng: "to defeat the bad guys", ar: "يهزم الأشرار", context: "تعبير يومي", s: [{g:"Im Film muss der Held die Bösen besiegen.",e:"In the movie, the hero must defeat the bad guys.",a:"في الفيلم البطل لازم يهزم الأشرار."},{g:"Wir werden die Bösen besiegen.",e:"We will defeat the bad guys.",a:"إحنا هنهزم الأشرار."},{g:"Sie kämpfen zusammen, um die Bösen zu besiegen.",e:"They fight together to defeat the bad guys.",a:"هم بيحاربوا سوا عشان يهزموا الأشرار."}] },

            grammar: [
                {
                    title: "Verben mit Präpositionen (الأفعال مع حروف الجر)",
                    desc: "أفعال كثيرة في الألمانية ترتبط بحرف جر محدد، وهذا الحرف يحدد الحالة الإعرابية (Akkusativ أو Dativ) للكلمة التي تليه. لا توجد قاعدة ثابتة، يجب حفظ الفعل مع حرف الجر والحالة.",
                    structure: "Verb + Präposition + (Akkusativ / Dativ)",
                    examples: [
                        { g: "Ich interessiere mich <span class='text-purple-600 font-bold'>für den</span> neuen Kurs. (für + Akk)", a: "أنا مهتم بالكورس الجديد." },

                        { g: "Wir sprechen <span class='text-purple-600 font-bold'>mit dem</span> Chef <span class='text-purple-600 font-bold'>über das</span> Projekt. (mit + Dat / über + Akk)", a: "إحنا بنتكلم مع المدير عن المشروع." }
                    ]
                },
                {
                    title: "Pronominaladverbien (worauf, darauf, wovon, davon)",

                    structure: "Frage: wo(r) + Präposition? | Antwort: da(r) + Präposition.",
