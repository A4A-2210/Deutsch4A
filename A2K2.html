        // --- HELPERS FOR AUDIO & SPEECH ---
        const playAudio = (text, e) => {
            if (e) e.stopPropagation();
            const cleanText = text.replace(/<[^>]+>/g, '');
            const utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.lang = 'de-DE';
            window.speechSynthesis.speak(utterance);
        };

        const SpeechTester = ({ targetText }) => {
            const [status, setStatus] = React.useState('idle');
            const [heard, setHeard] = React.useState('');

            const listen = (e) => {
                if (e) e.stopPropagation();
                if (!('webkitSpeechRecognition' in window)) {
                    alert('المتصفح ده مش بيدعم تسجيل الصوت، جرب Google Chrome.');
                    return;
                }
                const recognition = new webkitSpeechRecognition();
                recognition.lang = 'de-DE';
                recognition.interimResults = false;

                recognition.onstart = () => setStatus('listening');
                recognition.onresult = (event) => {
                    const speechResult = event.results[0][0].transcript;
                    setHeard(speechResult);

                    const clean = (str) => str.replace(/<[^>]+>/g, '').toLowerCase().replace(/[.,!?]/g, '').trim();
                    const targetClean = clean(targetText);
                    const heardClean = clean(speechResult);

                    if (heardClean.includes(targetClean) || targetClean.includes(heardClean) || heardClean === targetClean) {
                        setStatus('success');
                    } else {
                        setStatus('fail');
                    }
                };
                recognition.onerror = () => setStatus('fail');
                recognition.onend = () => { if (status === 'listening') setStatus('idle'); };
                recognition.start();
            };

            return (
                <div className="inline-flex items-center gap-2" onClick={(e) => e.stopPropagation()}>
                    <button onClick={listen} title="جرب تنطقها" className={`p-2 rounded-full transition-all duration-300 shadow-sm ${status === 'listening' ? 'bg-red-500 text-white animate-pulse scale-110' : 'bg-slate-100 text-slate-600 hover:bg-slate-200 hover:scale-105'}`}>
                        <i data-lucide="mic" className="w-4 h-4"></i>
                    </button>
                    {status === 'success' && <span className="text-emerald-500 text-xs font-bold ar-text animate-bounce">✅ ممتاز!</span>}
                    {status === 'fail' && <span className="text-red-500 text-xs ar-text font-bold" title={`سمعت: ${heard}`}>❌ جرب تاني</span>}
                </div>
            );
        };

                    id: 't1',
                    title: '1. Das Schloss Neuschwanstein (im Süden von Bayern)',
                    icon: 'castle',
                    theme: 'blue',
                    content: [
                        { g: "Das Schloss stammt aus dem 19. Jahrhundert, aber es sieht aus wie ein Märchenschloss aus dem Mittelalter.", e: "The castle dates back to the 19th century, but it looks like a fairytale castle from the Middle Ages.", a: "القلعة بترجع للقرن الـ ١٩، بس شكلها عامل زي قلاع الحواديت بتاعة العصور الوسطى." },
                        { g: "Den Auftrag zum Bau des Schlosses hat der bayerische König Ludwig II. (1845 bis 1886) gegeben.", e: "The order to build the castle was given by the Bavarian King Ludwig II (1845–1886).", a: "اللي أمر ببناء القلعة هو ملك بافاريا لودفيج التاني." },
                        { g: "Die Kosten für den Bau waren extrem hoch: 6,2 Millionen Mark.", e: "The construction costs were extremely high: 6.2 million marks.", a: "تكاليف البُنا كانت عالية جداً: ٦.٢ مليون مارك." },
                        { g: "Der König selbst hat nur 172 Tage in dem Schloss gewohnt.", e: "The king himself only lived in the castle for 172 days.", a: "الملك نفسه عاش في القلعة ١٧٢ يوم بس." },
                        { g: "Zum Zeitpunkt seines Todes am 13. Juni 1886 hatte er über 7 Millionen Mark Schulden.", e: "At the time of his death on June 13, 1886, he was more than 7 million marks in debt.", a: "ووقت وفاته في ١٣ يونيو ١٨٨٦ كان عليه ديون أكتر من ٧ مليون مارك." },
                        { g: "Heute gilt Neuschwanstein als das schönste Schloss in Bayern und ist ein Hauptwerk des Historismus.", e: "Today, Neuschwanstein is considered the most beautiful castle in Bavaria and is a main work of Historicism.", a: "النهاردة نويشفانشتاين بتُعتبر أجمل قلعة في بافاريا وهي عمل رئيسي من أعمال الفن التاريخي." }
                    ]
                },
                {
                    id: 't2',
                    title: '2. Salzburg in Österreich',
                    icon: 'map-pin',
                    theme: 'indigo',
                    content: [
                        { g: "Die Stadt Salzburg hat knapp 151 000 Einwohner und ist etwa 150 km von München entfernt.", e: "The city of Salzburg has just under 151,000 inhabitants and is about 150 km away from Munich.", a: "مدينة سالزبورغ فيها حوالي ١٥١ ألف نسمة وبتبعد حوالي ١٥٠ كم عن ميونخ." },
                        { g: "Ein Wahrzeichen der Stadt ist die Festung Hohensalzburg.", e: "A landmark of the city is Hohensalzburg Fortress.", a: "من معالم المدينة قلعة هوهنسالزبورغ." },
                        { g: "Sie stammt aus dem 11. Jahrhundert und zählt zu den größten mittelalterlichen Burgen in Europa.", e: "It dates back to the 11th century and is one of the largest medieval castles in Europe.", a: "بترجع للقرن الـ ١١ وبتُعتبر من أكبر قلاع العصور الوسطى في أوروبا." },
                        { g: "Salzburg hat außerdem eine wunderschöne Altstadt sowie verschiedene Schlösser und Parks.", e: "Salzburg also has a beautiful old town with various palaces and parks.", a: "سالزبورغ فيها كمان مدينة قديمة تحفة وقلاع وحدائق مختلفة." },
                        { g: "Der bekannteste Bürger der Stadt ist der Komponist Wolfgang Amadeus Mozart (1756 bis 1791).", e: "The city’s most famous citizen is the composer Wolfgang Amadeus Mozart (1756–1791).", a: "أشهر مواطن في المدينة هو الملحن فولفغانغ أماديوس موتسارت." },
                        { g: "In den Geschäften der Altstadt kann man die berühmten Mozartkugeln (eine Süßigkeit) kaufen.", e: "In the shops of the old town you can buy the famous Mozartkugeln (a sweet).", a: "في محلات المدينة القديمة تقدر تشتري شيكولاتة موتسارت الشهيرة." }
                    ]
                },
                {
                    id: 't3',
                    title: '3. Die Zugspitze in den Alpen',
                    icon: 'mountain',
                    theme: 'teal',
                    content: [
                        { g: "Die Zugspitze ist mit 2 962 m der höchste Berg in Deutschland.", e: "The Zugspitze, at 2,962 meters, is the highest mountain in Germany.", a: "جبل تسوجشبيتسه هو أعلى جبل في ألمانيا بارتفاع ٢٩٦٢ متر." },
                        { g: "Er liegt südlich von München an der Grenze zu Österreich.", e: "It is located south of Munich on the border with Austria.", a: "بيقع جنوب ميونخ على الحدود مع النمسا." },
                        { g: "Etwa 500 000 Menschen fahren jährlich mit Seilbahnen auf den Gipfel des Berges.", e: "Around 500,000 people take the cable cars to the summit every year.", a: "حوالي ٥٠٠ ألف شخص بيركبوا التلفريك لقمة الجبل كل سنة." },
                        { g: "Dort kann man einen Kaffee trinken und die beste Aussicht über Berge und Täler im deutschen Teil der Alpen genießen.", e: "At the top, you can drink a coffee and enjoy the best view over mountains and valleys in the German part of the Alps.", a: "هناك تقدر تشرب قهوة وتستمتع بأحلى فيو للجبال والوديان في الجزء الألماني من جبال الألب." },
                        { g: "Neben einem Restaurant gibt es auf dem Gipfel eine meteorologische Station und eine Sendeanlage des Bayerischen und Österreichischen Rundfunks.", e: "In addition to a restaurant, there is also a meteorological station at the summit and a broadcasting station of Bavarian and Austrian broadcasters.", a: "بجانب المطعم، في قمة الجبل محطة أرصاد جوية ومحطة إرسال للإذاعة البافارية والنمساوية." },
                        { g: "Die durchschnittliche Jahrestemperatur auf der Zugspitze beträgt minus 4,2 Grad, man muss also warme Kleidung tragen.", e: "The average annual temperature on the Zugspitze is minus 4.2 degrees, so you have to wear warm clothing.", a: "متوسط درجة الحرارة السنوي على الجبل سالب ٤.٢ درجة، عشان كده لازم تلبس هدوم تقيلة." },
                        { g: "Die Zugspitze ist auch bei Wintersportlern beliebt. Viele Skifahrer besuchen die Zugspitze.", e: "The Zugspitze is also very popular with winter sports enthusiasts. Many skiers visit the Zugspitze.", a: "الجبل محبوب جداً عند عشاق الرياضات الشتوية. متزلجين كتير بيزوروه." },
                        { g: "Dort gibt es zahlreiche Skipisten. Außerdem gibt es Übernachtungsmöglichkeiten.", e: "There are numerous ski slopes there. In addition, there are opportunities to stay overnight.", a: "هناك في منحدرات تزلج كتير. وكمان في أماكن للمبيت." }
                    ]
                },

                        { g: "Ich finde den Ausflug besser/interessanter als den Ausflug nach Salzburg.", e: "I find the excursion better/more interesting than the excursion to Salzburg.", a: "أنا شايف الرحلة دي أحسن/أمتع من الرحلة لسالزبورغ." },
                        { g: "Mir gefällt der Ausflug am besten, denn ich mag keine Berge.", e: "I like the excursion the most, because I don’t like mountains.", a: "الرحلة دي عجباني أكتر حاجة، لأني مبحبش الجبال." },
                        { g: "Ich finde alle Ausflüge sehr interessant.", e: "I find all excursions very interesting.", a: "أنا شايف كل الرحلات ممتعة جداً." },
                        { g: "Ich finde Salzburg langweilig / toll / aufregend / beeindruckend / sehenswert.", e: "I find Salzburg boring / great / exciting / impressive / worth seeing.", a: "أنا شايف سالزبورغ مملة / رائعة / مثيرة / مبهرة / تستحق الزيارة." },
                        { g: "Vielleicht können wir auf die Zugspitze fahren, denn ich möchte Schnee sehen.", e: "Maybe we can go to the Zugspitze because I want to see snow.", a: "ممكن نطلع جبل تسوجشبيتسه، لأني عايز أشوف تلج." },

                {

                    title: '5. Heimatland: Qaitbay-Zitadelle',
                    icon: 'flag',
                    theme: 'emerald',
                    content: [
                        { g: "Ich möchte die Qaitbay-Zitadelle vorstellen. Die Qaitbay-Zitadelle ist ein sehr bekanntes Ausflugsziel in meinem Heimatland Ägypten.", e: "I would like to introduce the Qaitbay Citadel. The Qaitbay Citadel is a very famous excursion destination in my home country, Egypt.", a: "حابب أقدم لكم قلعة قايتباي. قلعة قايتباي من أشهر وجهات الخروج في بلدي مصر." },
                        { g: "Sie liegt im Norden von Alexandria, direkt an der Mittelmeerküste.", e: "It is located in the north of Alexandria, right on the Mediterranean coast.", a: "موجودة في شمال إسكندرية، على ساحل البحر المتوسط علطول." },
                        { g: "Die Zitadelle hat jedes Jahr viele tausend Besucher. Sie ist vor allem bei Touristen, Geschichtsinteressierten und Einheimischen sehr beliebt.", e: "The citadel receives many thousands of visitors every year. It is especially popular among tourists, history enthusiasts, and locals.", a: "القلعة بيزورها آلاف كل سنة. ومحبوبة جداً خصوصاً بين السياح ومحبي التاريخ والمصريين نفسهم." },
                        { g: "Hier kann man die beeindruckende Festungsarchitektur bewundern, das Mittelmeer überblicken und mehr über die Geschichte des Ortes erfahren.", e: "There you can admire the impressive fortress architecture, overlook the Mediterranean Sea, and learn more about the site's history.", a: "هنا تقدر تتأمل العمارة المبهرة للقلعة، وتبص على البحر المتوسط، وتعرف أكتر عن تاريخ المكان." },
                        { g: "Ich war schon mehrmals dort, besonders im Sommer.", e: "I have been there several times, especially in summer.", a: "أنا روحت هناك كذا مرة، بالذات في الصيف." },

                    ]

                {
                    id: 't6',
                    title: '6. Meinungen über Tiere (Fragen & Antworten)',
                    icon: 'message-circle',
                    theme: 'amber',
                    content: [
                        { g: "Welche Tiere finden Sie faszinierend?", e: "Which animals do you find fascinating?", a: "إيه الحيوانات اللي بتلاقيها مبهرة؟" },
                        { g: "Ich finde Delfine faszinierend, weil sie so intelligent und freundlich sind.", e: "I find dolphins fascinating because they’re so intelligent and friendly.", a: "أنا شايف الدرافيل مبهرة، عشان هم أذكية وودودين جداً." },
                        { g: "Adler beeindrucken mich – sie fliegen so majestätisch und haben einen starken Blick.", e: "Eagles impress me—they fly so majestically and have a powerful gaze.", a: "النسور بتبهرني - بتطير بشموخ وعندها نظرة قوية." },
                        { g: "Ich interessiere mich sehr für Chamäleons. Ihre Farben und Bewegungen sind einfach unglaublich.", e: "I’m very interested in chameleons. Their colors and movements are just incredible.", a: "أنا مهتم جداً بالحربايات. ألوانها وحركاتها بجد مش معقولة." },
                        { g: "Haben Sie ein Lieblingstier?", e: "Do you have a favorite animal?", a: "هل عندك حيوان مفضل؟" },
                        { g: "Mein Lieblingstier ist der Hund. Ich liebe ihre Treue und Energie.", e: "My favorite animal is the dog. I love their loyalty and energy.", a: "حيواني المفضل هو الكلب. بحب وفاءهم وطاقتهم." },
                        { g: "Ich mag Katzen besonders gern – sie sind unabhängig und elegant.", e: "I especially like cats—they’re independent and elegant.", a: "بحب القطط بشكل خاص - مستقلة وأنيقة." },
                        { g: "Ich finde Pferde toll. Sie sind stark, schön und sehr sensibel.", e: "I think horses are great. They’re strong, beautiful, and very sensitive.", a: "أنا شايف الخيول رائعة. قوية وجميلة وحساسة جداً." },
                        { g: "Haben Sie ein Haustier?", e: "Do you have a pet?", a: "عندك حيوان أليف؟" },
                        { g: "Ja, ich habe einen kleinen Wellensittich. Er heißt Max und singt jeden Morgen.", e: "Yes, I have a little budgie. His name is Max and he sings every morning.", a: "أيوة، عندي عصفور استرالي صغير. اسمه ماكس وبيغرد كل يوم الصبح." },
                        { g: "Nein, aber ich hätte gern eine Katze.", e: "No, but I’d love to have a cat.", a: "لأ، بس نفسي يكون عندي قطة." },
                        { g: "Ja, wir haben einen Hund in der Familie. Er ist sehr verspielt und liebt Spaziergänge.", e: "Yes, we have a dog in the family. He’s very playful and loves walks.", a: "أيوة، عندنا كلب في العيلة. بيحب اللعب جداً وبيعشق التمشية." },
                        { g: "Welche Tiere mögen Sie nicht?", e: "Which animals do you not like?", a: "إيه الحيوانات اللي مبتحبهاش؟" },
                        { g: "Ich mag keine Spinnen. Sie machen mir einfach Angst.", e: "I don’t like spiders. They just scare me.", a: "مبحبش العناكب. بيخوفوني بجد." },
                        { g: "Schlangen finde ich unangenehm – sie bewegen sich so lautlos.", e: "I find snakes unpleasant—they move so silently.", a: "التعبين بتضايقني - بتتحرك في هدوء تام." },
                        { g: "Ich kann mit Ratten nichts anfangen. Sie wirken für mich schmutzig.", e: "I can’t deal with rats. They seem dirty to me.", a: "مقدرش أتعامل مع الفيران. بحس إنهم مقرفين." },
                        { g: "Vor welchen Tieren haben Sie Angst?", e: "Which animals are you afraid of?", a: "بتخاف من حيوانات إيه؟" },
                        { g: "Ich habe Angst vor großen Hunden, besonders wenn sie bellen.", e: "I’m afraid of big dogs, especially when they bark.", a: "بخاف من الكلاب الكبيرة، بالذات لما بيهوهو." },
                        { g: "Ich fürchte mich vor Wespen – ich wurde als Kind gestochen.", e: "I’m afraid of wasps—I got stung as a child.", a: "بخاف من الدبابير - اتنحلت (اتقرصت) وأنا صغير." },
                        { g: "Krokodile machen mir Angst. Sie sind so stark und gefährlich.", e: "Crocodiles scare me. They’re so strong and dangerous.", a: "التماسيح بتخوفني. قوية وخطيرة جداً." }
                    ]

                    icon: 'globe',
                    theme: 'blue',
                    content: [
                        { g: "Das höchste Gebäude der Welt ist in den Vereinigten Arabischen Emiraten. Der Burj Khalifa ist 828 Meter hoch und steht in Dubai.", e: "The tallest building in the world is in the United Arab Emirates. The Burj Khalifa is 828 meters high and is located in Dubai.", a: "أطول مبنى في العالم موجود في الإمارات. برج خليفة طوله ٨٢٨ متر وموجود في دبي." },
                        { g: "Im Gebäude findet man viele Hotels, Wohnungen und Büros. Natürlich gibt es einen Fahrstuhl.", e: "Inside the building, you can find many hotels, apartments, and offices. Of course, there is an elevator.", a: "في المبنى هتلاقي فنادق وشقق ومكاتب. وطبعاً في أسانسير." },
                        { g: "Das U-Bahn-Netz New Yorks ist insgesamt etwa 380 km lang. Es gehört zu den größten U-Bahn-Netzen der Welt.", e: "The New York subway network is about 380 km long in total. It belongs to the largest subway networks in the world.", a: "شبكة مترو نيويورك طولها حوالي ٣٨٠ كم. وتعتبر من أكبر شبكات المترو في العالم." },
                        { g: "In New York gibt es die meisten U-Bahn-Stationen weltweit.", e: "In New York, there are the most subway stations worldwide.", a: "في نيويورك موجود أكبر عدد لمحطات المترو في العالم." },
                        { g: "Die engste Straße der Welt ist in Deutschland. Die Spreuerhofstraße in Reutlingen ist an der engsten Stelle nur 31 cm breit.", e: "The narrowest street in the world is in Germany. Spreuerhofstraße in Reutlingen is only 31 cm wide at its narrowest point.", a: "أضيق شارع في العالم في ألمانيا. شارع شبرايورهوف في رويتلينجن عرضه ٣١ سم بس في أضيق حتة." },
                        { g: "Das größte Haus der Welt steht in Indien. Es gehört einem großen Geschäftsmann.", e: "The largest house in the world is in India. It belongs to a wealthy businessman.", a: "أكبر بيت في العالم في الهند. بتاع رجل أعمال كبير." },
                        { g: "Das Haus hat 27 Stockwerke und eine Fläche von 37 000 Quadratmetern. Es ist das teuerste Wohnhaus der Welt.", e: "The house has 27 floors and an area of 37,000 square meters. It is the most expensive residential house in the world.", a: "البيت فيه ٢٧ دور ومساحته ٣٧ ألف متر مربع. ده أغلى بيت سكن في العالم." },
                        { g: "Berlin ist mit 3,5 Millionen Einwohnern die größte Stadt Deutschlands.", e: "Berlin, with 3.5 million inhabitants, is the largest city in Germany.", a: "برلين بـ ٣.٥ مليون نسمة هي أكبر مدينة في ألمانيا." },
                        { g: "Doch die meistbevölkerte Stadt der Welt ist Tokio – mit mehr als 37 Millionen Einwohnern.", e: "But the most populated city in the world is Tokyo – with more than 37 million inhabitants.", a: "بس أكتر مدينة زحمة في العالم هي طوكيو - بأكثر من ٣٧ مليون نسمة." },
                        { g: "Auch die größte Stadt der Welt: Die Metropolregion Tokio mit Tokio-Yokohama, hier leben 38 Millionen Menschen.", e: "It is also the largest metropolitan area in the world: the Tokyo–Yokohama metropolitan region, where about 38 million people live.", a: "وكمان أكبر منطقة حضرية في العالم هي طوكيو-يوكوهاما، بيعيش فيها حوالي ٣٨ مليون إنسان." },
                        { g: "Der Berg Mont Blanc liegt zwischen Frankreich und Italien. Er ist 4 810 Meter hoch und somit der höchste Berg Frankreichs und Italiens.", e: "The Mont Blanc mountain lies between France and Italy. It is 4,810 meters high and thus the highest mountain of France and Italy.", a: "جبل مون بلون بيقع بين فرنسا وإيطاليا. طوله ٤٨١٠ متر وبكده هو أعلى جبل في فرنسا وإيطاليا." },
                        { g: "Auf der Insel Teneriffa steht der höchste Berg der Insel: der 3 718 Meter hohe Teide.", e: "On the island of Tenerife stands the highest mountain of the island: the 3,718-meter-high Teide.", a: "على جزيرة تينيريفي موجود أعلى جبل في الجزيرة: تيد اللي طوله ٣٧١٨ متر." },
                        { g: "Der Mount Everest ist mit 8 848 Metern der höchste Berg Nepals und der Welt.", e: "Mount Everest, at 8,848 meters, is the highest mountain of Nepal and of the world.", a: "جبل إيفرست بارتفاع ٨٨٤٨ متر هو أعلى جبل في نيبال وفي العالم." },
                        { g: "Martin ist Bergsteiger. Martins nächstes Reiseziel heißt Nepal.", e: "Martin is a mountaineer. The name of Martin’s next travel destination is Nepal.", a: "مارتن متسلق جبال. وجهة سفره الجاية اسمها نيبال." },
                        { g: "Es gibt auch Länder mit kleineren Bergen. Der höchste Berg der Niederlande ist der Vaalserberg mit 322 Metern.", e: "There are also countries with smaller mountains. The highest mountain of the Netherlands is the Vaalserberg at 322 meters.", a: "في كمان بلاد فيها جبال أصغر. أعلى جبل في هولندا هو فالسيربيرج وطوله ٣٢٢ متر." },
                        { g: "Frau Müllers Hobby ist die Naturfotografie. Im Sommer will sie das größte Naturreservat Amerikas besuchen: Alaska.", e: "Mrs. Müller’s hobby is nature photography. In summer, she wants to visit the largest nature reserve of America: Alaska.", a: "هواية السيدة مولر هي تصوير الطبيعة. في الصيف عايزة تزور أكبر محمية طبيعية في أمريكا: ألاسكا." },
                        { g: "Igors Traum ist es, am Wasser – das ist der See – zu leben.", e: "Igor’s dream is to live by the water – that is, the lake.", a: "حلم إيجور إنه يعيش على الماية - يعني على بحيرة." },
                        { g: "Jedes Jahr fährt er mit seinem Boot auf dem Ladogasee in Russland. Der See ist 220 km lang, etwa 80 bis 120 km breit. Er ist der größte See Europas.", e: "Every year he goes with his boat on Lake Ladoga in Russia. The lake is 220 km long and about 80 to 120 km wide. It is the largest lake of Europe.", a: "كل سنة بيروح بمركبه على بحيرة لادوجا في روسيا. البحيرة طولها ٢٢٠ كم وعرضها حوالي ٨٠ لـ ١٢٠ كم. دي أكبر بحيرة في أوروبا." }
                    ]
                },
                {
                    id: 't8',
                    title: '8. Extreme ausdrücken (Vergleiche)',
                    icon: 'bar-chart',
                    theme: 'emerald',
                    content: [
                        { g: "Luxemburg ist das zweitreichste Land der Welt. Es ist reicher als die Schweiz. Die Schweiz liegt auf Platz neun.", e: "Luxembourg is the second richest country in the world. It is richer than Switzerland. Switzerland is in ninth place.", a: "لوكسمبورج هي تاني أغنى بلد في العالم. هي أغنى من سويسرا. سويسرا في المركز التاسع." },
                        { g: "Der schnellste Zug der Welt ist die japanische Magnetschwebebahn. Der Zug ist bei einer Testfahrt 603 km/h gefahren.", e: "The fastest train in the world is the Japanese magnetic levitation train. The train reached 603 km/h during a test run.", a: "أسرع قطر في العالم هو قطار الرفع المغناطيسي الياباني. وصل لسرعة ٦٠٣ كم/س في رحلة تجريبية." },
                        { g: "Er ist viel schneller als der deutsche ICE oder der französische TGV.", e: "It is much faster than the German ICE or the French TGV.", a: "هو أسرع بكتير من الـ ICE الألماني والـ TGV الفرنسي." },
                        { g: "Die kürzeste Nacht ist in Deutschland am 21. Juni. Die Nächte im Sommer sind kürzer als die Nächte im Winter.", e: "The shortest night in Germany is on June 21. The nights in summer are shorter than the nights in winter.", a: "أقصر ليلة في ألمانيا يوم ٢١ يونيو. ليالي الصيف أقصر من ليالي الشتاء." },
                        { g: "Das schärfste Gewürz der Welt heißt „Blair’s 16 Million Reserve“. Das Gewürz ist schärfer als Sambal Oelek oder Cayennepfeffer.", e: "The hottest/spiciest spice in the world is called “Blair’s 16 Million Reserve.” The spice is hotter/spicier than sambal oelek or cayenne pepper.", a: "أحرق بهار في العالم اسمه 'بليرز ١٦ مليون ريزيرف'. البهار ده أحرق من السامبال أُوليك أو الفلفل الحريف." },
                        { g: "Die meisten Millionäre leben in den USA. Dort leben viel mehr Millionäre als in Japan (Platz zwei) und Deutschland (Platz drei).", e: "The most millionaires live in the USA. There are many more millionaires than in Japan (second place) and Germany (third place).", a: "أكتر مليونيرات عايشين في أمريكا. هناك في مليونيرات أكتر بكتير من اليابان (المركز التاني) وألمانيا (المركز التالت)." },
                        { g: "Der Staat mit den wenigsten Einwohnern ist der Vatikan. Hier leben etwa 900 Menschen.", e: "The state with the fewest inhabitants is the Vatican. About 900 people live there.", a: "الدولة اللي فيها أقل عدد سكان هي الفاتيكان. بيعيش هنا حوالي ٩٠٠ شخص." },
                        { g: "Der Vatikan hat weniger Einwohner als der Inselstaat Tuvalu im Pazifik (ca. 11.000 Einwohner).", e: "The Vatican has fewer inhabitants than the island state of Tuvalu in the Pacific (about 11,000 inhabitants).", a: "الفاتيكان سكانها أقل من دولة توفالو في المحيط الهادي (حوالي ١١ ألف نسمة)." }
                    ]
                },
                {
                    id: 't9',
                    title: '9. Reisepläne für die Jahreszeiten',
                    icon: 'sun',
                    theme: 'amber',
                    content: [
                        { g: "Ja, im Winter will ich unbedingt in ein sonniges Land fahren, vielleicht nach Tunesien oder in die Türkei.", e: "Yes, in winter I really want to travel to a sunny country, maybe to Tunisia or to Turkey.", a: "أيوة، في الشتاء نفسي ضروري أسافر لبلد مشمسة، يمكن تونس أو تركيا." },
                        { g: "In der Türkei habe ich Freunde, dort kann ich übernachten. Sie wohnen in Istanbul.", e: "In Turkey I have friends, I can stay with them. They live in Istanbul.", a: "عندي أصحاب في تركيا ممكن أبات عندهم. هما عايشين في إسطنبول." },
                        { g: "Ich möchte gerne nach München fahren und ins Deutsche Museum gehen. Im Deutschen Museum kann man viel sehen.", e: "I would like to go to Munich and visit the German Museum. In the German Museum you can see a lot.", a: "حابب أروح ميونخ وأدخل المتحف الألماني. هناك تقدر تشوف حاجات كتير." },
                        { g: "Von München aus möchte ich gern in die Alpen und auf die Zugspitze fahren. Auf der Zugspitze hat man einen schönen Ausblick.", e: "From Munich I would also like to go to the Alps and up to the Zugspitze. On the Zugspitze you have a beautiful view.", a: "ومن ميونخ حابب أطلع جبال الألب وجبل تسوجشبيتسه. فوق الجبل الفيو حلو أوي." },
                        { g: "Im Sommer fahre ich nach Island. Ich war noch nie im Norden Europas, aber ich habe schon viel Schönes über Island gehört.", e: "In summer I am going to Iceland. I have never been to the north of Europe, but I have already heard many good things about Iceland.", a: "في الصيف هسافر أيسلندا. عمري ما روحت شمال أوروبا، بس سمعت حاجات حلوة كتير عن أيسلندا." },
                        { g: "Ich möchte in Reykjavik übernachten und in den Zoo gehen.", e: "I want to stay overnight in Reykjavik and go to the zoo.", a: "عايز أبات في ريكيافيك وأروح حديقة الحيوان." },
                        { g: "Im Herbst fahre ich mit meinen Freunden nach Paris. Der Herbst in Paris ist sehr schön.", e: "In autumn I am going to Paris with my friends. Autumn in Paris is very beautiful.", a: "في الخريف هسافر باريس مع أصحابي. الخريف في باريس حلو جداً." },
                        { g: "Ich möchte in einige Museen gehen und in kleinen Restaurants essen.", e: "I want to visit some museums and eat in small restaurants.", a: "حابب أزور شوية متاحف وآكل في مطاعم صغيرة." }
                    ]

                {
                    id: 't10',
                    title: '10. Werbeanzeigen für Ausflüge',
                    icon: 'megaphone',
                    theme: 'rose',
                    content: [
                        { g: "Der Tierpark Hellabrunn in München sucht Mitarbeiter und Freiwillige für den Sommer.", e: "The Hellabrunn Zoo in Munich is looking for staff and volunteers for the summer.", a: "حديقة حيوان هيلابرون في ميونخ بتدور على موظفين ومتطوعين للصيف." },
                        { g: "Sie arbeiten gerne mit Tieren, sind lernbereit, dynamisch und engagiert? Dann kontaktieren Sie uns.", e: "Do you enjoy working with animals, are you eager to learn, dynamic, and committed? Then contact us.", a: "بتحب تشتغل مع الحيوانات، وعندك استعداد للتعلم، نشيط وملتزم؟ اتواصل معانا." },
                        { g: "Die österreichischen Alpen für Anfänger und Fortgeschrittene! Wir haben zahlreiche Angebote für Sportliche und weniger Sportliche. Schauen Sie sich mal um.", e: "The Austrian Alps for beginners and advanced hikers! We have numerous offers for sporty people and less sporty ones. Take a look around.", a: "جبال الألب النمساوية للمبتدئين والمحترفين! عندنا عروض كتير للرياضيين واللي مش رياضيين أوي. خد لك لفة وشوف." },
                        { g: "Besichtigen Sie den Deutsch-Belgischen Nationalpark Hohes Venn-Eifel.", e: "Visit the German-Belgian High Fens-Eifel National Park.", a: "زور الحديقة الوطنية الألمانية-البلجيكية هوهس فين-أيفل." },
                        { g: "Der Park bietet zahlreiche Wanderwege, Sie können viele Tier- und Pflanzenarten beobachten und an Führungen teilnehmen. Informationen finden Sie hier.", e: "The park offers numerous hiking trails, you can observe many animal and plant species, and take part in guided tours. You can find information here.", a: "الحديقة بتقدم مسارات مشي كتير، وتقدر تراقب أنواع حيوانات ونباتات كتير، وتشترك في جولات. هتلاقي معلومات هنا." },
                        { g: "Lassen Sie sich am Mittelmeer verwöhnen! Genießen Sie das Meer, die wunderschöne Landschaft und die mediterrane Küche. Zum detaillierten Angebot.", e: "Let yourself be pampered at the Mediterranean! Enjoy the sea, the beautiful landscape, and the Mediterranean cuisine. See the detailed offer.", a: "دلع نفسك على البحر المتوسط! استمتع بالبحر، والمناظر الطبيعية التحفة، وأكل البحر المتوسط. للتفاصيل." },
                        { g: "Eine Zeitreise durch Bayern. Sie besichtigen die schönsten Burgen und Schlösser Süddeutschlands und erleben Geschichte pur. Hier geht es zum Programm.", e: "A journey through time in Bavaria. You will visit the most beautiful castles and palaces of southern Germany and experience history up close. Here you can find the program.", a: "رحلة عبر الزمن في بافاريا. هتزور أجمل قلاع وقصور جنوب ألمانيا وتعيش التاريخ بجد. البرنامج من هنا." },
                        { g: "Lust auf Abenteuer? Ob Thailand, Indonesien, Vietnam oder andere südostasiatische Länder, Sie finden bei uns Ihren Traumurlaub.", e: "Want some adventure? Whether Thailand, Indonesia, Vietnam, or other Southeast Asian countries – with us you will find your dream vacation.", a: "نفسك في مغامرة؟ سواء تايلاند، إندونيسيا، فيتنام أو غيرها، عندنا هتلاقي إجازة أحلامك." },
                        { g: "Günstige Flüge, vielfältiges Angebot! Buchen Sie jetzt!", e: "Cheap flights, diverse of offers! Book now!", a: "طيران رخيص وعروض متنوعة! احجز دلوقتي!" }
                    ]
                },
                {
                    id: 't11',
                    title: '11. Ausflug: Krimitour in Münster',
                    icon: 'search',
                    theme: 'indigo',
                    content: [
                        { g: "Ich sehe Entspannung und eine Krimitour in Münster. Am letzten Wochenende war ich in Münster und habe eine Krimiserie im Fernsehen gesehen, die in Münster gedreht wurde.", e: "I enjoyed some relaxation and took part in a crime tour in Münster. Last weekend I was in Münster and watched a crime series on TV that had been filmed there.", a: "استمتعت بالاسترخاء وجولة جرايم في مونستر. الويك إند اللي فات كنت في مونستر واتفرجت على مسلسل جرايم متصور هناك." },
                        { g: "Ich habe viele Orte in Münster besucht und auch an einer Krimitour teilgenommen.", e: "I visited many places in Münster and also joined a crime tour.", a: "زورت أماكن كتير في مونستر واشتركت كمان في جولة عن الجرايم." },
                        { g: "Wir sind durch die Stadt gelaufen und haben Orte besucht, an denen Verbrechen passiert sind.", e: "We walked through the city and visited locations where crimes had taken place.", a: "مشينا في المدينة وزورنا الأماكن اللي حصلت فيها الجرايم." },
                        { g: "Der Tourleiter hat uns Geschichten über die Verbrechen erzählt.", e: "The tour guide told us stories about the crimes.", a: "المرشد حكالنا قصص عن الجرايم دي." },
                        { g: "Die Tour hat etwa zwei Stunden gedauert. Sie war sehr interessant.", e: "The tour lasted about two hours. It was very interesting.", a: "الجولة أخدت حوالي ساعتين. كانت ممتعة جداً." }
                    ]
                },
                {
                    id: 't12',
                    title: '12. Ausflug: Tiergarten Schönbrunn',
                    icon: 'cat',
                    theme: 'teal',
                    content: [
                        { g: "Klaus: Ich war mit meiner Familie im Zoo, und zwar im Tiergarten Schönbrunn.", e: "Klaus: I went to the zoo with my family—specifically to Schönbrunn Zoo.", a: "كلاوس: كنت مع عيلتي في حديقة الحيوان، وتحديداً في حديقة شونبرون." },
                        { g: "Er ist der ältu201c Zoo der Welt und liegt in Wien. Er wurde 1752 gegründet.", e: "It’s the oldest zoo in the world and is located in Vienna. It was founded in 1752.", a: "دي أقدم حديقة حيوان في العالم وموجودة في فيينا. اتأسست سنة ١٧٥٢." },
                        { g: "Heute leben im Zoo über 500 Tierarten. Ich habe unter anderem einen Pandabären gesehen.", e: "Today, more than 500 animal species live there. I saw, among other things, a panda bear.", a: "النهاردة بيعيش في الحديقة أكتر من ٥٠٠ نوع حيوان. وشوفت من ضمن الحاجات دب الباندا." },
                        { g: "Der Pandabär ist sehr selten und lebt in Asien. Die Kinder waren sehr aufgeregt und wollten unbedingt den Pandabären sehen.", e: "The panda is very rare and lives in Asia. The children were very excited and absolutely wanted to see the panda.", a: "دب الباندا نادر جداً وبيعيش في آسيا. الولاد كانوا متحمسين جداً وكانوا لازم يشوفوه ضروري." },
                        { g: "Der Tiergarten Schönbrunn ist einer der schönsten Zoos der Welt. Mehr als 2 Millionen Menschen besuchen den Zoo jedes Jahr.", e: "Schönbrunn Zoo is one of the most beautiful zoos in the world. More than 2 million people visit it every year.", a: "حديقة شونبرون من أجمل حدائق العالم. أكتر من ٢ مليون شخص بيزوروها كل سنة." },
                        { g: "Die Pandabären sind 2007 nach Schönbrunn gekommen. Sie sind eine Leihgabe aus China.", e: "The pandas arrived in Schönbrunn in 2007. They are on loan from China.", a: "الباندا جم شونبرون سنة ٢٠٠٧. هما سلفة (إعارة) من الصين." },
                        { g: "Schönbrunn ist auch Mitglied der Europäischen Zoovereinigung. Der Eintritt in den Zoo war nicht billig.", e: "Schönbrunn is also a member of the European Zoo Association. Admission to the zoo was quite expensive.", a: "شونبرون عضو في الجمعية الأوروبية لحدائق الحيوان. الدخول مكنش رخيص." },
                        { g: "Erwachsene zahlen 16,50 Euro und Kinder von 6 bis 14 Jahren zahlen 8 Euro. Kinder unter 6 Jahren zahlen keinen Eintritt.", e: "Adults pay €16.50, and children aged 6 to 14 pay €8. Children under 6 enter for free.", a: "الكبار بيدفعوا ١٦.٥٠ يورو والأطفال من ٦ لـ ١٤ سنة بيدفعوا ٨ يورو. والأطفال تحت ٦ سنين مجاناً." },
                        { g: "Wir haben auch das Aquarium besucht. Dort haben wir viele Fische und Schildkröten gesehen.", e: "We also visited the aquarium, where we saw many fish and turtles.", a: "زورنا كمان الأكواريوم (حوض السمك). وشوفنا هناك سمك وسلاحف كتير." }
                    ]
                },
                {
                    id: 't13',
                    title: '13. Ausflug: Dampflokomotive',
                    icon: 'train',
                    theme: 'amber',
                    content: [
                        { g: "Thomas: Wir haben Freunde in Heidelberg besucht und sind mit einer Dampflokomotive gefahren.", e: "Thomas: We visited friends in Heidelberg and rode a steam locomotive.", a: "توماس: زورنا أصحابنا في هايدلبرج وركبنا قطر بخار." },
                        { g: "Letzte Woche sind wir mit dem „Main-Neckar-Express“ von Frankfurt über Heidelberg nach Heilbronn gefahren.", e: "Last week, we took the “Main-Neckar Express” from Frankfurt via Heidelberg to Heilbronn.", a: "الأسبوع اللي فات سافرنا بـ 'ماين-نيكار-إكسبريس' من فرانكفورت عن طريق هايدلبرج لحد هايلبرون." },
                        { g: "Die Dampflokomotive war über 80 Jahre alt. Sie sah aus wie ein langer Zug und hatte das berühmte Technikmuseum an Bord.", e: "The steam locomotive was more than 80 years old. It looked like a very long train and even carried an exhibition from the famous Technology Museum on board.", a: "القطر البخاري كان عمره أكتر من ٨٠ سنة. كان شكله زي قطر طويل أوي وكان جواه معرض متحف التكنولوجيا الشهير." },
                        { g: "Dann sind wir nach Heilbronn gefahren. Dort wurde unser Zug abgekoppelt und wir wurden zum Süddeutschen Eisenbahnmuseum gebracht.", e: "Then we traveled on to Heilbronn. There, our train was uncoupled and we were taken to the Southern German Railway Museum.", a: "بعدين كملنا لهايلبرون. هناك القطر بتاعنا اتفصل وودونا لمتحف السكك الحديدية بتاع جنوب ألمانيا." },
                        { g: "Am Ende der Reise wurden wir über eine andere Strecke zurück nach Frankfurt gebracht.", e: "At the end of the trip, we were brought back to Frankfurt via a different route.", a: "في آخر الرحلة، رجعونا فرانكفورت من طريق (سكة) تانية." },
                        { g: "Die Fahrt mit der Dampflokomotive war sehr schön und wir haben viel gesehen. Ich möchte gerne noch einmal mit Freunden mit einer Dampflokomotive fahren.", e: "The ride on the steam locomotive was very beautiful and we saw a lot. I would really like to ride a steam locomotive again with friends.", a: "الرحلة بالقطر البخاري كانت حلوة جداً وشوفنا حاجات كتير. نفسي أركب قطر بخار مرة تانية مع أصحابي." }
                    ]
                },
                {
                    id: 't14',
                    title: '14. Kurze Berichte: Birgit & Beate',
                    icon: 'user',
                    theme: 'purple',
                    content: [
                        { g: "Birgit ist am Wochenende nach Münster gefahren. In Münster hat sie eine Krimitour gemacht.", e: "Birgit traveled to Münster on the weekend. In Münster, she did a crime-themed tour.", a: "بيرجيت سافرت مونستر في الويك إند. في مونستر عملت جولة عن الجرايم." },
                        { g: "Mit ihrer Familie ist sie in den Zoo gegangen. Im Zoo kann man 730 verschiedene Tierarten sehen.", e: "She went to the zoo with her family. In the zoo, you can see 730 different animal species.", a: "راحت جنينة الحيوانات مع عيلتها. في الحديقة تقدر تشوف ٧٣٠ نوع مختلف من الحيوانات." },
                        { g: "Beate ist an den Bodensee gefahren. Am Bodensee ist sie spazieren gegangen und dann auf die Insel Mainau gefahren.", e: "Beate traveled to Lake Constance. At Lake Constance, she went for a walk and then traveled to Mainau Island.", a: "بياته سافرت لبحيرة كونستانس (بودنسي). هناك اتمشت وبعدين راحت جزيرة مايناو." },
                        { g: "Sie hat sich schöne Gärten und Blumen auf der Insel angesehen.", e: "She looked at beautiful gardens and flowers on the island.", a: "اتفرجت على جناين وورد حلو أوي في الجزيرة." }
