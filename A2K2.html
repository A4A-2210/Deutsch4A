                {
                    id: 't15',
                    title: '15. Ausflugsideen (Weinberg, Gasometer, Museum)',
                    icon: 'lightbulb',
                    theme: 'blue',
                    content: [
                        { g: "Wir fahren mit dem Bus aufs Land. Dort besuchen wir einen Weinberg und sprechen mit dem Winzer.", e: "We travel by bus to the countryside. There we visit a vineyard and talk with the winemaker.", a: "هنسافر بالأتوبيس للريف. هناك هنزور كرم عنب ونتكلم مع صانع النبيذ." },
                        { g: "Danach gibt es eine Weinprobe. Wir probieren verschiedene Weinsorten.", e: "Afterwards, there is a wine tasting. We try different types of wine.", a: "بعد كده في تذوق نبيذ. هنجرب أنواع مختلفة." },
                        { g: "Wir besichtigen den Gasometer in Oberhausen. Der Gasometer aus den 1920er-Jahren ist heute ein Industriedenkmal.", e: "We visit the Gasometer in Oberhausen. The Gasometer from the 1920s is now an industrial monument.", a: "هنزور الجازوميتر في أوبرهاوزن. الجازوميتر بتاع العشرينات ده دلوقتي أثر صناعي." },
                        { g: "Wir haben eine Führung durch den Gasometer, sehen eine fantastische Lichtshow und die Ausstellung „Wunder der Natur“.", e: "We take a guided tour through the Gasometer, see a fantastic light show, and the exhibition 'Wonders of Nature.'", a: "هناخد جولة جوه الجازوميتر، ونشوف عرض نور خيالي ومعرض 'عجائب الطبيعة'." },
                        { g: "Wir besuchen das Schokoladenmuseum in Köln und erhalten Informationen über die Herstellung von Schokolade.", e: "We visit the Chocolate Museum in Cologne and receive information about how chocolate is made.", a: "هنزور متحف الشيكولاتة في كولونيا وناخد معلومات عن طريقة صنعها." },
                        { g: "Die Führung endet mit einer Tasse Kaffee und einem Stück Schokoladentorte.", e: "The tour ends with a cup of coffee and a piece of chocolate cake.", a: "الجولة بتخلص بفنجان قهوة وحتة تورتة شيكولاتة." }
                    ]
                },
                {
                    id: 't16',
                    title: '16. Dialog 1: Info am Schalter',
                    icon: 'info',
                    theme: 'emerald',
                    content: [
                        { g: "A: Guten Tag! Ich möchte gern einige Informationen über Ausflugsangebote bekommen.", e: "A: Good day! I’d like to get some information about excursion offers.", a: "A: نهارك سعيد! كنت حابب أخد شوية معلومات عن عروض الرحلات." },
                        { g: "B: Natürlich! Wir haben zum Beispiel eine Führung durch den Weinberg und einen Besuch im Schokoladenmuseum.", e: "B: Of course! For example, we offer a vineyard tour and a visit to the Chocolate Museum.", a: "B: طبعاً! عندنا مثلاً جولة في كرم العنب وزيارة لمتحف الشيكولاتة." },
                        { g: "A: Wann kann man am Sonntag einen Ausflug machen?", e: "A: When can one go on an excursion on Sunday?", a: "A: إمتى الواحد يقدر يطلع رحلة يوم الحد؟" },
                        { g: "B: Die Führung durch den Weinberg beginnt um 10 Uhr, und der Besuch im Schokoladenmuseum startet um 14 Uhr.", e: "B: The vineyard tour starts at 10 a.m., and the visit to the Chocolate Museum begins at 2 p.m.", a: "B: جولة كرم العنب بتبدأ الساعة ١٠ الصبح، وزيارة متحف الشيكولاتة بتبدأ الساعة ٢ الضهر." },
                        { g: "A: Wie lange dauert der Ausflug?", e: "A: How long does the excursion last?", a: "A: الرحلة مدتها قد إيه؟" },
                        { g: "B: Die Weinbergführung dauert vier Stunden. Der Besuch im Schokoladenmuseum dauert zwei Stunden.", e: "B: The vineyard tour lasts four hours. The visit to the Chocolate Museum lasts two hours.", a: "B: جولة العنب مدتها ٤ ساعات. وزيارة متحف الشيكولاتة ساعتين." },
                        { g: "A: Was kostet das?", e: "A: How much does it cost?", a: "A: التكلفة كام؟" },
                        { g: "B: Die Weinbergführung kostet 15,60 Euro, und der Besuch im Schokoladenmuseum kostet 6,50 Euro.", e: "B: The vineyard tour costs €15.60, and the visit to the Chocolate Museum costs €6.50.", a: "B: جولة العنب بتكلف ١٥.٦٠ يورو، وزيارة متحف الشيكولاتة بـ ٦.٥٠ يورو." },
                        { g: "A: Wo kann man parken? Gibt es im Moment eine Sonderausstellung?", e: "A: Where can one park? Is there a special exhibition at the moment?", a: "A: الواحد يقدر يركن فين؟ وفي معرض خاص شغال دلوقتي؟" },
                        { g: "A: Hat das Museum ein Restaurant oder ein Café? Dürfen wir unseren Hund mitnehmen?", e: "A: Does the museum have a restaurant or a café? Are we allowed to bring our dog?", a: "A: المتحف فيه مطعم أو كافيه؟ مسموح نجيب كلبنا معانا؟" }
                    ]
                },
                {
                    id: 't17',
                    title: '17. Dialog 2: Zoo Leipzig (Frau Schäfer)',
                    icon: 'phone',
                    theme: 'indigo',
                    content: [
                        { g: "Zoo: Zoo Leipzig, guten Tag.", e: "Zoo: Zoo Leipzig, good day.", a: "حديقة حيوان لايبزيغ، نهارك سعيد." },
                        { g: "Frau Schäfer: Ja, guten Tag, Andrea Schäfer hier. Ich hätte gern ein paar Informationen über den Zoo Leipzig. Bin ich da bei Ihnen richtig?", e: "Ms. Schäfer: Yes, good day, Andrea Schäfer speaking. I’d like some information about Zoo Leipzig. Am I in the right place?", a: "أيوة، نهارك سعيد، أندريا شيفر معاك. كنت عايزة شوية معلومات عن الحديقة. أنا كده بكلم المكان الصح؟" },
                        { g: "Zoo: Sie sind hier genau richtig. Was kann ich für Sie tun?", e: "Zoo: You’re exactly right here. What can I do for you?", a: "أيوة حضرتك في المكان الصح. أقدر أساعدك بإيه؟" },
                        { g: "Frau Schäfer: Ich brauche bitte eine Auskunft zu Öffnungszeiten und Preisen. Hat der Zoo jeden Tag geöffnet?", e: "Ms. Schäfer: I need some information about opening hours and prices, please. Is the zoo open every day?", a: "محتاجة استعلامات عن مواعيد العمل والأسعار لو سمحت. الحديقة فاتحة كل يوم؟" },
                        { g: "Zoo: Ja, der Zoo ist täglich ab 9 Uhr geöffnet.", e: "Zoo: Yes, the zoo is open daily from 9 a.m.", a: "أيوة، الحديقة فاتحة يومياً من الساعة ٩ الصبح." },
                        { g: "Frau Schäfer: Und wie viel kostet eine Eintrittskarte?", e: "Ms. Schäfer: And how much is an entrance ticket?", a: "وتذكرة الدخول بكام؟" },
                        { g: "Zoo: Für Erwachsene kostet der Eintritt 21 Euro.", e: "Zoo: For adults, admission costs €21.", a: "دخول الكبار بـ ٢١ يورو." },
                        { g: "Frau Schäfer: Für alle Kinder? Auch für Babys?", e: "Ms. Schäfer: For all children? Even for babies?", a: "لكل الأطفال؟ حتى الرضع؟" },
                        { g: "Zoo: Nein, nein, Babys kosten nichts. Kinder bis zu einem Alter von sechs Jahren zahlen nichts.", e: "Zoo: No, no, babies don’t pay. Children up to six years old pay nothing.", a: "لأ، الرضع مبيدفعوش حاجة. الأطفال لحد ٦ سنين مجاناً." },
                        { g: "Frau Schäfer: Und ältere Kinder?", e: "Ms. Schäfer: And older children?", a: "والأطفال الأكبر؟" },
                        { g: "Zoo: Sie zahlen sieben Euro.", e: "Zoo: They pay €7.", a: "بيدفعوا ٧ يورو." },
                        { g: "Frau Schäfer: Gibt es auch ein Familienangebot?", e: "Ms. Schäfer: Is there a family offer?", a: "في عرض عائلي؟" },
                        { g: "Zoo: Ja, eine Familie mit zwei Erwachsenen und zwei Kindern zahlt 51 Euro.", e: "Zoo: Yes, a family with two adults and two children pays €51.", a: "أيوة، العيلة اللي من شخصين بالغين وطفلين بتدفع ٥١ يورو." },
                        { g: "Frau Schäfer: Gibt es direkt neben dem Zoo ein großes Parkhaus?", e: "Ms. Schäfer: Is there a large parking garage right next to the zoo?", a: "في جراج كبير جنب الحديقة علطول؟" },
                        { g: "Zoo: Ich fürchte, nein. Aber es gibt ein paar Parkplätze in der Nähe.", e: "Zoo: I’m afraid not. But there are a few parking spots nearby.", a: "للأسف لأ. بس في شوية أماكن ركن قريبة." },
                        { g: "Frau Schäfer: Das ist aber nicht so gut.", e: "Ms. Schäfer: That’s not so great.", a: "بس ده مش كويس أوي." },
                        { g: "Zoo: Ja, das stimmt, das ist ein bisschen schwierig.", e: "Zoo: Yes, that’s true, it’s a bit difficult.", a: "أيوة صحيح، الموضوع صعب شوية." },
                        { g: "Frau Schäfer: Und was kann man im Zoo sehen?", e: "Ms. Schäfer: And what can one see in the zoo?", a: "والواحد يقدر يشوف إيه في الحديقة؟" },
                        { g: "Zoo: Also, wir haben viele verschiedene Tiere.", e: "Zoo: Well, we have many different animals.", a: "إحنا عندنا حيوانات مختلفة كتير." },
                        { g: "Frau Schäfer: Gibt es auch Elefanten?", e: "Ms. Schäfer: Are there elephants too?", a: "في أفيال كمان؟" },
                        { g: "Zoo: Ja, wir haben ein kleines Elefantenbaby, das ist sehr beliebt.", e: "Zoo: Yes, we have a baby elephant, it’s very popular.", a: "أيوة عندنا فيل صغير (بيبي)، محبوب جداً." },
                        { g: "Frau Schäfer: Und gibt es einen großen Zuschauerraum für das Aquarium?", e: "Ms. Schäfer: And is there a large viewing area for the aquarium?", a: "وفي مساحة كبيرة للمتفرجين في الأكواريوم؟" },
                        { g: "Zoo: Ja, das Aquarium ist sehr groß und sehr schön.", e: "Zoo: Yes, the aquarium is very large and very beautiful.", a: "أيوة الأكواريوم كبير وحلو جداً." },
                        { g: "Frau Schäfer: Gibt es auch eine Show mit Tieren?", e: "Ms. Schäfer: Is there also a show with animals?", a: "في عرض للحيوانات؟" },
                        { g: "Zoo: Ja, wir zeigen eine Show mit Seelöwen.", e: "Zoo: Yes, we present a show with sea lions.", a: "أيوة بنقدم عرض لأسود البحر." },
                        { g: "Frau Schäfer: Und gibt es auch eine Fernsehsendung über den Zoo?", e: "Ms. Schäfer: And is there also a TV show about the zoo?", a: "وفي برنامج تلفزيوني عن الحديقة؟" },
                        { g: "Zoo: Ja, es gibt eine Serie über die Tiere des Leipziger Zoos.", e: "Zoo: Yes, there’s a series about the animals of Leipzig Zoo.", a: "أيوة في مسلسل عن حيوانات حديقة لايبزيغ." },
                        { g: "Frau Schäfer: Wie heißt die Serie?", e: "Ms. Schäfer: What’s the name of the series?", a: "المسلسل اسمه إيه؟" },
                        { g: "Zoo: Sie heißt „Elefant, Tiger & Co.“", e: "Zoo: It’s called “Elephant, Tiger & Co.”", a: "اسمه 'فيل، نمر وشركاهم'." },
                        { g: "Frau Schäfer: Und gibt es auch ein Restaurant im Zoo?", e: "Ms. Schäfer: And is there also a restaurant in the zoo?", a: "وفي مطعم في الحديقة؟" },
                        { g: "Zoo: Ja, wir haben ein Restaurant mit asiatischen Spezialitäten.", e: "Zoo: Yes, we have a restaurant with Asian specialties.", a: "أيوة عندنا مطعم بأكلات آسيوية." },
                        { g: "Frau Schäfer: Das klingt ja gut. Ich komme morgen mit meiner Familie.", e: "Ms. Schäfer: That sounds great. I’ll come tomorrow with my family.", a: "كلام جميل. أنا هاجي بكرة مع عيلتي." },
                        { g: "Zoo: Das freut uns. Wir begrüßen Sie gern.", e: "Zoo: We’re happy to hear that. We’ll be glad to welcome you.", a: "ده يسعدنا. هنكون مبسوطين بزيارتكم." },
                        { g: "Frau Schäfer: Danke für die Informationen.", e: "Ms. Schäfer: Thank you for the information.", a: "شكراً على المعلومات." },
                        { g: "Zoo: Gerne. Hoffentlich können wir Sie morgen im Zoo begrüßen.", e: "Zoo: You’re welcome. Hopefully we can welcome you to the zoo tomorrow.", a: "العفو. نتمنى نشوفكم بكرة في الحديقة." }
                    ]
                }
            ]
        };

        const { useState, useEffect } = React;

        // --- HELPER FOR ARTICLES COLORING ---
        const colorizeArticles = (text) => {
            if (!text) return text;
            const regex = /(der |die |das |ein |eine )/gi;
            const parts = text.split(regex);
            return parts.map((part, i) => {
                const lower = part.toLowerCase();
                if (lower === 'der ') return <span key={i} className="text-blue-500 font-extrabold">{part}</span>;
                if (lower === 'die ' || lower === 'eine ') return <span key={i} className="text-rose-500 font-extrabold">{part}</span>;
                if (lower === 'das ' || lower === 'ein ') return <span key={i} className="text-emerald-500 font-extrabold">{part}</span>;
                return <span key={i}>{part}</span>;
            });
        };

        // --- COMPONENTS ---
        const ProgressBar = ({ total, learned, colorClass }) => {
            const percentage = total === 0 ? 0 : Math.round((learned / total) * 100);
            return (
                <div className="glass-panel p-5 rounded-2xl mb-8 flex items-center justify-between transition-all" dir="rtl">
                    <div>
                        <h3 className="text-sm font-bold text-slate-500 uppercase tracking-wider ar-text mb-1">مستوى التقدم</h3>
                        <p className="text-3xl font-extrabold text-slate-800">{learned} <span className="text-sm font-medium text-slate-400">/ {total} أتقنتهم</span></p>
                    </div>
                    <div className="relative w-20 h-20 drop-shadow-md">
                        <svg className="w-full h-full transform -rotate-90" viewBox="0 0 36 36">
                            <path className="text-slate-200" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" strokeWidth="3" />
                            <path className={`${colorClass} transition-all duration-1000 ease-out`} strokeDasharray={`${percentage}, 100`} d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" />
                        </svg>
                        <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-sm font-bold text-slate-700">
                            {percentage}%
                        </div>
                    </div>
                </div>
            );
        };

        const WordCard = ({ item, isLearned, toggleLearned }) => {
            const [isFlipped, setIsFlipped] = useState(false);

            return (
                <div className="relative group perspective-1000 w-full h-[24rem]">
                    <div className={`w-full h-full transition-all duration-700 transform-style-3d shadow-[0_8px_30px_rgb(0,0,0,0.04)] rounded-2xl ${isFlipped ? 'rotate-y-180' : ''}`}>

                        {/* FRONT */}
                        <div className="absolute w-full h-full backface-hidden bg-white border border-slate-100 rounded-2xl p-5 flex flex-col cursor-pointer hover:shadow-lg transition-shadow"
                            onClick={() => setIsFlipped(true)}>
                            <div className="flex justify-between items-start shrink-0" dir="rtl">
                                <span className="bg-blue-50 text-blue-600 text-xs font-bold px-3 py-1.5 rounded-lg uppercase tracking-wider ar-text">كلمة / اسم</span>
                                <button onClick={(e) => { e.stopPropagation(); toggleLearned(item.id); }} className={`p-2 rounded-full transition-colors ${isLearned ? 'bg-emerald-100 text-emerald-600' : 'bg-slate-50 text-slate-300 hover:bg-slate-100'}`}>
                                    <i data-lucide="check" className="w-5 h-5"></i>
                                </button>
                            </div>

                            <div className="text-center mt-2 flex-grow flex flex-col justify-center overflow-y-auto front-scroll px-1 py-3">
                                <div className="flex flex-col justify-center items-center gap-3 mb-1">
                                    <h3 className="text-2xl font-bold text-slate-800 leading-tight">{colorizeArticles(item.ger)}</h3>
                                    <div className="flex items-center gap-2">
                                        <button onClick={(e) => playAudio(item.ger, e)} className="p-2 rounded-full bg-blue-50 text-blue-600 hover:bg-blue-100 transition-colors shadow-sm"><i data-lucide="volume-2" className="w-5 h-5"></i></button>
                                        <SpeechTester targetText={item.ger} />
                                    </div>
                                </div>
                                <div className="mt-4 space-y-1">
                                    <p className="text-slate-500 font-medium text-sm">{item.eng}</p>
                                    <p className="text-blue-600 font-bold ar-text text-lg" dir="rtl">{item.ar}</p>
                                </div>
                            </div>

                            <div className="text-center text-xs text-slate-400 font-medium flex items-center justify-center gap-1 ar-text mt-2 shrink-0">
                                <i data-lucide="rotate-cw" className="w-3 h-3"></i> اضغط للأمثلة
                            </div>
                        </div>

                        {/* BACK */}
                        <div className="absolute w-full h-full backface-hidden bg-gradient-to-br from-blue-600 to-indigo-700 text-white rounded-2xl p-5 shadow-lg flex flex-col cursor-pointer overflow-hidden"
                            onClick={() => setIsFlipped(false)} style={{ transform: 'rotateY(180deg)' }}>
                            <div className="mb-3 border-b border-white/20 pb-2 flex justify-between items-center shrink-0" dir="rtl">
                                <h4 className="font-bold text-white/90 text-sm tracking-wider ar-text">أمثلة سياقية</h4>
                                <i data-lucide="rotate-ccw" className="w-4 h-4 text-white/60"></i>
                            </div>
                            <div className="overflow-y-auto card-scroll flex-grow pr-2 pb-2">
                                <ul className="space-y-3">
                                    {item.s && item.s.map((sentence, idx) => (
                                        <li key={idx} className="text-sm bg-white/10 backdrop-blur-sm p-3 rounded-xl border border-white/5">
                                            <div className="flex items-start gap-2 mb-1.5">
                                                <button onClick={(e) => playAudio(sentence.g, e)} className="p-1 text-blue-200 hover:text-white shrink-0 mt-0.5"><i data-lucide="volume-2" className="w-4 h-4"></i></button>
                                                <span className="leading-relaxed" dangerouslySetInnerHTML={{ __html: sentence.g }}></span>
                                            </div>
                                            <div className="text-blue-200 text-xs italic ml-8 mb-1.5">{sentence.e}</div>
                                            <div className="text-amber-300 text-sm font-bold ar-text border-t border-white/10 pt-1.5 mt-1" dir="rtl">{sentence.a}</div>
                                        </li>
                                    ))}
                                    {!item.s && <li className="text-sm text-white/70 italic text-center mt-10">Keine Sätze vorhanden</li>}
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const ListRow = ({ item, isLearned, toggleLearned, colorTheme }) => {
            const [expanded, setExpanded] = useState(false);

            const themes = {
                emerald: 'hover:border-emerald-300 text-emerald-600 bg-emerald-50 text-emerald-700',
                amber: 'hover:border-amber-300 text-amber-600 bg-amber-50 text-amber-700',
                rose: 'hover:border-rose-300 text-rose-600 bg-rose-50 text-rose-700',
                teal: 'hover:border-teal-300 text-teal-600 bg-teal-50 text-teal-700',
                indigo: 'hover:border-indigo-300 text-indigo-600 bg-indigo-50 text-indigo-700',
                fuchsia: 'hover:border-fuchsia-300 text-fuchsia-600 bg-fuchsia-50 text-fuchsia-700'
            };
            const themeClass = themes[colorTheme] || themes.emerald;
            const textAccent = `text-${colorTheme}-600`;

            return (
                <div className={`bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden mb-4 transition-all duration-300 hover:shadow-md`} dir="ltr">
                    <div className="p-5 flex items-center justify-between cursor-pointer" onClick={() => setExpanded(!expanded)}>
                        <div className="flex items-center gap-4">
                            <button onClick={(e) => { e.stopPropagation(); toggleLearned(item.id); }} className={`p-2 rounded-full transition-colors ${isLearned ? `bg-${colorTheme}-100 ${textAccent}` : 'bg-slate-50 text-slate-300 hover:bg-slate-100'}`}>
                                <i data-lucide="check" className="w-5 h-5"></i>
                            </button>
                            <div>
                                <h3 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                                    <span>{colorizeArticles(item.ger)}</span>
                                    <button onClick={(e) => playAudio(item.ger, e)} className={`${textAccent} opacity-70 hover:opacity-100 transition-opacity`}><i data-lucide="volume-2" className="w-5 h-5"></i></button>
                                </h3>
                                <p className="text-sm text-slate-500 mt-1">{item.eng} <span className="mx-2 text-slate-300">|</span> <span className={`${textAccent} font-bold ar-text`} dir="rtl">{item.ar}</span></p>
                            </div>
                        </div>
                        <div className={`transform transition-transform duration-300 ${expanded ? 'rotate-180' : ''}`}>
                            <i data-lucide="chevron-down" className="w-6 h-6 text-slate-400"></i>
                        </div>
                    </div>

                    <div className={`transition-all duration-500 overflow-hidden ${expanded ? 'max-h-[1000px] opacity-100' : 'max-h-0 opacity-0'}`}>
                        <div className="bg-slate-50 p-5 border-t border-slate-100">
                            <ul className="space-y-4">
                                {item.s && item.s.map((sentence, idx) => (
                                    <li key={idx} className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm group flex flex-col sm:flex-row gap-4 justify-between items-start">
                                        <div className="flex-1">
                                            <div className="flex items-start gap-3 mb-2">
                                                <button onClick={(e) => playAudio(sentence.g, e)} className={`mt-0.5 ${textAccent} bg-${colorTheme}-50 p-1.5 rounded-lg shrink-0`}><i data-lucide="volume-2" className="w-4 h-4"></i></button>
                                                <p className="text-slate-800 text-base font-medium leading-relaxed mt-1" dangerouslySetInnerHTML={{ __html: sentence.g }}></p>
                                            </div>
                                            <p className="text-slate-500 text-sm ml-10 mb-2">{sentence.e}</p>
                                            <div className={`ml-10 ${textAccent} text-base font-bold ar-text border-t border-slate-100 pt-2`} dir="rtl">{sentence.a}</div>
                                        </div>
                                        <div className="opacity-100 sm:opacity-0 group-hover:opacity-100 transition-opacity shrink-0 sm:mt-1 self-end sm:self-start bg-slate-50 p-1.5 rounded-full" dir="ltr">
                                            <SpeechTester targetText={sentence.g} />
                                        </div>
                                    </li>
                                ))}
                                {!item.s && <p className="text-slate-500 italic px-4">Keine Beispiele vorhanden.</p>}
                            </ul>
                        </div>
                    </div>
                </div>
            );
        };

        const IrregularVerbRow = ({ item, isLearned, toggleLearned }) => {
            const [expanded, setExpanded] = useState(false);

            return (
                <div className="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden mb-4 transition-all duration-300 hover:shadow-md" dir="ltr">
                    <div className="p-5 flex items-center justify-between cursor-pointer" onClick={() => setExpanded(!expanded)}>
                        <div className="flex items-center gap-4">
                            <button onClick={(e) => { e.stopPropagation(); toggleLearned(item.id); }} className={`p-2 rounded-full transition-colors ${isLearned ? 'bg-emerald-100 text-emerald-600' : 'bg-slate-50 text-slate-300 hover:bg-slate-100'}`}>
                                <i data-lucide="check" className="w-5 h-5"></i>
                            </button>
                            <div>
                                <h3 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                                    {item.ger}
                                    <button onClick={(e) => playAudio(item.ger, e)} className="text-emerald-600 opacity-70 hover:opacity-100 transition-opacity"><i data-lucide="volume-2" className="w-5 h-5"></i></button>
                                </h3>
                                <p className="text-sm text-slate-500 mt-1">{item.eng} <span className="mx-2 text-slate-300">|</span> <span className="text-emerald-600 font-bold ar-text" dir="rtl">{item.ar}</span></p>
                            </div>
                        </div>
                        <div className={`transform transition-transform duration-300 ${expanded ? 'rotate-180' : ''}`}>
                            <i data-lucide="chevron-down" className="w-6 h-6 text-slate-400"></i>
                        </div>
                    </div>

                    <div className={`transition-all duration-500 overflow-hidden ${expanded ? 'max-h-[1000px] opacity-100' : 'max-h-0 opacity-0'}`}>
                        <div className="bg-slate-50 p-5 border-t border-slate-100">
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm relative group">
                                    <div className="text-xs font-bold text-emerald-500 uppercase tracking-widest mb-2 border-b border-slate-100 pb-1">Präsens (مضارع)</div>
                                    <div className="flex items-start gap-2 mb-2">
                                        <button onClick={(e) => playAudio(item.praesens, e)} className="text-emerald-600 bg-emerald-50 p-1.5 rounded-lg shrink-0"><i data-lucide="volume-2" className="w-4 h-4"></i></button>
                                        <p className="text-slate-800 text-sm font-medium leading-relaxed mt-1" dangerouslySetInnerHTML={{ __html: item.praesens }}></p>
                                    </div>
                                    <div className="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition-opacity"><SpeechTester targetText={item.praesens} /></div>
                                </div>
                                <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm relative group">
                                    <div className="text-xs font-bold text-amber-500 uppercase tracking-widest mb-2 border-b border-slate-100 pb-1">Präteritum (ماضي بسيط)</div>
                                    <div className="flex items-start gap-2 mb-2">
                                        <button onClick={(e) => playAudio(item.praeteritum, e)} className="text-amber-600 bg-amber-50 p-1.5 rounded-lg shrink-0"><i data-lucide="volume-2" className="w-4 h-4"></i></button>
                                        <p className="text-slate-800 text-sm font-medium leading-relaxed mt-1">{item.praeteritum}</p>
                                    </div>
                                    <div className="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition-opacity"><SpeechTester targetText={item.praeteritum} /></div>
                                </div>
                                <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm relative group">
                                    <div className="text-xs font-bold text-purple-500 uppercase tracking-widest mb-2 border-b border-slate-100 pb-1">Perfekt (ماضي تام)</div>
                                    <div className="flex items-start gap-2 mb-2">
                                        <button onClick={(e) => playAudio(item.perfekt, e)} className="text-purple-600 bg-purple-50 p-1.5 rounded-lg shrink-0"><i data-lucide="volume-2" className="w-4 h-4"></i></button>
                                        <p className="text-slate-800 text-sm font-medium leading-relaxed mt-1">{item.perfekt}</p>
                                    </div>
                                    <div className="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition-opacity"><SpeechTester targetText={item.perfekt} /></div>
                                </div>
                            </div>

                            <div className="mt-6">
                                <h4 className="text-sm font-bold text-slate-400 mb-3 uppercase tracking-wider ar-text">أمثلة سياقية</h4>
                                <ul className="space-y-3">
                                    {item.s && item.s.map((sentence, idx) => (
                                        <li key={idx} className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm group flex flex-col sm:flex-row gap-4 justify-between items-start">
                                            <div className="flex-1">
                                                <div className="flex items-start gap-3 mb-2">
                                                    <button onClick={(e) => playAudio(sentence.g, e)} className="mt-0.5 text-emerald-600 bg-emerald-50 p-1.5 rounded-lg shrink-0"><i data-lucide="volume-2" className="w-4 h-4"></i></button>
                                                    <p className="text-slate-800 text-base font-medium leading-relaxed mt-1" dangerouslySetInnerHTML={{ __html: sentence.g }}></p>
                                                </div>
                                                <p className="text-slate-500 text-sm ml-10 mb-2">{sentence.e}</p>
                                                <div className="ml-10 text-emerald-600 text-base font-bold ar-text border-t border-slate-100 pt-2" dir="rtl">{sentence.a}</div>
                                            </div>
                                            <div className="opacity-100 sm:opacity-0 group-hover:opacity-100 transition-opacity shrink-0 sm:mt-1 self-end sm:self-start bg-slate-50 p-1.5 rounded-full" dir="ltr">
                                                <SpeechTester targetText={sentence.g} />
                                            </div>
                                        </li>
                                    ))}
                                    {!item.s && <p className="text-slate-500 italic px-4">Keine Beispiele vorhanden.</p>}
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const AdjectiveRow = ({ item, isLearned, toggleLearned }) => {
            const [expanded, setExpanded] = useState(false);

            return (
                <div className="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden mb-4 transition-all duration-300 hover:shadow-md" dir="ltr">
                    <div className="p-5 flex flex-col md:flex-row items-center gap-4 cursor-pointer" onClick={() => setExpanded(!expanded)}>
                        <button onClick={(e) => { e.stopPropagation(); toggleLearned(item.id); }} className={`shrink-0 p-2 rounded-full transition-colors ${isLearned ? 'bg-indigo-100 text-indigo-600' : 'bg-slate-50 text-slate-300 hover:bg-slate-100'}`}>
                            <i data-lucide="check" className="w-5 h-5"></i>
                        </button>

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 w-full text-center md:text-left">
                            <div className="bg-slate-50 p-3 rounded-xl border border-slate-100 flex flex-col items-center md:items-start group relative">
                                <span className="text-[10px] uppercase font-bold text-slate-400 mb-1 tracking-widest">Positiv</span>
                                <div className="flex items-center gap-2">
                                    <span className="font-bold text-slate-800 text-lg">{item.base}</span>
                                    <button onClick={(e) => playAudio(item.base, e)} className="text-indigo-500 opacity-50 hover:opacity-100"><i data-lucide="volume-2" className="w-4 h-4"></i></button>
                                </div>
                            </div>

                            <div className="bg-indigo-50 p-3 rounded-xl border border-indigo-100 flex flex-col items-center md:items-start group relative">
                                <span className="text-[10px] uppercase font-bold text-indigo-400 mb-1 tracking-widest">Komparativ</span>
                                <div className="flex items-center gap-2">
                                    <span className="font-bold text-indigo-700 text-lg">{item.komp}</span>
                                    <button onClick={(e) => playAudio(item.komp, e)} className="text-indigo-500 opacity-50 hover:opacity-100"><i data-lucide="volume-2" className="w-4 h-4"></i></button>
                                </div>
                            </div>

                            <div className="bg-purple-50 p-3 rounded-xl border border-purple-100 flex flex-col items-center md:items-start group relative">
                                <span className="text-[10px] uppercase font-bold text-purple-400 mb-1 tracking-widest">Superlativ</span>
                                <div className="flex items-center gap-2">
                                    <span className="font-bold text-purple-700 text-lg">{item.sup}</span>
                                    <button onClick={(e) => playAudio(item.sup, e)} className="text-purple-500 opacity-50 hover:opacity-100"><i data-lucide="volume-2" className="w-4 h-4"></i></button>
                                </div>
                            </div>
                        </div>

                        <div className="shrink-0 text-center md:text-right md:w-1/4 mt-4 md:mt-0 border-t md:border-t-0 border-slate-100 pt-3 md:pt-0 flex flex-col md:flex-row items-center justify-between gap-4">
                            <div>
                                <p className="text-sm font-medium text-slate-500">{item.eng}</p>
                                <p className="text-lg font-bold text-indigo-600 ar-text" dir="rtl">{item.ar}</p>
                            </div>
                            <div className={`transform transition-transform duration-300 shrink-0 hidden md:block ${expanded ? 'rotate-180' : ''}`}>
                                <i data-lucide="chevron-down" className="w-6 h-6 text-slate-400"></i>
                            </div>
                        </div>
                    </div>

                    <div className={`transition-all duration-500 overflow-hidden ${expanded ? 'max-h-[1000px] opacity-100' : 'max-h-0 opacity-0'}`}>
                        <div className="bg-slate-50 p-5 border-t border-slate-100">
                            <h4 className="text-sm font-bold text-slate-400 mb-3 uppercase tracking-wider ar-text text-right" dir="rtl">أمثلة التدرج</h4>
                            <ul className="space-y-3">
                                {item.s && item.s.map((sentence, idx) => (
                                    <li key={idx} className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm group flex flex-col sm:flex-row gap-4 justify-between items-start">
                                        <div className="flex-1">
                                            <div className="flex items-start gap-3 mb-2">
                                                <button onClick={(e) => playAudio(sentence.g, e)} className="mt-0.5 text-indigo-600 bg-indigo-50 p-1.5 rounded-lg shrink-0"><i data-lucide="volume-2" className="w-4 h-4"></i></button>
                                                <p className="text-slate-800 text-base font-medium leading-relaxed mt-1" dangerouslySetInnerHTML={{ __html: sentence.g }}></p>
                                            </div>
                                            <p className="text-slate-500 text-sm ml-10 mb-2">{sentence.e}</p>
                                            <div className="ml-10 text-indigo-600 text-base font-bold ar-text border-t border-slate-100 pt-2" dir="rtl">{sentence.a}</div>
                                        </div>
                                        <div className="opacity-100 sm:opacity-0 group-hover:opacity-100 transition-opacity shrink-0 sm:mt-1 self-end sm:self-start bg-slate-50 p-1.5 rounded-full" dir="ltr">
                                            <SpeechTester targetText={sentence.g} />
                                        </div>
                                    </li>
                                ))}
                            </ul>
                        </div>
                    </div>
                </div>
            );
        };

        const TextArticleRow = ({ article, isLearned, toggleLearned }) => {
            const [expanded, setExpanded] = useState(false);
            const textAccent = `text-${article.theme}-600`;
            const bgLight = `bg-${article.theme}-50`;

            return (
                <div className="bg-white border border-slate-200 rounded-3xl shadow-sm overflow-hidden mb-6 transition-all duration-300 hover:shadow-lg" dir="ltr">
                    <div className="p-6 flex flex-col sm:flex-row items-center justify-between cursor-pointer gap-4" onClick={() => setExpanded(!expanded)}>
                        <div className="flex items-center gap-5 w-full">
                            <button onClick={(e) => { e.stopPropagation(); toggleLearned(article.id); }} className={`shrink-0 p-3 rounded-full transition-colors ${isLearned ? `bg-${article.theme}-100 ${textAccent}` : 'bg-slate-100 text-slate-400 hover:bg-slate-200'}`}>
                                <i data-lucide="check-circle" className="w-6 h-6"></i>
                            </button>
                            <div className="flex items-center gap-4 flex-1">
                                <div className={`${bgLight} ${textAccent} p-3 rounded-2xl hidden md:block`}>
                                    <i data-lucide={article.icon} className="w-8 h-8"></i>
                                </div>
                                <div>
                                    <h3 className="text-xl md:text-2xl font-extrabold text-slate-800 ar-text" dir="rtl">{article.title}</h3>
                                    <p className="text-sm text-slate-500 mt-1">{article.content.length} جمل / عبارات</p>
                                </div>
                            </div>
                        </div>
                        <div className={`transform transition-transform duration-300 shrink-0 ${expanded ? 'rotate-180' : ''}`}>
                            <i data-lucide="chevron-down" className="w-8 h-8 text-slate-400"></i>
                        </div>
                    </div>

                    <div className={`transition-all duration-700 ease-in-out overflow-hidden ${expanded ? 'max-h-[5000px] opacity-100' : 'max-h-0 opacity-0'}`}>
                        <div className="bg-slate-50 p-4 md:p-8 border-t border-slate-100">
                            <div className="space-y-4">
                                {article.content.map((sentence, idx) => (
                                    <div key={idx} className="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm flex flex-col md:flex-row gap-5 items-start hover:border-slate-300 transition-colors">
                                        <div className="flex-1 w-full">
                                            <div className="flex items-start gap-3 mb-3">
                                                <button onClick={(e) => playAudio(sentence.g, e)} className={`mt-0.5 ${textAccent} ${bgLight} p-2 rounded-xl shrink-0 hover:opacity-80 transition-opacity`}><i data-lucide="volume-2" className="w-5 h-5"></i></button>
                                                <p className="text-slate-800 text-lg font-bold leading-relaxed mt-1" dangerouslySetInnerHTML={{ __html: sentence.g }}></p>
                                            </div>
                                            <p className="text-slate-500 text-sm ml-12 mb-3">{sentence.e}</p>
                                            <div className={`ml-12 ${textAccent} text-lg font-extrabold ar-text border-t border-slate-100 pt-3`} dir="rtl">{sentence.a}</div>
                                        </div>
                                        <div className="md:mt-2 self-end md:self-start bg-slate-50 p-2 rounded-full shrink-0" dir="ltr">
                                            <SpeechTester targetText={sentence.g} />
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- MAIN APP ---
        const App = () => {
            const [activeTab, setActiveTab] = useState('vocabulary');
            const [learnedItems, setLearnedItems] = useState(() => {
                const saved = localStorage.getItem('deutschA2Learned');
                return saved ? new Set(JSON.parse(saved)) : new Set();
            });
            const [searchTerm, setSearchTerm] = useState('');

            useEffect(() => {
                localStorage.setItem('deutschA2Learned', JSON.stringify(Array.from(learnedItems)));
            }, [learnedItems]);

            useEffect(() => {
                lucide.createIcons();
            });

            const toggleLearned = (id) => {
                const newLearned = new Set(learnedItems);
                if (newLearned.has(id)) newLearned.delete(id);
                else newLearned.add(id);
                setLearnedItems(newLearned);
            };

            const totalWords = LEARNING_DATA.words.orte.length + LEARNING_DATA.words.tiere.length;
            const totalVerbs = LEARNING_DATA.verbs.length + LEARNING_DATA.irregularVerbs.length;
            const totalExp = LEARNING_DATA.expressions.length;
            const totalPrep = LEARNING_DATA.prepositions.length;
            const totalGrammar = LEARNING_DATA.grammar.length;
            const totalAdj = LEARNING_DATA.adjectives.length;
            const totalTexts = LEARNING_DATA.texts.length;
            const totalVocab = LEARNING_DATA.vocabulary.length;
            const grandTotal = totalWords + totalVerbs + totalExp + totalPrep + totalGrammar + totalAdj + totalTexts + totalVocab;

            const tabConfig = {
                texts: { labelEn: 'Texts & Dialogues', labelAr: 'نصوص ومحادثات', icon: 'file-text', color: 'teal' },
                vocabulary: { labelEn: 'Vocabulary List', labelAr: 'قاموس الكلمات', icon: 'library', color: 'fuchsia' },
                adjectives: { labelEn: 'Adjectives', labelAr: 'الصفات والمقارنة', icon: 'trending-up', color: 'indigo' },
                prepositions: { labelEn: 'Prepositions', labelAr: 'حروف الجر', icon: 'link', color: 'rose' },
                words: { labelEn: 'Nouns & Places', labelAr: 'الأسماء والأماكن', icon: 'book-open', color: 'blue' },
                verbs: { labelEn: 'Verbs & Perfekt', labelAr: 'الأفعال والماضي', icon: 'activity', color: 'emerald' },
                expressions: { labelEn: 'Dialogues', labelAr: 'محادثات قصيرة', icon: 'message-circle', color: 'amber' },
                grammar: { labelEn: 'Grammar', labelAr: 'القواعد', icon: 'pen-tool', color: 'purple' }
            };

            const activeColor = tabConfig[activeTab].color;

            return (
                <div className="h-screen flex flex-col bg-slate-50" dir="rtl">
                    {/* TOP NAVIGATION HEADER */}
                    <header className="w-full bg-slate-900 text-white shadow-xl z-50 shrink-0 relative overflow-hidden">
                        <div className={`absolute top-0 left-0 w-full h-1 bg-${activeColor}-500 transition-colors duration-500`}></div>

                        <div className="flex justify-between items-center px-4 md:px-8 py-3 border-b border-slate-800">
                            <h1 className="text-xl md:text-2xl font-extrabold flex items-center gap-3 ar-text">
                                <span className={`bg-${activeColor}-500 p-2 rounded-xl transition-colors duration-500 shadow-lg`}>
                                    <i data-lucide="shield-alert" className="w-5 h-5 md:w-6 md:h-6 text-white"></i>
                                </span>
                                ألماني A2 (Full Content)
                            </h1>

                            <div className="flex items-center gap-3" dir="ltr">
                                <div className="text-right hidden sm:block">
                                    <div className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Mastery</div>
                                    <div className={`text-sm font-extrabold text-${activeColor}-400 transition-colors`}>{grandTotal === 0 ? 0 : Math.round((learnedItems.size / grandTotal) * 100)}%</div>
                                </div>
                                <div className="relative w-10 h-10">
                                    <svg className="w-full h-full transform -rotate-90" viewBox="0 0 36 36">
                                        <path className="text-slate-800" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" strokeWidth="4" />
                                        <path className={`text-${activeColor}-500 transition-all duration-1000 ease-out`} strokeDasharray={`${grandTotal === 0 ? 0 : (learnedItems.size / grandTotal) * 100}, 100`} d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" strokeWidth="4" strokeLinecap="round" />
                                    </svg>
                                </div>
                            </div>
                        </div>

                        {/* Horizontal Navigation Tabs */}
                        <nav className="flex overflow-x-auto scrollbar-hide px-4 py-2 gap-2 snap-x">
                            {Object.entries(tabConfig).map(([key, tab]) => (
                                <button
                                    key={key}
                                    onClick={() => { setActiveTab(key); setSearchTerm(''); }}
                                    className={`snap-center shrink-0 flex items-center gap-2 px-4 py-2.5 rounded-xl transition-all duration-300 font-bold ar-text group relative overflow-hidden ${activeTab === key ? `bg-${tab.color}-600 text-white shadow-md` : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}
                                >
                                    <i data-lucide={tab.icon} className={`w-5 h-5 ${activeTab === key ? 'text-white' : `text-${tab.color}-400 group-hover:text-${tab.color}-300`} transition-colors`}></i>
                                    <span className="text-sm whitespace-nowrap">{tab.labelAr}</span>
                                    {activeTab === key && <div className="absolute bottom-0 left-1/2 transform -translate-x-1/2 w-1/2 h-0.5 bg-white/50 rounded-t-full"></div>}
                                </button>
                            ))}
                        </nav>
                    </header>

                    {/* MAIN CONTENT AREA */}
                    <main className="flex-1 overflow-y-auto p-4 md:p-8 lg:p-12 relative" dir="ltr">
                        <div className={`fixed top-1/4 left-1/4 w-[50vw] h-[50vw] rounded-full bg-${activeColor}-200/20 blur-3xl -z-10 transition-colors duration-1000`}></div>

                        <div className="max-w-7xl mx-auto">

                            {activeTab !== 'grammar' && (
                                <div className="flex flex-col md:flex-row gap-4 mb-10" dir="rtl">
                                    <div className="flex-1 relative group max-w-3xl mx-auto w-full">
                                        <div className={`absolute -inset-0.5 bg-gradient-to-r from-${activeColor}-400 to-${activeColor}-600 rounded-2xl blur opacity-20 group-hover:opacity-40 transition duration-500`}></div>
                                        <div className="relative">
                                            <i data-lucide="search" className="absolute right-4 top-1/2 transform -translate-y-1/2 text-slate-400 w-6 h-6"></i>
                                            <input
                                                type="text"
                                                placeholder="ابحث بالعربي، الألماني أو الإنجليزي..."
                                                value={searchTerm}
                                                onChange={(e) => setSearchTerm(e.target.value)}
                                                className="w-full pr-14 pl-6 py-4 rounded-2xl border-none focus:outline-none focus:ring-4 focus:ring-blue-500/20 shadow-lg text-lg ar-text text-slate-700 font-medium bg-white/80 backdrop-blur-sm"
                                            />
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'texts' && <ProgressBar total={totalTexts} learned={Array.from(learnedItems).filter(id => id.startsWith('t')).length} colorClass="text-teal-500" />}
                            {activeTab === 'vocabulary' && <ProgressBar total={totalVocab} learned={Array.from(learnedItems).filter(id => id.startsWith('voc')).length} colorClass="text-fuchsia-500" />}
                            {activeTab === 'adjectives' && <ProgressBar total={totalAdj} learned={Array.from(learnedItems).filter(id => id.startsWith('adj')).length} colorClass="text-indigo-500" />}
                            {activeTab === 'prepositions' && <ProgressBar total={totalPrep} learned={Array.from(learnedItems).filter(id => id.startsWith('p')).length} colorClass="text-rose-500" />}
                            {activeTab === 'words' && <ProgressBar total={totalWords} learned={Array.from(learnedItems).filter(id => id.startsWith('w')).length} colorClass="text-blue-500" />}
                            {activeTab === 'verbs' && <ProgressBar total={totalVerbs} learned={Array.from(learnedItems).filter(id => id.startsWith('v') || id.startsWith('iv')).length} colorClass="text-emerald-500" />}
                            {activeTab === 'expressions' && <ProgressBar total={totalExp} learned={Array.from(learnedItems).filter(id => id.startsWith('e')).length} colorClass="text-amber-500" />}

                            {/* TAB: TEXTS & DIALOGUES (COMPREHENSIVE) */}
                            {activeTab === 'texts' && (
                                <div dir="rtl" className="pb-10">
                                    <div className="bg-gradient-to-br from-teal-700 to-emerald-900 text-white p-10 rounded-3xl shadow-xl mb-10 relative overflow-hidden">
                                        <i data-lucide="book-open" className="absolute -left-4 -top-4 w-48 h-48 text-white opacity-10 transform -rotate-12"></i>
                                        <div className="relative z-10 text-center">
                                            <h2 className="text-4xl font-extrabold mb-4 ar-text">النصوص والمحادثات الكاملة (Zero Truncation)</h2>
                                            <p className="text-teal-100 ar-text text-lg max-w-3xl mx-auto leading-relaxed">
                                                يحتوي هذا القسم على كافة النصوص والتقارير السياحية، آراء الأشخاص عن الحيوانات، الأرقام القياسية، إعلانات الرحلات، والمحادثات بالتفصيل وبدون أي اقتطاع.
                                            </p>
                                        </div>
                                    </div>

                                    <div className="space-y-2">
                                        {LEARNING_DATA.texts.filter(t => t.title.toLowerCase().includes(searchTerm.toLowerCase()) || t.content.some(s => s.g.toLowerCase().includes(searchTerm.toLowerCase()) || s.e.toLowerCase().includes(searchTerm.toLowerCase()) || s.a.includes(searchTerm))).map(article => (
                                            <TextArticleRow key={article.id} article={article} isLearned={learnedItems.has(article.id)} toggleLearned={toggleLearned} />
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* TAB: VOCABULARY */}
                            {activeTab === 'vocabulary' && (
                                <div dir="rtl" className="pb-10">
                                    <div className="bg-gradient-to-br from-fuchsia-600 to-purple-800 text-white p-10 rounded-3xl shadow-xl mb-10 relative overflow-hidden">
                                        <i data-lucide="library" className="absolute -left-4 -top-4 w-48 h-48 text-white opacity-10 transform -rotate-12"></i>
                                        <div className="relative z-10 text-center">
                                            <h2 className="text-4xl font-extrabold mb-4 ar-text">قاموس الكلمات (Wortschatz)</h2>
                                            <p className="text-fuchsia-100 ar-text text-lg max-w-3xl mx-auto leading-relaxed">
                                                قائمة شاملة لأهم الكلمات والمفردات، الآن مع <b>٣ أمثلة سياقية كاملة</b> لكل كلمة لتثبيت المعنى في ذهنك.
                                            </p>
                                        </div>
                                    </div>

                                    <div className="space-y-4">
                                        {LEARNING_DATA.vocabulary.filter(v => v.ger.toLowerCase().includes(searchTerm.toLowerCase()) || v.eng.toLowerCase().includes(searchTerm.toLowerCase()) || v.ar.includes(searchTerm)).map(voc => (
                                            <ListRow key={voc.id} item={voc} isLearned={learnedItems.has(voc.id)} toggleLearned={toggleLearned} colorTheme="fuchsia" />
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* TAB: ADJECTIVES */}
                            {activeTab === 'adjectives' && (
                                <div dir="rtl" className="pb-10">
                                    <div className="bg-gradient-to-br from-indigo-700 to-blue-900 text-white p-10 rounded-3xl shadow-xl mb-10 relative overflow-hidden">
                                        <i data-lucide="trending-up" className="absolute -left-4 -top-4 w-48 h-48 text-white opacity-10 transform -rotate-12"></i>
                                        <div className="relative z-10 text-center">
                                            <h2 className="text-4xl font-extrabold mb-4 ar-text">قائمة الصفات والمقارنة (30 Adjektive)</h2>
                                            <p className="text-indigo-200 ar-text text-lg max-w-3xl mx-auto leading-relaxed">
                                                القائمة الشاملة للـ 30 صفة مع 3 جمل توضيحية لكل صفة (حالة عادية، مقارنة، وتفضيل) مقسمة حسب القواعد النحوية.
                                            </p>
                                        </div>
                                    </div>

                                    <section className="mb-12">
                                        <h2 className="text-2xl font-extrabold text-slate-800 mb-6 flex items-center gap-3 ar-text"><span className="bg-indigo-100 p-2 rounded-xl text-indigo-600"><i data-lucide="check-circle" className="w-5 h-5"></i></span> 1. صفات عادية (Regelmäßig)</h2>
                                        <div className="space-y-3">
                                            {LEARNING_DATA.adjectives.filter(a => a.category === 'regular' && (a.base.includes(searchTerm.toLowerCase()) || a.eng.toLowerCase().includes(searchTerm.toLowerCase()) || a.ar.includes(searchTerm))).map(adj => (
                                                <AdjectiveRow key={adj.id} item={adj} isLearned={learnedItems.has(adj.id)} toggleLearned={toggleLearned} />
                                            ))}
                                        </div>
                                    </section>

                                    <section className="mb-12">
                                        <h2 className="text-2xl font-extrabold text-slate-800 mb-6 flex items-center gap-3 ar-text"><span className="bg-indigo-100 p-2 rounded-xl text-indigo-600"><i data-lucide="type" className="w-5 h-5"></i></span> 2. صفات تأخذ أوملاوت (Mit Umlaut)</h2>
                                        <div className="space-y-3">
                                            {LEARNING_DATA.adjectives.filter(a => a.category === 'umlaut' && (a.base.includes(searchTerm.toLowerCase()) || a.eng.toLowerCase().includes(searchTerm.toLowerCase()) || a.ar.includes(searchTerm))).map(adj => (
                                                <AdjectiveRow key={adj.id} item={adj} isLearned={learnedItems.has(adj.id)} toggleLearned={toggleLearned} />
                                            ))}
                                        </div>
                                    </section>

                                    <section>
                                        <h2 className="text-2xl font-extrabold text-slate-800 mb-6 flex items-center gap-3 ar-text"><span className="bg-indigo-100 p-2 rounded-xl text-indigo-600"><i data-lucide="alert-triangle" className="w-5 h-5"></i></span> 3. صفات شاذة ومتغيرة (Unregelmäßig)</h2>
                                        <div className="space-y-3">
                                            {LEARNING_DATA.adjectives.filter(a => a.category === 'irregular' && (a.base.includes(searchTerm.toLowerCase()) || a.eng.toLowerCase().includes(searchTerm.toLowerCase()) || a.ar.includes(searchTerm))).map(adj => (
                                                <AdjectiveRow key={adj.id} item={adj} isLearned={learnedItems.has(adj.id)} toggleLearned={toggleLearned} />
                                            ))}
                                        </div>
                                    </section>
                                </div>
                            )}

                            {/* TAB: PREPOSITIONS */}
                            {activeTab === 'prepositions' && (
                                <div>
                                    <div className="bg-gradient-to-br from-rose-600 to-red-800 text-white p-10 rounded-3xl shadow-xl mb-10 relative overflow-hidden" dir="rtl">
                                        <i data-lucide="link" className="absolute -left-4 -top-4 w-48 h-48 text-white opacity-10 transform -rotate-12"></i>
                                        <div className="relative z-10 text-center">
                                            <h2 className="text-4xl font-extrabold mb-4 ar-text">حروف الجر المزدوجة والمكانية</h2>
                                            <p className="text-rose-100 ar-text text-lg max-w-3xl mx-auto leading-relaxed">
                                                أمثلة شاملة ودقيقة عن حالات الحركة (Akkusativ) والسكون (Dativ) بالإضافة لورقة الغش (Cheat Sheet) لحروف (nach, zu, bei).
                                            </p>
                                        </div>
                                    </div>
                                    <div className="space-y-4">
                                        {LEARNING_DATA.prepositions.filter(p => p.ger.toLowerCase().includes(searchTerm.toLowerCase()) || p.eng.toLowerCase().includes(searchTerm.toLowerCase()) || p.ar.includes(searchTerm)).map(prep => (
                                            <ListRow key={prep.id} item={prep} isLearned={learnedItems.has(prep.id)} toggleLearned={toggleLearned} colorTheme="rose" />
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* TAB: WORDS & PLACES */}
                            {activeTab === 'words' && (
                                <div className="space-y-12">
                                    <section>
                                        <h2 className="text-3xl font-extrabold text-slate-800 mb-6 flex items-center gap-3 ar-text" dir="rtl"><span className="bg-blue-100 p-2 rounded-xl text-blue-600"><i data-lucide="map" className="w-6 h-6"></i></span> الأماكن والرحلات (Ausflugsziele)</h2>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-6">
                                            {LEARNING_DATA.words.orte.filter(w => w.ger.toLowerCase().includes(searchTerm.toLowerCase()) || w.eng.toLowerCase().includes(searchTerm.toLowerCase()) || w.ar.includes(searchTerm)).map(word => (
                                                <WordCard key={word.id} item={word} isLearned={learnedItems.has(word.id)} toggleLearned={toggleLearned} />
                                            ))}
                                        </div>
                                    </section>

                                    <section>
                                        <h2 className="text-3xl font-extrabold text-slate-800 mb-6 flex items-center gap-3 ar-text" dir="rtl"><span className="bg-blue-100 p-2 rounded-xl text-blue-600"><i data-lucide="cat" className="w-6 h-6"></i></span> الحيوانات (Tiere)</h2>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-6">
                                            {LEARNING_DATA.words.tiere.filter(w => w.ger.toLowerCase().includes(searchTerm.toLowerCase()) || w.eng.toLowerCase().includes(searchTerm.toLowerCase()) || w.ar.includes(searchTerm)).map(word => (
                                                <WordCard key={word.id} item={word} isLearned={learnedItems.has(word.id)} toggleLearned={toggleLearned} />
                                            ))}
                                        </div>
                                    </section>
                                </div>
                            )}

                            {/* TAB: VERBS */}
                            {activeTab === 'verbs' && (
                                <div>
                                    <div className="bg-gradient-to-br from-emerald-600 to-green-800 text-white p-10 rounded-3xl shadow-xl mb-10 relative overflow-hidden" dir="rtl">
                                        <i data-lucide="activity" className="absolute -left-4 -top-4 w-48 h-48 text-white opacity-10 transform -rotate-12"></i>
                                        <div className="relative z-10 text-center">
                                            <h2 className="text-4xl font-extrabold mb-4 ar-text">الأفعال الشائعة والماضي التام</h2>
                                            <p className="text-emerald-100 ar-text text-lg max-w-3xl mx-auto leading-relaxed">
                                                جميع الأفعال العادية والشاذة تحتوي الآن على ٣ أمثلة واضحة.
                                            </p>
                                        </div>
                                    </div>

                                    <h2 className="text-3xl font-extrabold text-slate-800 mb-8 flex items-center gap-3 ar-text" dir="rtl">
                                        <span className="bg-emerald-100 p-2 rounded-xl text-emerald-600"><i data-lucide="activity" className="w-6 h-6"></i></span>
                                        الأفعال الشائعة (Regelmäßige Verben)
                                    </h2>
                                    <div className="space-y-4 mb-12">
                                        {LEARNING_DATA.verbs.filter(v => v.ger.toLowerCase().includes(searchTerm.toLowerCase()) || v.eng.toLowerCase().includes(searchTerm.toLowerCase()) || v.ar.includes(searchTerm)).map(verb => (
                                            <ListRow key={verb.id} item={verb} isLearned={learnedItems.has(verb.id)} toggleLearned={toggleLearned} colorTheme="emerald" />
                                        ))}
                                    </div>

                                    <h2 className="text-3xl font-extrabold text-slate-800 mb-8 flex items-center gap-3 ar-text" dir="rtl">
                                        <span className="bg-emerald-100 p-2 rounded-xl text-emerald-600"><i data-lucide="history" className="w-6 h-6"></i></span>
                                        أفعال شاذة في الماضي (Das Perfekt)
                                    </h2>
                                    <div className="space-y-4">
                                        {LEARNING_DATA.irregularVerbs.filter(v => v.ger.toLowerCase().includes(searchTerm.toLowerCase()) || v.eng.toLowerCase().includes(searchTerm.toLowerCase()) || v.ar.includes(searchTerm)).map(verb => (
                                            <IrregularVerbRow key={verb.id} item={verb} isLearned={learnedItems.has(verb.id)} toggleLearned={toggleLearned} />
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* TAB: EXPRESSIONS */}
                            {activeTab === 'expressions' && (
                                <div dir="rtl">
                                    <h2 className="text-3xl font-extrabold text-slate-800 mb-8 flex items-center gap-3 ar-text">
                                        <span className="bg-amber-100 p-2 rounded-xl text-amber-600"><i data-lucide="message-circle" className="w-6 h-6"></i></span>
                                        محادثات وتعبيرات هامة (Phrasen)
                                    </h2>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        {LEARNING_DATA.expressions.filter(e => e.ger.toLowerCase().includes(searchTerm.toLowerCase()) || e.eng.toLowerCase().includes(searchTerm.toLowerCase()) || e.ar.includes(searchTerm)).map(exp => (
                                            <div key={exp.id} className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm relative group hover:shadow-xl hover:border-amber-200 transition-all duration-300">
                                                <button onClick={() => toggleLearned(exp.id)} className={`absolute top-5 left-5 p-2 rounded-full transition-colors z-10 ${learnedItems.has(exp.id) ? 'bg-amber-100 text-amber-600' : 'bg-slate-50 text-slate-300 hover:bg-slate-100'}`}>
                                                    <i data-lucide="check" className="w-5 h-5"></i>
                                                </button>
                                                <span className="inline-block bg-amber-50 text-amber-600 px-3 py-1 rounded-lg text-xs font-bold mb-4 ar-text border border-amber-100">{exp.type}</span>
                                                <div className="flex items-start gap-3 mb-3" dir="ltr">
                                                    <div className="flex flex-col gap-2 shrink-0">
                                                        <button onClick={(e) => playAudio(exp.ger, e)} className="text-amber-500 bg-amber-50 p-2 rounded-xl hover:bg-amber-100 transition-colors"><i data-lucide="volume-2" className="w-5 h-5"></i></button>
                                                        <div className="bg-slate-50 rounded-full p-1"><SpeechTester targetText={exp.ger} /></div>
                                                    </div>
                                                    <div>
                                                        <h3 className="text-xl font-extrabold text-slate-800 leading-tight mt-1">"{exp.ger}"</h3>
                                                    </div>
                                                </div>

                                                <div className="bg-slate-50 rounded-2xl p-4 mt-4 border border-slate-100">
                                                    <p className="text-slate-500 font-medium text-sm mb-2" dir="ltr">{exp.eng}</p>
                                                    <p className="text-amber-700 font-extrabold text-xl mb-4 ar-text">{exp.ar}</p>
                                                    <div className="text-sm text-slate-600 flex gap-2 items-start pt-3 border-t border-slate-200">
                                                        <i data-lucide="info" className="w-5 h-5 text-amber-400 mt-0.5 shrink-0"></i>
                                                        <span className="ar-text leading-relaxed">{exp.context}</span>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* TAB: GRAMMAR */}
                            {activeTab === 'grammar' && (
                                <div dir="rtl">
                                    <div className="bg-gradient-to-br from-purple-700 to-indigo-800 text-white p-10 rounded-3xl shadow-xl mb-10 relative overflow-hidden">
                                        <i data-lucide="pen-tool" className="absolute -right-4 -bottom-4 w-48 h-48 text-white opacity-10 transform rotate-12"></i>
                                        <div className="relative z-10">
                                            <h2 className="text-4xl font-extrabold mb-3 ar-text">قواعد A2 الأساسية</h2>
                                            <p className="text-purple-200 ar-text text-lg max-w-2xl">ملخص سريع للقواعد (الشرح المفصل متوفر في باقي الأقسام مثل حروف الجر والصفات).</p>
                                        </div>
                                    </div>

                                    <div className="grid gap-8">
                                        {LEARNING_DATA.grammar.map((gram, idx) => (
                                            <div key={idx} className="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden hover:shadow-lg transition-shadow">
                                                <div className="p-8 border-b border-slate-50 bg-slate-50/50 flex items-start gap-4">
                                                    <div className="bg-purple-100 p-3 rounded-2xl text-purple-600 shrink-0 mt-1">
                                                        <i data-lucide="book-open" className="w-6 h-6"></i>
                                                    </div>
                                                    <div>
                                                        <h3 className="text-2xl font-extrabold text-slate-800 ar-text mb-2">{gram.title}</h3>
                                                        <p className="text-base text-slate-600 ar-text leading-relaxed">{gram.desc}</p>
                                                    </div>
                                                </div>

                                                <div className="p-8">
                                                    <div className="bg-slate-900 text-purple-300 font-mono text-base p-5 rounded-2xl mb-8 shadow-inner flex items-center gap-3 overflow-x-auto border border-slate-800" dir="ltr">
                                                        <i data-lucide="code" className="text-slate-500 w-5 h-5 shrink-0"></i> {gram.structure}
                                                    </div>

                                                    <h4 className="font-bold text-slate-400 mb-4 text-sm tracking-widest uppercase ar-text">أمثلة للتوضيح:</h4>
                                                    <ul className="space-y-4">
                                                        {gram.examples.map((ex, i) => (
                                                            <li key={i} className="bg-purple-50/50 p-5 rounded-2xl border border-purple-100">
                                                                <div className="flex gap-4 items-center mb-3" dir="ltr">
                                                                    <button onClick={(e) => playAudio(ex.g, e)} className="text-purple-500 bg-white p-2 rounded-xl shadow-sm hover:bg-purple-50 transition-colors shrink-0"><i data-lucide="volume-2" className="w-5 h-5"></i></button>
                                                                    <span className="text-slate-800 text-lg font-medium" dangerouslySetInnerHTML={{ __html: ex.g }}></span>
                                                                </div>
                                                                <div className="text-purple-700 font-bold ar-text border-t border-purple-200/50 pt-3 mt-3">{ex.a}</div>
                                                            </li>
                                                        ))}
                                                    </ul>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
