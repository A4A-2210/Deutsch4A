    <script type="text/babel">
        // --- HELPERS FOR AUDIO & SPEECH ---
        const playAudio = (text, e) => {
            if (e) e.stopPropagation();
            const cleanText = text.replace(/<[^>]+>/g, '');
            const utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.lang = 'de-DE';
            window.speechSynthesis.speak(utterance);
        };

        const SpeechTester = ({ targetText }) => {
            const [status, setStatus] = React.useState('idle'); 
            const [heard, setHeard] = React.useState('');

            const listen = (e) => {
                if (e) e.stopPropagation();
                if (!('webkitSpeechRecognition' in window)) {
                    alert('المتصفح ده مش بيدعم تسجيل الصوت، جرب Google Chrome.');
                    return;
                }
                const recognition = new webkitSpeechRecognition();
                recognition.lang = 'de-DE';
                recognition.interimResults = false;
                
                recognition.onstart = () => setStatus('listening');
                recognition.onresult = (event) => {
                    const speechResult = event.results[0][0].transcript;
                    setHeard(speechResult);
                    
                    const clean = (str) => str.replace(/<[^>]+>/g, '').toLowerCase().replace(/[.,!?]/g, '').trim();
                    const targetClean = clean(targetText);
                    const heardClean = clean(speechResult);
                    
                    if (heardClean.includes(targetClean) || targetClean.includes(heardClean) || heardClean === targetClean) {
                        setStatus('success');
                    } else {
                        setStatus('fail');
                    }
                };
                recognition.onerror = () => setStatus('fail');
                recognition.onend = () => { if(status === 'listening') setStatus('idle'); };
                recognition.start();
            };

            return (
                <div className="inline-flex items-center gap-2" onClick={(e) => e.stopPropagation()}>
                    <button onClick={listen} title="جرب تنطقها" className={`p-2 rounded-full transition-all duration-300 shadow-sm ${status === 'listening' ? 'bg-red-500 text-white animate-pulse scale-110' : 'bg-slate-100 text-slate-600 hover:bg-slate-200 hover:scale-105'}`}>
                        <i data-lucide="mic" className="w-4 h-4"></i>
                    </button>
                    {status === 'success' && <span className="text-emerald-500 text-xs font-bold ar-text animate-bounce">✅ ممتاز!</span>}
                    {status === 'fail' && <span className="text-red-500 text-xs ar-text font-bold" title={`سمعت: ${heard}`}>❌ جرب تاني</span>}
                </div>
            );
        };

                if (lower === 'der ') return <span key={i} className="text-blue-500 font-extrabold">{part}</span>;
                if (lower === 'die ') return <span key={i} className="text-rose-500 font-extrabold">{part}</span>;

            // Totals Calculation
            const totalWords = 
                LEARNING_DATA.words.gesundheit_fitness.length + 
                LEARNING_DATA.words.schlaf_buero.length + 
                LEARNING_DATA.words.krankheiten_koerper.length +

            // B2 Expansion counts
            const totalB2Words = LEARNING_DATA.b2.words.length;
            const totalB2Exp = LEARNING_DATA.b2.expressions.length;
            const totalB2 = totalB2Words + totalB2Exp;

            const grandTotal = totalWords + totalVerbs + totalExp + totalPrep + totalGrammar + totalReview + totalB2;

                words: { labelEn: 'Words', labelAr: 'الأسماء والكلمات', icon: 'book-open', color: 'blue' },

                review: { labelEn: 'Review', labelAr: 'المراجعة الشاملة', icon: 'clipboard-check', color: 'teal' },
                b2_expansion: { labelEn: 'B2 Expansion', labelAr: 'توسعة B2', icon: 'trending-up', color: 'indigo' }
            };

            const activeColor = tabConfig[activeTab].color;

            // Safe matchers for progress bars
            const isWord = id => /^w\d+/.test(id);
            const isVerb = id => /^(iv|v)\d+/.test(id);
            const isExp = id => /^e\d+/.test(id);
            const isPrep = id => /^p\d+/.test(id);
            const isReview = id => /^r_/.test(id);
            const isB2 = id => /^b2_/.test(id);

                <div className="h-screen flex flex-col bg-slate-50" dir="rtl">

                            {activeTab === 'review' && <ProgressBar total={totalReview} learned={Array.from(learnedItems).filter(isReview).length} colorClass="text-teal-500" />}

                                        <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-6">
                                            {LEARNING_DATA.words.gesundheit_fitness.filter(w => w.ger.toLowerCase().includes(searchTerm.toLowerCase()) || w.eng.toLowerCase().includes(searchTerm.toLowerCase()) || w.ar.includes(searchTerm)).map(word => (
                                                <WordCard key={word.id} item={word} isLearned={learnedItems.has(word.id)} toggleLearned={toggleLearned} />
                                            ))}
                                        </div>
                                    </section>

                                        <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-6">

                                                <WordCard key={word.id} item={word} isLearned={learnedItems.has(word.id)} toggleLearned={toggleLearned} />
                                            ))}
                                        </div>

                                                <WordCard key={word.id} item={word} isLearned={learnedItems.has(word.id)} toggleLearned={toggleLearned} />
                                            ))}

                                    </section>

                                            {LEARNING_DATA.words.adjektive_adverbien.filter(w => w.ger.toLowerCase().includes(searchTerm.toLowerCase()) || w.eng.toLowerCase().includes(searchTerm.toLowerCase()) || w.ar.includes(searchTerm)).map(word => (
                                                <WordCard key={word.id} item={word} isLearned={learnedItems.has(word.id)} toggleLearned={toggleLearned} />
                                            ))}
                                        </div>
                                    </section>
                                </div>
                            )}

                            {activeTab === 'verbs' && (

                                                                </div>
                                                            </div>

                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                    <div className="space-y-4">
                                        {LEARNING_DATA.prepositions.filter(p => p.ger.toLowerCase().includes(searchTerm.toLowerCase()) || p.eng.toLowerCase().includes(searchTerm.toLowerCase()) || p.ar.includes(searchTerm)).map(prep => (

                                    </div>
                                </div>

                                    <div className="bg-gradient-to-br from-purple-700 to-indigo-800 text-white p-10 rounded-3xl shadow-xl mb-10 relative overflow-hidden">

                                                    type="text" 
                                                    placeholder="ابحث في المراجعة الشاملة..."

                                                    onChange={(e) => setSearchTerm(e.target.value)}
                                                    className="w-full pr-14 pl-6 py-4 rounded-2xl border-none focus:outline-none focus:ring-4 focus:ring-teal-500/20 shadow-lg text-lg ar-text text-slate-700 font-medium"

                                                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                                                            {cat.items.filter(item => item.g.toLowerCase().includes(searchTerm.toLowerCase()) || item.e.toLowerCase().includes(searchTerm.toLowerCase()) || item.a.includes(searchTerm)).map((item) => (
                                                                <div key={item.id} className="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm relative group hover:shadow-md hover:border-teal-200 transition-all duration-300" dir="ltr">
                                                                    <button onClick={() => toggleLearned(item.id)} className={`absolute top-4 right-4 p-2 rounded-full transition-colors z-10 ${learnedItems.has(item.id) ? 'bg-teal-100 text-teal-600' : 'bg-slate-50 text-slate-300 hover:bg-slate-100'}`}>
                                                                        <i data-lucide="check" className="w-5 h-5"></i>
                                                                    </button>
                                                                    <div className="flex items-start gap-3 mb-3 pr-10">
                                                                        <div className="flex flex-col gap-2 shrink-0">
                                                                            <button onClick={(e) => playAudio(item.g, e)} className="text-teal-500 bg-teal-50 p-2 rounded-xl hover:bg-teal-100 transition-colors"><i data-lucide="volume-2" className="w-5 h-5"></i></button>
                                                                            <div className="bg-slate-50 rounded-full p-1"><SpeechTester targetText={item.g} /></div>
                                                                        </div>
                                                                        <h3 className="text-lg font-bold text-slate-800 leading-relaxed mt-1" dangerouslySetInnerHTML={{ __html: item.g }}></h3>
                                                                    </div>
                                                                    <div className="pl-12 space-y-2">
                                                                        <p className="text-slate-500 text-sm">{item.e}</p>
                                                                        <p className="text-teal-700 font-bold text-lg ar-text border-t border-slate-100 pt-2" dir="rtl">{item.a}</p>
                                                                    </div>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* TAB: B2 EXPANSION */}
                            {activeTab === 'b2_expansion' && (
                                <div dir="rtl" className="pb-10">
                                    <div className="bg-gradient-to-br from-indigo-700 to-blue-900 text-white p-10 rounded-3xl shadow-xl mb-10 relative overflow-hidden">
                                        <i data-lucide="trending-up" className="absolute -left-4 -top-4 w-48 h-48 text-white opacity-10 transform -rotate-12"></i>
                                        <div className="relative z-10 text-center">
                                            <h2 className="text-4xl font-extrabold mb-4 ar-text">توسعة B2 (B2 Expansion)</h2>
                                            <p className="text-indigo-200 ar-text text-lg max-w-3xl mx-auto leading-relaxed">قسم متقدم يحتوي على أهم المفردات والتعبيرات الخاصة بامتحانات B2، بالإضافة لشرح لأهم القواعد المتقدمة لتأهيلك للمستوى الأعلى بامتياز في موضوعات الصحة والعمل.</p>
                                        </div>
                                    </div>

                                    <section className="mb-16">
                                        <h2 className="text-3xl font-extrabold text-slate-800 mb-6 flex items-center gap-3 ar-text"><span className="bg-indigo-100 p-2 rounded-xl text-indigo-600"><i data-lucide="book-plus" className="w-6 h-6"></i></span> مفردات B2 المتقدمة (Wortschatz)</h2>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-6">
                                            {LEARNING_DATA.b2.words.filter(w => w.ger.toLowerCase().includes(searchTerm.toLowerCase()) || w.eng.toLowerCase().includes(searchTerm.toLowerCase()) || w.ar.includes(searchTerm)).map(word => (
                                                <WordCard key={word.id} item={word} isLearned={learnedItems.has(word.id)} toggleLearned={toggleLearned} />
                                            ))}
                                        </div>
                                    </section>

                                    <section className="mb-16">
                                        <h2 className="text-3xl font-extrabold text-slate-800 mb-6 flex items-center gap-3 ar-text"><span className="bg-indigo-100 p-2 rounded-xl text-indigo-600"><i data-lucide="message-square" className="w-6 h-6"></i></span> تعبيرات امتحانات B2 (Redemittel)</h2>
                                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                            {LEARNING_DATA.b2.expressions.filter(e => e.ger.toLowerCase().includes(searchTerm.toLowerCase()) || e.eng.toLowerCase().includes(searchTerm.toLowerCase()) || e.ar.includes(searchTerm)).map(exp => (
                                                <div key={exp.id} className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm relative group hover:shadow-xl hover:border-indigo-200 transition-all duration-300">
                                                    <button onClick={() => toggleLearned(exp.id)} className={`absolute top-5 left-5 p-2 rounded-full transition-colors z-10 ${learnedItems.has(exp.id) ? 'bg-indigo-100 text-indigo-600' : 'bg-slate-50 text-slate-300 hover:bg-slate-100'}`}>
                                                        <i data-lucide="check" className="w-5 h-5"></i>
                                                    </button>
                                                    <span className="inline-block bg-indigo-50 text-indigo-600 px-3 py-1 rounded-lg text-xs font-bold mb-4 ar-text border border-indigo-100">{exp.type}</span>
                                                    
                                                    <div className="flex items-start gap-3 mb-3" dir="ltr">
                                                        <div className="flex flex-col gap-2 shrink-0">
                                                            <button onClick={(e) => playAudio(exp.ger, e)} className="text-indigo-500 bg-indigo-50 p-2 rounded-xl hover:bg-indigo-100 transition-colors"><i data-lucide="volume-2" className="w-5 h-5"></i></button>
                                                            <div className="bg-slate-50 rounded-full p-1"><SpeechTester targetText={exp.ger} /></div>
                                                        </div>
                                                        <div>
                                                            <h3 className="text-xl font-extrabold text-slate-800 leading-tight mt-1">"{exp.ger}"</h3>
                                                            <p className="text-slate-500 font-medium text-sm mt-1">{exp.eng}</p>
                                                        </div>
                                                    </div>
                                                    
                                                    <div className="bg-slate-50 rounded-2xl p-5 mt-4 border border-slate-100">
                                                        <p className="text-indigo-700 font-extrabold text-xl mb-4 ar-text border-b border-indigo-100 pb-3">{exp.ar}</p>
                                                        
                                                        <div className="text-sm text-slate-600 flex gap-2 items-start mb-4">
                                                            <i data-lucide="info" className="w-5 h-5 text-indigo-400 mt-0.5 shrink-0"></i>
                                                            <span className="ar-text leading-relaxed font-bold">{exp.context}</span>
                                                        </div>

                                                        <h4 className="text-xs font-bold text-slate-400 mb-2 uppercase tracking-wider ar-text">أمثلة سياقية (3 أمثلة):</h4>
                                                        <div className="space-y-3">
                                                            {exp.s && exp.s.map((sentence, idx) => (
                                                                <div key={idx} className="bg-white p-3 rounded-xl border border-slate-100 shadow-sm flex flex-col sm:flex-row gap-3 items-start justify-between group/ex">
                                                                    <div className="flex-1">
                                                                        <div className="flex items-start gap-2 mb-1" dir="ltr">
                                                                            <button onClick={(e) => playAudio(sentence.g, e)} className="text-indigo-500 hover:text-indigo-600 shrink-0 mt-0.5"><i data-lucide="volume-2" className="w-4 h-4"></i></button>
                                                                            <span className="text-sm font-medium text-slate-800 leading-relaxed" dangerouslySetInnerHTML={{ __html: sentence.g }}></span>
                                                                        </div>
                                                                        <div className="text-xs text-slate-500 ml-6 mb-1" dir="ltr">{sentence.e}</div>
                                                                        <div className="text-sm font-bold text-indigo-700 ar-text ml-6 pt-1 border-t border-slate-50" dir="rtl">{sentence.a}</div>
                                                                    </div>
                                                                    <div className="opacity-100 sm:opacity-0 group-hover/ex:opacity-100 transition-opacity shrink-0 bg-slate-50 p-1 rounded-full" dir="ltr">
                                                                        <SpeechTester targetText={sentence.g} />
                                                                    </div>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </section>

                                    <section>
                                        <h2 className="text-3xl font-extrabold text-slate-800 mb-6 flex items-center gap-3 ar-text"><span className="bg-indigo-100 p-2 rounded-xl text-indigo-600"><i data-lucide="puzzle" className="w-6 h-6"></i></span> قواعد B2 المتقدمة (Grammatik)</h2>
                                        <div className="grid gap-8">
                                            {LEARNING_DATA.b2.grammar.map((gram, idx) => (
                                                <div key={idx} className="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden hover:shadow-lg transition-shadow">
                                                    <div className="p-8 border-b border-slate-50 bg-slate-50/50 flex items-start gap-4">
                                                        <div className="bg-indigo-100 p-3 rounded-2xl text-indigo-600 shrink-0 mt-1">
                                                            <i data-lucide="zap" className="w-6 h-6"></i>
                                                        </div>
                                                        <div>
                                                            <h3 className="text-2xl font-extrabold text-slate-800 ar-text mb-2">{gram.title}</h3>
                                                            <p className="text-base text-slate-600 ar-text leading-relaxed">{gram.desc}</p>
                                                        </div>
                                                    </div>
                                                    <div className="p-8">
                                                        <div className="bg-slate-900 text-indigo-300 font-mono text-base p-5 rounded-2xl mb-8 shadow-inner flex items-center gap-3 overflow-x-auto border border-slate-800" dir="ltr">
                                                            <i data-lucide="code" className="text-slate-500 w-5 h-5 shrink-0"></i> {gram.structure}
                                                        </div>
                                                        <h4 className="font-bold text-slate-400 mb-4 text-sm tracking-widest uppercase ar-text">أمثلة للتوضيح (مترجمة):</h4>
                                                        <ul className="space-y-4">
                                                            {gram.examples.map((ex, i) => (
                                                                <li key={i} className="bg-indigo-50/50 p-5 rounded-2xl border border-indigo-100 flex flex-col sm:flex-row justify-between items-start gap-4 group">
                                                                    <div className="flex-1 w-full">
                                                                        <div className="flex gap-3 items-start mb-2" dir="ltr">
                                                                            <button onClick={(e) => playAudio(ex.g, e)} className="text-indigo-500 bg-white p-2 rounded-xl shadow-sm hover:bg-indigo-50 transition-colors shrink-0 mt-0.5"><i data-lucide="volume-2" className="w-5 h-5"></i></button>
                                                                            <div>
                                                                                <span className="text-slate-800 text-lg font-medium leading-relaxed block" dangerouslySetInnerHTML={{ __html: ex.g }}></span>
                                                                                {ex.e && <span className="text-slate-500 text-sm block mt-1">{ex.e}</span>}
                                                                            </div>
                                                                        </div>
                                                                        <div className="text-indigo-700 font-bold ar-text border-t border-indigo-200/50 pt-3 mt-3">{ex.a}</div>
                                                                    </div>
                                                                    <div className="opacity-100 sm:opacity-0 group-hover:opacity-100 transition-opacity shrink-0 bg-white p-1 rounded-full" dir="ltr">
                                                                        <SpeechTester targetText={ex.g} />
                                                                    </div>
                                                                </li>
                                                            ))}
                                                        </ul>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </section>
                                </div>
                            )}

                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
