<!DOCTYPE html>
<html lang="de" dir="ltr">

<head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- GLOBAL HELPERS ---
        function colorizeArticles(text) {
            if (!text) return text;
            const regex = /(der |die |das |Wie |Woher |Wo |Was |Warum |In )/gi;
            const parts = text.split(regex);
            return parts.map((part) => {
                const lower = part.toLowerCase();
                if (lower === 'der ') return `<span class="text-blue-500 font-extrabold">${part}</span>`;
                if (lower === 'die ') return `<span class="text-rose-500 font-extrabold">${part}</span>`;
                if (lower === 'das ') return `<span class="text-emerald-500 font-extrabold">${part}</span>`;
                if (['wie ', 'woher ', 'wo ', 'was ', 'warum ', 'in '].includes(lower)) return `<span class="text-indigo-600 font-extrabold">${part}</span>`;
                return part;
            }).join('');
        }

        const playAudio = (text, e) => {
            if (e) e.stopPropagation();
            const cleanText = text.replace(/<[^>]+>/g, '').split('/')[0].trim();
            const utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.lang = 'de-DE';
            window.speechSynthesis.speak(utterance);
        };

        const SpeechTester = ({ targetText }) => {
            const [status, setStatus] = useState('idle');
            const [heard, setHeard] = useState('');

            const listen = (e) => {
                if (e) e.stopPropagation();
                if (!('webkitSpeechRecognition' in window)) {
                    alert('المتصفح ده مش بيدعم تسجيل الصوت، جرب Google Chrome.');
                    return;
                }
                const recognition = new webkitSpeechRecognition();
                recognition.lang = 'de-DE';
                recognition.interimResults = false;

                recognition.onstart = () => setStatus('listening');
                recognition.onresult = (event) => {
                    const speechResult = event.results[0][0].transcript;
                    setHeard(speechResult);

                    const clean = (str) => str.replace(/<[^>]+>/g, '').toLowerCase().replace(/[.,!?/]/g, '').trim();
                    const targetClean = clean(targetText.split('/')[0]);
                    const heardClean = clean(speechResult);

                    if (heardClean.includes(targetClean) || targetClean.includes(heardClean) || heardClean === targetClean) {
                        setStatus('success');
                    } else {
                        setStatus('fail');
                    }
                };
                recognition.onerror = () => setStatus('fail');
                recognition.onend = () => { if (status === 'listening') setStatus('idle'); };
                recognition.start();
            };

            return (
                <div className="inline-flex items-center gap-2" onClick={(e) => e.stopPropagation()} dir="rtl">
                    <button onClick={listen} title="جرب تنطقها" className={`p-2 rounded-full transition-all duration-300 shadow-sm ${status === 'listening' ? 'bg-red-500 text-white animate-pulse scale-110' : 'bg-slate-100 text-slate-600 hover:bg-slate-200 hover:scale-105'}`}>
                        <i data-lucide="mic" className="w-4 h-4"></i>
                    </button>
                    {status === 'success' && <span className="text-emerald-500 text-xs font-bold ar-text animate-bounce">✅ ممتاز!</span>}
                    {status === 'fail' && <span className="text-red-500 text-xs ar-text font-bold" title={`سمعت: ${heard}`}>❌ جرب تاني</span>}
                </div>
            );
        };

        // --- COMPREHENSIVE DATA ---
        const LEARNING_DATA = {
            words: {

                    { id: 'w1', ger: "der Name", eng: "Name", ar: "الاسم", s: [{ g: "Wie ist Ihr <strong>Name</strong>?", e: "What is your name?", a: "اسمك إيه؟" }, { g: "Mein <strong>Name</strong> ist Müller.", e: "My name is Müller.", a: "اسمي مولر." }, { g: "Er hat einen schönen <strong>Namen</strong>.", e: "He has a beautiful name.", a: "عنده اسم جميل." }] },
                    { id: 'w2', ger: "das Land", eng: "Country", ar: "البلد", s: [{ g: "Aus welchem <strong>Land</strong> kommen Sie?", e: "Which country do you come from?", a: "إنت من أي بلد؟" }, { g: "Deutschland ist ein schönes <strong>Land</strong>.", e: "Germany is a beautiful country.", a: "ألمانيا بلد جميل." }, { g: "Wir reisen in ein anderes <strong>Land</strong>.", e: "We are traveling to another country.", a: "هنسافر لبلد تانية." }] },
                    { id: 'w3', ger: "die Nationalität", eng: "Nationality", ar: "الجنسية", s: [{ g: "Welche <strong>Nationalität</strong> haben Sie?", e: "What nationality are you?", a: "جنسيتك إيه؟" }, { g: "Er hat die deutsche <strong>Nationalität</strong>.", e: "He has German nationality.", a: "معاه الجنسية الألمانية." }, { g: "Meine <strong>Nationalität</strong> ist ägyptisch.", e: "My nationality is Egyptian.", a: "جنسيتي مصري." }] },
                    { id: 'w4', ger: "die Stadt", eng: "City", ar: "المدينة", s: [{ g: "In welcher <strong>Stadt</strong> wohnen Sie?", e: "In which city do you live?", a: "إنت ساكن في أي مدينة؟" }, { g: "Berlin ist eine große <strong>Stadt</strong>.", e: "Berlin is a big city.", a: "برلين مدينة كبيرة." }, { g: "Die <strong>Stadt</strong> ist sehr alt.", e: "The city is very old.", a: "المدينة دي قديمة جداً." }] },
                    { id: 'w7', ger: "die Muttersprache", eng: "Mother tongue", ar: "اللغة الأم", s: [{ g: "Was ist Ihre <strong>Muttersprache</strong>?", e: "What is your mother tongue?", a: "إيه لغتك الأم؟" }, { g: "Meine <strong>Muttersprache</strong> ist Arabisch.", e: "My mother tongue is Arabic.", a: "لغتي الأم هي العربي." }, { g: "Er lernt meine <strong>Muttersprache</strong>.", e: "He is learning my mother tongue.", a: "هو بيتعلم لغتي الأم." }] },
                    { id: 'w9', ger: "der Alltag", eng: "Everyday life", ar: "الحياة اليومية", s: [{ g: "Ich brauche Deutsch für den <strong>Alltag</strong>.", e: "I need German for everyday life.", a: "محتاج ألماني عشان الحياة اليومية." }, { g: "Der <strong>Alltag</strong> ist oft stressig.", e: "Everyday life is often stressful.", a: "الحياة اليومية غالباً مرهقة." }, { g: "Wir sprechen über unseren <strong>Alltag</strong>.", e: "We talk about our everyday life.", a: "بنتكلم عن حياتنا اليومية." }] }
                ],
                beruf: [
                    { id: 'w5', ger: "der Beruf", eng: "Profession", ar: "المهنة", s: [{ g: "Was sind Sie von <strong>Beruf</strong>?", e: "What is your profession?", a: "بتشتغل إيه؟" }, { g: "Ich liebe meinen <strong>Beruf</strong>.", e: "I love my profession.", a: "بحب مهنتي." }, { g: "Er sucht einen neuen <strong>Beruf</strong>.", e: "He is looking for a new profession.", a: "بيدور على مهنة جديدة." }] },
                    { id: 'w6', ger: "die Firma", eng: "Company", ar: "الشركة", s: [{ g: "In welcher <strong>Firma</strong> sind Sie?", e: "Where do you work?", a: "بتشتغل في شركة إيه؟" }, { g: "Die <strong>Firma</strong> ist sehr bekannt.", e: "The company is very well-known.", a: "الشركة مشهورة جداً." }, { g: "Wir haben die <strong>Firma</strong> gegründet.", e: "We founded the company.", a: "إحنا أسسنا الشركة." }] },

                    { id: 'w11', ger: "die Prüfung", eng: "Exam", ar: "الامتحان", s: [{ g: "Ich habe am Mittwoch eine <strong>Prüfung</strong>.", e: "I have an exam on Wednesday.", a: "عندي امتحان يوم الأربعاء." }, { g: "Die <strong>Prüfung</strong> war sehr leicht.", e: "The exam was very easy.", a: "الامتحان كان سهل جداً." }, { g: "Er hat die <strong>Prüfung</strong> bestanden.", e: "He passed the exam.", a: "هو نجح في الامتحان." }] }
                ],
                freizeit: [
                    { id: 'w8', ger: "die Freizeit", eng: "Free time", ar: "وقت الفراغ", s: [{ g: "Was machen Sie gern in Ihrer <strong>Freizeit</strong>?", e: "What do you like to do in your free time?", a: "بتحب تعمل إيه في وقت فراغك؟" }, { g: "In meiner <strong>Freizeit</strong> lese ich viel.", e: "In my free time I read a lot.", a: "في وقت فراغي بقرا كتير." }, { g: "Er hat nicht viel <strong>Freizeit</strong>.", e: "He doesn't have much free time.", a: "معندوش وقت فراغ كتير." }] },
                    { id: 'w12', ger: "das Kino", eng: "Cinema", ar: "السينما", s: [{ g: "Willst du heute mit ins <strong>Kino</strong> kommen?", e: "Do you want to come to the cinema today?", a: "تحب تيجي معانا السينما النهاردة؟" }, { g: "Wir gehen am Wochenende ins <strong>Kino</strong>.", e: "We go to the cinema on the weekend.", a: "هنروح السينما في الويك إند." }, { g: "Das <strong>Kino</strong> ist in der Nähe.", e: "The cinema is nearby.", a: "السينما قريبة." }] }
                ],
                adjektive: [
                    { id: 'a1', ger: "kaputt", eng: "broken / exhausted", ar: "عطلان / مُرهق", s: [{ g: "Mein Auto ist <strong>kaputt</strong>.", e: "My car is broken.", a: "عربيتي عطلانة." }, { g: "Das Fenster ist <strong>kaputt</strong>.", e: "The window is broken.", a: "الشباك مكسور." }, { g: "Ich bin nach der Arbeit total <strong>kaputt</strong>.", e: "I am exhausted after work.", a: "أنا مهلوك بعد الشغل." }] },
                    { id: 'a2', ger: "toll", eng: "great", ar: "رائع", s: [{ g: "Es läuft ein <strong>toller</strong> Actionfilm.", e: "A great action movie is playing.", a: "في فيلم أكشن جامد شغال." }, { g: "Das ist eine <strong>tolle</strong> Idee!", e: "That is a great idea!", a: "دي فكرة هايلة!" }, { g: "Wir hatten einen <strong>tollen</strong> Urlaub.", e: "We had a great holiday.", a: "قضينا إجازة رائعة." }] },
                    { id: 'a3', ger: "faul", eng: "lazy", ar: "كسول", s: [{ g: "Ich war zu <strong>faul</strong>.", e: "I was too lazy.", a: "كنت كسلان أوي." }, { g: "Er ist ein <strong>fauler</strong> Schüler.", e: "He is a lazy student.", a: "هو طالب كسلان." }, { g: "Am Sonntag bin ich oft <strong>faul</strong>.", e: "On Sunday I am often lazy.", a: "يوم الحد بكون مأنتخ غالباً." }] },
                    { id: 'a4', ger: "müde", eng: "tired", ar: "مرهق", s: [{ g: "Abends war ich oft <strong>müde</strong>.", e: "In the evenings I was often tired.", a: "بالليل كنت غالباً تعبان." }, { g: "Bist du <strong>müde</strong>?", e: "Are you tired?", a: "إنت نعسان؟" }, { g: "Das Baby ist sehr <strong>müde</strong>.", e: "The baby is very tired.", a: "البيبي نعسان جداً." }] },

                    structure: "W-Wort + Verb (Position 2) + Subjekt + ...?",
                    examples: [

                    structure: "Subjekt + Modalverb (Pos 2) + ... + Infinitiv (Ende)",

        // --- UI COMPONENTS ---
        const ProgressBar = ({ total, learned, colorClass }) => {
            const percentage = total === 0 ? 0 : Math.round((learned / total) * 100);
            return (
                <div className="glass-panel p-5 rounded-2xl mb-8 flex items-center justify-between transition-all" dir="rtl">
                    <div>
                        <h3 className="text-sm font-bold text-slate-500 uppercase tracking-wider ar-text mb-1">مستوى التقدم</h3>
                        <p className="text-3xl font-extrabold text-slate-800">{learned} <span className="text-sm font-medium text-slate-400">/ {total} أتقنتهم</span></p>
                    </div>
                    <div className="relative w-20 h-20 drop-shadow-md">
                        <svg className="w-full h-full transform -rotate-90" viewBox="0 0 36 36">
                            <path className="text-slate-200" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" strokeWidth="3" />
                            <path className={`${colorClass} transition-all duration-1000 ease-out`} strokeDasharray={`${percentage}, 100`} d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" />
                        </svg>
                        <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-sm font-bold text-slate-700">
                            {percentage}%
                        </div>
                    </div>
                </div>
            );

                navigator.clipboard.writeText(emailContent).then(() => {

                    setTimeout(() => setCopied(false), 2000);

                                    entschuldige, dass ich so lange nicht geschrieben habe. (آسف إني مكتبتش من زمان)

        const QuickReviewSlider = ({ toggleLearned, learnedItems }) => {
            const items = useMemo(() => {
                let all = [
                    ...LEARNING_DATA.words.alltag.map(w => ({ ...w, type: 'Wort' })),
                    ...LEARNING_DATA.words.beruf.map(w => ({ ...w, type: 'Wort' })),
                    ...LEARNING_DATA.verbs.map(v => ({ ...v, type: 'Verb' })),
                    ...LEARNING_DATA.expressions.map(e => ({ ...e, type: 'Ausdruck' }))
                ];
                for (let i = all.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [all[i], all[j]] = [all[j], all[i]];
                }
                return all.slice(0, 10);
            }, []);

            return (
                <div className="mt-12 pt-8 border-t border-slate-200/60 w-full mb-4" dir="rtl">

                                    </button>
                                </div>

                                <div className="mt-auto pt-3 border-t border-slate-100 flex justify-between items-center">
                                    <button onClick={(e) => playAudio(item.ger, e)} className="text-slate-400 hover:text-blue-600 transition-colors p-2 bg-slate-50 hover:bg-blue-50 rounded-full"><i data-lucide="volume-2" className="w-4 h-4"></i></button>

                                </div>
                            </div>
                        ))}
                    </div>

            );

        // --- MAIN APP COMPONENT ---
        const App = () => {
            const [activeTab, setActiveTab] = useState('words');
            const [searchTerm, setSearchTerm] = useState('');
            const [expandedReview, setExpandedReview] = useState('d1');

            const [learnedItems, setLearnedItems] = useState(() => {
                try {
                    const saved = localStorage.getItem('germanAppA1B1Progress');
                    return saved ? new Set(JSON.parse(saved)) : new Set();
                } catch {
                    return new Set();
                }
            });

            useEffect(() => {
                lucide.createIcons();
            });

            useEffect(() => {
                localStorage.setItem('germanAppA1B1Progress', JSON.stringify(Array.from(learnedItems)));
            }, [learnedItems]);

            const toggleLearned = (id) => {
                const newLearned = new Set(learnedItems);
                if (newLearned.has(id)) newLearned.delete(id);
                else newLearned.add(id);
                setLearnedItems(newLearned);
            };

            const totalWords = LEARNING_DATA.words.alltag.length + LEARNING_DATA.words.beruf.length + LEARNING_DATA.words.freizeit.length + LEARNING_DATA.words.adjektive.length;
            const totalVerbs = LEARNING_DATA.verbs.length + LEARNING_DATA.perfektVerbs.length;
            const totalExp = LEARNING_DATA.expressions.length;
            const totalPrep = LEARNING_DATA.prepositions.length; // Added back!
            const totalDialoge = LEARNING_DATA.dialoge.reduce((acc, cat) => acc + cat.items.length, 0);
            const totalGrammar = LEARNING_DATA.grammar.length;
            const grandTotal = totalWords + totalVerbs + totalExp + totalPrep + totalDialoge + totalGrammar;

            const tabConfig = {
                words: { labelEn: 'Nouns & Adj', labelAr: 'الأسماء والصفات', icon: 'book-open', color: 'blue' },
                verbs: { labelEn: 'Verbs', labelAr: 'الأفعال والماضي', icon: 'activity', color: 'emerald' },
                expressions: { labelEn: 'Expressions', labelAr: 'تعبيرات', icon: 'message-circle', color: 'amber' },
                prepositions: { labelEn: 'Prepositions', labelAr: 'حروف الجر', icon: 'link', color: 'rose' },
                dialoge: { labelEn: 'Dialogues', labelAr: 'المحادثات والمواقف', icon: 'users', color: 'teal' },
                grammar: { labelEn: 'Grammar', labelAr: 'القواعد الشاملة', icon: 'pen-tool', color: 'purple' },
                email: { labelEn: 'E-Mail', labelAr: 'كتابة الإيميل', icon: 'mail', color: 'slate' }
            };

            const activeColor = tabConfig[activeTab].color;

            return (
                <div className="h-screen flex flex-col bg-slate-50" dir="rtl">
                    {/* TOP NAVIGATION HEADER */}
                    <header className="w-full bg-slate-900 text-white shadow-xl z-50 shrink-0 relative overflow-hidden">
                        <div className={`absolute top-0 left-0 w-full h-1 bg-${activeColor}-500 transition-colors duration-500`}></div>

                        <div className="flex justify-between items-center px-4 md:px-8 py-3 border-b border-slate-800">
                            <h1 className="text-xl md:text-2xl font-extrabold flex items-center gap-3 ar-text">
                                <span className={`bg-${activeColor}-500 p-2 rounded-xl transition-colors duration-500 shadow-lg`}>
                                    <i data-lucide="book-open-check" className="w-5 h-5 md:w-6 md:h-6 text-white"></i>
                                </span>
                                ألماني A1-B1+ (المنهج الشامل)
                            </h1>

                            <div className="flex items-center gap-3" dir="ltr">
                                <div className="text-right hidden sm:block">
                                    <div className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Mastery</div>
                                    <div className={`text-sm font-extrabold text-${activeColor}-400 transition-colors`}>{grandTotal === 0 ? 0 : Math.round((learnedItems.size / grandTotal) * 100)}%</div>
                                </div>
                                <div className="relative w-10 h-10">
                                    <svg className="w-full h-full transform -rotate-90" viewBox="0 0 36 36">
                                        <path className="text-slate-800" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" strokeWidth="4" />
                                        <path className={`text-${activeColor}-500 transition-all duration-1000 ease-out`} strokeDasharray={`${grandTotal === 0 ? 0 : (learnedItems.size / grandTotal) * 100}, 100`} d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" strokeWidth="4" strokeLinecap="round" />
                                    </svg>
                                </div>
                            </div>
                        </div>

                        {/* Horizontal Navigation Tabs */}
                        <nav className="flex overflow-x-auto scrollbar-hide px-4 py-2 gap-2 snap-x">
                            {Object.entries(tabConfig).map(([key, tab]) => (
                                <button
                                    key={key}
                                    onClick={() => { setActiveTab(key); setSearchTerm(''); }}
                                    className={`snap-center shrink-0 flex items-center gap-2 px-4 py-2.5 rounded-xl transition-all duration-300 font-bold ar-text group relative overflow-hidden ${activeTab === key ? `bg-${tab.color}-600 text-white shadow-md` : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}
                                >
                                    <i data-lucide={tab.icon} className={`w-5 h-5 ${activeTab === key ? 'text-white' : `text-${tab.color}-400 group-hover:text-${tab.color}-300`} transition-colors`}></i>
                                    <span className="text-sm whitespace-nowrap">{tab.labelAr}</span>
                                    {activeTab === key && <div className="absolute bottom-0 left-1/2 transform -translate-x-1/2 w-1/2 h-0.5 bg-white/50 rounded-t-full"></div>}
                                </button>
                            ))}
                        </nav>
                    </header>

                    {/* MAIN CONTENT AREA */}
                    <main className="flex-1 overflow-y-auto p-4 md:p-8 lg:p-12 relative" dir="ltr">
                        <div className={`fixed top-1/4 left-1/4 w-[50vw] h-[50vw] rounded-full bg-${activeColor}-200/20 blur-3xl -z-10 transition-colors duration-1000`}></div>

                        <div className="max-w-7xl mx-auto flex flex-col min-h-full">

                            {activeTab !== 'grammar' && activeTab !== 'email' && (
                                <div className="flex flex-col md:flex-row gap-4 mb-10" dir="rtl">
                                    <div className="flex-1 relative group max-w-3xl mx-auto w-full">
                                        <div className={`absolute -inset-0.5 bg-gradient-to-r from-${activeColor}-400 to-${activeColor}-600 rounded-2xl blur opacity-20 group-hover:opacity-40 transition duration-500`}></div>
                                        <div className="relative">
                                            <i data-lucide="search" className="absolute right-4 top-1/2 transform -translate-y-1/2 text-slate-400 w-6 h-6"></i>
                                            <input
                                                type="text"
                                                placeholder="ابحث بالعربي أو الألماني..."
                                                value={searchTerm}
                                                onChange={(e) => setSearchTerm(e.target.value)}
                                                className="w-full pr-14 pl-6 py-4 rounded-2xl border-none focus:outline-none focus:ring-4 focus:ring-[var(--activeColor)]/20 shadow-lg text-lg ar-text text-slate-700 font-medium"
                                                style={{ '--activeColor': activeColor }}
                                            />
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'words' && <ProgressBar total={totalWords} learned={Array.from(learnedItems).filter(id => id.startsWith('w') || id.startsWith('a')).length} colorClass="text-blue-500" />}
                            {activeTab === 'verbs' && <ProgressBar total={totalVerbs} learned={Array.from(learnedItems).filter(id => id.startsWith('v') || id.startsWith('pv')).length} colorClass="text-emerald-500" />}
                            {activeTab === 'expressions' && <ProgressBar total={totalExp} learned={Array.from(learnedItems).filter(id => id.startsWith('e')).length} colorClass="text-amber-500" />}
                            {activeTab === 'prepositions' && <ProgressBar total={totalPrep} learned={Array.from(learnedItems).filter(id => id.startsWith('p')).length} colorClass="text-rose-500" />}
                            {activeTab === 'dialoge' && <ProgressBar total={totalDialoge} learned={Array.from(learnedItems).filter(id => id.startsWith('d')).length} colorClass="text-teal-500" />}

                            {/* TAB: EMAIL */}
                            {activeTab === 'email' && (
                                <div className="space-y-6" dir="rtl">
                                    <h2 className="text-3xl font-extrabold text-slate-800 mb-6 flex items-center gap-3 ar-text">
                                        <span className="bg-slate-200 p-2 rounded-xl text-slate-700"><i data-lucide="mail" className="w-6 h-6"></i></span> كتابة الإيميل
                                    </h2>
                                    <EmailComposer />
                                </div>
                            )}

                            {/* TAB: WORDS & ADJECTIVES */}
                            {activeTab === 'words' && (
                                <div className="space-y-12 flex-grow">
                                    <section>
                                        <h2 className="text-3xl font-extrabold text-slate-800 mb-6 flex items-center gap-3 ar-text" dir="rtl"><span className="bg-blue-100 p-2 rounded-xl text-blue-600"><i data-lucide="coffee" className="w-6 h-6"></i></span> الحياة اليومية والتعارف (Alltag & Vorstellen)</h2>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-6">
                                            {LEARNING_DATA.words.alltag.filter(w => w.ger.toLowerCase().includes(searchTerm.toLowerCase()) || w.eng.toLowerCase().includes(searchTerm.toLowerCase()) || w.ar.includes(searchTerm)).map(word => (
                                                <WordCard key={word.id} item={word} isLearned={learnedItems.has(word.id)} toggleLearned={toggleLearned} />
                                            ))}
                                        </div>
                                    </section>

                                    <section>
                                        <h2 className="text-3xl font-extrabold text-slate-800 mb-6 flex items-center gap-3 ar-text" dir="rtl"><span className="bg-blue-100 p-2 rounded-xl text-blue-600"><i data-lucide="briefcase" className="w-6 h-6"></i></span> العمل والدراسة (Beruf & Studium)</h2>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-6">
                                            {LEARNING_DATA.words.beruf.filter(w => w.ger.toLowerCase().includes(searchTerm.toLowerCase()) || w.eng.toLowerCase().includes(searchTerm.toLowerCase()) || w.ar.includes(searchTerm)).map(word => (
                                                <WordCard key={word.id} item={word} isLearned={learnedItems.has(word.id)} toggleLearned={toggleLearned} />
                                            ))}
                                        </div>
                                    </section>

                                    <section>
                                        <h2 className="text-3xl font-extrabold text-slate-800 mb-6 flex items-center gap-3 ar-text" dir="rtl"><span className="bg-blue-100 p-2 rounded-xl text-blue-600"><i data-lucide="gamepad-2" className="w-6 h-6"></i></span> وقت الفراغ (Freizeit & Wochenende)</h2>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-6">
                                            {LEARNING_DATA.words.freizeit.filter(w => w.ger.toLowerCase().includes(searchTerm.toLowerCase()) || w.eng.toLowerCase().includes(searchTerm.toLowerCase()) || w.ar.includes(searchTerm)).map(word => (
                                                <WordCard key={word.id} item={word} isLearned={learnedItems.has(word.id)} toggleLearned={toggleLearned} />
                                            ))}
                                        </div>
                                    </section>

                                    <section>
                                        <h2 className="text-3xl font-extrabold text-slate-800 mb-6 flex items-center gap-3 ar-text" dir="rtl"><span className="bg-blue-100 p-2 rounded-xl text-blue-600"><i data-lucide="sparkles" className="w-6 h-6"></i></span> الصفات (Adjektive)</h2>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-6">
                                            {LEARNING_DATA.words.adjektive.filter(w => w.ger.toLowerCase().includes(searchTerm.toLowerCase()) || w.eng.toLowerCase().includes(searchTerm.toLowerCase()) || w.ar.includes(searchTerm)).map(word => (
                                                <WordCard key={word.id} item={word} isLearned={learnedItems.has(word.id)} toggleLearned={toggleLearned} />
                                            ))}
                                        </div>
                                    </section>
                                </div>
                            )}

                            {/* TAB: VERBS */}
                            {activeTab === 'verbs' && (
                                <div className="flex-grow">
                                    <h2 className="text-3xl font-extrabold text-slate-800 mb-8 flex items-center gap-3 ar-text" dir="rtl">
                                        <span className="bg-emerald-100 p-2 rounded-xl text-emerald-600"><i data-lucide="activity" className="w-6 h-6"></i></span>
                                        الأفعال الناقصة (Modalverben)
                                    </h2>
                                    <div className="space-y-4 mb-12">
                                        {LEARNING_DATA.verbs.filter(v => v.ger.toLowerCase().includes(searchTerm.toLowerCase()) || v.eng.toLowerCase().includes(searchTerm.toLowerCase()) || v.ar.includes(searchTerm)).map(verb => (
                                            <ListRow key={verb.id} item={verb} isLearned={learnedItems.has(verb.id)} toggleLearned={toggleLearned} colorTheme="emerald" />
                                        ))}
                                    </div>

                                    <h2 className="text-3xl font-extrabold text-slate-800 mb-8 flex items-center gap-3 ar-text" dir="rtl">
                                        <span className="bg-emerald-100 p-2 rounded-xl text-emerald-600"><i data-lucide="alert-circle" className="w-6 h-6"></i></span>
                                        قائمة الأفعال مع الماضي التام (Das Perfekt)
                                    </h2>
                                    <div className="space-y-3">
                                        {LEARNING_DATA.perfektVerbs.filter(v => v.ger.toLowerCase().includes(searchTerm.toLowerCase()) || v.eng.toLowerCase().includes(searchTerm.toLowerCase()) || v.ar.includes(searchTerm)).map(verb => (
                                            <PerfektVerbRow key={verb.id} item={verb} isLearned={learnedItems.has(verb.id)} toggleLearned={toggleLearned} />
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* TAB: EXPRESSIONS */}
                            {activeTab === 'expressions' && (
                                <div dir="rtl" className="flex-grow">
                                    <h2 className="text-3xl font-extrabold text-slate-800 mb-8 flex items-center gap-3 ar-text">
                                        <span className="bg-amber-100 p-2 rounded-xl text-amber-600"><i data-lucide="message-circle" className="w-6 h-6"></i></span>
                                        تعبيرات ومصطلحات (Redemittel)
                                    </h2>
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                        {LEARNING_DATA.expressions.filter(e => e.ger.toLowerCase().includes(searchTerm.toLowerCase()) || e.eng.toLowerCase().includes(searchTerm.toLowerCase()) || e.ar.includes(searchTerm)).map(exp => (
                                            <div key={exp.id} className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm relative group hover:shadow-xl hover:border-amber-200 transition-all duration-300">
                                                <button onClick={() => toggleLearned(exp.id)} className={`absolute top-5 left-5 p-2 rounded-full transition-colors z-10 ${learnedItems.has(exp.id) ? 'bg-amber-100 text-amber-600' : 'bg-slate-50 text-slate-300 hover:bg-slate-100'}`}>
                                                    <i data-lucide="check" className="w-5 h-5"></i>
                                                </button>
                                                <span className="inline-block bg-amber-50 text-amber-600 px-3 py-1 rounded-lg text-xs font-bold mb-4 ar-text border border-amber-100">{exp.type}</span>
                                                <div className="flex items-start gap-3 mb-3" dir="ltr">
                                                    <div className="flex flex-col gap-2 shrink-0">
                                                        <button onClick={(e) => playAudio(exp.ger, e)} className="text-amber-500 bg-amber-50 p-2 rounded-xl hover:bg-amber-100 transition-colors"><i data-lucide="volume-2" className="w-5 h-5"></i></button>
                                                        <div className="bg-slate-50 rounded-full p-1"><SpeechTester targetText={exp.ger} /></div>
                                                    </div>
                                                    <div>
                                                        <h3 className="text-xl font-extrabold text-slate-800 leading-tight mt-1">"{exp.ger}"</h3>
                                                    </div>
                                                </div>

                                                <div className="bg-slate-50 rounded-2xl p-4 mt-4 border border-slate-100">
                                                    <p className="text-slate-500 font-medium text-sm mb-2" dir="ltr">{exp.eng}</p>
                                                    <p className="text-amber-700 font-extrabold text-xl mb-4 ar-text">{exp.ar}</p>
                                                    <div className="text-sm text-slate-600 flex gap-2 items-start pt-3 border-t border-slate-200 mb-4">
                                                        <i data-lucide="info" className="w-5 h-5 text-amber-400 mt-0.5 shrink-0"></i>
                                                        <span className="ar-text leading-relaxed">{exp.context}</span>
                                                    </div>

                                                    {exp.s && (
                                                        <div className="space-y-3 border-t border-slate-200 pt-4">
                                                            {exp.s.map((sentence, idx) => (
                                                                <div key={idx} className="bg-white p-3 rounded-xl border border-amber-100/50 flex flex-col gap-1">
                                                                    <div className="flex gap-2 items-start" dir="ltr">
                                                                        <button onClick={(e) => playAudio(sentence.g, e)} className="text-amber-500 hover:text-amber-700 shrink-0 mt-0.5"><i data-lucide="volume-2" className="w-4 h-4"></i></button>
                                                                        <span className="text-slate-800 font-medium text-sm" dangerouslySetInnerHTML={{ __html: sentence.g }}></span>
                                                                    </div>
                                                                    <div className="ml-6 text-slate-500 text-xs" dir="ltr">{sentence.e}</div>
                                                                    <div className="ml-6 text-amber-600 text-sm font-bold ar-text" dir="rtl">{sentence.a}</div>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* TAB: PREPOSITIONS */}
                            {activeTab === 'prepositions' && (
                                <div className="flex-grow">
                                    <h2 className="text-3xl font-extrabold text-slate-800 mb-8 flex items-center gap-3 ar-text" dir="rtl">
                                        <span className="bg-rose-100 p-2 rounded-xl text-rose-600"><i data-lucide="link" className="w-6 h-6"></i></span>
                                        حروف الجر والأفعال المرتبطة بها (Präpositionen)
                                    </h2>
                                    <div className="space-y-4">
                                        {LEARNING_DATA.prepositions.filter(p => p.ger.toLowerCase().includes(searchTerm.toLowerCase()) || p.eng.toLowerCase().includes(searchTerm.toLowerCase()) || p.ar.includes(searchTerm)).map(prep => (
                                            <ListRow key={prep.id} item={prep} isLearned={learnedItems.has(prep.id)} toggleLearned={toggleLearned} colorTheme="rose" />
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* TAB: DIALOGE */}
                            {activeTab === 'dialoge' && (
                                <div dir="rtl" className="pb-10 flex-grow">
                                    <div className="bg-gradient-to-br from-teal-700 to-emerald-900 text-white p-10 rounded-3xl shadow-xl mb-10 relative overflow-hidden">
                                        <i data-lucide="users" className="absolute -left-4 -top-4 w-48 h-48 text-white opacity-10 transform -rotate-12"></i>
                                        <div className="relative z-10 text-center">
                                            <h2 className="text-4xl font-extrabold mb-4 ar-text">المحادثات والمواقف (Dialoge)</h2>
                                            <p className="text-teal-100 ar-text text-lg max-w-3xl mx-auto leading-relaxed">تجميع لأهم الجمل التي يمكن استخدامها في المواقف المختلفة (التعارف، التليفون، إبداء الرأي) مقسمة سطراً بسطر لسهولة التدريب.</p>
                                        </div>
                                    </div>

                                    <div className="space-y-6">
                                        {LEARNING_DATA.dialoge.map((cat, cIdx) => (
                                            <div key={cIdx} className="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden transition-all duration-300">
                                                <button
                                                    className={`w-full p-6 flex items-center justify-between text-right transition-colors ${expandedReview === cat.catId ? 'bg-teal-50' : 'hover:bg-slate-50'}`}
                                                    onClick={() => setExpandedReview(expandedReview === cat.catId ? null : cat.catId)}
                                                >
                                                    <h3 className="text-2xl font-bold text-slate-800 ar-text flex items-center gap-3">
                                                        <span className={`w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold ${expandedReview === cat.catId ? 'bg-teal-600 text-white' : 'bg-slate-200 text-slate-600'}`}>{cIdx + 1}</span>
                                                        {cat.title}
                                                    </h3>
                                                    <i data-lucide="chevron-down" className={`w-6 h-6 text-slate-400 transform transition-transform duration-300 ${expandedReview === cat.catId ? 'rotate-180 text-teal-600' : ''}`}></i>
                                                </button>

                                                <div className={`transition-all duration-500 ease-in-out overflow-hidden ${expandedReview === cat.catId ? 'max-h-[5000px] opacity-100' : 'max-h-0 opacity-0'}`}>
                                                    <div className="p-6 border-t border-slate-100 bg-slate-50/50">
                                                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                                                            {cat.items.filter(item => item.g.toLowerCase().includes(searchTerm.toLowerCase()) || item.e.toLowerCase().includes(searchTerm.toLowerCase()) || item.a.includes(searchTerm)).map((item) => (
                                                                <div key={item.id} className="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm relative group hover:shadow-md hover:border-teal-200 transition-all duration-300" dir="ltr">
                                                                    <button onClick={() => toggleLearned(item.id)} className={`absolute top-4 right-4 p-2 rounded-full transition-colors z-10 ${learnedItems.has(item.id) ? 'bg-teal-100 text-teal-600' : 'bg-slate-50 text-slate-300 hover:bg-slate-100'}`}>
                                                                        <i data-lucide="check" className="w-5 h-5"></i>
                                                                    </button>
                                                                    <div className="flex items-start gap-3 mb-3 pr-10">
                                                                        <div className="flex flex-col gap-2 shrink-0">
                                                                            <button onClick={(e) => playAudio(item.g, e)} className="text-teal-500 bg-teal-50 p-2 rounded-xl hover:bg-teal-100 transition-colors"><i data-lucide="volume-2" className="w-5 h-5"></i></button>
                                                                            <div className="bg-slate-50 rounded-full p-1"><SpeechTester targetText={item.g} /></div>
                                                                        </div>
                                                                        <h3 className="text-lg font-bold text-slate-800 leading-relaxed mt-1" dangerouslySetInnerHTML={{ __html: colorizeArticles(item.g) }}></h3>
                                                                    </div>
                                                                    <div className="pl-12 space-y-2">
                                                                        <p className="text-slate-500 text-sm font-medium">{item.e}</p>
                                                                        <p className="text-teal-700 font-bold text-lg ar-text border-t border-slate-100 pt-2 mt-2" dir="rtl">{item.a}</p>
                                                                    </div>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* TAB: GRAMMAR */}
                            {activeTab === 'grammar' && (
                                <div dir="rtl" className="flex-grow">
                                    <div className="bg-gradient-to-br from-purple-700 to-indigo-800 text-white p-10 rounded-3xl shadow-xl mb-10 relative overflow-hidden">
                                        <i data-lucide="pen-tool" className="absolute -right-4 -bottom-4 w-48 h-48 text-white opacity-10 transform rotate-12"></i>
                                        <div className="relative z-10">
                                            <h2 className="text-4xl font-extrabold mb-3 ar-text">القواعد النحوية (Grammatik)</h2>
                                            <p className="text-purple-200 ar-text text-lg max-w-2xl">أهم القواعد المشروحة: الأفعال الناقصة، بناء الماضي التام، وتكوين الجمل الجانبية باستخدام weil.</p>
                                        </div>
                                    </div>

                                    <div className="grid gap-8">
                                        {LEARNING_DATA.grammar.map((gram, idx) => (
                                            <div key={idx} className="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden hover:shadow-lg transition-shadow">
                                                <div className="p-8 border-b border-slate-50 bg-slate-50/50 flex items-start gap-4">
                                                    <div className="bg-purple-100 p-3 rounded-2xl text-purple-600 shrink-0 mt-1">
                                                        <i data-lucide="braces" className="w-6 h-6"></i>
                                                    </div>
                                                    <div>
                                                        <h3 className="text-2xl font-extrabold text-slate-800 ar-text mb-2">{gram.title}</h3>
                                                        <p className="text-base text-slate-600 ar-text leading-relaxed">{gram.desc}</p>
                                                    </div>
                                                </div>

                                                <div className="p-8">
                                                    <div className="bg-slate-900 text-purple-300 font-mono text-base p-5 rounded-2xl mb-8 shadow-inner flex items-center gap-3 overflow-x-auto border border-slate-800" dir="ltr">
                                                        <i data-lucide="code" className="text-slate-500 w-5 h-5 shrink-0"></i> {gram.structure}
                                                    </div>

                                                    <h4 className="font-bold text-slate-400 mb-4 text-sm tracking-widest uppercase ar-text">أمثلة للتوضيح:</h4>
                                                    <ul className="space-y-4">
                                                        {gram.examples.map((ex, i) => (
                                                            <li key={i} className="bg-purple-50/50 p-5 rounded-2xl border border-purple-100">
                                                                <div className="flex gap-4 items-center mb-3" dir="ltr">
                                                                    <button onClick={(e) => playAudio(ex.g, e)} className="text-purple-500 bg-white p-2 rounded-xl shadow-sm hover:bg-purple-50 transition-colors shrink-0"><i data-lucide="volume-2" className="w-5 h-5"></i></button>
                                                                    <span className="text-slate-800 text-lg font-medium" dangerouslySetInnerHTML={{ __html: colorizeArticles(ex.g) }}></span>
                                                                </div>
                                                                <div className="text-purple-700 font-bold ar-text border-t border-purple-200/50 pt-3 mt-3">{ex.a}</div>
                                                            </li>
                                                        ))}
                                                    </ul>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* SLIDER COMPONENT PLACED AT THE BOTTOM OF THE MAIN CONTAINER */}
                            {activeTab !== 'email' && activeTab !== 'grammar' && (
                                <QuickReviewSlider toggleLearned={toggleLearned} learnedItems={learnedItems} />
                            )}

                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
